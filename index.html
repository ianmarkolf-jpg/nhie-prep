<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a2540">
<title>NHIE Drill v5 — Cream City Pro</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --navy: #0a2540;
  --navy-light: #15355a;
  --gold: #d4a23c;
  --gold-light: #e8c068;
  --bg: #f5f5f0;
  --white: #ffffff;
  --gray-light: #e8e8e3;
  --gray: #999;
  --gray-dark: #555;
  --green: #2a7a3a;
  --red: #b4341e;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--navy);
  line-height: 1.5;
  min-height: 100vh;
  padding: 16px;
  max-width: 700px;
  margin: 0 auto;
}
header {
  text-align: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--gold);
}
.brand {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1.5px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 4px;
}
h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: -0.3px;
}
.version {
  font-size: 12px;
  color: var(--gray-dark);
  margin-top: 4px;
}
.menu {
  background: var(--white);
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 1px 4px rgba(10,37,64,0.08);
  margin-bottom: 16px;
}
.menu h2 {
  font-size: 16px;
  margin-bottom: 14px;
  color: var(--navy);
}
.drill-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.btn {
  background: var(--navy);
  color: var(--white);
  border: none;
  padding: 14px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  font-family: inherit;
}
.btn:active { background: var(--navy-light); }
.btn-gold {
  background: var(--gold);
  color: var(--navy);
}
.btn-gold:active { background: var(--gold-light); }
.btn-secondary {
  background: var(--white);
  color: var(--navy);
  border: 1.5px solid var(--gray-light);
}
.btn-secondary:active { background: var(--gray-light); }
.btn-block { width: 100%; margin-top: 10px; }
.stats-card {
  background: var(--white);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 1px 4px rgba(10,37,64,0.08);
}
.stats-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  padding: 6px 0;
}
.stats-row strong { font-weight: 700; color: var(--navy); }
.stats-row .num {
  font-variant-numeric: tabular-nums;
  color: var(--navy);
  font-weight: 600;
}

/* Drill view */
.drill-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding: 10px 14px;
  background: var(--white);
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(10,37,64,0.08);
}
.progress {
  font-size: 13px;
  font-weight: 600;
  color: var(--gray-dark);
}
.btn-quit {
  background: transparent;
  border: 1.5px solid var(--gray-light);
  color: var(--gray-dark);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
}
.btn-quit:active { background: var(--gray-light); }
.question-card {
  background: var(--white);
  border-radius: 12px;
  padding: 22px 20px;
  margin-bottom: 16px;
  box-shadow: 0 1px 4px rgba(10,37,64,0.08);
}
.q-meta {
  font-size: 11px;
  color: var(--gold);
  font-weight: 600;
  letter-spacing: 0.8px;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.q-text {
  font-size: 17px;
  color: var(--navy);
  margin-bottom: 18px;
  line-height: 1.5;
  font-weight: 500;
}
.choices {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.choice {
  background: var(--bg);
  border: 1.5px solid var(--gray-light);
  border-radius: 8px;
  padding: 14px 16px;
  font-size: 15px;
  color: var(--navy);
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  line-height: 1.4;
  transition: all 0.12s;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.choice:active { background: var(--gray-light); }
.choice .letter {
  font-weight: 700;
  color: var(--gold);
  flex-shrink: 0;
  width: 18px;
}
.choice.selected {
  background: var(--navy);
  color: var(--white);
  border-color: var(--navy);
}
.choice.selected .letter { color: var(--gold); }
.choice.correct {
  background: var(--green);
  color: var(--white);
  border-color: var(--green);
}
.choice.correct .letter { color: var(--gold); }
.choice.wrong {
  background: var(--red);
  color: var(--white);
  border-color: var(--red);
}
.choice.wrong .letter { color: var(--gold); }
.choice:disabled { cursor: default; }
.explanation {
  background: var(--bg);
  border-left: 4px solid var(--gold);
  padding: 14px 16px;
  margin-top: 18px;
  border-radius: 4px;
  font-size: 14px;
  color: var(--gray-dark);
  line-height: 1.5;
  display: none;
}
.explanation.show { display: block; }
.explanation strong { color: var(--navy); }
.btn-next {
  display: none;
  width: 100%;
  margin-top: 16px;
  background: var(--gold);
  color: var(--navy);
  font-size: 16px;
  padding: 16px;
}
.btn-next.show { display: block; }
.btn-next:active { background: var(--gold-light); }

/* Results */
.results-card {
  background: var(--white);
  border-radius: 12px;
  padding: 24px 20px;
  box-shadow: 0 1px 4px rgba(10,37,64,0.08);
  text-align: center;
}
.results-score {
  font-size: 48px;
  font-weight: 700;
  color: var(--gold);
  margin: 16px 0 8px;
  font-variant-numeric: tabular-nums;
}
.results-detail {
  font-size: 15px;
  color: var(--gray-dark);
  margin-bottom: 20px;
}
.results-detail strong { color: var(--navy); }

.hidden { display: none !important; }

@media (max-width: 380px) {
  body { padding: 12px; }
  h1 { font-size: 19px; }
  .question-card { padding: 18px 16px; }
  .q-text { font-size: 16px; }
  .choice { font-size: 14px; padding: 12px 14px; }
  .drill-buttons { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="brand">Cream City Pro</div>
  <h1>NHIE Practice Drill</h1>
  <div class="version">v5 · 500 questions · bias-corrected</div>
</header>

<div id="menu-view">
  <div class="menu">
    <h2>Choose your drill</h2>
    <div class="drill-buttons">
      <button class="btn" onclick="startDrill('quick10')">Quick 10</button>
      <button class="btn" onclick="startDrill('weak25')">Weak 25</button>
      <button class="btn" onclick="startDrill('half50')">Half 50</button>
      <button class="btn btn-gold" onclick="startDrill('full100')">Full 100</button>
    </div>
    <button class="btn btn-secondary btn-block" onclick="resetStats()">Reset progress</button>
  </div>
  
  <div class="stats-card">
    <div class="stats-row">
      <span>Total seen</span>
      <span class="num" id="stat-seen">0</span>
    </div>
    <div class="stats-row">
      <span>Total correct</span>
      <span class="num" id="stat-correct">0</span>
    </div>
    <div class="stats-row">
      <span>Accuracy</span>
      <span class="num" id="stat-accuracy">—</span>
    </div>
    <div class="stats-row">
      <span>Sessions completed</span>
      <span class="num" id="stat-sessions">0</span>
    </div>
  </div>
</div>

<div id="drill-view" class="hidden">
  <div class="drill-header">
    <span class="progress" id="progress">1 / 10</span>
    <button class="btn-quit" onclick="quitDrill()">Quit</button>
  </div>
  <div class="question-card" id="question-card"></div>
  <button class="btn btn-next" id="btn-next" onclick="nextQuestion()">Next →</button>
</div>

<div id="results-view" class="hidden">
  <div class="drill-header">
    <span class="progress">Done</span>
    <button class="btn-quit" onclick="quitDrill()">Menu</button>
  </div>
  <div class="results-card">
    <div class="results-score" id="result-score">—</div>
    <div class="results-detail" id="result-detail"></div>
    <button class="btn btn-gold btn-block" onclick="quitDrill()">Back to menu</button>
  </div>
</div>

<script>
const QUESTIONS = [{"id": 4001, "domain": 1, "task": 7, "topic": "Cat I Vent Temp", "q": "A Category I gas appliance vent operates at approximately what flue gas temperature?", "choices": ["Approximately 450\u00b0F", "Approximately 140\u00b0F", "Approximately 220\u00b0F", "Approximately 300\u00b0F"], "correct": 3, "exp": "Cat I: ~300\u00b0F natural draft. Cat II: ~140\u00b0F (rare). Cat III: hot like Cat I but positive pressure. Cat IV: ~140\u00b0F condensing. Vol 1 Ch 3.", "v": 5}, {"id": 4002, "domain": 1, "task": 7, "topic": "Cat IV Vent Temp", "q": "A Category IV (condensing) gas appliance vent operates at approximately what flue gas temperature?", "choices": ["Approximately 220\u00b0F", "Approximately 300\u00b0F", "Approximately 140\u00b0F", "Approximately 450\u00b0F"], "correct": 2, "exp": "Cat IV: ~140\u00b0F (condensing, positive pressure, PVC vent). Cat I: ~300\u00b0F natural draft. Vol 1 Ch 3.", "v": 5}, {"id": 4003, "domain": 1, "task": 7, "topic": "Cat I Vent Materials", "q": "Category I gas appliances are vented through which of the following?", "choices": ["Listed manufacturer-specific positive-pressure pipe only", "PVC plastic pipe rated for high-temperature service", "Stainless flexible liner with no chimney enclosure", "Type B vent, masonry chimney, or single-wall metal vent"], "correct": 3, "exp": "Cat I: Type B vent, masonry chimney, or single-wall vent. Cat IV uses PVC. Cat III uses listed manufacturer pipe. Vol 1 Ch 3.", "v": 5}, {"id": 4004, "domain": 1, "task": 7, "topic": "Cat IV Vent Materials", "q": "Category IV high-efficiency furnaces typically vent through which of the following materials?", "choices": ["Single-wall steel vent connector run", "Masonry chimney with clay flue liner", "PVC pipe sized per manufacturer spec", "Type B double-wall metal vent in chase"], "correct": 2, "exp": "Cat IV: PVC pipe (low temp, positive pressure, acidic condensate). Cat I uses Type B/masonry/single-wall. Vol 1 Ch 3.", "v": 5}, {"id": 4005, "domain": 1, "task": 7, "topic": "Cat III Pressure", "q": "Category III gas appliances differ from Category I by operating under which condition?", "choices": ["Atmospheric draft via barometric damper", "Negative natural draft pressure only", "Positive pressure in the vent system", "Equal indoor and outdoor pressure"], "correct": 2, "exp": "Cat III: hot vent gas (like Cat I) but POSITIVE pressure. Must use manufacturer-listed vent. Cannot share Cat I vents. Vol 1 Ch 3.", "v": 5}, {"id": 4006, "domain": 1, "task": 7, "topic": "AFUE 80", "q": "An 80 AFUE gas furnace converts what percentage of fuel energy to heat?", "choices": ["80% to heat, 20% lost", "90% to heat, 10% lost", "60% to heat, 40% lost", "70% to heat, 30% lost"], "correct": 0, "exp": "AFUE 80 = 80% fuel converts to heat, 20% lost via vent. AFUE 90+ = condensing (Cat IV). Vol 1 Ch 3.", "v": 5}, {"id": 4007, "domain": 1, "task": 7, "topic": "Heat Min Temp", "q": "What minimum temperature must a heating system maintain in habitable spaces, measured 3 feet above the floor?", "choices": ["68\u00b0F at 3 ft above floor", "65\u00b0F at the wall surface", "72\u00b0F at door opening height", "60\u00b0F at floor surface level"], "correct": 0, "exp": "68\u00b0F minimum, measured 3 ft above floor and 2 ft from exterior wall. Bath/laundry/closet not habitable. Vol 1 Ch 3.", "v": 5}, {"id": 4008, "domain": 1, "task": 7, "topic": "Garage Ignition Height", "q": "A gas furnace ignition source installed in a garage must be elevated above the garage floor at least how many inches?", "choices": ["18 inches above floor", "12 inches above floor", "6 inches above floor", "24 inches above floor"], "correct": 0, "exp": "18 inches min above garage floor. Prevents ignition of gasoline vapors which pool low. IRC 2018 M1307.3.", "v": 5}, {"id": 4009, "domain": 1, "task": 7, "topic": "Comb Air Standard Method", "q": "The Standard Method for combustion air requires what minimum room volume per 1,000 Btu/h of appliance input?", "choices": ["30 cubic feet per 1,000 Btu/h", "10 cubic feet per 1,000 Btu/h", "100 cubic feet per 1,000 Btu/h", "50 cubic feet per 1,000 Btu/h"], "correct": 3, "exp": "Standard Method: 50 cu ft per 1,000 Btu/h appliance input. Vol 1 Ch 3 / IRC G2407.", "v": 5}, {"id": 4010, "domain": 1, "task": 7, "topic": "Comb Air Two Open", "q": "The two-opening combustion air method requires net free area of how much per 1,000 Btu/h at each opening?", "choices": ["1 sq inch per 500 Btu/h", "1 sq inch per 2,000 Btu/h", "1 sq inch per 1,000 Btu/h", "1 sq inch per 4,000 Btu/h"], "correct": 2, "exp": "Two-opening method: 1 sq in per 1,000 Btu/h each opening. Top within 12 in of ceiling, bottom within 12 in of floor. Vol 1 Ch 3.", "v": 5}, {"id": 4011, "domain": 1, "task": 7, "topic": "Comb Air Vert Duct", "q": "Outside combustion air supplied via a vertical duct requires what net free area per 1,000 Btu/h?", "choices": ["1 sq inch per 6,000 Btu/h", "1 sq inch per 1,000 Btu/h", "1 sq inch per 4,000 Btu/h", "1 sq inch per 2,000 Btu/h"], "correct": 2, "exp": "Vertical duct from outside: 1 sq in per 4,000 Btu/h. Horizontal duct: 1 sq in per 2,000 Btu/h. Vol 1 Ch 3.", "v": 5}, {"id": 4012, "domain": 1, "task": 7, "topic": "Comb Air Horiz Duct", "q": "Outside combustion air supplied via a horizontal duct requires what net free area per 1,000 Btu/h?", "choices": ["1 sq inch per 8,000 Btu/h", "1 sq inch per 4,000 Btu/h", "1 sq inch per 2,000 Btu/h", "1 sq inch per 1,000 Btu/h"], "correct": 2, "exp": "Horizontal duct: 1 sq in per 2,000 Btu/h. More area than vertical because horizontal flow has more friction. Vol 1 Ch 3.", "v": 5}, {"id": 4013, "domain": 1, "task": 7, "topic": "Comb Air Single Open", "q": "A single high-opening method for combustion air requires what net free area per 1,000 Btu/h?", "choices": ["1 sq inch per 1,000 Btu/h", "1 sq inch per 3,000 Btu/h", "1 sq inch per 5,000 Btu/h", "1 sq inch per 8,000 Btu/h"], "correct": 1, "exp": "Single opening within 12 in of ceiling for gas: 1 sq in per 3,000 Btu/h. Vol 1 Ch 3.", "v": 5}, {"id": 4014, "domain": 1, "task": 7, "topic": "Comb Air Min Dim", "q": "The minimum dimension for any combustion air opening or duct cross-section is:", "choices": ["1.5 inches in any dimension", "6.0 inches in any dimension", "2.5 inches in any dimension", "3.5 inches in any dimension"], "correct": 3, "exp": "3-1/2 inches minimum dimension. Smaller dimensions don't provide adequate flow. Vol 1 Ch 3.", "v": 5}, {"id": 4015, "domain": 1, "task": 7, "topic": "Wood Louver NFA", "q": "A combustion air opening covered with wood louvers provides what percentage of net free area?", "choices": ["75% of gross opening area", "10% of gross opening area", "50% of gross opening area", "25% of gross opening area"], "correct": 3, "exp": "Wood louvers: 25% NFA. Metal louvers: 75% NFA. Reduce sizing to account for blockage. Vol 1 Ch 3.", "v": 5}, {"id": 4016, "domain": 1, "task": 7, "topic": "Metal Louver NFA", "q": "A combustion air opening covered with metal louvers provides what percentage of net free area?", "choices": ["50% of gross opening area", "25% of gross opening area", "75% of gross opening area", "90% of gross opening area"], "correct": 2, "exp": "Metal louvers: 75% NFA. Wood louvers: 25% NFA. Vol 1 Ch 3.", "v": 5}, {"id": 4017, "domain": 1, "task": 7, "topic": "Comb Air Termination", "q": "Combustion air ducts terminating outside must end at least how far above grade or snow level?", "choices": ["24 inches above grade", "6 inches above grade", "18 inches above grade", "12 inches above grade"], "correct": 3, "exp": "12 inches minimum above grade or above highest snow accumulation. Vol 1 Ch 3.", "v": 5}, {"id": 4018, "domain": 1, "task": 7, "topic": "Comb Air Duct Material", "q": "Combustion air ducts must be constructed of what minimum material specification?", "choices": ["20-gauge galvanized steel sheet", "PVC plastic pipe Schedule 40", "Flexible aluminum corrugated duct", "28-gauge galvanized steel sheet"], "correct": 3, "exp": "28-gauge galvanized steel minimum. Stud cavities OK with restrictions. Flex/duct board NOT permitted. Vol 1 Ch 3.", "v": 5}, {"id": 4019, "domain": 1, "task": 7, "topic": "Type B Vent Use", "q": "Type B vent is approved for use with which gas appliance category?", "choices": ["Category I appliances only", "Category III appliances only", "Category II appliances only", "Category IV appliances only"], "correct": 0, "exp": "Type B vent: Cat I appliances (natural draft). Cat IV uses PVC. Cat III uses listed mfr vent. Vol 1 Ch 3.", "v": 5}, {"id": 4020, "domain": 1, "task": 7, "topic": "AC Cold Test Limit", "q": "Cooling should NOT be tested in AC mode if outdoor temperature has been below what threshold?", "choices": ["Below 60\u00b0F for 24 hours", "Below 70\u00b0F for 12 hours", "Below 32\u00b0F for 12 hours", "Below 45\u00b0F for 24 hours"], "correct": 0, "exp": "Below 60\u00b0F for 24 hours: skip AC test. Risk: oil migration in compressor, slugging on startup. Vol 1.", "v": 5}, {"id": 4021, "domain": 1, "task": 7, "topic": "Hot Weather Heat", "q": "Many inspectors decline to operate the heating system in cooling mode if outdoor temperature is above approximately:", "choices": ["60\u201370\u00b0F outdoor temperature", "100\u2013110\u00b0F outdoor temperature", "70\u201380\u00b0F outdoor temperature", "80\u201390\u00b0F outdoor temperature"], "correct": 3, "exp": "Above 80-90\u00b0F: many inspectors skip heat test. High limit switch should protect, but document if not operated. Vol 1 Ch 3.", "v": 5}, {"id": 4022, "domain": 1, "task": 7, "topic": "Boiler Op Pressure", "q": "A normally operating residential hot-water boiler maintains pressure in approximately what range?", "choices": ["30\u201345 psi during operation", "12\u201325 psi during operation", "5\u201310 psi during operation", "60\u201380 psi during operation"], "correct": 1, "exp": "Hot water boiler: 12-25 psi typical. PRV trips at 30 psi. Pressure rises as water heats; expansion tank absorbs.", "v": 5}, {"id": 4023, "domain": 1, "task": 7, "topic": "Furnace Flame Color", "q": "A properly burning gas furnace flame appears in which color pattern?", "choices": ["Bright yellow with orange edges around tip", "White flame with greenish edges visible", "Orange-red flame with dark smoke trails", "Mostly blue with slight yellow tip"], "correct": 3, "exp": "Blue with slight yellow tip = proper combustion. Yellow/orange flame = defect (poor adjustment, low combustion air). Vol 1 Ch 3.", "v": 5}, {"id": 4024, "domain": 1, "task": 7, "topic": "Forced vs Induced", "q": "A forced draft venting system differs from an induced draft system by which characteristic?", "choices": ["Forced draft relies on atmospheric stack effect for flow", "Forced draft uses positive pressure pushing flue gases outward", "Forced draft uses negative pressure pulling flue gases through", "Forced draft uses a manual chimney damper for control"], "correct": 1, "exp": "Forced draft: positive pressure, fan at start of vent. Induced draft: negative pressure, fan pulls through HX. Vol 1 Ch 3.", "v": 5}, {"id": 4025, "domain": 1, "task": 7, "topic": "Stack Effect", "q": "Natural draft venting in a Category I appliance relies on flue gases that are:", "choices": ["At the same temperature as ambient air", "Hotter and less dense than surrounding air", "Mechanically pressurized by an internal fan", "Cooler and denser than surrounding air"], "correct": 1, "exp": "Stack effect: hot gases less dense, rise via buoyancy. Backdraft if gases cool too much in vent. Vol 1 Ch 3.", "v": 5}, {"id": 4026, "domain": 1, "task": 7, "topic": "Stage I Creosote", "q": "Stage I (first-degree) creosote in a chimney typically appears as:", "choices": ["Light flaky brown/black ash, brushes off", "Heavy tar-like dark deposit that resists removal", "Hard shiny glazed coating fused to flue surface", "Wet liquid black runoff visible at clean-out door"], "correct": 0, "exp": "Stage I: flaky brown/black ash, easy to remove, least flammable. Stage II: tar-like. Stage III: hard glaze, highly flammable. Vol 1 Ch 3.", "v": 5}, {"id": 4027, "domain": 1, "task": 7, "topic": "Stage III Creosote", "q": "Stage III (third-degree) creosote in a chimney typically appears as:", "choices": ["Wet liquid black runoff visible at clean-out door", "Light flaky brown or black ash that brushes off easily", "Hard shiny glazed coating fused to flue surface", "Heavy tar-like dark deposit that resists removal"], "correct": 2, "exp": "Stage III: hard, shiny, highly flammable. May require flue liner replacement. Vol 1 Ch 3.", "v": 5}, {"id": 4028, "domain": 1, "task": 7, "topic": "Inshot Burner", "q": "Modern induced-draft gas furnaces typically use which burner type?", "choices": ["Inshot burners aimed into the heat exchanger", "Power burners with forced-air pre-mix at the gun", "Ribbon burners running along a horizontal element", "Atmospheric pot burners with open combustion area"], "correct": 0, "exp": "Induced draft: 2-6 inshot burners (most common modern). Older draft-hood: 3-6 ribbon burners. Vol 1 Ch 3.", "v": 5}, {"id": 4029, "domain": 1, "task": 7, "topic": "Ribbon Burner", "q": "Older draft-hood gas furnaces typically used which burner type?", "choices": ["Inshot burners aimed into the heat exchanger", "Atmospheric pot burners with open combustion area", "Ribbon burners running along a horizontal element", "Power burners with forced-air pre-mix at the gun"], "correct": 2, "exp": "Draft-hood furnaces (1970s and older): ribbon burners (gas burns along ribbon length). Vol 1 Ch 3.", "v": 5}, {"id": 4030, "domain": 1, "task": 7, "topic": "Heat Exchanger Visible", "q": "In a typical induced-draft Category I furnace, the heat exchanger is:", "choices": ["Rarely visible during a standard inspection", "Visible at roughly 50% of inspections inspected", "Always visible by removing the front access panel", "Fully visible to the inspector at every inspection"], "correct": 0, "exp": "Induced draft: heat exchanger rarely visible. Older draft-hood: ~20% visible. Report whether seen. Vol 1 Ch 3.", "v": 5}, {"id": 4031, "domain": 1, "task": 7, "topic": "Flexible Gas Cabinet", "q": "A flexible gas connector running into the cabinet of a furnace is:", "choices": ["Required when reducing combustion vibration noise", "Permitted up to 6 ft total length within cabinet", "Not permitted to enter the appliance cabinet", "Required on every high-efficiency Cat IV furnace"], "correct": 2, "exp": "Flex connectors NOT permitted to enter cabinet. Solid pipe required. Common defect after DIY service. Vol 1 Ch 3.", "v": 5}, {"id": 4032, "domain": 1, "task": 7, "topic": "PSC vs ECM", "q": "ECM blower motors compared to older PSC blower motors are:", "choices": ["Similar in efficiency but require less maintenance", "Less efficient and noticeably louder during operation", "More efficient and capable of variable-speed operation", "Required only on Category I natural-draft furnaces"], "correct": 2, "exp": "ECM: efficient, variable speed, paired with multi-stage gas valves. PSC: older, single speed. Vol 1 Ch 3.", "v": 5}, {"id": 4033, "domain": 1, "task": 7, "topic": "Two-Stage Gas Valve", "q": "A two-stage gas valve allows the burner to fire at how many distinct rates?", "choices": ["Two rates \u2014 high fire and low fire", "Three discrete rates including pilot setting", "One single fixed rate (on/off only)", "Variable infinitely modulating gas flow rates"], "correct": 0, "exp": "Two-stage: high and low fire. Single-stage: on/off. Modulating: variable. Vol 1 Ch 3.", "v": 5}, {"id": 4034, "domain": 1, "task": 7, "topic": "Direct Vent", "q": "A direct-vent gas appliance draws combustion air from where and exhausts where?", "choices": ["Combustion air from outside; exhaust to outside (sealed)", "Combustion air from outside; exhaust to inside the room", "Combustion air from inside; exhaust to outside via vent", "Combustion air from either source; exhaust automatic"], "correct": 0, "exp": "Direct vent: outside air in, outside exhaust out (sealed combustion). Direct exhaust: indoor air in, outdoor out. Vol 1 Ch 3.", "v": 5}, {"id": 4035, "domain": 1, "task": 7, "topic": "Direct Exhaust", "q": "A direct-exhaust gas appliance draws combustion air from where and exhausts where?", "choices": ["Combustion air from outside; exhaust to outside (sealed)", "Combustion air from outside; exhaust through chimney", "Combustion air from inside; exhaust to outside via vent", "Combustion air from inside only; exhaust to chimney"], "correct": 2, "exp": "Direct exhaust: indoor combustion air, outdoor exhaust. Direct vent: outdoor in/outdoor out (sealed). Vol 1 Ch 3.", "v": 5}, {"id": 4036, "domain": 1, "task": 7, "topic": "Prohibited Locations", "q": "Gas appliances are prohibited (with exceptions) in which residential location?", "choices": ["Mechanical rooms and unfinished attics", "Kitchens and adjacent dining rooms", "Bedrooms, bathrooms, and clothes closets", "Basements and unconditioned crawl spaces"], "correct": 2, "exp": "Bedrooms, bathrooms, closets prohibited. Exceptions: direct-vent, sealed combustion. Vol 1 Ch 3 / IRC G2406.", "v": 5}, {"id": 4037, "domain": 1, "task": 7, "topic": "Bypassed Switch", "q": "A bypassed safety control on a furnace typically appears as:", "choices": ["Wires joined with wire nuts where a switch should be", "Painted electrical tape covering the switch terminals", "Loose terminal screws on an otherwise normal switch", "Missing entire switch components from the assembly"], "correct": 0, "exp": "Bypassed = wires spliced with nuts where not normal. Defeats high limit, rollout, draft pressure switches. Vol 1 Ch 3.", "v": 5}, {"id": 4038, "domain": 1, "task": 7, "topic": "Manual J", "q": "ACCA Manual J is used to calculate which design parameter for HVAC?", "choices": ["Equipment installation cost and labor estimate", "Service amperage size at the main panel", "Insulation R-value totals for the building", "Heating and cooling load for the structure"], "correct": 3, "exp": "Manual J: heating/cooling load. Manual S: equipment sizing. Software-based now. Inspectors not required to verify. Vol 1.", "v": 5}, {"id": 4039, "domain": 1, "task": 7, "topic": "Hydronic Hot Water", "q": "A hot-water hydronic heating system is distinguished from steam by:", "choices": ["Pumping liquid water that stays below boiling point", "Using direct radiation to heated panels only", "Distributing heat through forced-air ductwork", "Boiling water in the boiler to generate steam vapor"], "correct": 0, "exp": "Hot water hydronic: pumped liquid below boiling. Steam: boiled, gravity or pumped vapor. Vol 1 Ch 3.", "v": 5}, {"id": 4040, "domain": 1, "task": 7, "topic": "Steam vs Hot Water", "q": "A steam heating system is distinguished from hot-water hydronic by:", "choices": ["Boiling water in the boiler to generate steam vapor", "Distributing heat through forced-air ductwork only", "Pumping liquid water that stays below boiling point", "Using glycol antifreeze fluid as the working medium"], "correct": 0, "exp": "Steam: water boiled, vapor distributed. Hot water hydronic: liquid pumped, stays below boiling. Vol 1 Ch 3.", "v": 5}, {"id": 4041, "domain": 1, "task": 7, "topic": "Gravity Furnace", "q": "A gravity warm-air furnace is distinguished from a forced-air furnace by:", "choices": ["Using an ECM variable-speed blower motor only", "Lacking a blower fan to circulate heated air", "Having a single-speed PSC blower motor only", "Having a multi-stage variable-speed blower motor"], "correct": 1, "exp": "Gravity furnace: no blower, no filter. Heated air rises by convection only. 1800s-1900s relic. Inefficient. Vol 1 Ch 3.", "v": 5}, {"id": 4042, "domain": 1, "task": 7, "topic": "Habitable Not", "q": "Which of the following is NOT considered habitable space requiring 68\u00b0F minimum heat?", "choices": ["Living room and adjacent dining area", "Bathroom and laundry room (non-habitable)", "Kitchen and adjacent breakfast nook area", "Bedroom and adjacent family room space"], "correct": 1, "exp": "Bath, laundry, closet: not habitable. Heat source not required there. 68\u00b0F required in habitable. Vol 1 Ch 3.", "v": 5}, {"id": 4043, "domain": 1, "task": 7, "topic": "Garage Vehicle Protect", "q": "Appliances installed in a garage must be protected against which specific hazard?", "choices": ["Roof leaks above the unit during heavy rain events", "Cold winter draft air infiltration through openings", "Vehicle impact damage (bollard or framing required)", "Daylight ultraviolet rays affecting the appliance finish"], "correct": 2, "exp": "Vehicle impact: required protection (framing or bollard). Strike could rupture gas/water lines. Vol 1 Ch 3.", "v": 5}, {"id": 4044, "domain": 1, "task": 7, "topic": "Heat Exchanger Crack", "q": "A cracked furnace heat exchanger primarily creates which safety hazard?", "choices": ["Excessive cabinet surface heat causing minor burns", "Reduced fuel efficiency and higher utility costs only", "Combustion gases (CO) leak into supply air", "Loud blower vibration and bearing wear over time"], "correct": 2, "exp": "Cracked HX: combustion gases (including CO) leak into supply airstream. Major safety defect. Replace furnace. Vol 1 Ch 3.", "v": 5}, {"id": 4045, "domain": 1, "task": 7, "topic": "Flame Rollout", "q": "Silver-colored buttons mounted near the burners on a gas furnace are typically:", "choices": ["Manual reset breakers for the blower motor circuit", "Flame-rollout sensors that shut down on excess heat", "Igniter glow plugs for direct-spark ignition systems", "Pilot test points for service technician adjustment"], "correct": 1, "exp": "Flame rollout sensors: silver buttons, shut down on excess heat (blocked HX, blocked vent, no comb air). Vol 1 Ch 3.", "v": 5}, {"id": 4046, "domain": 1, "task": 9, "topic": "ERV Function", "q": "An Energy Recovery Ventilator (ERV) transfers what between the incoming and outgoing airstreams?", "choices": ["Outdoor air pressure equalization between zones", "Only heat (no moisture transfer occurs)", "Only cooling effect during summer operation", "Both heat and moisture between the airstreams"], "correct": 3, "exp": "ERV: heat AND moisture between incoming/outgoing air. HRV: heat only. ERV preferred in humid/mixed climates. Vol 1.", "v": 5}, {"id": 4047, "domain": 1, "task": 9, "topic": "HRV Function", "q": "A Heat Recovery Ventilator (HRV) transfers what between the incoming and outgoing airstreams?", "choices": ["Only heat (no moisture transfer occurs)", "Only cooling effect during summer operation", "Both heat and moisture between the airstreams", "Outdoor air pressure equalization between zones"], "correct": 0, "exp": "HRV: heat only. ERV adds moisture transfer. HRV preferred in cold/dry climates. Vol 1.", "v": 5}, {"id": 4048, "domain": 1, "task": 9, "topic": "ERV vs HRV Climate", "q": "An ERV is typically preferred over an HRV in which climate type?", "choices": ["Humid or mixed-humid climates (moisture transfer)", "Arctic and frozen climates with year-round freeze risk", "Cold and dry continental climates (heat retention focus)", "Tropical climates with no significant heating season"], "correct": 0, "exp": "ERV: humid/mixed climates (moisture transfer beneficial). HRV: cold/dry. WI is mixed-humid; either viable. Vol 1.", "v": 5}, {"id": 4049, "domain": 1, "task": 9, "topic": "Range Hood Standard", "q": "The most common residential range hood specification is approximately:", "choices": ["36 inches wide with 250 cfm exhaust capacity", "30 inches wide with 100 cfm exhaust capacity", "60 inches wide with 1,200 cfm exhaust capacity", "48 inches wide with 600 cfm exhaust capacity"], "correct": 1, "exp": "Most common: 30 inch wide, 100 cfm. Larger and more powerful exist; >400 cfm requires makeup air. Vol 1.", "v": 5}, {"id": 4050, "domain": 1, "task": 9, "topic": "Range Hood Makeup", "q": "A range hood with capacity exceeding what cfm threshold requires makeup air?", "choices": ["Exceeding 800 cfm exhaust capacity", "Exceeding 200 cfm exhaust capacity", "Exceeding 400 cfm exhaust capacity", "Exceeding 100 cfm exhaust capacity"], "correct": 2, "exp": "Over 400 cfm: makeup air required to prevent depressurization and backdraft of fuel-burning equipment. Vol 1.", "v": 5}, {"id": 4051, "domain": 1, "task": 9, "topic": "Range Hood Recirc", "q": "Recirculating (non-vented) range hoods are typically allowed under which condition?", "choices": ["When the kitchen has an operable window or the home has HRV/ERV", "Whenever the kitchen has an open floor plan with adjacent rooms", "Always permitted by code without any conditional restriction", "Only when hood capacity is below 200 cfm exhaust rating"], "correct": 0, "exp": "Recirc allowed if operable kitchen window OR house has HRV/ERV. Less effective than vented hoods. Vol 1.", "v": 5}, {"id": 4052, "domain": 1, "task": 9, "topic": "Hood Duct Material", "q": "Range hood exhaust ducts must be constructed of which material?", "choices": ["Galvanized steel or copper rigid metal duct", "Plastic flexible vinyl tubing for moisture resistance", "PVC plastic pipe Schedule 40 rated for moisture", "Cardboard fiber tubing wrapped in foil insulation"], "correct": 0, "exp": "Metal: galvanized steel or copper required. Sched 40 PVC OK only for slab-installed downdraft units. Vol 1.", "v": 5}, {"id": 4053, "domain": 1, "task": 9, "topic": "Hood Term Inside", "q": "A range hood exhaust duct that terminates inside the attic instead of outside is:", "choices": ["Acceptable only when the attic is finished and unfinished", "Acceptable for hoods rated below 200 cfm exhaust", "Required practice in cold climates to prevent freezing", "A defect requiring correction (must terminate outside)"], "correct": 3, "exp": "Defect: must terminate outside (wall, soffit, roof). Indoor termination causes moisture/grease buildup. Vol 1.", "v": 5}, {"id": 4054, "domain": 1, "task": 9, "topic": "Hood Term Damper", "q": "A range hood exterior termination should incorporate which component?", "choices": ["A permanent sealed cap fitting that's never opened", "A free-moving backdraft damper at the termination", "A spring-loaded check ball mounted at the duct end", "An open vent without any damper or restriction"], "correct": 1, "exp": "Termination: damper that moves freely. Stuck closed: can't exhaust. Stuck open: cold air, pests. Vol 1.", "v": 5}, {"id": 4055, "domain": 1, "task": 9, "topic": "Hood Term Diameter", "q": "A range hood exterior termination opening smaller than what diameter is too small for typical fans?", "choices": ["Smaller than approximately 4 inches diameter", "Smaller than approximately 6 inches diameter", "Smaller than approximately 12 inches diameter", "Smaller than approximately 8 inches diameter"], "correct": 1, "exp": "Smaller than ~6 inches diameter (or equivalent rectangle): too small for typical fan capacity. Vol 1.", "v": 5}, {"id": 4056, "domain": 1, "task": 9, "topic": "Microwave Floor", "q": "Some manufacturers recommend an over-the-range microwave clearance from the floor of at least:", "choices": ["66 inches from floor to top of microwave", "56 inches from floor to top of microwave", "72 inches from floor to top of microwave", "60 inches from floor to top of microwave"], "correct": 0, "exp": "66 inches floor to top of microwave (mfr-specific). Smaller distances reduce safety/convenience. Vol 1.", "v": 5}, {"id": 4057, "domain": 1, "task": 9, "topic": "Microwave Cooktop", "q": "Some manufacturers recommend an over-the-range microwave clearance to the cooktop of at least:", "choices": ["36 inches from cooktop to bottom of microwave", "30 inches from cooktop to bottom of microwave", "18 inches from cooktop to bottom of microwave", "24 inches from cooktop to bottom of microwave"], "correct": 1, "exp": "30 inches cooktop to bottom of microwave (mfr-specific). Less than ~13 in: significant safety/use concerns. Vol 1.", "v": 5}, {"id": 4058, "domain": 1, "task": 9, "topic": "Hood Wall Cavity", "q": "A microwave hood that blows into a wall cavity instead of through a duct is:", "choices": ["A defect with no proper exhaust path to outside", "Required practice under older mechanical building codes", "Standard installation pattern for galley kitchen layouts", "Acceptable practice for short connection runs only"], "correct": 0, "exp": "Defect: removing filter reveals no duct, fan blows into cavity. Major defect: moisture/grease/fire. Vol 1.", "v": 5}, {"id": 4059, "domain": 1, "task": 9, "topic": "Microwave Plug", "q": "Plug-and-cord power supply cables for microwaves are restricted from passing through:", "choices": ["Cabinet face frames in any unobstructed configuration", "Walls, floors, ceilings (terminate at receptacle)", "Open shelving without any junction box enclosure", "Any kitchen finish material regardless of installation"], "correct": 1, "exp": "Plug-and-cord NOT permitted to pass through walls/floors/ceilings. Must terminate in dedicated receptacle. Vol 1.", "v": 5}, {"id": 4060, "domain": 1, "task": 9, "topic": "Bath Fan Min CFM", "q": "The minimum capacity for a bathroom exhaust fan is:", "choices": ["100 cfm continuous flow tied to bath occupancy", "10 cfm continuous flow during all hours of day", "20 cfm continuous OR 50 cfm intermittent", "30 cfm intermittent flow tied to light switch"], "correct": 2, "exp": "20 cfm continuous OR 50 cfm intermittent. Newer codes often require 80-100 cfm. Sized by room volume. IRC.", "v": 5}, {"id": 4061, "domain": 1, "task": 9, "topic": "Bath Fan Discharge", "q": "A bathroom exhaust fan must discharge to which location?", "choices": ["The attic space above the bathroom directly", "The crawl space below the bathroom floor", "An adjacent vented closet or storage space", "The building exterior (outside the structure)"], "correct": 3, "exp": "Exterior only: wall, soffit, gable, roof. Indoor discharge dumps moisture into attic/crawl. Vol 1.", "v": 5}, {"id": 4062, "domain": 1, "task": 9, "topic": "Dryer Duct Material", "q": "Clothes dryer exhaust ducts must be constructed of which material?", "choices": ["Cardboard fiber tubing with insulation wrap", "Foil flexible bag-type tubing with reinforcement", "Plastic flexible vinyl tubing for low cost", "Rigid or semi-rigid metal duct material"], "correct": 3, "exp": "Rigid or semi-rigid metal only. Plastic flex vinyl: fire hazard (lint ignition). IRC.", "v": 5}, {"id": 4063, "domain": 1, "task": 9, "topic": "Dryer Vent Length", "q": "Maximum dryer exhaust duct length (rigid metal, straight run) per IRC is generally:", "choices": ["50 feet straight rigid duct in any configuration", "25 feet straight rigid duct (less for elbows)", "10 feet straight rigid duct in any configuration", "Unlimited length when booster fan is installed"], "correct": 1, "exp": "25 ft straight max. Reduce for elbows: -5 ft per 90, -2.5 ft per 45. Booster fans extend with maintenance. IRC.", "v": 5}, {"id": 4064, "domain": 1, "task": 9, "topic": "Dryer 90 Elbow", "q": "Each 90-degree elbow in a dryer vent reduces the allowable length by approximately:", "choices": ["2.5 feet of equivalent length per 90\u00b0 elbow", "5 feet of equivalent length per 90\u00b0 elbow", "1 foot of equivalent length per 90\u00b0 elbow", "10 feet of equivalent length per 90\u00b0 elbow"], "correct": 1, "exp": "90\u00b0 elbow: -5 ft equivalent length. 45\u00b0 elbow: -2.5 ft. Total stays within mfr maximum. IRC.", "v": 5}, {"id": 4065, "domain": 1, "task": 9, "topic": "Dryer 45 Elbow", "q": "Each 45-degree elbow in a dryer vent reduces the allowable length by approximately:", "choices": ["5 feet of equivalent length per 45\u00b0 elbow", "10 feet of equivalent length per 45\u00b0 elbow", "2.5 feet of equivalent length per 45\u00b0 elbow", "1 foot of equivalent length per 45\u00b0 elbow"], "correct": 2, "exp": "45\u00b0 elbow: -2.5 ft equivalent. 90\u00b0 elbow: -5 ft. Mfr-specific values may differ slightly. IRC.", "v": 5}, {"id": 4066, "domain": 1, "task": 9, "topic": "Dryer Termination", "q": "Dryer vent terminations must end at which location and with what feature?", "choices": ["Inside the crawl space with no damper required", "Inside the attic space with screen mesh", "At any convenient point with terminated cap", "Outside the building with a backdraft damper"], "correct": 3, "exp": "Outside termination with backdraft damper required. Never inside (attic, crawl, garage). IRC.", "v": 5}, {"id": 4067, "domain": 1, "task": 9, "topic": "Dryer Term Distance", "q": "Dryer vent terminations should be located at minimum distance from openings of:", "choices": ["6 feet minimum from windows, doors, and intakes", "1 foot minimum from windows, doors, and intakes", "12 feet minimum from windows, doors, and intakes", "3 feet minimum from windows, doors, and intakes"], "correct": 3, "exp": "3 feet minimum from windows/doors/intakes. Prevents lint/moisture re-entering. Mfr & IRC.", "v": 5}, {"id": 4068, "domain": 1, "task": 9, "topic": "HRV Defrost", "q": "Cold-climate HRVs require a defrost mode because:", "choices": ["Frost forms on the heat exchanger core in extreme cold", "Indoor humidity drops below acceptable comfort range", "Frost forms on the intake fan blades and damages bearings", "Sensors freeze and fail to read accurate flow values"], "correct": 0, "exp": "Cold-climate HRV: warm humid exhaust against cold incoming frosts the heat exchanger core. Defrost cycle clears it. Vol 1.", "v": 5}, {"id": 4069, "domain": 1, "task": 9, "topic": "HRV Recovery", "q": "Modern residential HRVs typically recover what percentage of exhaust air heat?", "choices": ["Approximately 30\u201350% of exhaust heat", "Approximately 10\u201320% of exhaust heat", "Approximately 95\u201399% of exhaust heat", "Approximately 60\u201385% of exhaust heat"], "correct": 3, "exp": "Modern HRVs: 60-85% heat recovery typical. Premium units approach 90%. Reduces energy penalty of fresh air. Vol 1.", "v": 5}, {"id": 4070, "domain": 1, "task": 9, "topic": "Bath Fan Sizing", "q": "Bathroom fan sizing per ASHRAE 62.2 uses approximately what cfm per square foot?", "choices": ["0.5 cfm per sq ft (with 25 cfm minimum)", "2 cfm per sq ft (with 100 cfm minimum)", "1 cfm per sq ft (with 50 cfm minimum)", "5 cfm per sq ft (with 250 cfm minimum)"], "correct": 2, "exp": "1 cfm/sq ft, minimum 50 cfm. Or 8 air changes per hour. Either method acceptable. ASHRAE 62.2.", "v": 5}, {"id": 4071, "domain": 1, "task": 9, "topic": "Bath Fan ACH", "q": "An alternative bathroom fan sizing method uses how many air changes per hour?", "choices": ["24 air changes per hour as alternative method", "8 air changes per hour as alternative method", "16 air changes per hour as alternative method", "4 air changes per hour as alternative method"], "correct": 1, "exp": "8 ACH alternate sizing method. Or 1 cfm/sq ft (50 min). Either acceptable per ASHRAE 62.2.", "v": 5}, {"id": 4072, "domain": 1, "task": 9, "topic": "Hood per Foot", "q": "Range hood sizing rule of thumb is approximately how much cfm per linear foot of cooktop?", "choices": ["100 cfm per linear foot of cooktop width", "50 cfm per linear foot of cooktop width", "250 cfm per linear foot of cooktop width", "500 cfm per linear foot of cooktop width"], "correct": 0, "exp": "100 cfm per linear ft of cooktop (gas: more). >400 cfm triggers makeup air requirement. Industry rule.", "v": 5}, {"id": 4073, "domain": 1, "task": 9, "topic": "Outside Air Intake", "q": "Outside air intakes should be located at minimum distance from contamination sources of:", "choices": ["3 feet minimum from plumbing vents, exhaust outlets, and garages", "25 feet minimum from plumbing vents, exhaust outlets, and garages", "10 feet minimum from plumbing vents, exhaust outlets, and garages", "50 feet minimum from plumbing vents, exhaust outlets, and garages"], "correct": 2, "exp": "10 ft typical minimum from plumbing vents, exhaust outlets, garages, dryer terminations. IRC/IMC.", "v": 5}, {"id": 4074, "domain": 1, "task": 9, "topic": "Backflow at Hood", "q": "Air backflow felt around an over-the-range microwave during operation indicates:", "choices": ["Excess outdoor humidity overwhelming the local fan", "Disconnected duct or stuck damper", "Air filter clogged condition reducing effective flow", "Normal operation behavior for OTR microwave models"], "correct": 1, "exp": "Backflow at appliance: fan disconnected from duct OR exterior damper stuck. Significant defect. Vol 1.", "v": 5}, {"id": 4075, "domain": 1, "task": 9, "topic": "Whole-House Strategy", "q": "Whole-house ventilation differs from local exhaust ventilation by:", "choices": ["Distributing fresh air throughout the home over time", "Always using a more powerful and louder fan motor", "Always being ducted while local exhaust is unducted", "Local exhaust serving only the kitchen and not bathrooms"], "correct": 0, "exp": "Whole-house: distributes ventilation throughout home. Local: targets pollution at source. Tight homes need both. Vol 1.", "v": 5}, {"id": 4076, "domain": 1, "task": 9, "topic": "Tight Home Vent", "q": "A tight, well-air-sealed home requires mechanical ventilation that is:", "choices": ["Eliminated entirely (no mechanical ventilation needed)", "Less than what older leaky homes typically need", "Greater than what older leaky homes typically need", "Equal to what older leaky homes typically need"], "correct": 2, "exp": "Build tight, ventilate right: tight construction = less natural infiltration = need mechanical ventilation. ASHRAE 62.2.", "v": 5}, {"id": 4077, "domain": 1, "task": 9, "topic": "HRV Imbalance", "q": "An HRV/ERV operating with significantly imbalanced supply/exhaust airflow can cause:", "choices": ["Reduction of all defrost cycles in cold weather", "Pressurization or depressurization of the structure", "Elimination of the need for supply air filters", "Improved heat recovery efficiency above rated values"], "correct": 1, "exp": "Imbalanced flow: pressurizes (drives moisture into walls) or depressurizes (causes backdraft). Should be commissioned. Vol 1.", "v": 5}, {"id": 4078, "domain": 1, "task": 9, "topic": "Window Bath Vent", "q": "An openable bath window in lieu of a mechanical bath exhaust fan is:", "choices": ["Required by all codes regardless of bathroom layout", "Never permitted under any code or local jurisdiction", "Allowed by older codes only (modern IRC requires fan)", "Always acceptable in modern residential construction"], "correct": 2, "exp": "Older codes allowed; modern IRC requires mechanical exhaust regardless. Window-only rarely used effectively. IRC.", "v": 5}, {"id": 4079, "domain": 1, "task": 9, "topic": "Recirc Filter", "q": "Recirculating range hoods filter exhaust air through which type of media?", "choices": ["Catalytic converter elements like a vehicle exhaust", "Ultraviolet germicidal lamps mounted in the airstream", "Charcoal/carbon filters for odor plus grease filters", "Electrostatic precipitators with high-voltage plates"], "correct": 2, "exp": "Recirc hoods: charcoal/carbon (odor) + grease filters. Less effective than vented. Need regular replacement. Vol 1.", "v": 5}, {"id": 4080, "domain": 1, "task": 9, "topic": "Combustion vs Makeup", "q": "Combustion air and makeup air serve which different purposes?", "choices": ["Both terms describe identical airflows in modern codes", "Both are optional features in any new home construction", "Both are always combined into a single ducted supply", "Combustion air feeds burners; makeup replaces exhaust"], "correct": 3, "exp": "Combustion air: feeds burners. Makeup air: replaces air removed by exhaust. Different functions. Vol 1.", "v": 5}, {"id": 4081, "domain": 1, "task": 9, "topic": "Hood Defect Wall", "q": "A range hood blowing into a wall cavity instead of through a duct creates which primary risk?", "choices": ["Increased noise pollution affecting adjacent rooms", "Reduced exhaust flow rate at the cooktop only", "Ductwork backflow at the exterior termination point", "Moisture and grease buildup inside the wall cavity"], "correct": 3, "exp": "Major defect: moisture and grease accumulate in wall cavity. Fire hazard, structural damage, IAQ. Vol 1.", "v": 5}, {"id": 4082, "domain": 1, "task": 9, "topic": "Bath Soffit Term", "q": "A bath fan terminating at a vented soffit is:", "choices": ["Always defective installation regardless of execution", "Acceptable with proper termination fitting", "Required by current code for all soffit-vented homes", "Never permitted under any code or local jurisdiction"], "correct": 1, "exp": "Acceptable IF proper termination fitting AND moisture doesn't re-enter via attic intake. Best: dedicated soffit cap. IRC.", "v": 5}, {"id": 4083, "domain": 1, "task": 9, "topic": "Tight Home Hood", "q": "In tight, well-sealed homes with high-cfm range hoods, makeup air primarily prevents which risk?", "choices": ["Range surface burns from improperly placed cookware", "Indoor humidity rising above acceptable comfort levels", "Excessive heating energy use during winter operation", "Backdraft of fuel-burning appliances and chimneys"], "correct": 3, "exp": "Without makeup air, depressurization causes backdraft of fuel-burning appliances and chimneys. Vol 1.", "v": 5}, {"id": 4084, "domain": 1, "task": 9, "topic": "Spot vs Whole", "q": "Spot exhaust ventilation differs from whole-house ventilation by:", "choices": ["Using smaller motors than whole-house ventilation systems", "Being used only in commercial applications, not residential", "Always operating continuously while whole-house is timed", "Targeting pollution at the source rather than distributing"], "correct": 3, "exp": "Spot: targets pollution at source (bath, kitchen, dryer). Whole-house: distributes across building over time. Vol 1.", "v": 5}, {"id": 4085, "domain": 1, "task": 9, "topic": "Outside Intake Garage", "q": "An outside air intake located near an attached garage primarily creates risk of:", "choices": ["Insulation dust intake during routine attic activities", "Blocked airflow from snow and ice accumulation only", "Carbon monoxide entry from running vehicle exhaust", "Rainwater entering the ductwork during heavy storms"], "correct": 2, "exp": "Critical defect: garage CO from running vehicles enters ventilation system. Locate intakes well clear. IRC/IMC.", "v": 5}, {"id": 4086, "domain": 1, "task": 10, "topic": "TPR Set Point", "q": "TPR valves on water heaters are typically set to release at which combination?", "choices": ["100 psi or 180\u00b0F (whichever first triggers release)", "150 psi or 210\u00b0F (whichever first triggers release)", "30 psi or 150\u00b0F (whichever first triggers release)", "200 psi or 250\u00b0F (whichever first triggers release)"], "correct": 1, "exp": "TPR: 150 psi or 210\u00b0F. Modern TPR: 3/4 inch outlet diameter. Whichever first triggers release. Vol 1 Ch 4.", "v": 5}, {"id": 4087, "domain": 1, "task": 10, "topic": "TPR Sensor", "q": "The TPR valve temperature sensor must be located on the water heater within:", "choices": ["The first 18 inches from the top of the tank", "The first 12 inches from the top of the tank", "The first 24 inches from the top of the tank", "The first 6 inches from the top of the tank"], "correct": 3, "exp": "First 6 inches from top of tank. Fittings can't displace this. Otherwise sensor doesn't read tank temp. Vol 1.", "v": 5}, {"id": 4088, "domain": 1, "task": 10, "topic": "TPR Discharge Pipe", "q": "Acceptable materials for the TPR discharge pipe include which of the following?", "choices": ["Galvanized only or black steel pipe (rigid)", "Copper, CPVC, or PEX (hot-water rated)", "Any thermoplastic pipe rated for potable use", "PVC plastic or ABS plastic (cold-water rated)"], "correct": 1, "exp": "Hot-water rated only: copper, CPVC, PEX. Most PVC NOT permitted (low temp). Vol 1 Ch 4.", "v": 5}, {"id": 4089, "domain": 1, "task": 10, "topic": "TPR Diameter", "q": "The TPR discharge pipe diameter must match which fitting on the water heater?", "choices": ["The standard 1/2 inch supply branch piping size", "The service main supply pipe entering the home", "The TPR valve outlet diameter (typically 3/4 inch)", "The tank cold water inlet fitting at the top"], "correct": 2, "exp": "Same diameter as TPR outlet (3/4 inch typical). 3/4 in flex connectors NOT acceptable (not full bore). Vol 1.", "v": 5}, {"id": 4090, "domain": 1, "task": 10, "topic": "TPR Air Gap", "q": "The TPR discharge pipe terminates with an air gap above the receptor of:", "choices": ["12 to 24 inches above floor or receptor", "8 to 12 inches above floor or receptor", "1/4 to 1 inch above floor or receptor", "1.5 to 6 inches above floor or receptor"], "correct": 3, "exp": "Air gap: 1.5 to 6 inches above floor or receptor. Prevents backflow contamination. Vol 1 Ch 4.", "v": 5}, {"id": 4091, "domain": 1, "task": 10, "topic": "TPR Slope", "q": "The TPR discharge pipe should slope in which direction along its run?", "choices": ["Sloped in either direction; orientation does not matter", "Run completely horizontal with no slope at all", "Sloped downward toward the discharge point", "Sloped upward toward the source water heater"], "correct": 2, "exp": "Down toward discharge point. Slow leaks drain to discharge - if up, leak hides and damages. Vol 1.", "v": 5}, {"id": 4092, "domain": 1, "task": 10, "topic": "TPR Fittings", "q": "TPR discharge pipes should serve which configuration?", "choices": ["Multiple TPRs in series along a single discharge", "Multiple appliances acceptable on a common line", "A common manifold drain serving multiple devices", "One TPR only \u2014 no tees, no valves, no shared lines"], "correct": 3, "exp": "One TPR only. No tees. No valves. Dedicated discharge per water heater. Critical safety. Vol 1.", "v": 5}, {"id": 4093, "domain": 1, "task": 10, "topic": "TPR Horiz Term", "q": "A horizontal TPR discharge pipe should terminate with which configuration?", "choices": ["A simple open T fitting with both ends open", "A 90\u00b0 elbow pointed downward at the termination", "An open horizontal end with no fitting installed", "A 90\u00b0 elbow pointed upward at the termination"], "correct": 1, "exp": "Pointed DOWN: contains discharge, reduces injury from very hot water/steam. Pointed up = dangerous spray. Vol 1.", "v": 5}, {"id": 4094, "domain": 1, "task": 10, "topic": "PB Color", "q": "Polybutylene (PB) supply piping is most commonly identified by which color?", "choices": ["Cream color with a yellow stripe along its length", "Bluish-gray (sometimes black) plastic supply tubing", "Bright red color tone in plastic supply tubing", "White or off-white plastic supply tubing"], "correct": 1, "exp": "PB: bluish-gray, sometimes black. 1970s-90s. Chlorine in water causes microfractures. No longer permissible. Vol 1.", "v": 5}, {"id": 4095, "domain": 1, "task": 10, "topic": "CPVC Color", "q": "CPVC supply piping is most commonly identified by which color?", "choices": ["White or off-white plastic supply tubing", "Bluish-gray (sometimes black) plastic supply tubing", "Bright red color tone in plastic supply tubing", "Cream color, often with a yellow stripe along the pipe"], "correct": 3, "exp": "CPVC: cream color, often yellow stripe. Sometimes gray. Orange = fire suppression only. Vol 1 Ch 4.", "v": 5}, {"id": 4096, "domain": 1, "task": 10, "topic": "PVC Max Temp", "q": "PVC pipe maximum operating temperature under pressure is approximately:", "choices": ["140\u00b0F maximum under pressure (warm water acceptable)", "100\u00b0F maximum under pressure (cold water and DWV only)", "180\u00b0F maximum under pressure (hot water rated)", "210\u00b0F maximum under pressure (hot water rated)"], "correct": 1, "exp": "PVC: max 100\u00b0F under pressure. Cold water and DWV only. CPVC: max 180\u00b0F (hot water rated). Vol 1 Ch 4.", "v": 5}, {"id": 4097, "domain": 1, "task": 10, "topic": "CPVC Max Temp", "q": "CPVC pipe maximum operating temperature under pressure is approximately:", "choices": ["210\u00b0F maximum under pressure (high-temp rated)", "180\u00b0F max under pressure (hot/cold rated)", "140\u00b0F maximum under pressure (warm only)", "100\u00b0F maximum under pressure (cold only)"], "correct": 1, "exp": "CPVC: max 180\u00b0F under pressure. Hot/cold supply rated. PVC: max 100\u00b0F (cold only). Vol 1 Ch 4.", "v": 5}, {"id": 4098, "domain": 1, "task": 10, "topic": "Type K Marking", "q": "Type K copper tubing is identified by which color marking on the tube?", "choices": ["Yellow markings on the tube (gas service only)", "Red markings on the tube (thinnest wall)", "Blue markings on the tube (medium wall)", "Green markings on the tube (thickest wall)"], "correct": 3, "exp": "Type K: green (thickest walls). Type L: blue (medium). Type M: red (thinnest). Vol 1 Ch 4.", "v": 5}, {"id": 4099, "domain": 1, "task": 10, "topic": "Type L Marking", "q": "Type L copper tubing is identified by which color marking on the tube?", "choices": ["Blue markings on the tube (medium wall)", "Red markings on the tube (thinnest wall)", "Green markings on the tube (thickest wall)", "Yellow markings on the tube (gas service only)"], "correct": 0, "exp": "Type L: blue (medium walls). Type K: green (thickest). Type M: red (thinnest). Vol 1 Ch 4.", "v": 5}, {"id": 4100, "domain": 1, "task": 10, "topic": "Type M Marking", "q": "Type M copper tubing is identified by which color marking on the tube?", "choices": ["Blue markings on the tube (medium wall)", "Red markings on the tube (thinnest wall)", "Yellow markings on the tube (gas service only)", "Green markings on the tube (thickest wall)"], "correct": 1, "exp": "Type M: red (thinnest). Type K: green (thickest). Type L: blue (medium). M not for concrete. Vol 1 Ch 4.", "v": 5}, {"id": 4101, "domain": 1, "task": 10, "topic": "Copper Patina", "q": "The protective patina forming inside copper supply tubing is typically what color?", "choices": ["Red iron oxide coating from corrosion damage", "Green protective coating from natural oxidation", "Black sulfide coating from sulfur in water", "White mineral coating from hard water deposits"], "correct": 1, "exp": "Green patina. Damaged by aggressive water, water hammer, excess acidic flux. Damage = leaks. Vol 1.", "v": 5}, {"id": 4102, "domain": 1, "task": 10, "topic": "Galv Lifespan", "q": "Galvanized steel supply pipe expected service life is approximately:", "choices": ["About 25 years from original installation", "About 75 years from original installation", "About 50 years from original installation", "About 100 years from original installation"], "correct": 2, "exp": "~50 years. Most existing galv at or beyond service life. Add end-of-life comment. Vol 1 Ch 4.", "v": 5}, {"id": 4103, "domain": 1, "task": 10, "topic": "Galv Failure", "q": "Galvanized steel supply pipe primarily fails by which mechanism?", "choices": ["Inside rust progression that reduces internal diameter", "Joint thread rupture from excess thermal expansion", "Outside corrosion only (insulated interior surface)", "UV exposure breakdown of the protective galvanizing"], "correct": 0, "exp": "Rusts from INSIDE. Inner surface roughens, traps particles, reduces ID, eventually leaks. Rust-color water. Vol 1.", "v": 5}, {"id": 4104, "domain": 1, "task": 10, "topic": "Service Pipe Depth", "q": "Water service pipe must be installed at minimum depth of:", "choices": ["6 inches below grade in any climate region", "24 inches below grade regardless of frost depth", "12 inches below grade OR 6 inches below frost line", "36 inches below grade regardless of frost depth"], "correct": 2, "exp": "12 in below grade OR 6 in below frost line, whichever deeper. WI frost ~42-48 in. Vol 1 Ch 4.", "v": 5}, {"id": 4105, "domain": 1, "task": 10, "topic": "Pipe Shield Plate", "q": "Pipes through framing edges require shield plates if pipe is closer to edge than:", "choices": ["1.5 inches from the edge of the framing member", "3 inches from the edge of the framing member", "1/2 inch from the edge of the framing member", "6 inches from the edge of the framing member"], "correct": 0, "exp": "1.5 inches from edge: shield required. Plate extends 2 in above bottom plate, below top plate. Vol 1.", "v": 5}, {"id": 4106, "domain": 1, "task": 10, "topic": "Pipe Hole Size", "q": "Holes for pipes through framing should be sized how, relative to pipe diameter?", "choices": ["About 1/2 inch larger than the pipe diameter", "Tight fit to the pipe with no clearance allowed", "Same diameter as the pipe (no clearance)", "About 2 inches larger than the pipe diameter"], "correct": 0, "exp": "~1/2 in larger than pipe. Allows expansion/contraction. Tight = rubbing/clicking/squeaking. Vol 1.", "v": 5}, {"id": 4107, "domain": 1, "task": 10, "topic": "Foundation Sleeve", "q": "Foundation wall pipe sleeves should be sized to be:", "choices": ["One pipe size larger than the pipe passing through", "Two pipe sizes larger than the pipe passing through", "The same size as the pipe passing through", "Three pipe sizes larger than the pipe passing through"], "correct": 1, "exp": "Two pipe sizes larger. Space sealed with caulk/foam/gasket. Protects against settlement breakage. Vol 1.", "v": 5}, {"id": 4108, "domain": 1, "task": 10, "topic": "Copper Horiz Support", "q": "Copper supply tubing requires horizontal support spacing of approximately:", "choices": ["Every 10 feet maximum on horizontal runs", "Every 32 inches maximum on horizontal runs", "Every 12 feet maximum on horizontal runs", "Every 6 feet maximum on horizontal runs"], "correct": 3, "exp": "Copper horiz: 6 ft. Vertical: 10 ft. CPVC: 3 ft horiz. PEX: 32 in horiz. Galv: 12 ft horiz. Vol 1.", "v": 5}, {"id": 4109, "domain": 1, "task": 10, "topic": "PEX Horiz Support", "q": "PEX supply tubing requires horizontal support spacing of approximately:", "choices": ["Every 10 feet maximum on horizontal runs", "Every 12 feet maximum on horizontal runs", "Every 6 feet maximum on horizontal runs", "Every 32 inches maximum on horizontal runs"], "correct": 3, "exp": "PEX horiz: 32 in. PEX flexible, sags between supports. Tighter spacing needed than rigid pipe. Vol 1.", "v": 5}, {"id": 4110, "domain": 1, "task": 10, "topic": "CPVC Horiz Support", "q": "CPVC supply pipe requires horizontal support spacing of approximately:", "choices": ["Every 10 feet maximum on horizontal runs", "Every 6 feet maximum on horizontal runs", "Every 32 inches maximum on horizontal runs", "Every 3 feet maximum on horizontal runs"], "correct": 3, "exp": "CPVC horiz: 3 ft. Vertical: 10 ft. Mid-story guide for pipes 2 in and smaller. Vol 1.", "v": 5}, {"id": 4111, "domain": 1, "task": 10, "topic": "Galv Horiz Support", "q": "Galvanized steel supply pipe requires horizontal support spacing of approximately:", "choices": ["Every 6 feet maximum on horizontal runs", "Every 32 inches maximum on horizontal runs", "Every 12 feet maximum on horizontal runs", "Every 10 feet maximum on horizontal runs"], "correct": 2, "exp": "Galv horiz: 12 ft. Vertical: 15 ft. Heavier rigid pipe = wider support possible. Vol 1.", "v": 5}, {"id": 4112, "domain": 1, "task": 10, "topic": "Air Gap Faucet", "q": "The minimum air gap between a faucet outlet and the flood-level rim of the fixture is:", "choices": ["1 inch OR 2\u00d7 the effective opening (whichever greater)", "4 inches OR 4\u00d7 the effective opening diameter exact", "4 inches OR 4\u00d7 the effective opening diameter", "1/2 inch OR 1\u00d7 the effective opening diameter"], "correct": 0, "exp": "1 inch OR 2x effective opening diameter, whichever GREATER. Most reliable backflow prevention. Code.", "v": 5}, {"id": 4113, "domain": 1, "task": 10, "topic": "S-Trap", "q": "An S-trap configuration in a plumbing drain is:", "choices": ["Prohibited by code (self-siphons during flow)", "Used only in basement floor drain installations", "Required in residential kitchen sink installations", "Modern preferred configuration replacing P-traps"], "correct": 0, "exp": "S-traps PROHIBITED. Self-siphon trap seal under flow, allowing sewer gas. Replace with P-trap + vent. Vol 1.", "v": 5}, {"id": 4114, "domain": 1, "task": 10, "topic": "Drain Slope", "q": "Standard drain pipe slope for pipes 2.5 inches and smaller is:", "choices": ["1/8 inch per foot of horizontal run", "1/16 inch per foot of horizontal run", "1/2 inch per foot of horizontal run", "1/4 inch per foot of horizontal run"], "correct": 3, "exp": "1/4 in per ft for pipes \u22642.5 in. Larger: 1/8 in per ft acceptable. Too flat: poor flow. Vol 1.", "v": 5}, {"id": 4115, "domain": 1, "task": 10, "topic": "Trap Seal", "q": "A plumbing trap maintains a water seal that primarily blocks:", "choices": ["Sewer gas from entering the home through fixtures", "Pressure surges from the municipal water main", "Pest entry into the home through plumbing pipes", "Sewage from rising backward through the fixture"], "correct": 0, "exp": "Water seal blocks sewer gas. Can siphon dry without venting; can evaporate when unused (vacant home). Vol 1.", "v": 5}, {"id": 4116, "domain": 1, "task": 10, "topic": "AAV", "q": "An air admittance valve (AAV) functions as which type of device?", "choices": ["Spring-loaded one-way valve admitting air, blocking gas", "Mechanical pump in line with the venting system", "Two-way airflow valve allowing free movement of air", "Pressure regulator device limiting maximum vent flow"], "correct": 0, "exp": "AAV: spring-loaded one-way; admits air to vent system, blocks sewer gas out. Allowed in some jurisdictions. Vol 1.", "v": 5}, {"id": 4117, "domain": 1, "task": 10, "topic": "PEX Color", "q": "PEX color coding (red, blue, white) primarily indicates which property?", "choices": ["A pressure rating that varies between the colors", "A pipe diameter sizing convention by color code", "Convenience labeling for hot/cold (not material)", "A material composition difference between the colors"], "correct": 2, "exp": "Color is convenience only. Red conventionally = hot, blue = cold. Any color carries either. Vol 1.", "v": 5}, {"id": 4118, "domain": 1, "task": 10, "topic": "PEX-AL-PEX", "q": "PEX-AL-PEX (with aluminum core) is recommended for which application?", "choices": ["Cold water service line from the meter to home", "Outdoor irrigation lines and lawn sprinkler systems", "Hydronic heating systems (oxygen barrier required)", "Hot domestic water distribution within the home"], "correct": 2, "exp": "Hydronic heating: aluminum oxygen barrier prevents corrosion of metal parts. Regular PEX OK for potable. Vol 1.", "v": 5}, {"id": 4119, "domain": 1, "task": 10, "topic": "WH Anode", "q": "The anode rod inside a water heater serves which purpose?", "choices": ["Sacrifices to corrosion, protects the steel tank", "Heats the water in the tank as a primary element", "Acts as a backup heating element when needed", "Adds beneficial minerals to the water for taste"], "correct": 0, "exp": "Sacrificial anode (Mg or Al) corrodes preferentially to protect steel tank. Replace every 3-5 years. Vol 1.", "v": 5}, {"id": 4120, "domain": 1, "task": 10, "topic": "Sump Discharge", "q": "A residential sump pump discharge should terminate where, relative to the foundation?", "choices": ["Into the nearest interior floor drain available", "At least 4\u20136 feet from the foundation wall", "Into the sanitary sewer connection at the home", "Directly at the foundation wall (decorative termination)"], "correct": 1, "exp": "4-6 ft minimum from foundation. NOT into sanitary sewer (overloads). Check valve to prevent backflow. Code.", "v": 5}, {"id": 4121, "domain": 1, "task": 10, "topic": "Ejector vs Sump", "q": "An ejector pump differs from a sump pump because it pumps:", "choices": ["Clear groundwater only (same as a sump pump)", "Sewage including solids (different impeller design)", "Without electricity (gravity-driven mechanical only)", "Storm runoff only (different application entirely)"], "correct": 1, "exp": "Ejector: sewage with solids. Sump: clear water only. Different impellers, different applications. Vol 1.", "v": 5}, {"id": 4122, "domain": 1, "task": 10, "topic": "Frost-Free Sillcock", "q": "A frost-free sillcock has the actual valve seat located where?", "choices": ["Inside the heated space (long stem extends outside)", "At underground depth below the frost line outside", "At the centerline midpoint of the wall thickness", "At the exterior wall hose connection point"], "correct": 0, "exp": "Valve seat inside heated space; long stem extends to exterior. Disconnect hose in winter (drain stem). Vol 1.", "v": 5}, {"id": 4123, "domain": 1, "task": 10, "topic": "WH Set Temp", "q": "The standard water heater thermostat setpoint range is approximately:", "choices": ["120\u2013140\u00b0F (typical setting; 120\u00b0F often recommended)", "60\u201390\u00b0F (low setting for energy savings primarily)", "160\u2013180\u00b0F (high setting for sanitization use)", "Above 200\u00b0F (reserved for industrial applications only)"], "correct": 0, "exp": "120-140\u00b0F typical. 120\u00b0F often recommended (scald prevention). Higher reduces legionella but scald risk. Vol 1.", "v": 5}, {"id": 4124, "domain": 1, "task": 10, "topic": "Galv Lead", "q": "Water from galvanized supply pipe in some older homes may contain trace amounts of:", "choices": ["Arsenic from soil leaching into the supply line", "Lead from prior service line that fed into galv pipes", "Mineral oil residue from manufacturing the galv pipe", "Mercury vapor present from natural gas contamination"], "correct": 1, "exp": "Galv water may contain trace lead (if lead service line was used previously). Milwaukee LSL replacement focus. Vol 1.", "v": 5}, {"id": 4125, "domain": 1, "task": 10, "topic": "DWV Vent", "q": "Plumbing vents in the DWV system primarily serve which function?", "choices": ["Equalize pressure (prevent siphoning)", "Carry secondary supply water during peak demand", "Filter sewer gas before it enters the home", "Heat the drain system to prevent freezing in winter"], "correct": 0, "exp": "Equalize pressure: prevents trap siphoning, aids drainage. Without vent, flow creates negative pressure pulling traps. Vol 1.", "v": 5}, {"id": 4126, "domain": 1, "task": 10, "topic": "Service Pipe Diam", "q": "Water service pipe minimum diameter for typical single-family homes is:", "choices": ["1.5 inch typical minimum diameter", "3/4 inch typical minimum diameter", "1 inch typical minimum diameter", "1/2 inch typical minimum diameter"], "correct": 1, "exp": "3/4 inch typical minimum. Branch to fixtures: 1/2 inch typical. Larger homes/low pressure may need 1 inch. Vol 1.", "v": 5}, {"id": 4127, "domain": 1, "task": 10, "topic": "WH Pan", "q": "A water heater installed above living space requires a drain pan piped to:", "choices": ["The crawl space directly below the tank location", "The home's sanitary sewer connection inside", "An open container nearby for periodic emptying", "A safe drain location or directly to outside"], "correct": 3, "exp": "Drain pan: piped to safe drain or outside. Tank failures eventually happen. Limits water damage. Vol 1.", "v": 5}, {"id": 4128, "domain": 1, "task": 10, "topic": "Cu Galvanic", "q": "Copper pipe connected directly to galvanized steel without a dielectric fitting causes:", "choices": ["No interaction at the joint when properly threaded", "Galvanic corrosion at the connection (electron flow)", "Improved bonding strength between dissimilar metals", "Faster water flow rate at the connection point"], "correct": 1, "exp": "Galvanic corrosion (electrons flow between dissimilar metals in moisture). Use dielectric fitting/brass. Vol 1.", "v": 5}, {"id": 4129, "domain": 1, "task": 10, "topic": "Aerator", "q": "A faucet aerator's primary purpose is to:", "choices": ["Filter incoming water of particulates and minerals", "Mix air with water to reduce splash and conserve flow", "Increase outlet pressure beyond supply pressure", "Heat the water to the user's setpoint at the spout"], "correct": 1, "exp": "Mix air with water: reduces splash, conserves flow. Mineral buildup clogs aerators - simple cleaning fix. Vol 1.", "v": 5}, {"id": 4130, "domain": 1, "task": 10, "topic": "PEX Service Life", "q": "Expected service life of PEX supply tubing is approximately:", "choices": ["20 to 30 years (similar to galvanized steel pipe)", "75 to 100 years (similar to copper supply tubing)", "40 to 50 years (no known failures from age alone)", "10 to 20 years (early failures from chlorine attack)"], "correct": 2, "exp": "PEX: 40-50 years expected. No known failures from age alone. Allowed in all states. Vol 1 Ch 4.", "v": 5}, {"id": 4131, "domain": 1, "task": 4, "topic": "Anchor Bolt Spacing", "q": "Anchor bolts attaching a sill plate to the foundation have a maximum spacing of:", "choices": ["6 feet on center maximum spacing", "3 feet on center maximum spacing", "There is no code requirement for spacing", "12 feet on center maximum spacing"], "correct": 0, "exp": "Max 6 ft OC. Within 12 in of corners/ends. Min 1/2 in dia. 7 in embedment. Washer + nut. IRC.", "v": 5}, {"id": 4132, "domain": 1, "task": 4, "topic": "Anchor Bolt Diameter", "q": "The minimum anchor bolt diameter for sill-to-foundation attachment is:", "choices": ["Minimum 3/8 inch diameter", "Minimum 1/2 inch diameter", "Minimum 5/8 inch diameter", "Minimum 3/4 inch diameter"], "correct": 1, "exp": "Min 1/2 inch dia. High wind/seismic may require larger. Includes washer + nut. IRC.", "v": 5}, {"id": 4133, "domain": 1, "task": 4, "topic": "Anchor Bolt Embed", "q": "The minimum anchor bolt embedment depth into the concrete foundation is:", "choices": ["Minimum 3 inches embedment", "Minimum 12 inches embedment", "Minimum 5 inches embedment", "Minimum 7 inches embedment"], "correct": 3, "exp": "Min 7 in embedment. Provides pull-out resistance against uplift. Common defect: insufficient embedment. IRC.", "v": 5}, {"id": 4134, "domain": 1, "task": 4, "topic": "Anchor Bolt Edge", "q": "Anchor bolts must be installed within how far of corners and ends of the sill plate?", "choices": ["There is no code requirement for edge distance", "Within 12 inches of corners and ends", "Within 6 inches of corners and ends", "Within 24 inches of corners and ends"], "correct": 1, "exp": "Within 12 in of corners, ends, and breaks in sill plate. Critical at corners (concentrated forces). IRC.", "v": 5}, {"id": 4135, "domain": 1, "task": 4, "topic": "Frost Depth WI", "q": "Wisconsin frost depth for footing design is typically:", "choices": ["42 to 48 inches below grade", "24 to 30 inches below grade", "60 to 72 inches below grade", "12 to 18 inches below grade"], "correct": 0, "exp": "WI: 42-48 in. Footings extend below to prevent frost heave. Cold-climate consideration. IRC.", "v": 5}, {"id": 4136, "domain": 1, "task": 4, "topic": "Snow Load WI", "q": "Southeastern Wisconsin design ground snow load is approximately:", "choices": ["10 psf ground snow load", "30 psf ground snow load", "60 psf ground snow load", "100 psf ground snow load"], "correct": 1, "exp": "Milwaukee area: ~30 psf ground snow load. Roof snow adjusted for slope/exposure/thermal. IRC.", "v": 5}, {"id": 4137, "domain": 1, "task": 4, "topic": "Live Load", "q": "Live load on a structure refers to which type of forces?", "choices": ["Permanent fixed equipment loads on the structure", "Transient occupant loads (people, furniture, snow)", "Wind pressure forces acting on exterior surfaces", "Building material weight (framing and finishes)"], "correct": 1, "exp": "Live: transient (occupants, furniture). Dead: permanent (structure, fixed). Both designed for. IRC.", "v": 5}, {"id": 4138, "domain": 1, "task": 4, "topic": "Dead Load", "q": "Dead load on a structure refers to which type of forces?", "choices": ["Permanent fixed loads (framing, sheathing, equipment)", "Wind pressure forces acting on exterior surfaces", "Snow accumulation on the roof during winter months", "Transient occupant loads (people, furniture, snow)"], "correct": 0, "exp": "Dead: permanent (framing, sheathing, roofing, fixed equipment). Live: transient. Both calculated. IRC.", "v": 5}, {"id": 4139, "domain": 1, "task": 4, "topic": "Vertical Crack", "q": "A vertical crack in a poured concrete basement wall most often indicates:", "choices": ["Frost heave damage from below the footing", "Lateral pressure failure from outside soil load", "Settlement of the foundation under one corner", "Concrete cure shrinkage (most common)"], "correct": 3, "exp": "Vertical = shrinkage during cure (most common, usually minor). Diagonal = settlement. Horizontal = lateral. Vol 2.", "v": 5}, {"id": 4140, "domain": 1, "task": 4, "topic": "Horizontal Crack", "q": "A horizontal crack in a basement wall most often indicates which serious condition?", "choices": ["Concrete cure shrinkage during initial setting", "Improper concrete mix design at the time of pour", "Lateral pressure failure (hydrostatic or frost)", "Settlement of the foundation under one corner"], "correct": 2, "exp": "Horizontal = lateral pressure (hydrostatic or frost). Most serious crack pattern. Engineer eval. Vol 2.", "v": 5}, {"id": 4141, "domain": 1, "task": 4, "topic": "Stair-Step Crack", "q": "A stair-step crack pattern in masonry walls usually indicates:", "choices": ["Improper mortar mix that failed at the joints", "Differential settlement of the foundation below", "Concrete cure shrinkage during initial setting", "Lateral pressure failure from outside soil load"], "correct": 1, "exp": "Stair-step in masonry follows mortar joints (path of least resistance). Differential settlement. Vol 2.", "v": 5}, {"id": 4142, "domain": 1, "task": 4, "topic": "Joist Notch Outer", "q": "Floor joist notching in the outer third of the span is limited to:", "choices": ["1/6 of the joist depth maximum", "1/2 of the joist depth maximum", "1/4 of the joist depth maximum", "Notching not allowed in any portion of joist"], "correct": 0, "exp": "Outer third: max 1/6 of depth. Middle third: NO notching (high stress). Holes: max 1/3 anywhere with edge clearance. IRC.", "v": 5}, {"id": 4143, "domain": 1, "task": 4, "topic": "Joist Hole", "q": "Holes through floor joists must maintain minimum edge clear
