n), what they'll do. Helps client follow through. Industry SOP.", "v": 5}, {"id": 4470, "domain": 3, "task": 1, "topic": "PIA Purpose", "q": "A pre-inspection agreement (PIA) primarily serves to:", "choices": ["Set the inspector's hourly billing rate for the engagement", "Replace the inspection report with a contract document", "Provide marketing material for the inspector's services", "Define scope, limitations, and responsibilities"], "correct": 3, "exp": "PIA: defines scope, limitations, fees, dispute resolution, parties, signatures. Standard before every inspection. Industry.", "v": 5}, {"id": 4471, "domain": 3, "task": 1, "topic": "PIA Timing", "q": "The pre-inspection agreement should be:", "choices": ["Signed before the inspection begins (not after)", "Signed after the inspection report is delivered", "Verbal only (no written agreement needed)", "Optional for most home inspections"], "correct": 0, "exp": "Sign BEFORE inspection. Verbal-only is unenforceable. Email/electronic sign acceptable. Industry.", "v": 5}, {"id": 4472, "domain": 3, "task": 1, "topic": "Limitation of Liability", "q": "Limitation of liability clauses in PIAs are typically:", "choices": ["Often capped at the inspection fee (varies)", "Always invalid in the home inspector industry", "Always unlimited regardless of damages awarded", "Always exactly $1 million in coverage"], "correct": 0, "exp": "Common: liability capped at inspection fee. State law varies (some don't allow). Document clearly. Industry.", "v": 5}, {"id": 4473, "domain": 3, "task": 1, "topic": "Arbitration Clause", "q": "Arbitration clauses in PIAs typically require disputes to be:", "choices": ["Resolved through arbitration rather than court litigation", "Resolved by the home inspector's personal decision only", "Resolved by the buyer's attorney without the inspector", "Resolved by the state regulatory agency only"], "correct": 0, "exp": "Arbitration: cheaper/faster than litigation. Common PIA clause. Some states regulate. Industry.", "v": 5}, {"id": 4474, "domain": 3, "task": 1, "topic": "Scope Listed", "q": "The scope of inspection in a PIA typically lists:", "choices": ["Building code requirements for the property", "The buyer's offer details and the seller's response", "Systems/components inspected (and exclusions)", "The inspector's marketing services to the client"], "correct": 2, "exp": "Scope: what's inspected (per SOP) AND exclusions. Clear scope reduces disputes. Industry.", "v": 5}, {"id": 4475, "domain": 3, "task": 1, "topic": "Excluded Items List", "q": "Items typically excluded from a standard home inspection PIA include:", "choices": ["Site, exterior, interior (the visible elements)", "Foundation, framing, structure (the main components)", "Roof, electrical, plumbing, HVAC (the major systems)", "Code, future performance, hidden, life expectancy"], "correct": 3, "exp": "Excluded: code, future performance, hidden, life expectancy, concealed defects. Document clearly. Industry SOP.", "v": 5}, {"id": 4476, "domain": 3, "task": 1, "topic": "WI Disclosure Required", "q": "Wisconsin home inspectors are required by SPS 131 to provide which document at inspection?", "choices": ["Insurance policy details to the client", "Pre-inspection disclosure of qualifications", "Code compliance certification document", "Continuing education credits for the inspector"], "correct": 1, "exp": "WI SPS 131: pre-inspection disclosure including license number, qualifications. WI-specific requirement. WI DSPS.", "v": 5}, {"id": 4477, "domain": 3, "task": 1, "topic": "Client Identified", "q": "The client identified in the PIA is typically:", "choices": ["The buyer's agent who arranged the inspection", "The buyer who paid for the inspection", "The seller who is selling the property", "The inspector who performed the inspection"], "correct": 1, "exp": "Client: buyer (in pre-purchase). Pre-listing: seller. Identifies who has report rights/recourse. Industry.", "v": 5}, {"id": 4478, "domain": 3, "task": 1, "topic": "Photos Allowed", "q": "PIA language about photographs typically:", "choices": ["Permits photography for documentation", "Requires photographs from every inspection performed", "Restricts photos to interior areas only", "Prohibits any photography without specific permission"], "correct": 0, "exp": "PIA permits inspector photography for documentation, report, possible marketing (with name redacted). Industry.", "v": 5}, {"id": 4479, "domain": 3, "task": 1, "topic": "Confidentiality", "q": "PIA confidentiality clauses typically state that:", "choices": ["Reports must be filed with the state regulatory agency", "Reports must be shared with the seller automatically", "Reports are public records available to anyone", "Reports private to client; not shared without OK"], "correct": 3, "exp": "Confidential: report belongs to client. Don't share without permission. Standard PIA clause. Industry.", "v": 5}, {"id": 4480, "domain": 3, "task": 1, "topic": "Re-Inspection Cost", "q": "Re-inspection following the original inspection typically:", "choices": ["Performed by a different inspector at no charge", "Charged at separate (usually reduced) fee", "Free service included in the original inspection", "Required for all home inspections"], "correct": 1, "exp": "Re-inspection: separate fee (often $100-$200 vs $400+ full). Verifies repair completion. Industry.", "v": 5}, {"id": 4481, "domain": 3, "task": 1, "topic": "Notice of Defect", "q": "PIA clauses for notice of defect typically require:", "choices": ["Client to keep all defects confidential", "Client to notify the state regulatory agency", "Client notifies inspector before any repair", "Client to repair without notice to the inspector"], "correct": 2, "exp": "Notice clause: client notifies inspector before repair, allowing chance to inspect/respond. Reduces 'I missed it' disputes. Industry.", "v": 5}, {"id": 4482, "domain": 3, "task": 1, "topic": "Statute of Limitations", "q": "Statute of limitations for HI claims varies by state but is typically:", "choices": ["1 to 4 years from inspection (state-specific)", "10 to 20 years from inspection (state-specific)", "Indefinite (no limitation in any state)", "30 to 50 years from inspection (state-specific)"], "correct": 0, "exp": "SOL: 1-4 yr typical. WI: 6 yr generally for contract; 3 yr for negligence. Check state law. Legal.", "v": 5}, {"id": 4483, "domain": 3, "task": 1, "topic": "Three-Party PIA", "q": "A PIA between buyer, inspector, and listing agent is:", "choices": ["Required by all state regulatory agencies", "Required by lenders for all mortgage inspections", "Uncommon (typical PIA is two-party only)", "Standard practice in most home inspections"], "correct": 2, "exp": "Standard PIA: two parties (client + inspector). Three-party rare. Avoids agent liability complications. Industry.", "v": 5}, {"id": 4484, "domain": 3, "task": 1, "topic": "Walk-Through Right", "q": "PIAs commonly grant the client right to attend the inspection because:", "choices": ["Required by all buyer agents universally", "Required by all lenders for mortgage approval", "Required by all state regulatory agencies", "Best practice \u2014 client observes findings live"], "correct": 3, "exp": "Best practice: client attends, asks questions, sees defects. Builds rapport, education. Some inspectors require it. Industry.", "v": 5}, {"id": 4485, "domain": 3, "task": 2, "topic": "Conflict of Interest", "q": "A clear conflict of interest for a home inspector includes:", "choices": ["Recommending a contractor with whom inspector has financial tie", "Charging the standard inspection fee for services", "Performing the inspection within 24 hours of the order", "Inspecting a home in a different state than the inspector lives"], "correct": 0, "exp": "Conflict: financial tie to recommended contractor (kickback). Disclose any tie. Best: don't recommend specific. Industry.", "v": 5}, {"id": 4486, "domain": 3, "task": 2, "topic": "Inspector Bid", "q": "An inspector who bids on repairs identified during the inspection has:", "choices": ["Required practice in most states for full service", "Improved efficiency (one-stop shop for the client)", "Better insight into actual repair costs and methods", "Conflict of interest (incentive to over-report)"], "correct": 3, "exp": "Bidding on own findings: conflict (over-report defects to win bid). Most state SOPs prohibit. Industry SOP.", "v": 5}, {"id": 4487, "domain": 3, "task": 2, "topic": "Confidentiality Limit", "q": "Confidentiality of an inspection report has limits including:", "choices": ["Whenever a lender requests the report copy", "Court order, subpoena, or imminent danger to public", "Whenever the buyer's agent requests a copy", "Whenever the inspector wants to share the report"], "correct": 1, "exp": "Confidentiality limits: court order, subpoena, imminent danger. Otherwise client owns. Industry/legal.", "v": 5}, {"id": 4488, "domain": 3, "task": 2, "topic": "Continuing Education", "q": "Wisconsin home inspectors are required to complete continuing education at:", "choices": ["10 hours per 2-year renewal cycle", "40 hours per 2-year renewal cycle", "20 hours per 2-year renewal cycle", "100 hours per 2-year renewal cycle"], "correct": 1, "exp": "WI: 40 hours CE per 2-yr cycle. InterNACHI provides free with membership. WI SPS 131.", "v": 5}, {"id": 4489, "domain": 3, "task": 2, "topic": "Renewal Cycle", "q": "Wisconsin home inspector license renewal is required:", "choices": ["Every 2 years by December 14 of even years", "Every 5 years by January 1 of fifth year", "Once at initial issue (no renewal required)", "Every year by December 31 each year"], "correct": 0, "exp": "WI: every 2 years by Dec 14 of even years. Renew via DSPS website. WI SPS 131.", "v": 5}, {"id": 4490, "domain": 3, "task": 2, "topic": "Code of Ethics", "q": "Standards of Practice and Codes of Ethics for home inspectors are typically published by:", "choices": ["OSHA federal (for residential home inspections)", "ICC (the building code council, separate from HI)", "EPA federal (for residential home inspections)", "Trade associations (ASHI, InterNACHI) and states"], "correct": 3, "exp": "SOP/Ethics: ASHI, InterNACHI, state DSPS. Address scope, conflicts, advertising. WI follows SPS 131. Industry.", "v": 5}, {"id": 4491, "domain": 3, "task": 2, "topic": "Continuing Education Topics", "q": "Common topics for HI continuing education include:", "choices": ["Building science, codes, technology, ethics", "Real estate licensing topics for cross-discipline", "Sales training for upselling clients to add-ons", "Marketing and advertising techniques only"], "correct": 0, "exp": "CE topics: building science, codes, technology, ethics, business. Field expertise + professional skills. Industry.", "v": 5}, {"id": 4492, "domain": 3, "task": 2, "topic": "Client Communication", "q": "Inspector-client communication during/after inspection should be:", "choices": ["Available 24/7 for any client question", "Limited to the written report only with no further contact", "Clear, professional, prompt, and documented", "Casual texting only with no email or phone calls"], "correct": 2, "exp": "Communication: clear, professional, prompt, documented. Phone, email, text within reason. Don't disappear. Industry.", "v": 5}, {"id": 4493, "domain": 3, "task": 2, "topic": "Marketing Honest", "q": "Marketing claims by home inspectors should be:", "choices": ["Aggressive and exaggerated to win business", "Vague promises of best-in-class service quality", "Accurate, defensible, not exaggerated", "Negative comparisons to competitors when possible"], "correct": 2, "exp": "Marketing: accurate, defensible, not misleading. Avoid 'best in town', certifications you don't have. State rules apply. Industry.", "v": 5}, {"id": 4494, "domain": 3, "task": 2, "topic": "Solicit Repairs", "q": "An inspector who actively solicits repair work from inspection findings is:", "choices": ["Providing valuable additional service to the client", ulatory agencies", "It makes the inspection appear less valuable", "Setting expectations protects client and inspector", "It is required only in writing within the report"], "correct": 2, "exp": "Honest limits: protects everyone. Client knows what they got; inspector limits liability. Don't promise what you can't deliver. Industry.", "v": 5}, {"id": 4499, "domain": 3, "task": 2, "topic": "Handle Mistakes", "q": "When an inspector realizes they missed a defect, the appropriate response is:", "choices": ["Acknowledge, own the error, work toward fair resolution", "Threaten the client with legal action if they pursue it", "Blame the client for not pointing it out during inspection", "Deny the error and refuse to communicate with the client"], "correct": 0, "exp": "Mistakes happen. Own them. Communicate. Resolve fairly. Avoid lawsuit by being human. Industry/professional.", "v": 5}, {"id": 4500, "domain": 3, "task": 2, "topic": "Avoid Anchoring", "q": "Inspection reports should be written for the client to understand independently rather than:", "choices": ["Relying on real estate agent to interpret findings", "Including extensive photographs of every item", "Identifying specific contractors for repair work", "Estimating costs of repairs in the report"], "correct": 0, "exp": "Write for client to understand. Agent may filter; client should understand directly. Avoid agent-dependent language. Industry.", "v": 5}];
const STORAGE_KEY = 'nhie_drill_v5_stats';

// Stats
function loadStats() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { seen: {}, correct: {}, sessions: 0, totalSeen: 0, totalCorrect: 0 };
}
function saveStats(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) {}
}
function resetStats() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  updateMenuStats();
}
function updateMenuStats() {
  const s = loadStats();
  document.getElementById('stat-seen').textContent = s.totalSeen;
  document.getElementById('stat-correct').textContent = s.totalCorrect;
  const acc = s.totalSeen > 0 ? Math.round(s.totalCorrect / s.totalSeen * 100) + '%' : '—';
  document.getElementById('stat-accuracy').textContent = acc;
  document.getElementById('stat-sessions').textContent = s.sessions;
}

// Drill state
let drillQs = [];
let drillIdx = 0;
let drillScore = 0;
let drillAnswered = false;

function startDrill(mode) {
  const stats = loadStats();
  const counts = { quick10: 10, weak25: 25, half50: 50, full100: 100 };
  const n = counts[mode] || 10;
  
  // Build pool — for "weak", prioritize unseen + low-accuracy
  let pool;
  if (mode === 'weak25') {
    // Weight by gap from 50% accuracy (where we have data) and unseen
    const weighted = QUESTIONS.map(q => {
      const seen = stats.seen[q.id] || 0;
      const correct = stats.correct[q.id] || 0;
      let weight;
      if (seen === 0) weight = 2.0; // unseen prioritized
      else {
        const acc = correct / seen;
        weight = 1.5 - acc; // lower accuracy = higher weight
      }
      return { q, weight };
    });
    weighted.sort((a, b) => b.weight - a.weight + (Math.random() - 0.5) * 0.3);
    pool = weighted.slice(0, n).map(x => x.q);
  } else {
    // Random sample
    pool = [...QUESTIONS].sort(() => Math.random() - 0.5).slice(0, n);
  }
  
  drillQs = pool;
  drillIdx = 0;
  drillScore = 0;
  drillAnswered = false;
  
  document.getElementById('menu-view').classList.add('hidden');
  document.getElementById('results-view').classList.add('hidden');
  document.getElementById('drill-view').classList.remove('hidden');
  
  renderQuestion();
}

function renderQuestion() {
  const q = drillQs[drillIdx];
  drillAnswered = false;
  
  document.getElementById('progress').textContent = `${drillIdx + 1} / ${drillQs.length}`;
  document.getElementById('btn-next').classList.remove('show');
  
  const card = document.getElementById('question-card');
  const taskNames = {
    1: {1:'Site',2:'Exterior',3:'Roof',4:'Structure',5:'Electrical',6:'Insulation/Vent',7:'Heating',8:'Cooling',9:'Mech Exhaust',10:'Plumbing',11:'Interior',12:'Fireplaces',13:'Life Safety'},
    2: {1:'Inspection Description',2:'Limitations',3:'Defect Description',4:'Further Evaluation'},
    3: {1:'Pre-Inspection Agreement',2:'Quality/Integrity'}
  };
  const taskName = (taskNames[q.domain] && taskNames[q.domain][q.task]) || '';
  
  card.innerHTML = `
    <div class="q-meta">${taskName} · #${q.id}</div>
    <div class="q-text">${escapeHtml(q.q)}</div>
    <div class="choices" id="choices"></div>
    <div class="explanation" id="explanation"><strong>Explanation:</strong> ${escapeHtml(q.exp)}</div>
  `;
  
  const choicesEl = document.getElementById('choices');
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `<span class="letter">${String.fromCharCode(65+i)}</span><span>${escapeHtml(c)}</span>`;
    btn.onclick = () => selectAnswer(i);
    choicesEl.appendChild(btn);
  });
}

function selectAnswer(idx) {
  if (drillAnswered) return;
  drillAnswered = true;
  
  const q = drillQs[drillIdx];
  const choices = document.querySelectorAll('.choice');
  
  choices.forEach((c, i) => {
    c.disabled = true;
    if (i === q.correct) c.classList.add('correct');
    else if (i === idx) c.classList.add('wrong');
  });
  
  document.getElementById('explanation').classList.add('show');
  document.getElementById('btn-next').classList.add('show');
  document.getElementById('btn-next').textContent = (drillIdx === drillQs.length - 1) ? 'See results →' : 'Next →';
  
  // Update stats
  const isCorrect = (idx === q.correct);
  if (isCorrect) drillScore++;
  
  const stats = loadStats();
  stats.seen[q.id] = (stats.seen[q.id] || 0) + 1;
  if (isCorrect) stats.correct[q.id] = (stats.correct[q.id] || 0) + 1;
  stats.totalSeen++;
  if (isCorrect) stats.totalCorrect++;
  saveStats(stats);
}

function nextQuestion() {
  drillIdx++;
  if (drillIdx >= drillQs.length) {
    showResults();
  } else {
    renderQuestion();
    window.scrollTo(0, 0);
  }
}

function showResults() {
  const stats = loadStats();
  stats.sessions++;
  saveStats(stats);
  
  const pct = Math.round(drillScore / drillQs.length * 100);
  document.getElementById('result-score').textContent = pct + '%';
  document.getElementById('result-detail').innerHTML = 
    `<strong>${drillScore}</strong> of <strong>${drillQs.length}</strong> correct`;
  
  document.getElementById('drill-view').classList.add('hidden');
  document.getElementById('results-view').classList.remove('hidden');
  window.scrollTo(0, 0);
}

function quitDrill() {
  document.getElementById('drill-view').classList.add('hidden');
  document.getElementById('results-view').classList.add('hidden');
  document.getElementById('menu-view').classList.remove('hidden');
  updateMenuStats();
  window.scrollTo(0, 0);
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

updateMenuStats();
</script>
