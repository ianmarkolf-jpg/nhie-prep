ific). Less than ~13 in: significant safety/use concerns. Vol 1.", "v": 5}, {"id": 5651, "domain": 1, "task": 9, "topic": "Hood Wall Cavity", "q": "A microwave hood blowing into a wall cavity without a duct is:", "choices": ["Required by older codes", "Defect, no proper exhaust", "Standard for galley kitchens", "Acceptable for short runs"], "correct": 1, "exp": "Defect: removing filter reveals no duct, fan blows into cavity. Major defect: moisture/grease/fire. Vol 1.", "v": 5}, {"id": 5652, "domain": 1, "task": 9, "topic": "Microwave Plug", "q": "Microwave plug-and-cord cables are restricted by passing through:", "choices": ["Open shelving without box", "Walls, floors, and ceilings", "Any kitchen finish material", "Cabinet face frames freely"], "correct": 1, "exp": "Plug-and-cord NOT permitted to pass through walls/floors/ceilings. Must terminate in dedicated receptacle. Vol 1.", "v": 5}, {"id": 5653, "domain": 1, "task": 9, "topic": "Bath Fan Min CFM", "q": "A bathroom exhaust fan minimum capacity is:", "choices": ["50 cfm intermittent flow", "20 cfm continuous flow", "10 cfm continuous flow", "Either of B or C above"], "correct": 3, "exp": "20 cfm continuous OR 50 cfm intermittent. Newer codes often require 80-100 cfm. Sized by room volume. IRC.", "v": 5}, {"id": 5654, "domain": 1, "task": 9, "topic": "Bath Fan Discharge", "q": "Bathroom exhaust fans must discharge to:", "choices": ["Crawl space below floor", "Building exterior outside", "Attic or roof cavity", "Adjacent vented closet"], "correct": 1, "exp": "Exterior only: wall, soffit, gable, roof. Indoor discharge dumps moisture into attic/crawl. Vol 1.", "v": 5}, {"id": 5655, "domain": 1, "task": 9, "topic": "Dryer Duct Material", "q": "Dryer exhaust ducts must be constructed of:", "choices": ["Cardboard fiber tubing", "Foil flexible bag tubing", "Plastic flexible vinyl tube", "Rigid or semi-rigid metal"], "correct": 3, "exp": "Rigid or semi-rigid metal only. Plastic flex vinyl: fire hazard (lint ignition). IRC.", "v": 5}, {"id": 5656, "domain": 1, "task": 9, "topic": "Dryer Vent Length", "q": "Maximum dryer exhaust duct length (rigid metal, straight) is generally:", "choices": ["No max if booster", "50 feet straight rigid", "25 feet straight rigid", "10 feet straight rigid"], "correct": 2, "exp": "25 ft straight max. Reduce for elbows: -5 ft per 90, -2.5 ft per 45. Booster fans extend with maintenance. IRC.", "v": 5}, {"id": 5657, "domain": 1, "task": 9, "topic": "Dryer 90 Elbow", "q": "A 90-degree elbow in a dryer vent reduces allowable length by approximately:", "choices": ["2.5 feet per 90 elbow", "5 feet per 90 elbow", "10 feet per 90 elbow", "1 foot per 90 elbow"], "correct": 1, "exp": "90° elbow: -5 ft equivalent length. 45° elbow: -2.5 ft. Total stays within mfr maximum. IRC.", "v": 5}, {"id": 5658, "domain": 1, "task": 9, "topic": "Dryer 45 Elbow", "q": "A 45-degree elbow in a dryer vent reduces allowable length by approximately:", "choices": ["5 feet per 45 elbow", "1 foot per 45 elbow", "10 feet per 45 elbow", "2.5 feet per 45 elbow"], "correct": 3, "exp": "45° elbow: -2.5 ft equivalent. 90° elbow: -5 ft. Mfr-specific values may differ slightly. IRC.", "v": 5}, {"id": 5659, "domain": 1, "task": 9, "topic": "Dryer Termination", "q": "Dryer vent terminations must:", "choices": ["Discharge into crawl space", "Discharge into attic space", "Terminate at any point", "Terminate outside with damper"], "correct": 3, "exp": "Outside termination with backdraft damper required. Never inside (attic, crawl, garage). IRC.", "v": 5}, {"id": 5660, "domain": 1, "task": 9, "topic": "Dryer Term Distance", "q": "Dryer vent terminations should be located from openings at least:", "choices": ["3 feet from openings", "12 feet from openings", "1 foot from openings", "6 feet from openings"], "correct": 0, "exp": "3 feet minimum from windows/doors/intakes. Prevents lint/moisture re-entering. Mfr & IRC.", "v": 5}, {"id": 5661, "domain": 1, "task": 9, "topic": "HRV Defrost", "q": "Cold-climate HRVs require defrost mode because:", "choices": ["Frost forms on intake fan", "Frost forms on heat exchanger core", "Sensors freeze and fail", "Indoor humidity drops"], "correct": 1, "exp": "Cold-climate HRV: warm humid exhaust against cold incoming frosts the heat exchanger core. Defrost cycle clears it. Vol 1.", "v": 5}, {"id": 5662, "domain": 1, "task": 9, "topic": "HRV Recovery", "q": "Modern HRVs typically recover what percentage of exhaust heat?", "choices": ["30-50 percent of heat", "60-85 percent of heat", "10-20 percent of heat", "95-99 percent of heat"], "correct": 1, "exp": "Modern HRVs: 60-85% heat recovery typical. Premium units approach 90%. Reduces energy penalty of fresh air. Vol 1.", "v": 5}, {"id": 5663, "domain": 1, "task": 9, "topic": "Bath Sizing", "q": "Bathroom fan sizing per square foot of bathroom area is:", "choices": ["0.5 cfm per sq ft", "5 cfm per sq ft (250 min)", "1 cfm per sq ft (50 min)", "2 cfm per sq ft (100 min)"], "correct": 2, "exp": "1 cfm/sq ft, minimum 50 cfm. Or 8 air changes per hour. Either method acceptable. ASHRAE 62.2.", "v": 5}, {"id": 5664, "domain": 1, "task": 9, "topic": "Bath Fan ACH", "q": "An alternative bathroom fan sizing method uses air changes per hour of:", "choices": ["4 air changes per hour", "8 air changes per hour", "24 air changes per hour", "16 air changes per hour"], "correct": 1, "exp": "8 ACH alternate sizing method. Or 1 cfm/sq ft (50 min). Either acceptable per ASHRAE 62.2.", "v": 5}, {"id": 5665, "domain": 1, "task": 9, "topic": "Hood per Foot", "q": "Range hood sizing rule of thumb is approximately:", "choices": ["100 cfm per linear foot", "50 cfm per linear foot", "500 cfm per linear foot", "250 cfm per linear foot"], "correct": 0, "exp": "100 cfm per linear ft of cooktop (gas: more). >400 cfm triggers makeup air requirement. Industry rule.", "v": 5}, {"id": 5666, "domain": 1, "task": 9, "topic": "Outside Air Intake", "q": "Outside air intakes should be located from contamination sources at least:", "choices": ["25 feet minimum away", "3 feet minimum away", "10 feet minimum away", "50 feet minimum away"], "correct": 2, "exp": "10 ft typical minimum from plumbing vents, exhaust outlets, garages, dryer terminations. IRC/IMC.", "v": 5}, {"id": 5667, "domain": 1, "task": 9, "topic": "Backflow at Hood", "q": "Air backflow felt around an over-the-range microwave during operation indicates:", "choices": ["Air filter clogged condition", "Normal operation behavior", "Disconnected duct or damper", "Excess outdoor humidity"], "correct": 2, "exp": "Backflow at appliance: fan disconnected from duct OR exterior damper stuck. Significant defect. Vol 1.", "v": 5}, {"id": 5668, "domain": 1, "task": 9, "topic": "Whole-House Strategy", "q": "Whole-house ventilation differs from local exhaust by:", "choices": ["Always more powerful fan", "Local exhaust kitchen only", "Distributing fresh/stale air", "Whole-house always ducted"], "correct": 2, "exp": "Whole-house: distributes ventilation throughout home. Local: targets pollution at source. Tight homes need both. Vol 1.", "v": 5}, {"id": 5669, "domain": 1, "task": 9, "topic": "Tight Home Vent", "q": "Tight, well-air-sealed homes require ventilation that is:", "choices": ["Less than older leaky homes", "No mechanical ventilation", "Equal to older leaky homes", "More than older leaky homes"], "correct": 3, "exp": "Build tight, ventilate right: tight construction = less natural infiltration = need mechanical ventilation. ASHRAE 62.2.", "v": 5}, {"id": 5670, "domain": 1, "task": 9, "topic": "HRV Imbalance", "q": "An HRV/ERV operating with significantly imbalanced flow can:", "choices": ["Reduce all defrost cycles", "Improve heat recovery rate", "Eliminate need for filter", "Pressurize or depressurize"], "correct": 3, "exp": "Imbalanced flow: pressurizes (drives moisture into walls) or depressurizes (causes backdraft). Should be commissioned. Vol 1.", "v": 5}, {"id": 5671, "domain": 1, "task": 9, "topic": "Window Bath Vent", "q": "An openable bath window in lieu of mechanical exhaust is:", "choices": ["Never permitted by code", "Allowed by older codes only", "Always acceptable now", "Required by all codes"], "correct": 1, "exp": "Older codes allowed; modern IRC requires mechanical exhaust regardless. Window-only rarely used effectively. IRC.", "v": 5}, {"id": 5672, "domain": 1, "task": 9, "topic": "Recirc Filter", "q": "Recirculating range hoods filter exhaust air through:", "choices": ["Charcoal/grease filters", "Catalytic converter element", "Ultraviolet germicidal lamp", "Electrostatic precipitator"], "correct": 0, "exp": "Recirc hoods: charcoal/carbon (odor) + grease filters. Less effective than vented. Need regular replacement. Vol 1.", "v": 5}, {"id": 5673, "domain": 1, "task": 9, "topic": "Combustion vs Makeup", "q": "Combustion air and makeup air are best described as:", "choices": ["Different feed and replacement", "Always combined in vent", "Optional for new homes", "Identical concepts/duct"], "correct": 0, "exp": "Combustion air: feeds burners. Makeup air: replaces air removed by exhaust. Different functions. Vol 1.", "v": 5}, {"id": 5674, "domain": 1, "task": 9, "topic": "Hood Defect Wall", "q": "A range hood blowing into wall cavity instead of duct creates which primary risk?", "choices": ["Increased noise pollution", "Moisture/grease in cavity", "Reduced exhaust flow rate", "Ductwork backflow at term"], "correct": 1, "exp": "Major defect: moisture and grease accumulate in wall cavity. Fire hazard, structural damage, IAQ. Vol 1.", "v": 5}, {"id": 5675, "domain": 1, "task": 9, "topic": "Bath Soffit Term", "q": "A bath fan terminating at a vented soffit is:", "choices": ["Always defective installation", "Never permitted by code", "Required by current code", "Acceptable with proper detail"], "correct": 3, "exp": "Acceptable IF proper termination fitting AND moisture doesn't re-enter via attic intake. Best: dedicated soffit cap. IRC.", "v": 5}, {"id": 5676, "domain": 1, "task": 9, "topic": "Tight Home Hood", "q": "In tight homes with high-cfm hoods, makeup air primarily prevents:", "choices": ["Backdraft of fuel burners", "Range surface burns", "Excessive heating energy", "Indoor humidity rising"], "correct": 0, "exp": "Without makeup air, depressurization causes backdraft of fuel-burning appliances and chimneys. Vol 1.", "v": 5}, {"id": 5677, "domain": 1, "task": 9, "topic": "Spot vs Whole", "q": "Spot exhaust ventilation differs from whole-house by:", "choices": ["Targeting source vs distribute", "Spot uses smaller motors", "Spot used only commercial", "Always continuous operation"], "correct": 0, "exp": "Spot: targets pollution at source (bath, kitchen, dryer). Whole-house: distributes across building over time. Vol 1.", "v": 5}, {"id": 5678, "domain": 1, "task": 9, "topic": "Outside Intake Garage", "q": "An outside air intake located near an attached garage primarily creates risk of:", "choices": ["CO from vehicle exhaust", "Insulation dust intake", "Rainwater entering ducts", "Blocked airflow snow ice"], "correct": 0, "exp": "Critical defect: garage CO from running vehicles enters ventilation system. Locate intakes well clear. IRC/IMC.", "v": 5}, {"id": 5679, "domain": 1, "task": 10, "topic": "TPR Set Point", "q": "TPR valves on water heaters are set to release at:", "choices": ["200 psi or 250°F max", "100 psi or 180°F max", "150 psi or 210°F max", "30 psi or 150°F max"], "correct": 2, "exp": "TPR: 150 psi or 210°F. Modern TPR: 3/4 inch outlet diameter. Whichever first triggers release. Vol 1 Ch 4.", "v": 5}, {"id": 5680, "domain": 1, "task": 10, "topic": "TPR Sensor", "q": "TPR valve sensor must be located on the tank within:", "choices": ["First 12 inches from top", "First 18 inches from top", "First 24 inches from top", "First 6 inches from top"], "correct": 3, "exp": "First 6 inches from top of tank. Fittings can't displace this. Otherwise sensor doesn't read tank temp. Vol 1.", "v": 5}, {"id": 5681, "domain": 1, "task": 10, "topic": "TPR Discharge Pipe", "q": "Acceptable materials for the TPR discharge pipe include:", "choices": ["Any thermoplastic is OK", "Galvanized only or steel", "Copper, CPVC, or PEX", "PVC plastic or ABS"], "correct": 2, "exp": "Hot-water rated only: copper, CPVC, PEX. Most PVC NOT permitted (low temp). Vol 1 Ch 4.", "v": 5}, {"id": 5682, "domain": 1, "task": 10, "topic": "TPR Diameter", "q": "TPR discharge pipe diameter must match the:", "choices": ["Tank cold water inlet", "Service main supply pipe", "Standard 1/2 inch supply", "TPR valve outlet diameter"], "correct": 3, "exp": "Same diameter as TPR outlet (3/4 inch typical). 3/4 in flex connectors NOT acceptable (not full bore). Vol 1.", "v": 5}, {"id": 5683, "domain": 1, "task": 10, "topic": "TPR Air Gap", "q": "TPR discharge pipe terminates with air gap above receptor of:", "choices": ["1/4 to 1 inch above", "8 to 12 inches above", "12 to 24 inches above", "1.5 to 6 inches above"], "correct": 3, "exp": "Air gap: 1.5 to 6 inches above floor or receptor. Prevents backflow contamination. Vol 1 Ch 4.", "v": 5}, {"id": 5684, "domain": 1, "task": 10, "topic": "TPR Slope", "q": "The TPR discharge pipe should slope:", "choices": ["Up toward the source", "Horizontal with no slope", "Down toward discharge", "Either direction acceptable"], "correct": 2, "exp": "Down toward discharge point. Slow leaks drain to discharge - if up, leak hides and damages. Vol 1.", "v": 5}, {"id": 5685, "domain": 1, "task": 10, "topic": "TPR Fittings", "q": "TPR discharge pipes should serve:", "choices": ["Common manifold drain", "Multiple TPRs in series", "One TPR, no tees, no valves", "Multiple appliances OK"], "correct": 2, "exp": "One TPR only. No tees. No valves. Dedicated discharge per water heater. Critical safety. Vol 1.", "v": 5}, {"id": 5686, "domain": 1, "task": 10, "topic": "TPR Horiz Term", "q": "A horizontal TPR discharge pipe should terminate with:", "choices": ["A simple open T fitting", "A 90° elbow pointed up", "A 90° elbow pointed down", "An open horizontal end"], "correct": 2, "exp": "Pointed DOWN: contains discharge, reduces injury from very hot water/steam. Pointed up = dangerous spray. Vol 1.", "v": 5}, {"id": 5687, "domain": 1, "task": 10, "topic": "PB Color", "q": "Polybutylene piping is most often identified by what color?", "choices": ["Bluish-gray (sometimes black)", "Cream color with stripe", "Bright red color tone", "White or off-white tone"], "correct": 0, "exp": "PB: bluish-gray, sometimes black. 1970s-90s. Chlorine in water causes microfractures. No longer permissible. Vol 1.", "v": 5}, {"id": 5688, "domain": 1, "task": 10, "topic": "CPVC Color", "q": "CPVC piping is most commonly identified by what color?", "choices": ["Bluish-gray (sometimes black)", "Bright red color tone", "White or off-white tone", "Cream color with stripe"], "correct": 3, "exp": "CPVC: cream color, often yellow stripe. Sometimes gray. Orange = fire suppression only. Vol 1 Ch 4.", "v": 5}, {"id": 5689, "domain": 1, "task": 10, "topic": "PVC Max Temp", "q": "PVC pipe maximum operating temperature under pressure is approximately:", "choices": ["140°F max under press", "100°F max under press", "180°F max under press", "210°F max under press"], "correct": 1, "exp": "PVC: max 100°F under pressure. Cold water and DWV only. CPVC: max 180°F (hot water rated). Vol 1 Ch 4.", "v": 5}, {"id": 5690, "domain": 1, "task": 10, "topic": "CPVC Max Temp", "q": "CPVC pipe maximum operating temperature under pressure is approximately:", "choices": ["100°F max under press", "210°F max under press", "140°F max under press", "180°F max under press"], "correct": 3, "exp": "CPVC: max 180°F under pressure. Hot/cold supply rated. PVC: max 100°F (cold only). Vol 1 Ch 4.", "v": 5}, {"id": 5691, "domain": 1, "task": 10, "topic": "Type K Marking", "q": "Type K copper tubing identification color marking:", "choices": ["Blue markings on tube", "Yellow markings on tube", "Red markings on tube", "Green markings on tube"], "correct": 3, "exp": "Type K: green (thickest walls). Type L: blue (medium). Type M: red (thinnest). Vol 1 Ch 4.", "v": 5}, {"id": 5692, "domain": 1, "task": 10, "topic": "Type L Marking", "q": "Type L copper tubing identification color marking:", "choices": ["Red markings on tube", "Green markings on tube", "Yellow markings on tube", "Blue markings on tube"], "correct": 3, "exp": "Type L: blue (medium walls). Type K: green (thickest). Type M: red (thinnest). Vol 1 Ch 4.", "v": 5}, {"id": 5693, "domain": 1, "task": 10, "topic": "Type M Marking", "q": "Type M copper tubing identification color marking:", "choices": ["Green markings on tube", "Red markings on tube", "Blue markings on tube", "Yellow markings on tube"], "correct": 1, "exp": "Type M: red (thinnest). Type K: green (thickest). Type L: blue (medium). M not for concrete. Vol 1 Ch 4.", "v": 5}, {"id": 5694, "domain": 1, "task": 10, "topic": "Copper Patina", "q": "Protective patina forming inside copper tubing is typically what color?", "choices": ["Green protective coating", "White mineral coating", "Red oxide coating", "Black sulfide coating"], "correct": 0, "exp": "Green patina. Damaged by aggressive water, water hammer, excess acidic flux. Damage = leaks. Vol 1.", "v": 5}, {"id": 5695, "domain": 1, "task": 10, "topic": "Galv Lifespan", "q": "Galvanized steel pipe expected service life is approximately:", "choices": ["About 75 years", "About 50 years", "About 25 years", "About 100 years"], "correct": 1, "exp": "~50 years. Most existing galv at or beyond service life. Add end-of-life comment. Vol 1 Ch 4.", "v": 5}, {"id": 5696, "domain": 1, "task": 10, "topic": "Galv Failure", "q": "Galvanized steel pipe primarily fails by:", "choices": ["Joint thread rupture", "UV exposure breakdown", "Inside rust and reduced ID", "Outside corrosion only"], "correct": 2, "exp": "Rusts from INSIDE. Inner surface roughens, traps particles, reduces ID, eventually leaks. Rust-color water. Vol 1.", "v": 5}, {"id": 5697, "domain": 1, "task": 10, "topic": "Service Pipe Depth", "q": "Water service pipe must be installed at minimum depth:", "choices": ["6 inches below grade", "12 in below or 6 in below frost", "36 in below grade always", "24 in below grade always"], "correct": 1, "exp": "12 in below grade OR 6 in below frost line, whichever deeper. WI frost ~42-48 in. Vol 1 Ch 4.", "v": 5}, {"id": 5698, "domain": 1, "task": 10, "topic": "Pipe Shield Plate", "q": "Pipes through framing edges need shield plates if pipe edge is closer than:", "choices": ["1.5 inches from edge", "3 inches from edge", "6 inches from edge", "1/2 inch from edge"], "correct": 0, "exp": "1.5 inches from edge: shield required. Plate extends 2 in above bottom plate, below top plate. Vol 1.", "v": 5}, {"id": 5699, "domain": 1, "task": 10, "topic": "Pipe Hole Size", "q": "Holes for pipes through framing should be sized:", "choices": ["About 1/2 in larger than", "Tight fit to the pipe", "About 2 in larger than", "Same diameter as pipe"], "correct": 0, "exp": "~1/2 in larger than pipe. Allows expansion/contraction. Tight = rubbing/clicking/squeaking. Vol 1.", "v": 5}, {"id": 5700, "domain": 1, "task": 10, "topic": "Foundation Sleeve", "q": "Foundation wall pipe sleeves should be sized:", "choices": ["One pipe size larger", "Two pipe sizes larger", "Same size as the pipe", "Three pipe sizes larger"], "correct": 1, "exp": "Two pipe sizes larger. Space sealed with caulk/foam/gasket. Protects against settlement breakage. Vol 1.", "v": 5}, {"id": 5701, "domain": 1, "task": 10, "topic": "Copper Horiz Support", "q": "Copper tubing requires horizontal support spacing of:", "choices": ["Every 32 inches max", "Every 6 feet max", "Every 10 feet max", "Every 12 feet max"], "correct": 1, "exp": "Copper horiz: 6 ft. Vertical: 10 ft. CPVC: 3 ft horiz. PEX: 32 in horiz. Galv: 12 ft horiz. Vol 1.", "v": 5}, {"id": 5702, "domain": 1, "task": 10, "topic": "PEX Horiz Support", "q": "PEX tubing requires horizontal support spacing of:", "choices": ["Every 6 feet max", "Every 10 feet max", "Every 32 inches max", "Every 12 feet max"], "correct": 2, "exp": "PEX horiz: 32 in. PEX flexible, sags between supports. Tighter spacing needed than rigid pipe. Vol 1.", "v": 5}, {"id": 5703, "domain": 1, "task": 10, "topic": "CPVC Horiz Support", "q": "CPVC pipe requires horizontal support spacing of:", "choices": ["Every 3 feet maximum", "Every 6 feet maximum", "Every 10 feet max", "Every 32 inches max"], "correct": 0, "exp": "CPVC horiz: 3 ft. Vertical: 10 ft. Mid-story guide for pipes 2 in and smaller. Vol 1.", "v": 5}, {"id": 5704, "domain": 1, "task": 10, "topic": "Galv Horiz Support", "q": "Galvanized steel pipe requires horizontal support spacing of:", "choices": ["Every 10 feet maximum", "Every 32 inches max", "Every 12 feet maximum", "Every 6 feet maximum"], "correct": 2, "exp": "Galv horiz: 12 ft. Vertical: 15 ft. Heavier rigid pipe = wider support possible. Vol 1.", "v": 5}, {"id": 5705, "domain": 1, "task": 10, "topic": "Air Gap Faucet", "q": "Minimum air gap between faucet and flood-level rim is:", "choices": ["2 inches or 3x diameter", "1/2 inch or 1x diameter", "4 inches or 4x diameter", "1 inch or 2x diameter"], "correct": 3, "exp": "1 inch OR 2x effective opening diameter, whichever GREATER. Most reliable backflow prevention. Code.", "v": 5}, {"id": 5706, "domain": 1, "task": 10, "topic": "S-Trap", "q": "S-traps in plumbing are:", "choices": ["Prohibited (self-siphons)", "Modern preferred config", "Used only in basements", "Required in kitchens"], "correct": 0, "exp": "S-traps PROHIBITED. Self-siphon trap seal under flow, allowing sewer gas. Replace with P-trap + vent. Vol 1.", "v": 5}, {"id": 5707, "domain": 1, "task": 10, "topic": "Drain Slope", "q": "Standard drain pipe slope for pipes 2.5 inches and smaller is:", "choices": ["1/16 in per foot run", "1/8 in per foot run", "1/2 in per foot run", "1/4 in per foot run"], "correct": 3, "exp": "1/4 in per ft for pipes ≤2.5 in. Larger: 1/8 in per ft acceptable. Too flat: poor flow. Vol 1.", "v": 5}, {"id": 5708, "domain": 1, "task": 10, "topic": "Trap Seal", "q": "A plumbing trap maintains a water seal that primarily blocks:", "choices": ["Pressure surge from main", "Sewer gas entering home", "Pest entry into home", "Sewage from rising up"], "correct": 1, "exp": "Water seal blocks sewer gas. Can siphon dry without venting; can evaporate when unused (vacant home). Vol 1.", "v": 5}, {"id": 5709, "domain": 1, "task": 10, "topic": "AAV", "q": "An air admittance valve (AAV) is:", "choices": ["Spring-loaded one-way air", "Mechanical pump in line", "Two-way airflow valve", "Pressure regulator device"], "correct": 0, "exp": "AAV: spring-loaded one-way; admits air to vent system, blocks sewer gas out. Allowed in some jurisdictions. Vol 1.", "v": 5}, {"id": 5710, "domain": 1, "task": 10, "topic": "PEX Color", "q": "PEX color coding (red/blue/white) primarily indicates:", "choices": ["Pipe diameter sizing", "Convenience for hot/cold", "Pressure rating different", "Material composition diff"], "correct": 1, "exp": "Color is convenience only. Red conventionally = hot, blue = cold. Any color carries either. Vol 1.", "v": 5}, {"id": 5711, "domain": 1, "task": 10, "topic": "PEX-AL-PEX", "q": "PEX-AL-PEX is recommended for which application?", "choices": ["Hydronic heating system", "Hot domestic water dist", "Outdoor irrigation lines", "Cold water service line"], "correct": 0, "exp": "Hydronic heating: aluminum oxygen barrier prevents corrosion of metal parts. Regular PEX OK for potable. Vol 1.", "v": 5}, {"id": 5712, "domain": 1, "task": 10, "topic": "WH Anode", "q": "Water heater anode rod purpose is to:", "choices": ["Heat water in tank", "Sacrifice for tank steel", "Add minerals to water", "Backup heating element"], "correct": 1, "exp": "Sacrificial anode (Mg or Al) corrodes preferentially to protect steel tank. Replace every 3-5 years. Vol 1.", "v": 5}, {"id": 5713, "domain": 1, "task": 10, "topic": "Sump Discharge", "q": "Residential sump pump discharge should terminate:", "choices": ["At least 4-6 ft from", "Into nearest floor drain", "Directly at foundation", "Into sanitary sewer"], "correct": 0, "exp": "4-6 ft minimum from foundation. NOT into sanitary sewer (overloads). Check valve to prevent backflow. Code.", "v": 5}, {"id": 5714, "domain": 1, "task": 10, "topic": "Ejector vs Sump", "q": "An ejector pump differs from a sump pump because it pumps:", "choices": ["Sewage including solids", "Storm runoff only", "Clear groundwater only", "Without electricity needed"], "correct": 0, "exp": "Ejector: sewage with solids. Sump: clear water only. Different impellers, different applications. Vol 1.", "v": 5}, {"id": 5715, "domain": 1, "task": 10, "topic": "Frost-Free Sillcock", "q": "A frost-free sillcock has the actual valve seat located:", "choices": ["At exterior wall hose", "At the centerline mid", "Inside heated space", "At underground depth"], "correct": 2, "exp": "Valve seat inside heated space; long stem extends to exterior. Disconnect hose in winter (drain stem). Vol 1.", "v": 5}, {"id": 5716, "domain": 1, "task": 10, "topic": "WH Set Temp", "q": "Standard water heater thermostat setpoint range is:", "choices": ["60-90°F low setting", "160-180°F high", "Above 200°F max", "120-140°F typical"], "correct": 3, "exp": "120-140°F typical. 120°F often recommended (scald prevention). Higher reduces legionella but scald risk. Vol 1.", "v": 5}, {"id": 5717, "domain": 1, "task": 10, "topic": "Galv Lead", "q": "Water from galvanized pipe in some older homes may contain trace amounts of:", "choices": ["Mercury vapor present", "Lead from prior service", "Arsenic from soil", "Mineral oil residue"], "correct": 1, "exp": "Galv water may contain trace lead (if lead service line was used previously). Milwaukee LSL replacement focus. Vol 1.", "v": 5}, {"id": 5718, "domain": 1, "task": 10, "topic": "DPipe Vent", "q": "Plumbing vents serve to:", "choices": ["Filter sewer gas only", "Equalize DWV pressure", "Heat the drain system", "Carry secondary supply"], "correct": 1, "exp": "Equalize pressure: prevents trap siphoning, aids drainage. Without vent, flow creates negative pressure pulling traps. Vol 1.", "v": 5}, {"id": 5719, "domain": 1, "task": 10, "topic": "Service Pipe Diam", "q": "Water service pipe minimum diameter for typical houses is:", "choices": ["Minimum 1.5 inch ID", "Minimum 1/2 inch ID", "Minimum 3/4 inch ID", "Minimum 1 inch ID"], "correct": 2, "exp": "3/4 inch typical minimum. Branch to fixtures: 1/2 inch typical. Larger homes/low pressure may need 1 inch. Vol 1.", "v": 5}, {"id": 5720, "domain": 1, "task": 10, "topic": "WH Pan", "q": "A water heater above living space requires a drain pan piped to:", "choices": ["Sanitary sewer line", "Open container nearby", "Crawl space below tank", "Safe drain or outside"], "correct": 3, "exp": "Drain pan: piped to safe drain or outside. Tank failures eventually happen. Limits water damage. Vol 1.", "v": 5}, {"id": 5721, "domain": 1, "task": 10, "topic": "Cu Galvanic", "q": "Copper connected directly to galvanized steel without dielectric fitting causes:", "choices": ["Faster water flow rate", "Galvanic corrosion damage", "No interaction at joint", "Improved bonding strength"], "correct": 1, "exp": "Galvanic corrosion (electrons flow between dissimilar metals in moisture). Use dielectric fitting/brass. Vol 1.", "v": 5}, {"id": 5722, "domain": 1, "task": 10, "topic": "Aerator", "q": "A faucet aerator's primary purpose is:", "choices": ["Filter incoming water", "Mix air to reduce splash", "Heat water to setpoint", "Increase outlet pressure"], "correct": 1, "exp": "Mix air with water: reduces splash, conserves flow. Mineral buildup clogs aerators - simple cleaning fix. Vol 1.", "v": 5}, {"id": 5723, "domain": 1, "task": 10, "topic": "PEX Service Life", "q": "Expected service life of PEX tubing is approximately:", "choices": ["10 to 20 years range", "20 to 30 years range", "40 to 50 years range", "75 to 100 years range"], "correct": 2, "exp": "PEX: 40-50 years expected. No known failures from age alone. Allowed in all states. Vol 1 Ch 4.", "v": 5}, {"id": 5724, "domain": 1, "task": 4, "topic": "Anchor Bolt Spacing", "q": "Anchor bolts (sill to foundation) maximum spacing is:", "choices": ["No code requirement", "12 feet on center max", "3 feet on center max", "6 feet on center max"], "correct": 3, "exp": "Max 6 ft OC. Within 12 in of corners/ends. Min 1/2 in dia. 7 in embedment. Washer + nut. IRC.", "v": 5}, {"id": 5725, "domain": 1, "task": 4, "topic": "Anchor Bolt Diameter", "q": "Minimum anchor bolt diameter is:", "choices": ["Minimum 1/2 inch", "Minimum 3/4 inch", "Minimum 5/8 inch", "Minimum 3/8 inch"], "correct": 0, "exp": "Min 1/2 inch dia. High wind/seismic may require larger. Includes washer + nut. IRC.", "v": 5}, {"id": 5726, "domain": 1, "task": 4, "topic": "Anchor Bolt Embed", "q": "Minimum anchor bolt embedment in concrete is:", "choices": ["Minimum 12 inches deep", "Minimum 3 inches deep", "Minimum 7 inches deep", "Minimum 5 inches deep"], "correct": 2, "exp": "Min 7 in embedment. Provides pull-out resistance against uplift. Common defect: insufficient embedment. IRC.", "v": 5}, {"id": 5727, "domain": 1, "task": 4, "topic": "Anchor Bolt Edge", "q": "Anchor bolts must be installed within how far of corners and ends?", "choices": ["Within 12 inches edge", "No requirement at edge", "Within 24 inches edge", "Within 6 inches edge"], "correct": 0, "exp": "Within 12 in of corners, ends, and breaks in sill plate. Critical at corners (concentrated forces). IRC.", "v": 5}, {"id": 5728, "domain": 1, "task": 4, "topic": "Frost Depth WI", "q": "Wisconsin frost depth is typically:", "choices": ["12 to 18 inches deep", "24 to 30 inches deep", "60 to 72 inches deep", "42 to 48 inches deep"], "correct": 3, "exp": "WI: 42-48 in. Footings extend below to prevent frost heave. Cold-climate consideration. IRC.", "v": 5}, {"id": 5729, "domain": 1, "task": 4, "topic": "Snow Load WI", "q": "Southeastern Wisconsin design ground snow load is approximately:", "choices": ["30 psf ground load", "100 psf ground load", "10 psf ground load", "60 psf ground load"], "correct": 0, "exp": "Milwaukee area: ~30 psf ground snow load. Roof snow adjusted for slope/exposure/thermal. IRC.", "v": 5}, {"id": 5730, "domain": 1, "task": 4, "topic": "Live Load", "q": "Live load on a structure refers to:", "choices": ["Building material weight", "Permanent fixed equipment", "Wind pressure forces", "Transient occupant loads"], "correct": 3, "exp": "Live: transient (occupants, furniture). Dead: permanent (structure, fixed). Both designed for. IRC.", "v": 5}, {"id": 5731, "domain": 1, "task": 4, "topic": "Dead Load", "q": "Dead load on a structure refers to:", "choices": ["Snow accumulation total", "Wind pressure forces", "Permanent fixed equipment", "Transient occupant loads"], "correct": 2, "exp": "Dead: permanent (framing, sheathing, roofing, fixed equipment). Live: transient. Both calculated. IRC.", "v": 5}, {"id": 5732, "domain": 1, "task": 4, "topic": "Vertical Crack", "q": "A vertical crack in a poured concrete basement wall most often indicates:", "choices": ["Concrete cure shrinkage", "Lateral pressure failure", "Settlement of foundation", "Frost heave damage"], "correct": 0, "exp": "Vertical = shrinkage during cure (most common, usually minor). Diagonal = settlement. Horizontal = lateral. Vol 2.", "v": 5}, {"id": 5733, "domain": 1, "task": 4, "topic": "Horizontal Crack", "q": "A horizontal crack in a basement wall most often indicates:", "choices": ["Improper concrete mix", "Concrete cure shrinkage", "Lateral pressure failure", "Settlement of foundation"], "correct": 2, "exp": "Horizontal = lateral pressure (hydrostatic or frost). Most serious crack pattern. Engineer eval. Vol 2.", "v": 5}, {"id": 5734, "domain": 1, "task": 4, "topic": "Stair-Step Crack", "q": "A stair-step crack in masonry usually indicates:", "choices": ["Improper mortar mix", "Concrete cure shrinkage", "Differential settlement", "Lateral pressure failure"], "correct": 2, "exp": "Stair-step in masonry follows mortar joints (path of least resistance). Differential settlement. Vol 2.", "v": 5}, {"id": 5735, "domain": 1, "task": 4, "topic": "Joist Notch Outer", "q": "Floor joist notching in the outer third of span is limited to:", "choices": ["Notching not allowed", "1/6 of joist depth", "1/2 of joist depth", "1/4 of joist depth"], "correct": 1, "exp": "Outer third: max 1/6 of depth. Middle third: NO notching (high stress). Holes: max 1/3 anywhere with edge clearance. IRC.", "v": 5}, {"id": 5736, "domain": 1, "task": 4, "topic": "Joist Hole", "q": "Holes through floor joists must be located at edge clearance of:", "choices": ["No edge clearance req", "At least 3 in from edge", "At least 1 in from edge", "At least 2 in from edge"], "correct": 3, "exp": "At least 2 in from top/bottom edge. Max 1/3 of depth. Holes less damaging than notches. IRC.", "v": 5}, {"id": 5737, "domain": 1, "task": 4, "topic": "Joist Middle", "q": "In the middle third of a floor joist span, you can have:", "choices": ["Holes but no notches", "Notches and holes both", "Notches but no holes", "Neither notches nor holes"], "correct": 0, "exp": "Middle third (high bending stress): NO notching. Holes acceptable (less impact). Outer thirds: limited notch OK. IRC.", "v": 5}, {"id": 5738, "domain": 1, "task": 4, "topic": "I-Joist Flange", "q": "Engineered I-joist flanges (top/bottom):", "choices": ["Drill carefully through", "Modify with hangers", "Never cut or notch", "Cut and notch freely"], "correct": 2, "exp": "NEVER cut/notch I-joist flanges. Holes only in webs per mfr specs. Cutting flanges = catastrophic failure. Mfr.", "v": 5}, {"id": 5739, "domain": 1, "task": 4, "topic": "Crawl Access", "q": "Minimum unobstructed crawl space access opening is:", "choices": ["18 by 24 inches min", "12 by 12 inches min", "16 by 24 inches min", "24 by 36 inches min"], "correct": 0, "exp": "18 x 24 in min (per IRC). Through-floor: 18 x 24 with proper hatch. Inspect actual passable space. IRC.", "v": 5}, {"id": 5740, "domain": 1, "task": 4, "topic": "Sill Plate", "q": "The sill plate in framing is:", "choices": ["Center of beam span", "Top of stud wall", "Bottom on foundation", "Diagonal corner brace"], "correct": 2, "exp": "Sill plate: bottom horizontal member on foundation, anchored. Pressure-treated typical. Studs rise from sill. Vol 2.", "v": 5}, {"id": 5741, "domain": 1, "task": 4, "topic": "Wood Decay", "q": "Wood decay (rot) requires moisture content above approximately:", "choices": ["50 percent moisture", "10 percent moisture", "20 percent moisture", "5 percent moisture"], "correct": 2, "exp": "Above ~20% MC: decay fungi grow. Some species above 28%. Below: too dry for fungal growth. Vol 2.", "v": 5}, {"id": 5742, "domain": 1, "task": 4, "topic": "45 Degree Rule", "q": "A pipe trench below a footing must offset from bottom at minimum:", "choices": ["90 degree downward", "60 degree downward", "30 degree downward", "45 degree downward"], "correct": 3, "exp": "45° rule: no excavation within 45° from bottom of footing. Disturbing the bearing zone causes settlement. Vol 2.", "v": 5}, {"id": 5743, "domain": 1, "task": 4, "topic": "Termite Tube", "q": "Subterranean termite indicators most commonly include:", "choices": ["Hollow drumming sound", "Mud tubes on foundation", "Sawdust pile by frame", "Visible flying swarms"], "correct": 1, "exp": "Mud tubes: termites build for moisture/protection between soil and wood. Frass = ants/drywood. Vol 2.", "v": 5}, {"id": 5744, "domain": 1, "task": 4, "topic": "Carpenter Ants", "q": "Carpenter ants in wood differ from termites because they:", "choices": ["Don't damage wood at all", "Eat wood for nutrition", "Build mud tubes inside", "Excavate but don't eat"], "correct": 3, "exp": "Carpenter ants: excavate for nests (don't eat wood). Push out fine frass. Termites consume wood. Vol 2.", "v": 5}, {"id": 5745, "domain": 1, "task": 4, "topic": "Header Bearing", "q": "A header above an opening must bear on what at each end?", "choices": ["Bottom plate only", "Cripple stud below", "Trimmer (jack) studs", "Drywall sheathing only"], "correct": 2, "exp": "Trimmers (jacks) below header full height to bottom plate. King studs full height beside trimmers. Vol 2.", "v": 5}, {"id": 5746, "domain": 1, "task": 4, "topic": "Glulam", "q": "A glulam structural beam is constructed of:", "choices": ["Concrete-filled hollow", "Glued laminated lumber", "Single sawn timber", "Steel core composite"], "correct": 1, "exp": "Glulam: glued-laminated dimensional lumber. Long spans, curved shapes possible. Different from LVL. Vol 2.", "v": 5}, {"id": 5747, "domain": 1, "task": 4, "topic": "LVL", "q": "LVL stands for:", "choices": ["Layered Vinyl Lumber", "Limited Vertical Load", "Laminated Veneer Lumber", "Long Vertical Limit"], "correct": 2, "exp": "Laminated Veneer Lumber: thin veneers glued same-grain direction. Headers, beams, rim boards. Vol 2.", "v": 5}, {"id": 5748, "domain": 1, "task": 4, "topic": "Cripple Wall", "q": "A cripple wall is located:", "choices": ["Under finished floor", "Between basement first", "Between foundation/floor", "Adjacent to interior"], "correct": 2, "exp": "Cripple wall: short stud wall between foundation top and first floor. Crawl/partial basement homes. Vol 2.", "v": 5}, {"id": 5749, "domain": 1, "task": 4, "topic": "Knee Wall", "q": "A knee wall is most often located:", "choices": ["In finished attic", "In basement perimeter", "At foundation corner", "Below grade exterior"], "correct": 0, "exp": "Knee wall: partial-height interior wall, often in finished attic where roof slope meets floor. Vol 2.", "v": 5}, {"id": 5750, "domain": 1, "task": 4, "topic": "Beam in Masonry", "q": "A wood beam embedded in masonry should have airspace of:", "choices": ["1 inch space sides", "1/2 inch space sides", "1/4 inch space sides", "2 inches space sides"], "correct": 1, "exp": "1/2 inch airspace at sides and end (if not pressure-treated). Prevents moisture trapping/decay. Vol 2.", "v": 5}, {"id": 5751, "domain": 1, "task": 4, "topic": "Truss Modification", "q": "Modifying a roof truss member is:", "choices": ["Common DIY practice", "Never without engineer", "Acceptable for storage", "Required when remodel"], "correct": 1, "exp": "NEVER modify trusses without engineered repair design. Engineered system; cutting any member compromises whole. Vol 2.", "v": 5}, {"id": 5752, "domain": 1, "task": 4, "topic": "Truss Lift", "q": "Truss uplift in winter typically presents as:", "choices": ["Gap at interior wall", "Drywall ceiling drops", "Roof sheathing buckles", "Foundation cracks form"], "correct": 0, "exp": "Truss uplift: gap appears at top of interior partitions in winter. Cosmetic. Specific clip details mitigate. Vol 2.", "v": 5}, {"id": 5753, "domain": 1, "task": 4, "topic": "Foundation Settle", "q": "Settlement in a foundation can be caused by:", "choices": ["Water erosion damage only", "All of the above causes", "Compressible soils only", "Freeze-thaw cycles only"], "correct": 1, "exp": "Settlement: compressible soils, water erosion, freeze-thaw, undermining (sewer leak), expansive soils. Vol 2.", "v": 5}, {"id": 5754, "domain": 1, "task": 4, "topic": "Frost Heave", "q": "Frost heave occurs in soil because water:", "choices": ["Vaporizes at surface", "Expands ~9% freezing", "Contracts when freezing", "Pumps from below upward"], "correct": 1, "exp": "Water expands ~9% when frozen. In frost-susceptible soils, lifts foundations. Footings below frost mitigate. Vol 2.", "v": 5}, {"id": 5755, "domain": 1, "task": 4, "topic": "Joist Hangers", "q": "Joist hangers must be installed with:", "choices": ["Roofing nails only", "Drywall screws only", "Construction adhesive", "Manufacturer's nails"], "correct": 3, "exp": "Mfr-specified nails (typically Simpson SDS or 16d common). Roofing/drywall nails NOT acceptable. Mfr.", "v": 5}, {"id": 5756, "domain": 1, "task": 4, "topic": "Slab on Grade", "q": "A slab-on-grade foundation in cold climates requires:", "choices": ["Insulation only above", "Footings below frost", "No frost protection", "Heated subgrade only"], "correct": 1, "exp": "Turned-down edges (footings) below frost line in cold climates. Wisconsin: ~42-48 in. IRC.", "v": 5}, {"id": 5757, "domain": 1, "task": 4, "topic": "Bowed Foundation", "q": "A bowed foundation wall (>1 inch typical) indicates:", "choices": ["Cure shrinkage event", "Normal aging pattern", "Pressure exceeds capacity", "Cosmetic concern only"], "correct": 2, "exp": "Lateral pressure overcame wall capacity. Engineering eval. Carbon fiber/tiebacks/bracing options. Vol 2.", "v": 5}, {"id": 5758, "domain": 1, "task": 4, "topic": "Crawl Standing Water", "q": "Standing water in a crawl space indicates:", "choices": ["Required ventilation", "Drainage problem present", "Normal condensation", "Acceptable below 3 in"], "correct": 1, "exp": "Always a defect. Sources: poor grade, plumbing leak, condensation, water table. Causes decay. Vol 2.", "v": 5}, {"id": 5759, "domain": 1, "task": 4, "topic": "Floor Sag", "q": "A noticeably sagging floor in a residence may be caused by:", "choices": ["Decayed framing only", "Undersized members only", "Any of the above causes", "Settled supports only"], "correct": 2, "exp": "Sag causes: decay, undersized members, settled supports, removed bearing walls. Inspect from below. Vol 2.", "v": 5}, {"id": 5760, "domain": 1, "task": 4, "topic": "Crawl Vapor", "q": "A typical defect in unfinished crawl spaces is:", "choices": ["Missing soil vapor", "Insulation between joists", "Oversized floor framing", "Excessive ventilation"], "correct": 0, "exp": "Missing/inadequate soil vapor barrier (6 mil poly typical). Soil moisture drives crawl humidity. Vol 2.", "v": 5}, {"id": 5761, "domain": 1, "task": 4, "topic": "Joist Hole Max", "q": "Maximum hole diameter through a floor joist is:", "choices": ["1/2 of joist depth", "1/3 of joist depth", "1/4 of joist depth", "2/3 of joist depth"], "correct": 1, "exp": "Holes max 1/3 of joist depth. Notches more limited (1/6 outer, none middle). IRC.", "v": 5}, {"id": 5762, "domain": 1, "task": 4, "topic": "Joist Notch End", "q": "Maximum notch depth at the end of a floor joist is:", "choices": ["1/8 of joist depth", "1/3 of joist depth", "1/6 of joist depth", "1/4 of joist depth"], "correct": 3, "exp": "End: max 1/4 depth. Outer thirds: max 1/6 depth. Middle third: NO notching. IRC.", "v": 5}, {"id": 5763, "domain": 1, "task": 4, "topic": "Termite vs Carpenter", "q": "To distinguish termite from carpenter ant damage, look for:", "choices": ["Ants always larger size", "Frass vs mud tubes", "Hollow tap vs paint", "Mud tubes vs frass"], "correct": 3, "exp": "Termites: mud tubes, no frass, eat with grain. Carpenter ants: fine frass piles, smooth galleries. Vol 2.", "v": 5}, {"id": 5764, "domain": 1, "task": 5, "topic": "Service Disconnect", "q": "All electrical service to a house must be disconnectable using:", "choices": ["Unlimited disconnects", "12 or fewer total", "1 disconnect only", "6 or fewer total"], "correct": 3, "exp": "Six-disconnect rule: shut off using 6 or fewer breakers/switches/fuses. Most modern: 1 main. NEC.", "v": 5}, {"id": 5765, "domain": 1, "task": 5, "topic": "Min Service", "q": "Minimum service amperage typically considered for modern single-family home:", "choices": ["200 amps minimum", "100 amps minimum", "60 amps minimum", "400 amps minimum"], "correct": 1, "exp": "Modern min: 100 A. 200 A common with electric heat/AC/EV. 60 A often inadequate today. NEC.", "v": 5}, {"id": 5766, "domain": 1, "task": 5, "topic": "GFCI Bedroom", "q": "Which area typically requires AFCI rather than GFCI protection?", "choices": ["Bathroom receptacles", "Kitchen counter outlets", "Bedroom branch circuits", "Outdoor receptacles"], "correct": 2, "exp": "Bedrooms: AFCI typically. GFCI for bath, kitchen counter, garage, outdoor, near sinks. Some areas need both. NEC.", "v": 5}, {"id": 5767, "domain": 1, "task": 5, "topic": "AFCI Function", "q": "AFCI breakers detect electrical:", "choices": ["Arc faults waveforms", "Ground faults to earth", "Overcurrent only events", "Voltage surge spikes"], "correct": 0, "exp": "AFCI: detects high-frequency arc waveform (series or parallel arcing). Reduces electrical fires. NEC.", "v": 5}, {"id": 5768, "domain": 1, "task": 5, "topic": "GFCI Function", "q": "GFCI receptacles detect electrical:", "choices": ["Arc faults waveforms", "Voltage surge spikes", "Ground faults to earth", "Overcurrent only events"], "correct": 2, "exp": "GFCI: monitors hot-neutral imbalance (current going to ground). Trips milliseconds. Shock prevention. NEC.", "v": 5}, {"id": 5769, "domain": 1, "task": 5, "topic": "FPE Panel", "q": "Federal Pacific Stab-Lok panels are known for:", "choices": ["Premium quality bus", "Failure-to-trip rates", "Low installation cost", "Energy-efficient design"], "correct": 1, "exp": "FPE: 25-33% failure-to-trip in independent testing. Fire hazard. Recommend evaluation/replacement. Vol 1.", "v": 5}, {"id": 5770, "domain": 1, "task": 5, "topic": "Zinsco Panel", "q": "Zinsco/Sylvania panels are known for:", "choices": ["Aluminum bus oxidation", "Premium quality bus", "Low installation cost", "Energy-efficient design"], "correct": 0, "exp": "Zinsco: aluminum bus oxidation, breaker fall-out, failure to trip. Recommend evaluation/replacement. Vol 1.", "v": 5}, {"id": 5771, "domain": 1, "task": 5, "topic": "#14 AWG Amp", "q": "#14 AWG copper conductor is rated for branch circuit amperage of:", "choices": ["30 amp circuit max", "20 amp circuit max", "40 amp circuit max", "15 amp circuit max"], "correct": 3, "exp": "#14 AWG = 15 A. #12 = 20 A. #10 = 30 A. #8 = 40 A. Smaller AWG number = larger conductor. NEC.", "v": 5}, {"id": 5772, "domain": 1, "task": 5, "topic": "#12 AWG Amp", "q": "#12 AWG copper conductor is rated for branch circuit amperage of:", "choices": ["15 amp circuit max", "40 amp circuit max", "20 amp circuit max", "30 amp circuit max"], "correct": 2, "exp": "#12 AWG = 20 A. #14 = 15 A. #10 = 30 A. #8 = 40 A. Standard residential branch sizes. NEC.", "v": 5}, {"id": 5773, "domain": 1, "task": 5, "topic": "#10 AWG Amp", "q": "#10 AWG copper conductor is rated for branch circuit amperage of:", "choices": ["40 amp circuit max", "15 amp circuit max", "20 amp circuit max", "30 amp circuit max"], "correct": 3, "exp": "#10 AWG = 30 A. Common for water heaters, dryers, AC. #14 = 15. #12 = 20. NEC.", "v": 5}, {"id": 5774, "domain": 1, "task": 5, "topic": "Driveway Clearance", "q": "Service drop minimum clearance over residential driveway is:", "choices": ["8 feet over driveway", "18 feet over driveway", "12 feet over driveway", "10 feet over driveway"], "correct": 2, "exp": "12 ft over residential driveways. 18 ft over public roads. 10 ft at lowest point above grade. NEC.", "v": 5}, {"id": 5775, "domain": 1, "task": 5, "topic": "Public Road Clearance", "q": "Service drop minimum clearance over a public road is:", "choices": ["24 feet over road", "12 feet over road", "18 feet over road", "8 feet over road"], "correct": 2, "exp": "18 ft over public roads. 12 ft over residential driveways. 10 ft above grade entrance. NEC.", "v": 5}, {"id": 5776, "domain": 1, "task": 5, "topic": "Service Lateral", "q": "A service lateral refers to utility conductors that are:", "choices": ["Below-ground from main", "Above-ground from pole", "From meter to panel", "Between panel/branches"], "correct": 0, "exp": "Service lateral: BELOW ground utility conductors. Service drop: ABOVE ground. From meter is SE conductor. Vol 1.", "v": 5}, {"id": 5777, "domain": 1, "task": 5, "topic": "Service Drop", "q": "A service drop refers to utility conductors that are:", "choices": ["Below-ground from main", "From meter to panel", "Above-ground from pole", "Between panel/branches"], "correct": 2, "exp": "Service drop: ABOVE ground (pole to drip loops). Service lateral: BELOW ground. Vol 1.", "v": 5}, {"id": 5778, "domain": 1, "task": 5, "topic": "Subpanel Bonding", "q": "In a subpanel, neutrals and equipment grounds must be:", "choices": ["Both connected at box", "Bonded together always", "Floating from box", "Kept separate isolated"], "correct": 3, "exp": "Subpanel: neutrals and EGCs SEPARATE bars. Bonding only at main service. Bonded subpanel = serious defect. NEC.", "v": 5}, {"id": 5779, "domain": 1, "task": 5, "topic": "Main Bonding", "q": "In the main service equipment, neutrals and equipment grounds are:", "choices": ["Connected via fuse only", "Floating from box", "Bonded together always", "Kept separate isolated"], "correct": 2, "exp": "Main panel: neutral + grounding bus bonded (main bonding jumper). ONE bonding point. Subpanels separate. NEC.", "v": 5}, {"id": 5780, "domain": 1, "task": 5, "topic": "Ufer Conductor", "q": "A Ufer (concrete-encased) electrode is constructed using:", "choices": ["20 ft #4 rebar/Cu", "Metal water pipe", "8 ft driven steel rod", "Aluminum building frame"], "correct": 0, "exp": "Ufer: 20+ ft of #4 rebar OR #4 AWG bare Cu in 2 in concrete (footing). Best electrode typically. NEC.", "v": 5}, {"id": 5781, "domain": 1, "task": 5, "topic": "Rod Electrode", "q": "A driven ground rod must be at minimum length:", "choices": ["20 feet driven length", "5 feet driven length", "8 feet driven length", "12 feet driven length"], "correct": 2, "exp": "Driven rod: 8 ft minimum, full length below grade. Often paired with second rod (resistance test). NEC.", "v": 5}, {"id": 5782, "domain": 1, "task": 5, "topic": "GEC 200A Ufer", "q": "Grounding electrode conductor (Cu) for 200A service to a Ufer is:", "choices": ["#6 AWG copper size", "#4 AWG copper size", "#8 AWG copper size", "#10 AWG copper size"], "correct": 1, "exp": "200A service to Ufer: #4 AWG Cu. To rod: #6 (resistance limited). To water pipe: full size. NEC tables.", "v": 5}, {"id": 5783, "domain": 1, "task": 5, "topic": "Open Ground Risk", "q": "An open ground at a 3-prong receptacle creates risk because:", "choices": ["Equipment shorts to case", "Polarity becomes wrong", "Receptacle won't power", "Voltage drops too low"], "correct": 0, "exp": "Open ground: if hot wire shorts to metal case, no fault path - case stays energized. Shock hazard. NEC.", "v": 5}, {"id": 5784, "domain": 1, "task": 5, "topic": "Reverse Polarity", "q": "Reverse polarity at a receptacle means:", "choices": ["Voltage too high", "No power present", "Open ground present", "Hot/neutral are swapped"], "correct": 3, "exp": "Hot and neutral wires swapped. Equipment may operate but switched terminal becomes live. Defect. NEC.", "v": 5}, {"id": 5785, "domain": 1, "task": 5, "topic": "Backstab Defect", "q": "Backstabbed receptacles tend to fail because:", "choices": ["Voltage too high spec", "Wire size wrong", "Small contact loosens", "Plastic gets brittle"], "correct": 2, "exp": "Backstab: small contact area loosens with thermal cycling. Overheats, scorches, fails. Side screws better. Vol 1.", "v": 5}, {"id": 5786, "domain": 1, "task": 5, "topic": "Double-Tap", "q": "A double-tap (two conductors under one breaker terminal) is:", "choices": ["Required for redundancy", "Never acceptable practice", "Always acceptable", "Acceptable if listed"], "correct": 3, "exp": "Most breakers listed for ONE conductor. Specific breakers (Sq D QO split lug) listed for two. NEC.", "v": 5}, {"id": 5787, "domain": 1, "task": 5, "topic": "Tamper Resist", "q": "Tamper-resistant (TR) receptacles are required in:", "choices": ["Bathrooms only", "Service panels only", "Bedrooms only listed", "All dwelling outlets"], "correct": 3, "exp": "TR required all dwelling unit receptacles (NEC 2008+). Internal shutters block single-prong insertion. NEC.", "v": 5}, {"id": 5788, "domain": 1, "task": 5, "topic": "Aluminum Concern", "q": "Solid aluminum branch circuit wiring (1965-1973) main concern is:", "choices": ["Cannot be used now", "Termination overheating", "Rapid wire breakage", "Insufficient ampacity"], "correct": 1, "exp": "Al expands/oxidizes/creeps. Loose terminations, arcing, fire. Remediate: COPALUM or AlumiConn. Vol 1.", "v": 5}, {"id": 5789, "domain": 1, "task": 5, "topic": "K&T Concern", "q": "Active knob-and-tube wiring concerns include:", "choices": ["No equipment ground", "Brittle insulation", "No insulation contact", "All of the above issues"], "correct": 3, "exp": "K&T: brittle aged insulation, no EGC, can't contact thermal insulation, often beyond capacity. Vol 1.", "v": 5}, {"id": 5790, "domain": 1, "task": 5, "topic": "Romex Damage", "q": "NM-B cable in attics within how far of attic entry must be protected?", "choices": ["Within 3 ft of entry", "Within 6 ft of entry", "No protection required", "Within 12 ft of entry"], "correct": 1, "exp": "Within 6 ft of attic entry: must be protected (running boards or conduit). Beyond, between framing OK. NEC.", "v": 5}, {"id": 5791, "domain": 1, "task": 5, "topic": "Panel Clearance", "q": "Working clearance in front of an electrical panel is at minimum:", "choices": ["18 inches deep min", "12 inches deep min", "30 inches deep min", "36 inches deep min"], "correct": 3, "exp": "Working clear: 30 in wide, 36 in deep, 6.5 ft headroom. Cannot be obstructed. NEC.", "v": 5}, {"id": 5792, "domain": 1, "task": 5, "topic": "Panel Width Clear", "q": "Working clearance width in front of an electrical panel is:", "choices": ["18 inches wide min", "12 inches wide min", "30 inches wide min", "36 inches wide min"], "correct": 2, "exp": "Working clear: 30 in wide, 36 in deep, 6.5 ft high. Storage in front of panel is common defect. NEC.", "v": 5}, {"id": 5793, "domain": 1, "task": 5, "topic": "Color Hot", "q": "Standard residential color code for ungrounded (hot) conductor is:", "choices": ["Bare copper wire", "White wire color", "Green wire color", "Black or red wire"], "correct": 3, "exp": "Standard: black/red = hot, white = neutral, green/bare = ground. White used as hot must be re-marked. NEC.", "v": 5}, {"id": 5794, "domain": 1, "task": 5, "topic": "Color Neutral", "q": "Standard residential color code for grounded (neutral) conductor is:", "choices": ["Green wire color", "Black or red wire", "Bare copper wire", "White wire color"], "correct": 3, "exp": "White = neutral. Black/red = hot. Green/bare = ground. Re-mark white at terminations if used as hot. NEC.", "v": 5}, {"id": 5795, "domain": 1, "task": 5, "topic": "Color Ground", "q": "Standard residential color code for grounding (equipment) conductor is:", "choices": ["Yellow wire color", "White wire color", "Black or red wire", "Green or bare wire"], "correct": 3, "exp": "Green or bare copper = grounding (EGC). White = neutral. Black/red = hot. NEC.", "v": 5}, {"id": 5796, "domain": 1, "task": 5, "topic": "240V Setup", "q": "Single-phase 240/120V residential service consists of:", "choices": ["4 hots + 0 neutral", "2 hots + 1 neutral", "1 hot + 1 neutral", "3 hots + 1 neutral"], "correct": 1, "exp": "Single phase 240/120: 2 energized 120V + 1 grounded neutral. 240V between hots, 120V each to neutral. NEC.", "v": 5}, {"id": 5797, "domain": 1, "task": 5, "topic": "Three Phase", "q": "Three-phase electrical service typically applies to:", "choices": ["Apartment buildings", "Single-wide mobiles", "Most residential homes", "Commercial/industrial"], "correct": 3, "exp": "Three-phase: mostly commercial/industrial. Rare in residential inspections. Larger residential may have it. Vol 1.", "v": 5}, {"id": 5798, "domain": 1, "task": 5, "topic": "GFCI Test", "q": "GFCI receptacles should be tested for proper operation at frequency of:", "choices": ["Weekly user testing", "Annually user testing", "Daily user testing", "Monthly user testing"], "correct": 3, "exp": "Monthly testing per mfr/code. Test button confirms trip. Receptacles fail (esp. damp areas). NEC/mfr.", "v": 5}, {"id": 5799, "domain": 1, "task": 5, "topic": "Smoke Alarm Life", "q": "Smoke alarms should be replaced approximately every:", "choices": ["Every 5-7 years", "Every 1-2 years", "Every 20 years", "Every 10 years"], "correct": 3, "exp": "10 yr lifespan. Sensor degrades. Replace whole unit (not just battery). 10-yr sealed-battery models common. NFPA.", "v": 5}, {"id": 5800, "domain": 1, "task": 5, "topic": "CO Alarm Life", "q": "CO alarms should be replaced approximately every:", "choices": ["Every 1-2 years", "Every 20 years", "Every 5-7 years", "Every 10 years"], "correct": 2, "exp": "CO alarm: 5-7 yr lifespan typical. Electrochemical sensor degrades. Replace per mfr (often end-of-life chirp). NFPA.", "v": 5}, {"id": 5801, "domain": 1, "task": 5, "topic": "Bonding vs Grounding", "q": "Bonding (vs grounding) refers to:", "choices": ["Insulating from current", "Connecting to earth", "Same exact concept", "Connecting metal parts"], "correct": 3, "exp": "Bonding: low-resistance return path between metal parts. Grounding: connection to earth. Different functions. NEC.", "v": 5}, {"id": 5802, "domain": 1, "task": 5, "topic": "Service Cable Damaged", "q": "If service entrance cable insulation is damaged:", "choices": ["Recommend electrician eval", "Inspector should repair", "Standard wear pattern", "Cosmetic concern only"], "correct": 0, "exp": "Damaged SE: significant hazard (shock, fire, weather). Recommend qualified electrician eval. Don't repair. Vol 1.", "v": 5}, {"id": 5803, "domain": 1, "task": 5, "topic": "Knockout Open", "q": "An open (unfilled) knockout in an electrical panel is:", "choices": ["Required for cooling", "A premium feature", "A safety defect found", "For cable management"], "correct": 2, "exp": "Defect: access to live parts, pest entry, water entry. Fill with KO seal or proper connector. NEC.", "v": 5}, {"id": 5804, "domain": 1, "task": 5, "topic": "Junction Box", "q": "All electrical splices must be located:", "choices": ["Anywhere accessible", "Inside walls covered", "In accessible J-boxes", "Inside conduit only"], "correct": 2, "exp": "Splices in accessible junction boxes (NOT buried in walls). Wire nuts in box, blank cover. NEC.", "v": 5}, {"id": 5805, "domain": 1, "task": 5, "topic": "Cable Clamping", "q": "Cable entering a metal electrical box must be:", "choices": ["Secured with cable clamp", "Painted at entry point", "Free to move loosely", "Sealed with caulk only"], "correct": 0, "exp": "Cable clamp at metal box: prevents pull-out, protects from sharp KO edges. Plastic boxes integral. NEC.", "v": 5}, {"id": 5806, "domain": 1, "task": 5, "topic": "GFCI Downstream", "q": "To verify GFCI protection extends to downstream receptacles, you should:", "choices": ["Visual inspection only", "Test only the GFCI", "Reset breaker only first", "Trip GFCI, test down"], "correct": 3, "exp": "Plug 3-light tester at downstream, trip GFCI, confirm downstream loses power. Verifies protected zone. Vol 1.", "v": 5}, {"id": 5807, "domain": 1, "task": 5, "topic": "Disconnect AC", "q": "Outdoor AC condensing unit must have a service disconnect within:", "choices": ["Sight, within 50 ft", "Sight, within 100 ft", "No sight requirement", "Sight, within 25 ft"], "correct": 0, "exp": "Within sight AND within 50 ft of equipment. Allows safe lockout. Common defect: missing disconnect. NEC.", "v": 5}, {"id": 5808, "domain": 1, "task": 5, "topic": "Service Drop Pulled", "q": "If a service drop is pulled away from the structure, the inspector should:", "choices": ["Document and ignore", "Try to push back up", "Tape it temporarily", "Notify the utility now"], "correct": 3, "exp": "Damaged/pulled service drop: serious hazard. Don't touch. Notify utility. Document and notify owner. Vol 1.", "v": 5}, {"id": 5809, "domain": 1, "task": 13, "topic": "Egress Area Above", "q": "Bedroom egress window above grade requires net clear opening of:", "choices": ["3.0 sq ft area min", "5.0 sq ft area min", "8.0 sq ft area min", "5.7 sq ft area min"], "correct": 3, "exp": "Above-grade: 5.7 sq ft net clear. Grade-floor only: 5.0 sq ft. Plus width and height minimums. IRC.", "v": 5}, {"id": 5810, "domain": 1, "task": 13, "topic": "Egress Area Grade", "q": "Bedroom egress window at grade floor only requires net clear opening of:", "choices": ["3.0 sq ft area min", "5.0 sq ft area min", "8.0 sq ft area min", "5.7 sq ft area min"], "correct": 1, "exp": "Grade-floor only: 5.0 sq ft. Above-grade: 5.7 sq ft. Plus 20 in width, 24 in height min. IRC.", "v": 5}, {"id": 5811, "domain": 1, "task": 13, "topic": "Egress Width", "q": "Egress window minimum net clear opening width is:", "choices": ["16 inches wide min", "20 inches wide min", "24 inches wide min", "30 inches wide min"], "correct": 1, "exp": "Width: 20 in min. Combined with 24 in height min AND 5.7 sq ft area min. All must be met. IRC.", "v": 5}, {"id": 5812, "domain": 1, "task": 13, "topic": "Egress Height", "q": "Egress window minimum net clear opening height is:", "choices": ["24 inches tall min", "22 inches tall min", "30 inches tall min", "20 inches tall min"], "correct": 0, "exp": "Height: 24 in min. Combined with 20 in width min AND 5.7 sq ft area min. All required. IRC.", "v": 5}, {"id": 5813, "domain": 1, "task": 13, "topic": "Egress Sill", "q": "Maximum sill height of an egress window above the floor is:", "choices": ["44 inches above max", "60 inches above max", "24 inches above max", "36 inches above max"], "correct": 0, "exp": "Max sill: 44 in above floor. Higher requires permanent steps. Critical for child egress. IRC.", "v": 5}, {"id": 5814, "domain": 1, "task": 13, "topic": "Egress Door Width", "q": "Minimum clear width for an egress door is:", "choices": ["32 inches clear", "48 inches clear", "24 inches clear", "36 inches clear"], "correct": 0, "exp": "Egress: 32 in clear width min (typically 36 in slab). 78 in clear height. One side-hinged required. IRC.", "v": 5}, {"id": 5815, "domain": 1, "task": 13, "topic": "Egress Door Hardware", "q": "Egress door hardware must be operable from inside:", "choices": ["Without keys/tools", "With tools provided", "With keys provided", "With special knowledge"], "correct": 0, "exp": "Operable without keys, tools, or special knowledge from inside. Single-cyl deadbolt OK. Double-cyl violates. IRC.", "v": 5}, {"id": 5816, "domain": 1, "task": 13, "topic": "Garage Door 138", "q": "The door between attached garage and house must be:", "choices": ["1-3/8 in solid wood", "Hollow core type", "Standard interior door", "Glass-paneled door"], "correct": 0, "exp": "1-3/8 in solid wood OR 20-min fire-rated, with self-closing hardware. Fire separation. IRC.", "v": 5}, {"id": 5817, "domain": 1, "task": 13, "topic": "Garage Wall Drywall", "q": "Wall between attached garage and house requires:", "choices": ["No special drywall", "Brick veneer wall", "Standard 1/2 drywall", "5/8 Type X garage side"], "correct": 3, "exp": "5/8 Type X drywall garage side. Penetrations sealed. 1-hr-equivalent fire resistance. IRC.", "v": 5}, {"id": 5818, "domain": 1, "task": 13, "topic": "Garage Above", "q": "If habitable space exists above attached garage, the garage ceiling requires:", "choices": ["Standard 1/2 drywall", "Plywood sheathing only", "5/8 Type X drywall", "Open joist visible"], "correct": 2, "exp": "5/8 Type X drywall, taped/finished. Fire-rated ceiling separation. Common defect at finished room above. IRC.", "v": 5}, {"id": 5819, "domain": 1, "task": 13, "topic": "Smoke Alarm Locations", "q": "Smoke alarms are required in all of the following EXCEPT:", "choices": ["Each level basement", "Inside the kitchen", "Outside sleeping areas", "Each sleeping room"], "correct": 1, "exp": "Kitchen excluded (nuisance trip risk). Required: each bedroom, hall outside, each level. NFPA.", "v": 5}, {"id": 5820, "domain": 1, "task": 13, "topic": "Smoke Alarm Modern", "q": "Modern code typically requires smoke alarms to be:", "choices": ["Battery only operate", "Hardwired and linked", "Wifi-only connected", "Standalone independent"], "correct": 1, "exp": "Hardwired AND interconnected (one trips all sound). Battery backup required. Tamper-resistant. NFPA/IRC.", "v": 5}, {"id": 5821, "domain": 1, "task": 13, "topic": "CO Alarm Required", "q": "CO alarms are required in homes that have:", "choices": ["Kitchen with electric", "Detached garage only", "Bathroom with vent", "Fuel-burner or garage"], "correct": 3, "exp": "CO required: outside sleeping areas in homes with fuel-burning appliances OR attached garage. NFPA/IRC.", "v": 5}, {"id": 5822, "domain": 1, "task": 13, "topic": "Sprinkler Painted", "q": "A painted fire sprinkler head is:", "choices": ["Better corrosion res", "Required code item", "Acceptable decoration", "Defect, replace head"], "correct": 3, "exp": "Painted: prevents fusible element melt at rated temp, blocks deflector. Defect - replace head. NFPA 13D.", "v": 5}, {"id": 5823, "domain": 1, "task": 13, "topic": "Stair Lighting", "q": "Interior stairs require lighting that is:", "choices": ["No switches needed", "Single switch only", "Both ends switches", "Battery only acceptable"], "correct": 2, "exp": "3-way switching at top and bottom. Allows safe operation either direction. Common defect: one switch only. IRC.", "v": 5}, {"id": 5824, "domain": 1, "task": 13, "topic": "Egress Bars", "q": "Security bars on bedroom egress windows must:", "choices": ["Have inside release", "Use keyed lock only", "Be welded to wall", "Be permanently fixed"], "correct": 0, "exp": "Release from inside without keys, tools, or special knowledge. Permanent/keyed bars violate egress. IRC.", "v": 5}, {"id": 5825, "domain": 1, "task": 13, "topic": "Bath Heat Lamp", "q": "A bathroom heat lamp combined with light/fan must be:", "choices": ["Above shower zone", "Listed and installed", "Generic outlet OK", "Hardwired no GFCI"], "correct": 1, "exp": "Properly listed, GFCI protected, adequate clearances, vapor-proof if shower zone. UL/IRC.", "v": 5}, {"id": 5826, "domain": 1, "task": 13, "topic": "Pool Door", "q": "Doors leading to a pool/spa area should have:", "choices": ["Decorative latches", "Propped open", "Keyed locks only", "Self-close/latch"], "correct": 3, "exp": "Self-closing/self-latching OR audible alarm (some jurisdictions). Multiple barriers (door + fence) typical. IRC.", "v": 5}, {"id": 5827, "domain": 1, "task": 13, "topic": "Garage Floor Slope", "q": "Garage floor connecting to interior door should slope:", "choices": ["Toward overhead door", "Equal both ways", "Have no slope at all", "Toward house door"], "correct": 0, "exp": "Slope toward overhead door (away from house) OR door 4 in above OR 4-in curb. Prevents fuel/CO migration. IRC.", "v": 5}, {"id": 5828, "domain": 1, "task": 13, "topic": "Window Well Cover", "q": "An egress window well cover must:", "choices": ["Be permanent fixed", "Open from inside", "Be locked outside", "Have no openings allowed"], "correct": 1, "exp": "Operable from inside without tools, keys, or special knowledge. Otherwise violates egress life safety. IRC.", "v": 5}, {"id": 5829, "domain": 1, "task": 13, "topic": "Open Riser", "q": "Open risers on stairs higher than 30 in cannot allow passage of a:", "choices": ["12 inch sphere through", "2 inch sphere through", "6 inch sphere through", "4 inch sphere through"], "correct": 3, "exp": "4 in sphere rule (same as guard balusters). Prevents child fall hazard. Many codes prohibit open risers. IRC.", "v": 5}, {"id": 5830, "domain": 1, "task": 13, "topic": "4 in Sphere", "q": "Guardrail balusters must be spaced so what cannot pass through?", "choices": ["12 inch sphere through", "2 inch sphere through", "6 inch sphere through", "4 inch sphere through"], "correct": 3, "exp": "4 in sphere rule. Prevents children from squeezing through or getting head stuck. IRC.", "v": 5}, {"id": 5831, "domain": 1, "task": 13, "topic": "Smoke Alarm Where", "q": "Smoke alarms should be installed in:", "choices": ["Mechanical room only", "Living room only", "Kitchen near stove", "Each sleeping room"], "correct": 3, "exp": "Each sleeping room, outside sleeping areas, every level (incl. basement, habitable attic). Interconnected. NFPA.", "v": 5}, {"id": 5832, "domain": 1, "task": 13, "topic": "CO Alarm Where", "q": "CO alarms should be installed:", "choices": ["Living room only", "Outside sleeping areas", "Mechanical room only", "Kitchen near stove"], "correct": 1, "exp": "Outside each sleeping area in homes with fuel-burning or attached garage. Some codes: every level. NFPA.", "v": 5}, {"id": 5833, "domain": 1, "task": 13, "topic": "CO Symptoms", "q": "Carbon monoxide poisoning symptoms commonly include:", "choices": ["Joint pain swelling", "Skin localized burns", "Respiratory infection", "Headache nausea dizzy"], "correct": 3, "exp": "Headache, nausea, dizzy, confusion, fatigue. Severe: unconsciousness, death. Often mistaken for flu. NFPA.", "v": 5}, {"id": 5834, "domain": 1, "task": 13, "topic": "Dryer Lint", "q": "Lint accumulation in a clothes dryer vent is primarily a:", "choices": ["Normal aging item", "Improves drying speed", "Significant fire hazard", "Cosmetic concern"], "correct": 2, "exp": "Significant fire hazard: restricted airflow + ignitable lint + heat = fire. Annual cleaning min. IRC/NFPA.", "v": 5}, {"id": 5835, "domain": 1, "task": 13, "topic": "Smoke Alarm Spacing", "q": "Smoke alarms must be installed in which combination of locations?", "choices": ["Bedroom hall each-lvl", "Kitchen and entry", "Garage and basement", "Bedrooms only inside"], "correct": 0, "exp": "Each bedroom + hallway outside bedrooms + each level (incl basement, habitable attic). Interconnected. NFPA.", "v": 5}, {"id": 5836, "domain": 1, "task": 13, "topic": "Sleeping Area", "q": "An NHIE-relevant 'sleeping area' refers to:", "choices": ["Bedroom plus access", "Just the bedroom", "Living room only", "Whole upstairs floor"], "correct": 0, "exp": "Sleeping area = bedroom + its access hallway. Smoke alarms in bedroom AND outside (hall). NFPA.", "v": 5}, {"id": 5837, "domain": 1, "task": 13, "topic": "Mechanical Comb Air", "q": "Mechanical room with fuel-burning equipment requires:", "choices": ["Adequate combustion", "Carpeted floor finish", "Heated to 80°F warm", "Sealed completely room"], "correct": 0, "exp": "Adequate combustion air per BTU. Proper venting. Clearances. Working CO alarm nearby. IRC.", "v": 5}, {"id": 5838, "domain": 1, "task": 13, "topic": "Pull-Down Garage", "q": "A pull-down attic stair in attached garage ceiling can:", "choices": ["Improve attic access", "Have no fire impact", "Breach fire-rated", "Required by all codes"], "correct": 2, "exp": "Breaches fire separation between garage and habitable space above. Use fire-rated stair products. IRC.", "v": 5}, {"id": 5839, "domain": 1, "task": 12, "topic": "Hearth Large", "q": "Masonry fireplace hearth extension for openings ≥6 sq ft is:", "choices": ["24 inches front, 16 sides", "12 inches front, 8 sides", "20 inches front, 12 sides", "16 inches front, 8 sides"], "correct": 2, "exp": "≥6 sq ft opening: 20 in front, 12 in each side. <6 sq ft: 16 in front, 8 in side. IRC.", "v": 5}, {"id": 5840, "domain": 1, "task": 12, "topic": "Hearth Small", "q": "Masonry fireplace hearth extension for openings <6 sq ft is:", "choices": ["24 inches front, 16 sides", "16 inches front, 8 sides", "12 inches front, 8 sides", "20 inches front, 12 sides"], "correct": 1, "exp": "<6 sq ft: 16 in front, 8 in each side. ≥6 sq ft: 20 in front, 12 in side. IRC.", "v": 5}, {"id": 5841, "domain": 1, "task": 12, "topic": "3-2-10 Above", "q": "A chimney must extend above the roof at penetration at minimum:", "choices": ["1 foot above roof", "3 feet above roof", "2 feet above roof", "4 feet above roof"], "correct": 1, "exp": "3-2-10 rule: 3 ft above roof at penetration. AND 2 ft above any portion within 10 ft horizontally. NFPA 211.", "v": 5}, {"id": 5842, "domain": 1, "task": 12, "topic": "3-2-10 Within", "q": "A chimney must extend above any portion of building within 10 ft at minimum:", "choices": ["2 feet above point", "3 feet above point", "4 feet above point", "1 foot above point"], "correct": 0, "exp": "3-2-10 rule: 2 ft above any building portion within 10 ft horizontally. AND 3 ft above roof penetration. NFPA 211.", "v": 5}, {"id": 5843, "domain": 1, "task": 12, "topic": "Cricket Width", "q": "A roof cricket (saddle) is required for chimneys wider than:", "choices": ["48 inches wide", "12 inches wide", "30 inches wide", "24 inches wide"], "correct": 2, "exp": "Cricket required for chimneys >30 in wide (measured perpendicular to slope). Diverts water. IRC.", "v": 5}, {"id": 5844, "domain": 1, "task": 12, "topic": "Spark Arrestor", "q": "A spark arrestor on a chimney is intended to:", "choices": ["Reduce creosote buildup", "Decorate the cap", "Block embers exit", "Improve draft updraft"], "correct": 2, "exp": "Spark arrestor: mesh prevents embers leaving (igniting roofs/vegetation). Often combined with rain cap. NFPA 211.", "v": 5}, {"id": 5845, "domain": 1, "task": 12, "topic": "Stage I Creo", "q": "Stage I (first degree) creosote in chimney appearance:", "choices": ["Light flaky brown", "Hard shiny glaze", "Wet liquid black", "Heavy tar-like dark"], "correct": 0, "exp": "Stage I: flaky brown/black ash, easy to remove, least flammable. Stage II: tar-like. Stage III: hard glaze. NFPA.", "v": 5}, {"id": 5846, "domain": 1, "task": 12, "topic": "Stage II Creo", "q": "Stage II (second degree) creosote in chimney appearance:", "choices": ["Heavy tar-like dark", "Wet liquid black", "Hard shiny glaze", "Light flaky brown"], "correct": 0, "exp": "Stage II: heavy tar-like dark deposit. More flammable, harder to remove than Stage I. NFPA 211.", "v": 5}, {"id": 5847, "domain": 1, "task": 12, "topic": "Stage III Creo", "q": "Stage III (third degree) creosote in chimney appearance:", "choices": ["Light flaky brown", "Wet liquid black", "Hard shiny glaze", "Heavy tar-like dark"], "correct": 2, "exp": "Stage III: hard, shiny glaze. Highly flammable, very difficult to remove. May need flue replacement. NFPA.", "v": 5}, {"id": 5848, "domain": 1, "task": 12, "topic": "Smoke Chamber", "q": "The smoke chamber in a fireplace is located:", "choices": ["Above damper, below flue", "In firebox bottom", "At hearth level", "At chimney top"], "correct": 0, "exp": "Smoke chamber: above damper, transitions firebox to flue. Should be parged smooth (modern code). IRC.", "v": 5}, {"id": 5849, "domain": 1, "task": 12, "topic": "Damper Location", "q": "The damper in a traditional masonry fireplace is located:", "choices": ["At chimney top", "At the hearth level", "In smoke shelf area", "Above firebox throat"], "correct": 3, "exp": "Damper: above firebox at throat. Closed when not in use. Top-sealing dampers (chimney top) seal better. NFPA.", "v": 5}, {"id": 5850, "domain": 1, "task": 12, "topic": "Gas Damper Stop", "q": "A gas log set in a masonry fireplace requires the damper to be:", "choices": ["Permanently stopped", "Removed entirely", "Operating freely", "Closed when off"], "correct": 0, "exp": "Damper locked open OR damper stop ensuring partial opening. Otherwise CO can be trapped indoors. NFPA.", "v": 5}, {"id": 5851, "domain": 1, "task": 12, "topic": "Direct Vent FP", "q": "A direct-vent gas fireplace appliance is characterized by:", "choices": ["No vent system", "Standard chimney use", "Sealed combustion", "Open to room air"], "correct": 2, "exp": "Direct vent: sealed combustion (concentric pipes - inner exhaust, outer intake). Through-wall typical. NFPA.", "v": 5}, {"id": 5852, "domain": 1, "task": 12, "topic": "Vent-Free", "q": "A vent-free gas appliance is characterized by:", "choices": ["Uses outside air", "Standard chimney", "Sealed combustion", "Combustion in room"], "correct": 3, "exp": "Vent-free: no flue, all combustion products into room. Banned in some jurisdictions (Canada). IAQ concern. NFPA.", "v": 5}, {"id": 5853, "domain": 1, "task": 12, "topic": "Wood Stove Standard", "q": "A wood stove without listed reduced clearance requires clearance of:", "choices": ["36 inches all sides", "12 inches all sides", "48 inches all sides", "18 inches all sides"], "correct": 0, "exp": "36 in to combustibles unless tested/listed for less. Many UL-listed allow reduced (12-18 in). NFPA 211.", "v": 5}, {"id": 5854, "domain": 1, "task": 12, "topic": "Pellet Stove", "q": "A pellet stove is characterized by:", "choices": ["Burns natural gas", "Burns wood pellets", "Burns kerosene oil", "Electric resistance"], "correct": 1, "exp": "Pellet stove: burns compressed wood/biomass pellets via auger/fan. Higher efficiency than logs. NFPA.", "v": 5}, {"id": 5855, "domain": 1, "task": 12, "topic": "Mfd Fireplace", "q": "A factory-built (zero-clearance) fireplace consists of:", "choices": ["Pre-assembled metal", "Sheet metal liner", "Concrete block fire", "Solid masonry only"], "correct": 0, "exp": "Manufactured: pre-assembled metal firebox/chimney, listed as system. Can't mix brands. NFPA 211.", "v": 5}, {"id": 5856, "domain": 1, "task": 12, "topic": "Chimney Crown", "q": "The chimney crown is the:", "choices": ["Decorative top cap", "Base of the chimney", "Inner flue lining", "Top sloped surface"], "correct": 3, "exp": "Crown: sloped concrete top of chimney mass that sheds water. Cracks = water entry, deterioration. NFPA.", "v": 5}, {"id": 5857, "domain": 1, "task": 12, "topic": "Liner Required", "q": "A masonry chimney serving a fireplace requires an interior:", "choices": ["Pebble bed only", "No liner needed code", "Open masonry only", "Clay or stainless"], "correct": 3, "exp": "Flue liner: clay tile (traditional) or stainless steel (retrofit). Without: gas attack, water entry, CO leak. IRC.", "v": 5}, {"id": 5858, "domain": 1, "task": 12, "topic": "NFPA 211", "q": "NFPA 211 is the standard for:", "choices": ["Chimneys/fireplaces", "Plumbing systems code", "Electrical wiring code", "HVAC mechanical code"], "correct": 0, "exp": "NFPA 211: chimneys, fireplaces, vents, solid fuel appliances. Level 2 inspection at every property transfer. NFPA.", "v": 5}, {"id": 5859, "domain": 1, "task": 12, "topic": "Soot Stains Ext", "q": "Soot stains on the exterior of a chimney indicate:", "choices": ["Improved draft pattern", "Normal operation", "Good seal interior", "Possible flue gas"], "correct": 3, "exp": "Exterior soot: possible flue gas leak through cracks. Recommend Level 2 chimney inspection. NFPA.", "v": 5}, {"id": 5860, "domain": 1, "task": 12, "topic": "Combustion Air Tight", "q": "Tight modern homes with masonry fireplaces typically require:", "choices": ["Outside combustion", "Indoor air for fire", "No combustion air", "Forced air vent only"], "correct": 0, "exp": "Tight homes: outside combustion air ducted to firebox. Avoids depressurization, improves performance. IRC.", "v": 5}, {"id": 5861, "domain": 1, "task": 12, "topic": "Damper Rusted", "q": "A fireplace damper that is rusted shut or non-functional is:", "choices": ["Defect, repair it", "Decorative only feature", "Acceptable as found", "Required for energy"], "correct": 0, "exp": "Non-functional damper: defect. Can't close (heat loss) or fully open (poor draft). Repair or top-seal. NFPA.", "v": 5}, {"id": 5862, "domain": 1, "task": 12, "topic": "Hearth Material", "q": "Hearth and hearth extension must be constructed of:", "choices": ["Carpet only floor", "Wood with paint", "Non-combustible mat", "Plywood with tile"], "correct": 2, "exp": "Non-combustible: masonry, tile, stone, metal. Wood/carpet under raised hearth = serious fire hazard. IRC.", "v": 5}, {"id": 5863, "domain": 1, "task": 12, "topic": "Mfd Mix Brands", "q": "Mixing different brands in a manufactured fireplace system is:", "choices": ["Standard practice now", "Improves quality", "Unsafe, voids list", "Required for upgrade"], "correct": 2, "exp": "Manufactured fireplace: tested as system. Mixing brands voids listing, unsafe. Match parts. NFPA.", "v": 5}, {"id": 5864, "domain": 1, "task": 12, "topic": "Chimney Flashing", "q": "Chimney flashing typically consists of:", "choices": ["Single wrapped piece", "Tar applied only", "Caulk applied only", "Step + base flash"], "correct": 3, "exp": "Step flashing sides + base flashing front. Saddle (cric
