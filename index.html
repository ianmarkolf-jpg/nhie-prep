c":"Floor Joist Notching","q":"A wood floor joist may be notched in the outer third of span by no more than:","choices":["1/4 of joist depth","1/6 of joist depth","1/2 of joist depth","Notching never permitted"],"correct":1,"exp":"Floor joist notching: outer thirds only, max 1/6 of depth. Holes: max 1/3 of depth, at least 2 inches from edges. Middle third (high stress): NO notching, holes only. Common defect when plumbers/electricians cut joists.","v":3},{"id":647,"domain":1,"task":4,"topic":"Joist Hole","q":"Holes in floor joists must be:","choices":["Anywhere","At least 2 inches from edge, max 1/3 of joist depth","Only at the ends","Tight to the edge"],"correct":1,"exp":"Joist holes: at least 2 inches from top or bottom edge, max 1/3 of joist depth. Holes are less damaging than notches because they don't reduce cross-section in tension/compression as much. Position matters.","v":3},{"id":648,"domain":1,"task":4,"topic":"Joist Middle Third","q":"In the middle third of a floor joist span:","choices":["Notches and holes both allowed","Notches NOT allowed; holes are","Holes prohibited","Free to cut anything"],"correct":1,"exp":"Middle third = high bending stress. NO notching allowed (notch reduces tension fiber). Holes acceptable (less impact). Outer third: notching limited to 1/6 of depth. End: limited notching to 1/4 of depth.","v":3},{"id":649,"domain":1,"task":4,"topic":"Truss Modification","q":"Modifying a roof truss (cutting a member, removing a chord) is:","choices":["Acceptable","Never acceptable without engineered replacement design","Required for storage","Common practice"],"correct":1,"exp":"Trusses are engineered systems - every member sized and connected for the load. Cutting or removing any member without engineered repair compromises the entire truss. Common defect during attic remodels, HVAC retrofits.","v":3},{"id":650,"domain":1,"task":4,"topic":"I-Joist Flange","q":"Engineered I-joist flanges:","choices":["Can be cut/notched freely","Cannot be cut/notched - structural failure risk","Can be drilled through","Can be modified up to 1/3"],"correct":1,"exp":"I-joists: NEVER cut/notch flanges (top or bottom). Holes only in webs, following manufacturer specs. Use manufacturer span tables. Cutting flanges = catastrophic failure. Common defect when plumbers/HVAC cut.","v":3},{"id":651,"domain":1,"task":4,"topic":"Glulam","q":"Glulam beam is:","choices":["Glue-laminated dimensional lumber assembled into larger beam","Glued surface treatment","Laminated veneer lumber","Solid sawn lumber"],"correct":0,"exp":"Glulam (glued-laminated timber): dimensional lumber laminated with structural adhesive into larger beams or arches. Allows long spans, curved shapes. Different from LVL (veneers) and PSL (parallel strands).","v":3},{"id":652,"domain":1,"task":4,"topic":"LVL","q":"LVL stands for:","choices":["Layered Vinyl Lumber","Laminated Veneer Lumber","Light Vibration Limit","Long Vertical Load"],"correct":1,"exp":"Laminated Veneer Lumber: thin wood veneers (1/8 to 1/16 inch) glued together with grain in same direction. Used as headers, beams, rim boards. Stronger and more uniform than dimensional lumber.","v":3},{"id":653,"domain":1,"task":4,"topic":"Cripple Wall","q":"A cripple wall is:","choices":["Wall with structural defects","Short framed wall between foundation top and first floor","Wall with knee braces","Non-bearing partition"],"correct":1,"exp":"Cripple wall: short stud wall between foundation top and first floor. Common in homes with crawl space, partial basement. Vulnerable to lateral failure in seismic events. Bracing/sheathing recommended in seismic zones.","v":3},{"id":654,"domain":1,"task":4,"topic":"Knee Wall","q":"A knee wall is:","choices":["Interior partial-height wall, often in finished attic spaces","Less than 2 feet tall","Retaining wall","Basement wall"],"correct":0,"exp":"Knee walls: interior partial-height walls. Common in finished attics where roof slope meets floor. Define usable space, often house storage. Insulation/air sealing at knee walls is frequent defect (top, sides, bypass cavities).","v":3},{"id":655,"domain":1,"task":4,"topic":"Beam Bearing Masonry","q":"A wood beam bearing on masonry or concrete should have:","choices":["Direct full contact","At least 1/2 inch air space at sides and end where embedded","Sealed in concrete","Plastic membrane"],"correct":1,"exp":"Wood beam embedded in masonry: 1/2 inch air space sides and end (if not pressure-treated). Prevents moisture trapping and decay. Better practice: bear on steel column/pier with airspace. Common defect: beams embedded with no airspace, rotted ends.","v":3},{"id":656,"domain":1,"task":4,"topic":"Wood Decay Threshold","q":"Wood decay (rot) requires moisture content above approximately:","choices":["5%","10%","20%","50%"],"correct":2,"exp":"Decay fungi require wood moisture above ~20% (some species above 28%). Below this threshold, too dry for fungal growth. Moisture meters help confirm whether wood has been actively wet. Critical threshold for inspectors.","v":3},{"id":657,"domain":1,"task":4,"topic":"Termite Indicators","q":"Subterranean termite activity indicators include:","choices":["Mud tubes on foundation","Hollowed wood with frass","Wood that sounds hollow when tapped","All of the above"],"correct":3,"exp":"Termites build mud tubes for moisture/protection between soil and wood. Damaged wood hollowed along grain. Frass (droppings) more typical of drywood termites and carpenter ants. Wisconsin has subterranean termites.","v":3},{"id":658,"domain":1,"task":4,"topic":"Carpenter Ant vs Termite","q":"Carpenter ants compared to subterranean termites:","choices":["Eat wood for nutrition","Excavate wood for nesting but do not eat it","Build mud tubes","Are not in WI"],"correct":1,"exp":"Carpenter ants excavate wood for nests (typically moist or decayed wood) but DO NOT eat it - push out frass like fine sawdust with insect parts. Termites consume wood. Both indicate likely moisture problem.","v":3},{"id":659,"domain":1,"task":4,"topic":"Header Sizing","q":"A header above a window or door opening must be sized based on:","choices":["Aesthetic preference","Span and load it carries","Cost of lumber","Wall width"],"correct":1,"exp":"Header sizing: based on span (opening width) and load (roof, floor, wall above). Span tables in IRC provide minimum sizes for typical loads. Improper headers cause sagging and cracking above openings.","v":3},{"id":660,"domain":1,"task":4,"topic":"Sill Plate","q":"The sill plate is:","choices":["Top member of a wall","Bottom horizontal member resting on the foundation","Center support beam","Diagonal brace"],"correct":1,"exp":"Sill plate: bottom horizontal member resting on the foundation, anchored with anchor bolts. Pressure-treated typical (in contact with concrete/masonry). Studs frame up from the sill.","v":3},{"id":661,"domain":1,"task":4,"topic":"Foundation Crack Width","q":"Foundation cracks should be measured and:","choices":["Ignored if under 1 inch","Documented for size, location, age - monitor over time","Patched immediately","Sealed with caulk only"],"correct":1,"exp":"Crack documentation: size (width, length), location, orientation (horizontal/vertical/diagonal), age (clean vs weathered), active vs old (clean edges suggest active). Monitor over time. Engineer evaluation if active or significant.","v":3},{"id":662,"domain":1,"task":4,"topic":"Slab On Grade","q":"A slab-on-grade foundation:","choices":["Has separate basement","Single concrete slab acting as floor and foundation","Always has steel rebar","Cannot be in cold climates"],"correct":1,"exp":"Slab-on-grade: single concrete slab serving as floor and foundation. Footings (turned-down edges) extend below frost line in cold climates. Used everywhere with proper design (insulation, frost protection).","v":3},{"id":663,"domain":1,"task":4,"topic":"Crawl Space Defect","q":"A typical defect with crawl spaces is:","choices":["Lack of vapor retarder on soil","Standing water","Insufficient access","All of the above"],"correct":3,"exp":"Crawl space defects: missing/inadequate vapor retarder, standing water, inadequate ventilation OR (newer thinking) too much vent in humid climates, inadequate access (18x24 minimum), earth-to-wood contact, decayed framing.","v":3},{"id":664,"domain":1,"task":4,"topic":"Crawl Access","q":"Minimum unobstructed crawl space access size is:","choices":["12 x 12 inches","16 x 24 inches","18 x 24 inches","24 x 36 inches"],"correct":2,"exp":"Crawl access minimum: 18 x 24 inches (per IRC). Through-floor access: 18 x 24 with proper hatch. Actual access often blocked by ducts, plumbing, debris - inspect actual passable space.","v":3},{"id":665,"domain":1,"task":4,"topic":"Truss Lift","q":"Truss uplift is observed as:","choices":["Cosmetic gap at top of interior partitions in winter","Roof leaks","Foundation settlement","HVAC failure"],"correct":0,"exp":"Truss uplift: in winter, attic chord moisture differential causes truss to bow upward, lifting the bottom chord (and ceiling drywall) at interior partitions. Cosmetic concern. Specific clip details mitigate.","v":3},{"id":666,"domain":1,"task":4,"topic":"Floor Sag","q":"A noticeably sagging floor in a residence may indicate:","choices":["Decayed/damaged framing","Undersized framing","Settled supporting columns","Any of the above"],"correct":3,"exp":"Floor sag causes: decay/damage from moisture or insects, undersized members for load, settlement of supporting columns/piers, or removal of bearing walls. Investigate from below in basement/crawl.","v":3},{"id":667,"domain":1,"task":4,"topic":"Foundation Type Slab Defect","q":"Common defects in slab-on-grade foundations include:","choices":["Cracks","Uneven slab","Visible water staining indicating moisture","All of the above"],"correct":3,"exp":"Slab defects: cracks (shrinkage, settlement, expansive soils), uneven slabs, water staining indicating moisture migration through slab (often missing/poor vapor retarder beneath), cold floors from inadequate insulation.","v":3},{"id":668,"domain":1,"task":4,"topic":"Standing Water Crawl","q":"Standing water in a crawl space indicates:","choices":["Normal moisture migration","Drainage or grading problem requiring correction","No concern under 3 inches","Required for ventilation"],"correct":1,"exp":"Standing water in crawl: always a defect. Sources: poor exterior grade, plumbing leaks, condensation, high water table. Requires source identification. Can lead to structural decay, pest issues, indoor air quality problems, mold.","v":3},{"id":669,"domain":1,"task":4,"topic":"Joist Hangers","q":"Joist hangers should be:","choices":["Painted to match decor","Properly sized for the joist, with all required nails installed","Optional","Glued only"],"correct":1,"exp":"Joist hangers: sized for joist, ALL holes filled with manufacturer-specified nails (often Simpson SDS or 16d common, never roofing nails or drywall screws). Common defect: missing nails, wrong nails, undersized hangers.","v":3},{"id":670,"domain":1,"task":4,"topic":"Header Bearing","q":"A header above an opening must have proper bearing length on:","choices":["Plywood","Trimmer studs (jack studs) extending to the bottom plate","Cripples only","Drywall"],"correct":1,"exp":"Header bearing: trimmer studs (jacks) below header at each end, full height to bottom plate, transferring load to foundation. King studs full height beside trimmers tie wall together. Header without proper bearing = sagging.","v":3},{"id":671,"domain":1,"task":5,"topic":"OPD Definition","q":"An overcurrent protection device (OPD) is:","choices":["A grounding component","A fuse or circuit breaker that interrupts current when set value is exceeded","A bonding component","A test instrument"],"correct":1,"exp":"Per Vol 1: OPD = fuse or circuit breaker. Interrupts flow when set current exceeded (overload) or short circuit detected. Prevents conductors and devices from overheating. Different from grounding/bonding components.","v":3},{"id":672,"domain":1,"task":5,"topic":"Service Entrance Conductors","q":"Service entrance conductors are:","choices":["Branch circuits","Conductors between the service drop/lateral and the service equipment","Conductors inside the panel","Grounding electrode conductor"],"correct":1,"exp":"Per Vol 1: SE conductors run from service point (where utility ends) to service equipment. Carry full service amperage. Must be properly sized for the service.","v":3},{"id":673,"domain":1,"task":5,"topic":"Service Point","q":"The service point is:","choices":["Always at the meter","Where service drop/lateral conductors end and house service entrance conductors begin (often at drip loops for service drops)","Inside the panel","At the outlet"],"correct":1,"exp":"Per Vol 1: service point = where utility's wires end and house's wires begin. For overhead: usually at drip loops. For underground: more difficult to distinguish, often at meter. Distinguishes utility vs homeowner responsibility.","v":3},{"id":674,"domain":1,"task":5,"topic":"Six Disconnect Rule","q":"All electricity must be capable of being shut off using how many disconnects?","choices":["1","6 or fewer","12 or fewer","Unlimited"],"correct":1,"exp":"Per Vol 1: all electricity must shut off using 6 or fewer breakers/switches/fuses. Most modern panels have single main breaker. Older systems may have multiple disconnects (range, water heater, AC, main) up to 6 total.","v":3},{"id":675,"domain":1,"task":5,"topic":"Service Drop Definition","q":"Service drop refers to:","choices":["Overhead utility wires from transformer to house","Underground utility wires","Wires inside the house","Wires from meter to panel"],"correct":0,"exp":"Per Vol 1: service drop = ABOVE-ground utility conductors between transformer and house. Service lateral = BELOW ground. Distinguishing terminology matters for inspection focus areas.","v":3},{"id":676,"domain":1,"task":5,"topic":"GFCI Function","q":"A GFCI (ground-fault circuit interrupter):","choices":["Detects overcurrent","Monitors imbalance between hot and neutral current; trips on ground fault detection","Provides surge protection","Bonds metal"],"correct":1,"exp":"Per Vol 1: GFCI monitors current imbalance between hot and neutral. Imbalance = current flowing somewhere it shouldn't (potentially through person to ground). Trips in milliseconds. Different from circuit breaker (overcurrent only).","v":3},{"id":677,"domain":1,"task":5,"topic":"GFCI Locations","q":"GFCI protection is required for receptacles in all of the following EXCEPT:","choices":["Bathrooms","Kitchen counters","Bedroom receptacles","Garages"],"correct":2,"exp":"GFCI required: bathrooms, kitchen counters, garages, outdoors, crawls, unfinished basements, near sinks. Bedrooms typically require AFCI (different protection). Newer codes expanding GFCI to most areas.","v":3},{"id":678,"domain":1,"task":5,"topic":"AFCI Function","q":"An AFCI (arc-fault circuit interrupter) detects:","choices":["Ground faults","Arc faults (high-frequency waveform of arcing)","Overcurrent only","Voltage surges"],"correct":1,"exp":"AFCI detects characteristic high-frequency waveform of arcing - whether series (loose connection) or parallel (insulation breakdown). Reduces fires from electrical arcs. Required at the breaker.","v":3},{"id":679,"domain":1,"task":5,"topic":"AFCI Locations","q":"AFCI protection is required in:","choices":["Bedroom circuits (and increasingly most living areas)","Bathrooms only","Detached garages","Service panels only"],"correct":0,"exp":"AFCI: bedrooms (since 2002), expanded to most living areas in newer codes - kitchen, family room, dining, hallway, laundry. Detects arcing faults. Required at the breaker, not the receptacle.","v":3},{"id":680,"domain":1,"task":5,"topic":"Grounding Electrode","q":"Common grounding electrodes include all EXCEPT:","choices":["20 ft of #4 rebar in concrete (Ufer)","Driven rod 8 ft into ground","Metal water service pipe in 10 ft earth contact","PVC sewer pipe"],"correct":3,"exp":"Per Vol 1: PVC is non-conductive - cannot be grounding electrode. Acceptable: Ufer, driven rod (8 ft min), metal water pipe with 10 ft earth contact, metal building structure. New construction often uses multiple electrodes.","v":3},{"id":681,"domain":1,"task":5,"topic":"Ufer Ground Composition","q":"A Ufer ground consists of:","choices":["Metal water pipe","20 feet of #4 rebar or #4 AWG bare copper encased in concrete","Steel rod in soil","Aluminum frame"],"correct":1,"exp":"Ufer (concrete-encased electrode): 20+ ft of #4 rebar OR #4 AWG bare copper encased in 2 inches of concrete in the footing. Generally most effective grounding electrode (high surface area, good ground contact via concrete).","v":3},{"id":682,"domain":1,"task":5,"topic":"Bonding vs Grounding","q":"Bonding (vs grounding):","choices":["Same thing","Connecting metal components together for low-resistance return path","Connecting to earth only","Insulating wires"],"correct":1,"exp":"Bonding = connecting metal components for low-resistance return if energized. Grounding = connecting to earth (acts as voltage surge dissipation). Different functions, often confused. Both safety systems.","v":3},{"id":683,"domain":1,"task":5,"topic":"Subpanel Bonding","q":"In a subpanel, neutrals and equipment grounding conductors should be:","choices":["Bonded together as in main","Kept separate (isolated neutrals from grounds)","Both connected to box","Not present at all"],"correct":1,"exp":"Subpanel: neutrals and EGCs MUST be on separate, isolated bars. Bonding only at main service. Bonded neutrals at subpanel cause current flow on grounding paths - serious safety defect. Common in older or DIY installations.","v":3},{"id":684,"domain":1,"task":5,"topic":"Service Equipment Bonding","q":"At the service equipment (main panel):","choices":["Neutrals and grounds bonded together","Always isolated","Never bonded","Only neutrals present"],"correct":0,"exp":"Main panel: neutral and grounding bus bonded - typically via main bonding jumper screw. ONE point of bonding. Downstream subpanels keep them separate. Critical: only ONE main bonding point in the system.","v":3},{"id":685,"domain":1,"task":5,"topic":"Federal Pacific","q":"Federal Pacific Stab-Lok panels are known for:","choices":["Premium quality","High failure-to-trip rates posing fire hazards","Low cost only","Quiet operation"],"correct":1,"exp":"FPE Stab-Lok: documented failure-to-trip rates 1 in 4 to 1 in 3 in independent testing. Should be flagged for replacement. Same family of concerns: Zinsco/Sylvania, Pushmatic. Insurance implications often.","v":3},{"id":686,"domain":1,"task":5,"topic":"Zinsco","q":"Zinsco/Sylvania panels suffer from:","choices":["Premium quality","Aluminum bus oxidation, breaker failures, fire hazards","Energy efficiency","No special concerns"],"correct":1,"exp":"Zinsco panels (also Sylvania-Zinsco, GTE-Sylvania): aluminum bus oxidation, breakers fall out of position, breaker failure to trip. Should be flagged for replacement. Major liability concern.","v":3},{"id":687,"domain":1,"task":5,"topic":"AWG Smallest","q":"The smallest wire gauge typically used in residential branch circuit wiring is:","choices":["#10 AWG","#12 AWG","#14 AWG","#16 AWG"],"correct":2,"exp":"#14 AWG: smallest residential branch circuit wire (15 amp). #12 AWG = 20 amp. #10 = 30 amp. AWG: smaller number = larger wire diameter. 4/0 is among largest in residential service.","v":3},{"id":688,"domain":1,"task":5,"topic":"Aluminum Concern","q":"Solid-conductor aluminum branch circuit wiring concerns include:","choices":["Insufficient capacity","Connections can loosen and overheat at terminations (fire hazard)","Cannot be used at all","No longer manufactured"],"correct":1,"exp":"Aluminum expands/contracts more than copper, oxidizes, creeps under pressure. Loose connections, arcing, fire. Used 1965-1973 era. Remediation: COPALUM crimps or AlumiConn connectors at all terminations.","v":3},{"id":689,"domain":1,"task":5,"topic":"Knob and Tube","q":"Knob and tube wiring concerns:","choices":["Brittle insulation, no equipment ground, prohibits insulation contact","Modern code-compliant","Always unsafe","Only in basements"],"correct":0,"exp":"K&T (1880s-1940s): brittle insulation with age, no equipment ground (only 2-conductor), prohibits direct insulation contact (heat dissipates from wire). Many insurers won't insure homes with active K&T. Selective replacement common.","v":3},{"id":690,"domain":1,"task":5,"topic":"Service Amperage Modern","q":"Minimum service amperage typically considered for single-family residence today:","choices":["60 amps","100 amps","200 amps","400 amps"],"correct":1,"exp":"Modern minimum: 100 amps. 200 amps more common with electric heat, AC, EV chargers. 60-amp services exist in older homes but typically inadequate for modern loads. Service upgrade common in older home renovations.","v":3},{"id":691,"domain":1,"task":5,"topic":"Romex","q":"Non-metallic sheathed cable (NM-B, Romex):","choices":["Wet locations OK","Indoor dry locations only, must be protected from physical damage","Same as armored cable","Can be exposed in attics directly"],"correct":1,"exp":"NM-B: indoor dry locations only. Must be protected from physical damage (within 6 ft of attic entry, in walls, etc.). Wet locations require UF (underground feeder) or conduit. Common code violations: exposed Romex in damp areas.","v":3},{"id":692,"domain":1,"task":5,"topic":"Junction Box","q":"All electrical splices must be:","choices":["In accessible junction boxes","Buried in walls","Wrapped with electrical tape","Soldered"],"correct":0,"exp":"All splices/connections must be in approved junction boxes that remain accessible (NOT buried in walls). Wire nuts inside boxes; box covered with blank cover or fixture. Concealed splices: serious defect.","v":3},{"id":693,"domain":1,"task":5,"topic":"Cable Clamping","q":"Cable entering a metal box must be:","choices":["Free to move","Secured with a cable clamp at the box","Sealed with caulk","Painted"],"correct":1,"exp":"Cables entering metal boxes need cable clamps - prevents cable being pulled out, protects against sharp knockout edges. Plastic boxes typically have integral clamps. Common defect: missing or inadequate clamping.","v":3},{"id":694,"domain":1,"task":5,"topic":"Service Drop Driveway","q":"An overhead service drop must maintain minimum clearance over a residential driveway of:","choices":["8 feet","10 feet","12 feet","18 feet"],"correct":2,"exp":"Service drop clearances: 12 ft over residential driveways, 18 ft over public roads, 10 ft at lowest point above grade for residential entrance. Lower clearances are significant defect.","v":3},{"id":695,"domain":1,"task":5,"topic":"Reverse Polarity","q":"Reverse polarity at a receptacle means:","choices":["Hot and neutral are swapped","Receptacle is inoperable","Ground is missing","DC instead of AC"],"correct":0,"exp":"Reverse polarity: hot and neutral conductors swapped at the receptacle. Common defect, especially with backstabbed connections. Equipment may operate but creates shock hazard - the switched terminal becomes live.","v":3},{"id":696,"domain":1,"task":5,"topic":"Open Ground","q":"An open ground at a 3-prong receptacle:","choices":["Fine if polarity correct","Eliminates safety benefit of grounded equipment - shock hazard if hot wire shorts to metal case","Improves operation","Causes flickering"],"correct":1,"exp":"Open ground means EGC isn't connected. Equipment works, but if hot wire shorts to metal case, no path to clear fault. 2-prong receptacles can be replaced with GFCI-protected 3-prong without retrofitting ground (with required labeling).","v":3},{"id":697,"domain":1,"task":5,"topic":"Backstab Defect","q":"A backstabbed receptacle:","choices":["Connected via push-in holes on back","Tends to fail with thermal cycling - loose contact, overheating, scorching","Both A and B","Preferred for high current"],"correct":2,"exp":"Backstab: push-in holes on the back. Notorious for failing - small contact area loosens with thermal cycling, overheating, intermittent operation. Side terminal screw connections more reliable.","v":3},{"id":698,"domain":1,"task":5,"topic":"Open Knockout","q":"An open knockout in an electrical panel is:","choices":["Required for ventilation","A safety defect (access to live parts, pest entry)","Used for cable management","Premium feature"],"correct":1,"exp":"Open knockouts: serious safety defect. Allow contact with energized parts, entry for pests/debris, water entry. Must be filled with KO seal/plug or with appropriate connector if cable passes through.","v":3},{"id":699,"domain":1,"task":5,"topic":"Double Tap","q":"A double-tap (two conductors under one breaker terminal) is:","choices":["Acceptable in all panels","A defect unless breaker specifically listed for two conductors","Required for redundancy","Only for aluminum"],"correct":1,"exp":"Most breakers listed for ONE conductor. Some specific breakers (Square D QO with split lug, certain Cutler-Hammer/Eaton) listed for two. Otherwise: defect. Common in older homes during circuit additions.","v":3},{"id":700,"domain":1,"task":5,"topic":"Tamper Resistant","q":"Tamper-resistant receptacles (TR):","choices":["Required in all new dwelling unit receptacles","Required only in bedrooms","Have built-in shutters that block single-prong insertion","Both A and C"],"correct":3,"exp":"TR receptacles: required in all new dwelling unit receptacles. Internal shutters block insertion of single objects (children's hairpin). Both prongs must insert simultaneously. Code requirement since 2008 NEC update.","v":3},{"id":701,"domain":1,"task":5,"topic":"GFCI Test Frequency","q":"Recommended GFCI testing frequency:","choices":["Once per decade","Annually","Monthly (per manufacturer/code recommendation)","Never"],"correct":2,"exp":"Manufacturers and codes recommend monthly GFCI testing using test button. Test verifies trip mechanism. Receptacles can fail (especially in damp environments) without warning. Same applies to AFCIs.","v":3},{"id":702,"domain":1,"task":5,"topic":"Aluminum SE","q":"Aluminum service entrance conductors:","choices":["Not permitted","Permitted with proper terminations and oxidation inhibitor","Must always be replaced","Cannot be used residential"],"correct":1,"exp":"Aluminum SE: widely used (cost). Concerns at terminations - require listed connectors, anti-oxidant compound, proper torque. Aluminum branch circuit wiring is the bigger concern; aluminum SE generally acceptable when properly installed.","v":3},{"id":703,"domain":1,"task":5,"topic":"Service Disconnect Location","q":"The service disconnect should be located:","choices":["At interior most convenient","At a readily accessible location near the point of entry","In basement only","At the meter only"],"correct":1,"exp":"Service disconnect: readily accessible, near the point of entry of service conductors. Allows quick disconnect in emergency. Some jurisdictions require exterior disconnect for first responder safety.","v":3},{"id":704,"domain":1,"task":5,"topic":"Service Drop Pulled","q":"If a service drop is observed to be physically damaged or pulled away from the structure:","choices":["Inspector continues normally","Inspector should not touch and should report to utility immediately","Inspector secures it","No concern"],"correct":1,"exp":"Damaged or pulled service drop: serious safety hazard. Don't touch. Report to utility. Energized conductor can be at any voltage - touching is potentially fatal. Document and notify owner/agent immediately.","v":3},{"id":705,"domain":1,"task":5,"topic":"Color Code Standard","q":"Standard residential 120/240V color code:","choices":["Black or red = hot, white = neutral, green or bare = ground","Black = neutral","All same color","Yellow = hot"],"correct":0,"exp":"Standard residential: black/red = ungrounded (hot), white = grounded (neutral), green/bare = grounding. White used as hot must be re-identified (taped) at terminations. Yellow/orange/blue used for higher-voltage or special applications.","v":3},{"id":706,"domain":1,"task":5,"topic":"Service 240V","q":"Single-phase 240/120V residential service has:","choices":["One energized conductor","Two energized 120V conductors plus a grounded conductor","Three energized conductors","No grounded conductor"],"correct":1,"exp":"Per Vol 1: single-phase 240/120V = two energized 120V conductors + one grounded (neutral) conductor. 240V between the two energized; 120V between each energized and grounded. By far most common residential.","v":3},{"id":707,"domain":1,"task":5,"topic":"Three Phase","q":"Three-phase electrical service:","choices":["Common in residential","Mostly for commercial and industrial; rarely seen in residential inspections","Same as single-phase","Required by code"],"correct":1,"exp":"Per Vol 1: three-phase = three energized + one grounded conductor. Mostly commercial and industrial. Home inspectors rarely see during residential inspections. Some larger residential properties (multi-family, large estates) may have it.","v":3},{"id":708,"domain":1,"task":5,"topic":"Conduit Use","q":"Electrical conduit is required when:","choices":["Always for residential","Wiring is exposed to physical damage or in wet locations","Only commercial buildings","Only at service entrance"],"correct":1,"exp":"Conduit (EMT, PVC, etc.) protects conductors from physical damage and used in wet locations. Required: service entrance, exterior runs, garages where damage possible, embedded in concrete, etc.","v":3},{"id":709,"domain":1,"task":5,"topic":"GFCI Receptacle Test","q":"To verify GFCI receptacle protection extends downstream:","choices":["Test only the receptacle","Plug a 3-light tester at downstream receptacles, then trip the GFCI","Visual inspection only","Cannot be tested"],"correct":1,"exp":"GFCI test: plug 3-light tester at downstream receptacle, trip GFCI (manual or test button), confirm downstream receptacle now has no power. Verifies the protected zone. Common defect: GFCI without downstream protection labeling.","v":3},{"id":710,"domain":1,"task":5,"topic":"Bypass Indication","q":"Bypassed safety controls in a panel typically appear as:","choices":["New parts","Wires connected with wire nuts where wire nuts are not usually seen","Missing components","Black tape"],"correct":1,"exp":"Per Vol 1: bypassed controls usually present as wires spliced together with wire nuts. Bypassing safety controls is serious defect - those switches exist to prevent dangerous operation. Common in DIY installations.","v":3},{"id":711,"domain":1,"task":5,"topic":"GEC Size 200A Ufer","q":"GEC for a 200-amp service to a Ufer ground should be:","choices":["#10 AWG copper","#8 AWG copper","#6 AWG copper","#4 AWG copper"],"correct":3,"exp":"Per Vol 1: 200A or greater service to Ufer = #4 AWG copper. To rod/pipe = #6 (limited by impractical resistance). To water pipe = full size. Code tables specify based on service size and electrode type.","v":3},{"id":712,"domain":1,"task":5,"topic":"Romex Damage Protection","q":"NM-B cable in attics within 6 feet of attic entry:","choices":["Free run with no protection","Must be protected from physical damage (running boards, conduit)","Cannot be installed","Must be in conduit"],"correct":1,"exp":"NM-B cable in attics: must be protected from physical damage within 6 ft of attic entry. Running boards or conduit acceptable. Beyond 6 ft, running between framing members generally OK. Protect from foot traffic and storage damage.","v":3},{"id":713,"domain":1,"task":5,"topic":"Reading Panel","q":"When inspecting an electrical panel, the inspector should:","choices":["Always remove the dead front for full inspection","Remove dead front only if safe (no signs of damage, water, hazard); otherwise disclaim","Never remove the cover","Remove only at request"],"correct":1,"exp":"Inspector judgment: remove dead front when safe to do so (no water staining, no overheating signs, no obvious damage). If conditions suggest hazard - disclaim. Document reason. Some inspectors disclaim panel interior in all cases (varies by jurisdiction/risk tolerance).","v":3},{"id":714,"domain":1,"task":5,"topic":"Service Panel Clearance","q":"A panel should have what clearance in front of it?","choices":["12 inches","30 inches wide x 36 inches deep","6 feet x 6 feet","No clearance required"],"correct":1,"exp":"Per NEC: working clearance in front of electrical panels - 30 inches wide x 36 inches deep, 6.5 feet high (headroom). Cannot be obstructed by storage. Common defect: storage in front of panel.","v":3},{"id":715,"domain":1,"task":5,"topic":"Service Cable Damaged","q":"If service entrance cable insulation is observed to be damaged or deteriorated:","choices":["Cosmetic only","Recommend evaluation by qualified electrician (potential safety/code concern)","Inspector repairs","Standard wear"],"correct":1,"exp":"Damaged SE insulation: significant safety concern. Exposed conductor allows shock, fire, weather damage. Recommend qualified electrician evaluation. Document with photo. Don't attempt repair.","v":3},{"id":716,"domain":1,"task":5,"topic":"Smoke vs CO Alarm","q":"CO alarms differ from smoke alarms by:","choices":["Same device","Detect carbon monoxide vs smoke - different sensors","CO is for kitchens","Color difference"],"correct":1,"exp":"Different sensors. Smoke alarms: ionization or photoelectric (or dual). CO alarms: electrochemical sensors. Combined units (smoke+CO) common in newer construction. Both required: CO outside sleeping areas in homes with fuel-burning appliances or attached garage.","v":3},{"id":717,"domain":1,"task":13,"topic":"Egress Net Clear","q":"Bedroom egress window minimum net clear opening:","choices":["3.0 sq ft","5.0 sq ft (grade-floor) or 5.7 sq ft (above-grade)","8.0 sq ft","Not regulated"],"correct":1,"exp":"IRC: 5.7 sq ft for above-grade openings, 5.0 sq ft for grade-floor only. Net clear (actual unobstructed) area, not rough opening. Both width (20 in) and height (24 in) minimums must also be met.","v":3},{"id":718,"domain":1,"task":13,"topic":"Egress Width Min","q":"Minimum net clear width for an egress window is:","choices":["16 inches","20 inches","24 inches","30 inches"],"correct":1,"exp":"Egress: minimum 20 inches width. Combined with 24 inch height min. Note these alone don't satisfy area (5.7 sq ft); a 20x24 = 3.3 sq ft, so larger dimensions on at least one axis required. Don't memorize these as alternatives - they are minimums.","v":3},{"id":719,"domain":1,"task":13,"topic":"Egress Height Min","q":"Minimum net clear height for egress window:","choices":["20 inches","22 inches","24 inches","30 inches"],"correct":2,"exp":"Minimum 24 inches height. Combined with 20 inch width minimum AND 5.7 sq ft total area. Sill height max 44 inches above floor. All must be met simultaneously.","v":3},{"id":720,"domain":1,"task":13,"topic":"Egress Sill Max","q":"Maximum sill height of egress window above floor:","choices":["24 inches","36 inches","44 inches","60 inches"],"correct":2,"exp":"Egress sill: maximum 44 inches above bedroom floor. Higher sills require permanent steps. Critical for child egress in fire emergencies. Also affects child fall safety from second-story windows.","v":3},{"id":721,"domain":1,"task":13,"topic":"Smoke Alarm Required","q":"Smoke alarms are required in all of the following EXCEPT:","choices":["Each sleeping room","Outside each sleeping area","Every level including basement","Kitchen near appliances"],"correct":3,"exp":"Smoke alarms NOT required in kitchens (nuisance trip risk). Required: each bedroom, hallway outside bedrooms, every level including basement and habitable attics. Modern code requires interconnection.","v":3},{"id":722,"domain":1,"task":13,"topic":"Smoke Alarm Interconnect","q":"Modern code typically requires smoke alarms to be:","choices":["Battery only","Hardwired and interconnected (one trips, all sound)","Independent units","Connected only to security"],"correct":1,"exp":"Modern code: hardwired AND interconnected. Hardwired so wiring tampering doesn't disable. Battery backup for power outages. Interconnected so any alarm trips entire system. Older homes typically grandfathered.","v":3},{"id":723,"domain":1,"task":13,"topic":"CO Alarm Required","q":"Carbon monoxide alarms are required in:","choices":["Kitchens","Outside each sleeping area in homes with fuel-burning appliances or attached garages","Bathrooms","Detached garages"],"correct":1,"exp":"CO alarms: outside each sleeping area in homes with any fuel-burning appliance OR attached garage. Some codes also require on every level. CO is colorless, odorless, tasteless - alarms are essential.","v":3},{"id":724,"domain":1,"task":13,"topic":"Smoke Alarm Lifespan","q":"Smoke alarms should be replaced approximately every:","choices":["1 year","2-3 years","10 years","Never"],"correct":2,"exp":"Smoke alarms: 10-year lifespan typical. Sensor degrades. Replace entire unit (not just battery). Newer alarms have 10-year sealed batteries with clear end-of-life indicators.","v":3},{"id":725,"domain":1,"task":13,"topic":"CO Alarm Lifespan","q":"CO alarms should be replaced approximately every:","choices":["1 year","5-7 years","20 years","Never"],"correct":1,"exp":"CO alarms: typically 5-7 year lifespan. Electrochemical sensor degrades over time. Replace per manufacturer recommendation; many have end-of-life chirp/indicator. Different from smoke alarm replacement schedule.","v":3},{"id":726,"domain":1,"task":13,"topic":"Garage to House Door","q":"The door between attached garage and house must be:","choices":["Solid wood any thickness","Solid wood at least 1-3/8 inch, OR 20-minute fire-rated, with self-closing hardware","Hollow core","Glass-paneled"],"correct":1,"exp":"Garage-to-house door: 1-3/8 inch solid wood OR 20-minute fire-rated. Self-closing hardware per current IRC. Fire separation prevents garage fires from spreading to living space. Common defect: hollow core door.","v":3},{"id":727,"domain":1,"task":13,"topic":"Garage Wall Drywall","q":"The wall between attached garage and house is required to be:","choices":["Standard drywall","5/8 inch Type X drywall on garage side, with sealed penetrations","Brick","No special requirement"],"correct":1,"exp":"Garage-house wall: 5/8 inch Type X drywall on garage side (extending to roof if open to attic above), with all penetrations sealed. Provides 1-hour-equivalent fire resistance. Common defects: missing drywall, unsealed penetrations.","v":3},{"id":728,"domain":1,"task":13,"topic":"Garage Ceiling","q":"If habitable space exists above attached garage, garage ceiling must be:","choices":["Standard drywall","5/8 inch Type X drywall, taped/finished","Open joists","Plywood"],"correct":1,"exp":"Garage ceiling supporting habitable space: 5/8 Type X drywall, taped/finished joints. Provides fire-rated separation. Common defect during finished-room-above-garage retrofits where drywall is omitted or insufficient grade.","v":3},{"id":729,"domain":1,"task":13,"topic":"GFCI Required","q":"GFCI protection is required for receptacles in all EXCEPT:","choices":["Bathrooms","Kitchen counters","Bedroom receptacles","Garages"],"correct":2,"exp":"GFCI: bathrooms, kitchen counters, garages, outdoor, crawls, unfinished basements, near sinks. Bedrooms typically require AFCI. Newer codes expanding GFCI to nearly everywhere - check most recent code for specifics.","v":3},{"id":730,"domain":1,"task":13,"topic":"AFCI Required","q":"AFCI protection is required for circuits serving:","choices":["Bedroom (and increasingly most living areas)","Bathrooms only","Detached garages","Service panels"],"correct":0,"exp":"AFCI: bedrooms (since 2002 NEC), expanded to most living areas in newer codes - kitchen, family, dining, living, hallway, laundry. Detects arcing faults. Required at the breaker.","v":3},{"id":731,"domain":1,"task":13,"topic":"Stair Lighting","q":"Interior stairs require:","choices":["Lighting controllable from top and bottom","No lighting","Battery lighting only","Lighting only at bottom"],"correct":0,"exp":"Interior stairs: lighting with switches at both top and bottom (3-way). Allows safe operation either direction without traversing dark stairs. Common defect: switch only at one end.","v":3},{"id":732,"domain":1,"task":13,"topic":"Sprinkler Painted","q":"A painted fire sprinkler head is:","choices":["Decorative and acceptable","A defect that prevents proper operation","Required by some codes","Improved by paint"],"correct":1,"exp":"Painted sprinklers: defect. Paint can prevent fusible element from melting at rated temperature, or block deflector spray pattern. Replace, not paint. Same applies to ones that have been damaged or have stored items below.","v":3},{"id":733,"domain":1,"task":13,"topic":"Window Bars Egress","q":"Security bars on bedroom windows must:","choices":["Be permanently fixed","Have release mechanism that doesn't require keys, tools, special knowledge","Be welded shut","Have keyed locks"],"correct":1,"exp":"Security bars over egress windows: must release from inside without keys, tools, or special knowledge. Permanent or keyed bars on bedroom windows are life safety violations.","v":3},{"id":734,"domain":1,"task":13,"topic":"Egress Door Width","q":"Minimum clear width of an egress door is:","choices":["24 inches","32 inches (typically 36 inch slab door)","36 inches","48 inches"],"correct":1,"exp":"Egress door: 32 inches minimum clear width (typically 36 inch slab door). 78 inches minimum clear height. One side-hinged egress door required per dwelling unit. Sliding doors may not satisfy primary egress.","v":3},{"id":735,"domain":1,"task":13,"topic":"Egress Door Hardware","q":"Egress doors must have:","choices":["Keyed deadbolts both sides","Hardware operable without keys, tools, or special knowledge from inside","Locked deadbolts","Mechanical complications"],"correct":1,"exp":"Egress doors: operable without keys, tools, or special knowledge from inside. Single-cylinder deadbolt with thumbturn OK. Double-cylinder (key both sides) violates egress.","v":3},{"id":736,"domain":1,"task":13,"topic":"Furnace Combustion Air","q":"Mechanical room with fuel-burning equipment requires:","choices":["Sealed completely","Adequate combustion air provisions","Carpeted","Heated to 80\u00b0F"],"correct":1,"exp":"Mechanical rooms: adequate combustion air per BTU input, proper venting, clearances to combustibles, working CO alarm nearby. Sealed mechanical rooms cause backdrafting. Refer to combustion air section.","v":3},{"id":737,"domain":1,"task":13,"topic":"Door from Garage Slope","q":"If garage floor slopes to door connecting house:","choices":["Acceptable","Door should be at least 4 inches above garage floor or have proper threshold","Required by code","Improves drainage"],"correct":1,"exp":"Garage threshold: floor should slope toward overhead door (away from house) OR interior door must be 4+ inches above garage floor or have a 4-inch curb. Prevents fuel/oil/CO migration into living space.","v":3},{"id":738,"domain":1,"task":13,"topic":"Pull Down Attic Stairs Garage","q":"Pull-down attic stairs in attached garage:","choices":["Acceptable","Fire separation breach if penetrating fire-rated assembly","Improve attic access","No fire implications"],"correct":1,"exp":"Pull-down attic stairs through garage ceiling can breach fire separation between garage and habitable space above. Either avoid this configuration, or use fire-rated attic stair products specifically rated for this application.","v":3},{"id":739,"domain":1,"task":13,"topic":"Bath Heater Lamp","q":"A bathroom heat lamp combined with light/fan:","choices":["Must be properly listed and installed","Cannot be in bathroom","No special requirements","Generic outlets OK"],"correct":0,"exp":"Bathroom heat lamps: properly listed unit, GFCI protected circuit, adequate clearances to combustibles and showers, vapor-proof if in shower zone. Aftermarket high-watt bulb installations often violate listing.","v":3},{"id":740,"domain":1,"task":13,"topic":"Pool Door Alarm","q":"Doors leading from home to pool/spa area should:","choices":["Have audible alarm or be self-closing/self-latching","Have decorative latches","Be propped open","Have keyed locks only"],"correct":0,"exp":"Pool/spa doors: alarm activated when opened (some jurisdictions) OR self-closing/self-latching. Prevents children accessing pool unsupervised. Multiple barriers (door + fence) typically required.","v":3},{"id":741,"domain":1,"task":13,"topic":"Open Riser","q":"Stair open risers (no riser board) on stairs higher than 30 inches typically:","choices":["Always acceptable","Cannot allow a 4-inch sphere through","Decorative only","No requirements"],"correct":1,"exp":"Open-riser stairs: cannot allow 4-inch sphere through open space (same rule as guards). Codes often prohibit open risers in residential or require closed risers. Limits child fall hazard.","v":3},{"id":742,"domain":1,"task":13,"topic":"CO Symptoms","q":"CO poisoning symptoms include:","choices":["Headache, nausea, dizziness, confusion","Localized burns","Respiratory infection","Joint pain"],"correct":0,"exp":"CO symptoms: headache, nausea, dizziness, confusion, fatigue. Severe: loss of consciousness, death. Easily mistaken for flu. CO alarms essential because gas is undetectable to humans. Inspectors should test alarm presence/operation.","v":3},{"id":743,"domain":1,"task":13,"topic":"Dryer Vent Lint Hazard","q":"Lint accumulation in a clothes dryer vent is a:","choices":["Cosmetic concern","Significant fire hazard","Normal condition","Improves drying"],"correct":1,"exp":"Dryer vent lint accumulation: significant fire hazard. Restricted airflow + ignitable lint + heat = fire. Recommend cleaning at minimum annually. Inspectors document visible accumulation, restricted termination, lint blocking the dryer.","v":3},{"id":744,"domain":1,"task":13,"topic":"Smoke Alarm Spacing","q":"In a home, smoke alarms should be:","choices":["Only in main living area","In each sleeping room, outside each sleeping area, every level","Only in bedrooms","Only in kitchen"],"correct":1,"exp":"Comprehensive coverage: each bedroom, outside each sleeping area (typically hallway), every level including basement and habitable attics. Modern code requires interconnection. Combination smoke+CO is common.","v":3},{"id":745,"domain":1,"task":13,"topic":"Egress Window Well Cover","q":"An egress window well cover must:","choices":["Be permanently affixed","Be operable from inside without tools/keys/special knowledge","Be welded","Have no openings"],"correct":1,"exp":"Window well covers serving egress windows: operable from inside without tools, keys, or special knowledge. Permanent or locked covers prevent egress and violate life safety code. Common defect.","v":3},{"id":746,"domain":1,"task":13,"topic":"Sleeping Area Definition","q":"An NHIE-relevant 'sleeping area' typically refers to:","choices":["Any room used for sleeping plus its hallway/access","Only labeled bedrooms","The entire upstairs","Living rooms"],"correct":0,"exp":"Sleeping area: bedroom plus its access hallway. Smoke alarms required in each sleeping room AND outside each sleeping area (hallway). CO alarms also outside each sleeping area in fuel-burning or attached garage homes.","v":3},{"id":747,"domain":1,"task":12,"topic":"Hearth 6+ sqft","q":"The minimum hearth extension in front of a masonry fireplace with opening 6 sq ft or larger:","choices":["12 inches","16 inches","20 inches","24 inches"],"correct":2,"exp":"Hearth extension: 20 inches in front, 12 inches beyond each side for openings \u22656 sq ft. Smaller (under 6): 16 in front, 8 sides. Protects against radiant heat and falling embers.","v":3},{"id":748,"domain":1,"task":12,"topic":"Hearth Smaller","q":"Fireplace opening less than 6 sq ft requires hearth extension of:","choices":["12 inches in front","16 inches front, 8 sides","20 inches front","24 inches front"],"correct":1,"exp":"Smaller fireplace (under 6 sq ft opening): 16 inches front, 8 inches each side. Larger: 20 front, 12 sides. Hearth must be non-combustible: masonry, tile, stone.","v":3},{"id":749,"domain":1,"task":12,"topic":"Chimney 3-2-10","q":"A chimney must extend at least how high above any portion of building within 10 feet?","choices":["1 foot","2 feet","3 feet","4 feet"],"correct":1,"exp":"3-2-10 rule: at least 3 feet above roof penetration AND at least 2 feet higher than any portion of building within 10 feet horizontally. Insufficient height causes downdraft and poor draft.","v":3},{"id":750,"domain":1,"task":12,"topic":"Chimney 3 ft Above","q":"Chimney must extend at least how high above the roof at the point of penetration?","choices":["1 foot","2 feet","3 feet","4 feet"],"correct":2,"exp":"3-2-10 rule: 3 feet above roof penetration, 2 feet above anything within 10 feet horizontally. Insufficient height causes downdraft. Both rules must be met.","v":3},{"id":751,"domain":1,"task":12,"topic":"Spark Arrestor","q":"A spark arrestor on a chimney:","choices":["Reduces creosote","Prevents sparks/embers from exiting and igniting roofs/vegetation","Improves draft","Decorative"],"correct":1,"exp":"Spark arrestor: mesh cap preventing embers from leaving chimney. Required in most jurisdictions. Different from rain cap (basic top cover); often combined. Prevents catastrophic roof fires from wood-burning embers.","v":3},{"id":752,"domain":1,"task":12,"topic":"Chimney Cap","q":"A chimney cap (rain cap or crown):","choices":["Prevents water entry into flue","Improves draft","Limits creosote (indirectly)","All of the above"],"correct":3,"exp":"Chimney cap: keeps rain/snow out of flue, keeps animals out, often includes spark arrestor screen. Without cap, water entry causes accelerated chimney deterioration (especially in freeze-thaw climates like Wisconsin).","v":3},{"id":753,"domain":1,"task":12,"topic":"Creosote Stage III","q":"Stage III creosote in a chimney is:","choices":["Loose flakes, easy to remove","Tar-like, more flammable","Hard glaze, highly flammable, difficult to remove","Not flammable"],"correct":2,"exp":"Per Vol 1: Stage I = light brown/black flaky ash (least flammable, easy remove). Stage II = heavy tar-like ash. Stage III = hard, shiny coating - HIGHLY flammable, very difficult to remove. Flue liner replacement may be necessary.","v":3},{"id":754,"domain":1,"task":12,"topic":"Smoke Chamber","q":"The smoke chamber is:","choices":["The firebox itself","Transition area between firebox and flue, sloping inward","Hearth area","Flue cap"],"correct":1,"exp":"Smoke chamber: above damper, transitions from wider firebox to narrower flue. Sloped sides should be smooth or parged. Corbeled (stepped) construction creates turbulence and creosote buildup. Modern code requires parging.","v":3},{"id":755,"domain":1,"task":12,"topic":"Damper Location","q":"The damper in a fireplace is located:","choices":["At bottom of flue, above firebox","At chimney top","In smoke shelf","At hearth"],"correct":0,"exp":"Damper: above firebox, controls flue opening. Closed when not in use to reduce heat loss. Top-sealing dampers (at chimney top) are an alternative that seals more effectively at the top.","v":3},{"id":756,"domain":1,"task":12,"topic":"Gas Damper Stop","q":"On a gas fireplace appliance, the damper:","choices":["Must be permanently fixed open or have damper stop","Operate like wood","Removed entirely","No requirements"],"correct":0,"exp":"Gas log set in masonry fireplace: damper must be locked open OR have damper stop ensuring at least partial opening. Otherwise combustion gases (including CO) could be trapped in the home.","v":3},{"id":757,"domain":1,"task":12,"topic":"Direct Vent","q":"A direct-vent gas fireplace:","choices":["Pulls combustion air from outside, exhausts to outside, sealed from room","Cannot be in cold climates","Always uses chimney","No efficiency benefit"],"correct":0,"exp":"Direct vent: sealed combustion. Concentric pipes - inner exhaust, outer intake. No room air for combustion, no flue gas in room. Typically through-the-wall, no chimney needed. Modern, efficient.","v":3},{"id":758,"domain":1,"task":12,"topic":"B-Vent Gas","q":"A B-vent (natural vent) gas fireplace:","choices":["Draws combustion air from room, exhausts up Type B vent","Sealed from room","No vent","Outside combustion air"],"correct":0,"exp":"B-vent gas fireplace: room air for combustion, exhaust up Type B vent (typically through roof). Less efficient than direct vent. Risk of backdrafting if home depressurized.","v":3},{"id":759,"domain":1,"task":12,"topic":"Vent-Free","q":"A vent-free gas appliance:","choices":["Has no flue, exhausts combustion products into the room","Most efficient option","Always has chimney","No clearance requirements"],"correct":0,"exp":"Vent-free: no flue. ALL combustion products (water vapor, CO2, trace CO, NOx) released into room. Banned in some jurisdictions (Canada). Concerning for indoor air quality. Strict BTU limits and oxygen depletion sensors required.","v":3},{"id":760,"domain":1,"task":12,"topic":"Wood Stove Clearance","q":"A solid-fuel wood stove typically requires clearance to combustibles of:","choices":["6 inches","12 inches","36 inches if not specifically tested/listed for less","No clearance"],"correct":2,"exp":"Wood stoves: typically 36 inches to combustibles unless tested/listed (UL listed) for reduced clearances. Many stoves with heat shields can install at 12-18 inches. Always follow manufacturer's listed clearances.","v":3},{"id":761,"domain":1,"task":12,"topic":"Pellet Stove","q":"A pellet stove:","choices":["Wood-burning appliance using compressed pellets via auger feed and combustion fan","Type of gas appliance","Fired by oil","Electric only"],"correct":0,"exp":"Pellet stove: burns compressed wood/biomass pellets via auger feed and combustion fan. More controlled than logs, higher efficiency, tighter venting. Need backup power - auger and fan need electricity.","v":3},{"id":762,"domain":1,"task":12,"topic":"Manufactured Fireplace","q":"A factory-built (manufactured) fireplace:","choices":["Pre-assembled metal components, listed as system","Lower fire rating","Cannot be in homes","Same as masonry"],"correct":0,"exp":"Manufactured (zero-clearance) fireplace: factory-built metal firebox and chimney, listed and tested. Used in homes without true masonry chimney. Components must match brand - mixing brands is unsafe.","v":3},{"id":763,"domain":1,"task":12,"topic":"Inspector Limit Fireplace","q":"When inspecting a fireplace, the home inspector should:","choices":["Disclaim Level 2 chimney inspection if defects suspected, recommend qualified evaluation","Light a fire to test","Always recommend rebuilding","Test by flashing flashlight"],"correct":0,"exp":"Home inspection of fireplaces: visible portions only. Cannot perform Level 2 (full internal, requires camera) or Level 3 (destructive). Recommend CSIA-certified chimney sweep for Level 2 (NFPA 211 recommends at every property transfer).","v":3},{"id":764,"domain":1,"task":12,"topic":"Chimney Crown","q":"The chimney crown is:","choices":["Top of chimney - sloped concrete surface that sheds water","The flue cap","The damper","Smoke chamber"],"correct":0,"exp":"Chimney crown: top mass of chimney - sloped concrete surface that sheds water away from flue. Cracked or improperly built crowns are major water entry points causing chimney deterioration.","v":3},{"id":765,"domain":1,"task":12,"topic":"Liner Required","q":"A masonry chimney serving a fireplace requires:","choices":["Interior flue liner (clay tile or stainless steel)","Open masonry only","No liner","Pebbles in bottom"],"correct":0,"exp":"Chimney flue liner: required by code. Clay tile (traditional) or stainless steel (preferred for retrofits). Without liner, combustion gases attack masonry, water enters mortar joints, CO can leak into building.","v":3},{"id":766,"domain":1,"task":12,"topic":"Combustion Air Fireplace","q":"Modern fireplaces and tight homes typically require:","choices":["Outside combustion air ducted to firebox","Air from bedroom","No combustion air","Indoor air only"],"correct":0,"exp":"Tight modern homes: outside combustion air recommended (sometimes required) for masonry fireplaces. Direct-vent and sealed-combustion units bring outside air through dedicated ductwork.","v":3},{"id":767,"domain":1,"task":12,"topic":"Soot Stains","q":"Soot stains on the exterior of a chimney indicate:","choices":["Normal operation","Possible flue gas leakage from cracks","Improved draft","Good seal"],"correct":1,"exp":"Exterior soot can indicate flue gas leakage through cracks in masonry or liner. Signs of poor draft. Recommend evaluation by qualified chimney sweep. Different from interior soot at firebox (normal use indicator).","v":3},{"id":768,"domain":1,"task":12,"topic":"Wood Stove Hearth","q":"Most wood stoves require non-combustible floor protection (hearth pad) extending:","choices":["Per manufacturer's listed dimensions, typically 6-18 inches around","Only directly under stove","No hearth pad","2 feet on all sides"],"correct":0,"exp":"Hearth pads: per manufacturer's listed installation. Typically extend in front of door (load area), to sides/back. Tested/listed pads have specific R-value and dimensions. Generic 'safe distance' rules don't apply with listed appliances.","v":3},{"id":769,"domain":1,"task":12,"topic":"NFPA 211","q":"NFPA 211 is:","choices":["Standard for masonry","Standard for chimneys, fireplaces, vents, solid fuel-burning appliances","Electrical code","HVAC code"],"correct":1,"exp":"NFPA 211: comprehensive standard for chimneys, fireplaces, vents, solid fuel-burning appliances. Recommends Level 1 inspection annually, Level 2 at every property transfer or after significant event.","v":3},{"id":770,"domain":1,"task":12,"topic":"CO Source","q":"A common source of CO in homes is:","choices":["Improperly vented or backdrafting fuel-burning appliances","Closed windows","Refrigerators","Air conditioning"],"correct":0,"exp":"CO sources: improperly vented furnace, water heater, fireplace, range. Backdrafting from depressurization. Attached garage with vehicles running. Requires CO alarms outside sleeping areas.","v":3},{"id":771,"domain":1,"task":12,"topic":"Chimney Foundation","q":"A masonry chimney requires:","choices":["Separate foundation independent of house when free-standing","No foundation","Wood platform","No support"],"correct":0,"exp":"Masonry chimney: needs adequate foundation for the weight (often heavy). Can settle independently of house if poorly founded - resulting in cracks at chimney/wall interface. Properly tied with masonry anchors.","v":3},{"id":772,"domain":1,"task":12,"topic":"Damper Functional","q":"A fireplace damper that is rusted shut or non-functional is:","choices":["Defect requiring repair","Acceptable as long as chimney open","Required for energy","Decorative"],"correct":0,"exp":"Non-functional damper: defect. Cannot close to retain heat in winter, can't fully open for proper draft. Repair or replace. Top-sealing dampers can replace failed throat damper.","v":3},{"id":773,"domain":1,"task":12,"topic":"Hearth Material","q":"Hearth and hearth extension must be:","choices":["Non-combustible (masonry, tile, stone, metal)","Wood only","Carpet only","No specific requirement"],"correct":0,"exp":"Hearth: non-combustible and properly sized. Common defect: wood floor under raised hearth without proper extension to front of firebox. Carpet under hearth = serious fire hazard.","v":3},{"id":774,"domain":1,"task":12,"topic":"Chimney Flashing","q":"Where a chimney passes through the roof, the flashing should be:","choices":["Step flashing on sides, base flashing in front, saddle (cricket) on back if wider than 30 inches","Single piece wrapped","Tar only","Not required"],"correct":0,"exp":"Chimney flashing: step flashing on sides (with counter flashing into masonry), base flashing in front (downhill), saddle (cricket) on uphill side for chimneys wider than 30 inches.","v":3},{"id":775,"domain":1,"task":12,"topic":"Manufactured Mix","q":"Mixing brands of components in a manufactured fireplace system:","choices":["Improves quality","Is unsafe and violates listing","Required for upgrades","Standard practice"],"correct":1,"exp":"Manufactured fireplace systems: components are tested as a system. Mixing brands voids listing and can be unsafe. Replacement parts must match original brand or use compatible components per manufacturer.","v":3},{"id":776,"domain":1,"task":3,"topic":"Asphalt Min Slope","q":"Asphalt shingles are generally permitted on roofs with minimum slope of:","choices":["1:12","2:12 (with double underlayment)","4:12","6:12"],"correct":1,"exp":"Asphalt shingles: 2:12 minimum WITH double underlayment. Standard installation requires 4:12 minimum. Below 2:12 requires low-slope roofing (modified bitumen, EPDM).","v":3},{"id":777,"domain":1,"task":3,"topic":"Standard Asphalt","q":"Standard asphalt shingle installation requires minimum slope of:","choices":["2:12","3:12","4:12","6:12"],"correct":2,"exp":"4:12 (4 inches rise per 12 inches run, ~18 degrees) is the standard minimum. 2:12 to 4:12 permitted with double underlayment. Below 2:12 requires different roofing system entirely.","v":3},{"id":778,"domain":1,"task":3,"topic":"Ice Barrier WI","q":"In Wisconsin, ice barrier underlayment must extend from eave edge to point at least how far inside exterior wall line?","choices":["12 inches","24 inches","36 inches","Not required"],"correct":1,"exp":"Ice barrier (self-adhering polymer-modified bitumen): from eave to 24 inches inside warm wall line in regions with mean January temp below 25\u00b0F. Wisconsin freeze-thaw cycles make this essential against ice dam leaks.","v":3},{"id":779,"domain":1,"task":3,"topic":"Underlayment Standard","q":"For asphalt shingles on 4:12+ slope, the minimum underlayment is:","choices":["Two layers of 30# felt","One layer of 15# felt or equivalent synthetic","No underlayment","Three layers synthetic"],"correct":1,"exp":"Standard slopes (4:12+): one layer of 15# felt or equivalent synthetic underlayment. Slopes 2:12 to 4:12: two layers (or full ice barrier). Synthetic underlayments now common and code-accepted.","v":3},{"id":780,"domain":1,"task":3,"topic":"Step Flashing","q":"Step flashing is used:","choices":["Chimneys only","Where a sloped roof meets a vertical wall","Flat roofs","Skylights only"],"correct":1,"exp":"Step flashing: L-shaped flashing installed at each shingle course where sloped roof meets vertical wall. Each piece overlaps the next, creating watertight transition. Common at dormer walls.","v":3},{"id":781,"domain":1,"task":3,"topic":"Counter Flashing","q":"Counter flashing is:","choices":["Flashing under shingle and over wall","Flashing embedded in or attached to wall that overlaps step or base flashing below","Drip edge","Valley flashing"],"correct":1,"exp":"Counter flashing: embedded into wall (or attached) to overlap step/base flashing below. Two-piece system (counter + base) accommodates differential movement between roof and wall.","v":3},{"id":782,"domain":1,"task":3,"topic":"Closed Cut Valley","q":"A closed-cut valley uses:","choices":["Open metal flashing","Shingles from one side cut back over shingles from other","Metal covered by shingles","Waterproof membrane only"],"correct":1,"exp":"Closed-cut: shingles from one slope run across valley, then shingles from other slope cut back along chalk line. Open valley uses metal flashing visible. Both work properly executed; valleys are common leak sources.","v":3},{"id":783,"domain":1,"task":3,"topic":"Skylight Leak","q":"The most common cause of skylight leakage is:","choices":["Failure of glass","Improper or deteriorated flashing","Inadequate insulation","Excessive ventilation"],"correct":1,"exp":"Skylight flashing: dominant leak cause. Either improper installation (missing pieces, wrong sequence) or deterioration over time. Curb-mounted skylights require step flashing similar to chimneys.","v":3},{"id":784,"domain":1,"task":3,"topic":"Downspout Capacity","q":"A 2x3 inch downspout typically serves approximately:","choices":["100 sq ft of roof","600-800 sq ft","2,000 sq ft","Unlimited"],"correct":1,"exp":"Downspout sizing: 2x3 inch serves ~600 sq ft. 3x4 inch serves ~1,200 sq ft. Larger and steeper roofs (faster runoff) require more capacity. Inadequate causes overflow during heavy rain.","v":3},{"id":785,"domain":1,"task":3,"topic":"Gutter Slope","q":"Gutters should slope toward downspouts at approximately:","choices":["1 inch per foot","1/4 inch per 10 feet","6 inches per foot","No slope"],"correct":1,"exp":"Gutter slope: ~1/4 inch per 10 feet toward downspouts. More slope is fine but creates visible diagonal. Insufficient slope causes ponding, sagging, overflow.","v":3},{"id":786,"domain":1,"task":3,"topic":"Plumbing Vent Flashing","q":"Plumbing vent pipe penetrations through asphalt shingle roofs are flashed with:","choices":["Tar only","Metal base flange with neoprene or rubber-collared flashing (boot)","Masonry chimney crown","Built-up bituminous patch"],"correct":1,"exp":"Plumbing vent flashing: metal base flange + flexible neoprene/EPDM rubber collar (boot) sealing around pipe. Collar deteriorates from UV before metal base - often the first failure point.","v":3},{"id":787,"domain":1,"task":3,"topic":"Architectural vs 3-Tab","q":"Architectural (laminated) shingles compared to three-tab:","choices":["Shorter warranties","Thicker, longer-lasting (typically 30-50 yr vs 20-25 yr)","Required by code","Cannot be on slopes >4:12"],"correct":1,"exp":"Architectural shingles: thicker, heavier, longer warranties. Largely replaced three-tab in new construction. Better wind resistance.","v":3},{"id":788,"domain":1,"task":3,"topic":"Shingle End-of-Life","q":"An asphalt shingle approaching end-of-life will typically show:","choices":["Granule loss exposing asphalt mat","Curling and cupping at edges","Loss of seal-tab adhesion","All of the above"],"correct":3,"exp":"End-of-life indicators: granule loss, curling/cupping, brittleness, loss of seal-tab adhesion, exposed nails, bare spots. Multiple indicators on a roof generally suggest replacement.","v":3},{"id":789,"domain":1,"task":3,"topic":"Wood Shake vs Shingle","q":"The difference between wood shakes and wood shingles:","choices":["Shakes thicker, split; shingles thinner, sawn","Shingles cedar; shakes other","Shakes painted","No difference"],"correct":0,"exp":"Shakes: split (rustic, irregular, thicker). Shingles: sawn (uniform, thinner). Both typically western red cedar. Both require ventilation and proper exposure.","v":3},{"id":790,"domain":1,"task":3,"topic":"Metal Roof Lifespan","q":"Metal roofs vs asphalt shingles typically have:","choices":["Shorter lifespan","Similar lifespan","Significantly longer (40-70+ vs 20-30 years)","Identical performance"],"correct":2,"exp":"Quality metal roofs (standing seam, stamped metal shingles) last 40-70+ years vs 20-30 asphalt. Higher upfront cost offset by longevity and recyclability.","v":3},{"id":791,"domain":1,"task":3,"topic":"Tile Roof Substrate","q":"A clay tile roof requires:","choices":["Standard 1/2 inch sheathing","Roof structure designed for heavier load (typically 2-3x asphalt)","No sheathing","Concrete deck only"],"correct":1,"exp":"Clay or concrete tile: 700-1,200 lb per square (100 sq ft) vs 200-300 for asphalt. Roof structure must be designed (or evaluated) for heavier load. Common defect when re-roofing from asphalt to tile.","v":3},{"id":792,"domain":1,"task":3,"topic":"Modified Bitumen","q":"Modified bitumen is a roofing material commonly used on:","choices":["Steep slope residential","Low slope (flat) roofs","Tile roof substrates","Underlayment for asphalt"],"correct":1,"exp":"Modified bitumen (mod-bit): low-slope roofing material - rolled sheets with polymer modifiers (APP or SBS) for flexibility and durability. Common on residential flat roofs and porch roofs.","v":3},{"id":793,"domain":1,"task":3,"topic":"EPDM","q":"EPDM is:","choices":["Type of clay tile","Synthetic rubber single-ply membrane for low-slope roofs","Masonry sealant","Chimney flashing material"],"correct":1,"exp":"EPDM (ethylene propylene diene monomer): single-ply rubber membrane for low-slope roofs. Large sheets, seamed with adhesive or tape. Lifespan 20-30+ years with proper installation.","v":3},{"id":794,"domain":1,"task":3,"topic":"Cricket","q":"A roof cricket is:","choices":["Insect that damages shingles","Small ridge built behind chimney to divert water","Drainage channel along eave","Type of flashing material"],"correct":1,"exp":"Cricket (or saddle): small peaked structure built behind chimney (uphill side) to divert water around it. Required by code for chimneys wider than 30 inches measured perpendicular to slope.","v":3},{"id":795,"domain":1,"task":3,"topic":"Balanced Ventilation","q":"A balanced attic ventilation system has:","choices":["All ridge vents, no soffits","All soffit vents, no ridge","Equal intake (low) and exhaust (high)","Mechanical fans only"],"correct":2,"exp":"Balanced ventilation: roughly equal intake (low, typically soffit) and exhaust (high, typically ridge or gable). Net free area should be approximately equal at both. Imbalanced systems can short-circuit or pressurize spaces.","v":3},{"id":796,"domain":1,"task":3,"topic":"NFA Definition","q":"NFA in attic ventilation refers to:","choices":["Normal Filter Area","Net Free Area - actual unobstructed opening for airflow","National Flashing Association","Negative Flow Area"],"correct":1,"exp":"Net Free Area: actual airflow opening accounting for screens and louvers. Different vent products have different NFA per linear foot or square foot. Code typically requires 1 sq ft NFA per 150 sq ft attic floor.","v":3},{"id":797,"domain":1,"task":3,"topic":"Ridge Vent Effectiveness","q":"Ridge vents are most effective when:","choices":["Used alone with no intake","Paired with adequate soffit (intake) vents","Combined with gable end vents","Sealed at both ends"],"correct":1,"exp":"Ridge vents work via convection and wind effect - need adequate intake (soffit) ventilation. Ridge vent without soffit can pull conditioned air from house, defeating purpose.","v":3},{"id":798,"domain":1,"task":3,"topic":"Power Vent Concern","q":"A common concern with attic power ventilators:","choices":["Pull conditioned air from house if attic insulation poor or system unbalanced","Reduce roof temps excessively","Required by code","Cannot be in any climate"],"correct":0,"exp":"Power vents can depressurize attic and pull conditioned air through ceiling penetrations if intake inadequate or air sealing poor. Many building scientists prefer passive ventilation or unvented (sealed) attic assemblies.","v":3},{"id":799,"domain":1,"task":3,"topic":"Roof Drainage Defects","q":"Common defects with roof drainage systems include:","choices":["Improper slope","Damaged or sagging gutters","Disconnected or damaged downspouts","All of the above"],"correct":3,"exp":"All common gutter defects: improper slope (back-pitch), sagging from weight or fastener failure, separation at seams, damaged elbows, blockages, discharge too close to foundation.","v":3},{"id":800,"domain":1,"task":3,"topic":"Roof Inspection Method","q":"When inspecting a roof, the inspector should:","choices":["Always walk regardless of conditions","Walk when safe; otherwise inspect from ladder, eaves, ground, or attic","Refuse if not walkable","Use only binoculars"],"correct":1,"exp":"Walk roof when safely possible. Don't walk: too steep (8:12+), too brittle (slate, tile), too wet/icy, too high without fall protection. Inspect from accessible vantage points if not walked. SOP requires inspection but not unsafe access.","v":3},{"id":801,"domain":1,"task":3,"topic":"Reroof Layers","q":"Most building codes limit asphalt shingle roof systems to:","choices":["1 layer","2 layers total","3 layers","Unlimited"],"correct":1,"exp":"Most codes: maximum 2 layers asphalt shingles. Beyond that, structural load and ability to detect underlying problems both unacceptable. Tear-off required before adding new layer above 2.","v":3},{"id":802,"domain":1,"task":3,"topic":"Visible Defects EXCEPT","q":"All of the following are typical roofing defects EXCEPT:","choices":["Granule loss","Lifted or missing shingles","Damaged flashings","Uniform color across roof"],"correct":3,"exp":"Uniform color is not a defect. Granule loss, lifted/missing/cracked shingles, exposed nails, damaged or absent flashings, bare spots are all typical defects.","v":3},{"id":803,"domain":1,"task":3,"topic":"Drip Edge Function","q":"Drip edge at eaves serves to:","choices":["Direct water into gutter and away from fascia","Provide structural support","Hold shingles in place","Prevent ice damming"],"correct":0,"exp":"Drip edge directs water into gutter and away from fascia and underlying wood. Required by IRC at eaves and rakes since 2012. Different profiles for eaves (T-style) and rakes (L-style).","v":3},{"id":804,"domain":1,"task":3,"topic":"Flashing Material Compatibility","q":"Aluminum flashing in direct contact with copper or pressure-treated lumber will:","choices":["Bond permanently","Corrode through galvanic or chemical reaction","Last longer","Have no interaction"],"correct":1,"exp":"Aluminum reacts galvanically with copper and chemically with copper-based preservatives in modern pressure-treated lumber (ACQ). Use stainless steel or compatible flashing where these contacts occur.","v":3},{"id":805,"domain":1,"task":3,"topic":"Roof Snow Inspection","q":"If snow covers the roof at inspection:","choices":["Inspector clears it","Inspector disclaims full evaluation, recommends re-inspection or qualified evaluation","Inspector rates as defective","Inspector skips entirely"],"correct":1,"exp":"Snow-covered roof: limits inspection. Disclaim, document conditions, recommend re-inspection or qualified evaluation when conditions improve. Note any visible portions and any defects observed (chimney issues, rust streaks).","v":3},{"id":806,"domain":1,"task":8,"topic":"Attic Moisture Best","q":"The most effective means of limiting moisture/mold in an attic is:","choices":["Air sealing the attic from conditioned space","Increasing airflow","Heating the attic","Using a sealant at sheathing/rafters"],"correct":0,"exp":"Air sealing PREVENTS moisture-laden air from entering. Ventilation only mitigates moisture that already arrived. Choose prevention over mitigation. Common air leaks: top plates, can lights, plumbing penetrations, attic hatch.","v":3},{"id":807,"domain":1,"task":8,"topic":"Attic R-Value Cold Climate","q":"Modern code-recommended attic insulation in cold climates:","choices":["R-13","R-19","R-49 to R-60","R-100"],"correct":2,"exp":"Cold climate attics: typically R-49 to R-60 in current codes. Wisconsin (climate zones 6-7): R-49+. R-30 was older standard. Higher R-values appropriate for further cold climates.","v":3},{"id":808,"domain":1,"task":8,"topic":"2x4 Wall R","q":"Standard 2x4 wood-frame wall cavities can typically achieve approximately:","choices":["R-13 to R-15","R-30","R-49","R-60"],"correct":0,"exp":"2x4 cavities (3.5 inches deep): R-13 standard fiberglass batt, R-15 high-density. 2x6 walls: R-19 to R-21. Higher R requires deeper cavity or exterior continuous insulation.","v":3},{"id":809,"domain":1,"task":8,"topic":"Vapor Retarder Cold","q":"In a cold climate, vapor retarder should be located:","choices":["Outside of wall","On warm (interior) side of insulation","Middle of assembly","Not needed"],"correct":1,"exp":"Cold climate: vapor retarder on warm (interior) side of insulation. Stops indoor moisture from migrating outward and condensing in cold cavity. Common: kraft paper backing on batts (facing in), or polyethylene sheet.","v":3},{"id":810,"domain":1,"task":8,"topic":"Class III Vapor","q":"Standard latex paint on drywall typically functions as:","choices":["Vapor barrier","Class III vapor retarder (1-10 perms)","No vapor control","Vapor open membrane"],"correct":1,"exp":"Painted drywall: Class III vapor retarder (1-10 perms). Acceptable in many climate zones. Class II = 0.1-1 perm (kraft paper, smart membranes). Class I = under 0.1 perm (poly sheet).","v":3},{"id":811,"domain":1,"task":8,"topic":"Air Sealing Priority","q":"The most effective place to air seal a typical home is:","choices":["Around windows only","Building envelope, including ceiling penetrations and rim joist","Between rooms","Exterior siding"],"correct":1,"exp":"Air sealing focuses on building envelope - ceiling/attic floor (largest pressure differential), rim joist, basement-to-living transition, all penetrations. Bigger savings than just window weatherstripping.","v":3},{"id":812,"domain":1,"task":8,"topic":"Stack Effect","q":"Stack effect refers to:","choices":["Stacking insulation","Buoyancy-driven air movement: warm air rising, cold air entering low","Mechanical air handler","Insulation settling"],"correct":1,"exp":"Stack effect: warm interior air rises (less dense), creating positive pressure at top of building (driving air out) and negative pressure at bottom (drawing air in). Strong driver of air leakage in cold climates.","v":3},{"id":813,"domain":1,"task":8,"topic":"Soffit Vent","q":"Soffit vents in attic ventilation provide:","choices":["Exhaust","Intake (low) airflow","Equal intake/exhaust","Insulation"],"correct":1,"exp":"Soffit vents: low-side intake. Combined with ridge or gable vents (high-side exhaust), creates passive ventilation. Code typically requires 50-50 split between intake and exhaust net free area.","v":3},{"id":814,"domain":1,"task":8,"topic":"Air Bypass","q":"An air bypass in an attic is:","choices":["Intentional ventilation path","Unsealed penetration that allows conditioned air to leak into attic","Type of vent fan","Duct repair"],"correct":1,"exp":"Air bypasses: unsealed gaps in attic floor - around can lights, top plates, plumbing/electrical/HVAC penetrations, attic hatch. Each leaks conditioned air, brings moisture into attic, defeats insulation.","v":3},{"id":815,"domain":1,"task":8,"topic":"Exterior Foam","q":"Exterior continuous insulation:","choices":["Reduces thermal bridging through studs","Cannot be in cold climates","Reduces R-value","Requires no vapor management"],"correct":0,"exp":"Continuous exterior insulation (rigid foam, mineral wool) covers studs and reduces thermal bridging. Studs conduct heat at much lower R than cavity. Increasingly common in modern construction.","v":3},{"id":816,"domain":1,"task":8,"topic":"WI Climate Zone","q":"Most of Wisconsin falls in IECC climate zone:","choices":["3 (warm)","4-5 (mixed)","6-7 (cold)","8 (subarctic)"],"correct":2,"exp":"Wisconsin: climate zones 6 and 7 (cold). Most state in zone 6, northern third in zone 7. Implications: high R-value attics/walls, vapor retarder requirements, frost depth, ice barrier requirements.","v":3},{"id":817,"domain":1,"task":8,"topic":"Ice Dam","q":"Ice damming on roofs is caused by:","choices":["Insufficient gutter capacity","Heat loss melting snow that re-freezes at cold eaves","Excessive ventilation","Poor shingle quality"],"correct":1,"exp":"Ice dams form when heat loss through roof melts snow above warm space, water flows to cold eave, refreezes. Backed-up water can leak. Solution: air seal and insulate ceiling, ensure ventilation. Heat cables are band-aid.","v":3},{"id":818,"domain":1,"task":8,"topic":"Knee Wall Insulation","q":"Insulation at finished attic knee walls should be:","choices":["Loose-fill on cold side only","Continuous from wall to ceiling, with air sealing on both surfaces","Not required","Open-cell foam only"],"correct":1,"exp":"Knee wall insulation: continuous coverage from wall through to ceiling, properly air-sealed on both sides. Common defect: insulation falls or missing at top of knee wall, leaving direct air path between living space and unconditioned attic.","v":3},{"id":819,"domain":1,"task":8,"topic":"Seal
