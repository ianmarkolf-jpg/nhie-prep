id": 5471, "domain": 1, "task": 3, "topic": "Visible Defects EXCEPT", "q": "All of the following are typical roofing defects EXCEPT:", "choices": ["Uniform color across roof", "Granule loss", "Damaged flashings", "Lifted or missing shingles"], "correct": 0, "exp": "Uniform color is not a defect. Granule loss, lifted/missing/cracked shingles, exposed nails, damaged or absent flashings, bare spots are all typical defects.", "v": 5}, {"id": 5472, "domain": 1, "task": 3, "topic": "Drip Edge Function", "q": "Drip edge at eaves serves to:", "choices": ["Prevent ice damming", "Direct water into gutter and away from fascia", "Provide structural support", "Hold shingles in place"], "correct": 1, "exp": "Drip edge directs water into gutter and away from fascia and underlying wood. Required by IRC at eaves and rakes since 2012. Different profiles for eaves (T-style) and rakes (L-style).", "v": 5}, {"id": 5473, "domain": 1, "task": 8, "topic": "Attic Moisture Best", "q": "The most effective means of limiting moisture/mold in an attic is:", "choices": ["Using a sealant at sheathing/rafters", "Increasing airflow", "Air sealing the attic from conditioned space", "Heating the attic"], "correct": 2, "exp": "Air sealing PREVENTS moisture-laden air from entering. Ventilation only mitigates moisture that already arrived. Choose prevention over mitigation. Common air leaks: top plates, can lights, plumbing penetrations, attic hatch.", "v": 5}, {"id": 5474, "domain": 1, "task": 8, "topic": "Attic R-Value Cold Climate", "q": "Modern code-recommended attic insulation in cold climates:", "choices": ["R-13", "R-100", "R-49 to R-60", "R-19"], "correct": 2, "exp": "Cold climate attics: typically R-49 to R-60 in current codes. Wisconsin (climate zones 6-7): R-49+. R-30 was older standard. Higher R-values appropriate for further cold climates.", "v": 5}, {"id": 5475, "domain": 1, "task": 8, "topic": "2x4 Wall R", "q": "Standard 2x4 wood-frame wall cavities can typically achieve approximately:", "choices": ["R-60", "R-49", "R-30", "R-13 to R-15"], "correct": 3, "exp": "2x4 cavities (3.5 inches deep): R-13 standard fiberglass batt, R-15 high-density. 2x6 walls: R-19 to R-21. Higher R requires deeper cavity or exterior continuous insulation.", "v": 5}, {"id": 5476, "domain": 1, "task": 8, "topic": "Vapor Retarder Cold", "q": "In a cold climate, vapor retarder should be located:", "choices": ["Not needed", "Outside of wall", "On warm (interior) side of insulation", "Middle of assembly"], "correct": 2, "exp": "Cold climate: vapor retarder on warm (interior) side of insulation. Stops indoor moisture from migrating outward and condensing in cold cavity. Common: kraft paper backing on batts (facing in), or polyethylene sheet.", "v": 5}, {"id": 5477, "domain": 1, "task": 8, "topic": "Class III Vapor", "q": "Standard latex paint on drywall typically functions as:", "choices": ["No vapor control", "Vapor barrier", "Vapor open membrane", "Class III vapor retarder (1-10 perms)"], "correct": 3, "exp": "Painted drywall: Class III vapor retarder (1-10 perms). Acceptable in many climate zones. Class II = 0.1-1 perm (kraft paper, smart membranes). Class I = under 0.1 perm (poly sheet).", "v": 5}, {"id": 5478, "domain": 1, "task": 8, "topic": "Soffit Vent", "q": "Soffit vents in attic ventilation provide:", "choices": ["Insulation", "Intake (low) airflow", "Equal intake/exhaust", "Exhaust"], "correct": 1, "exp": "Soffit vents: low-side intake. Combined with ridge or gable vents (high-side exhaust), creates passive ventilation. Code typically requires 50-50 split between intake and exhaust net free area.", "v": 5}, {"id": 5479, "domain": 1, "task": 8, "topic": "Exterior Foam", "q": "Exterior continuous insulation:", "choices": ["Reduces thermal bridging through studs", "Cannot be in cold climates", "Reduces R-value", "Requires no vapor management"], "correct": 0, "exp": "Continuous exterior insulation (rigid foam, mineral wool) covers studs and reduces thermal bridging. Studs conduct heat at much lower R than cavity. Increasingly common in modern construction.", "v": 5}, {"id": 5480, "domain": 1, "task": 8, "topic": "WI Climate Zone", "q": "Most of Wisconsin falls in IECC climate zone:", "choices": ["3 (warm)", "8 (subarctic)", "4-5 (mixed)", "6-7 (cold)"], "correct": 3, "exp": "Wisconsin: climate zones 6 and 7 (cold). Most state in zone 6, northern third in zone 7. Implications: high R-value attics/walls, vapor retarder requirements, frost depth, ice barrier requirements.", "v": 5}, {"id": 5481, "domain": 1, "task": 8, "topic": "Ice Dam", "q": "Ice damming on roofs is caused by:", "choices": ["Insufficient gutter capacity", "Poor shingle quality", "Heat loss melting snow that re-freezes at cold eaves", "Excessive ventilation"], "correct": 2, "exp": "Ice dams form when heat loss through roof melts snow above warm space, water flows to cold eave, refreezes. Backed-up water can leak. Solution: air seal and insulate ceiling, ensure ventilation. Heat cables are band-aid.", "v": 5}, {"id": 5482, "domain": 1, "task": 8, "topic": "Encapsulated Crawl", "q": "A conditioned (sealed/encapsulated) crawl space requires:", "choices": ["Sealed walls and rim joists", "Continuous vapor barrier on soil", "All of the above", "Insulation on perimeter walls"], "correct": 2, "exp": "Encapsulated crawl: vapor barrier on soil (typically 6+ mil poly, taped seams, sealed to walls), sealed/insulated rim and walls, conditioning (small register or dehumidifier), no soil-to-wood contact, sealed access.", "v": 5}, {"id": 5483, "domain": 1, "task": 8, "topic": "Attic Hatch", "q": "Attic access hatches should be:", "choices": ["Uninsulated for accessibility", "Insulated and weatherstripped", "Painted only", "Plywood without sealing"], "correct": 1, "exp": "Attic hatches: major heat loss points. Need insulation matching attic, weatherstripping at perimeter, latching to compress weatherstrip. Code typically requires R-value matching surrounding insulation.", "v": 5}, {"id": 5484, "domain": 1, "task": 8, "topic": "Ductwork Insulation", "q": "Ductwork in unconditioned spaces (attic, crawl) should be:", "choices": ["Removed", "Sealed but not insulated", "Insulated to reduce energy loss", "Uninsulated"], "correct": 2, "exp": "Ducts in unconditioned spaces lose heat (winter), gain heat (summer). Insulating reduces conditioning losses. Code typically requires R-8 in attics, R-6 in crawl spaces. Sealing duct seams also critical.", "v": 5}, {"id": 5485, "domain": 1, "task": 8, "topic": "Cellulose", "q": "Cellulose insulation:", "choices": ["Cannot be in attics", "Lower R-value than fiberglass", "Highly flammable", "Made from recycled paper treated with borate"], "correct": 3, "exp": "Cellulose: recycled paper with borate fire retardants. Comparable R-value to fiberglass (R-3.5 to R-3.8 per inch). Often blown-in for attic retrofit. Settles over time (~10-20%). Better at filling small gaps than fiberglass.", "v": 5}, {"id": 5486, "domain": 1, "task": 8, "topic": "Bath Fan in Attic", "q": "A bath fan that terminates inside the attic:", "choices": ["Required for ventilation", "A defect that introduces moisture into attic", "No implications", "Acceptable as long as fan works"], "correct": 1, "exp": "Bath fans must terminate to OUTSIDE - through soffit, gable, or roof. Termination in attic dumps humid bathroom air into a cold space, causing condensation, mold, frost on roof sheathing. Common defect.", "v": 5}, {"id": 5487, "domain": 1, "task": 8, "topic": "Air Bypass Effects", "q": "Air bypasses (unsealed penetrations) in a ceiling:", "choices": ["All of the above", "Carry moisture to attic, causing condensation", "Leak conditioned air to attic", "Typically the largest source of envelope leakage"], "correct": 0, "exp": "Air bypasses are major culprits: lose heat, transport moisture, defeat insulation, drive ice dams. Sealing them is often the highest-ROI energy improvement in older homes.", "v": 5}, {"id": 5488, "domain": 1, "task": 8, "topic": "Insulation Settling", "q": "Loose-fill insulation settles over time. The result is:", "choices": ["Decreased R-value due to reduced thickness", "No change", "Increased thermal mass", "Increased R-value"], "correct": 0, "exp": "Settling reduces thickness, which reduces R-value. Cellulose settles ~10-20%, fiberglass loose-fill less. When evaluating, measure actual thickness rather than relying on stated R-value at original install.", "v": 5}, {"id": 5489, "domain": 1, "task": 1, "topic": "Grade Slope", "q": "Grade should slope away from a foundation a minimum of:", "choices": ["12 inches over 6 feet", "1 inch over 6 feet", "2 inches over 4 feet", "6 inches over the first 10 feet (5% slope)"], "correct": 3, "exp": "Standard requirement: 6 inches over first 10 feet (5% slope). Negative grade is one of the most common defects in older Wisconsin housing stock and a primary contributor to basement water entry.", "v": 5}, {"id": 5490, "domain": 1, "task": 1, "topic": "Hardscape Slope", "q": "Hardscape (patios/walkways) should slope away from building at minimum:", "choices": ["1/2 inch per foot", "No slope required", "1 inch per foot", "1/4 inch per foot (2% slope)"], "correct": 3, "exp": "Hardscape: 2% minimum slope (1/4 inch per foot) away from structure. Less slope can result in standing water and migration toward foundation.", "v": 5}, {"id": 5491, "domain": 1, "task": 1, "topic": "Negative Grade", "q": "Negative grade refers to:", "choices": ["Insufficient drainage capacity", "Compacted soil", "Grade that slopes toward the foundation", "Soil with negative ions"], "correct": 2, "exp": "Negative grade slopes toward foundation rather than away. Directs water at foundation - common cause of basement moisture, efflorescence, structural damage. Typical defect requiring soil regrading.", "v": 5}, {"id": 5492, "domain": 1, "task": 1, "topic": "Trip Hazard", "q": "A change in elevation between adjacent walkway sections that constitutes a trip hazard is generally:", "choices": ["Greater than 1/8 inch", "Greater than 1 inch", "Greater than 1/2 inch", "Greater than 1/4 inch"], "correct": 3, "exp": "Trip hazards: differential elevations greater than 1/4 inch typically considered hazards under accessibility/life safety standards. Common causes: freeze-thaw heaving, root upheaval, settlement.", "v": 5}, {"id": 5493, "domain": 1, "task": 1, "topic": "Swale", "q": "A swale is:", "choices": ["Foundation footing", "Type of retaining wall", "Shallow drainage channel", "Type of vegetation"], "correct": 2, "exp": "A swale: shallow, vegetated drainage channel designed to direct surface water flow. Often used to route water around or away from a structure where pipes are not practical.", "v": 5}, {"id": 5494, "domain": 1, "task": 1, "topic": "Culvert", "q": "A culvert is:", "choices": ["Pipe carrying water under a driveway or roadway", "Type of foundation drain", "Vegetated buffer", "Drainage channel along a road"], "correct": 0, "exp": "A culvert: pipe (typically large diameter metal or concrete) allowing water to flow under driveway or road. Often found at end of driveways crossing a roadside swale or ditch.", "v": 5}, {"id": 5495, "domain": 1, "task": 1, "topic": "Storm vs Sanitary", "q": "A residential storm water drainage system may include all of the following EXCEPT:", "choices": ["Underground drains", "Swales", "Gutters and downspouts", "Sanitary sewer connections"], "correct": 3, "exp": "Storm water (clean rain runoff) must NEVER be combined with sanitary sewer per modern code. Old combined systems exist in some cities (parts of Milwaukee included) but new connections require separate storm and sanitary lines.", "v": 5}, {"id": 5496, "domain": 1, "task": 1, "topic": "Downspout Discharge", "q": "Downspouts should discharge water:", "choices": ["At least 4-6 feet away from foundation", "Onto adjacent roof", "Directly against foundation", "Into sanitary sewer"], "correct": 0, "exp": "Downspouts: at least 4-6 feet from foundation, with extensions or splash blocks. Discharging at foundation defeats purpose of gutters - primary cause of basement moisture.", "v": 5}, {"id": 5497, "domain": 1, "task": 1, "topic": "Egress Window Well", "q": "An egress window well must allow window to open fully and provide horizontal projection of at least:", "choices": ["12 sq ft, 48 inch", "9 sq ft area, 36 inch projection", "No minimum", "6 sq ft, 24 inch"], "correct": 1, "exp": "Egress wells: 9 sq ft area minimum, 36 inches projection from wall, allowing window full opening. Wells deeper than 44 inches require permanently affixed ladder or steps.", "v": 5}, {"id": 5498, "domain": 1, "task": 1, "topic": "Detached Garage SOP", "q": "The condition of a detached garage in a home inspection is generally:", "choices": ["Out of scope entirely", "In scope as part of inspection", "Inspected only with extra fee", "Inspected only if attached"], "correct": 1, "exp": "Detached garages and carports: typically IN scope. Other auxiliary structures (sheds, barns, gazebos) typically out of scope unless specifically agreed. Note in pre-inspection agreement.", "v": 5}, {"id": 5499, "domain": 1, "task": 1, "topic": "Driveway to Garage", "q": "A driveway sloping toward an attached garage is:", "choices": ["Neutral observation", "Required for drainage", "Required for braking", "Defect that can direct water into garage"], "correct": 3, "exp": "Driveway sloping TOWARD garage: directs water against garage door and into structure. Proper installation slopes water away from garage and house, often using trench drains where slope cannot be reversed.", "v": 5}, {"id": 5500, "domain": 1, "task": 1, "topic": "Pool Barrier Height", "q": "Minimum height for a pool access barrier (fence) is generally:", "choices": ["36 inches", "48 inches", "42 inches", "60 inches"], "correct": 1, "exp": "Pool access barriers: at least 48 inches high, measured from side facing away from pool. Openings should not allow passage of 4-inch sphere. Multiple barriers (door + fence) often required.", "v": 5}, {"id": 5501, "domain": 1, "task": 1, "topic": "Pool Gates", "q": "Gates serving pool access barriers should:", "choices": ["Open outward away from pool, self-close, self-latch", "Have no latching mechanism", "Be propped open during pool season", "Open inward toward pool"], "correct": 0, "exp": "Gates: open AWAY from pool, self-close, self-latch. Latch release at least 54 inches above ground (or on pool side) to prevent young children operating it.", "v": 5}, {"id": 5502, "domain": 1, "task": 1, "topic": "Settlement vs Heaving", "q": "Differential movement in a concrete walkway can be caused by:", "choices": ["Frost heaving", "Tree root displacement", "All of the above", "Settlement from voids"], "correct": 2, "exp": "All three common causes: frost heave (especially Wisconsin), settlement into voids, root pressure. All create differential movement and trip hazards. Frost-heave damage often appears at first/last warmer months.", "v": 5}, {"id": 5503, "domain": 1, "task": 1, "topic": "Patio Defects", "q": "Common defects in patios include all of the following EXCEPT:", "choices": ["Uniform color and texture", "Poor drainage / ponding", "Trip hazards", "Slippery surfaces when wet"], "correct": 0, "exp": "Uniform appearance: not a defect. Trip hazards, slippery surfaces, ponding, slope toward structure are typical defects. Cosmetic items reported only if significant.", "v": 5}, {"id": 5504, "domain": 1, "task": 1, "topic": "Vegetation In Scope", "q": "Vegetation is in scope of a home inspection when:", "choices": ["Never - always out of scope", "Has aesthetic value", "Likely to have adverse impact on the house", "Client's specific concern"], "correct": 2, "exp": "Vegetation in scope: when affects house. Tree limbs over roof, shrubs against siding, root systems near foundation, vines on exterior walls. General landscaping (yard layout, plant variety) out of scope.", "v": 5}, {"id": 5505, "domain": 1, "task": 1, "topic": "Site Component Reporting", "q": "When inspecting site conditions, the home inspector should:", "choices": ["Limit reporting to conditions affecting the house", "Avoid reporting site conditions", "Report only items client asks", "Inspect all conditions on property"], "correct": 0, "exp": "Site condition reporting: focused on items that affect or could affect the house. Grading, drainage, vegetation contact, hardscape near foundation. Conditions on property not affecting the house typically out of scope.", "v": 5}, {"id": 5506, "domain": 1, "task": 2, "topic": "Stucco Three Layers", "q": "The three layers of traditional stucco coating are:", "choices": ["Weep screed, building paper, metal lath", "Moisture barrier, weep screed, drainage plane", "Drainage plane, capillary break, paper", "Scratch, brown, and finish"], "correct": 3, "exp": "COATING layers: scratch (first, scored for tooth), brown (leveling), finish (texture/color). The OTHER terms describe the SUBSTRATE assembly: building paper, weep screed, metal lath. Don't confuse coating vs substrate.", "v": 5}, {"id": 5507, "domain": 1, "task": 2, "topic": "Wood Siding Clearance", "q": "Untreated wood siding should maintain minimum clearance to grade of:", "choices": ["6 inches", "4 inches", "2 inches", "12 inches"], "correct": 0, "exp": "Untreated wood siding: 6 inches minimum clearance to soil grade. Concrete and other non-wood materials require lesser clearances. Failure causes rot and pest infestation.", "v": 5}, {"id": 5508, "domain": 1, "task": 2, "topic": "Untreated Wood Beam", "q": "Minimum clearance to soil for untreated dimensional wood beams:", "choices": ["8 inches", "6 inches", "18 inches", "12 inches"], "correct": 3, "exp": "Untreated dimensional wood beams: 12 inches clearance to soil. Pressure-treated or naturally durable wood (cedar, redwood) has lesser requirements but should still maintain reasonable clearance.", "v": 5}, {"id": 5509, "domain": 1, "task": 2, "topic": "Vinyl Siding Defect", "q": "A common defect with vinyl siding installation:", "choices": ["Painting the surface", "Nailing too tightly so panels can't expand/contract", "Use of stainless steel nails", "Vertical orientation"], "correct": 1, "exp": "Vinyl siding: must be hung loosely so it can expand/contract with temperature changes. Nailing tight causes warping and oil-canning. Nail in center of slot, with ~1/16 inch gap to head.", "v": 5}, {"id": 5510, "domain": 1, "task": 2, "topic": "EIFS", "q": "EIFS stands for:", "choices": ["Exterior Integrated Flashing", "Exterior Insulation and Finish System", "Exterior Industrial Foam System", "Engineered Interior Finish System"], "correct": 1, "exp": "EIFS: Exterior Insulation and Finish System. Multi-layer wall system using foam insulation, base coat with mesh, synthetic finish. First-generation EIFS (face-sealed, no drainage) caused widespread moisture damage in 1990s.", "v": 5}, {"id": 5511, "domain": 1, "task": 2, "topic": "Exterior Door Egress", "q": "An exterior door with interior-keyed deadbolt:", "choices": ["Required by code", "A defect because it can prevent egress in emergency", "Best practice for security", "Acceptable in all locations"], "correct": 1, "exp": "Interior-keyed deadbolts: egress hazard. In a fire, occupants may not find the key. Most codes require thumbturn or single-cylinder deadbolts on egress doors.", "v": 5}, {"id": 5512, "domain": 1, "task": 2, "topic": "Window Safety Glazing", "q": "Safety glazing (tempered glass) is required in all of the following EXCEPT:", "choices": ["Bathroom shower enclosures", "Within 18 inches of walking surface", "Standard living room windows above 18 inches", "Within 24 inches of a door"], "correct": 2, "exp": "Safety glazing required: within 24 inches of doors, within 18 inches of floor (large panes), in shower/tub enclosures, on stair landings. Standard living room windows that don't meet proximity tests do not require safety glazing.", "v": 5}, {"id": 5513, "domain": 1, "task": 2, "topic": "Deck Ledger Defects", "q": "A common defect with deck ledger board attachment:", "choices": ["Use of nails instead of lag bolts or carriage bolts", "Bolts spaced too far apart", "All of the above", "Lack of flashing"], "correct": 2, "exp": "All three are common deck ledger defects. Nails alone don't provide adequate pull-out resistance. Bolts must follow span/load tables. Lack of flashing leads to rim joist rot. Deck collapses often trace back to ledger attachment failures.", "v": 5}, {"id": 5514, "domain": 1, "task": 2, "topic": "Deck Ledger Flashing", "q": "Flashing at a deck ledger should:", "choices": ["Match siding color", "Direct water away from building", "Be omitted if good drainage", "Be adhered with caulk only"], "correct": 1, "exp": "Ledger flashing: moisture management detail directing water away from building's rim joist and wall sheathing. Without proper flashing, water gets behind ledger and rots rim joist - common cause of catastrophic deck collapse.", "v": 5}, {"id": 5515, "domain": 1, "task": 2, "topic": "Guard Trigger", "q": "A guardrail is required when walking surface is more than ____ above grade:", "choices": ["30 inches", "18 inches", "12 inches", "36 inches"], "correct": 0, "exp": "Guardrails: required when walking surface is more than 30 inches above grade or floor below within 36 inches horizontally. Decks, balconies, raised landings, and stairs.", "v": 5}, {"id": 5516, "domain": 1, "task": 2, "topic": "Guard Height", "q": "Guardrails on residential decks must be at least:", "choices": ["60 inches", "30 inches", "42 inches", "36 inches (residential)"], "correct": 3, "exp": "Residential guardrails: 36 inches minimum on decks. Commercial requires 42 inches. The 4-inch sphere rule applies to baluster spacing.", "v": 5}, {"id": 5517, "domain": 1, "task": 2, "topic": "Baluster Spacing", "q": "Guardrail balusters should be spaced so that:", "choices": ["A 6-inch sphere cannot pass", "A 2-inch sphere cannot pass", "A 4-inch sphere cannot pass through", "Spacing is unrestricted"], "correct": 2, "exp": "4-inch sphere rule: baluster spacing must not allow 4-inch sphere to pass through. Prevents small children from squeezing between or getting head stuck.", "v": 5}, {"id": 5518, "domain": 1, "task": 2, "topic": "Stair Riser Variation", "q": "Maximum variation in riser height within a single flight:", "choices": ["3/4 inch", "3/8 inch", "1/2 inch", "1/4 inch"], "correct": 1, "exp": "IRC limits riser height variation to 3/8 inch within a single flight. Same tolerance applies to tread depth. Inconsistent risers cause trips because climber's stride pattern is broken.", "v": 5}, {"id": 5519, "domain": 1, "task": 2, "topic": "Garage Door Auto-Reverse", "q": "A residential garage door opener must have an auto-reverse system that activates when:", "choices": ["The remote pressed twice", "The door open more than 1 hour", "The door encounters resistance during closing", "Voice-activated"], "correct": 2, "exp": "Auto-reverse must activate when door encounters resistance during closing. Test by placing a 2x4 flat on floor in door path - the door should reverse when contacting it. Required since 1993 federal mandate.", "v": 5}, {"id": 5520, "domain": 1, "task": 2, "topic": "Garage Door Photoeyes", "q": "Garage door opener photoelectric sensors (photoeyes) should be installed at:", "choices": ["Center of door", "Top of door", "No more than 6 inches above floor", "Flush with ceiling"], "correct": 2, "exp": "Photoeyes: no more than 6 inches above floor so they detect children, pets, and objects in door path. Higher mounting allows objects to pass under the beam.", "v": 5}, {"id": 5521, "domain": 1, "task": 2, "topic": "Soffit", "q": "The soffit is:", "choices": ["Flashing at base of wall", "Vertical trim board at rake of roof", "Horizontal underside of roof overhang", "Top course of siding"], "correct": 2, "exp": "Soffit: horizontal underside of roof overhang (eave). Often perforated or vented to allow attic intake ventilation. Vertical board at edge is the fascia.", "v": 5}, {"id": 5522, "domain": 1, "task": 2, "topic": "Fascia", "q": "The fascia is:", "choices": ["Horizontal underside of eave", "Framing member behind soffit", "Vertical trim board at edge of roof", "Drainage plane behind siding"], "correct": 2, "exp": "Fascia: vertical trim board at edge of roof, typically where gutters are mounted. Soffit is the horizontal underside.", "v": 5}, {"id": 5523, "domain": 1, "task": 2, "topic": "Brick Veneer", "q": "A typical residential brick wall is most often:", "choices": ["Non-structural veneer attached to wood-framed wall behind", "EIFS-style finish", "Structural masonry supporting roof loads", "Solid masonry 12 inches thick"], "correct": 0, "exp": "Most modern residential brick: veneer - non-structural cladding tied to wood-framed structural wall behind it with metal ties. Typically 1-inch air gap and weep holes at the base. Don't assume structural.", "v": 5}, {"id": 5524, "domain": 1, "task": 6, "topic": "AC Cold Test", "q": "An AC compressor should NOT be tested in cooling mode if outdoor temps have been below approximately:", "choices": ["70°F", "45°F for 12 hours", "32°F for 24 hours", "60°F for 24 hours"], "correct": 3, "exp": "Standard rule: don't run cooling if outdoor temps were below ~60°F for 24 hours. Risk: oil migration in compressor, slugging on startup. Disclaim cooling test in cold weather.", "v": 5}, {"id": 5525, "domain": 1, "task": 6, "topic": "AC Temp Drop", "q": "Normally functioning residential AC should produce temperature differential (return to supply) of approximately:", "choices": ["5-10°F", "14-22°F", "Over 40°F", "25-35°F"], "correct": 1, "exp": "Normal supply-to-return temperature drop: 14-22°F (sometimes stated 15-20°F). Lower may indicate low refrigerant or airflow problems; higher may indicate poor airflow.", "v": 5}, {"id": 5526, "domain": 1, "task": 6, "topic": "SEER", "q": "SEER stands for:", "choices": ["System Energy Efficiency Rating", "Seasonal Energy Efficiency Ratio", "Sensible Energy Reading", "Standard Efficiency Estimation Range"], "correct": 1, "exp": "SEER (Seasonal Energy Efficiency Ratio) measures cooling efficiency over a season. Modern minimum SEER 13-15 (varies by region/year), high-efficiency 18-25+. Higher SEER = lower operating cost.", "v": 5}, {"id": 5527, "domain": 1, "task": 6, "topic": "R-22 Phaseout", "q": "Older AC systems often used R-22 refrigerant, which is:", "choices": ["Phased out due to ozone depletion", "Only used in commercial", "Still readily available and inexpensive", "Indicator of premium quality"], "correct": 0, "exp": "R-22 (Freon, HCFC): phased out under Montreal Protocol due to ozone depletion. R-410A (Puron) is most common modern replacement. Mixing or substituting refrigerants improper. Old R-22 systems become expensive to service.", "v": 5}, {"id": 5528, "domain": 1, "task": 6, "topic": "Compressor Location", "q": "In a split AC, the compressor is located in:", "choices": ["Indoor air handler", "Thermostat", "Ductwork", "Outdoor unit (condensing unit)"], "correct": 3, "exp": "Compressor: outdoor condensing unit. Indoor unit (air handler) contains evaporator coil. Mini-splits and packaged units differ in some configurations.", "v": 5}, {"id": 5529, "domain": 1, "task": 6, "topic": "Condenser Defects", "q": "Common defects with AC condensing unit installations include:", "choices": ["All of the above", "Damaged or missing electrical wiring/disconnect", "Restriction of airflow at condensing coil (vegetation, debris)", "Missing or rusted suction line insulation"], "correct": 0, "exp": "Common defects: damaged wiring/disconnect, vegetation or debris restricting condenser airflow (must have clearances), missing insulation on suction line, refrigerant leaks at fittings, condensate drainage issues, electrical clearance issues.", "v": 5}, {"id": 5530, "domain": 1, "task": 6, "topic": "HSPF", "q": "HSPF measures:", "choices": ["Furnace efficiency", "Cooling efficiency", "Heating efficiency for heat pumps", "Insulation R-value"], "correct": 2, "exp": "HSPF (Heating Seasonal Performance Factor): measures heat pump heating efficiency. Higher HSPF = more efficient. Modern minimum 7.7-8.8, high-efficiency 9-13. Furnace efficiency = AFUE.", "v": 5}, {"id": 5531, "domain": 1, "task": 6, "topic": "Mini-Split", "q": "A ductless mini-split system:", "choices": ["Cannot heat AND cool", "Always single outdoor + single indoor", "Cannot be in northern climates", "Outdoor unit + indoor head units, no ductwork"], "correct": 3, "exp": "Ductless mini-splits: outdoor compressor/condenser + one or more indoor air handlers (heads), connected by refrigerant lines. No ductwork. Multi-zone systems serve several rooms. Modern cold-climate models work to -15°F or below.", "v": 5}, {"id": 5532, "domain": 1, "task": 6, "topic": "Condensing Pad", "q": "The pad supporting an outdoor AC unit should:", "choices": ["Slope toward foundation", "Be embedded in soil", "Be level and well-drained", "Be plywood"], "correct": 2, "exp": "AC pad: level (compressor needs level operation for oil distribution), well-drained, supportive (typically concrete or composite). Pad settling that tilts unit can damage compressor over time.", "v": 5}, {"id": 5533, "domain": 1, "task": 6, "topic": "AC Inspection", "q": "When testing an AC, the inspector typically verifies:", "choices": ["Temperature differential at supply and return", "System operates from thermostat", "All of the above", "Outdoor unit fan and compressor run"], "correct": 2, "exp": "AC inspection: verify operation from thermostat, observe outdoor fan and compressor running, measure supply-return temp drop, observe condensate drainage, check accessible filters and visible refrigerant lines.", "v": 5}, {"id": 5534, "domain": 1, "task": 6, "topic": "Bent Fins", "q": "Bent or damaged condenser fins:", "choices": ["Increase capacity", "No effect", "Indicate failing unit", "Restrict airflow and reduce efficiency"], "correct": 3, "exp": "Condenser fins: how heat is transferred to outside air. Bent or matted fins restrict airflow and reduce capacity/efficiency. A fin comb can straighten minor damage. Severe damage requires coil replacement.", "v": 5}, {"id": 5535, "domain": 1, "task": 6, "topic": "Evaporator Location", "q": "The evaporator coil is located in:", "choices": ["Disconnect box", "Refrigerant lineset", "Outdoor unit", "Indoor air handler (or above the furnace)"], "correct": 3, "exp": "Evaporator coil: indoors - either inside an air handler or in an A-coil cabinet sitting on top of a furnace (called an evaporator coil cabinet). Air passes over it and is cooled.", "v": 5}, {"id": 5536, "domain": 1, "task": 11, "topic": "Spa Access Panel", "q": "Minimum spa tub access panel opening size:", "choices": ["36x30 inches", "24x16 inches", "15x21 inches", "12x12 inches"], "correct": 3, "exp": "Spa access: 12x12 minimum, 18x18 if pump is more than 2 feet from opening. 24x16 = crawlspace access. 36x30 = guardrail trigger. 15x21 = toilet clearances. Don't confuse the dimensions for different applications.", "v": 5}, {"id": 5537, "domain": 1, "task": 11, "topic": "Stair Riser Max", "q": "Maximum riser height for residential stairs is generally:", "choices": ["8-1/4 inches", "6 inches", "7-3/4 inches", "7 inches"], "correct": 2, "exp": "IRC residential: maximum riser height 7-3/4 inches. Minimum tread depth 10 inches. Different from commercial (smaller riser, deeper tread). Existing stairs may not meet modern dimensions.", "v": 5}, {"id": 5538, "domain": 1, "task": 11, "topic": "Stair Tread Min", "q": "Minimum tread depth for residential stairs is generally:", "choices": ["8 inches", "9 inches", "10 inches", "12 inches"], "correct": 2, "exp": "IRC residential: minimum tread depth 10 inches. Combined with 7-3/4 inch max riser, defines comfortable/safe stair geometry. Old homes may have 8-9 inch treads (defect for new construction).", "v": 5}, {"id": 5539, "domain": 1, "task": 11, "topic": "Headroom", "q": "Minimum headroom for stairs is generally:", "choices": ["6 feet", "7 feet", "6 feet 8 inches", "7 feet 6 inches"], "correct": 2, "exp": "Stair headroom: 6'8\" minimum. Measured vertically from sloped line connecting tread nosings to ceiling. Common defect under finished basement stairs and remodels.", "v": 5}, {"id": 5540, "domain": 1, "task": 11, "topic": "Anti-Tip", "q": "An anti-tip bracket is required for:", "choices": ["Microwaves", "Dishwashers", "Refrigerators", "Free-standing kitchen ranges"], "correct": 3, "exp": "Anti-tip bracket: required on free-standing ranges to prevent tipping if a child climbs on or weight is applied to the open oven door. Often missing or installed incorrectly. Test by tilting the range.", "v": 5}, {"id": 5541, "domain": 1, "task": 11, "topic": "Dishwasher Air Gap", "q": "A dishwasher discharge in some jurisdictions requires:", "choices": ["No special provision", "An additional pump", "High loop or air gap on drain line", "Direct connection to disposal"], "correct": 2, "exp": "Dishwasher drain: high loop (above under-counter level) OR air gap fitting on countertop. Prevents backflow from sink/disposal into dishwasher. Required by some jurisdictions; high loop generally minimum standard.", "v": 5}, {"id": 5542, "domain": 1, "task": 11, "topic": "Cabinet Securing", "q": "Wall cabinets should be secured:", "choices": ["Construction adhesive only", "Finish nails to drywall", "Cabinet screws into wall studs", "Drywall anchors only"], "correct": 2, "exp": "Wall cabinets: secured into wall studs with appropriate cabinet/wood screws. Drywall anchors alone cannot support loaded cabinets. Common defect in DIY remodels - cabinets eventually pull off the wall.", "v": 5}, {"id": 5543, "domain": 1, "task": 11, "topic": "Bedroom Egress", "q": "Bedroom egress door hardware should:", "choices": ["Have keyed deadbolts both sides", "Be operable without keys, special knowledge, or tools", "Require key from inside", "Be locked with deadbolts"], "correct": 1, "exp": "Egress doors: operable without keys, tools, or special knowledge from inside. Single-cylinder deadbolt with thumbturn OK; double-cylinder (key both sides) violates egress.", "v": 5}, {"id": 5544, "domain": 1, "task": 11, "topic": "Window Sill", "q": "Maximum sill height of an egress window above bedroom floor:", "choices": ["24 inches", "60 inches", "44 inches", "36 inches"], "correct": 2, "exp": "Egress window: max sill 44 inches above floor. Min net clear opening dimensions still apply (24 in height, 20 in width, 5.7 sq ft area for above-grade openings).", "v": 5}, {"id": 5545, "domain": 1, "task": 11, "topic": "Failed IGU", "q": "An insulating glass unit (IGU) seal failure is identified by:", "choices": ["Soft glass", "Discolored grids", "Visible cracks", "Condensation or fogging between panes"], "correct": 3, "exp": "Failed IGU seal: moisture between panes - cannot be cleaned, only replaced. Visible as fogging, mineral deposits, or persistent cloudiness between panes. Common in 15-25+ year old units.", "v": 5}, {"id": 5546, "domain": 1, "task": 11, "topic": "Drywall Crack Causes", "q": "Cracks in interior drywall can be caused by:", "choices": ["Normal seasonal movement", "Foundation settlement", "All of the above", "Truss uplift"], "correct": 2, "exp": "Drywall cracks: normal movement (small, hairline at joints), settlement (diagonal at corners of openings), truss uplift (horizontal at top of interior walls in winter), water damage. Pattern indicates cause.", "v": 5}, {"id": 5547, "domain": 1, "task": 11, "topic": "Staircase Handrail", "q": "A handrail is required on stairs with:", "choices": ["All stairs regardless", "Less than 3 risers", "Only basement", "4 or more risers"], "correct": 3, "exp": "Handrail: required on stairs with 4 or more risers (one continuous on at least one side). Modern code: graspable, mounted at 34-38 inches above tread nosings, returned to wall at ends.", "v": 5}, {"id": 5548, "domain": 2, "task": 1, "topic": "Required Tools", "q": "Which is NOT typically required by SOP for inspection?", "choices": ["Outlet tester", "Moisture meter", "Ladder for accessible areas", "Flashlight"], "correct": 1, "exp": "Specialized tools (moisture meters, thermal cameras, IR thermometers): NOT required by SOP. Required basics: flashlight, ladder for accessible areas, outlet tester. Specialized tools enhance findings but aren't mandatory.", "v": 5}, {"id": 5549, "domain": 2, "task": 1, "topic": "In-Scope Components", "q": "Which is in scope of a typical home inspection?", "choices": ["Detached garages and carports", "Underground oil tanks", "Solar PV systems", "Backup generators"], "correct": 0, "exp": "Detached garages/carports: typically in scope. Solar PV, backup generators, underground tanks, swimming pool equipment, water quality testing: typically out of scope. Specialty inspections.", "v": 5}, {"id": 5550, "domain": 2, "task": 1, "topic": "Visible Components", "q": "SOPs typically require inspection of:", "choices": ["Both readily accessible and concealed", "Readily accessible and visible components", "Concealed components", "All components"], "correct": 1, "exp": "SOPs limit inspection to readily accessible and visible. Inspector doesn't open walls, dismantle equipment, move heavy items, or perform invasive testing.", "v": 5}, {"id": 5551, "domain": 2, "task": 1, "topic": "Sample Receptacles", "q": "An inspector typically tests:", "choices": ["Only kitchen and bath", "Every receptacle", "A representative sample", "Only outdoor"], "correct": 2, "exp": "Representative sample: enough to evaluate the system, especially in critical areas (GFCI/AFCI test, kitchens, bathrooms, outdoor, near sinks). Furniture and stored items prevent testing all.", "v": 5}, {"id": 5552, "domain": 2, "task": 1, "topic": "Pre-Inspection Walk", "q": "A pre-inspection walkthrough with the client:", "choices": ["Replaces the inspection", "Good practice but not always required", "Required by all SOPs", "Illegal"], "correct": 1, "exp": "Pre-inspection walkthrough/conversation: good practice (sets expectations, identifies client priorities) but not required by all SOPs. Required: a written report following the inspection.", "v": 5}, {"id": 5553, "domain": 2, "task": 1, "topic": "Buyer vs Pre-Listing", "q": "A buyer's inspection differs from a pre-listing (seller's) inspection by:", "choices": ["Buyer inspection more thorough", "Same scope, different client paying", "Pre-listing illegal", "Different SOP applies"], "correct": 1, "exp": "Same scope, same SOP - different client. Pre-listing inspections allow sellers to address issues before market or disclose proactively. Buyer inspections are after offer/contract.", "v": 5}, {"id": 5554, "domain": 2, "task": 1, "topic": "Client Education", "q": "During an inspection, the inspector should:", "choices": ["Give legal advice", "Refuse to talk to clients", "Educate client about systems and findings", "Suggest renovations"], "correct": 2, "exp": "Client education during inspection: significant value-add. Show systems, explain findings, point out maintenance items. Stay within scope - don't give legal/financial/design advice.", "v": 5}, {"id": 5555, "domain": 2, "task": 1, "topic": "Limitations", "q": "An inspection has inherent limitations including:", "choices": ["Not a code compliance inspection", "All of the above", "Point-in-time observation", "Visible/accessible only"], "correct": 1, "exp": "Inherent limitations: visible/accessible only, point-in-time (conditions change), not code compliance, not predictive of future failures, doesn't include hidden defects. Disclose in pre-inspection agreement.", "v": 5}, {"id": 5556, "domain": 2, "task": 1, "topic": "Pre-Inspection Walk Discussion", "q": "Pre-inspection conversation with client should:", "choices": ["Review pre-inspection agreement", "All of the above", "Identify client's concerns", "Set expectations about scope/limitations/time"], "correct": 1, "exp": "Pre-inspection: scope expectations, limitations, time estimate, client concerns, agreement review/signature. Sets professional foundation. Many inspectors spend 10-15 minutes here.", "v": 5}, {"id": 5557, "domain": 2, "task": 1, "topic": "Sewer Scope", "q": "A sewer scope (camera inspection of sewer lateral):", "choices": ["Required by all states", "Cannot be performed", "A separate specialty inspection", "Included in standard inspection"], "correct": 2, "exp": "Sewer scope: separate specialty inspection. Inspectors may offer it as a separate service or recommend a qualified contractor. Highly recommended in older homes (clay/cast iron laterals).", "v": 5}, {"id": 5558, "domain": 2, "task": 2, "topic": "Snow Roof Limit", "q": "Snow-covered roof:", "choices": ["Cannot be properly inspected", "Roof rated as defective when snowy", "Inspector clears snow", "Should be evaluated post-snow if possible"], "correct": 3, "exp": "Snow limits roof inspection. Disclaim, document conditions, recommend re-inspection or qualified evaluation when conditions improve. Note any visible defects (e.g., chimney issues, ice dam evidence).", "v": 5}, {"id": 5559, "domain": 2, "task": 2, "topic": "Operate vs Test", "q": "Inspectors generally operate (rather than test) equipment by:", "choices": ["Manufacturer diagnostics", "Disassembling components", "Pressure-testing", "Running it through normal controls"], "correct": 3, "exp": "Operate via normal controls: turn AC on at thermostat, run water at fixtures, operate burners on a stove, raise/lower garage door. Don't disassemble, pressure-test, or perform diagnostic procedures.", "v": 5}, {"id": 5560, "domain": 2, "task": 2, "topic": "Underground Tank", "q": "An underground oil tank:", "choices": ["In scope", "Must be excavated", "Typically out of scope and disclaimed", "Unrelated to home inspection"], "correct": 2, "exp": "Underground oil tanks: typically out of scope. Inspector may report visible signs (above-grade fill/vent pipes, evidence of an old tank), recommend specialty evaluation. Significant environmental liability if leaking.", "v": 5}, {"id": 5561, "domain": 2, "task": 2, "topic": "Septic System", "q": "Septic systems:", "choices": ["Typically out of scope, requiring specialty inspection", "Cannot be evaluated", "In standard home inspection scope", "Inspected via flush test only"], "correct": 0, "exp": "Septic: typically out of scope. Inspector may note visible components (lid, riser, signs of failure). Recommend specialty septic inspection (typically required at sale in many jurisdictions).", "v": 5}, {"id": 5562, "domain": 2, "task": 2, "topic": "Active Leak Observed", "q": "If active leakage is observed during inspection:", "choices": ["Pays for repair", "Reports active leak and recommends correction", "Ignores", "Inspector turns off water supply"], "correct": 1, "exp": "Active leak: report it (location, observed condition), recommend correction by qualified party. Don't try to turn off water mains. Don't perform repairs. Document immediately with photos.", "v": 5}, {"id": 5563, "domain": 2, "task": 2, "topic": "Specialized Equipment", "q": "Specialized equipment beyond SOP includes:", "choices": ["Thermal imaging cameras", "All of the above", "Borescope cameras", "Moisture meters"], "correct": 1, "exp": "Specialized: thermal cameras, moisture meters, borescopes, gas leak detectors, formaldehyde testers, asbestos kits. Useful add-ons but not required by SOP. Some inspectors include in standard service.", "v": 5}, {"id": 5564, "domain": 2, "task": 2, "topic": "Lead Paint", "q": "Lead paint identification:", "choices": ["Requires specialty testing (XRF, paint chip)", "Visual identification only", "Always present in pre-1978", "Cannot be evaluated"], "correct": 0, "exp": "Lead paint: federal regulations require disclosure for homes pre-1978. Visual indicators possible (chipping/peeling old paint). Confirmation: XRF test or paint chip lab analysis. Specialty service.", "v": 5}, {"id": 5565, "domain": 2, "task": 2, "topic": "Radon", "q": "Radon testing during home inspection:", "choices": ["Optional specialty service requiring multi-day testing", "Standard SOP", "Always required by federal law", "Single quick reading"], "correct": 0, "exp": "Radon: 48-hour minimum continuous test (or charcoal canister + lab). Specialty service. EPA recommends for all home purchases. Wisconsin has elevated radon; common buyer add-on.", "v": 5}, {"id": 5566, "domain": 2, "task": 2, "topic": "Pest Inspection", "q": "Termite/pest inspection (WDO/WDI):", "choices": ["Standard SOP", "Specialty service often required by lender", "Same as home inspection", "Cannot be performed"], "correct": 1, "exp": "WDO/WDI inspection: separate specialty often required by lenders, especially in heavy termite areas. Inspector may identify visible signs but not perform formal WDO inspection without certification.", "v": 5}, {"id": 5567, "domain": 2, "task": 3, "topic": "Subjective Language", "q": "Which language should be avoided in inspection reports?", "choices": ["Specific measurements", "Defect", "'Bad,' 'old,' 'crappy,' 'amateur'", "Recommendation"], "correct": 2, "exp": "Avoid subjective/judgmental language: bad, terrible, amateur, sloppy, hack job. Use objective language: 'damaged,' 'leaking,' 'inadequate (specific reason),' 'requires correction.' Keep professional.", "v": 5}, {"id": 5568, "domain": 2, "task": 3, "topic": "Photo Documentation", "q": "Photo documentation in reports:", "choices": ["Required only for life safety", "Required by all SOPs", "Best practice and increasingly expected by clients", "Optional and rarely useful"], "correct": 2, "exp": "Photos: best practice (clarifies findings, documents conditions, reduces liability). Most modern reports include photos for defects. Some SOPs require for major defects.", "v": 5}, {"id": 5569, "domain": 2, "task": 3, "topic": "Cost Estimates", "q": "Repair cost estimates in inspection reports:", "choices": ["Required by SOP", "Provided by request", "Always required", "Generally discouraged or prohibited"], "correct": 3, "exp": "Cost estimates: most SOPs prohibit or strongly discourage. Inspector is not a contractor and lacks specific information for accurate estimates. Refer to qualified contractors for estimates.", "v": 5}, {"id": 5570, "domain": 2, "task": 3, "topic": "Naming Contractors", "q": "Naming specific contractors in a report:", "choices": ["Reduces liability", "Required by SOP", "Builds business relationships", "Creates conflict of interest"], "correct": 3, "exp": "Naming contractors: conflict of interest concern. Refer to 'qualified electrician,' 'licensed plumber,' etc., not specific names. Some inspectors maintain referral lists separately, with disclosure.", "v": 5}, {"id": 5571, "domain": 2, "task": 3, "topic": "Templated Narratives", "q": "Many inspectors use templated narratives because:", "choices": ["All of the above", "Saves time and ensures consistency", "Allows verbiage review for clarity and liability", "Provides comprehensive coverage"], "correct": 0, "exp": "Templated narratives (libraries like Kenton Shepard's InterNACHI library): save time, consistency, legal review, comprehensive coverage. Customize specifics for each finding.", "v": 5}, {"id": 5572, "domain": 2, "task": 3, "topic": "Implication of Defect", "q": "Including the implication of a defect:", "choices": ["Required by some SOPs", "All of the above", "Helps client understand significance", "Reduces misunderstanding"], "correct": 1, "exp": "Implication: 'this could cause water damage,' 'reduces system efficiency,' 'creates fire hazard.' Helps client understand and prioritize. Some SOPs require, others encourage.", "v": 5}, {"id": 5573, "domain": 2, "task": 3, "topic": "Boilerplate Limit", "q": "Boilerplate (templated) language should:", "choices": ["Be avoided", "Be customized to specific finding", "Stand alone without context", "Replace inspection observations"], "correct": 1, "exp": "Boilerplate as starting point - customize with specific location, severity, observed conditions. Pure boilerplate without specifics suggests no actual inspection. Use as scaffolding for narrative.", "v": 5}, {"id": 5574, "domain": 2, "task": 3, "topic": "Findings Sectioned", "q": "Inspection reports are often sectioned by:", "choices": ["Random", "Severity", "System (electrical, plumbing, etc.)", "Both system and severity"], "correct": 3, "exp": "Modern reports: typically by system AND severity. Major findings called out at top (executive summary), then organized by system for complete review. Easier for clients and agents to navigate.", "v": 5}, {"id": 5575, "domain": 2, "task": 4, "topic": "Active Leak Recommendation", "q": "An active plumbing leak should be recommended for:", "choices": ["Annual inspection", "Prompt repair by qualified plumber", "Disregard", "DIY repair"], "correct": 1, "exp": "Active leaks: prompt repair by qualified plumber. Document scope of damage. Note potential hidden damage (water can travel; visible may be tip of iceberg).", "v": 5}, {"id": 5576, "domain": 2, "task": 4, "topic": "Cracked Heat Exchanger", "q": "A suspected cracked furnace heat exchanger:", "choices": ["Recommend evaluation by qualified HVAC technician", "Cosmetic", "Replace", "Confirmed by inspector with mirror"], "correct": 0, "exp": "Cracked heat exchanger: serious safety concern (CO into living space). Recommend evaluation by qualified HVAC tech (camera/dye/specialty testing required to confirm). Inspector observation alone insufficient.", "v": 5}, {"id": 5577, "domain": 2, "task": 4, "topic": "Bowed Foundation", "q": "A foundation wall with significant bowing:", "choices": ["Standard repair", "Requires structural engineer evaluation", "Cosmetic", "Ignore"], "correct": 1, "exp": "Bowed foundation: structural concern. Recommend evaluation by structural engineer. Possible interventions: carbon fiber straps, helical tiebacks, beam/post bracing, exterior excavation/regrading.", "v": 5}, {"id": 5578, "domain": 3, "task": 1, "topic": "Agreement Required", "q": "A pre-inspection agreement is:", "choices": ["Optional", "Required only for first-time clients", "Required only for new construction", "Required by most state regulations and SOPs"], "correct": 3, "exp": "Pre-inspection agreement: required by most state regulations, all SOPs, and is essential business practice. Defines scope, limitations, fees, dispute resolution, limit of liability.", "v": 5}, {"id": 5579, "domain": 3, "task": 1, "topic": "Agreement EXCEPT", "q": "A pre-inspection agreement should include all EXCEPT:", "choices": ["Limit of liability", "Guarantee of property condition", "Scope of inspection", "Limitations and exclusions"], "correct": 1, "exp": "Inspection is NOT a guarantee or warranty. Pre-inspection agreement: scope, limitations, exclusions, limits, dispute resolution, fees. Guaranteeing condition transforms inspection into warranty - massive liability.", "v": 5}, {"id": 5580, "domain": 3, "task": 1, "topic": "Conflicts", "q": "An inspector should avoid conflicts including:", "choices": ["Accepting referral fees from contractors", "All of the above", "Inspecting properties they have financial interest in", "Performing repairs on inspected properties for 12-24+ months"], "correct": 1, "exp": "Conflicts to avoid: post-inspection repair work (Wisconsin: 24 months prohibited), referral fees from recommended contractors, financial interest, inspecting family members' properties, etc.", "v": 5}, {"id": 5581, "domain": 3, "task": 1, "topic": "WI Repair Restriction", "q": "Wisconsin restricts inspectors from performing repairs on inspected properties for:", "choices": ["24 months (2 years)", "12 months", "No restriction", "36 months"], "correct": 0, "exp": "Wisconsin (and several other states): home inspector prohibited from performing repairs on inspected property for 24 months (2 years). Prevents conflict of interest where inspector finds defects to drive repair business.", "v": 5}, {"id": 5582, "domain": 3, "task": 1, "topic": "Privacy Obligations", "q": "Inspector privacy obligations include:", "choices": ["All of the above", "Respecting occupant property", "Not disclosing inspection findings to unauthorized parties", "Avoiding capture of personal information in photos"], "correct": 0, "exp": "Privacy obligations: minimize photographing personal items, don't disclose findings without client permission, respect occupant property and routine. Some inspectors disclose photo policy at start.", "v": 5}, {"id": 5583, "domain": 3, "task": 1, "topic": "Inspector Bias", "q": "An inspector with personal/business relationship to seller should:", "choices": ["Proceed if pricing fair", "Charge discount", "Not disclose", "Disclose to client and potentially decline"], "correct": 3, "exp": "Conflicts of interest: disclose to client. Significant relationship (family, business partner) - decline. Lesser ones - disclose and let client decide. Transparency over compensation.", "v": 5}, {"id": 5584, "domain": 3, "task": 1, "topic": "Honest Marketing", "q": "Inspector marketing should:", "choices": ["Make truthful claims about credentials", "All of the above", "Avoid disparaging others", "Maintain professional dignity"], "correct": 1, "exp": "Marketing ethics: no misrepresenting credentials/experience, no disparaging competitors, no false guarantees, no high-pressure tactics. Most state regulations and ethics codes address marketing.", "v": 5}, {"id": 5585, "domain": 3, "task": 2, "topic": "Avoid EXCEPT", "q": "Inspectors should avoid all of the following EXCEPT:", "choices": ["Recommending qualified specialists", "Inspecting property they have financial interest in", "Performing repairs within 24 months", "Accepting referral fees"], "correct": 0, "exp": "Recommending qualified specialists is REQUIRED, not avoided. Other options are conflicts of interest. Wisconsin specifically prohibits inspector repair work for 2 years.", "v": 5}, {"id": 5586, "domain": 3, "task": 2, "topic": "Customer Complaints", "q": "Handling customer complaints includes:", "choices": ["Documentation of communication", "All of the above", "Investigation of alleged issue", "Possible re-inspection"], "correct": 1, "exp": "Complaint handling: take seriously, investigate, document, respond timely, possibly re-inspect, possibly settle. Insurance carrier notification for significant claims. Pattern of complaints can affect license.", "v": 5}, {"id": 5587, "domain": 3, "task": 2, "topic": "Honest Findings", "q": "Reporting honest findings:", "choices": ["Adjusted to seller's preference", "Should be softened", "Required regardless of outcome implications", "Aligned with agent's wishes"], "correct": 2, "exp": "Honest findings: client paid for objective evaluation. Don't soften, omit, or fabricate. Report what was observed. Some buyers may walk; that's their right and inspector served them well.", "v": 5}, {"id": 5588, "domain": 3, "task": 2, "topic": "Report Errors", "q": "If inspector discovers significant report error after delivery:", "choices": ["All of the above", "Inform client of error", "Issue corrected report promptly", "Document timeline"], "correct": 0, "exp": "Report error: prompt corrected version, transparent communication with client, document timeline. Honest acknowledgment of error preserves trust. Most buyers appreciate transparency.", "v": 5}, {"id": 5589, "domain": 3, "task": 2, "topic": "Stay In Lane", "q": "Inspector should NOT provide:", "choices": ["Real estate advice (whether to buy)", "Financial advice", "All of the above", "Legal advice"], "correct": 2, "exp": "Stay in lane: don't provide real estate, legal, or financial advice. Refer to qualified professionals (real estate agent, attorney, financial advisor). Inspector's expertise: building condition, not transaction strategy.", "v": 5}, {"id": 5590, "domain": 3, "task": 2, "topic": "Liability Reducers", "q": "Practices that reduce inspector liability include:", "choices": ["Thorough documentation with photos", "All of the above", "Honest reporting", "Detailed pre-inspection agreement"], "correct": 1, "exp": "Liability reducers: written agreement, documentation (photos, notes), honest reporting (disclose limitations, recommend qualified evaluation), professional behavior, ongoing training, insurance.", "v": 5}, {"id": 5591, "domain": 3, "task": 2, "topic": "Inspector Insurance", "q": "Inspector insurance typically includes:", "choices": ["E&O (Errors & Omissions)", "General Liability (GL)", "All of the above", "Sometimes commercial auto"], "correct": 2, "exp": "Inspector insurance: E&O (work product), GL (bodily injury/property damage), business auto (if vehicle for business), workers comp (if employees), cyber/data breach insurance increasingly common.", "v": 5}, {"id": 5592, "domain": 3, "task": 2, "topic": "Maintain Records", "q": "Inspector record retention:", "choices": ["Until next inspection", "No requirement", "Per state requirements, often 5-10 years", "Indefinitely"], "correct": 2, "exp": "Record retention: typically 5-10 years per state regulations. Reports, photos, communications. Insurance claims may require records, statute of limitations varies. Backed up digitally.", "v": 5}, {"id": 5593, "domain": 3, "task": 2, "topic": "Code of Ethics", "q": "An inspector code of ethics typically requires:", "choices": ["All of the above", "Professional behavior", "Independence and objectivity", "Confidentiality"], "correct": 0, "exp": "Code of ethics: independence, objectivity, confidentiality, professional behavior, no conflicts of interest, honest marketing, continuing competence. Codes from InterNACHI, ASHI, state regulations - largely overlapping.", "v": 5}, {"id": 5594, "domain": 1, "task": 7, "topic": "Cat I Vent Temp", "q": "Category I gas appliance vent gas temperature is approximately:", "choices": ["300°F", "450°F", "210°F", "140°F"], "correct": 0, "exp": "Cat I: ~300°F. Cat II: ~140°F (rare). Cat III: hot like Cat I but positive pressure. Cat IV: ~140°F condensing. Vol 1 Ch 3.", "v": 5}, {"id": 5595, "domain": 1, "task": 7, "topic": "Cat IV Vent Temp", "q": "Category IV (condensing) gas appliance vent gas temperature is approximately:", "choices": ["300°F", "140°F", "450°F", "220°F"], "correct": 1, "exp": "Cat IV: ~140°F (condensing, positive pressure, PVC vent). Cat I: ~300°F natural draft. Vol 1 Ch 3.", "v": 5}, {"id": 5596, "domain": 1, "task": 7, "topic": "Cat I Vent Materials", "q": "Category I gas appliances are vented through:", "choices": ["Type B, masonry, single-wall", "Listed plastic pipe only", "PVC plastic pipe only", "Stainless flexible only"], "correct": 0, "exp": "Cat I: Type B vent, masonry chimney, single-wall vent. Cat IV uses PVC. Cat III uses listed manufacturer pipe. Vol 1 Ch 3.", "v": 5}, {"id": 5597, "domain": 1, "task": 7, "topic": "Cat IV Vent Materials", "q": "Category IV high-efficiency furnaces typically vent through:", "choices": ["Single-wall steel vent", "PVC plastic pipe", "Type B metal vent", "Masonry chimney flue"], "correct": 1, "exp": "Cat IV: PVC pipe (low temp, positive pressure, acidic condensate). Cat I uses Type B/masonry/single-wall. Vol 1 Ch 3.", "v": 5}, {"id": 5598, "domain": 1, "task": 7, "topic": "Cat III Pressure", "q": "Category III gas appliances differ from Category I by operating under:", "choices": ["Equal indoor pressure", "Atmospheric draft only", "Positive vent pressure", "Negative natural pressure"], "correct": 2, "exp": "Cat III: hot vent gas (like Cat I) but POSITIVE pressure. Must use manufacturer-listed vent. Cannot share Cat I vents. Vol 1 Ch 3.", "v": 5}, {"id": 5599, "domain": 1, "task": 7, "topic": "AFUE 80", "q": "An 80 AFUE gas furnace converts what percent of fuel to heat?", "choices": ["70% to heat, 30% lost", "90% to heat, 10% lost", "60% to heat, 40% lost", "80% to heat, 20% lost"], "correct": 3, "exp": "AFUE 80 = 80% fuel converts to heat, 20% lost via vent. AFUE 90+ = condensing (Cat IV). Vol 1 Ch 3.", "v": 5}, {"id": 5600, "domain": 1, "task": 7, "topic": "Heat Min", "q": "A heating system must maintain what minimum temperature in habitable space?", "choices": ["68°F at 3 ft height", "72°F at door height", "65°F at wall level", "60°F at floor level"], "correct": 0, "exp": "68°F minimum, measured 3 ft above floor and 2 ft from exterior wall. Bath/laundry/closet not habitable. Vol 1 Ch 3.", "v": 5}, {"id": 5601, "domain": 1, "task": 7, "topic": "Garage Ignition Height", "q": "Gas furnace ignition source in a garage must be elevated above floor at least:", "choices": ["24 inches above floor", "6 inches above floor", "18 inches above floor", "12 inches above floor"], "correct": 2, "exp": "18 inches min above garage floor. Prevents ignition of gasoline vapors which pool low. IRC 2018 M1307.3.", "v": 5}, {"id": 5602, "domain": 1, "task": 7, "topic": "Comb Air Standard Method", "q": "Standard Method combustion air requires room volume of:", "choices": ["10 cubic ft per 1,000 Btu/h", "30 cubic ft per 1,000 Btu/h", "50 cubic ft per 1,000 Btu/h", "100 cubic ft per 1,000 Btu/h"], "correct": 2, "exp": "Standard Method: 50 cu ft per 1,000 Btu/h appliance input. Vol 1 Ch 3 / IRC G2407.", "v": 5}, {"id": 5603, "domain": 1, "task": 7, "topic": "Comb Air Two Open", "q": "Two-opening combustion air method requires net free area of:", "choices": ["1 sq in per 2,000 Btu/h", "1 sq in per 4,000 Btu/h", "1 sq in per 500 Btu/h", "1 sq in per 1,000 Btu/h"], "correct": 3, "exp": "Two-opening method: 1 sq in per 1,000 Btu/h each opening. Top within 12 in of ceiling, bottom within 12 in of floor. Vol 1 Ch 3.", "v": 5}, {"id": 5604, "domain": 1, "task": 7, "topic": "Comb Air Vert Duct", "q": "Outside combustion air via vertical duct requires net free area of:", "choices": ["1 sq in per 6,000 Btu/h", "1 sq in per 4,000 Btu/h", "1 sq in per 1,000 Btu/h", "1 sq in per 2,000 Btu/h"], "correct": 1, "exp": "Vertical duct from outside: 1 sq in per 4,000 Btu/h. Horizontal duct: 1 sq in per 2,000 Btu/h. Vol 1 Ch 3.", "v": 5}, {"id": 5605, "domain": 1, "task": 7, "topic": "Comb Air Horiz Duct", "q": "Outside combustion air via horizontal duct requires net free area of:", "choices": ["1 sq in per 4,000 Btu/h", "1 sq in per 8,000 Btu/h", "1 sq in per 1,000 Btu/h", "1 sq in per 2,000 Btu/h"], "correct": 3, "exp": "Horizontal duct: 1 sq in per 2,000 Btu/h. More area than vertical because horizontal flow has more friction. Vol 1 Ch 3.", "v": 5}, {"id": 5606, "domain": 1, "task": 7, "topic": "Comb Air Single Open", "q": "Single high-opening combustion air requires net free area of:", "choices": ["1 sq in per 1,000 Btu/h", "1 sq in per 5,000 Btu/h", "1 sq in per 3,000 Btu/h", "1 sq in per 8,000 Btu/h"], "correct": 2, "exp": "Single opening within 12 in of ceiling for gas: 1 sq in per 3,000 Btu/h. Vol 1 Ch 3.", "v": 5}, {"id": 5607, "domain": 1, "task": 7, "topic": "Comb Air Min Dim", "q": "Minimum dimension for any combustion air opening or duct:", "choices": ["2.5 inches square", "6.0 inches square", "1.5 inches square", "3.5 inches square"], "correct": 3, "exp": "3-1/2 inches minimum dimension. Smaller dimensions don't provide adequate flow. Vol 1 Ch 3.", "v": 5}, {"id": 5608, "domain": 1, "task": 7, "topic": "Wood Louver NFA", "q": "An opening with wood louvers provides what net free area?", "choices": ["50 percent of gross", "25 percent of gross", "75 percent of gross", "10 percent of gross"], "correct": 1, "exp": "Wood louvers: 25% NFA. Metal louvers: 75% NFA. Reduce sizing to account for blockage. Vol 1 Ch 3.", "v": 5}, {"id": 5609, "domain": 1, "task": 7, "topic": "Metal Louver NFA", "q": "An opening with metal louvers provides what net free area?", "choices": ["25 percent of gross", "75 percent of gross", "90 percent of gross", "50 percent of gross"], "correct": 1, "exp": "Metal louvers: 75% NFA. Wood louvers: 25% NFA. Vol 1 Ch 3.", "v": 5}, {"id": 5610, "domain": 1, "task": 7, "topic": "Comb Air Termination", "q": "Combustion air ducts must terminate above grade at least:", "choices": ["24 inches above grade", "18 inches above grade", "12 inches above grade", "6 inches above grade"], "correct": 2, "exp": "12 inches minimum above grade or above highest snow accumulation. Vol 1 Ch 3.", "v": 5}, {"id": 5611, "domain": 1, "task": 7, "topic": "Comb Air Duct Material", "q": "Combustion air ducts should be constructed of:", "choices": ["28-gauge galvanized steel", "20-gauge galvanized steel", "Flexible aluminum duct", "PVC plastic pipe"], "correct": 0, "exp": "28-gauge galvanized steel minimum. Stud cavities OK with restrictions. Flex/duct board NOT permitted. Vol 1 Ch 3.", "v": 5}, {"id": 5612, "domain": 1, "task": 7, "topic": "Type B Vent", "q": "Type B vent is used for which gas appliance category?", "choices": ["Category III appliances", "Category IV appliances", "Category II appliances", "Category I appliances"], "correct": 3, "exp": "Type B vent: Cat I appliances (natural draft). Cat IV uses PVC. Cat III uses listed mfr vent. Vol 1 Ch 3.", "v": 5}, {"id": 5613, "domain": 1, "task": 7, "topic": "AC Cold Test Limit", "q": "AC cooling should NOT be tested if outdoor temp was below:", "choices": ["60°F for 24 hours", "70°F for 12 hours", "45°F for 24 hours", "32°F for 12 hours"], "correct": 0, "exp": "Below 60°F for 24 hours: skip AC test. Risk: oil migration in compressor, slugging on startup. Vol 1.", "v": 5}, {"id": 5614, "domain": 1, "task": 7, "topic": "Hot Weather Heat", "q": "Some inspectors decline to operate heating above outdoor temperature of:", "choices": ["70-80°F", "100-110°F", "60-70°F", "80-90°F"], "correct": 3, "exp": "Above 80-90°F: many inspectors skip heat test. High limit switch should protect, but document if not operated. Vol 1 Ch 3.", "v": 5}, {"id": 5615, "domain": 1, "task": 7, "topic": "Boiler Op Pressure", "q": "Normal residential hot water boiler operating pressure is approximately:", "choices": ["12-25 psi range", "60-80 psi range", "5-10 psi range", "30-45 psi range"], "correct": 0, "exp": "Hot water boiler: 12-25 psi typical. PRV trips at 30 psi. Pressure rises as water heats; expansion tank absorbs.", "v": 5}, {"id": 5616, "domain": 1, "task": 7, "topic": "Furnace Flame Color", "q": "A properly burning gas furnace flame appears:", "choices": ["Blue with yellow tip", "Bright orange-red flame", "Yellow with orange tips", "White with green edges"], "correct": 0, "exp": "Blue with slight yellow tip = proper combustion. Yellow/orange flame = defect (poor adjustment, low combustion air). Vol 1 Ch 3.", "v": 5}, {"id": 5617, "domain": 1, "task": 7, "topic": "Forced vs Induced", "q": "Forced draft venting differs from induced draft by using:", "choices": ["Atmospheric stack effect", "Positive pressure pushing gas", "Manual chimney damper", "Negative pressure pulling gas"], "correct": 1, "exp": "Forced draft: positive pressure, fan at start of vent. Induced draft: negative pressure, fan pulls through HX. Vol 1 Ch 3.", "v": 5}, {"id": 5618, "domain": 1, "task": 7, "topic": "Stack Effect", "q": "Natural draft venting relies on combustion gases that are:", "choices": ["Mechanically pressurized", "Same temperature as air", "Hotter and less dense than air", "Cooler and denser than air"], "correct": 2, "exp": "Stack effect: hot gases less dense, rise via buoyancy. Backdraft if gases cool too much in vent. Vol 1 Ch 3.", "v": 5}, {"id": 5619, "domain": 1, "task": 7, "topic": "Stage I Creosote", "q": "Stage I creosote in a chimney appears as:", "choices": ["Hard shiny glazed coating", "Heavy tar-like dark deposit", "Liquid black runoff", "Light flaky brown ash"], "correct": 3, "exp": "Stage I: flaky brown/black ash, easy to remove, least flammable. Stage II: tar-like. Stage III: hard glaze, highly flammable. Vol 1 Ch 3.", "v": 5}, {"id": 5620, "domain": 1, "task": 7, "topic": "Stage III Creosote", "q": "Stage III creosote appears in a chimney as:", "choices": ["Heavy tar-like dark deposit", "Hard shiny glazed coating", "Liquid black runoff", "Light flaky brown ash"], "correct": 1, "exp": "Stage III: hard, shiny, highly flammable. May require flue liner replacement. Stage I easy remove, II tar-like. Vol 1 Ch 3.", "v": 5}, {"id": 5621, "domain": 1, "task": 7, "topic": "Inshot Burner", "q": "Modern induced-draft furnaces typically use which burner type?", "choices": ["Power burners", "Inshot burners", "Ribbon burners", "Atmospheric pots"], "correct": 1, "exp": "Induced draft: 2-6 inshot burners (most common modern). Older draft-hood: 3-6 ribbon burners. Vol 1 Ch 3.", "v": 5}, {"id": 5622, "domain": 1, "task": 7, "topic": "Ribbon Burner", "q": "Older draft-hood gas furnaces typically used which burner type?", "choices": ["Power burners", "Inshot burners", "Atmospheric pots", "Ribbon burners"], "correct": 3, "exp": "Draft-hood furnaces (1970s and older): ribbon burners (gas burns along ribbon length). Vol 1 Ch 3.", "v": 5}, {"id": 5623, "domain": 1, "task": 7, "topic": "Heat Exchanger Visible", "q": "In an induced-draft Cat I furnace, the heat exchanger is typically:", "choices": ["Rarely visible to inspector", "Fully visible to inspector", "Always visible from front", "Visible roughly 50 percent"], "correct": 0, "exp": "Induced draft: heat exchanger rarely visible. Older draft-hood: ~20% visible. Report whether seen. Vol 1 Ch 3.", "v": 5}, {"id": 5624, "domain": 1, "task": 7, "topic": "Flexible Gas Cabinet", "q": "Flexible gas connectors entering a furnace cabinet are:", "choices": ["Allowed up to 6 ft", "Required for high-efficiency", "Required for vibration", "Not permitted at any length"], "correct": 3, "exp": "Flex connectors NOT permitted to enter cabinet. Solid pipe required. Common defect after DIY service. Vol 1 Ch 3.", "v": 5}, {"id": 5625, "domain": 1, "task": 7, "topic": "PSC vs ECM", "q": "ECM blower motors compared to older PSC motors are:", "choices": ["Required only on Cat I", "Less efficient and louder", "Similar efficiency only", "More efficient and variable"], "correct": 3, "exp": "ECM: efficient, variable speed, paired with multi-stage gas valves. PSC: older, single speed. CTM: middle. Vol 1 Ch 3.", "v": 5}, {"id": 5626, "domain": 1, "task": 7, "topic": "Gas Valve Stage", "q": "A two-stage gas valve allows gas flow at how many rates?", "choices": ["One rate only on/off", "Two rates high and low", "Variable infinite rates", "Three rates including pilot"], "correct": 1, "exp": "Two-stage: high and low fire. Single-stage: on/off. Modulating: variable. Vol 1 Ch 3.", "v": 5}, {"id": 5627, "domain": 1, "task": 7, "topic": "Direct Vent", "q": "A direct-vent gas appliance gets combustion air from:", "choices": ["Inside house with outdoor exhaust", "Either source automatically", "Outside house with outdoor exhaust", "Inside house only always"], "correct": 2, "exp": "Direct vent: outside air in, outside exhaust out (sealed combustion). Direct exhaust: indoor air in, outdoor out. Vol 1 Ch 3.", "v": 5}, {"id": 5628, "domain": 1, "task": 7, "topic": "Direct Exhaust", "q": "A direct-exhaust gas appliance gets combustion air from:", "choices": ["Outside house with outdoor exhaust", "Inside house only always", "Through chimney always", "Inside house with outdoor exhaust"], "correct": 3, "exp": "Direct exhaust: indoor combustion air, outdoor exhaust. Direct vent: outdoor in/outdoor out (sealed). Vol 1 Ch 3.", "v": 5}, {"id": 5629, "domain": 1, "task": 7, "topic": "Prohibited Locations", "q": "Gas appliances are NOT permitted in which location (with exceptions)?", "choices": ["Basements and crawl spaces", "Bedrooms and bathrooms", "Kitchen and dining room", "Mechanical room and attic"], "correct": 1, "exp": "Bedrooms, bathrooms, closets prohibited. Exceptions: direct-vent, sealed combustion. Vol 1 Ch 3 / IRC G2406.", "v": 5}, {"id": 5630, "domain": 1, "task": 7, "topic": "Bypassed Switch", "q": "Bypassed safety controls in a furnace typically present as:", "choices": ["Missing entire components", "Loose terminal screws", "Painted electrical tape", "Wires joined with wire nuts"], "correct": 3, "exp": "Bypassed = wires spliced with nuts where not normal. Defeats high limit, rollout, draft pressure switches. Vol 1 Ch 3.", "v": 5}, {"id": 5631, "domain": 1, "task": 7, "topic": "Manual J", "q": "ACCA Manual J is used to calculate:", "choices": ["Insulation R-value totals", "Heating and cooling loads", "Equipment installation cost", "Service amperage size"], "correct": 1, "exp": "Manual J: heating/cooling load. Manual S: equipment sizing. Software-based now. Inspectors not required to verify. Vol 1.", "v": 5}, {"id": 5632, "domain": 1, "task": 7, "topic": "Hydronic Hot Water", "q": "Hot water hydronic systems differ from steam by:", "choices": ["Using forced air ducting", "Using direct radiation only", "Pumping liquid below boiling", "Boiling water to make steam"], "correct": 2, "exp": "Hot water hydronic: pumped liquid below boiling. Steam: boiled, gravity or pumped vapor. Vol 1 Ch 3.", "v": 5}, {"id": 5633, "domain": 1, "task": 7, "topic": "Steam vs Hot Water", "q": "Steam heating systems are distinguished from hot water by:", "choices": ["Using glycol fluid only", "Pumping liquid below boiling", "Boiling water to make steam", "Using forced air ducting"], "correct": 2, "exp": "Steam: water boiled, vapor distributed. Hot water hydronic: liquid pumped, stays below boiling. Vol 1 Ch 3.", "v": 5}, {"id": 5634, "domain": 1, "task": 7, "topic": "Gravity Furnace", "q": "A gravity warm-air furnace is distinguished by having:", "choices": ["ECM variable blower motor", "Single-speed PSC blower", "No blower or air filter", "Multi-stage variable blower"], "correct": 2, "exp": "Gravity furnace: no blower, no filter. Heated air rises by convection only. 1800s-1900s relic. Inefficient. Vol 1 Ch 3.", "v": 5}, {"id": 5635, "domain": 1, "task": 7, "topic": "Habitable Not", "q": "Which of the following is NOT considered habitable space?", "choices": ["Bathroom and laundry", "Kitchen and den", "Living room and dining", "Bedroom and family"], "correct": 0, "exp": "Bath, laundry, closet: not habitable. Heat source not required there. 68°F required in habitable. Vol 1 Ch 3.", "v": 5}, {"id": 5636, "domain": 1, "task": 7, "topic": "Garage Vehicle Protect", "q": "Appliances installed in a garage must be protected from:", "choices": ["Vehicle impact damage", "Roof leaks above unit", "Daylight ultraviolet rays", "Cold winter draft air"], "correct": 0, "exp": "Vehicle impact: required protection (framing or bollard). Strike could rupture gas/water lines. Vol 1 Ch 3.", "v": 5}, {"id": 5637, "domain": 1, "task": 7, "topic": "Heat Exchanger Crack", "q": "A cracked furnace heat exchanger primarily creates which hazard?", "choices": ["Loud blower vibration", "Combustion gas in airstream", "Reduced fuel efficiency", "Excessive cabinet heat"], "correct": 1, "exp": "Cracked HX: combustion gases (including CO) leak into supply airstream. Major safety defect. Replace furnace. Vol 1 Ch 3.", "v": 5}, {"id": 5638, "domain": 1, "task": 7, "topic": "Flame Rollout", "q": "Silver-colored buttons near gas furnace burners are typically:", "choices": ["Flame-rollout sensors", "Pilot test points", "Manual reset breakers", "Igniter glow plugs"], "correct": 0, "exp": "Flame rollout sensors: silver buttons, shut down on excess heat (blocked HX, blocked vent, no comb air). Vol 1 Ch 3.", "v": 5}, {"id": 5639, "domain": 1, "task": 9, "topic": "ERV Function", "q": "An Energy Recovery Ventilator (ERV) transfers between airstreams:", "choices": ["Cooling only in summer", "Heat and moisture transfer", "Heat only between streams", "Outdoor air pressure only"], "correct": 1, "exp": "ERV: heat AND moisture between incoming/outgoing air. HRV: heat only. ERV preferred in humid/mixed climates. Vol 1.", "v": 5}, {"id": 5640, "domain": 1, "task": 9, "topic": "HRV Function", "q": "A Heat Recovery Ventilator (HRV) transfers between airstreams:", "choices": ["Outdoor air pressure only", "Cooling only in summer", "Heat only between streams", "Heat and moisture transfer"], "correct": 2, "exp": "HRV: heat only. ERV adds moisture transfer. HRV preferred in cold/dry climates. Vol 1.", "v": 5}, {"id": 5641, "domain": 1, "task": 9, "topic": "ERV vs HRV Climate", "q": "An ERV is typically preferred over an HRV in climates that are:", "choices": ["Humid or mixed climate", "Cold and dry weather", "Arctic and frozen all year", "Tropical only with no cold"], "correct": 0, "exp": "ERV: humid/mixed climates (moisture transfer beneficial). HRV: cold/dry. WI is mixed-humid; either viable. Vol 1.", "v": 5}, {"id": 5642, "domain": 1, "task": 9, "topic": "Range Hood Standard", "q": "The most common residential range hood capacity is approximately:", "choices": ["48 inches wide, 600 cfm", "60 inches wide, 1200 cfm", "30 inches wide, 100 cfm", "36 inches wide, 250 cfm"], "correct": 2, "exp": "Most common: 30 inch wide, 100 cfm. Larger and more powerful exist; >400 cfm requires makeup air. Vol 1.", "v": 5}, {"id": 5643, "domain": 1, "task": 9, "topic": "Range Hood Makeup", "q": "A range hood with capacity exceeding what cfm requires makeup air?", "choices": ["400 cfm exhaust capacity", "100 cfm exhaust capacity", "200 cfm exhaust capacity", "800 cfm exhaust capacity"], "correct": 0, "exp": "Over 400 cfm: makeup air required to prevent depressurization and backdraft of fuel-burning equipment. Vol 1.", "v": 5}, {"id": 5644, "domain": 1, "task": 9, "topic": "Range Hood Recirc", "q": "Recirculating range hoods are allowed under exception when:", "choices": ["Always permitted in code", "House has open floor plan", "Operable kitchen window or HRV/ERV", "Hood capacity below 200 cfm"], "correct": 2, "exp": "Recirc allowed if operable kitchen window OR house has HRV/ERV. Less effective than vented hoods. Vol 1.", "v": 5}, {"id": 5645, "domain": 1, "task": 9, "topic": "Hood Duct Material", "q": "Range hood exhaust ducts must be constructed of:", "choices": ["Plastic flexible tubing", "PVC plastic pipe only", "Cardboard fiber tubing", "Galvanized steel or copper"], "correct": 3, "exp": "Metal: galvanized steel or copper required. Sched 40 PVC OK only for slab-installed downdraft units. Vol 1.", "v": 5}, {"id": 5646, "domain": 1, "task": 9, "topic": "Hood Term Inside", "q": "A range hood exhaust duct terminating in the attic is:", "choices": ["Acceptable below 200 cfm", "Only allowed in unfinished", "Required in cold climates", "A defect requiring correction"], "correct": 3, "exp": "Defect: must terminate outside (wall, soffit, roof). Indoor termination causes moisture/grease buildup. Vol 1.", "v": 5}, {"id": 5647, "domain": 1, "task": 9, "topic": "Hood Term Damper", "q": "A range hood exterior termination should include:", "choices": ["Spring-loaded check ball", "Permanent sealed cap fitting", "Free-moving backdraft damper", "Open vent without damper"], "correct": 2, "exp": "Termination: damper that moves freely. Stuck closed: can't exhaust. Stuck open: cold air, pests. Vol 1.", "v": 5}, {"id": 5648, "domain": 1, "task": 9, "topic": "Hood Term Diameter", "q": "A range hood exterior termination opening smaller than what is too small?", "choices": ["Approximately 6 inches", "Approximately 8 inches", "Approximately 4 inches", "Approximately 12 inches"], "correct": 0, "exp": "Smaller than ~6 inches diameter (or equivalent rectangle): too small for typical fan capacity. Vol 1.", "v": 5}, {"id": 5649, "domain": 1, "task": 9, "topic": "Microwave Floor", "q": "Some manufacturers recommend OTR microwave clearance from floor of at least:", "choices": ["Floor to top 72 inches", "Floor to top 66 inches", "Floor to top 60 inches", "Floor to top 56 inches"], "correct": 1, "exp": "66 inches floor to top of microwave (mfr-specific). Smaller distances reduce safety/convenience. Vol 1.", "v": 5}, {"id": 5650, "domain": 1, "task": 9, "topic": "Microwave Cooktop", "q": "Some manufacturers recommend OTR microwave clearance to cooktop of at least:", "choices": ["Cooktop to bottom 36 in", "Cooktop to bottom 18 in", "Cooktop to bottom 30 in", "Cooktop to bottom 24 in"], "correct": 2, "exp": "30 inches cooktop to bottom of microwave (mfr-spec
