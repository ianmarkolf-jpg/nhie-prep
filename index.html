ulation required)", "R-30 cavity OR R-23 with R-7 continuous foam"], "correct": 1, "exp": "Zone 6: R-20 cavity OR R-13+R-5 continuous. Cavity insulation alone often insufficient. IECC.", "v": 5}, {"id": 4309, "domain": 1, "task": 6, "topic": "Vapor Barrier Cold", "q": "In cold climates, a vapor barrier should be installed on which side of the wall?", "choices": ["The cold side (exterior) of the insulation", "Neither side (vapor barriers cause more problems)", "Both sides simultaneously for maximum protection", "The warm side (interior) of the insulation"], "correct": 3, "exp": "Cold climate: vapor barrier on WARM (interior) side. Prevents indoor moisture migrating into wall, condensing. IRC.", "v": 5}, {"id": 4310, "domain": 1, "task": 6, "topic": "Vapor Barrier Hot", "q": "In hot/humid climates, a vapor barrier should be installed on which side of the wall?", "choices": ["Always required on the south-facing wall only", "Both sides simultaneously for maximum protection", "The interior side (same as cold climates)", "The exterior side (or none \u2014 varies by location)"], "correct": 3, "exp": "Hot/humid: exterior side (or none, depending on assembly). Interior placement traps moisture. IRC.", "v": 5}, {"id": 4311, "domain": 1, "task": 6, "topic": "Soffit Baffle", "q": "Soffit baffles in an attic are installed to perform which function?", "choices": ["Provide a fire-rated barrier at the eave perimeter", "Maintain airflow path past insulation at eaves", "Reinforce the rafter ends at the eave structure", "Block the soffit vents to retain warm winter air"], "correct": 1, "exp": "Baffles maintain airflow path past insulation at eaves. Without them, insulation blocks soffit vents. IRC.", "v": 5}, {"id": 4312, "domain": 1, "task": 6, "topic": "Knob & Tube Insulation", "q": "Thermal insulation must NOT be installed in contact with which wiring type?", "choices": ["Active knob-and-tube wiring (overheating risk)", "Properly grounded armored cable (BX) installations", "Standard plastic conduit (EMT-PVC) installations", "Modern NM-B (Romex) cable in standard installations"], "correct": 0, "exp": "K&T relies on air space for cooling. Insulation contact = overheating, fire. Code-prohibited. NEC/IRC.", "v": 5}, {"id": 4313, "domain": 1, "task": 6, "topic": "Recessed Light IC", "q": "Recessed lights in contact with attic insulation must be rated:", "choices": ["Halogen bulbs only (LED bulbs are not permitted)", "IC-rated (insulation contact rated, sealed)", "Non-IC rated (insulation kept 3 inches away)", "Plastic-trimmed only (no metal housing allowed)"], "correct": 1, "exp": "IC-rated (Insulation Contact) required for direct insulation contact. Non-IC: 3 in clearance. NEC/UL.", "v": 5}, {"id": 4314, "domain": 1, "task": 6, "topic": "Crawl Vent Ratio", "q": "Crawl space ventilation requires net free area at minimum ratio of vent area to floor area of:", "choices": ["1:300 ratio of vent area to floor area", "1:50 ratio of vent area to floor area", "1:1,000 ratio of vent area to floor area", "1:150 ratio (1:1,500 with vapor retarder)"], "correct": 3, "exp": "Vented crawl: 1:150 floor area, OR 1:1,500 with Class I vapor retarder. Sealed crawl: another approach. IRC.", "v": 5}, {"id": 4315, "domain": 1, "task": 6, "topic": "Sealed Crawl", "q": "A sealed (unvented, conditioned) crawl space requires which feature?", "choices": ["Heated air supply only with no other moisture controls", "Open ventilation continuous flow at all times of year", "Dehumidifier only with no vapor retarder needed", "Vapor barrier on floor/walls; mechanical ventilation"], "correct": 3, "exp": "Sealed crawl: vapor barrier (floor + walls), insulated walls, mechanical conditioning. No outside vents. IRC.", "v": 5}, {"id": 4316, "domain": 1, "task": 6, "topic": "Cathedralized Attic", "q": "An unvented (cathedralized) attic with spray foam at the roof deck requires which feature?", "choices": ["Standard ridge and soffit ventilation as for vented attic", "Mechanical exhaust at the ridge with intake at soffit", "Spray foam at the roof deck creates the conditioned envelope", "A vapor barrier on the warm side under sheathing"], "correct": 2, "exp": "Cathedralized attic: foam at roof deck creates conditioned envelope. No traditional ventilation. IRC.", "v": 5}, {"id": 4317, "domain": 1, "task": 6, "topic": "R-Value Definition", "q": "R-value of an insulation material measures which thermal property?", "choices": ["Vapor permeability of the material in perms", "Density of the material in pounds per cubic foot", "Resistance to heat flow (higher R = less heat transfer)", "Conductivity of heat (higher R = more heat transfer)"], "correct": 2, "exp": "R-value: thermal resistance. Higher = less heat transfer. Reciprocal of U-value. ASHRAE.", "v": 5}, {"id": 4318, "domain": 1, "task": 6, "topic": "U-Value Definition", "q": "U-value of a window or assembly measures which thermal property?", "choices": ["Air leakage rate through the assembly per hour", "Heat conductance (lower U = better insulation)", "Resistance to heat flow (higher U = better insulation)", "Visible light transmittance through the assembly"], "correct": 1, "exp": "U-value: thermal conductance. Lower = better. Reciprocal of R-value. Used for windows/whole assemblies. ASHRAE.", "v": 5}, {"id": 4319, "domain": 1, "task": 6, "topic": "SHGC", "q": "SHGC (Solar Heat Gain Coefficient) of a window measures which property?", "choices": ["Fraction of solar radiation transmitted through the window", "Fraction of indoor heat lost through the window assembly", "Air leakage rate through the window framing system", "Visible light transmittance allowed through the window"], "correct": 0, "exp": "SHGC: 0-1 fraction of solar heat transmitted. Lower = less solar gain (better hot climate). NFRC.", "v": 5}, {"id": 4320, "domain": 1, "task": 6, "topic": "Vermiculite", "q": "Vermiculite attic insulation is a concern primarily because it may contain:", "choices": ["Asbestos (Libby Montana origin, 1919\u20131990)", "Toxic mold spores from past water damage events", "Lead paint particulates from older home construction", "Radioactive thorium from natural mineral deposits"], "correct": 0, "exp": "Vermiculite from Libby MT (Zonolite, 1919-1990) often contained asbestos. Test before disturbing. EPA.", "v": 5}, {"id": 4321, "domain": 1, "task": 6, "topic": "Cellulose Settle", "q": "Loose-fill cellulose insulation in an attic settles approximately what percentage from initial install?", "choices": ["Approximately 0% settling from installed depth", "Approximately 20% settling from installed depth", "Approximately 5% settling from installed depth", "Approximately 50% settling from installed depth"], "correct": 1, "exp": "Cellulose settles ~20% over time. Initial install over-fills to compensate. Affects effective R-value. Industry.", "v": 5}, {"id": 4322, "domain": 1, "task": 6, "topic": "Closed Cell Foam", "q": "Closed-cell spray foam compared to open-cell spray foam has which property?", "choices": ["Higher R-value per inch and acts as vapor barrier", "Same R-value per inch with similar permeability", "Lower density and is mainly used as soundproofing", "Lower R-value per inch and is more vapor-permeable"], "correct": 0, "exp": "Closed-cell: ~R-6.5/in, vapor barrier. Open-cell: ~R-3.6/in, vapor permeable. Different applications. Industry.", "v": 5}, {"id": 4323, "domain": 1, "task": 6, "topic": "Air Sealing First", "q": "When upgrading attic insulation, air sealing should be:", "choices": ["Completed before adding insulation (highest priority)", "Required only for spray foam applications, not loose fill", "Skipped entirely if R-value is sufficient", "Completed only after all insulation is installed"], "correct": 0, "exp": "Air seal FIRST. Air leaks through ceiling penetrations bypass insulation entirely. Bigger gain than R-value. EPA.", "v": 5}, {"id": 4324, "domain": 1, "task": 6, "topic": "Attic Hatch", "q": "An attic access hatch should be:", "choices": ["Made of solid wood with no insulation requirement", "Sized as small as possible to limit heat loss", "Insulated to similar R-value and weatherstripped", "Left uninsulated to allow attic air to enter living space"], "correct": 2, "exp": "Insulate to similar R-value as attic, weatherstrip the perimeter. Common defect: bare hatch = thermal bypass. IRC.", "v": 5}, {"id": 4325, "domain": 1, "task": 6, "topic": "Whole-House Fan", "q": "A whole-house fan installed without weather-resistant cover causes:", "choices": ["Improved heating efficiency in winter operation", "Increased home pressurization at all times", "Significant heat loss in winter (thermal bypass)", "Mold growth in attic during summer use"], "correct": 2, "exp": "Without insulated cover: large hole in ceiling = major thermal bypass. Insulated covers available. Industry.", "v": 5}, {"id": 4326, "domain": 1, "task": 6, "topic": "Bath Fan in Attic", "q": "A bathroom exhaust fan ducted to terminate within the attic causes:", "choices": ["No issues if the attic is properly ventilated", "Required code condition for some climate zones", "Moisture problems (rot, mold, frost)", "Improved attic ventilation (added moisture flow)"], "correct": 2, "exp": "Bath fan in attic: dumps moisture, causes rot/mold/frost in cold climates. Must terminate outside. IRC.", "v": 5}, {"id": 4327, "domain": 1, "task": 6, "topic": "Unbalanced Vent", "q": "Attic ventilation that is unbalanced (e.g., ridge vent with insufficient soffit) causes:", "choices": ["Improved ventilation effectiveness in all seasons", "Ridge vent pulls indoor air through ceiling leaks", "Required code design for cold-climate ventilation", "Reduced winter heat loss compared to balanced vents"], "correct": 1, "exp": "Unbalanced: ridge pulls air from house through ceiling penetrations. 50/50 split intake/exhaust ideal. IRC.", "v": 5}, {"id": 4328, "domain": 1, "task": 6, "topic": "Knee Wall Insulation", "q": "A finished attic knee wall requires insulation in which configuration?", "choices": ["Only above the knee wall ceiling (top only)", "Behind the wall AND under the kneewall floor", "No insulation needed (heated space on both sides)", "Only directly behind the knee wall (face only)"], "correct": 1, "exp": "Knee wall: insulate behind wall + floor of unheated attic kneewall + air seal. Common gap: floor missed. IRC.", "v": 5}, {"id": 4329, "domain": 1, "task": 6, "topic": "Rim Joist", "q": "Rim joist (band joist) at the basement is a critical area to:", "choices": ["Cover with paint only (no insulation needed)", "Air seal and insulate (large heat loss area)", "Leave open for ventilation of the basement space", "Reinforce structurally only (no air-sealing benefit)"], "correct": 1, "exp": "Rim joist: major heat loss area. Air seal then insulate (foam, batts with vapor barrier). High-ROI upgrade. EPA.", "v": 5}, {"id": 4330, "domain": 1, "task": 1, "topic": "Grade Slope", "q": "Grade should slope away from the foundation at minimum:", "choices": ["6 inches drop in the first 10 feet from foundation", "1 inch drop in the first 10 feet from foundation", "12 inches drop in the first 10 feet from foundation", "3 inches drop in the first 10 feet from foundation"], "correct": 0, "exp": "6 in drop in first 10 ft (5% slope). Negative grade = water against foundation. IRC.", "v": 5}, {"id": 4331, "domain": 1, "task": 1, "topic": "Hardscape Slope", "q": "Hardscape (patio, driveway) abutting foundation should slope away at minimum:", "choices": ["1/8 inch per foot away from foundation", "1/16 inch per foot away from foundation", "1/4 inch per foot away from foundation", "1/2 inch per foot away from foundation"], "correct": 2, "exp": "1/4 in per ft (2%) for hardscape. Less for pervious surfaces (1/8 in/ft OK with permeable material). IRC.", "v": 5}, {"id": 4332, "domain": 1, "task": 1, "topic": "Downspout Extension", "q": "Downspouts should discharge water at minimum distance from foundation of:", "choices": ["1 foot from foundation wall", "2 feet from foundation wall", "10 feet from foundation wall", "4\u20136 feet from foundation wall"], "correct": 3, "exp": "4-6 ft min from foundation. Splash blocks insufficient. Buried discharge ideal. IRC.", "v": 5}, {"id": 4333, "domain": 1, "task": 1, "topic": "Window Well Drain", "q": "Window wells more than how deep require drainage to a system?", "choices": ["12 inches deep require drain (any window well)", "60 inches deep require drain (extreme depth only)", "44 inches deep require drain (egress)", "24 inches deep require drain (most window wells)"], "correct": 2, "exp": "Most codes: window wells require drain to footing tile or equivalent. Avoids water pooling at well bottom. IRC.", "v": 5}, {"id": 4334, "domain": 1, "task": 1, "topic": "Tree Foundation", "q": "Trees with mature root systems located close to a foundation can cause:", "choices": ["Improved drainage around the foundation perimeter", "No effect on the structure or its components", "Beneficial soil consolidation under the footing", "Foundation movement, drain damage, gutter issues"], "correct": 3, "exp": "Trees: root pressure, drain damage, leaf clogging gutters, branches contact roof. Note in inspection. Industry.", "v": 5}, {"id": 4335, "domain": 1, "task": 1, "topic": "Driveway Settling", "q": "Driveway slabs settling toward the home create which problem?", "choices": ["Improved driveway drainage onto the lawn area", "Negative slope directs water toward the foundation", "No problem since driveways are independent of foundation", "Required code feature for snow melt drainage"], "correct": 1, "exp": "Settling driveway slope toward house drives water to foundation. Defect requiring lifting/replacement. Industry.", "v": 5}, {"id": 4336, "domain": 1, "task": 1, "topic": "Retaining Wall", "q": "A retaining wall over what height typically requires engineering and permit?", "choices": ["4 feet tall typically requires engineered design", "10 feet tall typically requires engineered design", "1 foot tall typically requires engineered design", "2 feet tall typically requires engineered design"], "correct": 0, "exp": "Most codes: retaining wall >4 ft tall requires engineered design and permit. Lateral pressure increases dramatically. IRC.", "v": 5}, {"id": 4337, "domain": 1, "task": 1, "topic": "Patio Pull", "q": "A concrete patio pulling away from the foundation indicates:", "choices": ["Normal seasonal expansion that requires no action", "Required code feature for thermal expansion control", "Foundation settlement OR patio settlement", "Improved drainage from the patio surface (positive sign)"], "correct": 2, "exp": "Pull-away can be foundation settling, patio settling, or both. Investigate which. Address both if needed. Industry.", "v": 5}, {"id": 4338, "domain": 1, "task": 1, "topic": "Tree Branches Roof", "q": "Tree branches overhanging or contacting the roof cause:", "choices": ["Required cover for ice dam prevention in winter", "No effect on the roof or other building components", "Improved roof shading that extends shingle life", "Granule loss (abrasion), debris dams, rodent access"], "correct": 3, "exp": "Branches: abrasion (granule loss), debris dams, rodent access, possible storm damage. Trim back. Industry.", "v": 5}, {"id": 4339, "domain": 1, "task": 1, "topic": "Sprinkler at Foundation", "q": "Lawn sprinkler heads aimed at the foundation cause:", "choices": ["Improved foundation cooling on hot summer days", "Required code feature in cold climate areas", "Excessive water saturating the foundation", "Foundation is unaffected by sprinkler operation"], "correct": 2, "exp": "Sprinklers at foundation: saturate soil, overload drain tile, freeze-thaw, mold. Re-aim or cap. Industry.", "v": 5}, {"id": 4340, "domain": 1, "task": 1, "topic": "Sidewalk Movement", "q": "A sidewalk slab tilting toward the home creates which condition?", "choices": ["Improved foundation drainage capacity by design", "A required code condition for accessibility ramping", "Trip hazard AND water flow toward foundation", "No effect on the home or its operations"], "correct": 2, "exp": "Tilted sidewalk: trip hazard + water flow toward foundation = double defect. Mudjacking or replace. Industry.", "v": 5}, {"id": 4341, "domain": 1, "task": 1, "topic": "Negative Grade", "q": "Negative grade around a foundation creates risks of:", "choices": ["Improved drainage to surrounding lawn area", "No water-related concerns near the foundation", "Better view from inside the home (positive feature)", "Water at foundation (settlement, leaks)"], "correct": 3, "exp": "Negative grade: water against foundation = settlement, basement leaks, frost damage to footings. Re-grade. Industry.", "v": 5}, {"id": 4342, "domain": 1, "task": 1, "topic": "AC Pad Slope", "q": "An outdoor AC condenser pad should be installed in which condition?", "choices": ["Level (out-of-level may damage compressor over time)", "Slope away (some compressors need positive slope)", "Variable position (no specific level requirement)", "Slope toward house (drainage convenience)"], "correct": 0, "exp": "Level pad. Out-of-level can damage compressor (oil migration). Pad settling = re-level. Industry.", "v": 5}, {"id": 4343, "domain": 1, "task": 1, "topic": "Buried Discharge", "q": "An underground downspout discharge line should be inspected for:", "choices": ["Tight seal at the foundation joint only", "Positive electrical bonding to the building system", "Material color matching the home's siding", "Downhill slope, daylight at termination, no ponding"], "correct": 3, "exp": "Inspect for: continuous downslope, daylight discharge (or dry well), no ponding, no clogs. Industry.", "v": 5}, {"id": 4344, "domain": 1, "task": 1, "topic": "Mulch Foundation", "q": "Mulch piled against the foundation siding can cause:", "choices": ["Wood rot, termite entry, hidden moisture", "No effect on the foundation or siding", "Improved foundation cooling on hot summer days", "Required cover for cold-climate insulation"], "correct": 0, "exp": "Mulch above siding: wood rot, termite path, hidden moisture damage. 6 in clearance below siding. Industry.", "v": 5}, {"id": 4345, "domain": 1, "task": 1, "topic": "Site Drainage Direction", "q": "Site drainage primarily refers to:", "choices": ["Water moving away from the structure (positive grade)", "Water moving toward the structure (negative grade)", "Water collecting in low spots (no movement plan)", "Water managed underground only (no surface plan)"], "correct": 0, "exp": "Site drainage: water flow away from structure. Includes grade, gutters, downspouts, drains. Industry.", "v": 5}, {"id": 4346, "domain": 1, "task": 1, "topic": "Buried Tank Note", "q": "An underground oil tank discovered during inspection should be:", "choices": ["Considered cosmetic with no further investigation", "Tested by the inspector personally for leaks", "Disclaimed (recommend evaluation by specialist)", "Removed by the inspector at time of inspection"], "correct": 2, "exp": "UST oil tank: out of HI scope. Disclaim, recommend specialist eval (Tightness Test). Liability if leaking. Industry.", "v": 5}, {"id": 4347, "domain": 1, "task": 1, "topic": "Septic Note", "q": "A septic system on the property should be inspected by:", "choices": ["The municipality only (not the property owner)", "The home inspector during routine inspection", "A licensed septic specialist (out of HI scope)", "Self-inspected by the buyer prior to closing"], "correct": 2, "exp": "Septic out of HI scope. Recommend licensed specialist (typically 7-10 yr pump-out cycle). Disclaim. Industry.", "v": 5}, {"id": 4348, "domain": 1, "task": 1, "topic": "Well Note", "q": "A private water well on the property should be evaluated by:", "choices": ["The local utility company at no cost to buyer", "The home inspector with no further specialist needed", "Self-inspected by the buyer prior to closing", "A licensed well specialist with water testing performed"], "correct": 3, "exp": "Well out of typical HI scope. Recommend licensed well specialist + water test (bacteria, nitrates, lead). Disclaim. Industry.", "v": 5}, {"id": 4349, "domain": 1, "task": 1, "topic": "Erosion at Foundation", "q": "Visible erosion at the foundation perimeter indicates which condition?", "choices": ["Improvement to soil drainage in that location", "Normal aging of the soil around the structure", "Required cleanup for the next mowing season only", "Concentrated water flow (downspouts, low grade)"], "correct": 3, "exp": "Erosion: concentrated water (downspouts, irrigation, negative grade). Address source first, then repair. Industry.", "v": 5}, {"id": 4350, "domain": 1, "task": 2, "topic": "Siding Ground Clear", "q": "Siding should maintain clearance above grade of at least:", "choices": ["12 inches above grade as a minimum requirement", "2 inches above grade as a minimum requirement", "1 inch above grade as a minimum requirement", "6 inches above grade (8 inches preferred)"], "correct": 3, "exp": "6 in min above grade (8 in preferred). Wood siding contact = rot/termite path. IRC.", "v": 5}, {"id": 4351, "domain": 1, "task": 2, "topic": "Hardboard Failure", "q": "Hardboard (Masonite) siding tends to fail by which mechanism?", "choices": ["Powder-post beetle attack at the surface", "Galvanic corrosion at fastener locations", "Swelling and delamination at edges from moisture", "UV brittleness and cracking from sunlight exposure"], "correct": 2, "exp": "Hardboard: moisture wicks bottom edge, swells, delaminates. 1980s-90s. Often class action history. Industry.", "v": 5}, {"id": 4352, "domain": 1, "task": 2, "topic": "EIFS Concerns", "q": "EIFS (Exterior Insulation Finishing System) primary inspection concerns include:", "choices": ["Termite damage to the foam insulation only", "Excessive UV degradation of the surface coating", "Frost damage to the structural wall behind", "Trapped moisture behind face when not drainable"], "correct": 3, "exp": "EIFS: face-sealed (older) traps moisture if water gets behind. Drainable EIFS resolves. Probe at penetrations. Industry.", "v": 5}, {"id": 4353, "domain": 1, "task": 2, "topic": "Fiber Cement", "q": "Fiber cement siding (Hardie, Allura) is characterized by which composition?", "choices": ["Cement, sand, cellulose fibers \u2014 fire-resistant", "Aluminum core wrapped with painted steel cladding", "Recycled vinyl polymer with UV stabilizers added", "Wood pulp pressed and resin-bound for strength"], "correct": 0, "exp": "Fiber cement: cement, sand, cellulose fibers. Durable, fire-resistant, paint-holding. 30+ yr lifespan. Industry.", "v": 5}, {"id": 4354, "domain": 1, "task": 2, "topic": "Brick Veneer Tie", "q": "Brick veneer must be attached to the structure with which fastener type?", "choices": ["Mechanical interlock with the framing members directly", "Corrugated metal ties spaced per code (24 in OC)", "Mortar bonding to the wood sheathing behind only", "Construction adhesive applied to back of every brick"], "correct": 1, "exp": "Brick veneer: corrugated metal ties (~24 in OC vertically, 32 in OC horizontally). Critical: ties to framing. IRC.", "v": 5}, {"id": 4355, "domain": 1, "task": 2, "topic": "Weep Holes", "q": "Brick veneer should have weep holes spaced at intervals of:", "choices": ["Every 33 inches at the bottom course (and at openings)", "Every 8 feet at the bottom course (decorative spacing)", "Every 6 inches at the bottom course (continuous water flow)", "No weep holes are required (sealed wall design)"], "correct": 0, "exp": "Every 33 in at bottom course + above openings. Drains drainage cavity. Common defect: missing weeps. IRC.", "v": 5}, {"id": 4356, "domain": 1, "task": 2, "topic": "Brick Wall Drainage", "q": "Behind brick veneer, a 1-inch drainage cavity allows for:", "choices": ["Air flow only (no drainage function provided)", "Insulation installed in the air space", "Water through brick drains via weep holes", "Termites to enter the structure via the cavity"], "correct": 2, "exp": "1-in drainage cavity: water that penetrates brick drains down weep holes. Critical detail. IRC.", "v": 5}, {"id": 4357, "domain": 1, "task": 2, "topic": "Vinyl Siding", "q": "Vinyl siding requires which installation feature?", "choices": ["Continuous adhesive bonding across the panel back", "Loose fastening allowing thermal expansion movement", "Painted finish applied after installation", "Tight nailing pinning the panel firmly to wall"], "correct": 1, "exp": "Vinyl: loose fastening (nails not driven tight). Allows thermal expansion. Tight = buckling/cracking. Mfr.", "v": 5}, {"id": 4358, "domain": 1, "task": 2, "topic": "Stucco Cracks", "q": "Hairline cracks in stucco are typically considered:", "choices": ["Required design pattern for thermal expansion", "Cosmetic but seal them to prevent water entry", "Improved aesthetic feature of natural stucco aging", "A serious structural defect requiring replacement"], "correct": 1, "exp": "Hairline: cosmetic but should be sealed. Wider cracks (1/8 in+) = investigation. Industry.", "v": 5}, {"id": 4359, "domain": 1, "task": 2, "topic": "Trim Caulking", "q": "Caulking around exterior trim should be inspected for:", "choices": ["Pliability test rating per ASTM standards", "Cracks, gaps, separation (water entry points)", "Required code feature for energy efficiency", "Color uniformity matching the trim shade"], "correct": 1, "exp": "Inspect caulking: gaps/cracks/separation = water entry. Common at windows, trim joints, penetrations. Industry.", "v": 5}, {"id": 4360, "domain": 1, "task": 2, "topic": "Window Glazing", "q": "Tempered safety glazing is required in residential locations including:", "choices": ["Bath, near doors, low to floor (per IRC hazard)", "Bedrooms only (per any current code)", "Kitchens only (where cooking heat is present)", "Living room only (high occupancy area)"], "correct": 0, "exp": "IRC: tempered required at hazardous locations - tubs/showers, within 24 in of doors, low-mounted, large panes. IRC.", "v": 5}, {"id": 4361, "domain": 1, "task": 2, "topic": "Exterior Door Threshold", "q": "An exterior door threshold should be:", "choices": ["Sloped slightly outward to drain water away", "Recessed below the floor for tight seal", "Sloped inward toward the home interior", "Level with the interior floor for easy access"], "correct": 0, "exp": "Slope outward (away from interior). Sweep in good condition. Threshold tight to floor at sides. Industry.", "v": 5}, {"id": 4362, "domain": 1, "task": 2, "topic": "Soffit Damage", "q": "Damaged soffits typically result in which problem?", "choices": ["Improved roof structural performance pattern", "Improved attic ventilation (more air movement)", "No effect on the home (cosmetic damage only)", "Pest entry, water, blocked ventilation"], "correct": 3, "exp": "Damaged soffits: pest entry (squirrels, raccoons), water entry, blocked ventilation. Repair priority. Industry.", "v": 5}, {"id": 4363, "domain": 1, "task": 2, "topic": "Fascia Rot", "q": "Fascia board rot is most commonly caused by which factor?", "choices": ["Direct UV exposure on the painted surface", "Rodent damage at the fascia attachment points", "Wind pressure on the fascia surface", "Failed gutters (overflow or back-pitch)"], "correct": 3, "exp": "Fascia rot: usually failed gutters (overflowing, ice dams, back-pitch). Address gutter then replace fascia. Industry.", "v": 5}, {"id": 4364, "domain": 1, "task": 2, "topic": "Window Lintel", "q": "A lintel above a window or door must be sized to:", "choices": ["Decorate the opening (cosmetic feature only)", "Carry load above opening to side bearing", "Allow window to be removed without affecting wall", "Hide ductwork behind the framing"], "correct": 1, "exp": "Lintel: structural beam carrying load above opening to bearing on either side. Sized for load. IRC.", "v": 5}, {"id": 4365, "domain": 1, "task": 2, "topic": "Mortar Repointing", "q": "Repointing mortar in older masonry walls is necessary when:", "choices": ["Brick face is weathering at a normal rate", "The masonry color is fading from sunlight", "Required every 5 years regardless of condition", "Mortar has eroded, cracked, or fallen out"], "correct": 3, "exp": "Repoint when mortar erodes, cracks, fails. Use mortar matching original strength (over-strong harms brick). Industry.", "v": 5}, {"id": 4366, "domain": 1, "task": 2, "topic": "Deck Ledger", "q": "A deck ledger board attached to the house must be:", "choices": ["Glued only with construction adhesive (modern method)", "Free-floating with no attachment to the house", "Bolted with through-bolts and flashed for water diversion", "Nailed only with 16d common nails (sufficient strength)"], "correct": 2, "exp": "Through-bolts (lag screws or carriage bolts), flashing, properly spaced. Nail-only is dangerous (collapse risk). IRC.", "v": 5}, {"id": 4367, "domain": 1, "task": 2, "topic": "Deck Footing", "q": "Deck support post footings must extend below which depth?", "choices": ["The grade level only (no excavation required)", "Surface mount with no excavation needed", "The local frost line depth (42\u201348 in WI)", "12 inches below grade in any climate"], "correct": 2, "exp": "Below frost line. WI: 42-48 in. Otherwise frost heave lifts/drops deck, structural damage. IRC.", "v": 5}, {"id": 4368, "domain": 1, "task": 2, "topic": "Deck Joist Hangers", "q": "Deck joist hangers must be installed using which fastener type?", "choices": ["Standard drywall screws driven through the holes", "Standard roofing nails sized for the bracket holes", "Manufacturer-specified joist hanger nails or hex screws", "Construction adhesive applied between hanger and joist"], "correct": 2, "exp": "Mfr-specified hanger nails (Simpson SDS) or hex screws. Roofing/drywall nails NOT acceptable. Mfr.", "v": 5}, {"id": 4369, "domain": 1, "task": 2, "topic": "Guardrail Height", "q": "Deck guardrail (>30 in above grade) minimum height is:", "choices": ["24 inches minimum height (residential code)", "42 inches minimum height (commercial code)", "36 inches minimum height (residential code)", "No height requirement at any deck height"], "correct": 2, "exp": "Residential: 36 in min above deck surface. Commercial: 42 in. Plus 4-in sphere baluster rule. IRC.", "v": 5}, {"id": 4370, "domain": 1, "task": 8, "topic": "R-22 Phaseout", "q": "R-22 refrigerant has been phased out of new equipment manufacture as of:", "choices": ["January 1, 2010 (new equipment ban begins)", "January 1, 2000 (initial production phase out)", "January 1, 2020 (complete phase out, no service)", "Not yet phased out at all (still legal to use)"], "correct": 0, "exp": "R-22: Jan 2010 ban on new equipment with R-22 charge. Jan 2020: production banned. Service/recycling continues. EPA.", "v": 5}, {"id": 4371, "domain": 1, "task": 8, "topic": "R-410A", "q": "R-410A is the refrigerant commonly replacing R-22 in modern AC equipment with which property?", "choices": ["Same operating pressure as R-22 (drop-in replacement)", "Lower operating pressure (different equipment required)", "Higher operating pressure (different equipment required)", "Liquid only (vs gas at room temperature)"], "correct": 2, "exp": "R-410A: higher operating pressure than R-22 (50% more typical). Different equipment, not drop-in. Industry.", "v": 5}, {"id": 4372, "domain": 1, "task": 8, "topic": "AC Cold Test Limit", "q": "Air conditioning should NOT be tested in cooling mode if outdoor temperature has been below:", "choices": ["Below 70\u00b0F for 12 hours prior to test", "Below 60\u00b0F for 24 hours prior to test", "Below 32\u00b0F for 12 hours prior to test", "Below 45\u00b0F for 24 hours prior to test"], "correct": 1, "exp": "Below 60\u00b0F for 24 hours: skip AC test. Risk: oil migration in compressor, slugging on startup. Vol 1.", "v": 5}, {"id": 4373, "domain": 1, "task": 8, "topic": "Temp Differential", "q": "A properly operating AC system produces a temperature differential between supply and return air of approximately:", "choices": ["50\u201360\u00b0F differential (return minus supply)", "5\u201310\u00b0F differential (return minus supply)", "14\u201322\u00b0F differential (return minus supply)", "30\u201340\u00b0F differential (return minus supply)"], "correct": 2, "exp": "14-22\u00b0F typical (return minus supply at central register). Higher: low refrigerant. Lower: low charge or other. Industry.", "v": 5}, {"id": 4374, "domain": 1, "task": 8, "topic": "Suction Cold", "q": "An AC system suction line (large copper line) at the condenser unit should be:", "choices": ["Frozen with ice during normal operation", "Cold and slightly sweating during normal operation", "Hot to the touch during normal cooling operation", "Room temperature during normal operation"], "correct": 1, "exp": "Suction line: cold, slightly sweating. Frozen = low charge or low airflow. Hot = compressor problem. Industry.", "v": 5}, {"id": 4375, "domain": 1, "task": 8, "topic": "Liquid Line", "q": "An AC system liquid line (small copper line) at the condenser unit should be:", "choices": ["Frozen with ice during normal operation", "Warm to hot during normal cooling", "Cold and slightly sweating during normal operation", "Room temperature during normal operation"], "correct": 1, "exp": "Liquid line: warm-to-hot. Indicates condenser is rejecting heat. Cold liquid line: charge issue or condenser problem. Industry.", "v": 5}, {"id": 4376, "domain": 1, "task": 8, "topic": "Condensate Drain", "q": "A primary AC condensate drain pan should:", "choices": ["Be sealed to prevent evaporation losses", "Hold standing water as a moisture reserve", "Drain freely (trap and pitch correct)", "Backflow up to the evaporator coil during operation"], "correct": 2, "exp": "Free draining, properly trapped, pitched. Standing water = clogged drain (eventually overflows). Industry.", "v": 5}, {"id": 4377, "domain": 1, "task": 8, "topic": "Secondary Drain", "q": "A secondary AC condensate pan with float switch primarily protects against:", "choices": ["Primary drain failure causing water damage", "Refrigerant leaks in the primary system", "Power outages affecting the cooling system", "Outdoor temperature extremes during heat waves"], "correct": 0, "exp": "Secondary pan + float: primary drain clogs, secondary catches water; float switch shuts down system. Industry.", "v": 5}, {"id": 4378, "domain": 1, "task": 8, "topic": "Heat Pump Defrost", "q": "A heat pump in heating mode running through a defrost cycle:", "choices": ["Reverses to cooling, melts coil ice, then resumes heating", "Stops the outdoor fan to allow natural ice sublimation", "Shuts off power for 30 minutes to allow ice melt", "Increases backup heat strips to fight the ice formation"], "correct": 0, "exp": "Defrost: reverses valve to cooling mode (warms outdoor coil), backup heat keeps house warm, then resumes. Industry.", "v": 5}, {"id": 4379, "domain": 1, "task": 8, "topic": "Heat Pump Backup", "q": "Heat pumps in cold climates require backup (auxiliary) heat because:", "choices": ["Heat pumps are not legal below freezing temperatures", "Heat pumps consume more energy than backup electric resistance heat", "Heat pump capacity drops as outdoor temperature drops", "Heat pumps cannot operate below 50\u00b0F under any condition"], "correct": 2, "exp": "Heat pump capacity drops with cold OAT. Below balance point (~30-40\u00b0F): backup heat needed. Vol 1.", "v": 5}, {"id": 4380, "domain": 1, "task": 8, "topic": "AC Sizing", "q": "An oversized AC system tends to:", "choices": ["Short-cycle, leading to poor humidity control", "Cool more efficiently than a properly sized unit", "Under-cool the home consistently", "Last significantly longer than a properly sized unit"], "correct": 0, "exp": "Oversized AC: short cycles, doesn't run long enough to remove humidity. Properly sized = comfort + efficiency. Industry.", "v": 5}, {"id": 4381, "domain": 1, "task": 8, "topic": "Filter Location", "q": "An air filter for a forced-air HVAC system is typically located at:", "choices": ["The condensing unit outdoors (drain pan area)", "The return air entrance (or in air handler)", "The thermostat assembly (interior wall)", "The supply air registers (in each room)"], "correct": 1, "exp": "Filter at return entrance OR air handler. Filters return air before it reaches blower/coil. Industry.", "v": 5}, {"id": 4382, "domain": 1, "task": 8, "topic": "Disconnect Switch AC", "q": "An outdoor AC condenser disconnect must be:", "choices": ["Within sight of unit and within 50 ft", "Within sight of the panel inside the home", "Inside the home only (no outdoor disconnect required)", "Located below grade in a weatherproof box"], "correct": 0, "exp": "Disconnect: within sight of equipment AND within 50 ft. Allows safe lockout. NEC.", "v": 5}, {"id": 4383, "domain": 1, "task": 8, "topic": "Refrigerant Leak", "q": "Refrigerant leaks in an AC system are evidenced by:", "choices": ["Reduced cooling, frozen coil, oil residue at fittings", "Loud knocking only with no other symptoms", "Improved cooling efficiency (more refrigerant flow)", "Increased outdoor unit fan speed under load"], "correct": 0, "exp": "Leak signs: poor cooling, frozen coil, oily residue at fittings (oil carries with refrigerant). Industry.", "v": 5}, {"id": 4384, "domain": 1, "task": 8, "topic": "Mini-Split", "q": "A ductless mini-split AC system is characterized by which feature?", "choices": ["Window-installed package with no outdoor component", "Centralized ducted distribution from a single fan unit", "Indoor heads connected without ducts to outdoor", "Roof-mounted package with internal ductwork only"], "correct": 2, "exp": "Mini-split: indoor head(s) connected by refrigerant lines to outdoor unit. No ducts. Zoned cooling/heating. Industry.", "v": 5}, {"id": 4385, "domain": 1, "task": 8, "topic": "AC Capacitor", "q": "A failed AC start capacitor typically results in which symptom?", "choices": ["Loud screaming noise from indoor air handler", "Compressor humming but not starting (locked rotor)", "Outdoor fan running at very high speed", "Excellent cooling with very low energy consumption"], "correct": 1, "exp": "Failed start cap: compressor hums (won't start), pulls high amps, breaker trips. Common ~5-10 yr replacement. Industry.", "v": 5}, {"id": 4386, "domain": 1, "task": 8, "topic": "Frozen Evaporator", "q": "An AC evaporator coil that freezes up indicates which possible cause?", "choices": ["High outdoor temperature exceeding equipment rating", "Excess refrigerant charge from over-fill at install", "Low refrigerant charge OR low airflow at the coil", "Excessive humidity in the home requiring more cooling"], "correct": 2, "exp": "Frozen evaporator: low charge (suction pressure low) OR low airflow (filter, blower, duct). Address cause. Industry.", "v": 5}, {"id": 4387, "domain": 1, "task": 8, "topic": "AC Lifespan", "q": "Residential AC systems typically have an expected lifespan of:", "choices": ["5 to 8 years (regardless of maintenance)", "20 to 30 years (premium equipment only)", "12 to 15 years (varies with maintenance)", "40 to 50 years (with replacement parts)"], "correct": 2, "exp": "12-15 yr typical. Coastal/poor maintenance shortens. Premium equipment with care: 20+ yr. Vol 1.", "v": 5}, {"id": 4388, "domain": 1, "task": 8, "topic": "AC Compressor", "q": "The most expensive component in an AC system to replace is typically:", "choices": ["The thermostat (digital control unit)", "The evaporator coil (interior coil unit)", "Compressor (near total replacement cost)", "The condenser coil (outdoor unit only)"], "correct": 2, "exp": "Compressor: most costly part. At 10+ yr, repair often near replacement cost. Discuss with HVAC tech. Industry.", "v": 5}, {"id": 4389, "domain": 1, "task": 8, "topic": "Window AC", "q": "Window AC units typically require which electrical configuration?", "choices": ["Standard branch circuit shared with other loads", "Battery backup connection only (no AC power)", "Hard-wired connection only (no plug allowed)", "Dedicated 120V (8K BTU+) or 240V (>15K BTU)"], "correct": 3, "exp": "Larger window units: dedicated 120V or 240V circuit. Smaller (5-7K BTU): may share. NEC.", "v": 5}, {"id": 4390, "domain": 1, "task": 11, "topic": "Stair Riser Max", "q": "Maximum stair riser height in residential is:", "choices": ["7-3/4 inches maximum riser height", "8-1/4 inches maximum riser height", "6 inches maximum riser height", "9 inches maximum riser height"], "correct": 0, "exp": "Max 7-3/4 in riser. Min 10 in tread. Variation between risers max 3/8 in. IRC.", "v": 5}, {"id": 4391, "domain": 1, "task": 11, "topic": "Stair Tread Min", "q": "Minimum stair tread depth in residential is:", "choices": ["10 inches minimum tread depth", "12 inches minimum tread depth", "8 inches minimum tread depth", "9 inches minimum tread depth"], "correct": 0, "exp": "Min 10 in tread. Max 7-3/4 in riser. Variation max 3/8 in. IRC.", "v": 5}, {"id": 4392, "domain": 1, "task": 11, "topic": "Stair Variation", "q": "Maximum allowable variation between adjacent stair risers (or treads) is:", "choices": ["3/8 inch maximum variation between adjacent risers", "1/4 inch maximum variation between adjacent risers", "1 inch maximum variation between adjacent risers", "1/16 inch maximum variation between adjacent risers"], "correct": 0, "exp": "Max 3/8 in variation between any adjacent risers OR treads. Inconsistent = trip hazard. IRC.", "v": 5}, {"id": 4393, "domain": 1, "task": 11, "topic": "Stair Headroom", "q": "Stair headroom (clear vertical) requires minimum:", "choices": ["6 ft 8 inches minimum stair headroom", "7 ft 0 inches minimum stair headroom", "6 ft 0 inches minimum stair headroom", "8 ft 0 inches minimum stair headroom"], "correct": 0, "exp": "Min 6 ft 8 in (80 in) headroom. Common defect at basement stairs (low ceilings). IRC.", "v": 5}, {"id": 4394, "domain": 1, "task": 11, "topic": "Handrail Height", "q": "Stair handrail height (from tread nosing) must be:", "choices": ["42 to 46 inches above stair nosing", "34 to 38 inches above stair nosing", "30 to 34 inches above stair nosing", "32 to 36 inches above stair nosing"], "correct": 1, "exp": "34-38 in above tread nosing (different from guardrail 36 in min). Continuous rail along entire run. IRC.", "v": 5}, {"id": 4395, "domain": 1, "task": 11, "topic": "Handrail Required", "q": "Handrails are required on stairs of how many or more risers?", "choices": ["8 or more risers require handrail", "4 or more risers require handrail", "There is no minimum requirement", "1 or more risers require handrail"], "correct": 1, "exp": "4+ risers require handrail. Continuous on at least one side. Returns to wall or post at ends. IRC.", "v": 5}, {"id": 4396, "domain": 1, "task": 11, "topic": "Drywall Cracks", "q": "Drywall cracks at corner intersections most often indicate:", "choices": ["Structural settlement requiring engineering review", "Failed drywall installation requiring replacement", "Normal seasonal expansion/contraction (cosmetic only)", "Hidden water damage from a roof leak"], "correct": 2, "exp": "Most drywall cracks at corners: seasonal expansion. Diagonal stair-step at openings = possible settlement. Industry.", "v": 5}, {"id": 4397, "domain": 1, "task": 11, "topic": "Window Glazing Tubs", "q": "Glazing within 60 inches of a tub or shower must be:", "choices": ["Tempered safety glazing (per IRC hazardous locations)", "Frosted glass with no other rating requirement", "Annealed standard glass (hazard rating not required)", "Wire-reinforced glass with mesh visible inside"], "correct": 0, "exp": "Hazardous location: tempered glazing required within 60 in of tub/shower. Avoids cuts on broken glass. IRC.", "v": 5}, {"id": 4398, "domain": 1, "task": 11, "topic": "Glazing Near Door", "q": "Glazing within 24 inches of a door must be:", "choices": ["Frosted glass with no other rating requirement", "Wire-reinforced glass with mesh visible inside", "Annealed standard glass (hazard rating not required)", "Tempered safety glazing (per IRC hazardous locations)"], "correct": 3, "exp": "Within 24 in of door (and within 60 in of floor): tempered required. Side-light common. IRC.", "v": 5}, {"id": 4399, "domain": 1, "task": 11, "topic": "Mold Black", "q": "Black staining on drywall typically indicates which condition?", "choices": ["Paint deterioration from age and aging", "Mold growth from moisture (find the source)", "Soot deposit from candle or fireplace use", "Dust accumulation from poor ventilation"], "correct": 1, "exp": "Black staining: usually mold from moisture. Find/fix source first. HI not mold expert; recommend specialist if extensive. Industry.", "v": 5}, {"id": 4400, "domain": 1, "task": 11, "topic": "Lead Paint", "q": "Lead-based paint was used in homes built before what year?", "choices": ["2010 (recent EPA renovation rules)", "1995 (recent EPA testing requirements)", "1950 (year banned in Wisconsin only)", "1978 (year EPA banned residential use)"], "correct": 3, "exp": "1978 EPA ban (residential). Pre-1978: assume lead until tested. RRP rules apply for renovation. EPA.", "v": 5}, {"id": 4401, "domain": 1, "task": 11, "topic": "Asbestos Floor", "q": "Asbestos-containing floor tiles (typically 9x9) were common in homes built before:", "choices": ["1995 (modern flooring)", "1980 (asbestos largely phased out)", "1950 (early asbestos-free transition)", "2010 (recent flooring)"], "correct": 1, "exp": "9x9 floor tiles + black mastic: high asbestos suspicion (pre-1980). Test before disturbing. EPA.", "v": 5}, {"id": 4402, "domain": 1, "task": 11, "topic": "Window Lead", "q": "Lead in older windows is most often found in:", "choices": ["Window glazing material (not used in residential)", "Counterweights (pre-1960) and possible solder", "Window frame construction (aluminum age windows)", "Window screens (aluminum screens contain no lead)"], "correct": 1, "exp": "Old window counterweights: lead commonly used. Solder on stained glass: lead. Avoid disturbance. EPA.", "v": 5}, {"id": 4403, "domain": 1, "task": 11, "topic": "Bathroom GFCI", "q": "All bathroom receptacles in residential homes require:", "choices": ["Standard receptacles (no special protection needed)", "Tamper-resistant only (no GFCI requirement)", "AFCI protection (arc fault breakers required)", "GFCI protection (any location in the bathroom)"], "correct": 3, "exp": "All bathroom receptacles GFCI. Plus tamper-resistant since 2008. Standard since NEC modernization. NEC.", "v": 5}, {"id": 4404, "domain": 1, "task": 11, "topic": "Smoke Alarm in Reno", "q": "When remodeling triggers smoke alarm requirements, the home must:", "choices": ["Upgrade to current code (hardwired, interconnected)", "Skip smoke alarm requirements during renovation", "Keep existing battery alarms regardless of condition", "Add only one alarm at the renovation entry point"], "correct": 0, "exp": "Renovation triggers: upgrade to current code (hardwired, interconnected, battery backup). NFPA/IRC.", "v": 5}, {"id": 4405, "domain": 2, "task": 1, "topic": "SOP Purpose", "q": "A home inspection Standards of Practice document primarily defines:", "choices": ["Continuing education requirements for license renewal cycles", "Pricing schedules for different inspection services offered", "Marketing and advertising rules for inspector promotion", "What an inspector is required to inspect, observe, and report"], "correct": 3, "exp": "SOP defines minimum scope: required systems/components, exclusions, reporting standards. ASHI/InterNACHI/state. Industry.", "v": 5}, {"id": 4406, "domain": 2, "task": 1, "topic": "Inspection Type", "q": "A typical residential pre-purchase home inspection is best described as:", "choices": ["A destructive/invasive inspection requiring opening of walls", "A visual, non-invasive evaluation of installed systems and components", "A warranty inspection guaranteeing future system performance", "A code compliance audit comparing current installation to current code"], "correct": 1, "exp": "Pre-purchase HI: visual, non-invasive, focused on observable defects. Not code audit, not warranty, not destructive. SOP.", "v": 5}, {"id": 4407, "domain": 2, "task": 1, "topic": "Pre-Listing Purpose", "q": "A pre-listing home inspection is typically performed for which client?", "choices": ["Seller (preparing home for market in advance)", "Buyer (conducting due diligence after offer accepted)", "Lender (verifying property value for mortgage)", "Insurance company (assessing risk before issuing policy)"], "correct": 0, "exp": "Pre-listing: SELLER pays. Identifies defects before market exposure. Allows pricing/repair decisions. Industry.", "v": 5}, {"id": 4408, "domain": 2, "task": 1, "topic": "4-Point Insurance", "q": "A 4-point insurance inspection typically evaluates which four systems?", "choices": ["Roof, electrical, plumbing, and HVAC (insurer focus areas)", "Heating, cooling, water heater, and major appliances (mechanical)", "Site, exterior, interior, and life safety (general focus)", "Foundation, framing, sheathing, and finishes (structural focus)"], "correct": 0, "exp": "4-point: roof, electrical, plumbing, HVAC. Used by insurers for older homes. Limited scope. Industry.", "v": 5}, {"id": 4409, "domain": 2, "task": 1, "topic": "Wind Mitigation", "q": "A wind mitigation inspection is most commonly required in:", "choices": ["Coastal hurricane areas (FL, Gulf, Atlantic)", "Northern regions with severe ice storm exposure", "Tornado alley regions with frequent severe weather", "Mountain regions with severe winter snow loading"], "correct": 0, "exp": "Wind mit: hurricane-prone coastal areas (FL primarily). Documents hurricane resistance for insurance discount. Industry.", "v": 5}, {"id": 4410, "domain": 2, "task": 1, "topic": "Phase Inspection", "q": "A new construction phase inspection (pre-drywall) primarily evaluates:", "choices": ["Foundation excavation only (before footings are poured)", "Final finish details after all construction is complete", "Framing, plumbing, electrical before drywall covers", "Final landscape only as last item before homeowner move-in"], "correct": 2, "exp": "Pre-drywall: inspect rough framing, mechanicals, plumbing, electrical while still visible. Critical phase. Industry.", "v": 5}, {"id": 4411, "domain": 2, "task": 1, "topic": "Commercial PCA", "q": "A commercial Property Condition Assessment (PCA) follows which standard?", "choices": ["InterNACHI SOP (the home inspection residential standard)", "IRC code (the building code, not a service standard)", "ASHI SOP (the home inspection residential standard)", "ASTM E2018 (standard for commercial PCAs)"], "correct": 3, "exp": "Commercial PCA: ASTM E2018. Different scope from residential. Costs $800-$2,500+. Track A relevant. Industry.", "v": 5}, {"id": 4412, "domain": 2, "task": 1, "topic": "Walk-Through", "q": "A pre-closing walk-through inspection is typically performed:", "choices": ["By the buyer (verify repairs and condition unchanged)", "By the lender (final loan approval inspection)", "By the listing agent (preparing home for closing day)", "By the inspector (third-party verification at the walkthrough only)"], "correct": 0, "exp": "Pre-closing walk-through: BUYER (often with their agent). Verifies repair completion and no new damage. Industry.", "v": 5}, {"id": 4413, "domain": 2, "task": 1, "topic": "Annual Maint", "q": "An Annual Maintenance Inspection (AMI) is best described as:", "choices": ["Required by code for all homes with a working warranty", "Insurance-driven inspection tied to policy renewals", "A pre-purchase inspection performed annually", "Recurring service identifying issues before failure"], "correct": 3, "exp": "AMI: annual recurring inspection identifying maintenance items before failure. Cream City Pro recurring revenue model. Industry.", "v": 5}, {"id": 4414, "domain": 2, "task": 1, "topic": "REO Inspection", "q": "An REO (Real Estate Owned) inspection typically refers to:", "choices": ["Foreclosed property inspection (often HUD/VA/bank-owned)", "A real estate office due diligence walkthrough", "An owner-requested inspection prior to listing", "Initial regulatory enforcement inspection at property"], "correct": 0, "exp": "REO: lender-owned foreclosed property. HUD/VA REO contracts available via WOSB set-asides. Industry.", "v": 5}, {"id": 4415, "domain": 2, "task": 1, "topic": "Re-Inspection", "q": "A re-inspection following an initial home inspection is typically performed to:", "choices": ["Update the original inspection for a new buyer", "Replace the original inspection report and findings", "Conduct annual maintenance after the original inspection", "Verify repairs completed since the original inspection"], "correct": 3, "exp": "Re-inspection: verify completion of repairs from original inspection. Often pre-closing. Lower fee. Industry.", "v": 5}, {"id": 4416, "domain": 2, "task": 1, "topic": "WDO Subcontract", "q": "WDO (Wood Destroying Organism) inspections are typically:", "choices": ["Performed by the home inspector under HI license", "Subcontracted to licensed pest control inspectors", "Performed by lab analysis of structural samples", "Not required in any U.S. region"], "correct": 1, "exp": "WDO inspection: separate license (most states), often subcontracted. WI requires DATCP-licensed inspector. Industry.", "v": 5}, {"id": 4417, "domain": 2, "task": 1, "topic": "Sewer Scope", "q": "A sewer scope inspection involves:", "choices": ["Excavation and visual inspection of buried sewer line", "Visual inspection of cleanouts and exposed plumbing only", "Camera in lateral line from cleanout to municipal main", "Pressure testing of household drains and venting"], "correct": 2, "exp": "Sewer scope: camera into lateral line from cleanout. Identifies cracks, root intrusion, separations. Critical Milwaukee. Industry.", "v": 5}, {"id": 4418, "domain": 2, "task": 1, "topic": "Mold Screening", "q": "Mold screening by a home inspector typically involves:", "choices": ["Visual identification only (no sample collection)", "Air or surface sampling sent to lab for analysis", "Destructive opening of walls to access cavity sampling", "Sealing the building to test all interior air completely"], "correct": 1, "exp": "Mold screening: air cassettes (Air-O-Cell) or surface tape lifts to lab. Visible only without sampling = visual only. Industry.", "v": 5}, {"id": 4419, "domain": 2, "task": 1, "topic": "Radon Test", "q": "Radon testing in real estate transactions typically requires:", "choices": ["Annual integrated test sample over the year", "48-hour minimum closed-house test", "30-day continuous test of indoor air conditions", "30-minute spot test reading at sample points only"], "correct": 1, "exp": "Real estate transaction: 48-hr minimum closed-house test. Continuous monitor or charcoal canister. EPA/AARST.", "v": 5}, {"id": 4420, "domain": 2, "task": 1, "topic": "Thermal Imaging", "q": "Thermal imaging by a home inspector is best described as:", "choices": ["Replacement for visual inspection in difficult access areas", "Surface temperature visualization (interpretation aid)", "X-ray of the wall structure showing internal components", "Definitive moisture detection without other tools needed"], "correct": 1, "exp": "Thermal: shows surface temp differences (interpretation needed). Aid only. Combine with moisture meter, visual. Industry.", "v": 5}, {"id": 4421, "domain": 2, "task": 2, "topic": "Snow on Roof", "q": "If snow covers the roof at inspection, the inspector should:", "choices": ["Decline the inspection until winter has fully ended", "Climb the roof and clear snow for full inspection", "Disclaim, document conditions, recommend re-inspection", "Record the roof as defective without further note"], "correct": 2, "exp": "Snow limits roof access. Disclaim, document what's visible, recommend re-inspection when clear. Industry SOP.", "v": 5}, {"id": 4422, "domain": 2, "task": 2, "topic": "Vacant Furnace Off", "q": "A furnace that has been winterized (off, drained) at inspection should be:", "choices": ["Disclaimed; recommend re-evaluation when reactivated", "Refilled and tested by the inspector during inspection", "Operated by the inspector to verify function", "Recorded as defective due to non-operational status"], "correct": 0, "exp": "Don't operate equipment in winterized state (damage risk). Disclaim, recommend re-eval after reactivation. SOP.", "v": 5}, {"id": 4423, "domain": 2, "task": 2, "topic": "Vacant Power Off", "q": "If electrical power is off at the property at inspection, the inspector should:", "choices": ["Disclaim electrical; re-eval when energized", "Test only the panel components without energizing", "Reset and energize systems to test fully", "Cancel the inspection until power is restored"], "correct": 0, "exp": "Power off: disclaim electrical, plumbing, HVAC. Recommend re-eval with utilities on. Industry SOP.", "v": 5}, {"id": 4424, "domain": 2, "task": 2, "topic": "Inaccessible Crawl", "q": "An inaccessible crawl space (locked, blocked, or wet) should be:", "choices": ["Reported as full inspection completed satisfactorily", "Disclaim; describe limit; recommend re-inspection", "Recorded as no defects observed (since not accessible)", "Inspected by climbing the inspector through any opening"], "correct": 1, "exp": "Inaccessible crawl: disclaim, describe limitation, recommend access for re-eval. Don't report 'no defects'. SOP.", "v": 5}, {"id": 4425, "domain": 2, "task": 2, "topic": "Cosmetic vs Defect", "q": "Cosmetic conditions (peeling paint, scratches, dings) are typically:", "choices": ["Outside SOP scope (not material defects)", "The primary focus of the inspection", "Required to be photographed in the report", "Material defects requiring detailed reporting"], "correct": 0, "exp": "Cosmetic: outside SOP. Note in passing if relevant. Focus is material defects/safety items. Industry SOP.", "v": 5}, {"id": 4426, "domain": 2, "task": 2, "topic": "Locked Panel", "q": "A locked electrical panel that cannot be accessed should be:", "choices": ["Treated as not present in the home inspection", "Forcibly opened by the inspector during inspection", "Disclaim; recommend access for re-inspection", "Recorded as no defects observed (since not accessed)"], "correct": 2, "exp": "Locked panel: disclaim, describe, recommend re-inspection with access. Don't force entry. Industry SOP.", "v": 5}, {"id": 4427, "domain": 2, "task": 2, "topic": "Furniture Blocking", "q": "Areas blocked by furniture or storage during inspection are typically:", "choices": ["Treated as if defective (since not visible)", "Inspected fully by feeling around the obstruction", "Disclaim; cannot inspect under or behind items", "Inspected after the inspector moves items himself"], "correct": 2, "exp": "Stored items: don't move (liability for damage). Disclaim, recommend re-eval if removed. Industry SOP.", "v": 5}, {"id": 4428, "domain": 2, "task": 2, "topic": "Above Insulation", "q": "Roof framing covered by attic insulation should be:", "choices": ["Inspected by removing insulation to see structure", "Disclaimed; not visible without disturbing insulation", "Inspected by digging through insulation completely", "Treated as no defects observed (since not seen)"], "correct": 1, "exp": "Insulation covers framing: disclaim what's not visible. Don't disturb (insulation, vermiculite asbestos risk). SOP.", "v": 5}, {"id": 4429, "domain": 2, "task": 2, "topic": "Behind Walls", "q": "Conditions behind drywall, insulation, or finishes should be:", "choices": ["Reported as fully inspected with no defects", "Disclaimed (visual surface only)", "Recorded as defective until proven otherwise", "Investigated by opening the wall during inspection"], "correct": 1, "exp": "Visual inspection: surface only. Behind finishes is not part of HI. Disclaim. Recommend specialist if concern. SOP.", "v": 5}, {"id": 4430, "domain": 2, "task": 2, "topic": "Concealed Plumbing", "q": "Buried or concealed plumbing piping should be:", "choices": ["Excavated to inspect by the home inspector", "Reported as defective due to non-visibility", "Pressure-tested by the inspector at high pressure", "Disclaim; visual inspection of exposed only"], "correct": 3, "exp": "Concealed plumbing: disclaim. Visual scope only. Recommend specialist (sewer scope, leak detection) if concern. SOP.", "v": 5}, {"id": 4431, "domain": 2, "task": 2, "topic": "Code Audit", "q": "A home inspection is typically NOT a code audit because:", "choices": ["Code violations are always automatically reported", "Inspectors are not authorized to enforce code requirements", "Homes are exempt from code in most jurisdictions", "Codes change over time; older homes may pre-date current code"], "correct": 3, "exp": "HI not code audit. Codes change. Older homes legally pre-date current. Note safety items regardless. Industry SOP.", "v": 5}, {"id": 4432, "domain": 2, "task": 2, "topic": "Tools/Specialty", "q": "Specialized testing (mold, radon, thermal) typically requires:", "choices": ["Identical training and tools as basic home inspection", "Additional training, equipment, separate disclaimers", "Free service included in any standard home inspection", "Required regulatory tests for all homes regardless"], "correct": 1, "exp": "Specialty: additional training, equipment, certifications. Add-on services with separate disclaimers. Industry.", "v": 5}, {"id": 4433, "domain": 2, "task": 2, "topic": "Beyond SOP Scope", "q": "Items outside the typical SOP (water quality, septic, well, geotechnical) should be:", "choices": ["Ignored entirely during the inspection", "Inspected by the home inspector at no charge", "Acknowledge outside scope; recommend specialist", "Treated as defects without specialist evaluation"], "correct": 2, "exp": "Outside SOP: acknowledge, recommend specialist eval. Disclaim limit. Don't pretend to evaluate beyond competence. SOP.", "v": 5}, {"id": 4434, "domain": 2, "task": 2, "topic": "Unsafe to Walk Roof", "q": "A roof too steep, brittle, or wet to walk should be:", "choices": ["Inspect from ground/eaves (binoculars/drone)", "Refused entirely with no inspection performed", "Walked anyway under unsafe conditions", "Reported as unsafe and not inspected"], "correct": 0, "exp": "Unsafe roof: inspect from ground/eaves with binoculars, drone, or photo zoom. Document limitation. Industry SOP.", "v": 5}, {"id": 4435, "domain": 2, "task": 2, "topic": "Inspector Liability", "q": "Major liability sources for home inspectors include:", "choices": ["Missed roof leaks, mold, structural, septic", "Lawn condition and exterior aesthetic findings only", "Detailed reporting that includes too many photos", "Following standards of practice and proper disclaimers"], "correct": 0, "exp": "Big liability: undisclosed leaks, mold, structural, septic. Following SOP + good disclaimers reduces liability. Industry.", "v": 5}, {"id": 4436, "domain": 2, "task": 2, "topic": "Photo Documentation", "q": "Photographs in inspection reports primarily serve to:", "choices": ["Decorate the report for marketing purposes", "Document conditions; reduce liability and disputes", "Replace written defect descriptions completely", "Establish artistic value of the inspection report"], "correct": 1, "exp": "Photos: document conditions, support text descriptions, reduce disputes ('was that there?'). Standard practice. Industry.", "v": 5}, {"id": 4437, "domain": 2, "task": 2, "topic": "Future Performance", "q": "Predicting future performance of a system (e.g., 'will the roof last 5 more years') is:", "choices": ["Outside HI scope; observation-based estimates only", "Determined by detailed lab analysis of materials", "Required reporting in every inspection performed", "Standard guarantee provided with all inspections"], "correct": 0, "exp": "Predicting future = warranty (we don't issue). Provide observation-based estimates with disclaimers ('appears to have life remaining'). Industry.", "v": 5}, {"id": 4438, "domain": 2, "task": 3, "topic": "Material Defect", "q": "A 'material defect' is best defined as:", "choices": ["Cosmetic blemish on a finish or surface", "Significantly affects value or poses safety risk", "Manufacturer warranty claim during installation", "Any imperfection observed during the inspection"], "correct": 1, "exp": "Material defect: significant impact on value OR safety risk. Cosmetic is not material. Industry SOP.", "v": 5}, {"id": 4439, "domain": 2, "task": 3, "topic": "Severity Classes", "q": "A typical defect severity classification system includes:", "choices": ["New, used, or worn (age-based classification only)", "Pass or fail (binary classification per item)", "Code compliant or non-code compliant (binary classification)", "Safety, major, minor, maintenance, monitor (or similar tiers)"], "correct": 3, "exp": "Common scheme: safety, major, minor, maintenance, monitor. Spectora templates. Helps prioritize for client. Industry.", "v": 5}, {"id": 4440, "domain": 2, "task": 3, "topic": "Identify-Implication-Recommend", "q": "A complete defect description should typically include:", "choices": ["Estimated cost of repair from a contractor", "Manufacturer name and product specifications only", "Photo only (text descriptions are unnecessary)", "Observed, location, implication, recommendation"], "correct": 3, "exp": "Standard format: Identify (what), Locate (where), Implication (so what?), Recommend (what next?). Industry SOP.", "v": 5}, {"id": 4441, "domain": 2, "task": 3, "topic": "Avoid Code Citations", "q": "Citing specific code sections in defect descriptions is typically:", "choices": ["Standard practice in modern inspection reports", "Avoid (HI is not a code audit; cite SOP instead)", "Required reporting in every defect description", "Replaced by photo documentation entirely"], "correct": 1, "exp": "Avoid code citations (HI not code audit). Note safety/best practices. Recommend specialist if code is concern. SOP.", "v": 5}, {"id": 4442, "domain": 2, "task": 3, "topic": "Probable Cause vs Cause", "q": "Identifying defect cause should be characterized as:", "choices": ["Manufacturer cause (always default to manufacturer fault)", "Hidden cause (impossible to identify in any inspection)", "Definitive cause (assured by visual inspection alone)", "Probable cause (definitive needs DT testing)"], "correct": 3, "exp": "Visual = probable cause only. Definitive often requires destructive investigation. Disclaim accordingly. Industry SOP.", "v": 5}, {"id": 4443, "domain": 2, "task": 3, "topic": "Recommend Specialist", "q": "When a defect's full extent or cause is unclear, the inspector should:", "choices": ["Identify and prescribe specific repairs personally", "Estimate the repair cost in dollar amounts", "Investigate further by destructive testing methods", "Recommend evaluation by a qualified specialist"], "correct": 3, "exp": "Recommend specialist for full extent/cause/cost. HI identifies; specialist diagnoses and prescribes. Industry SOP.", "v": 5}, {"id": 4444, "domain": 2, "task": 3, "topic": "Quantify When Possible", "q": "Defect descriptions should quantify the issue when possible by including:", "choices": ["Vague terms only (poor, fair, decent, etc.)", "Estimated repair cost in detailed dollar amounts", "Photographic evidence only (no quantitative data needed)", "Measurements, counts, percentages, locations"], "correct": 3, "exp": "Quantify: 'three locations', '40% granule loss', '12 in deflection'. Avoid vague language. Photos support. Industry.", "v": 5}, {"id": 4445, "domain": 2, "task": 3, "topic": "Don't Diagnose Cause", "q": "If you observe water staining on a ceiling, the report should:", "choices": ["Identify the contractor responsible for the original work", "Provide repair cost estimates from local contractors", "Diagnose the cause definitively as roof failure", "Note staining; possible source; recommend specialist"], "correct": 3, "exp": "Note staining + possible sources (active vs old, source) + recommend specialist eval. Don't diagnose definitively. SOP.", "v": 5}, {"id": 4446, "domain": 2, "task": 3, "topic": "Active vs Old Damage", "q": "Distinguishing active (current) from old (historical) water damage is important because:", "choices": ["Active source needs attention; old is repair history", "Old damage is always more serious than active damage", "Active damage cannot be repaired (always major issue)", "There is no functional difference between the two"], "correct": 0, "exp": "Active vs old: matters greatly. Active has source still happening. Old may have been resolved. Use moisture meter. Industry.", "v": 5}, {"id": 4447, "domain": 2, "task": 3, "topic": "Defect at Finish", "q": "When you observe a defect that may extend beyond the visible surface, you should:", "choices": ["Diagnose the full extent based on visual observation", "Note possibility; recommend specialist evaluation", "Estimate repair cost for both visible and hidden damage", "Open the finish to investigate during inspection"], "correct": 1, "exp": "Note possibility, recommend specialist for extent. Don't extrapolate visual to hidden. Don't open finishes. SOP.", "v": 5}, {"id": 4448, "domain": 2, "task": 3, "topic": "Avoid Alarmist", "q": "Defect descriptions should be communicated in a tone that is:", "choices": ["Factual and clear (avoid alarmist language)", "Alarmist (emphasize worst-case scenarios)", "Minimizing (downplay all observations)", "Apologetic (express regret for findings)"], "correct": 0, "exp": "Factual and clear. Neither alarmist nor minimizing. Help client understand without panic. Industry.", "v": 5}, {"id": 4449, "domain": 2, "task": 3, "topic": "Photos Should", "q": "Photos in defect descriptions should:", "choices": ["Be omitted (text descriptions are sufficient)", "Show the inspector posing in front of the defect", "Show defect, location context, and relevant detail", "Be artistic and aesthetic to enhance the report"], "correct": 2, "exp": "Photos: show defect + context (so reader knows location). Annotate when helpful (arrows, circles). Industry.", "v": 5}, {"id": 4450, "domain": 2, "task": 3, "topic": "Multiple Locations", "q": "If a defect appears in multiple locations, the report should:", "choices": ["Document only one location and ignore all the rest", "Document every single instance individually", "Document only the worst case observed", "Document representative samples; note 'similar throughout'"], "correct": 3, "exp": "Document representative samples + 'similar throughout'. Avoids overwhelming. Document each major area. Industry.", "v": 5}, {"id": 4451, "domain": 2, "task": 3, "topic": "Functional vs Cosmetic", "q": "Distinguishing functional from cosmetic concerns is important because:", "choices": ["Functional is outside the home inspection scope", "Cosmetic is always more expensive to fix than functional", "Functional affects use/safety; cosmetic does not", "There is no functional difference between the two"], "correct": 2, "exp": "Functional: affects operation/safety/value. Cosmetic: appearance only. Different priority for client decisions. Industry.", "v": 5}, {"id": 4452, "domain": 2, "task": 3, "topic": "Standard Reporting Tone", "q": "A consistent reporting tone across the report helps the reader:", "choices": ["Practice reading vocabulary in technical writing", "Identify the inspector's mood at time of inspection", "Compare the inspector's language to other reports", "Calibrate severity (similar language helps)"], "correct": 3, "exp": "Consistent tone helps reader calibrate severity. Use template language consistently for similar issues. Industry.", "v": 5}, {"id": 4453, "domain": 2, "task": 3, "topic": "Avoid Estimates", "q": "Providing repair cost estimates in inspection reports is:", "choices": ["Performed by the home inspector with detailed analysis", "Always provided as a courtesy to the client", "Required practice in all professional inspection reports", "Generally avoided (estimates require contractor specialty)"], "correct": 3, "exp": "Avoid cost estimates: not your specialty, varies widely, creates liability. Recommend contractor estimates instead. Industry.", "v": 5}, {"id": 4454, "domain": 2, "task": 4, "topic": "FE Definition", "q": "Recommending 'further evaluation' (FE) typically means:", "choices": ["The buyer should walk away from the property", "The home inspector will return to inspect again", "The home is uninhabitable until further notice", "Specialist evaluation needed beyond HI scope"], "correct": 3, "exp": "FE: specialist evaluation needed (electrician, structural eng, plumber, HVAC, etc.). Beyond HI scope. Industry SOP.", "v": 5}, {"id": 4455, "domain": 2, "task": 4, "topic": "FE for Active Leak", "q": "An active plumbing leak observed during inspection should typically lead to:", "choices": ["Recommend licensed plumber evaluation", "Immediate repair by the home inspector", "Diagnosis by the home inspector personally", "Acceptance with no specialist recommendation"], "correct": 0, "exp": "Active plumbing leak: recommend licensed plumber for diagnosis/repair. HI identifies; plumber resolves. Industry.", "v": 5}, {"id": 4456, "domain": 2, "task": 4, "topic": "FE for Settlement", "q": "Significant foundation settlement or movement should typically lead to:", "choices": ["Diagnosis as cosmetic only (no further action)", "Acceptance as normal for any older home", "Recommendation for structural engineer evaluation", "Repair by the home inspector during inspection"], "correct": 2, "exp": "Significant settlement: structural engineer eval. Determines if active vs stable, repair recommendations. Industry.", "v": 5}, {"id": 4457, "domain": 2, "task": 4, "topic": "FE for Black Stains", "q": "Extensive black staining suggesting mold should typically lead to:", "choices": ["Diagnosis as definitively mold by the home inspector", "Recommendation for mold specialist evaluation", "Acceptance as cosmetic without specialist evaluation", "Cleanup by the home inspector with bleach"], "correct": 1, "exp": "Extensive black staining: recommend mold specialist (testing + remediation if needed). HI identifies suspicious. Industry.", "v": 5}, {"id": 4458, "domain": 2, "task": 4, "topic": "FE for FPE Panel", "q": "Discovery of a Federal Pacific Stab-Lok panel should typically lead to:", "choices": ["Diagnosis based on age of the panel only", "Acceptance as functional unless visible damage", "Repair by the home inspector during inspection", "Recommend licensed electrician evaluation"], "correct": 3, "exp": "FPE: known failure-to-trip issue. Recommend electrician eval, often replacement. Document hazard. Industry.", "v": 5}, {"id": 4459, "domain": 2, "task": 4, "topic": "FE for Old WH", "q": "A water heater 12+ years old typically warrants:", "choices": ["Diagnosis of remaining lifespan in years", "Immediate replacement recommendation as defective", "Note age, end-of-life consideration, monitor closely", "Acceptance as fine until visible failure occurs"], "correct": 2, "exp": "Old WH: note age, recommend monitoring. Average lifespan 8-12 yr. Approaching end. Industry.", "v": 5}, {"id": 4460, "domain": 2, "task": 4, "topic": "FE for Cracked HX", "q": "A suspected cracked furnace heat exchanger should typically lead to:", "choices": ["Repair by the home inspector during inspection", "Recommend HVAC tech with combustion analyzer", "Continued operation as observed during inspection", "Diagnosis as definitively cracked by visual inspection"], "correct": 1, "exp": "Suspected HX crack: HVAC tech with combustion analyzer/camera. Definitive diagnosis beyond HI tools. Safety. Industry.", "v": 5}, {"id": 4461, "domain": 2, "task": 4, "topic": "FE for Galv Pipe", "q": "Galvanized supply piping near or beyond expected service life warrants:", "choices": ["Acceptance as fine since the pipe still flows", "Treatment with chemicals to extend service life", "Note end-of-life; monitor; plan replacement", "Immediate replacement recommendation as defective"], "correct": 2, "exp": "Galv at/beyond service life: note end-of-life, recommend plan for replacement, monitor for leaks. Industry.", "v": 5}, {"id": 4462, "domain": 2, "task": 4, "topic": "FE for Asbestos", "q": "Materials suspected of containing asbestos (vermiculite, 9x9 floor tiles) warrant:", "choices": ["Sealing the area with paint to prevent exposure", "Removal by the home inspector during inspection", "Recommend asbestos testing before disturbance", "Visual identification only by the home inspector"], "correct": 2, "exp": "Suspected asbestos: recommend testing before disturbance. Don't disturb. Don't identify definitively. EPA.", "v": 5}, {"id": 4463, "domain": 2, "task": 4, "topic": "FE for Bowed Wall", "q": "A foundation wall bowed >1 inch warrants:", "choices": ["Diagnosis as definitively failing by the inspector", "Cosmetic repair by the home inspector", "Recommendation for structural engineer evaluation", "Acceptance as normal aging of the foundation"], "correct": 2, "exp": "Bowed wall >1 in: structural engineer eval. May need carbon fiber, tiebacks, or replacement. Industry.", "v": 5}, {"id": 4464, "domain": 2, "task": 4, "topic": "FE for Old Roof", "q": "A roof showing end-of-life signs (granule loss, curling, brittleness) warrants:", "choices": ["Acceptance as fine until visible leakage occurs", "Repair by the home inspector during inspection", "Recommend roofer evaluation; plan for replacement", "Diagnosis of exact remaining lifespan in years"], "correct": 2, "exp": "End-of-life roof: recommend roofer eval/quote, plan replacement. Don't predict exact lifespan. Industry.", "v": 5}, {"id": 4465, "domain": 2, "task": 4, "topic": "FE for K&T", "q": "Active knob-and-tube wiring discovered in an older home warrants:", "choices": ["Acceptance as adequate for modern household loads", "Recommendation for licensed electrician evaluation", "Diagnosis as definitively safe by the inspector", "Cover with insulation to improve thermal performance"], "correct": 1, "exp": "Active K&T: electrician eval. Insulation contact, capacity, brittle insulation, no ground - multiple concerns. Industry.", "v": 5}, {"id": 4466, "domain": 2, "task": 4, "topic": "FE for Aluminum Wiring", "q": "Solid aluminum branch circuit wiring (1965\u20131973) warrants:", "choices": ["Termination repair by the home inspector personally", "Acceptance as safe for modern household loads", "Diagnosis as no different than copper wiring", "Recommend electrician evaluation/remediation"], "correct": 3, "exp": "Al wiring: electrician eval, remediation (COPALUM, AlumiConn). Terminations need attention. Fire risk. Industry.", "v": 5}, {"id": 4467, "domain": 2, "task": 4, "topic": "FE for Sewer", "q": "Major drain backup or slow drainage at multiple fixtures warrants:", "choices": ["Drain cleaner application by the home inspector", "Acceptance as normal for older home plumbing", "Recommendation for sewer scope and licensed plumber", "Diagnosis as cosmetic only (no specialist needed)"], "correct": 2, "exp": "Multiple slow drains: possible main line issue. Sewer scope + plumber. Critical Milwaukee (cast iron, root intrusion). Industry.", "v": 5}, {"id": 4468, "domain": 2, "task": 4, "topic": "FE for Sloped Floor", "q": "Significantly sloped floors observed during inspection warrant:", "choices": ["Repair by the home inspector during inspection", "Recommend structural inspection (engineer required)", "Diagnosis as definitively settling by the inspector", "Acceptance as cosmetic only without further action"], "correct": 1, "exp": "Significantly sloped floors: structural eval. Decay, settled supports, undersized framing - need expert eval. Industry.", "v": 5}, {"id": 4469, "domain": 2, "task": 4, "topic": "FE Communication", "q": "When recommending further evaluation, the inspector should:", "choices": ["Recommend the inspector return for additional inspection", "Simply note 'further evaluation needed' with no detail", "Who (specialist), why (concern), outcome", "Avoid further evaluation (HI is comprehensive)"], "correct": 2, "exp": "FE format: WHO (electrician, engineer), WHY (concer
