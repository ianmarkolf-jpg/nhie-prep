ler:", "choices": ["Disclose to client and potentially decline", "Accept gift from seller", "Discount the inspection", "Proceed without disclosure"], "correct": 0, "exp": "Prior relationship with seller: disclose. Significant (family, business partner): decline. Minor (passing acquaintance): often okay with disclosure. Client decides if relationship material.", "v": 5}, {"id": 5303, "domain": 3, "task": 2, "topic": "Self-Promotion", "q": "Inspector self-promotion should:", "choices": ["All of the above", "Make truthful claims about credentials", "Cite verifiable training and experience", "Avoid disparaging competitors"], "correct": 0, "exp": "Self-promotion: truthful, verifiable, professional. No disparaging competitors. No false guarantees ('We catch everything!'). Maintain dignity.", "v": 5}, {"id": 5304, "domain": 3, "task": 2, "topic": "Customer Complaints", "q": "Handling customer complaints includes:", "choices": ["All of the above", "Possible re-inspection", "Investigation of the alleged issue", "Documentation of communication"], "correct": 0, "exp": "Complaint handling: take seriously, investigate, document, respond timely, possibly re-inspect, possibly settle. Insurance carrier notification for significant claims. Pattern of complaints can affect license.", "v": 5}, {"id": 5305, "domain": 3, "task": 2, "topic": "Re-Inspection", "q": "Re-inspection of an alleged missed defect:", "choices": ["Required by some pre-inspection agreements before claim", "Inspector right to verify before paying", "All of the above", "Useful for inspector education"], "correct": 2, "exp": "Re-inspection: agreement may require notice/opportunity to verify before claim payment. Inspector can verify finding, document, possibly identify why missed (or that wasn't reasonably visible). Educational regardless.", "v": 5}, {"id": 5306, "domain": 3, "task": 2, "topic": "Continuing Competence", "q": "Maintaining competence requires:", "choices": ["Networking with peers", "All of the above", "Continuing education", "Reading current code/standards"], "correct": 1, "exp": "Competence: CE hours, code/standards updates, peer interaction, real-world experience, mentoring. Inspector can't 'learn the job once.' Profession evolves.", "v": 5}, {"id": 5307, "domain": 3, "task": 2, "topic": "Photographing People", "q": "When photographing in occupied homes:", "choices": ["Avoid identifiable family items", "Avoid personal documents and valuables", "All of the above", "Avoid people, especially children"], "correct": 2, "exp": "Photo etiquette: people (especially children), personal documents, valuables, family identification - avoid. Necessary photos may include defective fixtures, missed flooring areas. Focus on inspection, respect privacy.", "v": 5}, {"id": 5308, "domain": 3, "task": 2, "topic": "Confidentiality", "q": "Inspector confidentiality includes:", "choices": ["All of the above", "Client information", "Communications", "Inspection findings"], "correct": 0, "exp": "Inspector confidentiality: client info (contact, finance, etc.), findings (until report to client), communications. Don't share with seller, listing agent, anyone without authorization.", "v": 5}, {"id": 5309, "domain": 3, "task": 2, "topic": "Report Errors", "q": "If inspector discovers significant report error after delivery:", "choices": ["Issue corrected report promptly", "All of the above", "Document timeline", "Inform client of error"], "correct": 1, "exp": "Report error: prompt corrected version, transparent communication with client, document timeline. Honest acknowledgment of error preserves trust. Most buyers appreciate transparency.", "v": 5}, {"id": 5310, "domain": 3, "task": 2, "topic": "Client Education", "q": "Educating clients during inspection:", "choices": ["All of the above", "Should remain within inspection scope (not legal/financial advice)", "Builds value and understanding", "Important value-add"], "correct": 0, "exp": "Client education: real value-add. Stay in lane (inspection topics, not real estate advice, not legal/financial advice, not negotiation strategy). Show systems, explain findings, maintenance tips.", "v": 5}, {"id": 5311, "domain": 3, "task": 2, "topic": "Stay In Scope", "q": "Inspector should NOT provide:", "choices": ["Legal advice", "All of the above", "Real estate advice (whether to buy)", "Financial advice"], "correct": 1, "exp": "Stay in lane: don't provide real estate, legal, or financial advice. Refer to qualified professionals (real estate agent, attorney, financial advisor). Inspector's expertise: building condition, not transaction strategy.", "v": 5}, {"id": 5312, "domain": 3, "task": 2, "topic": "Liability Reducers", "q": "Practices that reduce inspector liability include:", "choices": ["Thorough documentation with photos", "All of the above", "Honest reporting", "Detailed pre-inspection agreement"], "correct": 1, "exp": "Liability reducers: written agreement, documentation (photos, notes), honest reporting (disclose limitations, recommend qualified evaluation), professional behavior, ongoing training, insurance.", "v": 5}, {"id": 5313, "domain": 3, "task": 2, "topic": "Inspector Insurance", "q": "Inspector insurance typically includes:", "choices": ["All of the above", "E&O (Errors & Omissions)", "General Liability (GL)", "Sometimes commercial auto"], "correct": 0, "exp": "Inspector insurance: E&O (work product), GL (bodily injury/property damage), business auto (if vehicle for business), workers comp (if employees), cyber/data breach insurance increasingly common.", "v": 5}, {"id": 5314, "domain": 3, "task": 2, "topic": "Reporting Standard", "q": "All findings should be:", "choices": ["Modified to keep deal together", "Reported regardless of impact on sale", "Hidden from non-paying parties", "Discussed with seller first"], "correct": 1, "exp": "Honest, complete reporting: client paid for objective evaluation. Sale impact not inspector's concern. Modifying for sale impact: ethics violation, professional liability, fraud potential.", "v": 5}, {"id": 5315, "domain": 3, "task": 2, "topic": "Privacy Sensitivity", "q": "Inspectors should be sensitive to:", "choices": ["All of the above", "Religious customs (timing of access)", "Cultural differences (e.g., shoes off in some homes)", "Privacy of occupants"], "correct": 0, "exp": "Cultural and privacy sensitivity: shoes off (request from occupant), Sabbath/holiday timing, occupants present and need notice, language barriers. Professional adaptability important.", "v": 5}, {"id": 5316, "domain": 3, "task": 2, "topic": "Maintain Records", "q": "Inspector record retention:", "choices": ["Per state requirements, often 5-10 years", "Indefinitely", "Until next inspection", "No requirement"], "correct": 0, "exp": "Record retention: typically 5-10 years per state regulations. Reports, photos, communications. Insurance claims may require records, statute of limitations varies. Backed up digitally.", "v": 5}, {"id": 5317, "domain": 3, "task": 2, "topic": "Code of Ethics", "q": "An inspector code of ethics typically requires:", "choices": ["Independence and objectivity", "Confidentiality", "Professional behavior", "All of the above"], "correct": 3, "exp": "Code of ethics: independence, objectivity, confidentiality, professional behavior, no conflicts of interest, honest marketing, continuing competence. Codes from InterNACHI, ASHI, state regulations - largely overlapping.", "v": 5}, {"id": 5318, "domain": 1, "task": 7, "topic": "Category I Vent Temp", "q": "Category I gas appliance vent gas temperature is approximately:", "choices": ["140°F", "800°F", "100°F", "300°F"], "correct": 3, "exp": "Category I appliance vent gas: ~300°F. Hot enough to rise via stack effect through Type B vent, masonry chimney, or single-wall vent. Examples: low/medium efficiency furnaces, draft-hood water heaters.", "v": 5}, {"id": 5319, "domain": 1, "task": 7, "topic": "Category IV Vent Temp", "q": "Category IV (high-efficiency condensing) gas appliance vent gas temperature is approximately:", "choices": ["140°F", "Below 32°F", "300°F", "600°F"], "correct": 0, "exp": "Category IV vent gas: ~140°F (rather cool). Heat exchangers extract 90%+ of combustion heat. Vent gas so cool it must be exhausted under positive pressure through plastic pipe. Condensation in the vent is a defining characteristic.", "v": 5}, {"id": 5320, "domain": 1, "task": 7, "topic": "Category IV Vent Material", "q": "Category IV (high-efficiency condensing) appliances typically vent through:", "choices": ["PVC plastic pipe", "Single-wall metal vent", "Type B metal vent", "Masonry chimney"], "correct": 0, "exp": "Per Vol 1: Category IV appliances use plastic pipe (usually PVC) as the vent because gas temperature is so low. Vents must handle positive pressure and acidic condensate. Type B and masonry are for Category I.", "v": 5}, {"id": 5321, "domain": 1, "task": 7, "topic": "Heat Exchanger Visibility", "q": "In an induced draft Category I furnace, the heat exchanger is:", "choices": ["Always visible", "Visible only from the top", "Rarely visible to the inspector", "Fully visible from the access panel"], "correct": 2, "exp": "Per Vol 1: heat exchanger is rarely visible in induced draft furnaces. About 20% may be visible in older draft-hood furnaces. Inspectors should report whether or not it was visible and inspected. Crack detection often requires camera/dye testing by HVAC tech.", "v": 5}, {"id": 5322, "domain": 1, "task": 7, "topic": "Single-Stage Gas Valve", "q": "An older single-stage gas valve allows gas to flow at:", "choices": ["One rate (full on or off)", "Variable rate", "Three rates", "Two rates"], "correct": 0, "exp": "Single-stage gas valves: one flow rate (on/off). Two-stage valves: high and low fire. Modulating valves: variable flow. Newer furnaces use multi-stage or modulating valves matched with variable-speed ECM blowers for higher efficiency.", "v": 5}, {"id": 5323, "domain": 1, "task": 7, "topic": "Flame Color", "q": "A properly burning gas flame should appear:", "choices": ["Green", "Yellow or orange", "Bright white", "Blue, sometimes with a slight yellow tip"], "correct": 3, "exp": "Per Vol 1: properly burning gas flame is BLUE, sometimes with slight yellow tip. Yellow or orange flame is a reportable defect - indicates improperly adjusted burner, gas valve issue, or inadequate combustion air.", "v": 5}, {"id": 5324, "domain": 1, "task": 7, "topic": "Flickering Flame", "q": "A flame that flickers or distorts after the fan activates can indicate:", "choices": ["Normal operation", "A possible cracked heat exchanger", "Standard fan operation", "Excessive combustion air"], "correct": 1, "exp": "Per Vol 1: a flickering or distorted flame after fan activation could indicate a cracked heat exchanger - air movement disturbing combustion. Reportable defect. More easily visible with ribbon burners than inshot burners.", "v": 5}, {"id": 5325, "domain": 1, "task": 7, "topic": "Garage Furnace Elevation", "q": "A gas furnace installed in a garage must have its ignition source elevated at least:", "choices": ["36 inches", "6 inches", "12 inches", "18 inches above the floor"], "correct": 3, "exp": "Per Vol 1 / IRC 2018 M1307.3: ignition source elevated at least 18 inches above garage floor. Prevents ignition of gasoline vapors that pool at floor level. Same applies to water heaters in garages.", "v": 5}, {"id": 5326, "domain": 1, "task": 7, "topic": "Combustion Air Standard Method", "q": "Drawing combustion air from the same room (Standard Method) requires at least:", "choices": ["Any volume", "50 cubic feet per 1,000 Btu/h input", "100 cubic feet per 1,000 Btu/h input", "10 cubic feet per 1,000 Btu/h input"], "correct": 1, "exp": "Per Vol 1 / IRC G2407: Standard Method requires at least 50 cubic feet of room volume per 1,000 Btu/h of appliance input. A 100,000 Btu/h furnace needs 5,000 cubic feet (a typical living area).", "v": 5}, {"id": 5327, "domain": 1, "task": 7, "topic": "Outside Combustion Air Vertical Duct", "q": "For combustion air drawn from outside through vertical ducts, net free opening area is at least:", "choices": ["1 sq inch per 4,000 Btu/h", "1 sq inch per 10,000 Btu/h", "No requirement", "1 sq inch per 1,000 Btu/h"], "correct": 0, "exp": "Per Vol 1: outside combustion air via two openings or vertical ducts requires 1 sq inch per 4,000 Btu/h. Horizontal ducts: 1 sq inch per 2,000 Btu/h (more area required because horizontal flow is harder).", "v": 5}, {"id": 5328, "domain": 1, "task": 7, "topic": "Combustion Air Horizontal Duct", "q": "Combustion air horizontal ducts to outside require net free area of:", "choices": ["1 sq inch per 4,000 Btu/h", "1 sq inch per 10,000 Btu/h", "1 sq inch per 2,000 Btu/h", "1 sq inch per 1,000 Btu/h"], "correct": 2, "exp": "Per Vol 1: horizontal combustion air ducts: 1 sq inch per 2,000 Btu/h. More area required than vertical because horizontal ducts have more friction loss. Vertical ducts: 1 sq inch per 4,000 Btu/h.", "v": 5}, {"id": 5329, "domain": 1, "task": 7, "topic": "Single Combustion Air Opening", "q": "If combustion air comes from outside via a single opening within 12 inches of the ceiling, area is at least:", "choices": ["1 sq inch per 1,000 Btu/h", "No standard exists", "1 sq inch per 5,000 Btu/h", "1 sq inch per 3,000 Btu/h"], "correct": 3, "exp": "Per Vol 1: single combustion air opening near ceiling requires 1 sq inch per 3,000 Btu/h for gas appliances. Different ratios apply for two-opening, single-opening high/low, vertical/horizontal duct configurations.", "v": 5}, {"id": 5330, "domain": 1, "task": 7, "topic": "Combustion Air Duct Min Dimension", "q": "The minimum dimension of a combustion air opening or duct is:", "choices": ["2 inches", "3.5 inches", "6 inches", "1 inch"], "correct": 1, "exp": "Per Vol 1: minimum dimension for combustion air openings and ducts is 3.5 inches. Smaller dimensions don't provide adequate airflow. Net free area accounts for screens (reduce 25% for wood louvers, 75% for metal).", "v": 5}, {"id": 5331, "domain": 1, "task": 7, "topic": "Wood Louver NFA", "q": "An opening with wood louvers is assumed to have what net free area?", "choices": ["50%", "100%", "25%", "75%"], "correct": 2, "exp": "Per Vol 1: wood louvers are assumed to provide 25% net free area (they significantly obstruct airflow). Metal louvers: 75% net free area (less obstruction). Account for screen/louver reduction when sizing combustion air openings.", "v": 5}, {"id": 5332, "domain": 1, "task": 7, "topic": "Metal Louver NFA", "q": "An opening with metal louvers is assumed to have what net free area?", "choices": ["75%", "100%", "25%", "50%"], "correct": 0, "exp": "Per Vol 1: metal louvers are assumed to provide 75% net free area. Wood louvers: 25%. The reduction must be accounted for when sizing combustion air openings - actual air-passing area is less than the gross opening.", "v": 5}, {"id": 5333, "domain": 1, "task": 7, "topic": "Single Duct One Opening", "q": "Combustion air ducts should have:", "choices": ["Multiple openings to serve multiple rooms", "Only one opening (cannot serve as both upper and lower)", "Three openings minimum", "No specific requirements"], "correct": 1, "exp": "Per Vol 1: combustion air ducts must have only ONE opening. The same duct cannot serve as upper and lower duct, and one duct cannot open into different rooms. Each duct serves one purpose, one location.", "v": 5}, {"id": 5334, "domain": 1, "task": 7, "topic": "Prohibited Appliance Locations", "q": "Gas-burning appliances should NOT be located in:", "choices": ["Mechanical rooms", "A bathroom or bedroom (with exceptions)", "Attics", "Basements"], "correct": 1, "exp": "Per Vol 1 / IRC G2406: gas/oil appliances should not be in bedrooms, bathrooms, closets, or spaces opening only into these. Exceptions: direct-vent appliances (sealed combustion from outside) and certain weather-stripped configurations.", "v": 5}, {"id": 5335, "domain": 1, "task": 7, "topic": "Boiler Operating Pressure", "q": "Normal operating pressure for a residential hot water boiler is typically:", "choices": ["12-25 psi", "100 psi", "60 psi", "5-10 psi"], "correct": 0, "exp": "Hot water boiler operates at 12-25 psi typically. PRV trips at 30 psi if expansion tank fails or system over-fills. Pressure rises as water heats - expansion tank accommodates. Common defect: waterlogged expansion tank causing PRV discharge.", "v": 5}, {"id": 5336, "domain": 1, "task": 7, "topic": "Gravity Furnace", "q": "A gravity warm-air furnace:", "choices": ["Has the largest blower of any furnace type", "Has no blower; relies on natural convection", "Uses no fuel", "Is the modern standard"], "correct": 1, "exp": "Per Vol 1: gravity systems are 'relics of the late 1800s and early 1900s' - no fan and no filter. Heated air rises by convection (less dense). Very inefficient, uneven heating. Most have been replaced; some converted with retrofit blowers.", "v": 5}, {"id": 5337, "domain": 1, "task": 7, "topic": "Heat Pump Below Outdoor Temp", "q": "A heat pump or AC compressor should not be operated in cooling mode if outdoor temps have been below approximately:", "choices": ["60°F for 24 hours", "32°F for 24 hours", "70°F for any time", "45°F for 12 hours"], "correct": 0, "exp": "Standard rule: don't operate cooling if outdoor temps were below ~60°F for 24 hours. Risk: oil migration in compressor, slugging on startup. Disclaim cooling test in cold weather; document and recommend re-evaluation.", "v": 5}, {"id": 5338, "domain": 1, "task": 7, "topic": "Manual J", "q": "ACCA Manual J is used to:", "choices": ["Determine equipment installation cost", "Specify insulation R-values", "Calculate sensible heating and cooling loads for the house", "Size electrical service"], "correct": 2, "exp": "Per Vol 1: Manual J calculates sensible heating loads (and cooling) for a house based on geographic location, orientation, insulation, windows, infiltration. Manual S then determines equipment capacity. Software-driven now. Inspectors not required to perform.", "v": 5}, {"id": 5339, "domain": 1, "task": 7, "topic": "Required Heating Temperature", "q": "A heating system should be capable of maintaining what minimum temperature in habitable space?", "choices": ["60°F", "72°F", "68°F", "65°F"], "correct": 2, "exp": "Per Vol 1: heating system should maintain at least 68°F in every habitable space. Measured 3 feet above floor and 2 feet from exterior wall. Bathrooms, laundry, and closets are NOT habitable - heat source not required there.", "v": 5}, {"id": 5340, "domain": 1, "task": 7, "topic": "Habitable Space", "q": "Spaces that are NOT considered habitable for heating purposes include:", "choices": ["Bathroom (and laundry, closets)", "Living room", "Kitchen", "Bedroom"], "correct": 0, "exp": "Per Vol 1: bathrooms, laundry rooms, and closets are NOT habitable spaces. Heat source not required there. Habitable: living, dining, bedroom, kitchen, family rooms - require 68°F heating capacity.", "v": 5}, {"id": 5341, "domain": 1, "task": 7, "topic": "Inspection in Hot Weather", "q": "Some inspectors will not operate the heating system if outdoor temp is above:", "choices": ["80-90°F", "65°F", "50°F", "100°F"], "correct": 0, "exp": "Per Vol 1: many inspectors won't operate heat above 80-90°F. Concern is potential damage. Modern furnaces have high-limit safety switches that should prevent damage. Some have temperature lockouts. Note in report if not operated and why.", "v": 5}, {"id": 5342, "domain": 1, "task": 9, "topic": "ERV vs HRV Climate", "q": "An ERV is typically preferred over an HRV in:", "choices": ["Cold and dry climates", "Humid or mixed climates", "Tropical climates only", "Arctic climates only"], "correct": 1, "exp": "ERV: humid or mixed climates - the moisture transfer keeps incoming humid air's moisture in or excess interior moisture out. HRV: cold/dry climates - moisture transfer not needed, just heat. Wisconsin's mixed humid climate could justify either.", "v": 5}, {"id": 5343, "domain": 1, "task": 9, "topic": "Range Hood Standard", "q": "The most common residential range hood is approximately:", "choices": ["60 inches wide, 50 cfm", "30 inches wide, 100 cfm exhaust capacity", "48 inches wide, 1,000 cfm", "12 inches wide, 30 cfm"], "correct": 1, "exp": "Per Vol 1: most common range hood is 30 inches wide with 100 cfm exhaust capacity. Larger and more powerful hoods are available. Larger hoods (over 400 cfm) trigger makeup air requirements.", "v": 5}, {"id": 5344, "domain": 1, "task": 9, "topic": "Range Hood Makeup Air", "q": "A range hood with capacity exceeding what threshold should have makeup air?", "choices": ["200 cfm", "100 cfm", "1,000 cfm", "400 cfm"], "correct": 3, "exp": "Per Vol 1 (and IRC): range hoods exceeding 400 cfm should be provided with a source of makeup air. Without it, hood depressurizes the home, causing backdraft of fuel-burning appliances and chimneys.", "v": 5}, {"id": 5345, "domain": 1, "task": 9, "topic": "Range Hood Duct Material", "q": "Range hood exhaust ducts should be:", "choices": ["Plastic flexible", "Cardboard", "Metal (galvanized steel or copper)", "Fabric"], "correct": 2, "exp": "Per Vol 1: exhaust duct material should be metal - usually galvanized steel or copper. Schedule 40 PVC or ABS may be used for downdraft units installed in concrete slab. Plastic flexible is a defect.", "v": 5}, {"id": 5346, "domain": 1, "task": 9, "topic": "Range Hood Termination Inside", "q": "A range hood exhaust duct terminating inside the attic or crawl space is:", "choices": ["A defect (must terminate outdoors)", "Acceptable", "Required by some codes", "Common in older homes"], "correct": 0, "exp": "Per Vol 1: exhaust duct should run to OUTDOORS, not into the attic or crawl space. Indoor termination dumps moisture and grease into structure - moisture and fire hazards. Always exterior termination via wall, soffit (if rated), or roof.", "v": 5}, {"id": 5347, "domain": 1, "task": 9, "topic": "Range Hood Damper", "q": "A range hood exterior termination should have:", "choices": ["No damper", "A damper that moves freely", "A check valve only", "A permanently sealed cap"], "correct": 1, "exp": "Per Vol 1: exterior termination fitting should have a damper that moves freely. Damper opens during operation, closes when off (preventing backdraft of cold air, pests, weather). Stuck shut = system can't exhaust.", "v": 5}, {"id": 5348, "domain": 1, "task": 9, "topic": "Range Hood Termination Size", "q": "A range hood exterior termination opening smaller than approximately what diameter may be too small?", "choices": ["4 inches", "2 inches", "6 inches", "12 inches"], "correct": 2, "exp": "Per Vol 1: termination opening smaller than about 6 inches diameter (or equivalent rectangle area) might be too small. Restriction reduces flow, causes backdraft. Match to fan capacity.", "v": 5}, {"id": 5349, "domain": 1, "task": 9, "topic": "Microwave Above Cooktop", "q": "Some manufacturers recommend at least how much distance between cooktop and over-the-range microwave?", "choices": ["20 inches", "30 inches", "48 inches", "12 inches"], "correct": 1, "exp": "Per Vol 1: some manufacturers recommend at least 30 inches between cooktop and the kitchen cabinet (which is where over-the-range microwaves install). Some recommend at least 66 inches between floor and top of microwave.", "v": 5}, {"id": 5350, "domain": 1, "task": 9, "topic": "Microwave to Floor", "q": "Some manufacturers recommend at least how much distance between the floor and the top of an over-the-range microwave?", "choices": ["60 inches", "66 inches", "84 inches", "72 inches"], "correct": 1, "exp": "Per Vol 1: some manufacturers recommend at least 66 inches floor-to-microwave-top. This affects accessibility and use. Smaller distances reduce safety and convenience.", "v": 5}, {"id": 5351, "domain": 1, "task": 9, "topic": "Range Hood No Duct", "q": "A range hood that's blowing into a wall cavity without a duct:", "choices": ["Is acceptable", "Required for backdraft prevention", "Is a defect (no proper exhaust path)", "Improves circulation"], "correct": 2, "exp": "Per Vol 1: removing filters and trying to see the exhaust duct - sometimes the fan is blowing into the wall cavity without a duct. Major defect. Moisture and grease accumulate in wall cavity. Defective installation.", "v": 5}, {"id": 5352, "domain": 1, "task": 9, "topic": "Microwave Plug-and-Cord", "q": "Microwave plug-and-cord cables:", "choices": ["May pass through walls/floors", "Have no restrictions", "May NOT pass through walls, floors, and ceilings", "Must always be hardwired"], "correct": 2, "exp": "Per Vol 1: plug-and-cord cables may not pass through walls, floors, and ceilings. If a microwave is connected and the kitchen receptacle is GFCI tested, microwave should NOT shut off (would indicate it's on shared kitchen circuit, which is a defect).", "v": 5}, {"id": 5353, "domain": 1, "task": 9, "topic": "Bath Fan Min CFM", "q": "A bathroom exhaust fan must move at minimum:", "choices": ["100 CFM continuous", "20 CFM continuous OR 50 CFM intermittent", "5 CFM continuous", "200 CFM"], "correct": 1, "exp": "Per IRC: bath exhaust 20 CFM continuous OR 50 CFM intermittent. Many newer codes increased to 80-100 CFM. Sized for room volume and use.", "v": 5}, {"id": 5354, "domain": 1, "task": 9, "topic": "Bath Fan Discharge", "q": "Bathroom exhaust fans must discharge:", "choices": ["Into the crawl space", "Into another bathroom", "To the exterior of the building", "Into the attic"], "correct": 2, "exp": "Bath fans must discharge to the exterior - through a wall, gable, soffit (if rated), or roof. Discharge into attic or crawl is a defect: dumps humid air into a cold space, causing condensation, mold, frost on roof sheathing.", "v": 5}, {"id": 5355, "domain": 1, "task": 9, "topic": "Dryer Vent Material", "q": "Dryer exhaust ducts should be:", "choices": ["Plastic flexible", "Vinyl flexible", "Cardboard", "Rigid or semi-rigid metal"], "correct": 3, "exp": "Dryer venting: rigid or semi-rigid metal only. Plastic flexible (vinyl) is a fire hazard - lint accumulates and ignites. Even foil-faced flex is suboptimal; smooth rigid metal is best.", "v": 5}, {"id": 5356, "domain": 1, "task": 9, "topic": "Dryer Vent Maximum Length", "q": "Maximum dryer vent length is typically:", "choices": ["50 feet", "Unlimited", "25 feet (reduced for elbows)", "10 feet"], "correct": 2, "exp": "Standard: 25 feet straight rigid metal duct. Reduce for elbows: 90-degree = -5 ft, 45-degree = -2.5 ft. Booster fans available for longer runs but require maintenance. Path of least bends is best.", "v": 5}, {"id": 5357, "domain": 1, "task": 9, "topic": "Dryer Vent 90 Elbow", "q": "Each 90-degree elbow in a dryer vent reduces allowable vent length by approximately:", "choices": ["10 feet", "2.5 feet", "5 feet", "1 foot"], "correct": 2, "exp": "Standard rule: 90-degree elbow = 5 feet equivalent length. 45-degree elbow = 2.5 feet. Total system stays within manufacturer maximum (typically 25 ft equivalent). Shorter, straighter runs are better.", "v": 5}, {"id": 5358, "domain": 1, "task": 9, "topic": "Dryer Vent Termination", "q": "Dryer vents must terminate:", "choices": ["Outside the building, with backdraft damper", "In the crawl", "In the laundry room", "In the attic"], "correct": 0, "exp": "Dryer vents terminate to OUTSIDE - wall, roof - with backdraft damper. Damper keeps cold air, pests, weather out when not running. NEVER inside (attic, crawl, garage, basement). Lint and moisture damage accumulate.", "v": 5}, {"id": 5359, "domain": 1, "task": 9, "topic": "Dryer Booster Fan", "q": "A dryer booster fan:", "choices": ["Requires regular maintenance", "Allows long vent runs to exceed standard length", "Increases dryer airflow", "All of the above"], "correct": 3, "exp": "Booster fans: extend allowable run length, but require regular cleaning (lint), proper interlocking with dryer operation. Many techs prefer optimizing run length rather than relying on boosters.", "v": 5}, {"id": 5360, "domain": 1, "task": 9, "topic": "Dryer Termination Distance", "q": "Dryer vent terminations should be located what distance from openings (windows, etc.)?", "choices": ["6 feet", "1 foot", "No requirement", "3 feet"], "correct": 3, "exp": "Per typical IRC and manufacturer specs: dryer vent termination at least 3 feet from any opening (window, door, fresh-air intake). Prevents lint, moisture, and exhaust from re-entering.", "v": 5}, {"id": 5361, "domain": 1, "task": 9, "topic": "Tight Home Ventilation", "q": "Tight, well-air-sealed homes require:", "choices": ["Permanent open windows", "Less ventilation than older leaky homes", "More mechanical ventilation than older homes", "No ventilation"], "correct": 2, "exp": "Build tight, ventilate right: tight construction = less infiltration = less natural ventilation. Mechanical ventilation (HRV, ERV, exhaust-only) becomes essential. ASHRAE 62.2 sets ventilation rates.", "v": 5}, {"id": 5362, "domain": 1, "task": 9, "topic": "HRV/ERV Imbalance", "q": "An HRV or ERV operating with significantly imbalanced flow can:", "choices": ["Eliminate need for filters", "Have no effect", "Pressurize or depressurize the building", "Improve performance"], "correct": 2, "exp": "Imbalanced flow defeats the purpose: more exhaust than supply depressurizes (causing backdraft of fuel-burners, drawing radon/soil gas, drawing moisture from below grade). More supply than exhaust pressurizes (driving moisture into walls). Should be commissioned/balanced at install.", "v": 5}, {"id": 5363, "domain": 1, "task": 9, "topic": "Kitchen Hood Sizing Method", "q": "Range hood sizing should consider:", "choices": ["Cooking surface coverage", "All of the above", "Cooking style (gas, induction, electric)", "Use intensity"], "correct": 1, "exp": "Hood sizing factors: coverage of cooking surface (cover all burners, often hood width = surface width or wider), cooking style (gas needs more), use intensity (frequent cooking), code thresholds (makeup air over 400 cfm). Standard rule: 100 cfm per linear foot of cooking surface (gas: more).", "v": 5}, {"id": 5364, "domain": 1, "task": 9, "topic": "Bath Fan Sized", "q": "Standard bath fan sizing methods include:", "choices": ["1 CFM per square foot of bath area (50 CFM minimum)", "8 air changes per hour", "Either method", "Sized only by visual inspection"], "correct": 2, "exp": "Sizing: 1 CFM per sq ft (50 CFM min), or 8 air changes/hour for the room. Either method acceptable. Larger or moisture-heavy baths may need higher capacity. ASHRAE 62.2 references these methods.", "v": 5}, {"id": 5365, "domain": 1, "task": 9, "topic": "Bath Fan Switch", "q": "Best practice for bath fan operation:", "choices": ["Always off", "Run during shower and 20-30 minutes after", "Continuous operation", "Disconnect from power"], "correct": 1, "exp": "Run during shower and 20-30 minutes after to clear humidity. Timer switches automate. In tight homes, may run longer or be replaced by whole-house strategy. Humidistats adjust automatically.", "v": 5}, {"id": 5366, "domain": 1, "task": 9, "topic": "Single Side-Wall Hood Defect", "q": "If a microwave hood vents directly out the back wall and you remove the filter, the wall cavity is visible and there's no duct:", "choices": ["Code required", "Acceptable for short runs", "Defect - exhaust into wall cavity", "Standard installation"], "correct": 2, "exp": "Per Vol 1: removing filters and looking at exhaust duct - sometimes the fan is blowing into the wall cavity without a duct. This is a defect. Major defect: moisture and grease accumulate in cavity, fire hazard.", "v": 5}, {"id": 5367, "domain": 1, "task": 9, "topic": "Recirc Hood Filtration", "q": "Recirculating range hoods filter air using:", "choices": ["UV light", "Charcoal/carbon and grease filters", "Electrostatic", "Catalytic converters"], "correct": 1, "exp": "Recirculating hoods: charcoal/carbon (odors) and grease filters. Need regular replacement. Less effective than vented hoods. Adequate for light cooking, inadequate for high-output, high-grease, high-moisture cooking.", "v": 5}, {"id": 5368, "domain": 1, "task": 9, "topic": "Heat Recovery Efficiency", "q": "Modern HRVs typically recover what percentage of heat from exhaust air?", "choices": ["99%", "60-85%", "10-20%", "100% impossible"], "correct": 1, "exp": "Modern HRVs typically recover 60-85% of heat from exhaust air. Higher-end units approach 90%. Older units lower. Combined with ventilation rate, can reduce energy penalty of fresh air introduction significantly.", "v": 5}, {"id": 5369, "domain": 1, "task": 10, "topic": "TPR Set Point", "q": "TPR (temperature/pressure relief) valves on water heaters are set to release at:", "choices": ["75 psi or 200°F", "150 psi or 210°F", "100 psi or 180°F", "30 psi or 150°F"], "correct": 1, "exp": "Per Vol 1 Ch 4: TPR valves set at 150 psi or 210°F (whichever first). Modern relief valves almost always have 3/4 inch diameter outlet. Set point preserves both pressure safety and prevents catastrophic temperature events.", "v": 5}, {"id": 5370, "domain": 1, "task": 10, "topic": "TPR Sensor Location", "q": "The TPR valve sensor must be within how far of the top of the water heater tank?", "choices": ["Anywhere on the tank", "First 18 inches", "First 12 inches", "First 6 inches from the top"], "correct": 3, "exp": "Per Vol 1: TPR sensor must be within first 6 inches from top of tank to sense temperature correctly. Fittings between TPR and tank should not prevent this. Extra-long sensor valves available but hard to identify visually.", "v": 5}, {"id": 5371, "domain": 1, "task": 10, "topic": "TPR Discharge Material", "q": "Acceptable materials for the TPR discharge pipe include:", "choices": ["PVC", "Copper, CPVC, PEX (rated for hot water)", "Galvanized steel only", "Any plastic"], "correct": 1, "exp": "Per Vol 1: TPR discharge pipe must be hot-water rated - copper, CPVC, PEX. Most PVC may NOT be used (low temp rating). Includes manufactured homes. Common defect: PVC on water heaters.", "v": 5}, {"id": 5372, "domain": 1, "task": 10, "topic": "TPR Discharge Diameter", "q": "The TPR discharge pipe diameter requirement is:", "choices": ["Smaller than the TPR valve outlet", "Always 1/2 inch", "Always 1 inch", "The same diameter as the TPR valve outlet"], "correct": 3, "exp": "Per Vol 1: discharge pipe must be SAME diameter as TPR valve opening. 3/4 inch flexible water connectors NOT acceptable - they're not full 3/4 inch. Smaller diameter restricts flow during emergency discharge.", "v": 5}, {"id": 5373, "domain": 1, "task": 10, "topic": "TPR Pipe Slope", "q": "The TPR discharge pipe should slope:", "choices": ["No slope required", "Down toward the discharge point", "Be horizontal", "Up toward the source"], "correct": 1, "exp": "Per Vol 1: discharge pipe slopes DOWN toward the discharge point. Slow leaks (common TPR failure) drain to discharge - if pipe slopes up, leak is trapped, hidden, water damage results.", "v": 5}, {"id": 5374, "domain": 1, "task": 10, "topic": "TPR Pipe Tee", "q": "TPR discharge pipes should:", "choices": ["Serve multiple appliances", "Serve only ONE TPR valve, no tee fittings", "Have shut-off valves", "Have multiple tees"], "correct": 1, "exp": "Per Vol 1: TPR discharge pipe serves ONE TPR valve only. NO tee fittings. NO valves. Each water heater has dedicated discharge. Sharing or valving creates failure points and code violations.", "v": 5}, {"id": 5375, "domain": 1, "task": 10, "topic": "TPR Horizontal Termination", "q": "A TPR discharge pipe terminating horizontally should end with:", "choices": ["An upward elbow", "A 90-degree elbow pointed DOWN", "A cap", "Open horizontal end"], "correct": 1, "exp": "Per Vol 1: horizontal pipe terminates in 90-degree elbow pointed DOWN. Reduces injury chance if TPR opens (very hot water/steam). Pointed up: dangerous spray. Pointed down: contained discharge.", "v": 5}, {"id": 5376, "domain": 1, "task": 10, "topic": "Polybutylene Color", "q": "Polybutylene piping is identified by what color?", "choices": ["Yellowish", "White", "Bluish-gray (sometimes black)", "Red"], "correct": 2, "exp": "Polybutylene (PB): bluish-gray, sometimes black. Used 1970s-90s. No longer permissible. Common chlorine in water causes microfractures and catastrophic failure. Class action settlements largely depleted; replacement is owner's responsibility.", "v": 5}, {"id": 5377, "domain": 1, "task": 10, "topic": "Copper Type K", "q": "Type K copper tubing is identified by what color marking?", "choices": ["Green", "Red", "Yellow", "Blue"], "correct": 0, "exp": "Per Vol 1: Type K = thickest walls, GREEN markings. Type L = blue (medium). Type M = red (thinnest). Same outside diameter but different inside diameter and wall thickness.", "v": 5}, {"id": 5378, "domain": 1, "task": 10, "topic": "Copper Type M", "q": "Type M copper tubing is identified by what color marking?", "choices": ["Red", "Yellow", "Green", "Blue"], "correct": 0, "exp": "Per Vol 1: Type M = thinnest walls, RED markings. Type K = green (thickest). Type L = blue (medium). Type M may be installed above and below ground but NOT embedded in concrete or masonry.", "v": 5}, {"id": 5379, "domain": 1, "task": 10, "topic": "Copper Patina", "q": "A protective patina coating that forms inside copper tubing is typically what color?", "choices": ["White", "Green (usually)", "Black", "Red"], "correct": 1, "exp": "Per Vol 1: protective patina forms inside copper tubing soon after service. Usually green. Can be damaged by aggressive water, water hammer, or excessive solder flux. Damaged patina shortens service life dramatically.", "v": 5}, {"id": 5380, "domain": 1, "task": 10, "topic": "Punctate Protection", "q": "Pipes installed through holes/notches in framing should be protected by steel shield plates if the pipe is closer than what to the edge?", "choices": ["No protection needed", "3 inches", "1/2 inch", "1.5 inches from the edge"], "correct": 3, "exp": "Per Vol 1: shield plates recommended if hole/notch edge is closer than 1-1/2 inches to member edge. Plate at least 2 inches above bottom plate / below top plate. Doesn't apply to cast iron, black steel, galvanized steel pipes.", "v": 5}, {"id": 5381, "domain": 1, "task": 10, "topic": "Plumbing Hole Size", "q": "The hole through which a pipe is installed should be:", "choices": ["Same as pipe diameter", "Tight fit to pipe", "2 inches larger", "About 1/2 inch larger than pipe diameter"], "correct": 3, "exp": "Per Vol 1: hole should be ~1/2 inch larger than pipe diameter. Pipes expand/contract with temperature changes. Tight holes cause rubbing, clicking, squeaking noises. Allow free movement.", "v": 5}, {"id": 5382, "domain": 1, "task": 10, "topic": "Foundation Wall Sleeve", "q": "A pipe through a foundation wall is protected by a sleeve that should be:", "choices": ["Two pipe sizes larger than pipe installed", "Same size as pipe", "One size smaller", "No sleeve needed"], "correct": 0, "exp": "Per Vol 1: sleeve through foundation wall = TWO pipe sizes larger than the pipe. Space between sleeve and pipe sealed with caulk, foam, or gasket (waterproof). Protects against breaking due to settlement.", "v": 5}, {"id": 5383, "domain": 1, "task": 10, "topic": "Copper Support Horizontal", "q": "Copper tubing should be supported horizontally at least every:", "choices": ["3 feet", "6 feet", "10 feet", "12 feet"], "correct": 1, "exp": "Per Vol 1: copper horizontal support 6 feet, vertical 10 feet. CPVC: 3 ft horizontal, 10 ft vertical. PEX: 32 inches horizontal, 10 ft vertical. Galvanized: 12 ft horizontal, 15 ft vertical. Different by material.", "v": 5}, {"id": 5384, "domain": 1, "task": 10, "topic": "PEX Support Horizontal", "q": "PEX tubing should be supported horizontally at least every:", "choices": ["10 feet", "12 feet", "32 inches", "6 feet"], "correct": 2, "exp": "Per Vol 1: PEX horizontal support every 32 inches (about 2.5 feet). PEX is flexible and sags between supports - more frequent support required than rigid pipe.", "v": 5}, {"id": 5385, "domain": 1, "task": 10, "topic": "S-Trap Status", "q": "An S-trap is:", "choices": ["Prohibited - self-siphons under flow", "Required for kitchens", "Stronger than P-trap", "Modern preferred configuration"], "correct": 0, "exp": "S-traps are PROHIBITED by modern code. Self-siphons trap seal under flow, allowing sewer gas in. Replaced with P-traps and proper venting. When found, often a remodel error or pre-code installation.", "v": 5}, {"id": 5386, "domain": 1, "task": 10, "topic": "Sewer Lateral Definition", "q": "The sewer lateral is:", "choices": ["Trap arm", "Pipe from house to public sewer or septic", "Horizontal vent", "Connection between fixtures"], "correct": 1, "exp": "Sewer lateral: pipe from house to municipal sewer main or septic tank. Homeowner typically responsible for entire lateral. Common failure point: clay tile, cast iron, root intrusion, sags. Sewer scope inspection valuable.", "v": 5}, {"id": 5387, "domain": 1, "task": 10, "topic": "Water Heater Anode", "q": "Water heater anode rod purpose:", "choices": ["Heat the water", "Sacrifice itself to prevent tank corrosion", "Backup heating element", "Add minerals"], "correct": 1, "exp": "Anode (typically aluminum or magnesium) sacrificially corrodes preferentially to protect steel tank. Should be inspected/replaced every 3-5 years to extend tank life. Often neglected. Different anodes for hard vs soft water.", "v": 5}, {"id": 5388, "domain": 1, "task": 10, "topic": "WH Pan and Drain", "q": "Water heaters above living space (attics, finished spaces) should have:", "choices": ["Larger TPR valve", "No special provisions", "Different fuel", "A drain pan piped to safe drain or outside"], "correct": 3, "exp": "Drain pan: piped to safe drain or outside. Tank failures eventually happen. The pan limits damage. Cost a few dollars to install at original construction; thousands of dollars in damage when omitted.", "v": 5}, {"id": 5389, "domain": 1, "task": 10, "topic": "Functional Flow Issues", "q": "Common causes of poor functional flow at fixtures include:", "choices": ["All of the above", "Pressure-reducing valve set too low", "Aerator buildup", "Galvanized pipe corrosion/scaling"], "correct": 0, "exp": "Multiple flow problems possible: galvanized scale, low-PRV setting, aerator/screen mineral buildup, partially closed shutoffs, undersized service line, water source issues. Investigate systematically.", "v": 5}, {"id": 5390, "domain": 1, "task": 4, "topic": "Snow Load WI", "q": "In southeastern Wisconsin, design snow load (ground) is approximately:", "choices": ["30 psf", "60 psf", "100 psf", "10 psf"], "correct": 0, "exp": "Milwaukee area ground snow load ~30 psf. Roof snow load adjusted for slope, exposure, thermal. Important when adding to existing roof, removing roof structure, or assessing structural concerns after heavy winter.", "v": 5}, {"id": 5391, "domain": 1, "task": 4, "topic": "Frost Depth WI", "q": "Wisconsin frost depth is typically:", "choices": ["42-48 inches", "6 feet", "12 inches", "24 inches"], "correct": 0, "exp": "Wisconsin frost depth: typically 42-48 inches. Footings must extend below frost line to prevent frost heave. Critical when evaluating shallow foundations, additions on inadequate footings, or detached structures (decks, garages).", "v": 5}, {"id": 5392, "domain": 1, "task": 4, "topic": "Anchor Bolt Spacing", "q": "Anchor bolts (sill plate to foundation) maximum spacing:", "choices": ["12 feet on center", "3 feet on center", "No requirement", "6 feet on center"], "correct": 3, "exp": "Anchor bolts: max 6 ft on center, within 12 inches of corners and ends, minimum 1/2 inch diameter, embedded 7 inches in concrete, with washer and nut. High seismic areas: closer spacing.", "v": 5}, {"id": 5393, "domain": 1, "task": 4, "topic": "Anchor Bolt Diameter", "q": "Minimum anchor bolt diameter is:", "choices": ["1/2 inch", "3/4 inch", "1 inch", "3/8 inch"], "correct": 0, "exp": "Minimum anchor bolt: 1/2 inch diameter. Some applications (high wind, high seismic) require larger. Must include washer and nut (not just nut).", "v": 5}, {"id": 5394, "domain": 1, "task": 4, "topic": "Anchor Bolt Embedment", "q": "Anchor bolts must be embedded into concrete a minimum of:", "choices": ["12 inches", "5 inches", "3 inches", "7 inches"], "correct": 3, "exp": "Anchor bolts: minimum 7 inches embedment in concrete. Provides pull-out resistance against uplift forces (wind, seismic). Common defect: insufficient embedment, especially in older homes or DIY work.", "v": 5}, {"id": 5395, "domain": 1, "task": 4, "topic": "Anchor Bolt Edge", "q": "Anchor bolts must be installed within how far of corners and ends?", "choices": ["6 inches", "No restriction", "12 inches", "24 inches"], "correct": 2, "exp": "Anchor bolts within 12 inches of corners, ends, and breaks in the sill plate. Critical at corners where uplift and shear forces concentrate. Common defect: missing corner anchors.", "v": 5}, {"id": 5396, "domain": 1, "task": 4, "topic": "Pipe Trench Footing", "q": "A pipe trench below a footing must be offset from bottom of footing a minimum of:", "choices": ["45 degrees", "6 feet", "No offset", "60 degrees"], "correct": 0, "exp": "45-degree rule: no excavation/trench can encroach within 45 degrees from bottom of footing. The bearing zone (cone of soil under the footing) provides support. Disturbing this zone causes settlement.", "v": 5}, {"id": 5397, "domain": 1, "task": 4, "topic": "Vertical Crack Cause", "q": "A vertical crack in a poured concrete basement wall is most commonly caused by:", "choices": ["Concrete shrinkage during curing", "Settlement", "Lateral pressure", "Frost"], "correct": 0, "exp": "Vertical cracks usually shrinkage during cure. Diagonal: settlement. Horizontal: lateral pressure (most serious). Stair-step in masonry: settlement. Pattern indicates cause - measure and document.", "v": 5}, {"id": 5398, "domain": 1, "task": 4, "topic": "Stair-Step Crack Cause", "q": "A diagonal stair-step crack in a masonry wall typically indicates:", "choices": ["Differential settlement", "Hydrostatic pressure", "Excess moisture", "Cure shrinkage"], "correct": 0, "exp": "Stair-step in masonry follows mortar joints (path of least resistance). Indicates differential settlement - one part settling more than another. Investigate foundation supporting cracking section. Document length, width, displacement.", "v": 5}, {"id": 5399, "domain": 1, "task": 4, "topic": "Foundation Settlement", "q": "Settlement in foundations can be caused by:", "choices": ["Freeze-thaw cycling", "Water erosion", "All of the above", "Compressible soils below footing"], "correct": 2, "exp": "Settlement causes: compressible soils, water erosion (downspouts, plumbing leaks), freeze-thaw, undermining (broken sewer line), expansive soils, vibration, change in water table. Engineer determines cause + intervention.", "v": 5}, {"id": 5400, "domain": 1, "task": 4, "topic": "Floor Joist Notching", "q": "A wood floor joist may be notched in the outer third of span by no more than:", "choices": ["Notching never permitted", "1/2 of joist depth", "1/6 of joist depth", "1/4 of joist depth"], "correct": 2, "exp": "Floor joist notching: outer thirds only, max 1/6 of depth. Holes: max 1/3 of depth, at least 2 inches from edges. Middle third (high stress): NO notching, holes only. Common defect when plumbers/electricians cut joists.", "v": 5}, {"id": 5401, "domain": 1, "task": 4, "topic": "Joist Middle Third", "q": "In the middle third of a floor joist span:", "choices": ["Notches NOT allowed; holes are", "Holes prohibited", "Notches and holes both allowed", "Free to cut anything"], "correct": 0, "exp": "Middle third = high bending stress. NO notching allowed (notch reduces tension fiber). Holes acceptable (less impact). Outer third: notching limited to 1/6 of depth. End: limited notching to 1/4 of depth.", "v": 5}, {"id": 5402, "domain": 1, "task": 4, "topic": "I-Joist Flange", "q": "Engineered I-joist flanges:", "choices": ["Cannot be cut/notched - structural failure risk", "Can be cut/notched freely", "Can be drilled through", "Can be modified up to 1/3"], "correct": 0, "exp": "I-joists: NEVER cut/notch flanges (top or bottom). Holes only in webs, following manufacturer specs. Use manufacturer span tables. Cutting flanges = catastrophic failure. Common defect when plumbers/HVAC cut.", "v": 5}, {"id": 5403, "domain": 1, "task": 4, "topic": "LVL", "q": "LVL stands for:", "choices": ["Long Vertical Load", "Laminated Veneer Lumber", "Light Vibration Limit", "Layered Vinyl Lumber"], "correct": 1, "exp": "Laminated Veneer Lumber: thin wood veneers (1/8 to 1/16 inch) glued together with grain in same direction. Used as headers, beams, rim boards. Stronger and more uniform than dimensional lumber.", "v": 5}, {"id": 5404, "domain": 1, "task": 4, "topic": "Wood Decay Threshold", "q": "Wood decay (rot) requires moisture content above approximately:", "choices": ["50%", "20%", "10%", "5%"], "correct": 1, "exp": "Decay fungi require wood moisture above ~20% (some species above 28%). Below this threshold, too dry for fungal growth. Moisture meters help confirm whether wood has been actively wet. Critical threshold for inspectors.", "v": 5}, {"id": 5405, "domain": 1, "task": 4, "topic": "Termite Indicators", "q": "Subterranean termite activity indicators include:", "choices": ["All of the above", "Wood that sounds hollow when tapped", "Hollowed wood with frass", "Mud tubes on foundation"], "correct": 0, "exp": "Termites build mud tubes for moisture/protection between soil and wood. Damaged wood hollowed along grain. Frass (droppings) more typical of drywood termites and carpenter ants. Wisconsin has subterranean termites.", "v": 5}, {"id": 5406, "domain": 1, "task": 4, "topic": "Carpenter Ant vs Termite", "q": "Carpenter ants compared to subterranean termites:", "choices": ["Build mud tubes", "Excavate wood for nesting but do not eat it", "Eat wood for nutrition", "Are not in WI"], "correct": 1, "exp": "Carpenter ants excavate wood for nests (typically moist or decayed wood) but DO NOT eat it - push out frass like fine sawdust with insect parts. Termites consume wood. Both indicate likely moisture problem.", "v": 5}, {"id": 5407, "domain": 1, "task": 4, "topic": "Header Sizing", "q": "A header above a window or door opening must be sized based on:", "choices": ["Span and load it carries", "Aesthetic preference", "Cost of lumber", "Wall width"], "correct": 0, "exp": "Header sizing: based on span (opening width) and load (roof, floor, wall above). Span tables in IRC provide minimum sizes for typical loads. Improper headers cause sagging and cracking above openings.", "v": 5}, {"id": 5408, "domain": 1, "task": 4, "topic": "Crawl Space Defect", "q": "A typical defect with crawl spaces is:", "choices": ["Lack of vapor retarder on soil", "Insufficient access", "All of the above", "Standing water"], "correct": 2, "exp": "Crawl space defects: missing/inadequate vapor retarder, standing water, inadequate ventilation OR (newer thinking) too much vent in humid climates, inadequate access (18x24 minimum), earth-to-wood contact, decayed framing.", "v": 5}, {"id": 5409, "domain": 1, "task": 4, "topic": "Crawl Access", "q": "Minimum unobstructed crawl space access size is:", "choices": ["16 x 24 inches", "24 x 36 inches", "12 x 12 inches", "18 x 24 inches"], "correct": 3, "exp": "Crawl access minimum: 18 x 24 inches (per IRC). Through-floor access: 18 x 24 with proper hatch. Actual access often blocked by ducts, plumbing, debris - inspect actual passable space.", "v": 5}, {"id": 5410, "domain": 1, "task": 4, "topic": "Floor Sag", "q": "A noticeably sagging floor in a residence may indicate:", "choices": ["Decayed/damaged framing", "Settled supporting columns", "Any of the above", "Undersized framing"], "correct": 2, "exp": "Floor sag causes: decay/damage from moisture or insects, undersized members for load, settlement of supporting columns/piers, or removal of bearing walls. Investigate from below in basement/crawl.", "v": 5}, {"id": 5411, "domain": 1, "task": 4, "topic": "Foundation Type Slab Defect", "q": "Common defects in slab-on-grade foundations include:", "choices": ["Uneven slab", "Cracks", "Visible water staining indicating moisture", "All of the above"], "correct": 3, "exp": "Slab defects: cracks (shrinkage, settlement, expansive soils), uneven slabs, water staining indicating moisture migration through slab (often missing/poor vapor retarder beneath), cold floors from inadequate insulation.", "v": 5}, {"id": 5412, "domain": 1, "task": 4, "topic": "Standing Water Crawl", "q": "Standing water in a crawl space indicates:", "choices": ["Drainage or grading problem requiring correction", "Normal moisture migration", "Required for ventilation", "No concern under 3 inches"], "correct": 0, "exp": "Standing water in crawl: always a defect. Sources: poor exterior grade, plumbing leaks, condensation, high water table. Requires source identification. Can lead to structural decay, pest issues, indoor air quality problems, mold.", "v": 5}, {"id": 5413, "domain": 1, "task": 5, "topic": "Six Disconnect Rule", "q": "All electricity must be capable of being shut off using how many disconnects?", "choices": ["12 or fewer", "1", "6 or fewer", "Unlimited"], "correct": 2, "exp": "Per Vol 1: all electricity must shut off using 6 or fewer breakers/switches/fuses. Most modern panels have single main breaker. Older systems may have multiple disconnects (range, water heater, AC, main) up to 6 total.", "v": 5}, {"id": 5414, "domain": 1, "task": 5, "topic": "Service Drop Definition", "q": "Service drop refers to:", "choices": ["Wires inside the house", "Wires from meter to panel", "Overhead utility wires from transformer to house", "Underground utility wires"], "correct": 2, "exp": "Per Vol 1: service drop = ABOVE-ground utility conductors between transformer and house. Service lateral = BELOW ground. Distinguishing terminology matters for inspection focus areas.", "v": 5}, {"id": 5415, "domain": 1, "task": 5, "topic": "GFCI Locations", "q": "GFCI protection is required for receptacles in all of the following EXCEPT:", "choices": ["Bathrooms", "Bedroom receptacles", "Kitchen counters", "Garages"], "correct": 1, "exp": "GFCI required: bathrooms, kitchen counters, garages, outdoors, crawls, unfinished basements, near sinks. Bedrooms typically require AFCI (different protection). Newer codes expanding GFCI to most areas.", "v": 5}, {"id": 5416, "domain": 1, "task": 5, "topic": "Grounding Electrode", "q": "Common grounding electrodes include all EXCEPT:", "choices": ["20 ft of #4 rebar in concrete (Ufer)", "Metal water service pipe in 10 ft earth contact", "Driven rod 8 ft into ground", "PVC sewer pipe"], "correct": 3, "exp": "Per Vol 1: PVC is non-conductive - cannot be grounding electrode. Acceptable: Ufer, driven rod (8 ft min), metal water pipe with 10 ft earth contact, metal building structure. New construction often uses multiple electrodes.", "v": 5}, {"id": 5417, "domain": 1, "task": 5, "topic": "Subpanel Bonding", "q": "In a subpanel, neutrals and equipment grounding conductors should be:", "choices": ["Kept separate (isolated neutrals from grounds)", "Both connected to box", "Bonded together as in main", "Not present at all"], "correct": 0, "exp": "Subpanel: neutrals and EGCs MUST be on separate, isolated bars. Bonding only at main service. Bonded neutrals at subpanel cause current flow on grounding paths - serious safety defect. Common in older or DIY installations.", "v": 5}, {"id": 5418, "domain": 1, "task": 5, "topic": "Service Equipment Bonding", "q": "At the service equipment (main panel):", "choices": ["Never bonded", "Only neutrals present", "Neutrals and grounds bonded together", "Always isolated"], "correct": 2, "exp": "Main panel: neutral and grounding bus bonded - typically via main bonding jumper screw. ONE point of bonding. Downstream subpanels keep them separate. Critical: only ONE main bonding point in the system.", "v": 5}, {"id": 5419, "domain": 1, "task": 5, "topic": "AWG Smallest", "q": "The smallest wire gauge typically used in residential branch circuit wiring is:", "choices": ["#12 AWG", "#10 AWG", "#16 AWG", "#14 AWG"], "correct": 3, "exp": "#14 AWG: smallest residential branch circuit wire (15 amp). #12 AWG = 20 amp. #10 = 30 amp. AWG: smaller number = larger wire diameter. 4/0 is among largest in residential service.", "v": 5}, {"id": 5420, "domain": 1, "task": 5, "topic": "Service Amperage Modern", "q": "Minimum service amperage typically considered for single-family residence today:", "choices": ["60 amps", "400 amps", "200 amps", "100 amps"], "correct": 3, "exp": "Modern minimum: 100 amps. 200 amps more common with electric heat, AC, EV chargers. 60-amp services exist in older homes but typically inadequate for modern loads. Service upgrade common in older home renovations.", "v": 5}, {"id": 5421, "domain": 1, "task": 5, "topic": "Junction Box", "q": "All electrical splices must be:", "choices": ["Soldered", "In accessible junction boxes", "Wrapped with electrical tape", "Buried in walls"], "correct": 1, "exp": "All splices/connections must be in approved junction boxes that remain accessible (NOT buried in walls). Wire nuts inside boxes; box covered with blank cover or fixture. Concealed splices: serious defect.", "v": 5}, {"id": 5422, "domain": 1, "task": 5, "topic": "Cable Clamping", "q": "Cable entering a metal box must be:", "choices": ["Free to move", "Sealed with caulk", "Painted", "Secured with a cable clamp at the box"], "correct": 3, "exp": "Cables entering metal boxes need cable clamps - prevents cable being pulled out, protects against sharp knockout edges. Plastic boxes typically have integral clamps. Common defect: missing or inadequate clamping.", "v": 5}, {"id": 5423, "domain": 1, "task": 5, "topic": "Service Drop Driveway", "q": "An overhead service drop must maintain minimum clearance over a residential driveway of:", "choices": ["10 feet", "18 feet", "12 feet", "8 feet"], "correct": 2, "exp": "Service drop clearances: 12 ft over residential driveways, 18 ft over public roads, 10 ft at lowest point above grade for residential entrance. Lower clearances are significant defect.", "v": 5}, {"id": 5424, "domain": 1, "task": 5, "topic": "Reverse Polarity", "q": "Reverse polarity at a receptacle means:", "choices": ["Receptacle is inoperable", "Ground is missing", "DC instead of AC", "Hot and neutral are swapped"], "correct": 3, "exp": "Reverse polarity: hot and neutral conductors swapped at the receptacle. Common defect, especially with backstabbed connections. Equipment may operate but creates shock hazard - the switched terminal becomes live.", "v": 5}, {"id": 5425, "domain": 1, "task": 5, "topic": "Backstab Defect", "q": "A backstabbed receptacle:", "choices": ["Preferred for high current", "Tends to fail with thermal cycling - loose contact, overheating, scorching", "Both A and B", "Connected via push-in holes on back"], "correct": 2, "exp": "Backstab: push-in holes on the back. Notorious for failing - small contact area loosens with thermal cycling, overheating, intermittent operation. Side terminal screw connections more reliable.", "v": 5}, {"id": 5426, "domain": 1, "task": 5, "topic": "Tamper Resistant", "q": "Tamper-resistant receptacles (TR):", "choices": ["Required in all new dwelling unit receptacles", "Required only in bedrooms", "Both A and C", "Have built-in shutters that block single-prong insertion"], "correct": 2, "exp": "TR receptacles: required in all new dwelling unit receptacles. Internal shutters block insertion of single objects (children's hairpin). Both prongs must insert simultaneously. Code requirement since 2008 NEC update.", "v": 5}, {"id": 5427, "domain": 1, "task": 5, "topic": "GEC Size 200A Ufer", "q": "GEC for a 200-amp service to a Ufer ground should be:", "choices": ["#8 AWG copper", "#6 AWG copper", "#4 AWG copper", "#10 AWG copper"], "correct": 2, "exp": "Per Vol 1: 200A or greater service to Ufer = #4 AWG copper. To rod/pipe = #6 (limited by impractical resistance). To water pipe = full size. Code tables specify based on service size and electrode type.", "v": 5}, {"id": 5428, "domain": 1, "task": 5, "topic": "Service Panel Clearance", "q": "A panel should have what clearance in front of it?", "choices": ["No clearance required", "30 inches wide x 36 inches deep", "6 feet x 6 feet", "12 inches"], "correct": 1, "exp": "Per NEC: working clearance in front of electrical panels - 30 inches wide x 36 inches deep, 6.5 feet high (headroom). Cannot be obstructed by storage. Common defect: storage in front of panel.", "v": 5}, {"id": 5429, "domain": 1, "task": 13, "topic": "Egress Width Min", "q": "Minimum net clear width for an egress window is:", "choices": ["16 inches", "30 inches", "20 inches", "24 inches"], "correct": 2, "exp": "Egress: minimum 20 inches width. Combined with 24 inch height min. Note these alone don't satisfy area (5.7 sq ft); a 20x24 = 3.3 sq ft, so larger dimensions on at least one axis required. Don't memorize these as alternatives - they are minimums.", "v": 5}, {"id": 5430, "domain": 1, "task": 13, "topic": "Egress Height Min", "q": "Minimum net clear height for egress window:", "choices": ["22 inches", "30 inches", "24 inches", "20 inches"], "correct": 2, "exp": "Minimum 24 inches height. Combined with 20 inch width minimum AND 5.7 sq ft total area. Sill height max 44 inches above floor. All must be met simultaneously.", "v": 5}, {"id": 5431, "domain": 1, "task": 13, "topic": "Egress Sill Max", "q": "Maximum sill height of egress window above floor:", "choices": ["60 inches", "24 inches", "44 inches", "36 inches"], "correct": 2, "exp": "Egress sill: maximum 44 inches above bedroom floor. Higher sills require permanent steps. Critical for child egress in fire emergencies. Also affects child fall safety from second-story windows.", "v": 5}, {"id": 5432, "domain": 1, "task": 13, "topic": "Smoke Alarm Required", "q": "Smoke alarms are required in all of the following EXCEPT:", "choices": ["Kitchen near appliances", "Every level including basement", "Each sleeping room", "Outside each sleeping area"], "correct": 0, "exp": "Smoke alarms NOT required in kitchens (nuisance trip risk). Required: each bedroom, hallway outside bedrooms, every level including basement and habitable attics. Modern code requires interconnection.", "v": 5}, {"id": 5433, "domain": 1, "task": 13, "topic": "Smoke Alarm Lifespan", "q": "Smoke alarms should be replaced approximately every:", "choices": ["Never", "10 years", "1 year", "2-3 years"], "correct": 1, "exp": "Smoke alarms: 10-year lifespan typical. Sensor degrades. Replace entire unit (not just battery). Newer alarms have 10-year sealed batteries with clear end-of-life indicators.", "v": 5}, {"id": 5434, "domain": 1, "task": 13, "topic": "CO Alarm Lifespan", "q": "CO alarms should be replaced approximately every:", "choices": ["5-7 years", "Never", "1 year", "20 years"], "correct": 0, "exp": "CO alarms: typically 5-7 year lifespan. Electrochemical sensor degrades over time. Replace per manufacturer recommendation; many have end-of-life chirp/indicator. Different from smoke alarm replacement schedule.", "v": 5}, {"id": 5435, "domain": 1, "task": 13, "topic": "Garage Ceiling", "q": "If habitable space exists above attached garage, garage ceiling must be:", "choices": ["Open joists", "5/8 inch Type X drywall, taped/finished", "Standard drywall", "Plywood"], "correct": 1, "exp": "Garage ceiling supporting habitable space: 5/8 Type X drywall, taped/finished joints. Provides fire-rated separation. Common defect during finished-room-above-garage retrofits where drywall is omitted or insufficient grade.", "v": 5}, {"id": 5436, "domain": 1, "task": 13, "topic": "GFCI Required", "q": "GFCI protection is required for receptacles in all EXCEPT:", "choices": ["Kitchen counters", "Garages", "Bathrooms", "Bedroom receptacles"], "correct": 3, "exp": "GFCI: bathrooms, kitchen counters, garages, outdoor, crawls, unfinished basements, near sinks. Bedrooms typically require AFCI. Newer codes expanding GFCI to nearly everywhere - check most recent code for specifics.", "v": 5}, {"id": 5437, "domain": 1, "task": 13, "topic": "Stair Lighting", "q": "Interior stairs require:", "choices": ["Lighting only at bottom", "Lighting controllable from top and bottom", "No lighting", "Battery lighting only"], "correct": 1, "exp": "Interior stairs: lighting with switches at both top and bottom (3-way). Allows safe operation either direction without traversing dark stairs. Common defect: switch only at one end.", "v": 5}, {"id": 5438, "domain": 1, "task": 13, "topic": "Sprinkler Painted", "q": "A painted fire sprinkler head is:", "choices": ["Decorative and acceptable", "Required by some codes", "A defect that prevents proper operation", "Improved by paint"], "correct": 2, "exp": "Painted sprinklers: defect. Paint can prevent fusible element from melting at rated temperature, or block deflector spray pattern. Replace, not paint. Same applies to ones that have been damaged or have stored items below.", "v": 5}, {"id": 5439, "domain": 1, "task": 13, "topic": "Furnace Combustion Air", "q": "Mechanical room with fuel-burning equipment requires:", "choices": ["Carpeted", "Sealed completely", "Adequate combustion air provisions", "Heated to 80°F"], "correct": 2, "exp": "Mechanical rooms: adequate combustion air per BTU input, proper venting, clearances to combustibles, working CO alarm nearby. Sealed mechanical rooms cause backdrafting. Refer to combustion air section.", "v": 5}, {"id": 5440, "domain": 1, "task": 13, "topic": "Bath Heater Lamp", "q": "A bathroom heat lamp combined with light/fan:", "choices": ["Generic outlets OK", "Must be properly listed and installed", "No special requirements", "Cannot be in bathroom"], "correct": 1, "exp": "Bathroom heat lamps: properly listed unit, GFCI protected circuit, adequate clearances to combustibles and showers, vapor-proof if in shower zone. Aftermarket high-watt bulb installations often violate listing.", "v": 5}, {"id": 5441, "domain": 1, "task": 13, "topic": "Open Riser", "q": "Stair open risers (no riser board) on stairs higher than 30 inches typically:", "choices": ["Cannot allow a 4-inch sphere through", "Always acceptable", "Decorative only", "No requirements"], "correct": 0, "exp": "Open-riser stairs: cannot allow 4-inch sphere through open space (same rule as guards). Codes often prohibit open risers in residential or require closed risers. Limits child fall hazard.", "v": 5}, {"id": 5442, "domain": 1, "task": 13, "topic": "CO Symptoms", "q": "CO poisoning symptoms include:", "choices": ["Headache, nausea, dizziness, confusion", "Localized burns", "Respiratory infection", "Joint pain"], "correct": 0, "exp": "CO symptoms: headache, nausea, dizziness, confusion, fatigue. Severe: loss of consciousness, death. Easily mistaken for flu. CO alarms essential because gas is undetectable to humans. Inspectors should test alarm presence/operation.", "v": 5}, {"id": 5443, "domain": 1, "task": 13, "topic": "Dryer Vent Lint Hazard", "q": "Lint accumulation in a clothes dryer vent is a:", "choices": ["Normal condition", "Cosmetic concern", "Improves drying", "Significant fire hazard"], "correct": 3, "exp": "Dryer vent lint accumulation: significant fire hazard. Restricted airflow + ignitable lint + heat = fire. Recommend cleaning at minimum annually. Inspectors document visible accumulation, restricted termination, lint blocking the dryer.", "v": 5}, {"id": 5444, "domain": 1, "task": 12, "topic": "Hearth 6+ sqft", "q": "The minimum hearth extension in front of a masonry fireplace with opening 6 sq ft or larger:", "choices": ["12 inches", "20 inches", "16 inches", "24 inches"], "correct": 1, "exp": "Hearth extension: 20 inches in front, 12 inches beyond each side for openings ≥6 sq ft. Smaller (under 6): 16 in front, 8 sides. Protects against radiant heat and falling embers.", "v": 5}, {"id": 5445, "domain": 1, "task": 12, "topic": "Hearth Smaller", "q": "Fireplace opening less than 6 sq ft requires hearth extension of:", "choices": ["12 inches in front", "16 inches front, 8 sides", "24 inches front", "20 inches front"], "correct": 1, "exp": "Smaller fireplace (under 6 sq ft opening): 16 inches front, 8 inches each side. Larger: 20 front, 12 sides. Hearth must be non-combustible: masonry, tile, stone.", "v": 5}, {"id": 5446, "domain": 1, "task": 12, "topic": "Chimney 3-2-10", "q": "A chimney must extend at least how high above any portion of building within 10 feet?", "choices": ["3 feet", "4 feet", "1 foot", "2 feet"], "correct": 3, "exp": "3-2-10 rule: at least 3 feet above roof penetration AND at least 2 feet higher than any portion of building within 10 feet horizontally. Insufficient height causes downdraft and poor draft.", "v": 5}, {"id": 5447, "domain": 1, "task": 12, "topic": "Chimney 3 ft Above", "q": "Chimney must extend at least how high above the roof at the point of penetration?", "choices": ["2 feet", "3 feet", "4 feet", "1 foot"], "correct": 1, "exp": "3-2-10 rule: 3 feet above roof penetration, 2 feet above anything within 10 feet horizontally. Insufficient height causes downdraft. Both rules must be met.", "v": 5}, {"id": 5448, "domain": 1, "task": 12, "topic": "Chimney Cap", "q": "A chimney cap (rain cap or crown):", "choices": ["Improves draft", "All of the above", "Prevents water entry into flue", "Limits creosote (indirectly)"], "correct": 1, "exp": "Chimney cap: keeps rain/snow out of flue, keeps animals out, often includes spark arrestor screen. Without cap, water entry causes accelerated chimney deterioration (especially in freeze-thaw climates like Wisconsin).", "v": 5}, {"id": 5449, "domain": 1, "task": 12, "topic": "Creosote Stage III", "q": "Stage III creosote in a chimney is:", "choices": ["Loose flakes, easy to remove", "Hard glaze, highly flammable, difficult to remove", "Not flammable", "Tar-like, more flammable"], "correct": 1, "exp": "Per Vol 1: Stage I = light brown/black flaky ash (least flammable, easy remove). Stage II = heavy tar-like ash. Stage III = hard, shiny coating - HIGHLY flammable, very difficult to remove. Flue liner replacement may be necessary.", "v": 5}, {"id": 5450, "domain": 1, "task": 12, "topic": "Damper Location", "q": "The damper in a fireplace is located:", "choices": ["At chimney top", "In smoke shelf", "At bottom of flue, above firebox", "At hearth"], "correct": 2, "exp": "Damper: above firebox, controls flue opening. Closed when not in use to reduce heat loss. Top-sealing dampers (at chimney top) are an alternative that seals more effectively at the top.", "v": 5}, {"id": 5451, "domain": 1, "task": 12, "topic": "Combustion Air Fireplace", "q": "Modern fireplaces and tight homes typically require:", "choices": ["Air from bedroom", "Indoor air only", "Outside combustion air ducted to firebox", "No combustion air"], "correct": 2, "exp": "Tight modern homes: outside combustion air recommended (sometimes required) for masonry fireplaces. Direct-vent and sealed-combustion units bring outside air through dedicated ductwork.", "v": 5}, {"id": 5452, "domain": 1, "task": 12, "topic": "Soot Stains", "q": "Soot stains on the exterior of a chimney indicate:", "choices": ["Normal operation", "Good seal", "Improved draft", "Possible flue gas leakage from cracks"], "correct": 3, "exp": "Exterior soot can indicate flue gas leakage through cracks in masonry or liner. Signs of poor draft. Recommend evaluation by qualified chimney sweep. Different from interior soot at firebox (normal use indicator).", "v": 5}, {"id": 5453, "domain": 1, "task": 12, "topic": "Damper Functional", "q": "A fireplace damper that is rusted shut or non-functional is:", "choices": ["Required for energy", "Acceptable as long as chimney open", "Defect requiring repair", "Decorative"], "correct": 2, "exp": "Non-functional damper: defect. Cannot close to retain heat in winter, can't fully open for proper draft. Repair or replace. Top-sealing dampers can replace failed throat damper.", "v": 5}, {"id": 5454, "domain": 1, "task": 12, "topic": "Hearth Material", "q": "Hearth and hearth extension must be:", "choices": ["No specific requirement", "Carpet only", "Wood only", "Non-combustible (masonry, tile, stone, metal)"], "correct": 3, "exp": "Hearth: non-combustible and properly sized. Common defect: wood floor under raised hearth without proper extension to front of firebox. Carpet under hearth = serious fire hazard.", "v": 5}, {"id": 5455, "domain": 1, "task": 12, "topic": "Manufactured Mix", "q": "Mixing brands of components in a manufactured fireplace system:", "choices": ["Required for upgrades", "Is unsafe and violates listing", "Improves quality", "Standard practice"], "correct": 1, "exp": "Manufactured fireplace systems: components are tested as a system. Mixing brands voids listing and can be unsafe. Replacement parts must match original brand or use compatible components per manufacturer.", "v": 5}, {"id": 5456, "domain": 1, "task": 3, "topic": "Standard Asphalt", "q": "Standard asphalt shingle installation requires minimum slope of:", "choices": ["6:12", "4:12", "3:12", "2:12"], "correct": 1, "exp": "4:12 (4 inches rise per 12 inches run, ~18 degrees) is the standard minimum. 2:12 to 4:12 permitted with double underlayment. Below 2:12 requires different roofing system entirely.", "v": 5}, {"id": 5457, "domain": 1, "task": 3, "topic": "Ice Barrier WI", "q": "In Wisconsin, ice barrier underlayment must extend from eave edge to point at least how far inside exterior wall line?", "choices": ["24 inches", "Not required", "36 inches", "12 inches"], "correct": 0, "exp": "Ice barrier (self-adhering polymer-modified bitumen): from eave to 24 inches inside warm wall line in regions with mean January temp below 25°F. Wisconsin freeze-thaw cycles make this essential against ice dam leaks.", "v": 5}, {"id": 5458, "domain": 1, "task": 3, "topic": "Underlayment Standard", "q": "For asphalt shingles on 4:12+ slope, the minimum underlayment is:", "choices": ["One layer of 15# felt or equivalent synthetic", "Three layers synthetic", "No underlayment", "Two layers of 30# felt"], "correct": 0, "exp": "Standard slopes (4:12+): one layer of 15# felt or equivalent synthetic underlayment. Slopes 2:12 to 4:12: two layers (or full ice barrier). Synthetic underlayments now common and code-accepted.", "v": 5}, {"id": 5459, "domain": 1, "task": 3, "topic": "Skylight Leak", "q": "The most common cause of skylight leakage is:", "choices": ["Improper or deteriorated flashing", "Excessive ventilation", "Failure of glass", "Inadequate insulation"], "correct": 0, "exp": "Skylight flashing: dominant leak cause. Either improper installation (missing pieces, wrong sequence) or deterioration over time. Curb-mounted skylights require step flashing similar to chimneys.", "v": 5}, {"id": 5460, "domain": 1, "task": 3, "topic": "Downspout Capacity", "q": "A 2x3 inch downspout typically serves approximately:", "choices": ["2,000 sq ft", "100 sq ft of roof", "Unlimited", "600-800 sq ft"], "correct": 3, "exp": "Downspout sizing: 2x3 inch serves ~600 sq ft. 3x4 inch serves ~1,200 sq ft. Larger and steeper roofs (faster runoff) require more capacity. Inadequate causes overflow during heavy rain.", "v": 5}, {"id": 5461, "domain": 1, "task": 3, "topic": "Gutter Slope", "q": "Gutters should slope toward downspouts at approximately:", "choices": ["1 inch per foot", "1/4 inch per 10 feet", "6 inches per foot", "No slope"], "correct": 1, "exp": "Gutter slope: ~1/4 inch per 10 feet toward downspouts. More slope is fine but creates visible diagonal. Insufficient slope causes ponding, sagging, overflow.", "v": 5}, {"id": 5462, "domain": 1, "task": 3, "topic": "Shingle End-of-Life", "q": "An asphalt shingle approaching end-of-life will typically show:", "choices": ["Granule loss exposing asphalt mat", "Loss of seal-tab adhesion", "Curling and cupping at edges", "All of the above"], "correct": 3, "exp": "End-of-life indicators: granule loss, curling/cupping, brittleness, loss of seal-tab adhesion, exposed nails, bare spots. Multiple indicators on a roof generally suggest replacement.", "v": 5}, {"id": 5463, "domain": 1, "task": 3, "topic": "Wood Shake vs Shingle", "q": "The difference between wood shakes and wood shingles:", "choices": ["Shingles cedar; shakes other", "Shakes painted", "No difference", "Shakes thicker, split; shingles thinner, sawn"], "correct": 3, "exp": "Shakes: split (rustic, irregular, thicker). Shingles: sawn (uniform, thinner). Both typically western red cedar. Both require ventilation and proper exposure.", "v": 5}, {"id": 5464, "domain": 1, "task": 3, "topic": "Metal Roof Lifespan", "q": "Metal roofs vs asphalt shingles typically have:", "choices": ["Shorter lifespan", "Similar lifespan", "Identical performance", "Significantly longer (40-70+ vs 20-30 years)"], "correct": 3, "exp": "Quality metal roofs (standing seam, stamped metal shingles) last 40-70+ years vs 20-30 asphalt. Higher upfront cost offset by longevity and recyclability.", "v": 5}, {"id": 5465, "domain": 1, "task": 3, "topic": "Modified Bitumen", "q": "Modified bitumen is a roofing material commonly used on:", "choices": ["Underlayment for asphalt", "Tile roof substrates", "Low slope (flat) roofs", "Steep slope residential"], "correct": 2, "exp": "Modified bitumen (mod-bit): low-slope roofing material - rolled sheets with polymer modifiers (APP or SBS) for flexibility and durability. Common on residential flat roofs and porch roofs.", "v": 5}, {"id": 5466, "domain": 1, "task": 3, "topic": "Cricket", "q": "A roof cricket is:", "choices": ["Drainage channel along eave", "Small ridge built behind chimney to divert water", "Type of flashing material", "Insect that damages shingles"], "correct": 1, "exp": "Cricket (or saddle): small peaked structure built behind chimney (uphill side) to divert water around it. Required by code for chimneys wider than 30 inches measured perpendicular to slope.", "v": 5}, {"id": 5467, "domain": 1, "task": 3, "topic": "Balanced Ventilation", "q": "A balanced attic ventilation system has:", "choices": ["Equal intake (low) and exhaust (high)", "All ridge vents, no soffits", "Mechanical fans only", "All soffit vents, no ridge"], "correct": 0, "exp": "Balanced ventilation: roughly equal intake (low, typically soffit) and exhaust (high, typically ridge or gable). Net free area should be approximately equal at both. Imbalanced systems can short-circuit or pressurize spaces.", "v": 5}, {"id": 5468, "domain": 1, "task": 3, "topic": "Ridge Vent Effectiveness", "q": "Ridge vents are most effective when:", "choices": ["Sealed at both ends", "Used alone with no intake", "Paired with adequate soffit (intake) vents", "Combined with gable end vents"], "correct": 2, "exp": "Ridge vents work via convection and wind effect - need adequate intake (soffit) ventilation. Ridge vent without soffit can pull conditioned air from house, defeating purpose.", "v": 5}, {"id": 5469, "domain": 1, "task": 3, "topic": "Roof Drainage Defects", "q": "Common defects with roof drainage systems include:", "choices": ["Improper slope", "Disconnected or damaged downspouts", "All of the above", "Damaged or sagging gutters"], "correct": 2, "exp": "All common gutter defects: improper slope (back-pitch), sagging from weight or fastener failure, separation at seams, damaged elbows, blockages, discharge too close to foundation.", "v": 5}, {"id": 5470, "domain": 1, "task": 3, "topic": "Reroof Layers", "q": "Most building codes limit asphalt shingle roof systems to:", "choices": ["Unlimited", "1 layer", "3 layers", "2 layers total"], "correct": 3, "exp": "Most codes: maximum 2 layers asphalt shingles. Beyond that, structural load and ability to detect underlying problems both unacceptable. Tear-off required before adding new layer above 2.", "v": 5}, {"
