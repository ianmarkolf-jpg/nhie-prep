ance from the top and bottom of:", "choices": ["At least 3 inches from top and bottom edges", "At least 1 inch from top and bottom edges", "There is no edge clearance requirement", "At least 2 inches from top and bottom edges"], "correct": 3, "exp": "At least 2 in from top/bottom edge. Max 1/3 of depth. Holes less damaging than notches. IRC.", "v": 5}, {"id": 4144, "domain": 1, "task": 4, "topic": "Joist Middle", "q": "In the middle third of a floor joist span, you can have which modifications?", "choices": ["Notches allowed but no holes are permitted here", "Notches and holes both allowed in this region", "Holes acceptable (less impact); no notches allowed", "Neither notches nor holes are permitted in middle third"], "correct": 2, "exp": "Middle third (high bending stress): NO notching. Holes acceptable (less impact). Outer thirds: limited notch OK. IRC.", "v": 5}, {"id": 4145, "domain": 1, "task": 4, "topic": "I-Joist Flange", "q": "Engineered I-joist flanges (top and bottom chord) can be modified how?", "choices": ["Cut and notched freely as with dimensional lumber", "Never cut, notched, or drilled (catastrophic failure risk)", "Drilled carefully through with manufacturer approval", "Modified with hangers approved for I-joist installation"], "correct": 1, "exp": "NEVER cut/notch I-joist flanges. Holes only in webs per mfr specs. Cutting flanges = catastrophic failure. Mfr.", "v": 5}, {"id": 4146, "domain": 1, "task": 4, "topic": "Crawl Access", "q": "The minimum unobstructed crawl space access opening size is:", "choices": ["18 by 24 inches minimum (per IRC)", "16 by 24 inches minimum opening size", "12 by 12 inches minimum opening size", "24 by 36 inches minimum opening size"], "correct": 0, "exp": "18 x 24 in min (per IRC). Through-floor: 18 x 24 with proper hatch. Inspect actual passable space. IRC.", "v": 5}, {"id": 4147, "domain": 1, "task": 4, "topic": "Sill Plate", "q": "The sill plate in conventional residential framing is located where?", "choices": ["Bottom horizontal member resting on foundation", "The top horizontal member of the stud wall", "The center of the beam span (mid-point)", "The diagonal corner brace within a stud wall"], "correct": 0, "exp": "Sill plate: bottom horizontal member on foundation, anchored. Pressure-treated typical. Studs rise from sill. Vol 2.", "v": 5}, {"id": 4148, "domain": 1, "task": 4, "topic": "Wood Decay", "q": "Wood decay (rot) caused by fungi requires moisture content above approximately:", "choices": ["5% moisture content (very dry conditions)", "20% moisture content (some species above 28%)", "10% moisture content (typical interior conditions)", "50% moisture content (saturated wood condition)"], "correct": 1, "exp": "Above ~20% MC: decay fungi grow. Some species above 28%. Below: too dry for fungal growth. Vol 2.", "v": 5}, {"id": 4149, "domain": 1, "task": 4, "topic": "45 Degree Rule", "q": "A trench excavated below a footing must offset from the footing bottom at minimum angle of:", "choices": ["60 degrees downward from the footing bottom", "30 degrees downward from the footing bottom", "45 degrees downward from the footing bottom", "90 degrees downward from the footing bottom"], "correct": 2, "exp": "45\u00b0 rule: no excavation within 45\u00b0 from bottom of footing. Disturbing the bearing zone causes settlement. Vol 2.", "v": 5}, {"id": 4150, "domain": 1, "task": 4, "topic": "Termite Tube", "q": "Subterranean termite indicators most commonly include:", "choices": ["Visible flying swarms only during late spring season", "Sawdust pile beside framing (from boring activity)", "Mud tubes built on foundations between soil and wood", "Hollow drumming sound when tapping infested members"], "correct": 2, "exp": "Mud tubes: termites build for moisture/protection between soil and wood. Frass = ants/drywood. Vol 2.", "v": 5}, {"id": 4151, "domain": 1, "task": 4, "topic": "Carpenter Ants", "q": "Carpenter ants in wood differ from termites because they:", "choices": ["Build mud tubes on the inside of structural members", "Excavate galleries for nests but don't eat the wood", "Eat wood as their primary nutrition source", "Don't damage wood at all (only build outside nests)"], "correct": 1, "exp": "Carpenter ants: excavate for nests (don't eat wood). Push out fine frass. Termites consume wood. Vol 2.", "v": 5}, {"id": 4152, "domain": 1, "task": 4, "topic": "Header Bearing", "q": "A header above a wall opening must bear on which framing members at each end?", "choices": ["Cripple studs below the header in each side", "Bottom plate only with no intermediate support", "Drywall sheathing only with no framing required", "Trimmer (jack) studs at each end of the header"], "correct": 3, "exp": "Trimmers (jacks) below header full height to bottom plate. King studs full height beside trimmers. Vol 2.", "v": 5}, {"id": 4153, "domain": 1, "task": 4, "topic": "Glulam", "q": "A glulam structural beam is constructed from which material?", "choices": ["A single piece of sawn timber from a large tree", "Glued laminated dimensional lumber (parallel grain)", "A steel core composite with a timber outer wrap", "A concrete-filled hollow rectangular steel section"], "correct": 1, "exp": "Glulam: glued-laminated dimensional lumber. Long spans, curved shapes possible. Different from LVL. Vol 2.", "v": 5}, {"id": 4154, "domain": 1, "task": 4, "topic": "LVL", "q": "The acronym LVL stands for which structural product?", "choices": ["Long Vertical Limit (column height rating)", "Limited Vertical Load (header rating spec)", "Layered Vinyl Lumber (vinyl-coated dimensional)", "Laminated Veneer Lumber (thin veneers, same grain)"], "correct": 3, "exp": "Laminated Veneer Lumber: thin veneers glued same-grain direction. Headers, beams, rim boards. Vol 2.", "v": 5}, {"id": 4155, "domain": 1, "task": 4, "topic": "Cripple Wall", "q": "A cripple wall in residential framing is located where?", "choices": ["Between the basement floor and the first level framing", "Under the finished floor surface within a basement", "Between the foundation top and the first floor framing", "Adjacent to interior partitions on either side wall"], "correct": 2, "exp": "Cripple wall: short stud wall between foundation top and first floor. Crawl/partial basement homes. Vol 2.", "v": 5}, {"id": 4156, "domain": 1, "task": 4, "topic": "Knee Wall", "q": "A knee wall is most often located in which area of a home?", "choices": ["In a basement perimeter along the foundation wall", "At a foundation corner reinforcing the framing", "Below grade outside the home (retaining wall type)", "In a finished attic, where roof slope meets the floor"], "correct": 3, "exp": "Knee wall: partial-height interior wall, often in finished attic where roof slope meets floor. Vol 2.", "v": 5}, {"id": 4157, "domain": 1, "task": 4, "topic": "Beam in Masonry", "q": "A wood beam embedded in masonry should have airspace at the sides of approximately:", "choices": ["1/4 inch airspace on each side only", "2 inches airspace on each side and at the end", "1 inch airspace on each side and at the end", "1/2 inch airspace on each side and at the end"], "correct": 3, "exp": "1/2 inch airspace at sides and end (if not pressure-treated). Prevents moisture trapping/decay. Vol 2.", "v": 5}, {"id": 4158, "domain": 1, "task": 4, "topic": "Truss Modification", "q": "Modifying any member of an engineered roof truss is:", "choices": ["Required when remodeling adjacent attic spaces", "Never permitted without an engineered repair design", "Common DIY practice with no significant risk", "Acceptable for adding storage area in attic space"], "correct": 1, "exp": "NEVER modify trusses without engineered repair design. Engineered system; cutting any member compromises whole. Vol 2.", "v": 5}, {"id": 4159, "domain": 1, "task": 4, "topic": "Truss Lift", "q": "Truss uplift in winter typically presents as which observable condition?", "choices": ["A gap appearing at the top of an interior partition", "Drywall ceiling material drops from the truss bottom", "Roof sheathing buckles or warps along the ridge line", "Foundation cracks form at the perimeter of the home"], "correct": 0, "exp": "Truss uplift: gap appears at top of interior partitions in winter. Cosmetic. Specific clip details mitigate. Vol 2.", "v": 5}, {"id": 4160, "domain": 1, "task": 4, "topic": "Foundation Settle", "q": "Settlement in a foundation can be caused by which of the following?", "choices": ["Compressible soils alone (no other contributing factors)", "Freeze-thaw cycles alone (no other contributing factors)", "Compressible soils, water erosion, or freeze-thaw cycles", "Water erosion damage alone (no other contributing factors)"], "correct": 2, "exp": "Settlement: compressible soils, water erosion, freeze-thaw, undermining (sewer leak), expansive soils. Vol 2.", "v": 5}, {"id": 4161, "domain": 1, "task": 4, "topic": "Frost Heave", "q": "Frost heave occurs in soil because water has which physical property?", "choices": ["Water expands approximately 9% when it freezes", "Water vaporizes at the surface during cold spells", "Water pumps from below upward via capillary action", "Water contracts when freezing (denser as solid)"], "correct": 0, "exp": "Water expands ~9% when frozen. In frost-susceptible soils, lifts foundations. Footings below frost mitigate. Vol 2.", "v": 5}, {"id": 4162, "domain": 1, "task": 4, "topic": "Joist Hangers", "q": "Joist hangers must be installed using which fastener type?", "choices": ["Manufacturer-specified nails (e.g., Simpson SDS or 16d)", "Standard roofing nails sized for the bracket holes", "Standard drywall screws driven through the holes", "Construction adhesive applied between hanger and joist"], "correct": 0, "exp": "Mfr-specified nails (typically Simpson SDS or 16d common). Roofing/drywall nails NOT acceptable. Mfr.", "v": 5}, {"id": 4163, "domain": 1, "task": 4, "topic": "Slab on Grade", "q": "A slab-on-grade foundation in cold climates requires which detail?", "choices": ["Footings extending below the local frost line depth", "Heated subgrade only with no other detail required", "Insulation only above the slab on all sides", "No frost protection (slab thickness alone is sufficient)"], "correct": 0, "exp": "Turned-down edges (footings) below frost line in cold climates. Wisconsin: ~42-48 in. IRC.", "v": 5}, {"id": 4164, "domain": 1, "task": 4, "topic": "Bowed Foundation", "q": "A bowed foundation wall (>1 inch deflection typical) indicates which condition?", "choices": ["Normal aging pattern of any masonry foundation wall", "Concrete cure shrinkage event during the original pour", "Lateral pressure exceeded the wall's structural capacity", "Cosmetic concern only with no structural implication"], "correct": 2, "exp": "Lateral pressure overcame wall capacity. Engineering eval. Carbon fiber/tiebacks/bracing options. Vol 2.", "v": 5}, {"id": 4165, "domain": 1, "task": 4, "topic": "Crawl Standing Water", "q": "Standing water in a crawl space indicates which condition?", "choices": ["Drainage problem requiring correction", "Acceptable depth as long as it stays below 3 inches", "Required ventilation moisture for the framing system", "Normal seasonal condensation pattern (not a defect)"], "correct": 0, "exp": "Always a defect. Sources: poor grade, plumbing leak, condensation, water table. Causes decay. Vol 2.", "v": 5}, {"id": 4166, "domain": 1, "task": 4, "topic": "Floor Sag", "q": "A noticeably sagging floor in a residence may be caused by:", "choices": ["Decayed framing, undersized members, or settled supports", "Undersized members alone (no other contributing factors)", "Settled supports alone (no other contributing factors)", "Decayed framing alone (no other contributing factors)"], "correct": 0, "exp": "Sag causes: decay, undersized members, settled supports, removed bearing walls. Inspect from below. Vol 2.", "v": 5}, {"id": 4167, "domain": 1, "task": 4, "topic": "Crawl Vapor", "q": "A typical defect found in unfinished crawl spaces is:", "choices": ["Missing or inadequate soil vapor barrier (6 mil poly)", "Oversized floor framing members exceeding load needs", "Excessive ventilation causing winter freezing damage", "Insulation installed between floor joists from below"], "correct": 0, "exp": "Missing/inadequate soil vapor barrier (6 mil poly typical). Soil moisture drives crawl humidity. Vol 2.", "v": 5}, {"id": 4168, "domain": 1, "task": 4, "topic": "Joist Hole Max", "q": "The maximum hole diameter through a floor joist is:", "choices": ["2/3 of the joist depth maximum diameter", "1/4 of the joist depth maximum diameter", "1/2 of the joist depth maximum diameter", "1/3 of the joist depth maximum diameter"], "correct": 3, "exp": "Holes max 1/3 of joist depth. Notches more limited (1/6 outer, none middle). IRC.", "v": 5}, {"id": 4169, "domain": 1, "task": 4, "topic": "Joist Notch End", "q": "The maximum notch depth at the bearing end of a floor joist is:", "choices": ["1/4 of the joist depth maximum", "1/3 of the joist depth maximum", "1/6 of the joist depth maximum", "1/8 of the joist depth maximum"], "correct": 0, "exp": "End: max 1/4 depth. Outer thirds: max 1/6 depth. Middle third: NO notching. IRC.", "v": 5}, {"id": 4170, "domain": 1, "task": 4, "topic": "Termite vs Carpenter", "q": "To distinguish termite damage from carpenter ant damage, look for:", "choices": ["Frass piles (termites) versus mud tubes (carpenter ants)", "Hollow tap test versus paint adhesion test results", "Mud tubes (termites) versus frass piles (carpenter ants)", "Ant size \u2014 termites are always larger than carpenter ants"], "correct": 2, "exp": "Termites: mud tubes, no frass, eat with grain. Carpenter ants: fine frass piles, smooth galleries. Vol 2.", "v": 5}, {"id": 4171, "domain": 1, "task": 5, "topic": "Service Disconnect", "q": "All electrical service to a house must be disconnectable using how many devices?", "choices": ["Unlimited number of disconnects per service", "Twelve or fewer total disconnects per service", "Six or fewer disconnects (six-disconnect rule)", "One disconnect only (single main breaker)"], "correct": 2, "exp": "Six-disconnect rule: shut off using 6 or fewer breakers/switches/fuses. Most modern: 1 main. NEC.", "v": 5}, {"id": 4172, "domain": 1, "task": 5, "topic": "Min Service", "q": "The minimum service amperage typically considered adequate for a modern single-family home is:", "choices": ["60 amps minimum service capacity", "100 amps minimum service capacity", "400 amps minimum service capacity", "200 amps minimum service capacity"], "correct": 1, "exp": "Modern min: 100 A. 200 A common with electric heat/AC/EV. 60 A often inadequate today. NEC.", "v": 5}, {"id": 4173, "domain": 1, "task": 5, "topic": "AFCI Bedroom", "q": "Which residential area typically requires AFCI protection rather than GFCI?", "choices": ["Bedroom branch circuits (arc-fault protection)", "Kitchen counter outlets (ground-fault protection)", "Outdoor receptacle outlets (ground-fault required)", "Bathroom receptacle outlets (ground-fault required)"], "correct": 0, "exp": "Bedrooms: AFCI typically. GFCI for bath, kitchen counter, garage, outdoor, near sinks. Some areas need both. NEC.", "v": 5}, {"id": 4174, "domain": 1, "task": 5, "topic": "AFCI Function", "q": "AFCI breakers detect which type of electrical fault?", "choices": ["Arc faults (high-frequency arcing waveforms)", "Overcurrent only (sustained current above rating)", "Voltage surge spikes (transient overvoltage events)", "Ground faults (current flowing to earth ground)"], "correct": 0, "exp": "AFCI: detects high-frequency arc waveform (series or parallel arcing). Reduces electrical fires. NEC.", "v": 5}, {"id": 4175, "domain": 1, "task": 5, "topic": "GFCI Function", "q": "GFCI receptacles detect which type of electrical fault?", "choices": ["Ground faults (current flowing to earth ground)", "Overcurrent only (sustained current above rating)", "Voltage surge spikes (transient overvoltage events)", "Arc faults (high-frequency arcing waveforms)"], "correct": 0, "exp": "GFCI: monitors hot-neutral imbalance (current going to ground). Trips milliseconds. Shock prevention. NEC.", "v": 5}, {"id": 4176, "domain": 1, "task": 5, "topic": "FPE Panel", "q": "Federal Pacific Stab-Lok panels are known for which significant failure mode?", "choices": ["Energy-efficient design that reduces standby losses", "Premium quality bus bars with extended service life", "Failure-to-trip rate of 25\u201333% in independent testing", "Low installation cost compared to current panels"], "correct": 2, "exp": "FPE: 25-33% failure-to-trip in independent testing. Fire hazard. Recommend evaluation/replacement. Vol 1.", "v": 5}, {"id": 4177, "domain": 1, "task": 5, "topic": "Zinsco Panel", "q": "Zinsco/Sylvania panels are known for which significant failure mode?", "choices": ["Low installation cost compared to current panels", "Energy-efficient design that reduces standby losses", "Aluminum bus oxidation; fall-out; no trip", "Premium quality bus bars with extended service life"], "correct": 2, "exp": "Zinsco: aluminum bus oxidation, breaker fall-out, failure to trip. Recommend evaluation/replacement. Vol 1.", "v": 5}, {"id": 4178, "domain": 1, "task": 5, "topic": "#14 AWG Amp", "q": "A #14 AWG copper conductor is rated for branch circuit amperage of:", "choices": ["40 amp circuit maximum", "20 amp circuit maximum", "15 amp circuit maximum", "30 amp circuit maximum"], "correct": 2, "exp": "#14 AWG = 15 A. #12 = 20 A. #10 = 30 A. #8 = 40 A. Smaller AWG number = larger conductor. NEC.", "v": 5}, {"id": 4179, "domain": 1, "task": 5, "topic": "#12 AWG Amp", "q": "A #12 AWG copper conductor is rated for branch circuit amperage of:", "choices": ["15 amp circuit maximum", "30 amp circuit maximum", "20 amp circuit maximum", "40 amp circuit maximum"], "correct": 2, "exp": "#12 AWG = 20 A. #14 = 15 A. #10 = 30 A. #8 = 40 A. Standard residential branch sizes. NEC.", "v": 5}, {"id": 4180, "domain": 1, "task": 5, "topic": "#10 AWG Amp", "q": "A #10 AWG copper conductor is rated for branch circuit amperage of:", "choices": ["20 amp circuit maximum", "40 amp circuit maximum", "30 amp circuit maximum", "15 amp circuit maximum"], "correct": 2, "exp": "#10 AWG = 30 A. Common for water heaters, dryers, AC. #14 = 15. #12 = 20. NEC.", "v": 5}, {"id": 4181, "domain": 1, "task": 5, "topic": "Driveway Clearance", "q": "The minimum service drop clearance over a residential driveway is:", "choices": ["10 feet minimum clearance", "18 feet minimum clearance", "12 feet minimum clearance", "8 feet minimum clearance"], "correct": 2, "exp": "12 ft over residential driveways. 18 ft over public roads. 10 ft at lowest point above grade. NEC.", "v": 5}, {"id": 4182, "domain": 1, "task": 5, "topic": "Public Road Clearance", "q": "The minimum service drop clearance over a public road is:", "choices": ["8 feet minimum clearance", "18 feet minimum clearance", "12 feet minimum clearance", "24 feet minimum clearance"], "correct": 1, "exp": "18 ft over public roads. 12 ft over residential driveways. 10 ft above grade entrance. NEC.", "v": 5}, {"id": 4183, "domain": 1, "task": 5, "topic": "Service Lateral", "q": "A service lateral refers to utility conductors that are:", "choices": ["Conductors between the panel and branch circuit loads", "Above-ground conductors from a utility pole to home", "Underground utility conductors entering the home", "Conductors from the meter to the main service panel"], "correct": 2, "exp": "Service lateral: BELOW ground utility conductors. Service drop: ABOVE ground. From meter is SE conductor. Vol 1.", "v": 5}, {"id": 4184, "domain": 1, "task": 5, "topic": "Service Drop", "q": "A service drop refers to utility conductors that are:", "choices": ["Conductors between the panel and branch circuit loads", "Conductors from the meter to the main service panel", "Above-ground conductors from a utility pole to home", "Underground utility conductors entering the home"], "correct": 2, "exp": "Service drop: ABOVE ground (pole to drip loops). Service lateral: BELOW ground. Vol 1.", "v": 5}, {"id": 4185, "domain": 1, "task": 5, "topic": "Subpanel Bonding", "q": "In a subpanel, neutral conductors and equipment grounding conductors must be:", "choices": ["Floating from the panel enclosure entirely", "Both connected at the box via a bonding jumper", "Kept on separate isolated bus bars (not bonded)", "Bonded together on a common bus bar"], "correct": 2, "exp": "Subpanel: neutrals and EGCs SEPARATE bars. Bonding only at main service. Bonded subpanel = serious defect. NEC.", "v": 5}, {"id": 4186, "domain": 1, "task": 5, "topic": "Main Bonding", "q": "In the main service equipment, neutral and equipment grounding bus bars must be:", "choices": ["Bonded together (the main bonding jumper location)", "Connected only via a fuse for fault protection", "Kept on separate isolated bus bars (not bonded)", "Floating from the panel enclosure entirely"], "correct": 0, "exp": "Main panel: neutral + grounding bus bonded (main bonding jumper). ONE bonding point. Subpanels separate. NEC.", "v": 5}, {"id": 4187, "domain": 1, "task": 5, "topic": "Ufer Conductor", "q": "A Ufer (concrete-encased) electrode is constructed using which conductor type?", "choices": ["Aluminum building structural frame as electrode", "20 ft of #4 rebar OR #4 AWG bare copper, encased", "Metal water pipe entering the home from outside", "An 8 ft driven steel rod with bare-copper jumper"], "correct": 1, "exp": "Ufer: 20+ ft of #4 rebar OR #4 AWG bare Cu in 2 in concrete (footing). Best electrode typically. NEC.", "v": 5}, {"id": 4188, "domain": 1, "task": 5, "topic": "Rod Electrode", "q": "A driven ground rod electrode must be at minimum length of:", "choices": ["12 feet minimum length, full length below grade", "5 feet minimum length, full length below grade", "8 feet minimum length, full length below grade", "20 feet minimum length, full length below grade"], "correct": 2, "exp": "Driven rod: 8 ft minimum, full length below grade. Often paired with second rod (resistance test). NEC.", "v": 5}, {"id": 4189, "domain": 1, "task": 5, "topic": "GEC 200A Ufer", "q": "The grounding electrode conductor (copper) for a 200A service to a Ufer electrode is:", "choices": ["#6 AWG copper conductor", "#10 AWG copper conductor", "#4 AWG copper conductor", "#8 AWG copper conductor"], "correct": 2, "exp": "200A service to Ufer: #4 AWG Cu. To rod: #6 (resistance limited). To water pipe: full size. NEC tables.", "v": 5}, {"id": 4190, "domain": 1, "task": 5, "topic": "Open Ground Risk", "q": "An open ground at a 3-prong receptacle creates which safety risk?", "choices": ["The receptacle won't power any plugged-in equipment", "Hot wire short to case has no fault path", "Polarity becomes wrong (hot and neutral swapped)", "Equipment shorts immediately to the chassis ground"], "correct": 1, "exp": "Open ground: if hot wire shorts to metal case, no fault path - case stays energized. Shock hazard. NEC.", "v": 5}, {"id": 4191, "domain": 1, "task": 5, "topic": "Reverse Polarity", "q": "Reverse polarity at a receptacle means which condition?", "choices": ["No power present (both hot terminals are dead)", "Hot and neutral wires are swapped at the terminals", "Voltage too high (above 130 V on the hot terminal)", "An open ground condition (no equipment ground present)"], "correct": 1, "exp": "Hot and neutral wires swapped. Equipment may operate but switched terminal becomes live. Defect. NEC.", "v": 5}, {"id": 4192, "domain": 1, "task": 5, "topic": "Backstab Defect", "q": "Backstabbed receptacles tend to fail because:", "choices": ["The small contact area loosens with thermal cycling", "The wire size is wrong for the backstab terminal", "The voltage at the receptacle is too high spec", "The plastic body becomes brittle from age"], "correct": 0, "exp": "Backstab: small contact area loosens with thermal cycling. Overheats, scorches, fails. Side screws better. Vol 1.", "v": 5}, {"id": 4193, "domain": 1, "task": 5, "topic": "Double-Tap", "q": "A double-tap (two conductors under one breaker terminal) is typically:", "choices": ["Always acceptable as a labor-saving practice", "Never acceptable under any code or any condition", "Required for redundancy on critical branch circuits", "Acceptable only if breaker is listed for two"], "correct": 3, "exp": "Most breakers listed for ONE conductor. Specific breakers (Sq D QO split lug) listed for two. NEC.", "v": 5}, {"id": 4194, "domain": 1, "task": 5, "topic": "Tamper Resist", "q": "Tamper-resistant (TR) receptacles are required in which residential locations?", "choices": ["Service panel locations only (not branch circuits)", "Bedrooms only (per NEC 2008 amendment)", "Bathrooms only (per NEC 2014 amendment)", "All dwelling unit receptacles (NEC 2008+)"], "correct": 3, "exp": "TR required all dwelling unit receptacles (NEC 2008+). Internal shutters block single-prong insertion. NEC.", "v": 5}, {"id": 4195, "domain": 1, "task": 5, "topic": "Aluminum Concern", "q": "Solid aluminum branch circuit wiring (1965\u20131973) primarily presents which concern?", "choices": ["Cannot legally be used in current installations", "Termination overheating from expansion/oxidation", "Rapid wire breakage from age-related embrittlement", "Insufficient ampacity for modern household loads"], "correct": 1, "exp": "Al expands/oxidizes/creeps. Loose terminations, arcing, fire. Remediate: COPALUM or AlumiConn. Vol 1.", "v": 5}, {"id": 4196, "domain": 1, "task": 5, "topic": "K&T Concern", "q": "Active knob-and-tube wiring presents which significant concerns?", "choices": ["Cannot legally be used in any current installation", "Termination overheating only at switch and outlet boxes", "Insufficient ampacity for modern household loads only", "Brittle insulation, no ground, no contact"], "correct": 3, "exp": "K&T: brittle aged insulation, no EGC, can't contact thermal insulation, often beyond capacity. Vol 1.", "v": 5}, {"id": 4197, "domain": 1, "task": 5, "topic": "Romex Damage", "q": "NM-B cable in attics within how far of the attic entry must be protected?", "choices": ["Within 6 feet of attic entry (running boards/conduit)", "Within 3 feet of attic entry (running boards/conduit)", "Within 12 feet of attic entry (running boards/conduit)", "No protection is required regardless of entry distance"], "correct": 0, "exp": "Within 6 ft of attic entry: must be protected (running boards or conduit). Beyond, between framing OK. NEC.", "v": 5}, {"id": 4198, "domain": 1, "task": 5, "topic": "Panel Clearance", "q": "The minimum working depth in front of an electrical panel is:", "choices": ["12 inches deep minimum working space", "36 inches deep minimum working space", "18 inches deep minimum working space", "30 inches deep minimum working space"], "correct": 1, "exp": "Working clear: 30 in wide, 36 in deep, 6.5 ft headroom. Cannot be obstructed. NEC.", "v": 5}, {"id": 4199, "domain": 1, "task": 5, "topic": "Panel Width Clear", "q": "The minimum working width in front of an electrical panel is:", "choices": ["30 inches wide minimum working space", "36 inches wide minimum working space", "12 inches wide minimum working space", "18 inches wide minimum working space"], "correct": 0, "exp": "Working clear: 30 in wide, 36 in deep, 6.5 ft high. Storage in front of panel is common defect. NEC.", "v": 5}, {"id": 4200, "domain": 1, "task": 5, "topic": "Color Hot", "q": "The standard residential color code for an ungrounded (hot) conductor is:", "choices": ["Black or red insulation color", "Green insulation color", "Bare copper (no insulation)", "White insulation color"], "correct": 0, "exp": "Standard: black/red = hot, white = neutral, green/bare = ground. White used as hot must be re-marked. NEC.", "v": 5}, {"id": 4201, "domain": 1, "task": 5, "topic": "Color Neutral", "q": "The standard residential color code for a grounded (neutral) conductor is:", "choices": ["Green insulation color", "White insulation color", "Black or red insulation color", "Bare copper (no insulation)"], "correct": 1, "exp": "White = neutral. Black/red = hot. Green/bare = ground. Re-mark white at terminations if used as hot. NEC.", "v": 5}, {"id": 4202, "domain": 1, "task": 5, "topic": "Color Ground", "q": "The standard residential color code for a grounding (equipment) conductor is:", "choices": ["Green insulation or bare copper", "Yellow insulation color", "Black or red insulation color", "White insulation color"], "correct": 0, "exp": "Green or bare copper = grounding (EGC). White = neutral. Black/red = hot. NEC.", "v": 5}, {"id": 4203, "domain": 1, "task": 5, "topic": "240V Setup", "q": "Single-phase 240/120V residential service consists of which conductors?", "choices": ["Three energized conductors plus one grounded neutral", "Four energized conductors with no grounded neutral", "Two energized 120V conductors plus one grounded neutral", "One energized 120V conductor plus one grounded neutral"], "correct": 2, "exp": "Single phase 240/120: 2 energized 120V + 1 grounded neutral. 240V between hots, 120V each to neutral. NEC.", "v": 5}, {"id": 4204, "domain": 1, "task": 5, "topic": "Three Phase", "q": "Three-phase electrical service typically applies to which type of property?", "choices": ["Multi-family apartment buildings under 4 units", "Most residential single-family homes built today", "Mostly commercial and industrial (rare residential)", "Single-wide manufactured (mobile) home installations"], "correct": 2, "exp": "Three-phase: mostly commercial/industrial. Rare in residential inspections. Larger residential may have it. Vol 1.", "v": 5}, {"id": 4205, "domain": 1, "task": 5, "topic": "GFCI Test", "q": "GFCI receptacles should be tested for proper operation at what frequency?", "choices": ["Weekly testing by the home occupant", "Monthly testing per manufacturer", "Annually testing by the home occupant", "Daily testing by the home occupant"], "correct": 1, "exp": "Monthly testing per mfr/code. Test button confirms trip. Receptacles fail (esp. damp areas). NEC/mfr.", "v": 5}, {"id": 4206, "domain": 1, "task": 5, "topic": "Smoke Alarm Life", "q": "Smoke alarms should be replaced at approximately what interval?", "choices": ["Every 20 years from date of manufacture", "Every 5 to 7 years from date of installation", "Every 1 to 2 years from date of installation", "Every 10 years from date of manufacture"], "correct": 3, "exp": "10 yr lifespan. Sensor degrades. Replace whole unit (not just battery). 10-yr sealed-battery models common. NFPA.", "v": 5}, {"id": 4207, "domain": 1, "task": 5, "topic": "CO Alarm Life", "q": "Carbon monoxide alarms should be replaced at approximately what interval?", "choices": ["Every 5 to 7 years from date of installation", "Every 20 years from date of installation", "Every 10 years from date of installation", "Every 1 to 2 years from date of installation"], "correct": 0, "exp": "CO alarm: 5-7 yr lifespan typical. Electrochemical sensor degrades. Replace per mfr (often end-of-life chirp). NFPA.", "v": 5}, {"id": 4208, "domain": 1, "task": 5, "topic": "Bonding vs Grounding", "q": "Bonding (versus grounding) refers to which connection type?", "choices": ["The same exact concept (terms used interchangeably)", "Connecting the system to earth ground via electrode", "Connecting metal parts to provide a low-resistance path", "Insulating from current flow (the same as grounding)"], "correct": 2, "exp": "Bonding: low-resistance return path between metal parts. Grounding: connection to earth. Different functions. NEC.", "v": 5}, {"id": 4209, "domain": 1, "task": 5, "topic": "Service Cable Damaged", "q": "If service entrance cable insulation is damaged, the inspector should:", "choices": ["Recommend evaluation by a qualified electrician", "Repair the damage with electrical tape personally", "Treat as cosmetic concern with no immediate action", "Note as standard wear pattern for cable of that age"], "correct": 0, "exp": "Damaged SE: significant hazard (shock, fire, weather). Recommend qualified electrician eval. Don't repair. Vol 1.", "v": 5}, {"id": 4210, "domain": 1, "task": 5, "topic": "Knockout Open", "q": "An open (unfilled) knockout in an electrical panel is:", "choices": ["Required for cooling air movement around breakers", "A safety defect (access to live parts, pest entry)", "Required for cable management routing convenience", "A premium feature on higher-grade electrical panels"], "correct": 1, "exp": "Defect: access to live parts, pest entry, water entry. Fill with KO seal or proper connector. NEC.", "v": 5}, {"id": 4211, "domain": 1, "task": 5, "topic": "Junction Box", "q": "All electrical splices and connections must be located where?", "choices": ["In accessible junction boxes with proper covers", "Inside conduit only (no enclosed boxes required)", "Inside walls covered with finish materials only", "Anywhere accessible (loose splices acceptable)"], "correct": 0, "exp": "Splices in accessible junction boxes (NOT buried in walls). Wire nuts in box, blank cover. NEC.", "v": 5}, {"id": 4212, "domain": 1, "task": 5, "topic": "Cable Clamping", "q": "Cable entering a metal electrical box must be:", "choices": ["Sealed with caulk only at the point of entry", "Painted at the entry point for corrosion control", "Secured with a listed cable clamp or connector", "Free to move loosely through the knockout opening"], "correct": 2, "exp": "Cable clamp at metal box: prevents pull-out, protects from sharp KO edges. Plastic boxes integral. NEC.", "v": 5}, {"id": 4213, "domain": 1, "task": 5, "topic": "GFCI Downstream", "q": "To verify GFCI protection extends to downstream receptacles, the inspector should:", "choices": ["Trip the GFCI, then test downstream loses power too", "Use visual inspection only (no testing required)", "Reset the breaker only and verify upstream first", "Test only the GFCI receptacle and assume downstream"], "correct": 0, "exp": "Plug 3-light tester at downstream, trip GFCI, confirm downstream loses power. Verifies protected zone. Vol 1.", "v": 5}, {"id": 4214, "domain": 1, "task": 5, "topic": "Disconnect AC", "q": "An outdoor AC condensing unit must have a service disconnect within:", "choices": ["Sight of the unit and within 100 feet maximum", "Sight of the unit and within 25 feet maximum", "Sight of the unit and within 50 feet maximum", "No sight requirement (any reasonable distance)"], "correct": 2, "exp": "Within sight AND within 50 ft of equipment. Allows safe lockout. Common defect: missing disconnect. NEC.", "v": 5}, {"id": 4215, "domain": 1, "task": 5, "topic": "Service Drop Pulled", "q": "If the service drop is pulled away from the structure, the inspector should:", "choices": ["Try to push the conductors back into place", "Notify the utility and document the condition", "Document the condition and otherwise ignore it", "Tape the conductors temporarily for safety"], "correct": 1, "exp": "Damaged/pulled service drop: serious hazard. Don't touch. Notify utility. Document and notify owner. Vol 1.", "v": 5}, {"id": 4216, "domain": 1, "task": 13, "topic": "Egress Area Above", "q": "A bedroom egress window above grade requires net clear opening area of:", "choices": ["5.7 sq ft minimum (above-grade location)", "5.0 sq ft minimum (above-grade location)", "3.0 sq ft minimum (above-grade location)", "8.0 sq ft minimum (above-grade location)"], "correct": 0, "exp": "Above-grade: 5.7 sq ft net clear. Grade-floor only: 5.0 sq ft. Plus width and height minimums. IRC.", "v": 5}, {"id": 4217, "domain": 1, "task": 13, "topic": "Egress Area Grade", "q": "A bedroom egress window at grade-floor location requires net clear opening area of:", "choices": ["5.7 sq ft minimum (grade-floor only)", "8.0 sq ft minimum (grade-floor only)", "5.0 sq ft minimum (grade-floor only)", "3.0 sq ft minimum (grade-floor only)"], "correct": 2, "exp": "Grade-floor only: 5.0 sq ft. Above-grade: 5.7 sq ft. Plus 20 in width, 24 in height min. IRC.", "v": 5}, {"id": 4218, "domain": 1, "task": 13, "topic": "Egress Width", "q": "An egress window minimum net clear opening width is:", "choices": ["30 inches minimum width", "24 inches minimum width", "20 inches minimum width", "16 inches minimum width"], "correct": 2, "exp": "Width: 20 in min. Combined with 24 in height min AND 5.7 sq ft area min. All must be met. IRC.", "v": 5}, {"id": 4219, "domain": 1, "task": 13, "topic": "Egress Height", "q": "An egress window minimum net clear opening height is:", "choices": ["24 inches minimum height", "20 inches minimum height", "30 inches minimum height", "22 inches minimum height"], "correct": 0, "exp": "Height: 24 in min. Combined with 20 in width min AND 5.7 sq ft area min. All required. IRC.", "v": 5}, {"id": 4220, "domain": 1, "task": 13, "topic": "Egress Sill", "q": "The maximum sill height of an egress window above the bedroom floor is:", "choices": ["24 inches maximum sill height", "44 inches maximum sill height", "60 inches maximum sill height", "36 inches maximum sill height"], "correct": 1, "exp": "Max sill: 44 in above floor. Higher requires permanent steps. Critical for child egress. IRC.", "v": 5}, {"id": 4221, "domain": 1, "task": 13, "topic": "Egress Door Width", "q": "The minimum clear width for a residential egress door is:", "choices": ["24 inches clear width (with proper hardware)", "32 inches clear width (typically 36 in slab)", "48 inches clear width (commercial standard)", "36 inches clear width (cleared at door stops)"], "correct": 1, "exp": "Egress: 32 in clear width min (typically 36 in slab). 78 in clear height. One side-hinged required. IRC.", "v": 5}, {"id": 4222, "domain": 1, "task": 13, "topic": "Egress Door Hardware", "q": "Egress door hardware must be operable from inside under which condition?", "choices": ["With tools provided in an accessible location", "With special knowledge of the lock mechanism", "With a key provided to all occupants", "Without keys, tools, or special knowledge"], "correct": 3, "exp": "Operable without keys, tools, or special knowledge from inside. Single-cyl deadbolt OK. Double-cyl violates. IRC.", "v": 5}, {"id": 4223, "domain": 1, "task": 13, "topic": "Garage Door 138", "q": "The door between an attached garage and the house interior must be:", "choices": ["Standard interior door with weatherstripping", "Hollow-core door with self-closing mechanism", "Glass-paneled door with safety glazing only", "1-3/8 inch solid wood OR 20-min fire-rated door"], "correct": 3, "exp": "1-3/8 in solid wood OR 20-min fire-rated, with self-closing hardware. Fire separation. IRC.", "v": 5}, {"id": 4224, "domain": 1, "task": 13, "topic": "Garage Wall Drywall", "q": "The wall between an attached garage and house interior requires which finish?", "choices": ["Standard 1/2 inch drywall on the garage side", "Brick veneer wall on the garage side as finish", "5/8 inch Type X drywall on the garage side", "No special drywall is required at the wall"], "correct": 2, "exp": "5/8 Type X drywall garage side. Penetrations sealed. 1-hr-equivalent fire resistance. IRC.", "v": 5}, {"id": 4225, "domain": 1, "task": 13, "topic": "Garage Above", "q": "If habitable space exists above an attached garage, the garage ceiling requires which finish?", "choices": ["Plywood sheathing only (no drywall required)", "5/8 inch Type X drywall (taped and finished)", "Standard 1/2 inch drywall (taped and finished)", "Open joist visible (no ceiling drywall required)"], "correct": 1, "exp": "5/8 Type X drywall, taped/finished. Fire-rated ceiling separation. Common defect at finished room above. IRC.", "v": 5}, {"id": 4226, "domain": 1, "task": 13, "topic": "Smoke Alarm Locations", "q": "Smoke alarms are required in all of the following EXCEPT which location?", "choices": ["Inside the kitchen (excluded due to nuisance trips)", "Outside each sleeping area (hall outside bedrooms)", "Inside each sleeping room (bedrooms required)", "Each level including the basement (required)"], "correct": 0, "exp": "Kitchen excluded (nuisance trip risk). Required: each bedroom, hall outside, each level. NFPA.", "v": 5}, {"id": 4227, "domain": 1, "task": 13, "topic": "Smoke Alarm Modern", "q": "Modern code typically requires smoke alarms in residential to be:", "choices": ["Hardwired and interconnected (one trips all sound)", "Battery-only operated (no hardwired requirement)", "Wifi-only connected (replacing hardwired alarms)", "Standalone independent (no interconnection required)"], "correct": 0, "exp": "Hardwired AND interconnected (one trips all sound). Battery backup required. Tamper-resistant. NFPA/IRC.", "v": 5}, {"id": 4228, "domain": 1, "task": 13, "topic": "CO Alarm Required", "q": "Carbon monoxide alarms are required in homes that have which feature?", "choices": ["Kitchen with electric cooktop and oven only", "Fuel-burning appliances OR an attached garage", "Bathroom with mechanical exhaust ventilation", "Detached garage only (not attached garage)"], "correct": 1, "exp": "CO required: outside sleeping areas in homes with fuel-burning appliances OR attached garage. NFPA/IRC.", "v": 5}, {"id": 4229, "domain": 1, "task": 13, "topic": "Sprinkler Painted", "q": "A painted fire sprinkler head is:", "choices": ["A defect requiring head replacement", "A required code item in some jurisdictions", "Acceptable decoration when carefully applied", "Better corrosion resistance for harsh environments"], "correct": 0, "exp": "Painted: prevents fusible element melt at rated temp, blocks deflector. Defect - replace head. NFPA 13D.", "v": 5}, {"id": 4230, "domain": 1, "task": 13, "topic": "Stair Lighting", "q": "Interior stairs require lighting that operates from which switching configuration?", "choices": ["Three-way switches at top and bottom of stairs", "No switches required (always-on lighting)", "Single switch at one end of the stair only", "Battery-operated only (no permanent wiring)"], "correct": 0, "exp": "3-way switching at top and bottom. Allows safe operation either direction. Common defect: one switch only. IRC.", "v": 5}, {"id": 4231, "domain": 1, "task": 13, "topic": "Egress Bars", "q": "Security bars on bedroom egress windows must operate how from inside?", "choices": ["Be permanently fixed (no release mechanism)", "Use a keyed lock with key kept by occupants", "Release without keys, tools, knowledge", "Be welded to the wall for maximum security"], "correct": 2, "exp": "Release from inside without keys, tools, or special knowledge. Permanent/keyed bars violate egress. IRC.", "v": 5}, {"id": 4232, "domain": 1, "task": 13, "topic": "Bath Heat Lamp", "q": "A bathroom heat lamp combined with a light/fan must meet which requirements?", "choices": ["Listed for application, GFCI, proper clearances", "Mounted only above the shower zone with no concern", "Generic outlet OK (no special listing required)", "Hardwired with no GFCI protection (per old codes)"], "correct": 0, "exp": "Properly listed, GFCI protected, adequate clearances, vapor-proof if shower zone. UL/IRC.", "v": 5}, {"id": 4233, "domain": 1, "task": 13, "topic": "Pool Door", "q": "Doors leading directly to a pool/spa area should have which feature?", "choices": ["Propped open routinely for ease of pool access", "Self-closing AND self-latching (or alarm)", "Keyed locks only with the key on the pool side", "Decorative latches with no automatic closing"], "correct": 1, "exp": "Self-closing/self-latching OR audible alarm (some jurisdictions). Multiple barriers (door + fence) typical. IRC.", "v": 5}, {"id": 4234, "domain": 1, "task": 13, "topic": "Garage Floor Slope", "q": "A garage floor connecting to an interior door should slope which direction?", "choices": ["Toward the interior house door (drainage path)", "Have no slope at all (level concrete pour)", "Equal in both directions (no functional slope)", "Toward the overhead garage door (away from house)"], "correct": 3, "exp": "Slope toward overhead door (away from house) OR door 4 in above OR 4-in curb. Prevents fuel/CO migration. IRC.", "v": 5}, {"id": 4235, "domain": 1, "task": 13, "topic": "Window Well Cover", "q": "An egress window well cover must operate how from inside the home?", "choices": ["Open from inside without keys, tools, knowledge", "Be permanently fixed in place for security", "Have no openings allowed (sealed condition)", "Be locked from outside with the key kept inside"], "correct": 0, "exp": "Operable from inside without tools, keys, or special knowledge. Otherwise violates egress life safety. IRC.", "v": 5}, {"id": 4236, "domain": 1, "task": 13, "topic": "Open Riser", "q": "Open risers on stairs higher than 30 inches above grade cannot allow passage of:", "choices": ["A 6-inch sphere through the open riser space", "A 4-inch sphere through the open riser space", "A 12-inch sphere through the open riser space", "A 2-inch sphere through the open riser space"], "correct": 1, "exp": "4 in sphere rule (same as guard balusters). Prevents child fall hazard. Many codes prohibit open risers. IRC.", "v": 5}, {"id": 4237, "domain": 1, "task": 13, "topic": "4 in Sphere", "q": "Guardrail balusters must be spaced so that what cannot pass between them?", "choices": ["A 4-inch sphere cannot pass through baluster spacing", "A 12-inch sphere cannot pass through baluster spacing", "A 2-inch sphere cannot pass through baluster spacing", "A 6-inch sphere cannot pass through baluster spacing"], "correct": 0, "exp": "4 in sphere rule. Prevents children from squeezing through or getting head stuck. IRC.", "v": 5}, {"id": 4238, "domain": 1, "task": 13, "topic": "Smoke Alarm Where", "q": "Smoke alarms should be installed in which combination of locations?", "choices": ["Kitchen near the stove (heat-source proximity)", "Living room only (one central alarm device)", "Each bedroom, outside sleeping, every level", "Mechanical room only (combustion-source proximity)"], "correct": 2, "exp": "Each sleeping room, outside sleeping areas, every level (incl. basement, habitable attic). Interconnected. NFPA.", "v": 5}, {"id": 4239, "domain": 1, "task": 13, "topic": "CO Alarm Where", "q": "Carbon monoxide alarms should be installed in which residential locations?", "choices": ["Living room only (one central alarm device)", "Mechanical room only (combustion-source proximity)", "Kitchen near the stove (heat-source proximity)", "Outside each sleeping area (each level)"], "correct": 3, "exp": "Outside each sleeping area in homes with fuel-burning or attached garage. Some codes: every level. NFPA.", "v": 5}, {"id": 4240, "domain": 1, "task": 13, "topic": "CO Symptoms", "q": "Carbon monoxide poisoning symptoms commonly include which signs?", "choices": ["Respiratory infection symptoms with fever and cough", "Joint pain, swelling, and limited range of motion", "Headache, nausea, dizziness, confusion, fatigue", "Skin localized burns and visible blisters at contact"], "correct": 2, "exp": "Headache, nausea, dizzy, confusion, fatigue. Severe: unconsciousness, death. Often mistaken for flu. NFPA.", "v": 5}, {"id": 4241, "domain": 1, "task": 13, "topic": "Dryer Lint", "q": "Lint accumulation in a clothes dryer vent system primarily creates which hazard?", "choices": ["A cosmetic concern only with no real safety issue", "Improved drying speed (insulating effect of lint)", "Normal aging condition that requires no maintenance", "A significant fire hazard (lint plus heat source)"], "correct": 3, "exp": "Significant fire hazard: restricted airflow + ignitable lint + heat = fire. Annual cleaning min. IRC/NFPA.", "v": 5}, {"id": 4242, "domain": 1, "task": 13, "topic": "Sleeping Area", "q": "An NHIE-relevant 'sleeping area' is defined as which space?", "choices": ["Bedroom plus its access hallway", "The whole upstairs floor regardless of room types", "The living room only (where occupants spend most time)", "Just the bedroom room itself (not hall or access)"], "correct": 0, "exp": "Sleeping area = bedroom + its access hallway. Smoke alarms in bedroom AND outside (hall). NFPA.", "v": 5}, {"id": 4243, "domain": 1, "task": 13, "topic": "Mechanical Comb Air", "q": "A mechanical room with fuel-burning equipment requires which feature?", "choices": ["Sealed completely from outside air (no openings)", "Adequate combustion air for the BTU input", "Carpeted floor finish for sound dampening only", "Heated to 80\u00b0F to prevent cold-start failures"], "correct": 1, "exp": "Adequate combustion air per BTU. Proper venting. Clearances. Working CO alarm nearby. IRC.", "v": 5}, {"id": 4244, "domain": 1, "task": 13, "topic": "Pull-Down Garage", "q": "A pull-down attic stair installed in an attached-garage ceiling can:", "choices": ["Improve attic access without affecting fire rating", "Breach the fire-rated separation if not rated", "Be required by some codes for code compliance", "Have no impact on the fire-rating performance"], "correct": 1, "exp": "Breaches fire separation between garage and habitable space above. Use fire-rated stair products. IRC.", "v": 5}, {"id": 4245, "domain": 1, "task": 13, "topic": "GFCI Bath", "q": "GFCI receptacle protection is required in which residential location?", "choices": ["Only receptacles installed in the bath countertop", "Only the receptacle directly adjacent to the sink", "Only receptacles on the wall opposite the sink", "All bathroom receptacles regardless of distance"], "correct": 3, "exp": "ALL bathroom receptacles GFCI protected. Same for kitchen counter, garage, outdoor, near sinks. NEC.", "v": 5}, {"id": 4246, "domain": 1, "task": 12, "topic": "Hearth Large", "q": "A masonry fireplace hearth extension for openings \u22656 sq ft is:", "choices": ["16 inches in front, 8 inches each side", "20 inches in front, 12 inches each side", "12 inches in front, 8 inches each side", "24 inches in front, 16 inches each side"], "correct": 1, "exp": "\u22656 sq ft opening: 20 in front, 12 in each side. <6 sq ft: 16 in front, 8 in side. IRC.", "v": 5}, {"id": 4247, "domain": 1, "task": 12, "topic": "Hearth Small", "q": "A masonry fireplace hearth extension for openings <6 sq ft is:", "choices": ["12 inches in front, 8 inches each side", "16 inches in front, 8 inches each side", "20 inches in front, 12 inches each side", "24 inches in front, 16 inches each side"], "correct": 1, "exp": "<6 sq ft: 16 in front, 8 in each side. \u22656 sq ft: 20 in front, 12 in side. IRC.", "v": 5}, {"id": 4248, "domain": 1, "task": 12, "topic": "3-2-10 Above", "q": "A chimney must extend above the roof at the penetration point at minimum:", "choices": ["2 feet above the roof at penetration", "1 foot above the roof at penetration", "4 feet above the roof at penetration", "3 feet above the roof at penetration"], "correct": 3, "exp": "3-2-10 rule: 3 ft above roof at penetration. AND 2 ft above any portion within 10 ft horizontally. NFPA 211.", "v": 5}, {"id": 4249, "domain": 1, "task": 12, "topic": "3-2-10 Within", "q": "A chimney must extend above any portion of the building within 10 ft horizontal distance at minimum:", "choices": ["3 feet above any building portion within 10 ft", "2 feet above any building portion within 10 ft", "4 feet above any building portion within 10 ft", "1 foot above any building portion within 10 ft"], "correct": 1, "exp": "3-2-10 rule: 2 ft above any building portion within 10 ft horizontally. AND 3 ft above roof penetration. NFPA 211.", "v": 5}, {"id": 4250, "domain": 1, "task": 12, "topic": "Cricket Width", "q": "A roof cricket (saddle) is required for chimneys wider than:", "choices": ["24 inches wide measured perpendicular to slope", "48 inches wide measured perpendicular to slope", "12 inches wide measured perpendicular to slope", "30 inches wide measured perpendicular to slope"], "correct": 3, "exp": "Cricket required for chimneys >30 in wide (measured perpendicular to slope). Diverts water. IRC.", "v": 5}, {"id": 4251, "domain": 1, "task": 12, "topic": "Spark Arrestor", "q": "A spark arrestor mounted on a chimney is intended to perform which function?", "choices": ["Decorate the chimney cap (cosmetic appearance)", "Improve draft updraft on natural-draft systems", "Block embers from leaving the chimney top", "Reduce creosote buildup on the flue interior"], "correct": 2, "exp": "Spark arrestor: mesh prevents embers leaving (igniting roofs/vegetation). Often combined with rain cap. NFPA 211.", "v": 5}, {"id": 4252, "domain": 1, "task": 12, "topic": "Stage I Creo Fire", "q": "Stage I (first-degree) creosote in a chimney appears as which condition?", "choices": ["Heavy tar-like dark deposit that resists removal", "Wet liquid black runoff visible at the cleanout door", "Hard shiny glazed coating fused to the flue surface", "Light flaky brown or black ash that brushes off easily"], "correct": 3, "exp": "Stage I: flaky brown/black ash, easy to remove, least flammable. Stage II: tar-like. Stage III: hard glaze. NFPA.", "v": 5}, {"id": 4253, "domain": 1, "task": 12, "topic": "Stage II Creo", "q": "Stage II (second-degree) creosote in a chimney appears as which condition?", "choices": ["Wet liquid black runoff visible at the cleanout door", "Light flaky brown or black ash that brushes off easily", "Hard shiny glazed coating fused to the flue surface", "Heavy tar-like dark deposit that resists removal"], "correct": 3, "exp": "Stage II: heavy tar-like dark deposit. More flammable, harder to remove than Stage I. NFPA 211.", "v": 5}, {"id": 4254, "domain": 1, "task": 12, "topic": "Stage III Creo Fire", "q": "Stage III (third-degree) creosote in a chimney appears as which condition?", "choices": ["Hard shiny glazed coating fused to the flue surface", "Heavy tar-like dark deposit that resists removal", "Light flaky brown or black ash that brushes off easily", "Wet liquid black runoff visible at the cleanout door"], "correct": 0, "exp": "Stage III: hard, shiny glaze. Highly flammable, very difficult to remove. May need flue replacement. NFPA.", "v": 5}, {"id": 4255, "domain": 1, "task": 12, "topic": "Smoke Chamber", "q": "The smoke chamber in a masonry fireplace is located where in the structure?", "choices": ["Above damper, below the flue (transition)", "At the hearth level (in front of the firebox)", "In the firebox bottom (where logs sit)", "At the top of the chimney (just below the cap)"], "correct": 0, "exp": "Smoke chamber: above damper, transitions firebox to flue. Should be parged smooth (modern code). IRC.", "v": 5}, {"id": 4256, "domain": 1, "task": 12, "topic": "Damper Location", "q": "The damper in a traditional masonry fireplace is located where?", "choices": ["At the very top of the chimney (top-sealing position)", "At the hearth level (in front of the firebox opening)", "Above firebox at the throat, before smoke chamber", "In the smoke shelf area (behind the smoke chamber)"], "correct": 2, "exp": "Damper: above firebox at throat. Closed when not in use. Top-sealing dampers (chimney top) seal better. NFPA.", "v": 5}, {"id": 4257, "domain": 1, "task": 12, "topic": "Gas Damper Stop", "q": "A gas log set installed in a masonry fireplace requires the damper to be:", "choices": ["Closed when off (manual operation by user)", "Removed entirely from the fireplace structure", "Permanently stopped open OR locked open", "Operating freely (closed when not in use)"], "correct": 2, "exp": "Damper locked open OR damper stop ensuring partial opening. Otherwise CO can be trapped indoors. NFPA.", "v": 5}, {"id": 4258, "domain": 1, "task": 12, "topic": "Direct Vent FP", "q": "A direct-vent gas fireplace appliance is characterized by which feature?", "choices": ["No vent system at all (vent-free design)", "Standard chimney use (Cat I venting same as woodburn)", "Sealed combustion (concentric pipes \u2014 exhaust + intake)", "Open to room air (combustion air drawn from room)"], "correct": 2, "exp": "Direct vent: sealed combustion (concentric pipes - inner exhaust, outer intake). Through-wall typical. NFPA.", "v": 5}, {"id": 4259, "domain": 1, "task": 12, "topic": "Vent-Free", "q": "A vent-free gas appliance is characterized by which feature?", "choices": ["Outside combustion air supply with indoor exhaust", "Sealed combustion with concentric vent pipe to outside", "Standard chimney use for combustion gas exhaust", "Combustion products discharge into the room (no flue)"], "correct": 3, "exp": "Vent-free: no flue, all combustion products into room. Banned in some jurisdictions (Canada). IAQ concern. NFPA.", "v": 5}, {"id": 4260, "domain": 1, "task": 12, "topic": "Wood Stove Standard", "q": "A wood stove without a listed reduced-clearance label requires clearance to combustibles of:", "choices": ["48 inches on all sides minimum", "36 inches on all sides minimum", "18 inches on all sides minimum", "12 inches on all sides minimum"], "correct": 1, "exp": "36 in to combustibles unless tested/listed for less. Many UL-listed allow reduced (12-18 in). NFPA 211.", "v": 5}, {"id": 4261, "domain": 1, "task": 12, "topic": "Pellet Stove", "q": "A pellet stove is characterized by burning which fuel?", "choices": ["Electric resistance elements (no combustion)", "Natural gas piped from the household supply", "Kerosene oil burned via wick or pressurized jet", "Compressed wood/biomass pellets fed via auger"], "correct": 3, "exp": "Pellet stove: burns compressed wood/biomass pellets via auger/fan. Higher efficiency than logs. NFPA.", "v": 5}, {"id": 4262, "domain": 1, "task": 12, "topic": "Mfd Fireplace", "q": "A factory-built (zero-clearance) fireplace consists of which construction?", "choices": ["Concrete block firebox with applied refractory finish", "Solid masonry brick construction with mortar joints", "Sheet metal liner installed inside masonry chimney", "Pre-assembled metal firebox/chimney system"], "correct": 3, "exp": "Manufactured: pre-assembled metal firebox/chimney, listed as system. Can't mix brands. NFPA 211.", "v": 5}, {"id": 4263, "domain": 1, "task": 12, "topic": "Chimney Crown", "q": "The chimney crown is which structural element?", "choices": ["The base of the chimney at roof level (flashing)", "The sloped concrete top surface that sheds water", "The decorative top cap mounted on the chimney", "The inner flue lining material (clay or stainless)"], "correct": 1, "exp": "Crown: sloped concrete top of chimney mass that sheds water. Cracks = water entry, deterioration. NFPA.", "v": 5}, {"id": 4264, "domain": 1, "task": 12, "topic": "Liner Required", "q": "A masonry chimney serving a fireplace requires which interior component?", "choices": ["A pebble bed only (decorative interior)", "Open masonry only (no liner required)", "No liner is needed under any current code", "A clay tile or stainless steel flue liner"], "correct": 3, "exp": "Flue liner: clay tile (traditional) or stainless steel (retrofit). Without: gas attack, water entry, CO leak. IRC.", "v": 5}, {"id": 4265, "domain": 1, "task": 12, "topic": "NFPA 211", "q": "NFPA 211 is the standard for which equipment category?", "choices": ["Plumbing systems including DWV and supply piping", "Electrical wiring code for residential structures", "Chimneys, fireplaces, vents, fuel appliances", "HVAC mechanical code for residential systems"], "correct": 2, "exp": "NFPA 211: chimneys, fireplaces, vents, solid fuel appliances. Level 2 inspection at every property transfer. NFPA.", "v": 5}, {"id": 4266, "domain": 1, "task": 12, "topic": "Soot Stains Ext", "q": "Soot stains visible on the exterior of a chimney indicate which possible condition?", "choices": ["Normal operation of a properly functioning chimney", "Possible flue gas leakage through cracks", "Good seal of the interior flue liner system", "Improved draft pattern from exterior wind effects"], "correct": 1, "exp": "Exterior soot: possible flue gas leak through cracks. Recommend Level 2 chimney inspection. NFPA.", "v": 5}, {"id": 4267, "domain": 1, "task": 12, "topic": "Combustion Air Tight", "q": "Tight modern homes with masonry fireplaces typically require which feature?", "choices": ["No combustion air at all (sealed firebox design)", "Outside combustion air only when also using HRV", "Indoor air for combustion (no special provisions)", "Outside combustion air ducted to firebox"], "correct": 3, "exp": "Tight homes: outside combustion air ducted to firebox. Avoids depressurization, improves performance. IRC.", "v": 5}, {"id": 4268, "domain": 1, "task": 12, "topic": "Damper Rusted", "q": "A fireplace damper that is rusted shut or non-functional is:", "choices": ["Required for energy efficiency in cold climates", "A defect requiring repair or top-seal replacement", "Acceptable as found (not affecting function)", "A decorative-only feature with no functional purpose"], "correct": 1, "exp": "Non-functional damper: defect. Can't close (heat loss) or fully open (poor draft). Repair or top-seal. NFPA.", "v": 5}, {"id": 4269, "domain": 1, "task": 12, "topic": "Hearth Material", "q": "Hearth and hearth extension must be constructed of which material type?", "choices": ["Plywood with ceramic tile applied to top surface", "Non-combustible (masonry, tile, stone, metal)", "Carpet only (within fireplace surround area)", "Wood with fire-resistant paint applied to surface"], "correct": 1, "exp": "Non-combustible: masonry, tile, stone, metal. Wood/carpet under raised hearth = serious fire hazard. IRC.", "v": 5}, {"id": 4270, "domain": 1, "task": 12, "topic": "Mfd Mix Brands", "q": "Mixing components from different brands in a manufactured fireplace system is:", "choices": ["An improvement to overall fireplace quality", "Required for upgrade to higher capacity rating", "Unsafe (voids the listing and the tested system)", "Standard practice in current installation methods"], "correct": 2, "exp": "Manufactured fireplace: tested as system. Mixing brands voids listing, unsafe. Match parts. NFPA.", "v": 5}, {"id": 4271, "domain": 1, "task": 12, "topic": "Chimney Flashing", "q": "Chimney flashing typically consists of which combination of components?", "choices": ["Step flashing on the sides plus base flashing in front", "Tar applied around the chimney base only", "A single wrapped piece around the chimney perimeter", "Caulk applied liberally around the chimney base"], "correct": 0, "exp": "Step flashing sides + base flashing front. Saddle (cricket) on uphill side if >30 in wide. IRC.", "v": 5}, {"id": 4272, "domain": 1, "task": 12, "topic": "Inspector Limit FP", "q": "When inspecting a fireplace, the home inspector should:", "choices": ["Disclaim Level 2 (recommend CSIA-certified sweep)", "Always rebuild any chimney with visible defects", "Clean creosote out of the chimney during inspection", "Light a test fire to verify draft and operation"], "correct": 0, "exp": "Disclaim Level 2 (full internal/camera). Recommend CSIA-certified sweep at every transfer (NFPA 211).", "v": 5}, {"id": 4273, "domain": 1, "task": 12, "topic": "Wood Stove Hearth Pad", "q": "A wood stove hearth pad must be sized according to which standard?", "choices": ["2 feet on all sides of the stove as a generic rule", "Per the manufacturer's listing for that specific stove", "There is no requirement at all (generic safe distance)", "6 inches all around the stove perimeter as standard"], "correct": 1, "exp": "Per mfr listing. Tested R-value and dimensions. Generic 'safe distance' doesn't apply with listed unit. UL.", "v": 5}, {"id": 4274, "domain": 1, "task": 12, "topic": "FP Foundation", "q": "A masonry chimney requires which type of foundation support?", "choices": ["No foundation is required (corbeled from wall)", "Adequate independent foundation (heavy mass)", "A foundation shared with an adjacent deck only", "A wood platform on bearing ground is acceptable"], "correct": 1, "exp": "Adequate independent foundation. Heavy mass. Can settle independently. Tied with masonry anchors. IRC.", "v": 5}, {"id": 4275, "domain": 1, "task": 12, "topic": "CO Source FP", "q": "A common source of carbon monoxide in homes with fuel-burning equipment is:", "choices": ["HVAC condenser fan running on hot summer days", "Closed window seals trapping interior air", "Refrigerator coils running during peak demand", "Improperly vented or backdrafting fuel burners"], "correct": 3, "exp": "Improperly vented or backdrafting fuel burners. Attached garage with running vehicles. NFPA.", "v": 5}, {"id": 4276, "domain": 1, "task": 3, "topic": "Asphalt Std Min", "q": "Standard asphalt shingle installation requires a minimum slope of:", "choices": ["1:12 minimum slope for any asphalt installation", "4:12 minimum slope for standard installation", "2:12 minimum slope for any asphalt installation", "6:12 minimum slope for standard installation"], "correct": 1, "exp": "Standard: 4:12 min. 2:12-4:12 with double underlayment. <2:12: low-slope roofing required. IRC.", "v": 5}, {"id": 4277, "domain": 1, "task": 3, "topic": "Asphalt Low Min", "q": "Asphalt shingles with double underlayment are permitted on slopes as low as:", "choices": ["1:12 minimum slope (with double underlayment)", "2:12 minimum slope (with double underlayment)", "4:12 minimum slope (standard installation)", "6:12 minimum slope (premium installation)"], "correct": 1, "exp": "2:12-4:12 with double underlayment. <2:12 needs different roof system entirely. Standard: 4:12+. IRC.", "v": 5}, {"id": 4278, "domain": 1, "task": 3, "topic": "Ice Barrier WI", "q": "In Wisconsin, ice barrier underlayment must extend from the eave to inside the warm wall by:", "choices": ["12 inches inside the exterior wall line", "24 inches inside the exterior wall line", "36 inches inside the exterior wall line", "Not required at all in this state"], "correct": 1, "exp": "From eave to 24 in inside warm wall. Required where mean Jan temp <25\u00b0F. Ice dam protection. IRC.", "v": 5}, {"id": 4279, "domain": 1, "task": 3, "topic": "Underlayment Std", "q": "Standard slope (4:12+) asphalt shingle installation requires which underlayment?", "choices": ["No underlayment is required for standard slope", "Double layer of 30# felt (for ice protection)", "Three layers of 30# felt with cement bonding", "Single layer of 15# felt or equivalent synthetic"], "correct": 3, "exp": "4:12+: single 15# felt or equivalent synthetic. 2:12-4:12: double layer (or full ice barrier). IRC.", "v": 5}, {"id": 4280, "domain": 1, "task": 3, "topic": "Reroof Layers", "q": "Most building codes limit asphalt shingle layers to a maximum of:", "choices": ["3 layers maximum (with structural review)", "4 layers maximum (with structural review)", "1 layer maximum (single layer only)", "2 layers maximum (most jurisdictions)"], "correct": 3, "exp": "Most codes: max 2 layers. Beyond that, structural load and underlying problem detection unacceptable. IRC.", "v": 5}, {"id": 4281, "domain": 1, "task": 3, "topic": "Step Flash", "q": "Step flashing is used at which roof condition?", "choices": ["Skylights only (not at any other location)", "Flat roof meeting a parapet wall boundary", "Sloped roof meeting a vertical wall surface", "Chimneys only (not at any other location)"], "correct": 2, "exp": "Step flashing: where sloped roof meets vertical wall. L-shape, one per shingle course. Counter flash above. IRC.", "v": 5}, {"id": 4282, "domain": 1, "task": 3, "topic": "Drip Edge", "q": "Drip edge installed at the eaves serves which primary function?", "choices": ["Prevents ice damming during winter conditions", "Directs water into gutter, away from fascia", "Decorates the eave (cosmetic appearance only)", "Holds the shingles tight to the deck below"], "correct": 1, "exp": "Directs water into gutter, away from fascia. Required by IRC at eaves and rakes (since 2012). IRC.", "v": 5}, {"id": 4283, "domain": 1, "task": 3, "topic": "Gutter Slope", "q": "Gutters should slope toward downspouts at approximately what rate?", "choices": ["No slope required (level installation acceptable)", "1 inch per 1 foot toward downspouts (steep)", "1/4 inch per 10 feet toward downspouts", "6 inches per 1 foot toward downspouts (very steep)"], "correct": 2, "exp": "~1/4 in per 10 ft toward downspouts. More OK but visible diagonal. Insufficient = ponding/sag. Standard.", "v": 5}, {"id": 4284, "domain": 1, "task": 3, "topic": "2x3 Downspout", "q": "A 2x3 inch downspout typically serves what roof drainage area?", "choices": ["Approximately 100 sq ft of roof area", "Unlimited area (no capacity restriction)", "Approximately 600 sq ft of roof area", "Approximately 1,200 sq ft of roof area"], "correct": 2, "exp": "2x3 in: ~600 sq ft. 3x4 in: ~1200 sq ft. Larger steeper roofs need more capacity. Standard.", "v": 5}, {"id": 4285, "domain": 1, "task": 3, "topic": "3x4 Downspout", "q": "A 3x4 inch downspout typically serves what roof drainage area?", "choices": ["Approximately 600 sq ft of roof area", "Approximately 100 sq ft of roof area", "Approximately 1,200 sq ft of roof area", "Unlimited area (no capacity restriction)"], "correct": 2, "exp": "3x4 in: ~1200 sq ft. 2x3 in: ~600 sq ft. Larger required for greater roof areas. Standard.", "v": 5}, {"id": 4286, "domain": 1, "task": 3, "topic": "NFA Definition", "q": "NFA in the context of attic ventilation refers to which term?", "choices": ["Net Free Area (true airflow, after screens)", "National Flash (a flashing standard for roof venting)", "Net Filter Area (the surface filtered by attic insulation)", "Negative Flow (the vacuum pressure in the attic)"], "correct": 0, "exp": "NFA = Net Free Area. Actual airflow opening (accounts for screens/louvers). 1:150 ratio typical attic. IRC.", "v": 5}, {"id": 4287, "domain": 1, "task": 3, "topic": "Ridge Vent", "q": "Ridge vents work most effectively when paired with which other vent type?", "choices": ["Soffit vents at the eaves (low-side intake)", "Sealed both ends (no other intake required)", "Gable vents only (cross-flow ventilation)", "An attic power fan (mechanical exhaust)"], "correct": 0, "exp": "Ridge vent (high exhaust) + soffit (low intake) = balanced passive ventilation. Without intake, pulls indoor. IRC.", "v": 5}, {"id": 4288, "domain": 1, "task": 3, "topic": "Architectural", "q": "Architectural (laminated) shingles compared to 3-tab shingles are:", "choices": ["Required by all current building codes (3-tabs banned)", "Thinner, lighter, with shorter warranty (10\u201315 yrs)", "Thicker, heavier; longer warranty (30-50 yr)", "Not allowed on slopes greater than 6:12 (steep slopes)"], "correct": 2, "exp": "Architectural: thicker, heavier, longer warranty (30-50 yr vs 20-25). Largely replaced 3-tab. Industry.", "v": 5}, {"id": 4289, "domain": 1, "task": 3, "topic": "Wood Shake vs Shingle", "q": "Wood shakes differ from wood shingles by being:", "choices": ["Plywood-backed only versus solid wood backing", "A composite product versus a solid wood product", "Split (rustic, thicker) vs sawn (uniform)", "Sawn smooth and thin versus split rustic and thick"], "correct": 2, "exp": "Shakes: split (rustic, thicker). Shingles: sawn (uniform, thinner). Both typically western red cedar. Industry.", "v": 5}, {"id": 4290, "domain": 1, "task": 3, "topic": "Metal Lifespan", "q": "Quality metal roofs typically last how long versus 20\u201330 years for asphalt?", "choices": ["10 to 20 years (less than asphalt)", "40 to 70+ years (vs asphalt 20\u201330 years)", "100+ years (significantly more than asphalt)", "20 to 30 years (similar to asphalt)"], "correct": 1, "exp": "Quality metal: 40-70+ years vs 20-30 asphalt. Higher upfront, longer life, recyclable. Industry.", "v": 5}, {"id": 4291, "domain": 1, "task": 3, "topic": "Tile Load", "q": "Clay tile roofing imposes a structural load of approximately:", "choices": ["Approximately 100 lb per square (lighter than asphalt)", "Approximately 2,000 lb per square (very heavy load)", "Approximately 300 lb per square (similar to asphalt)", "Approximately 700 lb per square (vs asphalt 200\u2013300)"], "correct": 3, "exp": "Clay/concrete tile: 700-1200 lb/sq vs asphalt 200-300. Roof structure must accommodate. IRC.", "v": 5}, {"id": 4292, "domain": 1, "task": 3, "topic": "Mod Bit", "q": "Modified bitumen is a roofing material commonly used on which roof type?", "choices": ["Tile substrates (underlayment for clay tile)", "Underlayment use only (not as a finish surface)", "Low-slope roofs (rolled with polymer modifiers)", "Steep slope homes (asphalt shingle replacement)"], "correct": 2, "exp": "Mod-bit: low-slope rolled roofing with polymer modifiers (APP/SBS). Common on flat residential. Industry.", "v": 5}, {"id": 4293, "domain": 1, "task": 3, "topic": "EPDM", "q": "EPDM is a roofing material commonly used on which roof type?", "choices": ["Tile substrates (underlayment for clay tile)", "Asphalt substrates (overlay material for shingles)", "Steep slope homes (asphalt shingle replacement)", "Low-slope roofs (synthetic rubber single-ply)"], "correct": 3, "exp": "EPDM: synthetic rubber single-ply for low-slope roofs. Large sheets, seamed. 20-30+ year life. Industry.", "v": 5}, {"id": 4294, "domain": 1, "task": 3, "topic": "Vent Plumbing", "q": "Plumbing vent pipes through asphalt shingle roofs are flashed with:", "choices": ["Tar and caulk applied around the pipe base", "A single layer of felt applied around the pipe", "Metal base plate plus neoprene/EPDM rubber boot", "Masonry crown poured around the pipe at roof"], "correct": 2, "exp": "Metal base flange + neoprene/EPDM rubber collar (boot). Boot deteriorates from UV first. IRC.", "v": 5}, {"id": 4295, "domain": 1, "task": 3, "topic": "Skylight Leak", "q": "The most common cause of skylight leakage is which factor?", "choices": ["Inadequate insulation around the skylight curb", "Excessive ventilation pulling water past the seal", "Improper or weathered flashing around the skylight", "Glass panel failure (cracked or broken pane)"], "correct": 2, "exp": "Skylight flashing: dominant leak cause. Improper install or weathered. Curb-mount needs step flashing. IRC.", "v": 5}, {"id": 4296, "domain": 1, "task": 3, "topic": "End-of-Life", "q": "Asphalt shingle end-of-life indicators commonly include which signs?", "choices": ["Granule loss, curling, brittleness, exposed nails", "Tight seal-tab adhesion (no lifted tabs visible)", "Dark fresh shingles (consistent black appearance)", "Color uniformity (signs of fresh installation)"], "correct": 0, "exp": "End-of-life: granule loss, curling/cupping, brittleness, loss of seal-tab, exposed nails. Industry.", "v": 5}, {"id": 4297, "domain": 1, "task": 3, "topic": "Walk Decision", "q": "When inspecting a roof, the inspector should walk the roof when:", "choices": ["Always use binoculars (never walk any roof type)", "Refuse always (use binoculars or drone only)", "It is safe to walk (slope, condition, weather permit)", "Always (regardless of slope or weather conditions)"], "correct": 2, "exp": "Walk when safe. Don't walk: too steep (8:12+), brittle (slate/tile), wet/icy, too high. Vol 1.", "v": 5}, {"id": 4298, "domain": 1, "task": 3, "topic": "Power Vent Concern", "q": "A common concern with attic power ventilators is that they may:", "choices": ["Be required by all current building codes (mandate)", "Reduce roof temperatures below dew point in summer", "Increase ridge moss growth on the roof surface", "Pull conditioned air through ceiling penetrations"], "correct": 3, "exp": "Power vents can depressurize attic, pull conditioned air through ceiling penetrations. Many prefer passive. Industry.", "v": 5}, {"id": 4299, "domain": 1, "task": 3, "topic": "Closed Cut", "q": "A closed-cut valley uses which construction technique?", "choices": ["Open metal flashing in the valley with cut shingle edges on both sides", "A membrane only in the valley (no shingle coverage in valley)", "Plywood substrate exposed in the valley with sealant only", "Shingles from one slope cross the valley; other side cut at chalk line"], "correct": 3, "exp": "Closed-cut: shingles from one slope cross valley, other side cut at chalk line. Open valley uses metal. Industry.", "v": 5}, {"id": 4300, "domain": 1, "task": 3, "topic": "Cricket Saddle", "q": "A roof cricket (saddle) is built behind a chimney to:", "choices": ["Drain water along the eave (parallel to gutter)", "Prevent insect entry at the chimney base", "Divert water around the uphill side of the chimney", "Hold flashings tight against the chimney wall"], "correct": 2, "exp": "Cricket: small peaked structure behind chimney (uphill side) diverts water around. Required >30 in wide. IRC.", "v": 5}, {"id": 4301, "domain": 1, "task": 3, "topic": "Aluminum Galvanic", "q": "Aluminum flashing in direct contact with copper or pressure-treated wood will:", "choices": ["Bond permanently for a stronger connection", "Last much longer than non-contact applications", "Corrode galvanically (use stainless instead)", "Have no interaction (compatible across materials)"], "correct": 2, "exp": "Aluminum reacts galvanically with Cu and chemically with ACQ-treated lumber. Use stainless or compatible. Industry.", "v": 5}, {"id": 4302, "domain": 1, "task": 3, "topic": "Snow Inspect", "q": "If snow covers the roof at the time of inspection, the inspector should:", "choices": ["Disclaim, document, recommend re-inspection", "Skip the roof inspection entirely (not in scope)", "Rate the roof as defective (cannot verify condition)", "Clear the snow manually to enable full inspection"], "correct": 0, "exp": "Snow limits roof inspection. Disclaim, document conditions, recommend re-inspection. Note visible defects. Vol 1.", "v": 5}, {"id": 4303, "domain": 1, "task": 3, "topic": "Counter Flash", "q": "Counter flashing is which type of flashing component?", "choices": ["The roof-edge drip metal at the eave above gutter", "The valley flashing piece in a closed-cut valley", "The skylight curb part (not the deck flashing)", "Wall-attached flashing covering the step flashing"], "correct": 3, "exp": "Counter flashing: embedded/attached to wall, overlaps step or base flashing below. Two-piece system. IRC.", "v": 5}, {"id": 4304, "domain": 1, "task": 3, "topic": "Visible Defects EXCEPT", "q": "All of the following are typical roof defects EXCEPT:", "choices": ["Lifted or missing shingles at the field of roof", "Uniform shingle color across the entire surface", "Damaged or deteriorated flashings at penetrations", "Granule loss exposing the asphalt mat below"], "correct": 1, "exp": "Uniform color = not a defect. Granule loss, lifted/missing shingles, damaged flashings = defects. Vol 1.", "v": 5}, {"id": 4305, "domain": 1, "task": 6, "topic": "Attic NFA Ratio", "q": "Attic ventilation requires net free area at minimum ratio of vent area to attic floor area of:", "choices": ["1:50 ratio of vent area to attic floor area", "1:600 ratio of vent area to attic floor area", "1:1,000 ratio of vent area to attic floor area", "1:150 ratio (or 1:300 with vapor barrier)"], "correct": 3, "exp": "1:150 attic floor area, OR 1:300 with proper vapor barrier and balanced high/low venting. IRC.", "v": 5}, {"id": 4306, "domain": 1, "task": 6, "topic": "WI Climate Zone", "q": "Milwaukee, Wisconsin is in which IECC climate zone for insulation requirements?", "choices": ["Climate Zone 6 (cold climate)", "Climate Zone 7 (very cold climate)", "Climate Zone 5 (cool climate)", "Climate Zone 4 (mixed climate)"], "correct": 0, "exp": "Milwaukee: Climate Zone 6 (cold). Northern WI: Zone 7. Drives R-value requirements. IECC.", "v": 5}, {"id": 4307, "domain": 1, "task": 6, "topic": "Attic R-Value WI", "q": "Attic insulation in IECC Climate Zone 6 (Milwaukee) requires minimum R-value of:", "choices": ["R-38 minimum for new construction attic insulation", "R-49 minimum for new construction attic insulation", "R-60 minimum for new construction attic insulation", "R-30 minimum for new construction attic insulation"], "correct": 1, "exp": "Zone 6: R-49 attic. Zone 4-5: R-38. Zone 7-8: R-49 or R-60. IECC 2021.", "v": 5}, {"id": 4308, "domain": 1, "task": 6, "topic": "Wall R-Value WI", "q": "Wood-frame wall insulation in Climate Zone 6 requires minimum R-value of approximately:", "choices": ["R-11 cavity (no continuous insulation required)", "R-20 cavity OR R-13+R-5 continuous insulation", "R-13 cavity (no continuous ins
