arth must be non-combustible and properly sized. Common defect: wood floor under raised hearth without proper extension to the front of the firebox."},{"id":313,"domain":1,"task":12,"topic":"Fireplace Glass Doors","q":"Glass fireplace doors:","choices":["Reduce drafts when fire is out","Should be open during operation in masonry fireplaces (typically)","Are required","Cannot be added to existing fireplaces"],"correct":0,"exp":"Glass doors: useful when fireplace is not in use (closed) - reduces room air loss up the chimney. During use of standard masonry fireplace, doors usually open or closed per manufacturer. Sealed manufactured units differ."},{"id":314,"domain":1,"task":12,"topic":"Chimney Flashing","q":"The flashing where a chimney passes through the roof should be:","choices":["Step flashing on the sides, base flashing in front, and a saddle (cricket) on the back if wider than 30 inches","A single piece wrapped around","Tar only","Not required"],"correct":0,"exp":"Chimney flashing: step flashing on sides (with counter flashing into the masonry), base flashing in front (downhill), saddle (cricket) on uphill side for chimneys wider than 30 inches."},{"id":315,"domain":1,"task":12,"topic":"Combustion Air for Fireplace","q":"Modern fireplaces and tight homes typically require:","choices":["Outside combustion air ducted to the firebox","Air from the bedroom","No combustion air","Indoor air only"],"correct":0,"exp":"Tight modern homes: outside combustion air recommended (and sometimes required) for masonry fireplaces. Direct-vent and sealed-combustion units bring outside air through dedicated ductwork."},{"id":316,"domain":1,"task":12,"topic":"Soot Stains","q":"Soot stains on the exterior of a chimney indicate:","choices":["Normal operation","Possible flue gas leakage from cracks","Improved draft","Good seal"],"correct":1,"exp":"Soot on the exterior of a chimney can indicate flue gas leakage through cracks in the masonry or liner. Signs of poor draft. Recommend evaluation by qualified chimney sweep."},{"id":317,"domain":1,"task":12,"topic":"Wood Stove Hearth Pad","q":"Most wood stoves require a non-combustible floor protection (hearth pad) extending:","choices":["Per manufacturer's listed dimensions, typically 6-18 inches around","Only directly under the stove","No hearth pad","2 feet on all sides"],"correct":0,"exp":"Hearth pads: per manufacturer's listed installation. Typically extend in front of door (load area), and to sides/back. Tested/listed pads have specific R-value and dimensions. Generic 'safe distance' rules don't apply with listed appliances."},{"id":318,"domain":1,"task":12,"topic":"Insurance Wood Stove","q":"Insurance companies often require:","choices":["Documentation of UL-listed stove and code-compliant installation","Manufacturer rebate","Visual inspection only","No special documentation"],"correct":0,"exp":"Insurance often requires: UL-listed stove, professional installation, code compliance, sometimes WETT certification (Canada) or local equivalent. Loss of insurance for non-compliant wood stove installations is common."},{"id":319,"domain":1,"task":12,"topic":"NFPA 211","q":"NFPA 211 is:","choices":["The standard for masonry construction","The standard for chimneys, fireplaces, vents, and solid fuel-burning appliances","An electrical code","An HVAC code"],"correct":1,"exp":"NFPA 211: the comprehensive standard for chimneys, fireplaces, vents, solid fuel-burning appliances. Recommends Level 1 inspection annually, Level 2 at every property transfer or after significant event."},{"id":320,"domain":1,"task":12,"topic":"Carbon Monoxide Source","q":"A common source of carbon monoxide in homes is:","choices":["Improperly vented or backdrafting fuel-burning appliances","Closed windows","Refrigerators","Air conditioning"],"correct":0,"exp":"CO sources: improperly vented furnace, water heater, fireplace, range, or attached garage with vehicles running. Backdrafting from depressurization. Require CO alarms outside sleeping areas."},{"id":321,"domain":1,"task":13,"topic":"Egress Window Area","q":"A bedroom egress window must have a minimum net clear opening of:","choices":["3.0 sq ft","5.0 sq ft","5.7 sq ft","7.0 sq ft"],"correct":2,"exp":"5.7 sq ft = standard minimum for above-grade openings. 5.0 sq ft allowed for grade-floor openings only. Net clear (actual unobstructed) area, not the rough opening."},{"id":322,"domain":1,"task":13,"topic":"Egress Width","q":"Minimum net clear width for an egress window is:","choices":["16 inches","20 inches","24 inches","30 inches"],"correct":1,"exp":"Egress: minimum 20 inches width. Combined with 24 inch height minimum. Note these alone don't satisfy area (5.7 sq ft); a 20x24 = 3.3 sq ft, so larger dimensions on at least one axis required."},{"id":323,"domain":1,"task":13,"topic":"Egress Height","q":"Minimum net clear height for an egress window is:","choices":["20 inches","22 inches","24 inches","30 inches"],"correct":2,"exp":"Egress: minimum 24 inches height. Combined with 20 inch width minimum AND 5.7 sq ft total area. Sill height max 44 inches above floor."},{"id":324,"domain":1,"task":13,"topic":"Egress Sill Height","q":"Maximum sill height of an egress window above the floor is:","choices":["24 inches","36 inches","44 inches","60 inches"],"correct":2,"exp":"Egress sill: maximum 44 inches above the bedroom floor. Higher sills require permanent steps. This dimension is critical for child egress in fire emergencies."},{"id":325,"domain":1,"task":13,"topic":"Smoke Alarm Locations","q":"Smoke alarms in new construction are required in all of the following EXCEPT:","choices":["Each sleeping room","Outside each sleeping area","On every level including basement","In the kitchen near the appliance"],"correct":3,"exp":"Smoke alarms NOT in kitchens (nuisance trip risk). Required: each bedroom, hallway outside bedrooms, every level including basement and habitable attics. Modern code requires interconnection (one trips, all sound)."},{"id":326,"domain":1,"task":13,"topic":"Smoke Alarm Interconnect","q":"Modern code typically requires smoke alarms to be:","choices":["Battery only","Interconnected so one alarm triggers all alarms","Independent units","Connected only to security systems"],"correct":1,"exp":"Modern code: hardwired AND interconnected (one trips, all sound throughout the home). Battery backup required. Existing homes typically grandfathered, but renovations may trigger requirement."},{"id":327,"domain":1,"task":13,"topic":"CO Alarm Location","q":"Carbon monoxide alarms are required in:","choices":["Kitchens","Outside each sleeping area in homes with fuel-burning appliances or attached garages","Bathrooms only","Detached garages"],"correct":1,"exp":"CO alarms: outside each sleeping area in homes with any fuel-burning appliance or attached garage. Some codes require on every level. CO is colorless, odorless, and tasteless - alarms are essential."},{"id":328,"domain":1,"task":13,"topic":"GFCI Where","q":"GFCI protection is required for receptacles in all of the following EXCEPT:","choices":["Bathrooms","Kitchen counters","Bedroom receptacles","Garages"],"correct":2,"exp":"GFCI: bathrooms, kitchen counters, garages, outdoor, crawls, unfinished basements, near sinks. Bedrooms require AFCI (different protection). Newer codes are expanding GFCI to nearly everywhere."},{"id":329,"domain":1,"task":13,"topic":"AFCI Where","q":"AFCI protection is required in:","choices":["Bedroom circuits (and increasingly most living areas)","Bathrooms only","Detached garages","Service panels only"],"correct":0,"exp":"AFCI: bedrooms (since 2002), most living areas in newer codes (kitchen, family, dining, living, hallway, laundry, etc.). Detects arcing faults in branch circuits. Required at the breaker."},{"id":330,"domain":1,"task":13,"topic":"Garage to House","q":"The door between an attached garage and the house must be:","choices":["Solid wood any thickness","Solid wood at least 1-3/8 inch, or 20-minute fire-rated, with self-closing hardware","Hollow core","Glass-paneled"],"correct":1,"exp":"Garage-to-house door: solid wood 1-3/8 inch minimum, OR 20-minute fire-rated. Self-closing hardware (per current IRC). The fire separation prevents garage fires from spreading to living space."},{"id":331,"domain":1,"task":13,"topic":"Garage Fire Separation","q":"The wall between an attached garage and house is required to be:","choices":["Standard interior drywall","5/8 inch Type X drywall (gypsum) on garage side, with sealed penetrations","Brick","No special requirement"],"correct":1,"exp":"Garage-house wall: 5/8 Type X drywall on garage side (extending to roof if open to attic above), with all penetrations sealed. Provides 1-hour-equivalent fire resistance separation."},{"id":332,"domain":1,"task":13,"topic":"Garage Ceiling","q":"If habitable space exists above an attached garage, the garage ceiling must be:","choices":["Standard drywall","5/8 inch Type X drywall, with proper finishing","Open joists","Plywood"],"correct":1,"exp":"Garage ceiling supporting habitable space: 5/8 Type X drywall with taped/finished joints. Provides fire-rated separation. Common defect during finished-room-above-garage retrofits."},{"id":333,"domain":1,"task":13,"topic":"Stair Lighting","q":"Interior stairs require:","choices":["Lighting controllable from top and bottom","No lighting","Battery lighting only","Lighting only at the bottom"],"correct":0,"exp":"Interior stairs: lighting with switches at both top and bottom (3-way). Allows safe operation in either direction without traversing dark stairs. Defect when only one switch."},{"id":334,"domain":1,"task":13,"topic":"Sprinkler System Inspection","q":"When inspecting a residential fire sprinkler system:","choices":["Test all heads","Inspect for visible defects (paint, blockage, low pressure indicators)","Disassemble","Replace fluid"],"correct":1,"exp":"Sprinkler inspection: visible defects only. Painted heads cannot operate. Blocked heads (storage, decoration) cannot reach fire. Pressure issues. Recommend evaluation by qualified fire protection contractor."},{"id":335,"domain":1,"task":13,"topic":"Painted Sprinkler","q":"A painted fire sprinkler head is:","choices":["Decorative and acceptable","A defect that prevents proper operation","Required by some codes","Improved by paint"],"correct":1,"exp":"Painted sprinklers: defect. Paint can prevent the fusible element from melting at the rated temperature, or block the deflector pattern. Replace, not paint."},{"id":336,"domain":1,"task":13,"topic":"Egress Door","q":"An egress door must be:","choices":["At least 32 inches wide and 78 inches high (clear opening)","At least 24 inches wide","Any width","36 inches wide minimum"],"correct":0,"exp":"Egress door: minimum 32 inches clear width (typically 36 inch slab door), minimum 78 inches clear height. One side-hinged egress door required per dwelling unit. Sliding doors may not satisfy primary egress."},{"id":337,"domain":1,"task":13,"topic":"Window Bars Egress","q":"Security bars on bedroom windows must:","choices":["Be permanently fixed","Have a release mechanism that doesn't require keys/tools/special knowledge","Be welded shut","Have keyed locks"],"correct":1,"exp":"Security bars over egress windows: must release from inside without keys, tools, or special knowledge. Permanent or keyed bars on bedroom windows are life safety violations."},{"id":338,"domain":1,"task":13,"topic":"Smoke Alarm Power","q":"Smoke alarms in new construction are typically required to be:","choices":["Battery only","Hardwired with battery backup","Solar powered","Plug-in"],"correct":1,"exp":"New construction: hardwired (so wiring tampering doesn't disable), battery backup (so power failure doesn't disable), interconnected (whole-house alarm). Older battery-only units were code at the time but should be upgraded."},{"id":339,"domain":1,"task":13,"topic":"Smoke Alarm Lifespan","q":"Smoke alarms should be replaced every:","choices":["1 year","2-5 years","10 years","Never"],"correct":2,"exp":"Smoke alarms: 10-year lifespan typical. Sensor degrades. Replace entire unit (not just battery). Newer alarms have 10-year sealed batteries and clear end-of-life indicators."},{"id":340,"domain":1,"task":13,"topic":"CO Alarm Lifespan","q":"Carbon monoxide alarms should be replaced every:","choices":["1 year","5-7 years","10 years","Never"],"correct":1,"exp":"CO alarms: typically 5-7 year lifespan. Electrochemical sensor degrades over time. Replace per manufacturer; many have end-of-life chirp/indicator."},{"id":341,"domain":1,"task":13,"topic":"Hardwired Alarm Battery","q":"A hardwired smoke alarm battery backup:","choices":["Provides operation during power loss","Should be tested and replaced regularly","Is required by most codes","All of the above"],"correct":3,"exp":"Hardwired alarms have battery backup for power outages. Test monthly, replace per manufacturer (often annual for traditional, 10-year sealed batteries in newer models)."},{"id":342,"domain":1,"task":13,"topic":"Sleeping Area Definition","q":"An NHIE-relevant 'sleeping area' typically refers to:","choices":["Any room used for sleeping plus its immediate hallway/access","Only labeled bedrooms","The entire upstairs","Living rooms"],"correct":0,"exp":"Sleeping area: bedroom plus its access hallway. Smoke alarms and CO alarms required at sleeping area access points."},{"id":343,"domain":1,"task":13,"topic":"Furnace Room Safety","q":"A furnace closet or mechanical room with fuel-burning equipment must:","choices":["Be sealed completely","Have adequate combustion air provisions","Be heated","Be carpeted"],"correct":1,"exp":"Mechanical rooms with fuel-burning equipment: adequate combustion air (per BTU input), proper venting, clearances to combustibles, working CO alarm nearby. Sealed mechanical rooms cause backdrafting."},{"id":344,"domain":1,"task":13,"topic":"Door from Garage Slope","q":"If the garage floor slopes to the door connecting to the house:","choices":["Acceptable","Defect - door should be at least 4 inches above garage floor or have proper threshold","Required by code","Improves drainage"],"correct":1,"exp":"Garage threshold: floor should slope toward overhead door (away from house) or interior door must be 4+ inches above garage floor or have a 4-inch curb. Prevents fuel/oil/CO migration into living space."},{"id":345,"domain":1,"task":13,"topic":"Pull Down Attic Stairs Fire","q":"Pull-down attic stairs in an attached garage:","choices":["Are acceptable","Are a fire separation breach if penetrating fire-rated assembly","Improve attic access","Have no fire implications"],"correct":1,"exp":"Pull-down attic stairs through garage ceiling can breach the fire separation between garage and habitable space above. Either avoid this configuration, or use fire-rated attic stair products."},{"id":346,"domain":1,"task":13,"topic":"Bath Heater Lamp","q":"A bathroom heat lamp combined with light/fan:","choices":["Must be properly listed and installed","Cannot be installed in bathrooms","Has no special requirements","Can use generic outlets"],"correct":0,"exp":"Bathroom heat lamps: properly listed unit, GFCI protected circuit, adequate clearances to combustibles and showers, vapor-proof if in shower zone. Defects often involve aftermarket high-watt bulbs."},{"id":347,"domain":1,"task":13,"topic":"Fire Extinguisher","q":"Inspections do not typically include:","choices":["Testing fire extinguishers for charge","Visible defect identification of any extinguishers present","Recommendations for placement","Description in the report"],"correct":0,"exp":"Home inspectors don't certify extinguishers (requires fire safety equipment specialist). Inspectors can identify visible expiration, recommend qualified evaluation, and recommend proper placement (kitchen, garage, near exits)."},{"id":348,"domain":1,"task":13,"topic":"Pool/Spa Door Alarm","q":"Doors leading from a home directly to a pool/spa area should:","choices":["Have an audible alarm or be self-closing/self-latching","Have decorative latches only","Be propped open","Have keyed locks only"],"correct":0,"exp":"Doors to pool/spa: alarm activated when opened (some jurisdictions) OR self-closing/self-latching. Prevents children accessing pool unsupervised. Several layers of barrier (door, fence) typically required."},{"id":349,"domain":1,"task":13,"topic":"Stair Open Riser","q":"Stair open risers (no riser board) on stairs higher than 30 inches typically:","choices":["Are always acceptable","Cannot allow a 4-inch sphere through","Are decorative only","Have no requirements"],"correct":1,"exp":"Open-riser stairs: cannot allow a 4-inch sphere through the open space (same rule as guards). Codes often prohibit open risers in some occupancies, or require closed risers in residential."},{"id":350,"domain":1,"task":13,"topic":"Carbon Monoxide Symptoms","q":"Carbon monoxide poisoning symptoms include:","choices":["Headache, nausea, dizziness, confusion","Localized burns","Respiratory infection","Joint pain"],"correct":0,"exp":"CO symptoms: headache, nausea, dizziness, confusion, fatigue. Severe: loss of consciousness, death. Easily mistaken for flu. CO alarms are essential because the gas is undetectable to humans."},{"id":351,"domain":2,"task":1,"topic":"SOP Definition","q":"The Standards of Practice (SOP) for home inspection define:","choices":["What an inspector must inspect, what is excluded, and reporting requirements","Pricing standards","Required tools and equipment","Required certifications"],"correct":0,"exp":"SOPs (InterNACHI, ASHI, state-specific) define minimum scope: what's included, what's excluded, what must be described/reported. They establish the floor of what an inspector does."},{"id":352,"domain":2,"task":1,"topic":"Required Tools","q":"Which of the following is NOT typically required by SOP for an inspection?","choices":["Flashlight","Moisture meter","Ladder for accessible areas","Outlet tester"],"correct":1,"exp":"Specialized tools (moisture meters, thermal cameras, IR thermometers) are not required by SOP. Required basics: flashlight, ladder for accessible areas, outlet tester for receptacles. Specialized tools enhance findings but aren't mandatory."},{"id":353,"domain":2,"task":1,"topic":"In-Scope Components","q":"Which of the following is in scope of a typical home inspection?","choices":["Solar photovoltaic systems","Backup generators","Detached garages and carports","Underground oil tanks"],"correct":2,"exp":"Detached garages and carports are typically in scope. Solar PV, backup generators, underground oil tanks, swimming pool equipment, and water quality testing are typically out of scope."},{"id":354,"domain":2,"task":1,"topic":"Pre-Inspection Walkthrough","q":"A pre-inspection walkthrough with the client:","choices":["Is required by all SOPs","Is good practice but not always required","Replaces the inspection","Is illegal"],"correct":1,"exp":"Pre-inspection walkthrough/conversation is good practice (sets expectations, identifies client priorities) but not required by all SOPs. Required: a written report following the inspection."},{"id":355,"domain":2,"task":1,"topic":"Inspector Disclaimer Wallpaper","q":"If wallpaper or a wall covering obstructs view of the wall surface:","choices":["Inspector should remove the wallpaper","Inspector should disclaim ability to fully evaluate that wall","Inspector should not report","Inspector should rate the wall as defective"],"correct":1,"exp":"Inspectors don't move/remove items. Wallpaper covering wall - disclaim full evaluation. Same for furniture, stored items, snow on roof, etc. Report what is and isn't visible."},{"id":356,"domain":2,"task":1,"topic":"Stored Items","q":"If stored items prevent inspection of a portion of the basement:","choices":["Inspector must move them","Inspector should disclaim and recommend re-inspection if access becomes available","Inspector cannot complete the inspection","Stored items don't matter"],"correct":1,"exp":"Inspector doesn't move items. Disclaim what couldn't be evaluated due to limited access. Note in report. Client can request re-inspection if items are removed before close."},{"id":357,"domain":2,"task":1,"topic":"Snow on Roof","q":"If snow covers the roof at inspection:","choices":["Inspector should clear it","Inspector should disclaim full roof evaluation, recommend re-inspection","Inspector should rate the roof as defective","Inspector should skip roof inspection entirely without comment"],"correct":1,"exp":"Roof covered by snow: disclaim full evaluation, recommend re-inspection or qualified evaluation. Note any visible portions and any defects observed (e.g., visible flashings, rust streaks)."},{"id":358,"domain":2,"task":1,"topic":"Heavy Rain","q":"Heavy rain at the time of inspection:","choices":["Has no effect on inspection","Limits roof and exterior evaluation, may reveal active leaks","Should void the inspection","Always reveals all defects"],"correct":1,"exp":"Heavy rain: limits some inspection (can't safely walk roof, exterior less visible) but reveals leaks and drainage issues that dry weather wouldn't show. Document conditions, disclaim limited items."},{"id":359,"domain":2,"task":1,"topic":"Visible Components","q":"SOPs typically require inspection of:","choices":["All components","Readily accessible and visible components","Concealed components","Both readily accessible and concealed"],"correct":1,"exp":"SOPs limit inspection to readily accessible and visible components. Inspector doesn't open walls, dismantle equipment, move heavy items, or perform invasive testing."},{"id":360,"domain":2,"task":1,"topic":"Water Test","q":"Pressure-testing plumbing or running water for an extended period to find leaks:","choices":["Is part of standard inspection","Is beyond SOP, may require disclaimer or specialty inspection","Is required for all inspections","Is illegal"],"correct":1,"exp":"Functional flow check (briefly running water at fixtures) is standard. Pressure-testing or extended testing is beyond SOP. Same for plumbing camera inspection - separate specialty service."},{"id":361,"domain":2,"task":1,"topic":"Sewer Scope","q":"A sewer scope (camera inspection of sewer lateral):","choices":["Is included in standard home inspection","Is a separate specialty inspection","Cannot be performed","Is required by all states"],"correct":1,"exp":"Sewer scope: separate specialty inspection. Inspectors may offer it as a separate service or recommend a qualified contractor. Highly recommended in older homes (clay/cast iron laterals)."},{"id":362,"domain":2,"task":1,"topic":"Inspector Sample Size","q":"SOP requires inspection of:","choices":["Every receptacle, light, and switch","A representative number of receptacles, lights, and switches","No receptacles","Only outdoor receptacles"],"correct":1,"exp":"SOP: representative sample. Test selected receptacles, lights, switches throughout the home. Document type and findings. Don't need to test every single one."},{"id":363,"domain":2,"task":1,"topic":"Report Format","q":"Home inspection reports are typically:","choices":["Verbal only","Written, formatted in narrative or checklist format with photographs","Test results only","Required to be PDF only"],"correct":1,"exp":"Modern reports: written, narrative or checklist style, with photos and explanations. Most use software (Spectora, HouseMaster, ISN, etc.). Required to be delivered to the client."},{"id":364,"domain":2,"task":1,"topic":"Reporting Defects","q":"When reporting a defect, the inspector should include:","choices":["Description of the defect","Location","Recommendation for action","All of the above"],"correct":3,"exp":"Quality defect description: what (specific issue), where (location), why it matters (implication), and recommendation (action + qualified party). Vague descriptions create liability and poor service."},{"id":365,"domain":2,"task":1,"topic":"Cosmetic vs Defect","q":"A small cosmetic crack in drywall:","choices":["Should always be reported as a defect","May be observed and noted but not necessarily a defect","Is always a serious structural concern","Is out of scope"],"correct":1,"exp":"Small cosmetic items: noted but not necessarily reported as defects. Large or pattern of cracks, signs of structural movement, water damage - those rise to defect level. Judgment call."},{"id":366,"domain":2,"task":1,"topic":"Repair vs Recommendation","q":"An inspector's report should:","choices":["Specify the exact contractor to hire","Recommend qualified evaluation/correction by an appropriate party (e.g., licensed electrician)","Include cost estimates","Provide warranty"],"correct":1,"exp":"Recommendations: qualified evaluation by an appropriate trade. Don't name specific contractors (conflict of interest). Don't typically provide cost estimates (out of scope, contractor's role)."},{"id":367,"domain":2,"task":1,"topic":"Client Education","q":"During an inspection, the inspector should:","choices":["Educate the client about systems and findings if they're present","Refuse to talk to clients","Give legal advice","Suggest renovations"],"correct":0,"exp":"Client education during inspection: significant value-add. Show systems, explain findings, point out maintenance items. Stay within scope - don't give legal/financial/design advice."},{"id":368,"domain":2,"task":1,"topic":"Limitations","q":"An inspection has inherent limitations including:","choices":["Visible/accessible only","Point-in-time observation","Not a code compliance inspection","All of the above"],"correct":3,"exp":"Inherent limitations: visible/accessible only, point-in-time (conditions change), not code compliance, not predictive of future failures, doesn't include hidden defects. Disclose in pre-inspection agreement."},{"id":369,"domain":2,"task":1,"topic":"Code Compliance","q":"A home inspection is:","choices":["A formal code compliance review","An evaluation of visible conditions, generally not a code compliance inspection","A municipal inspection","An engineering review"],"correct":1,"exp":"Home inspection is NOT code compliance. Inspectors note items contrary to current standards but don't perform formal code review. Code compliance: building department, or code-specific inspector hired separately."},{"id":370,"domain":2,"task":1,"topic":"Buyer's Inspection vs Pre-Listing","q":"A buyer's inspection differs from a pre-listing (seller's) inspection by:","choices":["Same scope, different client paying","Different SOP applies","Buyer inspection is more thorough","Pre-listing is illegal"],"correct":0,"exp":"Same scope, same SOP - different client. Pre-listing inspections allow sellers to address issues before market or disclose proactively. Buyer inspections are after offer/contract. Same standards apply."},{"id":371,"domain":2,"task":1,"topic":"Inspection Time","q":"A typical single-family home inspection takes approximately:","choices":["30 minutes","2-4 hours (varies with size/age/complexity)","8 hours minimum","1 hour exactly"],"correct":1,"exp":"Typical single-family inspection: 2-4 hours on-site, plus report-writing time. Larger, older, or more complex homes take longer. Quick inspections can be a quality concern."},{"id":372,"domain":2,"task":1,"topic":"Tools Standard","q":"SOP-required basic tools typically include all EXCEPT:","choices":["Flashlight","Ladder for accessible areas","Outlet tester","Borescope camera"],"correct":3,"exp":"Borescope (camera): specialized tool, not standard SOP requirement. Required basics: flashlight, ladder, outlet tester, simple measuring tools. Specialized tools (cameras, moisture, thermal) enhance but aren't required."},{"id":373,"domain":2,"task":1,"topic":"Sample Receptacles","q":"An inspector typically tests:","choices":["All receptacles","A representative sample of receptacles","Only kitchen and bathroom","Only outdoor"],"correct":1,"exp":"Representative sample: test enough to evaluate the system, especially in critical areas (GFCI/AFCI test, kitchens, bathrooms, outdoor, near sinks). Furniture and stored items prevent testing all."},{"id":374,"domain":2,"task":1,"topic":"Disclaimer Common","q":"Common areas requiring disclaimer in many inspections include:","choices":["Inaccessible attic or crawl","Wallpaper-covered surfaces","Stored items blocking access","All of the above"],"correct":3,"exp":"Common disclaimers: inaccessible attic (no access, low clearance), inaccessible crawl, blocked walls (wallpaper, paneling, furniture, stored items), snow-covered roof, ice-covered exterior. Disclaim what isn't visible."},{"id":375,"domain":2,"task":1,"topic":"Signature","q":"A home inspection report typically includes:","choices":["Inspector's signature/name and license number","Effective date","Limitations and exclusions","All of the above"],"correct":3,"exp":"Reports include: inspector identification, date, address, scope/limitations, findings (often with photos), recommendations, license info per state requirements. Many states have specific report content requirements."},{"id":376,"domain":2,"task":2,"topic":"Wallpaper Limitation","q":"If wallpaper covers a wall:","choices":["Inspector must evaluate full wall condition","Inspector should disclaim limitations","Skip the wall entirely","Remove wallpaper"],"correct":1,"exp":"Inspectors don't disturb finishes. Disclaim limitations and note that defects under wallpaper can't be evaluated. Same for paneling, paint, mirrors, fixed cabinetry."},{"id":377,"domain":2,"task":2,"topic":"Snow on Roof Limit","q":"Snow-covered roof:","choices":["Cannot be properly inspected","Should be evaluated post-snow if possible","Inspector must clear snow","Roof rated as defective when snowy"],"correct":1,"exp":"Snow limits roof inspection. Disclaim, document conditions, recommend re-inspection or qualified evaluation when conditions improve. Note any visible defects (e.g., chimney issues, ice dam evidence)."},{"id":378,"domain":2,"task":2,"topic":"Furniture and Storage","q":"Furniture and stored items in homes:","choices":["Must be moved","Limit inspection of walls, floors, and built-ins","Have no effect on inspection","Are out of scope"],"correct":1,"exp":"Furniture/storage limits inspection of surfaces and built-ins behind/below them. Inspector doesn't move items. Disclaim limitations. Standard pre-inspection prep should request items moved if possible."},{"id":379,"domain":2,"task":2,"topic":"Operate Versus Test","q":"Inspectors generally operate (rather than test) equipment by:","choices":["Running it through normal controls","Disassembling components","Pressure-testing","Performing manufacturer diagnostics"],"correct":0,"exp":"Operate via normal controls: turn AC on at thermostat, run water at fixtures, operate burners on a stove, raise/lower garage door. Don't disassemble, pressure-test, or perform diagnostic procedures."},{"id":380,"domain":2,"task":2,"topic":"Concealed Defects","q":"An inspection identifies:","choices":["All possible defects","Visible/accessible defects at the time of inspection","Future defects","Hidden defects"],"correct":1,"exp":"Inspections identify visible/accessible defects at time of inspection. Hidden defects, future failures, and conditions inside walls or behind finishes are inherent limitations."},{"id":381,"domain":2,"task":2,"topic":"Latent Defect","q":"A latent defect is:","choices":["A defect not discoverable by reasonable inspection","A small defect","A code violation","A cosmetic issue"],"correct":0,"exp":"Latent defect: hidden/concealed, not discoverable by reasonable inspection. Distinguished from patent defects (visible). Inspectors not liable for latent defects unless they should have identified them."},{"id":382,"domain":2,"task":2,"topic":"Crawl Access","q":"Inspection of a crawl space requires:","choices":["Inspector to enter regardless of conditions","Reasonable access (clearance, dry conditions, sufficient size)","Always disclaim","Powered ventilation"],"correct":1,"exp":"Crawl access: enter when conditions allow (typical 18+ inches clearance, no standing water, no hazards). Disclaim if not safe to enter. Inspect from access opening if can't enter. Document why if not entered."},{"id":383,"domain":2,"task":2,"topic":"Roof Walking","q":"Walking the roof:","choices":["Required by SOP","Done when safe (slope, surface, weather)","Always required","Never done"],"correct":1,"exp":"Walk roof when safe. Don't walk: too steep (often 8:12+), too brittle (slate, tile), too wet/icy, too high without fall protection. Inspect from ladder, ground, or attic alternate vantage when not walked."},{"id":384,"domain":2,"task":2,"topic":"Underground Tank","q":"An underground oil tank:","choices":["Is in scope","Is typically out of scope and disclaimed","Must be excavated","Is unrelated to home inspection"],"correct":1,"exp":"Underground oil tanks: typically out of scope. Inspector may report visible signs (above-grade fill/vent pipes, evidence of an old tank), recommend specialty evaluation. Significant environmental liability if leaking."},{"id":385,"domain":2,"task":2,"topic":"Septic System","q":"Septic systems:","choices":["In standard home inspection scope","Typically out of scope, requiring specialty inspection","Inspected via a flush test only","Cannot be evaluated"],"correct":1,"exp":"Septic: typically out of scope. Inspector may note visible components (lid, riser, signs of failure). Recommend specialty septic inspection (typically required at sale in many jurisdictions)."},{"id":386,"domain":2,"task":2,"topic":"Well Water","q":"Private well system inspection:","choices":["Is in scope","Is a separate specialty inspection (water quality, pressure, recovery)","Cannot be performed","Is unnecessary"],"correct":1,"exp":"Wells: separate specialty inspection. Includes water quality testing, flow rate, pressure tank operation, electrical, sanitary cap. Buyer should commission for any well-supplied home."},{"id":387,"domain":2,"task":2,"topic":"Active Leak","q":"If active leakage is observed during inspection:","choices":["Inspector turns off water supply","Inspector reports the active leak and recommends correction","Inspector ignores it","Inspector pays for repair"],"correct":1,"exp":"Active leak: report it (location, observed condition), recommend correction by qualified party. Don't try to turn off water mains. Don't perform repairs."},{"id":388,"domain":2,"task":2,"topic":"Specialized Equipment","q":"Specialized equipment beyond SOP includes:","choices":["Thermal imaging cameras","Moisture meters","Borescope cameras","All of the above"],"correct":3,"exp":"Specialized: thermal cameras, moisture meters, borescopes, gas leak detectors, formaldehyde testers, asbestos kits. Useful add-ons but not required by SOP. Some inspectors include in standard service."},{"id":389,"domain":2,"task":2,"topic":"Mold Testing","q":"Mold testing during home inspection:","choices":["Standard SOP","Specialty service requiring sampling and lab analysis","Done with eyesight only","Always required"],"correct":1,"exp":"Mold testing: specialty service involving air/surface sampling, lab analysis, IH report. Different from observation of visible mold/mildew (which inspector can note). Often requires separate certification."},{"id":390,"domain":2,"task":2,"topic":"Asbestos","q":"Asbestos identification:","choices":["Standard SOP","Requires qualified professional and lab analysis","Done by visual inspection alone","Not relevant to home inspection"],"correct":1,"exp":"Asbestos: visible identification (suspected materials in old buildings - 9x9 floor tiles, pipe wrap, popcorn ceilings, certain shingles). Confirmation requires lab analysis by qualified professional. Inspector notes suspected materials only."},{"id":391,"domain":2,"task":2,"topic":"Lead Paint","q":"Lead paint identification:","choices":["Visual identification only","Requires specialty testing (XRF, paint chip)","Always present in homes pre-1978","Cannot be evaluated"],"correct":1,"exp":"Lead paint: federal regulations require disclosure for homes pre-1978. Visual indicators possible (chipping/peeling old paint). Confirmation: XRF test or paint chip lab analysis. Specialty service."},{"id":392,"domain":2,"task":2,"topic":"Radon","q":"Radon testing during home inspection:","choices":["Standard SOP","Optional specialty service requiring multi-day testing","Done with a single quick reading","Always required by federal law"],"correct":1,"exp":"Radon: 48-hour minimum continuous test (or charcoal canister + lab). Specialty service. EPA recommends for all home purchases. Wisconsin has elevated radon; common buyer add-on."},{"id":393,"domain":2,"task":2,"topic":"Pest Inspection","q":"Termite/pest inspection (WDO/WDI):","choices":["Standard SOP","Specialty service often required by lender","Same as home inspection","Cannot be performed"],"correct":1,"exp":"WDO/WDI (Wood-Destroying Organism/Insect) inspection: separate specialty often required by lenders, especially in heavy termite areas. Inspector may identify visible signs but not perform formal WDO inspection without certification."},{"id":394,"domain":2,"task":2,"topic":"Inactive Equipment","q":"If equipment cannot be safely operated (e.g., AC in 30\u00b0F weather):","choices":["Inspector turns it on anyway","Inspector disclaims operational test, notes condition with limitation","Inspection cannot proceed","Inspector should remove the equipment"],"correct":1,"exp":"If equipment can't be safely operated, disclaim operational testing. Note visible condition. Recommend re-inspection or qualified evaluation if needed. Don't damage equipment."},{"id":395,"domain":2,"task":2,"topic":"Locked Areas","q":"Access to a locked room or attic:","choices":["Inspector must force entry","Inspector should request access from seller; if not provided, disclaim","Inspector calls a locksmith","Inspector skips and doesn't mention"],"correct":1,"exp":"Locked spaces: request access. If not provided, disclaim and note as limitation. Don't force entry. Common defects can be missed (electrical panel inside locked utility room, attic)."},{"id":396,"domain":2,"task":2,"topic":"Power Off","q":"If utilities (power, water, gas) are off:","choices":["Inspector should restore them","Inspector cannot fully evaluate systems requiring those utilities","Inspector skips inspection","Inspector charges extra"],"correct":1,"exp":"Utilities off: can't operationally test that system. Disclaim, recommend re-inspection when on. Don't restore utilities (liability, may be off for safety reasons). Confirm utilities on before scheduling."},{"id":397,"domain":2,"task":2,"topic":"Vacant House","q":"A vacant house:","choices":["Cannot be inspected","Has different inspection considerations (utilities, no occupant feedback, dust/dryness)","Always reveals more defects","Cannot have utilities on"],"correct":1,"exp":"Vacant homes: confirm utilities on, no occupant feedback (good and bad - can move freely, but no use history). Plumbing fixtures may be dry (slow leaks unnoticed), AC may not have run for months. Document conditions."},{"id":398,"domain":2,"task":2,"topic":"Pool/Spa Inspection","q":"Pool/spa equipment inspection:","choices":["Always in scope","Often out of scope; specialty inspector recommended","Can be done with the home inspection in cold weather","Required by all SOPs"],"correct":1,"exp":"Pool/spa: typically out of scope or limited (visible components only). Specialty pool inspector recommended. Significant cost to repair major issues; client should know condition before purchase."},{"id":399,"domain":2,"task":2,"topic":"Outbuildings","q":"Outbuildings (sheds, barns, gazebos):","choices":["Always in scope","Out of scope unless attached or specifically agreed","Inspected free as courtesy","Required to be inspected"],"correct":1,"exp":"Outbuildings beyond detached garage are out of scope unless contracted. Some inspectors offer at additional fee. Document presence in report (helps liability if buyer claims they expected inspection)."},{"id":400,"domain":2,"task":2,"topic":"Termites Detected","q":"If WDI/WDO evidence is observed:","choices":["Inspector treats the home","Inspector reports findings and recommends specialty WDO inspection","Inspector ignores","Inspector tells the seller only"],"correct":1,"exp":"WDO evidence: report it, recommend specialty WDO inspection by licensed professional. Don't try to treat or guarantee remediation. Lender often requires WDO clearance regardless of inspector findings."},{"id":401,"domain":2,"task":3,"topic":"Best Defect Description","q":"Which is the BEST defect description?","choices":["The water heater is bad","Old water heater visible in basement","Water heater (2003) - TPR discharge tube terminates above floor and is threaded; recommend correction by qualified plumber","Water heater needs replacement"],"correct":2,"exp":"Quality description: specific (what exactly), located (where), explained (why it matters), actionable (what + qualified party). Vague terms like 'bad' or 'old' don't satisfy SOP."},{"id":402,"domain":2,"task":3,"topic":"Defect SOP Required","q":"SOP-required elements when describing a defect include:","choices":["Description of the defect","Implication or recommendation","Both","Neither"],"correct":2,"exp":"SOP defect description: typically requires description AND implication/recommendation. Cost estimates not required (often discouraged). Some SOPs require photos for major defects."},{"id":403,"domain":2,"task":3,"topic":"Subjective Language","q":"Which language should be avoided in inspection reports?","choices":["Defect","Recommendation","'Bad,' 'old,' 'crappy,' 'amateur'","Specific measurements"],"correct":2,"exp":"Avoid subjective/judgmental language: bad, terrible, amateur, sloppy, hack job. Use objective language: 'damaged,' 'leaking,' 'inadequate (specific reason),' 'requires correction.' Keep professional."},{"id":404,"domain":2,"task":3,"topic":"Photo Documentation","q":"Photo documentation in reports:","choices":["Required by all SOPs","Best practice and increasingly expected by clients","Optional and rarely useful","Required only for life safety"],"correct":1,"exp":"Photos: best practice (clarifies findings, documents conditions, reduces liability). Most modern reports include photos for defects. Some SOPs require for major defects."},{"id":405,"domain":2,"task":3,"topic":"Photographing Inhabitants","q":"Photographing in occupied homes:","choices":["Photograph everything for liability protection","Photograph defects and conditions; avoid people, personal documents, valuables","Only photograph defects","Avoid all photographs"],"correct":1,"exp":"Photo etiquette: defects and necessary conditions yes; people (especially children), personal documents, valuables, identifiable family items - avoid. Some pre-inspection agreements specifically address photo permissions."},{"id":406,"domain":2,"task":3,"topic":"Cost Estimates","q":"Repair cost estimates in inspection reports:","choices":["Required by SOP","Generally discouraged or prohibited","Always required","Provided by request"],"correct":1,"exp":"Cost estimates: most SOPs prohibit or strongly discourage. Inspector is not a contractor and lacks specific information for accurate estimates. Refer to qualified contractors for estimates."},{"id":407,"domain":2,"task":3,"topic":"Naming Contractors","q":"Naming specific contractors in a report:","choices":["Builds business relationships","Creates a conflict of interest","Required by SOP","Reduces liability"],"correct":1,"exp":"Naming contractors: conflict of interest concern. Refer to 'qualified electrician,' 'licensed plumber,' etc., not specific names. Some inspectors maintain referral lists separately, with disclosure."},{"id":408,"domain":2,"task":3,"topic":"Major vs Minor","q":"An inspection report should:","choices":["Treat all findings equally","Distinguish major (significant cost/safety) from minor (cosmetic/maintenance) findings","Only report major defects","Only report minor defects"],"correct":1,"exp":"Categorize findings: major (life safety, significant cost, structural), minor (cosmetic, maintenance), informational (discloses but not a defect). Helps client prioritize negotiation and follow-up."},{"id":409,"domain":2,"task":3,"topic":"Defect vs Maintenance","q":"A clogged dryer vent is best characterized as:","choices":["Major structural defect","A maintenance recommendation, with note of fire hazard if unaddressed","Cosmetic","Out of scope"],"correct":1,"exp":"Clogged dryer vent: maintenance item with safety implication. Report it with recommendation to clean. Document fire hazard concern for accumulated lint."},{"id":410,"domain":2,"task":3,"topic":"Reporting Active Issue","q":"An actively leaking water connection:","choices":["Should be noted with recommendation for prompt correction","Can be ignored","Should be repaired by inspector","Is cosmetic"],"correct":0,"exp":"Active leak: report immediately with location, observed condition, recommendation for prompt correction. Photo important. Active issues warrant emphasis in report."},{"id":411,"domain":2,"task":3,"topic":"Verbiage Standardization","q":"Many inspectors use templated narratives because:","choices":["Saves time and ensures consistency","Allows verbiage review for clarity and liability","Provides comprehensive coverage of common findings","All of the above"],"correct":3,"exp":"Templated narratives (libraries like Kenton Shepard's InterNACHI library): save time, consistency, legal review, comprehensive coverage. Customize specifics for each finding."},{"id":412,"domain":2,"task":3,"topic":"Action Recommended","q":"A defect should typically have a recommendation for:","choices":["Specific repair method","Action by qualified party (further evaluation, repair, replace)","Cost estimate","Specific contractor"],"correct":1,"exp":"Recommendation: action + qualified party. 'Recommend further evaluation by qualified electrician' or 'Recommend replacement by licensed plumber.' Specific repair methods are contractor's call."},{"id":413,"domain":2,"task":3,"topic":"Implication of Defect","q":"Including the implication of a defect:","choices":["Helps client understand significance","Required by some SOPs","Reduces likelihood of misunderstanding","All of the above"],"correct":3,"exp":"Implication: 'this could cause water damage,' 'reduces system efficiency,' 'creates fire hazard.' Helps client understand and prioritize. Some SOPs require, others encourage."},{"id":414,"domain":2,"task":3,"topic":"Photographic Best Practice","q":"Defect photos should include:","choices":["A reference (overview) shot showing location","A close-up of the defect itself","Adequate lighting","All of the above"],"correct":3,"exp":"Photo best practice: contextual (where in the house) + close-up (the defect itself) + adequate lighting + descriptive caption. Multiple photos for complex defects. Phones with HDR work well."},{"id":415,"domain":2,"task":3,"topic":"Boilerplate Limit","q":"Boilerplate (templated) language should:","choices":["Be customized to specific finding","Replace inspection observations","Stand alone without context","Be avoided"],"correct":0,"exp":"Boilerplate as starting point - customize with specific location, severity, observed conditions. Pure boilerplate without specifics suggests no actual inspection. Use as scaffolding for narrative."},{"id":416,"domain":2,"task":3,"topic":"Quantity in Report","q":"A report listing dozens of minor maintenance items but missing a major defect:","choices":["Is acceptable as long as the defects are minor","Demonstrates poor inspection priority","Provides good value","Increases credibility"],"correct":1,"exp":"Report quality: thoroughness and balance. A wall of trivial items can drown major findings. Major defects should be highlighted; minor items grouped or summarized. Demonstrate priority."},{"id":417,"domain":2,"task":3,"topic":"Findings Sectioned","q":"Inspection reports are often sectioned by:","choices":["System (electrical, plumbing, etc.)","Severity","Both system and severity","Random"],"correct":2,"exp":"Modern reports: typically by system AND severity. Major findings called out at top (executive summary), then organized by system for complete review. Easier for clients and agents to navigate."},{"id":418,"domain":2,"task":3,"topic":"Repair vs Replace","q":"When recommending repair vs replace:","choices":["Always recommend replace","Match recommendation to severity","Always recommend repair","Recommendation by inspector inappropriate"],"correct":1,"exp":"Match recommendation to severity: minor leaks - repair, end-of-life equipment - replace, structural defects - engineering evaluation. Don't over- or under-recommend. Let qualified contractors estimate cost differences."},{"id":419,"domain":2,"task":3,"topic":"Aged Appliance","q":"An aged but functional water heater:","choices":["Should be replaced regardless","Can be reported as aged with informational note about typical lifespan","Should be ignored","Is always a defect"],"correct":1,"exp":"Aged appliance: report age (date code) and note typical service life. Inform client of likely near-term replacement, even if currently functional. 'Approaching end of typical service life - budget for replacement.'"},{"id":420,"domain":2,"task":3,"topic":"Visible Defects Only","q":"Inspector reports defects that are:","choices":["Predicted from system age","Visible/accessible at time of inspection","Inferred from theoretical concerns","Concealed or hidden"],"correct":1,"exp":"Inspectors report observed conditions - visible/accessible defects at time of inspection. Don't infer or predict beyond reasonable observation. Don't tear into walls."},{"id":421,"domain":2,"task":3,"topic":"Code Compliance Comment","q":"If observed work is not code-compliant:","choices":["Inspector should note as defect with reference to current standard, not as code violation","Inspector should cite specific code section","Inspector should ignore","Inspector should write a citation"],"correct":0,"exp":"Inspector notes deviations from current standards (without claiming code authority). 'Not in compliance with current standards regarding...' Recommend further evaluation. Code compliance is jurisdiction's call."},{"id":422,"domain":2,"task":3,"topic":"Multiple Defects","q":"If many similar defects found (e.g., 30 missing receptacle covers):","choices":["Report each individually","Group similar defects, note quantity, recommend correction throughout","Report only one","Skip"],"correct":1,"exp":"Group similar defects with location summary and quantity. 'Multiple receptacles throughout home missing covers - recommend installation of covers throughout.' Avoids report bloat while documenting issue."},{"id":423,"domain":2,"task":3,"topic":"Vague Language","q":"Language to avoid in defect descriptions includes:","choices":["'Some,' 'a few,' 'several' (without specifics)","Specific quantities","Locations","Recommendations"],"correct":0,"exp":"Vague quantifiers without specifics are problematic. 'Several cracks' - where? How many? 'Multiple cracks observed at northeast and northwest basement walls; specifically...' Better."},{"id":424,"domain":2,"task":3,"topic":"Severity Indicator","q":"Indicating severity in reports often uses:","choices":["Color codes","Icons","Defined categories (major, minor, informational)","All of the above"],"correct":3,"exp":"Severity indicators: color-coded sections, icons, or text categories. Standardize within report format. Allows skim-readability for major issues."},{"id":425,"domain":2,"task":3,"topic":"Conclusion in Report","q":"Should an inspector include their personal opinion on whether to buy?","choices":["Yes, always","No - that's the client's decision; inspector reports facts","Only for friends","Only by request"],"correct":1,"exp":"Inspector: facts and findings, not buy/don't-buy recommendations. That's the client's decision based on inspection + their priorities + financials + market. Inspector stays in objective lane."},{"id":426,"domain":2,"task":4,"topic":"Fireplace Inspection","q":"When inspecting a fireplace, the inspector should:","choices":["Light a fire to test draft","Inspect visible portions and recommend Level 2 chimney inspection if defects suspected","Open and close the damper, verify smoke chamber, recommend cleaning","Always recommend rebuilding"],"correct":1,"exp":"Home inspection: visible portions only. Recommend Level 2 by CSIA-certified chimney sweep at every property transfer (per NFPA 211) and when defects suspected. Don't light fires."},{"id":427,"domain":2,"task":4,"topic":"Active Leak Recommendation","q":"An active plumbing leak should be recommended for:","choices":["Disregard","Prompt repair by qualified plumber","Annual inspection","DIY repair"],"correct":1,"exp":"Active leaks: prompt repair by qualified plumber. Document scope of damage. Note potential hidden damage (water can travel; visible may be tip of iceberg)."},{"id":428,"domain":2,"task":4,"topic":"Asbestos Suspected","q":"If asbestos-containing materials are suspected:","choices":["Test on-site","Recommend testing/evaluation by qualified abatement professional","Remove the material","Ignore"],"correct":1,"exp":"Suspected asbestos: 'recommend evaluation/testing by qualified asbestos abatement professional.' Don't disturb. Federal/state regulations apply for abatement (esp. in commercial). Inspector may recommend specialty IH or abatement contractor."},{"id":429,"domain":2,"task":4,"topic":"Cracked Heat Exchanger","q":"A suspected cracked furnace heat exchanger:","choices":["Should be confirmed by inspector with mirror","Recommend evaluation by qualified HVAC technician","Cosmetic concern","Replace"],"correct":1,"exp":"Cracked heat exchanger: serious safety concern (CO into living space). Recommend evaluation by qualified HVAC tech (camera/dye/specialty testing required to confirm). Inspector observation alone insufficient for definitive call."},{"id":430,"domain":2,"task":4,"topic":"Bowed Foundation","q":"A foundation wall with significant bowing:","choices":["Cosmetic concern","Requires structural engineer evaluation","Standard repair","Ignore"],"correct":1,"exp":"Bowed foundation: structural concern. Recommend evaluation by structural engineer. Possible interventions: carbon fiber straps, helical tiebacks, beam/post bracing, exterior excavation/regrading. Engineer specifies appropriate intervention."},{"id":431,"domain":2,"task":4,"topic":"Microbial Growth","q":"Visible mold or microbial growth:","choices":["Inspector cleans it","Recommend evaluation/remediation by qualified contractor, source identification","Ignore","Test for species"],"correct":1,"exp":"Visible mold: recommend evaluation/remediation by qualified contractor. Identify and address moisture source (the underlying cause). Don't try to identify species or quantify exposure."},{"id":432,"domain":2,"task":4,"topic":"Pool Equipment","q":"Pool/spa equipment, when out of scope:","choices":["Inspector inspects regardless","Recommend evaluation by qualified pool contractor/specialist","Functional check sufficient","Out of scope means no comment"],"correct":1,"exp":"Out-of-scope items: still document presence. Recommend specialty inspection by qualified contractor. Pool/spa, septic, well, underground tanks, solar are common items."},{"id":433,"domain":2,"task":4,"topic":"Underground Oil Tank","q":"An underground oil tank:","choices":["Standard inspection scope","Recommend specialty environmental evaluation, especially if abandoned in place","Inspector excavates","Ignore"],"correct":1,"exp":"Underground oil tanks: significant environmental liability if leaking. Recommend specialty evaluation. Some states require abandonment per regulations (decommission, fill with sand/foam, document)."},{"id":434,"domain":2,"task":4,"topic":"Active Pest Activity","q":"Active pest activity (termites, carpenter ants):","choices":["Recommend evaluation by qualified pest professional","Treat with home spray","Ignore minor","Replace damaged components without addressing pest"],"correct":0,"exp":"Pest activity: recommend evaluation/treatment by qualified pest control professional. They identify species, treatment, monitoring. Damaged structural members require structural evaluation in addition."},{"id":435,"domain":2,"task":4,"topic":"Aluminum Wiring","q":"Solid-conductor aluminum branch circuit wiring:","choices":["Recommend evaluation by qualified electrician for proper terminations and remediation","Replace immediately","Ignore","Require seller to upgrade"],"correct":0,"exp":"Aluminum wiring: report presence, note remediation options (COPALUM, AlumiConn), recommend evaluation by qualified electrician familiar with aluminum. Insurance impact also worth noting."},{"id":436,"domain":2,"task":4,"topic":"Federal Pacific Panel","q":"A Federal Pacific Stab-Lok panel:","choices":["Recommend evaluation by qualified electrician for replacement","Change breakers only","Test continuity","Ignore"],"correct":0,"exp":"FPE Stab-Lok panel: report concern about high failure-to-trip rates, recommend evaluation by qualified electrician for replacement of the panel (not just breakers)."},{"id":437,"domain":2,"task":4,"topic":"Polybutylene Plumbing","q":"Polybutylene supply piping:","choices":["Acceptable as long as no leaks","Report presence and recommend evaluation/replacement by qualified plumber","Test for leaks only","Replace fittings only"],"correct":1,"exp":"Polybutylene: report presence, note no longer permissible, recommend evaluation/replacement. PB has high failure rate; many insurers require replacement."},{"id":438,"domain":2,"task":4,"topic":"Galvanized Plumbing Old","q":"Aged galvanized supply piping:","choices":["Replace whole house immediately","Recommend evaluation by qualified plumber, particularly for flow and condition","Ignore","Solder copper to it"],"correct":1,"exp":"Aged galvanized: report and note flow restriction over time. Recommend qualified plumber evaluation. Re-piping in copper or PEX is common upgrade for older homes."},{"id":439,"domain":2,"task":4,"topic":"Knob and Tube Wiring","q":"Active knob-and-tube wiring:","choices":["Recommend evaluation by qualified electrician for safety, insulation contact, capacity","Replace immediately","Ignore","Disconnect at panel"],"correct":0,"exp":"K&T: recommend evaluation by qualified electrician. Concerns: insulation contact prohibited, no equipment ground, age/brittleness. Insurance implications. Selective replacement vs whole-house decision."},{"id":440,"domain":2,"task":4,"topic":"Suspected Settlement","q":"Suspected foundation settlement:","choices":["Recommend evaluation by structural engineer","Cosmetic","Inspector confirms via measurement","Ignore"],"correct":0,"exp":"Significant settlement: structural engineer evaluation. Engineer determines cause (soils, water, original construction), severity (active vs old/stable), and intervention (piers, underpinning, drainage)."},{"id":441,"domain":2,"task":4,"topic":"Sewer Lateral Concern","q":"If signs suggest sewer lateral problems (slow drainage, age, root presence):","choices":["Recommend sewer scope by qualified plumber/specialist","Run more water","Replace fittings","Ignore"],"correct":0,"exp":"Sewer lateral concerns: recommend sewer scope (camera inspection) by qualified plumber/specialty. Identifies sags, breaks, root intrusion. Repair scope (spot repair vs lining vs full replace) varies by finding."},{"id":442,"domain":2,"task":4,"topic":"Roof Near End of Life","q":"A roof appearing near end of service life:","choices":["Recommend evaluation by qualified roofer for remaining life and budget for replacement","Replace immediately","Ignore","Repaint"],"correct":0,"exp":"End-of-life roof: report observed conditions (granule loss, curling, exposed nails, etc.), recommend qualified roofer evaluation for remaining life estimate and replacement quote. Budget item for client."},{"id":443,"domain":2,"task":4,"topic":"HVAC Aged","q":"HVAC equipment near end of typical service life:","choices":["Recommend evaluation by qualified HVAC contractor and budget for replacement","Replace immediately","Ignore","Inspect more frequently"],"correct":0,"exp":"Aged HVAC: report age, note typical service life, recommend qualified HVAC contractor evaluation. Even functional units may need replacement; budget item for client."},{"id":444,"domain":2,"task":4,"topic":"Structural Crack","q":"A horizontal crack in basement wall with displacement:","choices":["Recommend prompt evaluation by structural engineer","Cosmetic concern","Inspector measures and reports","Apply caulk"],"correct":0,"exp":"Horizontal crack with displacement (or significant horizontal cracks even without obvious displacement): structural engineer evaluation. Lateral earth pressure exceeded wall capacity - safety concern, intervention often required."},{"id":445,"domain":2,"task":4,"topic":"Dual Recommendations","q":"Some defects warrant multiple recommendations:","choices":["Inspector recommends only one","Inspector lists multiple as appropriate (e.g., immediate repair + further evaluation)","Recommendations are not allowed","Inspector chooses cheapest"],"correct":1,"exp":"Multiple recommendations: appropriate for complex issues. Example: active leak - immediate plumbing repair + evaluation of ceiling/wall damage by qualified contractor + mold evaluation if extended exposure."},{"id":446,"domain":2,"task":4,"topic":"Specialist Vocabulary","q":"Recommendations should use:","choices":["Specific qualified party (electrician, plumber, structural engineer, etc.)","Generic 'have it looked at'","Specific contractor name","No recommendation"],"correct":0,"exp":"Use specific qualified parties: licensed plumber, licensed electrician, structural engineer, qualified HVAC contractor, qualified pest control professional, qualified chimney sweep. Be specific about who."},{"id":447,"domain":2,"task":4,"topic":"Limited Inspection Note","q":"If inspector limitation prevents full evaluation:","choices":["Disclaim and recommend re-inspection or qualified evaluation","Ignore","Inspector estimates","Skip section"],"correct":0,"exp":"Limitation noted: disclaim what couldn't be evaluated, recommend re-inspection (when conditions permit) or qualified evaluation (specialty contractor). Don't guess at conditions."},{"id":448,"domain":2,"task":4,"topic":"Multiple Areas","q":"If similar defects exist throughout home (e.g., older outlets):","choices":["Recommend whole-house evaluation by qualified electrician","Spot-check","Ignore","Replace one"],"correct":0,"exp":"Pattern of defects: whole-system evaluation by qualified contractor. Older homes often need systemic upgrades (electrical, plumbing) rather than spot fixes."},{"id":449,"domain":2,"task":4,"topic":"Serious Safety Concerns","q":"Serious safety concerns warrant:","choices":["Bold/highlighted in report","Verbal communication to client during/after inspection","Recommendation for prompt correction","All of the above"],"correct":3,"exp":"Serious safety: emphasize in report (bold, executive summary), verbally communicate to client, recommend prompt correction. Don't bury life-safety in long lists. Examples: gas leaks, structural failure, life safety."},{"id":450,"domain":2,"task":4,"topic":"Trade Specific Language","q":"When recommending evaluation, use language like:","choices":["'Recommend evaluation by [qualified trade professional]'","'Talk to your friend'","'Get someone to look'","No language"],"correct":0,"exp":"Standard language: 'Recommend evaluation by qualified [trade]' - electrician, plumber, structural engineer, HVAC contractor, chimney sweep, pest control professional, etc. Specifies competent party for evaluation."},{"id":451,"domain":3,"task":1,"topic":"Agreement Required","q":"A pre-inspection agreement is:","choices":["Required by most state regulations and SOPs","Optional","Required only for first-time clients","Required only for new construction"],"correct":0,"exp":"Pre-inspection agreement: required by most state regulations, all SOPs, and is essential business practice. Defines scope, limitations, fees, dispute resolution, limit of liability."},{"id":452,"domain":3,"task":1,"topic":"Agreement Includes","q":"A pre-inspection agreement should include all EXCEPT:","choices":["Scope of inspection","Limitations and exclusions","Limit of liability","Guarantee of property condition"],"correct":3,"exp":"Inspection is NOT a guarantee or warranty. Pre-inspection agreement: scope, limitations, exclusions, limits, dispute resolution, fees. Guaranteeing condition transforms inspection into warranty - massive liability."},{"id":453,"domain":3,"task":1,"topic":"Limit of Liability","q":"A limit of liability clause typically:","choices":["Limits damages to inspection fee or specified amount","Eliminates all liability","Cannot be enforced","Increases liability"],"correct":0,"exp":"Limit of liability: caps damages typically at fee paid (or sometimes a multiplied fee, or fixed amount). Validity varies by state - some states reduce or void such clauses. Include arbitration and dispute resolution."},{"id":454,"domain":3,"task":1,"topic":"E&O Insurance","q":"Errors and Omissions (E&O) insurance covers:","choices":["Bodily injury at the site","Damage to client property during inspection","Professional negligence claims based on inspection findings or omissions","All of the above"],"correct":2,"exp":"E&O = professional negligence (work product). General Liability (GL) = bodily injury and property damage at site. Both are typically required and they are NOT the same coverage."},{"id":455,"domain":3,"task":1,"topic":"GL Insurance","q":"General Liability (GL) insurance covers:","choices":["Professional negligence","Bodily injury at the site, damage to client property during inspection","Vehicle accidents","Health insurance"],"correct":1,"exp":"GL: bodily injury (e.g., inspector injures client during inspection) or property damage during inspection (e.g., inspector accidentally breaks something). E&O covers work product. Both coverages typically required."},{"id":456,"domain":3,"task":1,"topic":"Scope Defined","q":"The scope section of a pre-inspection agreement defines:","choices":["What systems will be inspected","Limitations on scope","Standards of practice followed","All of the above"],"correct":3,"exp":"Scope section: components inspected, components excluded, SOP referenced, special inclusions/exclusions for this inspection. Avoids 'I expected you to inspect that' disputes."},{"id":457,"domain":3,"task":1,"topic":"Photo Permissions","q":"Pre-inspection agreement may include:","choices":["Permission to photograph","Disclosure that report contains photos","Consent for use in reports","All of the above"],"correct":3,"exp":"Photo permissions: explicit consent for inspection photography, indicates report will include photos, may address future use. Important in occupied homes with personal items."},{"id":458,"domain":3,"task":1,"topic":"Dispute Resolution","q":"Pre-inspection agreement dispute resolution typically specifies:","choices":["Arbitration vs litigation","Specific jurisdiction","Notice and opportunity-to-cure provisions","All of the above"],"correct":3,"exp":"Dispute resolution: pre-specified arbitration (often binding, faster, cheaper), specific jurisdiction (where disputes resolved), notice/opportunity-to-cure (inspector chance to verify before claim). Reduces costly litigation."},{"id":459,"domain":3,"task":1,"topic":"Notice of Defect","q":"Some agreements include a notice-of-defect clause requiring:","choices":["Client to notify inspector of suspected defects before repair","Inspector to fix all defects","Client to wait 30 days","Inspector to provide warranty"],"correct":0,"exp":"Notice/opportunity-to-cure: client agrees to notify inspector of alleged missed defect before fixing or paying for repair. Allows inspector to investigate, document, and possibly resolve before legal escalation."},{"id":460,"domain":3,"task":1,"topic":"Conflicts Generally","q":"An inspector should avoid conflicts including:","choices":["Performing repairs on inspected properties for 12-24+ months","Accepting referral fees from contractors recommended","Inspecting properties they have financial interest in","All of the above"],"correct":3,"exp":"Conflicts to avoid: post-inspection repair work (Wisconsin: 24 months prohibited), referral fees from recommended contractors, financial interest, inspecting family members' properties, etc."},{"id":461,"domain":3,"task":1,"topic":"Repair Restriction","q":"Wisconsin restricts inspectors from performing repairs on inspected properties for:","choices":["12 months","24 months (2 years)","36 months","No restriction"],"correct":1,"exp":"Wisconsin (and several other states) prohibits home inspector from performing repairs on inspected property for 24 months (2 years). Prevents conflict of interest where inspector finds defects to drive repair business."},{"id":462,"domain":3,"task":1,"topic":"Privacy Concerns","q":"Inspector privacy obligations include:","choices":["Avoiding capture of personal information in photos","Not disclosing inspection findings to unauthorized parties","Respecting occupant property","All of the above"],"correct":3,"exp":"Privacy obligations: minimize photographing personal items, don't disclose findings without client permission, respect occupant property and routine. Some inspectors disclose photo policy at start of inspection."},{"id":463,"domain":3,"task":1,"topic":"Report Distribution","q":"An inspection report:","choices":["Is public record","Is the property of the inspector, distributed only with client permission","Must be shared with sellers","Must be shared with listing agents"],"correct":1,"exp":"Report: inspector's work product, distribution per client. Don't share with sellers, listing agent, anyone without client's written permission. Many pre-inspection agreements address this explicitly."},{"id":464,"domain":3,"task":1,"topic":"Inspector Bias","q":"An inspector with a personal/business relationship to the seller should:","choices":["Disclose to client and potentially decline","Proceed if pricing is fair","Not disclose to maintain neutrality","Charge a discount"],"correct":0,"exp":"Conflicts of interest: disclose to client. Significant relationship (family, business partner) - decline. Lesser ones - disclose and let client decide. Transparency over compensation."},{"id":465,"domain":3,"task":1,"topic":"Referral Fees","q":"Accepting referral fees from a contractor an inspector recommends:","choices":["Standard practice","Conflict of interest, generally prohibited by ethics codes","Required for licensure","Tax-deductible"],"correct":1,"exp":"Referral fees: classic conflict of interest. Most ethics codes prohibit. Inspector financial incentive to find defects that match recommended contractor's services. Build referral relationships separately/ethically."},{"id":466,"domain":3,"task":1,"topic":"Continuing Education","q":"Inspectors maintain competence through:","choices":["Continuing education (CE) required by state and certifying bodies","Annual practice","Reading","Voluntary only"],"correct":0,"exp":"CE: typically state-mandated and required by certifying bodies (InterNACHI, ASHI). Specific hour requirements per renewal cycle. Topics include code updates, new technologies, business practices."},{"id":467,"domain":3,"task":1,"topic":"Client Confidentiality","q":"Client information should be:","choices":["Shared with anyone who asks","Kept confidential, shared only as authorized by client","Posted online","Sold"],"correct":1,"exp":"Client confidentiality: contact info, report content, inspection findings - confidential. Shared only as client authorizes. Marketing use of client info typically requires explicit consent."},{"id":468,"domain":3,"task":1,"topic":"Pre-Inspection Walkthrough Discussion","q":"Pre-inspection conversation with client should:","choices":["Set expectations about scope, limitations, time","Identify client's concerns or special interests","Review pre-inspection agreement","All of the above"],"correct":3,"exp":"Pre-inspection: scope expectations, limitations, time estimate, client concerns, agreement review/signature. Sets professional foundation. Many inspectors spend 10-15 minutes here."},{"id":469,"domain":3,"task":1,"topic":"Multiple Buyers","q":"If multiple parties are purchasing together (e.g., investment partners):","choices":["All should sign agreement and receive report","Only one needs to sign","Inspector chooses","Doesn't matter"],"correct":0,"exp":"Multiple buyers: ideally all sign agreement (or one signs as representative with authority for all). Standardize for clarity. Different from inspecting for one buyer who later wants to share report with others."},{"id":470,"domain":3,"task":1,"topic":"Real Estate Agent Present","q":"If a buyer's agent is present at inspection:","choices":["Inspector should verbally communicate primarily with client","Agent observes; client is the principal","Agent is welcome but not the client","All of the above"],"correct":3,"exp":"Buyer's agent present: useful (knows property history, can field questions about contract). Client is principal - inspector communicates primarily with client. Agent observes/supports."},{"id":471,"domain":3,"task":1,"topic":"Listing Agent Present","q":"If a listing (seller's) agent is present at inspection:","choices":["Inspector continues professionally; should not share findings until report to client","May provide useful access info","Should be politely managed if disruptive","All of the above"],"correct":3,"exp":"Listing agent present: their job (provide access, lock up after). Inspector remains neutral. Don't share findings on-site - report goes to client first. Be professional."},{"id":472,"domain":3,"task":1,"topic":"Seller Present","q":"If the seller is present at inspection:","choices":["Tactful professional behavior; client information remains confidential","Use of property in their presence per their permission","Inspector should request seller absent for objectivity","All of the above appropriate as situation warrants"],"correct":3,"exp":"Seller present: not ideal but happens. Inspector remains tactful, neutral, professional. Don't badmouth property. Don't share findings. Request privacy if findings concerning. Some agents prefer seller absent."},{"id":473,"domain":3,"task":1,"topic":"Code of Ethics","q":"Most state laws and certifying bodies require inspectors follow:","choices":["Code of ethics","Pricing schedule","Specific reporting software","Specific brand of equipment"],"correct":0,"exp":"Codes of ethics: state laws and certifying bodies (InterNACHI, ASHI, etc.). Cover: conflicts of interest, professional competence, confidentiality, marketing/advertising claims, professional behavior."},{"id":474,"domain":3,"task":1,"topic":"Honest Marketing","q":"Inspector marketing should:","choices":["Make truthful claims about credentials and experience","Avoid disparaging others","Maintain professional dignity","All of the above"],"correct":3,"exp":"Marketing ethics: no misrepresenting credentials/experience, no disparaging competitors, no false guarantees, no high-pressure tactics. Most state regulations and ethics codes address marketing."},{"id":475,"domain":3,"task":1,"topic":"License Display","q":"Most states with inspector licensure require:","choices":["Display of license number on advertising and reports","No display","Display only on request","Display only in office"],"correct":0,"exp":"License number on advertising, reports, websites, business cards, contracts. Required by most state regulations. Allows public verification of license status."},{"id":476,"domain":3,"task":2,"topic":"Avoid EXCEPT","q":"Inspectors should avoid all of the following EXCEPT:","choices":["Performing repairs within 24 months","Accepting referral fees","Recommending qualified specialists for further evaluation","Inspecting property they have financial interest in"],"correct":2,"exp":"Recommending qualified specialists is REQUIRED, not avoided. Other options are conflicts of interest. Wisconsin specifically prohibits inspector repair work for 2 years."},{"id":477,"domain":3,"task":2,"topic":"Inspector Repair Conflict","q":"An inspector performing repairs on a property they recently inspected:","choices":["Builds business synergies","Creates conflict of interest, prohibited in many jurisdictions","Is required by some states","Has no implications"],"correct":1,"exp":"Inspector-as-repair-contractor on inspected property: classic conflict (inspector incentive to find defects to fix). Wisconsin prohibits 24 months. Many states prohibit. Always disclose, ideally avoid."},{"id":478,"domain":3,"task":2,"topic":"Inspector and Seller","q":"If an inspector has prior business relationship with the seller:","choices":["Disclose to client and potentially decline","Proceed without disclosure","Accept gift from seller","Discount the inspection"],"correct":0,"exp":"Prior relationship with seller: disclose. Significant (family, business partner): decline. Minor (passing acquaintance): often okay with disclosure. Client decides if relationship material."},{"id":479,"domain":3,"task":2,"topic":"Misrepresentation","q":"Misrepresenting findings or credentials:","choices":["Acceptable for marketing","Violation of ethics code, possible licensure consequences, fraud potential","Common practice","Required"],"correct":1,"exp":"Misrepresentation: violates ethics codes and state regulations. Consequences: license suspension/revocation, civil liability, criminal fraud charges in extreme cases. Always factual and substantiated."},{"id":480,"domain":3,"task":2,"topic":"Self-Promotion","q":"Inspector self-promotion should:","choices":["Make truthful claims about credentials","Cite verifiable training and experience","Avoid disparaging competitors","All of the above"],"correct":3,"exp":"Self-promotion: truthful, verifiable, professional. No disparaging competitors. No false guarantees ('We catch everything!'). Maintain dignity."},{"id":481,"domain":3,"task":2,"topic":"Customer Complaints","q":"Handling customer complaints includes:","choices":["Investigation of the alleged issue","Documentation of communication","Possible re-inspection","All of the above"],"correct":3,"exp":"Complaint handling: take seriously, investigate, document, respond timely, possibly re-inspect, possibly settle. Insurance carrier notification for significant claims. Pattern of complaints can affect license."},{"id":482,"domain":3,"task":2,"topic":"Re-Inspection","q":"Re-inspection of an alleged missed defect:","choices":["Required by some pre-inspection agreements before claim","Inspector right to verify before paying","Useful for inspector education","All of the above"],"correct":3,"exp":"Re-inspection: agreement may require notice/opportunity to verify before claim payment. Inspector can verify finding, document, possibly identify why missed (or that wasn't reasonably visible). Educational regardless."},{"id":483,"domain":3,"task":2,"topic":"Continuing Competence","q":"Maintaining competence requires:","choices":["Continuing education","Reading current code/standards","Networking with peers","All of the above"],"correct":3,"exp":"Competence: CE hours, code/standards updates, peer interaction, real-world experience, mentoring. Inspector can't 'learn the job once.' Profession evolves."},{"id":484,"domain":3,"task":2,"topic":"Standard of Care","q":"Standard of care for an inspector is:","choices":["What a reasonable, similarly situated inspector would do","Perfection","Whatever inspector wants","Whatever client demands"],"correct":0,"exp":"Standard of care: what a reasonable, similarly situated inspector with similar training would do. Negligence = falling below this standard. Not perfection, but reasonable diligence."},{"id":485,"domain":3,"task":2,"topic":"Negligence","q":"Negligence in ho
