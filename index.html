er): decline. Minor (passing acquaintance): often okay with disclosure. Client decides if relationship material.","v":2},{"id":479,"domain":3,"task":2,"topic":"Misrepresentation","q":"Misrepresenting findings or credentials:","choices":["Acceptable for marketing","Violation of ethics code, possible licensure consequences, fraud potential","Common practice","Required"],"correct":1,"exp":"Misrepresentation: violates ethics codes and state regulations. Consequences: license suspension/revocation, civil liability, criminal fraud charges in extreme cases. Always factual and substantiated.","v":2},{"id":480,"domain":3,"task":2,"topic":"Self-Promotion","q":"Inspector self-promotion should:","choices":["Make truthful claims about credentials","Cite verifiable training and experience","Avoid disparaging competitors","All of the above"],"correct":3,"exp":"Self-promotion: truthful, verifiable, professional. No disparaging competitors. No false guarantees ('We catch everything!'). Maintain dignity.","v":2},{"id":481,"domain":3,"task":2,"topic":"Customer Complaints","q":"Handling customer complaints includes:","choices":["Investigation of the alleged issue","Documentation of communication","Possible re-inspection","All of the above"],"correct":3,"exp":"Complaint handling: take seriously, investigate, document, respond timely, possibly re-inspect, possibly settle. Insurance carrier notification for significant claims. Pattern of complaints can affect license.","v":2},{"id":482,"domain":3,"task":2,"topic":"Re-Inspection","q":"Re-inspection of an alleged missed defect:","choices":["Required by some pre-inspection agreements before claim","Inspector right to verify before paying","Useful for inspector education","All of the above"],"correct":3,"exp":"Re-inspection: agreement may require notice/opportunity to verify before claim payment. Inspector can verify finding, document, possibly identify why missed (or that wasn't reasonably visible). Educational regardless.","v":2},{"id":483,"domain":3,"task":2,"topic":"Continuing Competence","q":"Maintaining competence requires:","choices":["Continuing education","Reading current code/standards","Networking with peers","All of the above"],"correct":3,"exp":"Competence: CE hours, code/standards updates, peer interaction, real-world experience, mentoring. Inspector can't 'learn the job once.' Profession evolves.","v":2},{"id":484,"domain":3,"task":2,"topic":"Standard of Care","q":"Standard of care for an inspector is:","choices":["What a reasonable, similarly situated inspector would do","Perfection","Whatever inspector wants","Whatever client demands"],"correct":0,"exp":"Standard of care: what a reasonable, similarly situated inspector with similar training would do. Negligence = falling below this standard. Not perfection, but reasonable diligence.","v":2},{"id":485,"domain":3,"task":2,"topic":"Negligence","q":"Negligence in home inspection means:","choices":["Falling below the standard of care for similarly situated inspectors","Making any error","Not finding all defects","Disclosing limitations"],"correct":0,"exp":"Negligence: failing to meet reasonable standard. Errors can occur (e.g., couldn't see, sensible judgment call) without negligence. Persistent errors or significant misses can constitute negligence.","v":2},{"id":486,"domain":3,"task":2,"topic":"Photographing People","q":"When photographing in occupied homes:","choices":["Avoid people, especially children","Avoid personal documents and valuables","Avoid identifiable family items","All of the above"],"correct":3,"exp":"Photo etiquette: people (especially children), personal documents, valuables, family identification - avoid. Necessary photos may include defective fixtures, missed flooring areas. Focus on inspection, respect privacy.","v":2},{"id":487,"domain":3,"task":2,"topic":"Confidentiality","q":"Inspector confidentiality includes:","choices":["Client information","Inspection findings","Communications","All of the above"],"correct":3,"exp":"Inspector confidentiality: client info (contact, finance, etc.), findings (until report to client), communications. Don't share with seller, listing agent, anyone without authorization.","v":2},{"id":488,"domain":3,"task":2,"topic":"Honest Findings","q":"Reporting honest findings:","choices":["Required regardless of outcome implications (sale falls through, agent dissatisfied, etc.)","Should be softened to keep client happy","Adjusted to seller's preference","Should be aligned with agent's wishes"],"correct":0,"exp":"Honest findings: client paid for objective evaluation. Don't soften, omit, or fabricate. Report what was observed. Some buyers may walk; that's their right and inspector served them well.","v":2},{"id":489,"domain":3,"task":2,"topic":"Inspector Pressure","q":"If a buyer's agent pressures inspector to soften findings to save the deal:","choices":["Inspector accommodates","Inspector maintains objectivity, reports honestly to client","Cancel inspection","Refer to another inspector"],"correct":1,"exp":"Pressure to soften findings: inspector serves the client (the buyer), not the agent. Maintain objectivity. Document any inappropriate pressure. Pattern of pressure from same agent: reconsider business relationship.","v":2},{"id":490,"domain":3,"task":2,"topic":"Defect During Inspection","q":"If inspector causes a minor defect (e.g., damages something during testing):","choices":["Disclose to client/seller, document, possibly compensate","Hide it","Blame client","Charge extra"],"correct":0,"exp":"Inspector damage during inspection: disclose immediately, document, take responsibility, possibly compensate. GL insurance covers significant property damage. Honesty preserves credibility.","v":2},{"id":491,"domain":3,"task":2,"topic":"Report Errors","q":"If inspector discovers significant report error after delivery:","choices":["Issue corrected report promptly","Inform client of error","Document timeline","All of the above"],"correct":3,"exp":"Report error: prompt corrected version, transparent communication with client, document timeline. Honest acknowledgment of error preserves trust. Most buyers appreciate transparency.","v":2},{"id":492,"domain":3,"task":2,"topic":"Client Education","q":"Educating clients during inspection:","choices":["Builds value and understanding","Should remain within inspection scope (not legal/financial advice)","Important value-add","All of the above"],"correct":3,"exp":"Client education: real value-add. Stay in lane (inspection topics, not real estate advice, not legal/financial advice, not negotiation strategy). Show systems, explain findings, maintenance tips.","v":2},{"id":493,"domain":3,"task":2,"topic":"Stay In Scope","q":"Inspector should NOT provide:","choices":["Real estate advice (whether to buy)","Legal advice","Financial advice","All of the above"],"correct":3,"exp":"Stay in lane: don't provide real estate, legal, or financial advice. Refer to qualified professionals (real estate agent, attorney, financial advisor). Inspector's expertise: building condition, not transaction strategy.","v":2},{"id":494,"domain":3,"task":2,"topic":"Liability Reducers","q":"Practices that reduce inspector liability include:","choices":["Detailed pre-inspection agreement","Thorough documentation with photos","Honest reporting","All of the above"],"correct":3,"exp":"Liability reducers: written agreement, documentation (photos, notes), honest reporting (disclose limitations, recommend qualified evaluation), professional behavior, ongoing training, insurance.","v":2},{"id":495,"domain":3,"task":2,"topic":"Inspector Insurance","q":"Inspector insurance typically includes:","choices":["E&O (Errors & Omissions)","General Liability (GL)","Sometimes commercial auto","All of the above"],"correct":3,"exp":"Inspector insurance: E&O (work product), GL (bodily injury/property damage), business auto (if vehicle for business), workers comp (if employees), cyber/data breach insurance increasingly common.","v":2},{"id":496,"domain":3,"task":2,"topic":"Reporting Standard","q":"All findings should be:","choices":["Reported regardless of impact on sale","Modified to keep deal together","Hidden from non-paying parties","Discussed with seller first"],"correct":0,"exp":"Honest, complete reporting: client paid for objective evaluation. Sale impact not inspector's concern. Modifying for sale impact: ethics violation, professional liability, fraud potential.","v":2},{"id":497,"domain":3,"task":2,"topic":"Continuing Pressure","q":"If a buyer's agent persistently pressures softening findings:","choices":["Inspector accommodates","Inspector documents incidents and considers ending business relationship","Refer to another inspector","Inspector confronts agent in front of buyer"],"correct":1,"exp":"Pattern of pressure: document each incident, evaluate business relationship. Some inspectors maintain 'do not work with' lists. Maintain integrity over volume of business.","v":2},{"id":498,"domain":3,"task":2,"topic":"Privacy Sensitivity","q":"Inspectors should be sensitive to:","choices":["Cultural differences (e.g., shoes off in some homes)","Religious customs (timing of access)","Privacy of occupants","All of the above"],"correct":3,"exp":"Cultural and privacy sensitivity: shoes off (request from occupant), Sabbath/holiday timing, occupants present and need notice, language barriers. Professional adaptability important.","v":2},{"id":499,"domain":3,"task":2,"topic":"Maintain Records","q":"Inspector record retention:","choices":["Per state requirements, often 5-10 years","No requirement","Until next inspection","Indefinitely"],"correct":0,"exp":"Record retention: typically 5-10 years per state regulations. Reports, photos, communications. Insurance claims may require records, statute of limitations varies. Backed up digitally.","v":2},{"id":500,"domain":3,"task":2,"topic":"Code of Ethics","q":"An inspector code of ethics typically requires:","choices":["Independence and objectivity","Confidentiality","Professional behavior","All of the above"],"correct":3,"exp":"Code of ethics: independence, objectivity, confidentiality, professional behavior, no conflicts of interest, honest marketing, continuing competence. Codes from InterNACHI, ASHI, state regulations - largely overlapping.","v":2},{"id":501,"domain":1,"task":7,"topic":"AFUE Definition","q":"Annual Fuel Utilization Efficiency (AFUE) for an 80% AFUE gas furnace means:","choices":["80% of the fuel produces heat used in the home; 20% is lost via venting or other","20% of the fuel produces heat","The furnace uses 80% gas and 20% propane","The furnace runs at 80% capacity year-round"],"correct":0,"exp":"Per Vol 1 Ch 3: AFUE expresses the ratio of heat generated by the heating system versus energy used. Minimum AFUE for most gas furnaces is around 80%. The remainder is lost through the vent or other means.","v":3},{"id":502,"domain":1,"task":7,"topic":"Forced Draft","q":"Forced draft venting differs from induced draft because:","choices":["Forced uses negative pressure; induced uses positive","Forced uses positive pressure (fan at start of vent); induced uses negative pressure","They are identical","Both use natural draft only"],"correct":1,"exp":"Per Vol 1 Ch 3: forced draft uses a fan at the START of the vent system to push gases under positive pressure. Induced draft uses negative pressure created by a fan to PULL gases through the heat exchanger. Forced draft vents must be sealed to prevent gas escape.","v":3},{"id":503,"domain":1,"task":7,"topic":"Induced Draft","q":"An induced draft furnace uses:","choices":["Natural buoyancy only","A fan creating negative pressure to pull combustion gases through the heat exchanger","A blower at the chimney top","Manual operation"],"correct":1,"exp":"Induced draft (most medium efficiency gas furnaces): a fan creates negative pressure to pull combustion gases through the heat exchanger. Vent itself remains under negative pressure - not pressurized like forced draft.","v":3},{"id":504,"domain":1,"task":7,"topic":"Stack Effect","q":"Natural draft venting relies on the stack effect, which is:","choices":["Wind pressure","Combustion gases rising because they are hotter, less dense, and at lower pressure than surrounding air","Mechanical pumps","A negative pressure created by HVAC"],"correct":1,"exp":"Per Vol 1: stack effect = combustion gases rise because they are less dense and more buoyant than surrounding gases. Fireplaces and most natural draft gas/oil appliances rely on this. Cool gases that lose heat in the vent become too heavy to rise - causing backdraft.","v":3},{"id":505,"domain":1,"task":7,"topic":"Backdrafting Cause","q":"Backdrafting in a natural draft vent occurs when:","choices":["The chimney is too tall","Gases lose enough heat in the vent that they become too heavy to rise","Combustion air is excessive","Outdoor temperatures are too high"],"correct":1,"exp":"Per Vol 1: backdrafting happens when combustion gases lose enough heat in improperly installed chimneys or vents that they become too heavy to reach the top. They fall back into the house. Hazard for CO accumulation.","v":3},{"id":506,"domain":1,"task":7,"topic":"Category I Vent Temp","q":"Category I gas appliance vent gas temperature is approximately:","choices":["100\u00b0F","300\u00b0F","140\u00b0F","800\u00b0F"],"correct":1,"exp":"Category I appliance vent gas: ~300\u00b0F. Hot enough to rise via stack effect through Type B vent, masonry chimney, or single-wall vent. Examples: low/medium efficiency furnaces, draft-hood water heaters.","v":3},{"id":507,"domain":1,"task":7,"topic":"Category IV Vent Temp","q":"Category IV (high-efficiency condensing) gas appliance vent gas temperature is approximately:","choices":["300\u00b0F","140\u00b0F","600\u00b0F","Below 32\u00b0F"],"correct":1,"exp":"Category IV vent gas: ~140\u00b0F (rather cool). Heat exchangers extract 90%+ of combustion heat. Vent gas so cool it must be exhausted under positive pressure through plastic pipe. Condensation in the vent is a defining characteristic.","v":3},{"id":508,"domain":1,"task":7,"topic":"Category IV Vent Material","q":"Category IV (high-efficiency condensing) appliances typically vent through:","choices":["Type B metal vent","Single-wall metal vent","PVC plastic pipe","Masonry chimney"],"correct":2,"exp":"Per Vol 1: Category IV appliances use plastic pipe (usually PVC) as the vent because gas temperature is so low. Vents must handle positive pressure and acidic condensate. Type B and masonry are for Category I.","v":3},{"id":509,"domain":1,"task":7,"topic":"Category III","q":"Category III appliances differ from Category I because:","choices":["They use negative pressure","They use positive pressure venting (must use manufacturer-recommended vent)","They are higher efficiency than Category IV","They cannot use any venting"],"correct":1,"exp":"Per Vol 1: Category III vent gas is hot like Category I but is under positive pressure. Must use manufacturer-recommended components. May not connect to Category I vents. Examples: some demand water heaters.","v":3},{"id":510,"domain":1,"task":7,"topic":"Heat Exchanger Cracks","q":"Cracks in a furnace heat exchanger:","choices":["Have minimal effect","Allow combustion gases (including CO) to mix with the conditioned airstream - safety hazard","Improve efficiency","Are normal aging"],"correct":1,"exp":"Per Vol 1: cracks in the heat exchanger walls allow combustion gases into the air circulation - a major safety issue. Caused by metal fatigue (heating/cooling cycles) or faulty high-limit switch. Furnaces with cracked heat exchangers usually need replacement.","v":3},{"id":511,"domain":1,"task":7,"topic":"Heat Exchanger Visibility","q":"In an induced draft Category I furnace, the heat exchanger is:","choices":["Fully visible from the access panel","Rarely visible to the inspector","Always visible","Visible only from the top"],"correct":1,"exp":"Per Vol 1: heat exchanger is rarely visible in induced draft furnaces. About 20% may be visible in older draft-hood furnaces. Inspectors should report whether or not it was visible and inspected. Crack detection often requires camera/dye testing by HVAC tech.","v":3},{"id":512,"domain":1,"task":7,"topic":"Pilot Replacement","q":"Newer gas furnaces typically use what instead of a standing pilot light?","choices":["Larger pilot","Hot-surface igniter that glows hot to ignite gas","Spark plug","No ignition needed"],"correct":1,"exp":"Per Vol 1: newer furnaces typically have an igniter that glows hot (hot-surface igniter, the 'glow stick'). Older furnaces had standing pilot lights. Some use spark/intermittent-pilot igniters. Hot-surface igniters are the dominant modern technology.","v":3},{"id":513,"domain":1,"task":7,"topic":"Single-Stage Gas Valve","q":"An older single-stage gas valve allows gas to flow at:","choices":["Variable rate","One rate (full on or off)","Two rates","Three rates"],"correct":1,"exp":"Single-stage gas valves: one flow rate (on/off). Two-stage valves: high and low fire. Modulating valves: variable flow. Newer furnaces use multi-stage or modulating valves matched with variable-speed ECM blowers for higher efficiency.","v":3},{"id":514,"domain":1,"task":7,"topic":"ECM Motor","q":"An electronically commutated motor (ECM):","choices":["Is older and less efficient","Is more efficient than a permanent split capacitor (PSC) motor","Cannot run at variable speeds","Is found only in air conditioners"],"correct":1,"exp":"Per Vol 1: ECM motors are more efficient than older PSC motors. Variable speed capability. Combined with two-stage or modulating gas valves in high-efficiency systems. CTM (constant torque motors) are sometimes used in mid-efficiency.","v":3},{"id":515,"domain":1,"task":7,"topic":"Flame Color","q":"A properly burning gas flame should appear:","choices":["Yellow or orange","Blue, sometimes with a slight yellow tip","Bright white","Green"],"correct":1,"exp":"Per Vol 1: properly burning gas flame is BLUE, sometimes with slight yellow tip. Yellow or orange flame is a reportable defect - indicates improperly adjusted burner, gas valve issue, or inadequate combustion air.","v":3},{"id":516,"domain":1,"task":7,"topic":"Flickering Flame","q":"A flame that flickers or distorts after the fan activates can indicate:","choices":["Normal operation","A possible cracked heat exchanger","Excessive combustion air","Standard fan operation"],"correct":1,"exp":"Per Vol 1: a flickering or distorted flame after fan activation could indicate a cracked heat exchanger - air movement disturbing combustion. Reportable defect. More easily visible with ribbon burners than inshot burners.","v":3},{"id":517,"domain":1,"task":7,"topic":"Flame Rollout Sensors","q":"The silver-colored buttons near furnace burners are:","choices":["Pilot lights","Flame-rollout sensors that shut off the furnace if excess heat is detected","Air filters","Voltage regulators"],"correct":1,"exp":"Per Vol 1: flame-rollout sensors are silver-colored buttons near the burners. They shut off the furnace if they detect excess heat - typically caused by blocked heat exchanger, blocked vent, or inadequate combustion air.","v":3},{"id":518,"domain":1,"task":7,"topic":"Bypassed Switch Indicator","q":"Bypassed safety controls usually appear as:","choices":["New parts","Wires connected with wire nuts where wire nuts are not usually seen","Missing components","Black tape"],"correct":1,"exp":"Per Vol 1: bypassed safety controls (high limit, flame rollout, draft pressure) usually present as wires spliced together with wire nuts. Bypassing safety controls is a serious defect - those switches exist to prevent dangerous operation.","v":3},{"id":519,"domain":1,"task":7,"topic":"Flexible Gas Connector","q":"Flexible gas connectors:","choices":["Are required to enter the cabinet","Are not permitted to enter the appliance cabinet (must be solid pipe)","Must be at least 6 feet long","Are required by code"],"correct":1,"exp":"Per Vol 1: gas supply must enter the cabinet through SOLID pipe. Flexible gas connectors are not permitted to enter cabinets. Common defect when DIY installations or improper service work has occurred.","v":3},{"id":520,"domain":1,"task":7,"topic":"Garage Furnace Elevation","q":"A gas furnace installed in a garage must have its ignition source elevated at least:","choices":["6 inches","12 inches","18 inches above the floor","36 inches"],"correct":2,"exp":"Per Vol 1 / IRC 2018 M1307.3: ignition source elevated at least 18 inches above garage floor. Prevents ignition of gasoline vapors that pool at floor level. Same applies to water heaters in garages.","v":3},{"id":521,"domain":1,"task":7,"topic":"Garage Vehicle Protection","q":"Appliances installed in a garage must be:","choices":["Painted yellow","Protected from vehicle impact (framing or bollard)","On wheels","On a raised platform"],"correct":1,"exp":"Per Vol 1: appliances in garages (furnace, water heater) must be protected from vehicle impact - typically with framing or a bollard. Critical for gas/water/electric safety - vehicle strike could rupture gas line.","v":3},{"id":522,"domain":1,"task":7,"topic":"Combustion Air Standard Method","q":"Drawing combustion air from the same room (Standard Method) requires at least:","choices":["10 cubic feet per 1,000 Btu/h input","50 cubic feet per 1,000 Btu/h input","100 cubic feet per 1,000 Btu/h input","Any volume"],"correct":1,"exp":"Per Vol 1 / IRC G2407: Standard Method requires at least 50 cubic feet of room volume per 1,000 Btu/h of appliance input. A 100,000 Btu/h furnace needs 5,000 cubic feet (a typical living area).","v":3},{"id":523,"domain":1,"task":7,"topic":"Combustion Air Two Openings","q":"When combustion air is drawn from inside through two openings between rooms, openings should be:","choices":["Both at floor level","One within 12 inches of floor; one within 12 inches of ceiling","Both at ceiling level","Mid-wall height"],"correct":1,"exp":"Per Vol 1: two-opening method - one opening within 12 inches of floor, the other within 12 inches of ceiling. Each at least 1 sq inch per 1,000 Btu/h. Captures air from the entire room volume.","v":3},{"id":524,"domain":1,"task":7,"topic":"Outside Combustion Air Vertical Duct","q":"For combustion air drawn from outside through vertical ducts, net free opening area is at least:","choices":["1 sq inch per 1,000 Btu/h","1 sq inch per 4,000 Btu/h","1 sq inch per 10,000 Btu/h","No requirement"],"correct":1,"exp":"Per Vol 1: outside combustion air via two openings or vertical ducts requires 1 sq inch per 4,000 Btu/h. Horizontal ducts: 1 sq inch per 2,000 Btu/h (more area required because horizontal flow is harder).","v":3},{"id":525,"domain":1,"task":7,"topic":"Combustion Air Horizontal Duct","q":"Combustion air horizontal ducts to outside require net free area of:","choices":["1 sq inch per 1,000 Btu/h","1 sq inch per 2,000 Btu/h","1 sq inch per 4,000 Btu/h","1 sq inch per 10,000 Btu/h"],"correct":1,"exp":"Per Vol 1: horizontal combustion air ducts: 1 sq inch per 2,000 Btu/h. More area required than vertical because horizontal ducts have more friction loss. Vertical ducts: 1 sq inch per 4,000 Btu/h.","v":3},{"id":526,"domain":1,"task":7,"topic":"Single Combustion Air Opening","q":"If combustion air comes from outside via a single opening within 12 inches of the ceiling, area is at least:","choices":["1 sq inch per 1,000 Btu/h","1 sq inch per 3,000 Btu/h","1 sq inch per 5,000 Btu/h","No standard exists"],"correct":1,"exp":"Per Vol 1: single combustion air opening near ceiling requires 1 sq inch per 3,000 Btu/h for gas appliances. Different ratios apply for two-opening, single-opening high/low, vertical/horizontal duct configurations.","v":3},{"id":527,"domain":1,"task":7,"topic":"Combustion Air Duct Min Dimension","q":"The minimum dimension of a combustion air opening or duct is:","choices":["1 inch","2 inches","3.5 inches","6 inches"],"correct":2,"exp":"Per Vol 1: minimum dimension for combustion air openings and ducts is 3.5 inches. Smaller dimensions don't provide adequate airflow. Net free area accounts for screens (reduce 25% for wood louvers, 75% for metal).","v":3},{"id":528,"domain":1,"task":7,"topic":"Wood Louver NFA","q":"An opening with wood louvers is assumed to have what net free area?","choices":["25%","50%","75%","100%"],"correct":0,"exp":"Per Vol 1: wood louvers are assumed to provide 25% net free area (they significantly obstruct airflow). Metal louvers: 75% net free area (less obstruction). Account for screen/louver reduction when sizing combustion air openings.","v":3},{"id":529,"domain":1,"task":7,"topic":"Metal Louver NFA","q":"An opening with metal louvers is assumed to have what net free area?","choices":["25%","50%","75%","100%"],"correct":2,"exp":"Per Vol 1: metal louvers are assumed to provide 75% net free area. Wood louvers: 25%. The reduction must be accounted for when sizing combustion air openings - actual air-passing area is less than the gross opening.","v":3},{"id":530,"domain":1,"task":7,"topic":"Combustion Air Termination Height","q":"Combustion air duct exterior terminations should be at least how far above grade?","choices":["6 inches","12 inches above grade or above highest anticipated snow accumulation","36 inches","No requirement"],"correct":1,"exp":"Per Vol 1: combustion air ducts must terminate at least 12 inches above grade or above highest anticipated snow accumulation. Snow blocking the intake starves the appliance and can cause incomplete combustion or shutdown.","v":3},{"id":531,"domain":1,"task":7,"topic":"Combustion Air Duct Materials","q":"Combustion air ducts should typically be constructed from:","choices":["Plastic flexible","At least 28-gauge galvanized steel (or equivalent approved materials)","Cardboard","PVC pipe"],"correct":1,"exp":"Per Vol 1: combustion air ducts: at least 28-gauge galvanized steel or equivalent approved. Stud/joist cavities OK if no more than one fireblock removed. Flexible duct and duct board are NOT permitted.","v":3},{"id":532,"domain":1,"task":7,"topic":"Single Duct One Opening","q":"Combustion air ducts should have:","choices":["Multiple openings to serve multiple rooms","Only one opening (cannot serve as both upper and lower)","Three openings minimum","No specific requirements"],"correct":1,"exp":"Per Vol 1: combustion air ducts must have only ONE opening. The same duct cannot serve as upper and lower duct, and one duct cannot open into different rooms. Each duct serves one purpose, one location.","v":3},{"id":533,"domain":1,"task":7,"topic":"Prohibited Appliance Locations","q":"Gas-burning appliances should NOT be located in:","choices":["A bathroom or bedroom (with exceptions)","Mechanical rooms","Basements","Attics"],"correct":0,"exp":"Per Vol 1 / IRC G2406: gas/oil appliances should not be in bedrooms, bathrooms, closets, or spaces opening only into these. Exceptions: direct-vent appliances (sealed combustion from outside) and certain weather-stripped configurations.","v":3},{"id":534,"domain":1,"task":7,"topic":"Direct Vent Definition","q":"A direct-vent appliance:","choices":["Vents through any chimney","Obtains combustion air from outside AND expels combustion products outside","Has no venting","Uses indoor air for combustion"],"correct":1,"exp":"Per Vol 1: direct-vent = obtains combustion air from outside AND expels combustion products outside. Sealed combustion. Usually high-efficiency. Different from direct-exhaust which uses indoor air for combustion but exhausts outside.","v":3},{"id":535,"domain":1,"task":7,"topic":"Direct Exhaust","q":"A direct-exhaust appliance:","choices":["Same as direct-vent","Obtains combustion air from inside but expels combustion products outside","Vents into the home","Has no electricity"],"correct":1,"exp":"Per Vol 1: direct-exhaust = combustion air from INSIDE the house, combustion products OUT. Different from direct-vent (both in/out from outside). Some appliances can be field-configured as either.","v":3},{"id":536,"domain":1,"task":7,"topic":"Boiler Operating Pressure","q":"Normal operating pressure for a residential hot water boiler is typically:","choices":["5-10 psi","12-25 psi","60 psi","100 psi"],"correct":1,"exp":"Hot water boiler operates at 12-25 psi typically. PRV trips at 30 psi if expansion tank fails or system over-fills. Pressure rises as water heats - expansion tank accommodates. Common defect: waterlogged expansion tank causing PRV discharge.","v":3},{"id":537,"domain":1,"task":7,"topic":"Expansion Tank Function","q":"The expansion tank in a hot water heating system:","choices":["Stores backup hot water","Accommodates volume changes as water heats and cools","Filters debris","Generates heat"],"correct":1,"exp":"Expansion tank: contains air bladder/diaphragm that absorbs water volume change as the system heats up. Without it (or with waterlogged tank), pressure rises until PRV opens. Should be inspected at periodic maintenance.","v":3},{"id":538,"domain":1,"task":7,"topic":"Hydronic Definition","q":"Hydronic heating is defined as:","choices":["Air-based heating only","Heating that circulates hot liquid or steam through pipes","Electric resistance only","Heat pump system"],"correct":1,"exp":"Per Vol 1 Ch 3 terms: hydronic = circulates hot liquid or steam through pipes. Pipes may be in floor, wall, ceiling, or serve radiators. Includes hot water boilers and steam systems. Distinct from forced-air ducted systems.","v":3},{"id":539,"domain":1,"task":7,"topic":"Steam vs Hot Water","q":"Steam heating differs from hot water hydronic by:","choices":["Higher operating pressure","Boiling water to produce steam, distributing via piping (often by gravity)","Use of pumps","Use of in-floor tubing"],"correct":1,"exp":"Steam systems: water is boiled to produce steam, which travels through piping (often by gravity in older systems) to radiators, condenses back to water, returns. Older technology. Hot water hydronic: water stays below boiling, circulated by pump.","v":3},{"id":540,"domain":1,"task":7,"topic":"Gravity Furnace","q":"A gravity warm-air furnace:","choices":["Has no blower; relies on natural convection","Has the largest blower of any furnace type","Uses no fuel","Is the modern standard"],"correct":0,"exp":"Per Vol 1: gravity systems are 'relics of the late 1800s and early 1900s' - no fan and no filter. Heated air rises by convection (less dense). Very inefficient, uneven heating. Most have been replaced; some converted with retrofit blowers.","v":3},{"id":541,"domain":1,"task":7,"topic":"Heat Pump Below Outdoor Temp","q":"A heat pump or AC compressor should not be operated in cooling mode if outdoor temps have been below approximately:","choices":["32\u00b0F for 24 hours","60\u00b0F for 24 hours","45\u00b0F for 12 hours","70\u00b0F for any time"],"correct":1,"exp":"Standard rule: don't operate cooling if outdoor temps were below ~60\u00b0F for 24 hours. Risk: oil migration in compressor, slugging on startup. Disclaim cooling test in cold weather; document and recommend re-evaluation.","v":3},{"id":542,"domain":1,"task":7,"topic":"Manual J","q":"ACCA Manual J is used to:","choices":["Calculate sensible heating and cooling loads for the house","Determine equipment installation cost","Specify insulation R-values","Size electrical service"],"correct":0,"exp":"Per Vol 1: Manual J calculates sensible heating loads (and cooling) for a house based on geographic location, orientation, insulation, windows, infiltration. Manual S then determines equipment capacity. Software-driven now. Inspectors not required to perform.","v":3},{"id":543,"domain":1,"task":7,"topic":"Required Heating Temperature","q":"A heating system should be capable of maintaining what minimum temperature in habitable space?","choices":["60\u00b0F","65\u00b0F","68\u00b0F","72\u00b0F"],"correct":2,"exp":"Per Vol 1: heating system should maintain at least 68\u00b0F in every habitable space. Measured 3 feet above floor and 2 feet from exterior wall. Bathrooms, laundry, and closets are NOT habitable - heat source not required there.","v":3},{"id":544,"domain":1,"task":7,"topic":"Habitable Space","q":"Spaces that are NOT considered habitable for heating purposes include:","choices":["Living room","Kitchen","Bedroom","Bathroom (and laundry, closets)"],"correct":3,"exp":"Per Vol 1: bathrooms, laundry rooms, and closets are NOT habitable spaces. Heat source not required there. Habitable: living, dining, bedroom, kitchen, family rooms - require 68\u00b0F heating capacity.","v":3},{"id":545,"domain":1,"task":7,"topic":"Inspection in Hot Weather","q":"Some inspectors will not operate the heating system if outdoor temp is above:","choices":["50\u00b0F","65\u00b0F","80-90\u00b0F","100\u00b0F"],"correct":2,"exp":"Per Vol 1: many inspectors won't operate heat above 80-90\u00b0F. Concern is potential damage. Modern furnaces have high-limit safety switches that should prevent damage. Some have temperature lockouts. Note in report if not operated and why.","v":3},{"id":546,"domain":1,"task":9,"topic":"ERV Definition","q":"An Energy Recovery Ventilator (ERV) is defined as:","choices":["A whole house mechanical ventilation system that transfers heat AND moisture between incoming and outgoing air","Heat transfer only","An air conditioning component","A backup heating system"],"correct":0,"exp":"Per Vol 1 terms: ERV = whole house mechanical ventilation system that transfers BOTH heat AND moisture between incoming ventilation air and outgoing exhaust air. The 'moisture' transfer distinguishes it from HRV.","v":3},{"id":547,"domain":1,"task":9,"topic":"HRV Definition","q":"A Heat Recovery Ventilator (HRV) is defined as:","choices":["Heat AND moisture transfer","Whole house mechanical ventilation that transfers HEAT only between incoming and outgoing air","Cooling system","Backup heat"],"correct":1,"exp":"Per Vol 1 terms: HRV transfers HEAT only between incoming ventilation air and outgoing exhaust air. ERV adds moisture (humidity) transfer. HRV better in cold/dry climates; ERV in humid or mixed climates.","v":3},{"id":548,"domain":1,"task":9,"topic":"ERV vs HRV Climate","q":"An ERV is typically preferred over an HRV in:","choices":["Cold and dry climates","Humid or mixed climates","Arctic climates only","Tropical climates only"],"correct":1,"exp":"ERV: humid or mixed climates - the moisture transfer keeps incoming humid air's moisture in or excess interior moisture out. HRV: cold/dry climates - moisture transfer not needed, just heat. Wisconsin's mixed humid climate could justify either.","v":3},{"id":549,"domain":1,"task":9,"topic":"Range Hood Standard","q":"The most common residential range hood is approximately:","choices":["12 inches wide, 30 cfm","30 inches wide, 100 cfm exhaust capacity","48 inches wide, 1,000 cfm","60 inches wide, 50 cfm"],"correct":1,"exp":"Per Vol 1: most common range hood is 30 inches wide with 100 cfm exhaust capacity. Larger and more powerful hoods are available. Larger hoods (over 400 cfm) trigger makeup air requirements.","v":3},{"id":550,"domain":1,"task":9,"topic":"Range Hood Makeup Air","q":"A range hood with capacity exceeding what threshold should have makeup air?","choices":["100 cfm","200 cfm","400 cfm","1,000 cfm"],"correct":2,"exp":"Per Vol 1 (and IRC): range hoods exceeding 400 cfm should be provided with a source of makeup air. Without it, hood depressurizes the home, causing backdraft of fuel-burning appliances and chimneys.","v":3},{"id":551,"domain":1,"task":9,"topic":"Recirculating Range Hood Exception","q":"An exception that allows a range hood to recirculate air (rather than exhaust outside) is:","choices":["Only in basement","If an operable window exists in the kitchen OR house has ERV/HRV","Only in commercial","If under 50 cfm"],"correct":1,"exp":"Per Vol 1: range hoods should be ducted to outdoors. Exception: recirculating allowed if operable window in kitchen area OR if house has ERV/HRV ventilation system. Less effective than vented hoods.","v":3},{"id":552,"domain":1,"task":9,"topic":"Range Hood Duct Material","q":"Range hood exhaust ducts should be:","choices":["Plastic flexible","Metal (galvanized steel or copper)","Cardboard","Fabric"],"correct":1,"exp":"Per Vol 1: exhaust duct material should be metal - usually galvanized steel or copper. Schedule 40 PVC or ABS may be used for downdraft units installed in concrete slab. Plastic flexible is a defect.","v":3},{"id":553,"domain":1,"task":9,"topic":"Range Hood Termination Inside","q":"A range hood exhaust duct terminating inside the attic or crawl space is:","choices":["Acceptable","A defect (must terminate outdoors)","Required by some codes","Common in older homes"],"correct":1,"exp":"Per Vol 1: exhaust duct should run to OUTDOORS, not into the attic or crawl space. Indoor termination dumps moisture and grease into structure - moisture and fire hazards. Always exterior termination via wall, soffit (if rated), or roof.","v":3},{"id":554,"domain":1,"task":9,"topic":"Range Hood Damper","q":"A range hood exterior termination should have:","choices":["No damper","A damper that moves freely","A permanently sealed cap","A check valve only"],"correct":1,"exp":"Per Vol 1: exterior termination fitting should have a damper that moves freely. Damper opens during operation, closes when off (preventing backdraft of cold air, pests, weather). Stuck shut = system can't exhaust.","v":3},{"id":555,"domain":1,"task":9,"topic":"Range Hood Termination Size","q":"A range hood exterior termination opening smaller than approximately what diameter may be too small?","choices":["2 inches","4 inches","6 inches","12 inches"],"correct":2,"exp":"Per Vol 1: termination opening smaller than about 6 inches diameter (or equivalent rectangle area) might be too small. Restriction reduces flow, causes backdraft. Match to fan capacity.","v":3},{"id":556,"domain":1,"task":9,"topic":"Microwave Above Cooktop","q":"Some manufacturers recommend at least how much distance between cooktop and over-the-range microwave?","choices":["12 inches","20 inches","30 inches","48 inches"],"correct":2,"exp":"Per Vol 1: some manufacturers recommend at least 30 inches between cooktop and the kitchen cabinet (which is where over-the-range microwaves install). Some recommend at least 66 inches between floor and top of microwave.","v":3},{"id":557,"domain":1,"task":9,"topic":"Microwave to Floor","q":"Some manufacturers recommend at least how much distance between the floor and the top of an over-the-range microwave?","choices":["60 inches","66 inches","72 inches","84 inches"],"correct":1,"exp":"Per Vol 1: some manufacturers recommend at least 66 inches floor-to-microwave-top. This affects accessibility and use. Smaller distances reduce safety and convenience.","v":3},{"id":558,"domain":1,"task":9,"topic":"Range Hood No Duct","q":"A range hood that's blowing into a wall cavity without a duct:","choices":["Is acceptable","Is a defect (no proper exhaust path)","Required for backdraft prevention","Improves circulation"],"correct":1,"exp":"Per Vol 1: removing filters and trying to see the exhaust duct - sometimes the fan is blowing into the wall cavity without a duct. Major defect. Moisture and grease accumulate in wall cavity. Defective installation.","v":3},{"id":559,"domain":1,"task":9,"topic":"Microwave Plug-and-Cord","q":"Microwave plug-and-cord cables:","choices":["May pass through walls/floors","May NOT pass through walls, floors, and ceilings","Must always be hardwired","Have no restrictions"],"correct":1,"exp":"Per Vol 1: plug-and-cord cables may not pass through walls, floors, and ceilings. If a microwave is connected and the kitchen receptacle is GFCI tested, microwave should NOT shut off (would indicate it's on shared kitchen circuit, which is a defect).","v":3},{"id":560,"domain":1,"task":9,"topic":"Bath Fan Min CFM","q":"A bathroom exhaust fan must move at minimum:","choices":["5 CFM continuous","20 CFM continuous OR 50 CFM intermittent","100 CFM continuous","200 CFM"],"correct":1,"exp":"Per IRC: bath exhaust 20 CFM continuous OR 50 CFM intermittent. Many newer codes increased to 80-100 CFM. Sized for room volume and use.","v":3},{"id":561,"domain":1,"task":9,"topic":"Bath Fan Discharge","q":"Bathroom exhaust fans must discharge:","choices":["Into the attic","Into the crawl space","To the exterior of the building","Into another bathroom"],"correct":2,"exp":"Bath fans must discharge to the exterior - through a wall, gable, soffit (if rated), or roof. Discharge into attic or crawl is a defect: dumps humid air into a cold space, causing condensation, mold, frost on roof sheathing.","v":3},{"id":562,"domain":1,"task":9,"topic":"Dryer Vent Material","q":"Dryer exhaust ducts should be:","choices":["Plastic flexible","Rigid or semi-rigid metal","Vinyl flexible","Cardboard"],"correct":1,"exp":"Dryer venting: rigid or semi-rigid metal only. Plastic flexible (vinyl) is a fire hazard - lint accumulates and ignites. Even foil-faced flex is suboptimal; smooth rigid metal is best.","v":3},{"id":563,"domain":1,"task":9,"topic":"Dryer Vent Maximum Length","q":"Maximum dryer vent length is typically:","choices":["10 feet","25 feet (reduced for elbows)","50 feet","Unlimited"],"correct":1,"exp":"Standard: 25 feet straight rigid metal duct. Reduce for elbows: 90-degree = -5 ft, 45-degree = -2.5 ft. Booster fans available for longer runs but require maintenance. Path of least bends is best.","v":3},{"id":564,"domain":1,"task":9,"topic":"Dryer Vent 90 Elbow","q":"Each 90-degree elbow in a dryer vent reduces allowable vent length by approximately:","choices":["1 foot","2.5 feet","5 feet","10 feet"],"correct":2,"exp":"Standard rule: 90-degree elbow = 5 feet equivalent length. 45-degree elbow = 2.5 feet. Total system stays within manufacturer maximum (typically 25 ft equivalent). Shorter, straighter runs are better.","v":3},{"id":565,"domain":1,"task":9,"topic":"Dryer Vent Termination","q":"Dryer vents must terminate:","choices":["In the attic","In the crawl","Outside the building, with backdraft damper","In the laundry room"],"correct":2,"exp":"Dryer vents terminate to OUTSIDE - wall, roof - with backdraft damper. Damper keeps cold air, pests, weather out when not running. NEVER inside (attic, crawl, garage, basement). Lint and moisture damage accumulate.","v":3},{"id":566,"domain":1,"task":9,"topic":"Dryer Booster Fan","q":"A dryer booster fan:","choices":["Increases dryer airflow","Allows long vent runs to exceed standard length","Requires regular maintenance","All of the above"],"correct":3,"exp":"Booster fans: extend allowable run length, but require regular cleaning (lint), proper interlocking with dryer operation. Many techs prefer optimizing run length rather than relying on boosters.","v":3},{"id":567,"domain":1,"task":9,"topic":"Dryer Termination Distance","q":"Dryer vent terminations should be located what distance from openings (windows, etc.)?","choices":["1 foot","3 feet","6 feet","No requirement"],"correct":1,"exp":"Per typical IRC and manufacturer specs: dryer vent termination at least 3 feet from any opening (window, door, fresh-air intake). Prevents lint, moisture, and exhaust from re-entering.","v":3},{"id":568,"domain":1,"task":9,"topic":"Whole-House Ventilation","q":"Whole-house ventilation differs from local (spot) exhaust by:","choices":["Always more powerful","Distributing fresh and stale air across the building rather than at a single source","Whole-house is ducted only","Local is for kitchens"],"correct":1,"exp":"Whole-house: distributes ventilation throughout home (HRV/ERV, exhaust-only, supply-only, balanced). Local/spot: targets pollution at source (bath, kitchen). Tight homes need both.","v":3},{"id":569,"domain":1,"task":9,"topic":"Tight Home Ventilation","q":"Tight, well-air-sealed homes require:","choices":["Less ventilation than older leaky homes","More mechanical ventilation than older homes","No ventilation","Permanent open windows"],"correct":1,"exp":"Build tight, ventilate right: tight construction = less infiltration = less natural ventilation. Mechanical ventilation (HRV, ERV, exhaust-only) becomes essential. ASHRAE 62.2 sets ventilation rates.","v":3},{"id":570,"domain":1,"task":9,"topic":"HRV/ERV Imbalance","q":"An HRV or ERV operating with significantly imbalanced flow can:","choices":["Improve performance","Pressurize or depressurize the building","Have no effect","Eliminate need for filters"],"correct":1,"exp":"Imbalanced flow defeats the purpose: more exhaust than supply depressurizes (causing backdraft of fuel-burners, drawing radon/soil gas, drawing moisture from below grade). More supply than exhaust pressurizes (driving moisture into walls). Should be commissioned/balanced at install.","v":3},{"id":571,"domain":1,"task":9,"topic":"HRV Defrost","q":"HRVs in cold climates have a defrost mode because:","choices":["To improve heating","Cold incoming air against warm humid exhaust can frost the heat exchanger core","Required for warranty","Improves humidity"],"correct":1,"exp":"Cold-climate HRV: warm humid exhaust airstream can frost the core when contacting cold incoming. Defrost cycle temporarily stops intake, recirculates, or uses electric pre-heat. Critical for Wisconsin and similar climates.","v":3},{"id":572,"domain":1,"task":9,"topic":"Bathroom Window Exception","q":"If a bathroom has an openable window, mechanical ventilation:","choices":["Is never required","May not be required by older codes; modern IRC requires regardless","Is required to be turned off","Is automatically installed"],"correct":1,"exp":"Older codes allowed openable window in lieu of mechanical exhaust. Modern IRC requires mechanical exhaust regardless. Even where allowed, window-only ventilation rarely operates effectively (occupants don't open).","v":3},{"id":573,"domain":1,"task":9,"topic":"Kitchen Hood Sizing Method","q":"Range hood sizing should consider:","choices":["Cooking surface coverage","Cooking style (gas, induction, electric)","Use intensity","All of the above"],"correct":3,"exp":"Hood sizing factors: coverage of cooking surface (cover all burners, often hood width = surface width or wider), cooking style (gas needs more), use intensity (frequent cooking), code thresholds (makeup air over 400 cfm). Standard rule: 100 cfm per linear foot of cooking surface (gas: more).","v":3},{"id":574,"domain":1,"task":9,"topic":"Bath Fan Sized","q":"Standard bath fan sizing methods include:","choices":["1 CFM per square foot of bath area (50 CFM minimum)","8 air changes per hour","Either method","Sized only by visual inspection"],"correct":2,"exp":"Sizing: 1 CFM per sq ft (50 CFM min), or 8 air changes/hour for the room. Either method acceptable. Larger or moisture-heavy baths may need higher capacity. ASHRAE 62.2 references these methods.","v":3},{"id":575,"domain":1,"task":9,"topic":"Bath Fan Switch","q":"Best practice for bath fan operation:","choices":["Always off","Run during shower and 20-30 minutes after","Continuous operation","Disconnect from power"],"correct":1,"exp":"Run during shower and 20-30 minutes after to clear humidity. Timer switches automate. In tight homes, may run longer or be replaced by whole-house strategy. Humidistats adjust automatically.","v":3},{"id":576,"domain":1,"task":9,"topic":"Outside Air Intake Location","q":"Mechanical ventilation outside air intakes should be located:","choices":["Near plumbing vents","Away from contamination sources, vents, exhaust outlets, garages","Inside garage","At attic ridge"],"correct":1,"exp":"Outside air intakes: minimum distances from contamination - 10 ft from plumbing vents, garages, exhaust outlets typical. Code specifies. Goal: clean intake air. Common defect: intake near combustion exhaust.","v":3},{"id":577,"domain":1,"task":9,"topic":"Single Side-Wall Hood Defect","q":"If a microwave hood vents directly out the back wall and you remove the filter, the wall cavity is visible and there's no duct:","choices":["Standard installation","Defect - exhaust into wall cavity","Code required","Acceptable for short runs"],"correct":1,"exp":"Per Vol 1: removing filters and looking at exhaust duct - sometimes the fan is blowing into the wall cavity without a duct. This is a defect. Major defect: moisture and grease accumulate in cavity, fire hazard.","v":3},{"id":578,"domain":1,"task":9,"topic":"Recirc Hood Filtration","q":"Recirculating range hoods filter air using:","choices":["Catalytic converters","Charcoal/carbon and grease filters","Electrostatic","UV light"],"correct":1,"exp":"Recirculating hoods: charcoal/carbon (odors) and grease filters. Need regular replacement. Less effective than vented hoods. Adequate for light cooking, inadequate for high-output, high-grease, high-moisture cooking.","v":3},{"id":579,"domain":1,"task":9,"topic":"Combustion Air vs Makeup Air","q":"Makeup air (to compensate for exhaust appliances) and combustion air (for fuel-burning) are:","choices":["The same thing","Different - makeup air replaces removed air; combustion air feeds the fire","Always combined in the same duct","Optional"],"correct":1,"exp":"Per Vol 1: makeup air replaces air removed from house by appliances (clothes dryers, kitchen exhaust, bath fans). Combustion air feeds fuel-burning appliances. Often confused. Both important. They compete - exhaust + combustion appliances in same space.","v":3},{"id":580,"domain":1,"task":9,"topic":"Tight Home Makeup Air","q":"In tight modern homes with high-CFM range hoods, makeup air helps prevent:","choices":["Sound transmission","Backdrafting of fuel-burning appliances and chimneys","Increased heating costs","Excess humidity"],"correct":1,"exp":"Makeup air provides the air the high-CFM hood needs to exhaust. Without it: depressurization causes backdrafting. Especially important when fuel-burning appliances and chimneys share the building - they draft on the same pressure.","v":3},{"id":581,"domain":1,"task":9,"topic":"Spot vs Whole-House","q":"Spot exhaust differs from whole-house ventilation by:","choices":["Targeting specific source vs distributing across building","Always more powerful","Always continuous","Used in only commercial"],"correct":0,"exp":"Spot exhaust targets pollution at source (bath moisture, kitchen smoke, dryer lint/moisture). Whole-house dilutes contaminants across the building over time. Both may be needed in tight homes.","v":3},{"id":582,"domain":1,"task":9,"topic":"Outside Air Intake CO Risk","q":"An outside air intake located near an attached garage or exhaust outlet can:","choices":["Improve filtration","Allow CO and other contaminants to enter the home through the ventilation system","Reduce energy use","Have no effect"],"correct":1,"exp":"Critical defect: intake near garage = CO from running vehicles. Intake near exhaust = re-circulating exhaust. Locate intakes well away from sources. Code specifies separation distances.","v":3},{"id":583,"domain":1,"task":9,"topic":"Heat Recovery Efficiency","q":"Modern HRVs typically recover what percentage of heat from exhaust air?","choices":["10-20%","60-85%","99%","100% impossible"],"correct":1,"exp":"Modern HRVs typically recover 60-85% of heat from exhaust air. Higher-end units approach 90%. Older units lower. Combined with ventilation rate, can reduce energy penalty of fresh air introduction significantly.","v":3},{"id":584,"domain":1,"task":9,"topic":"Bath Fan Termination at Soffit","q":"A bath fan terminating in the soffit:","choices":["Always defective","Acceptable IF the soffit termination is properly made and ventilated air doesn't re-enter via soffit vents","Required by all codes","Better than wall termination"],"correct":1,"exp":"Soffit terminations: code-acceptable if proper termination fitting installed AND moisture doesn't re-enter via attic soffit vents (defeats the purpose, causes attic moisture). Best practice: dedicated soffit cap that directs exhaust away from attic intake.","v":3},{"id":585,"domain":1,"task":9,"topic":"Backflow Felt","q":"Feeling backflow of air around the top and sides of an over-the-range microwave during operation indicates:","choices":["Normal operation","The fan is not connected to the duct or exterior damper is stuck shut","System is working","Filter is clean"],"correct":1,"exp":"Per Vol 1: backflow at the appliance during operation indicates fan disconnected from duct or exterior damper stuck shut. Both significant defects - exhaust isn't actually going outside as designed.","v":3},{"id":586,"domain":1,"task":10,"topic":"TPR Set Point","q":"TPR (temperature/pressure relief) valves on water heaters are set to release at:","choices":["30 psi or 150\u00b0F","150 psi or 210\u00b0F","100 psi or 180\u00b0F","75 psi or 200\u00b0F"],"correct":1,"exp":"Per Vol 1 Ch 4: TPR valves set at 150 psi or 210\u00b0F (whichever first). Modern relief valves almost always have 3/4 inch diameter outlet. Set point preserves both pressure safety and prevents catastrophic temperature events.","v":3},{"id":587,"domain":1,"task":10,"topic":"TPR Sensor Location","q":"The TPR valve sensor must be within how far of the top of the water heater tank?","choices":["First 6 inches from the top","First 12 inches","First 18 inches","Anywhere on the tank"],"correct":0,"exp":"Per Vol 1: TPR sensor must be within first 6 inches from top of tank to sense temperature correctly. Fittings between TPR and tank should not prevent this. Extra-long sensor valves available but hard to identify visually.","v":3},{"id":588,"domain":1,"task":10,"topic":"TPR Discharge Material","q":"Acceptable materials for the TPR discharge pipe include:","choices":["PVC","Copper, CPVC, PEX (rated for hot water)","Galvanized steel only","Any plastic"],"correct":1,"exp":"Per Vol 1: TPR discharge pipe must be hot-water rated - copper, CPVC, PEX. Most PVC may NOT be used (low temp rating). Includes manufactured homes. Common defect: PVC on water heaters.","v":3},{"id":589,"domain":1,"task":10,"topic":"TPR Discharge Diameter","q":"The TPR discharge pipe diameter requirement is:","choices":["Smaller than the TPR valve outlet","The same diameter as the TPR valve outlet","Always 1/2 inch","Always 1 inch"],"correct":1,"exp":"Per Vol 1: discharge pipe must be SAME diameter as TPR valve opening. 3/4 inch flexible water connectors NOT acceptable - they're not full 3/4 inch. Smaller diameter restricts flow during emergency discharge.","v":3},{"id":590,"domain":1,"task":10,"topic":"TPR Discharge Termination","q":"TPR discharge pipe should terminate by an air gap of:","choices":["1/2 inch","At least 1.5 inches and not more than 6 inches above floor or receptor","2 feet","Below the floor"],"correct":1,"exp":"Per Vol 1: TPR discharge - air gap at least 1-1/2 inches, not more than 6 inches above floor or receptor. May terminate outdoors. Air gap prevents backflow contamination of supply.","v":3},{"id":591,"domain":1,"task":10,"topic":"TPR Pipe Slope","q":"The TPR discharge pipe should slope:","choices":["Up toward the source","Down toward the discharge point","Be horizontal","No slope required"],"correct":1,"exp":"Per Vol 1: discharge pipe slopes DOWN toward the discharge point. Slow leaks (common TPR failure) drain to discharge - if pipe slopes up, leak is trapped, hidden, water damage results.","v":3},{"id":592,"domain":1,"task":10,"topic":"TPR Pipe Tee","q":"TPR discharge pipes should:","choices":["Serve multiple appliances","Serve only ONE TPR valve, no tee fittings","Have multiple tees","Have shut-off valves"],"correct":1,"exp":"Per Vol 1: TPR discharge pipe serves ONE TPR valve only. NO tee fittings. NO valves. Each water heater has dedicated discharge. Sharing or valving creates failure points and code violations.","v":3},{"id":593,"domain":1,"task":10,"topic":"TPR Horizontal Termination","q":"A TPR discharge pipe terminating horizontally should end with:","choices":["Open horizontal end","A 90-degree elbow pointed DOWN","An upward elbow","A cap"],"correct":1,"exp":"Per Vol 1: horizontal pipe terminates in 90-degree elbow pointed DOWN. Reduces injury chance if TPR opens (very hot water/steam). Pointed up: dangerous spray. Pointed down: contained discharge.","v":3},{"id":594,"domain":1,"task":10,"topic":"Polybutylene Color","q":"Polybutylene piping is identified by what color?","choices":["White","Bluish-gray (sometimes black)","Red","Yellowish"],"correct":1,"exp":"Polybutylene (PB): bluish-gray, sometimes black. Used 1970s-90s. No longer permissible. Common chlorine in water causes microfractures and catastrophic failure. Class action settlements largely depleted; replacement is owner's responsibility.","v":3},{"id":595,"domain":1,"task":10,"topic":"PVC Use","q":"PVC pipe is permitted for:","choices":["Hot water supply","Cold water and DWV only (max 100\u00b0F under pressure)","Hot water heaters","Steam heating"],"correct":1,"exp":"Per Vol 1: PVC max operating temp 100\u00b0F under pressure (lower under conditions). Cold water and DWV only. CPVC max 180\u00b0F - rated for hot water. NEVER substitute PVC for CPVC in hot water lines.","v":3},{"id":596,"domain":1,"task":10,"topic":"CPVC Color","q":"CPVC pipe is typically:","choices":["White","Cream color (sometimes with yellow stripe), sometimes gray","Red","Bluish-gray"],"correct":1,"exp":"Per Vol 1: CPVC usually cream color, sometimes yellow stripe. Gray less common. Orange = fire suppression. Don't confuse with PB (bluish-gray) or PVC (white).","v":3},{"id":597,"domain":1,"task":10,"topic":"PVC vs CPVC","q":"The difference between PVC and CPVC piping is:","choices":["Color only","Operating temperature - PVC 100\u00b0F max, CPVC 180\u00b0F max","Application same","CPVC for cold only"],"correct":1,"exp":"Per Vol 1: PVC max temp 100\u00b0F under pressure - cold water only. CPVC max 180\u00b0F - hot/cold supply. Don't confuse them. PVC failing in hot water systems is a common defect.","v":3},{"id":598,"domain":1,"task":10,"topic":"Copper Type K","q":"Type K copper tubing is identified by what color marking?","choices":["Red","Blue","Green","Yellow"],"correct":2,"exp":"Per Vol 1: Type K = thickest walls, GREEN markings. Type L = blue (medium). Type M = red (thinnest). Same outside diameter but different inside diameter and wall thickness.","v":3},{"id":599,"domain":1,"task":10,"topic":"Copper Type M","q":"Type M copper tubing is identified by what color marking?","choices":["Green","Blue","Red","Yellow"],"correct":2,"exp":"Per Vol 1: Type M = thinnest walls, RED markings. Type K = green (thickest). Type L = blue (medium). Type M may be installed above and below ground but NOT embedded in concrete or masonry.","v":3},{"id":600,"domain":1,"task":10,"topic":"Copper Patina","q":"A protective patina coating that forms inside copper tubing is typically what color?","choices":["Black","Green (usually)","Red","White"],"correct":1,"exp":"Per Vol 1: protective patina forms inside copper tubing soon after service. Usually green. Can be damaged by aggressive water, water hammer, or excessive solder flux. Damaged patina shortens service life dramatically.","v":3},{"id":601,"domain":1,"task":10,"topic":"Galvanizing Internal","q":"Galvanized steel pipe failure mode:","choices":["Failure from outside corrosion","Rusting from the INSIDE, with internal diameter reduction","Joint failure only","Splits along length"],"correct":1,"exp":"Per Vol 1: galvanized rusts from INSIDE. Inner surface becomes rough, traps rust/particles, reduces internal diameter. Reduced functional flow common. Eventually leaks. Rust-colored water from these pipes.","v":3},{"id":602,"domain":1,"task":10,"topic":"Galvanized Service Life","q":"Expected service life of galvanized steel pipe is approximately:","choices":["10 years","About 50 years (most beyond expected life now)","100 years","Indefinite"],"correct":1,"exp":"Per Vol 1: galvanized expected life ~50 years. Most existing galvanized is at or beyond expected life. Inspectors should consider end-of-life comment. Common in pre-1960 homes.","v":3},{"id":603,"domain":1,"task":10,"topic":"Copper to Steel Connection","q":"Copper tubing connected directly to galvanized steel without a dielectric fitting causes:","choices":["No issue","Galvanic corrosion (small electric current between dissimilar metals in moisture)","Improved bonding","Faster water flow"],"correct":1,"exp":"Per Vol 1: galvanic corrosion between dissimilar metals in presence of moisture (electrolyte). Weakens materials, can cause leaks. Use dielectric fitting or brass nipple. The technically correct term is GALVANIC corrosion (not electrolysis).","v":3},{"id":604,"domain":1,"task":10,"topic":"PEX Color Coding","q":"PEX color coding (red/blue/white) is for:","choices":["Required by code","Convenience - any color PEX can convey hot or cold water","Different temperatures","Different materials"],"correct":1,"exp":"Per Vol 1: PEX color is for CONVENIENCE - red = hot, blue = cold by convention. Any color PEX can convey either. Material is the same; only color differs. Don't assume incorrect plumbing from color alone.","v":3},{"id":605,"domain":1,"task":10,"topic":"PEX-AL-PEX","q":"PEX-AL-PEX (aluminum-layer PEX) is recommended when:","choices":["Always preferred","Used in hydronic heating (oxygen barrier prevents corrosion of metal parts)","Cold water only","Outdoor use"],"correct":1,"exp":"Per Vol 1: regular PEX allows oxygen diffusion. Oxygen corrodes parts in hydronic heating systems. PEX-AL-PEX has aluminum oxygen barrier. Advisable for hydronic. Regular PEX fine for potable water.","v":3},{"id":606,"domain":1,"task":10,"topic":"Service Pipe Depth","q":"The water service pipe should be installed at least how deep?","choices":["6 inches below grade","12 inches below grade or 6 inches below frost line, whichever deeper","18 inches deep","No depth requirement"],"correct":1,"exp":"Per Vol 1: water service pipe at least 12 inches below grade OR 6 inches below frost line, whichever DEEPER. In Wisconsin (frost ~42-48 inches), this means service well below 4 feet. Building sewer depth set by local jurisdiction.","v":3},{"id":607,"domain":1,"task":10,"topic":"Punctate Protection","q":"Pipes installed through holes/notches in framing should be protected by steel shield plates if the pipe is closer than what to the edge?","choices":["1/2 inch","1.5 inches from the edge","3 inches","No protection needed"],"correct":1,"exp":"Per Vol 1: shield plates recommended if hole/notch edge is closer than 1-1/2 inches to member edge. Plate at least 2 inches above bottom plate / below top plate. Doesn't apply to cast iron, black steel, galvanized steel pipes.","v":3},{"id":608,"domain":1,"task":10,"topic":"Plumbing Hole Size","q":"The hole through which a pipe is installed should be:","choices":["Tight fit to pipe","About 1/2 inch larger than pipe diameter","Same as pipe diameter","2 inches larger"],"correct":1,"exp":"Per Vol 1: hole should be ~1/2 inch larger than pipe diameter. Pipes expand/contract with temperature changes. Tight holes cause rubbing, clicking, squeaking noises. Allow free movement.","v":3},{"id":609,"domain":1,"task":10,"topic":"Foundation Wall Sleeve","q":"A pipe through a foundation wall is protected by a sleeve that should be:","choices":["Same size as pipe","Two pipe sizes larger than pipe installed","One size smaller","No sleeve needed"],"correct":1,"exp":"Per Vol 1: sleeve through foundation wall = TWO pipe sizes larger than the pipe. Space between sleeve and pipe sealed with caulk, foam, or gasket (waterproof). Protects against breaking due to settlement.","v":3},{"id":610,"domain":1,"task":10,"topic":"Copper Support Horizontal","q":"Copper tubing should be supported horizontally at least every:","choices":["3 feet","6 feet","10 feet","12 feet"],"correct":1,"exp":"Per Vol 1: copper horizontal support 6 feet, vertical 10 feet. CPVC: 3 ft horizontal, 10 ft vertical. PEX: 32 inches horizontal, 10 ft vertical. Galvanized: 12 ft horizontal, 15 ft vertical. Different by material.","v":3},{"id":611,"domain":1,"task":10,"topic":"PEX Support Horizontal","q":"PEX tubing should be supported horizontally at least every:","choices":["12 feet","32 inches","10 feet","6 feet"],"correct":1,"exp":"Per Vol 1: PEX horizontal support every 32 inches (about 2.5 feet). PEX is flexible and sags between supports - more frequent support required than rigid pipe.","v":3},{"id":612,"domain":1,"task":10,"topic":"Cross Connection Definition","q":"A cross-connection in plumbing is:","choices":["Two perpendicular pipes","Any actual or potential connection between potable water and non-potable source/contamination","Joining two materials","Air gap"],"correct":1,"exp":"Cross-connection = potential contamination route from non-potable source to potable water. Backflow prevention required: air gaps, vacuum breakers, RPZ valves. Different devices for different hazard levels.","v":3},{"id":613,"domain":1,"task":10,"topic":"Air Gap Min","q":"Minimum air gap between faucet outlet and flood-level rim of fixture is:","choices":["1/4 inch","1 inch OR 2x effective opening diameter, whichever GREATER","1/2 inch","3 inches always"],"correct":1,"exp":"Air gap rule: 1 inch OR 2x effective opening diameter, whichever greater. Most reliable backflow prevention - physical separation. Required at all fixtures (sinks, tubs, washing machines).","v":3},{"id":614,"domain":1,"task":10,"topic":"Trap Function","q":"A plumbing trap (P-trap most common):","choices":["Filters debris","Holds water that creates a seal preventing sewer gases from entering the building","Reduces water pressure","Heats water"],"correct":1,"exp":"Trap maintains water seal blocking sewer gas. P-trap is dominant configuration. Trap can be siphoned dry without proper venting, or evaporate when fixture unused for extended period (vacation homes).","v":3},{"id":615,"domain":1,"task":10,"topic":"S-Trap Status","q":"An S-trap is:","choices":["Modern preferred configuration","Prohibited - self-siphons under flow","Stronger than P-trap","Required for kitchens"],"correct":1,"exp":"S-traps are PROHIBITED by modern code. Self-siphons trap seal under flow, allowing sewer gas in. Replaced with P-traps and proper venting. When found, often a remodel error or pre-code installation.","v":3},{"id":616,"domain":1,"task":10,"topic":"Vent Function","q":"Plumbing vents:","choices":["Reduce odor","Equalize pressure to prevent trap siphoning and aid drainage","Heat the system","Are decorative"],"correct":1,"exp":"Vents equalize pressure in DWV. Without venting, water flowing creates negative pressure that siphons trap seals. Vents extend through roof, terminate away from windows/openings.","v":3},{"id":617,"domain":1,"task":10,"topic":"AAV","q":"An air admittance valve (AAV):","choices":["Two-way valve","Spring-loaded one-way valve admitting air to vent the system but blocking sewer gas","Mechanical pump","Pressure regulator"],"correct":1,"exp":"AAV: one-way air admittance. Used as alternative to traditional vents in some installations. Accepted in many jurisdictions; prohibited in some states for primary venting. Failure rate higher than traditional venting.","v":3},{"id":618,"domain":1,"task":10,"topic":"Drain Slope","q":"Standard drain pipe slope is approximately:","choices":["Flat","1/4 inch per foot for pipes 2.5 inches and smaller","1 inch per foot","6 inches per foot"],"correct":1,"exp":"Standard: 1/4 inch per foot for pipes 2.5 inches and smaller. Larger pipes: 1/8 inch per foot acceptable. Too flat = poor flow. Too steep = water flows too fast leaving solids behind.","v":3},{"id":619,"domain":1,"task":10,"topic":"Sewer Lateral Definition","q":"The sewer lateral is:","choices":["Horizontal vent","Pipe from house to public sewer or septic","Connection between fixtures","Trap arm"],"correct":1,"exp":"Sewer lateral: pipe from house to municipal sewer main or septic tank. Homeowner typically responsible for entire lateral. Common failure point: clay tile, cast iron, root intrusion, sags. Sewer scope inspection valuable.","v":3},{"id":620,"domain":1,"task":10,"topic":"Sump Discharge","q":"A sump pump discharge should:","choices":["Discharge into sanitary sewer","Terminate at least 10 feet from foundation, away from neighbors","Discharge into floor drain","At foundation"],"correct":1,"exp":"Sump discharge: away from foundation (otherwise water re-enters), away from neighbors (avoid causing their basement issues), NOT into sanitary sewer (overloads system, prohibited in most municipalities), with check valve to prevent backflow.","v":3},{"id":621,"domain":1,"task":10,"topic":"Ejector Pump","q":"An ejector pump differs from a sump pump because it:","choices":["Pumps clear water only","Pumps SEWAGE from below-grade fixtures up to gravity sewer","Storm water","Works without electricity"],"correct":1,"exp":"Ejector pump: pumps sewage (with solids) from below-sewer-line fixtures up to gravity drain. Solids-handling capacity. Sump pump: clear water only. Different motors, different impellers. Don't confuse.","v":3},{"id":622,"domain":1,"task":10,"topic":"WH Discharge","q":"A water heater discharge tube must be:","choices":["Capped at end","Solid (no shut-off valves), no threads on terminal end","Threaded for hose connection","Plugged"],"correct":1,"exp":"TPR discharge: solid pipe. NO valves. NO threads on terminal end (so a hose can't be attached and trapped). Drain to grade or floor drain. Critical safety device.","v":3},{"id":623,"domain":1,"task":10,"topic":"Water Heater Anode","q":"Water heater anode rod purpose:","choices":["Heat the water","Sacrifice itself to prevent tank corrosion","Backup heating element","Add minerals"],"correct":1,"exp":"Anode (typically aluminum or magnesium) sacrificially corrodes preferentially to protect steel tank. Should be inspected/replaced every 3-5 years to extend tank life. Often neglected. Different anodes for hard vs soft water.","v":3},{"id":624,"domain":1,"task":10,"topic":"WH Pan and Drain","q":"Water heaters above living space (attics, finished spaces) should have:","choices":["Larger TPR valve","A drain pan piped to safe drain or outside","No special provisions","Different fuel"],"correct":1,"exp":"Drain pan: piped to safe drain or outside. Tank failures eventually happen. The pan limits damage. Cost a few dollars to install at original construction; thousands of dollars in damage when omitted.","v":3},{"id":625,"domain":1,"task":10,"topic":"Hot Water Recirculation","q":"A hot water recirculation system:","choices":["Continuously cycles cold water","Continuously circulates hot water in a loop, reducing wait time at fixtures","Replaces water heater","Uses no energy"],"correct":1,"exp":"Recirculation: pump moves hot water through return loop or via cold line. Hot water reaches fixtures sooner (convenience). Trade-off: continuous heat loss vs convenience. On-demand (button-activated) recirculation more efficient.","v":3},{"id":626,"domain":1,"task":10,"topic":"Aerator Function","q":"A faucet aerator's primary purpose:","choices":["Filter water","Mix air with water to reduce splash and conserve water","Heat water","Increase pressure"],"correct":1,"exp":"Aerator: mixes air with water. Reduces splash, conserves water (lower flow rate feels normal). Easily clogs with mineral buildup. Common defect when removing reveals mineral accumulation. Easy fix.","v":3},{"id":627,"domain":1,"task":10,"topic":"Frost-Free Sillcock","q":"A frost-free (frostproof) outdoor sillcock has:","choices":["Heated handle","Valve seat inside the heated space, with long stem","No special design","Insulated wrap"],"correct":1,"exp":"Frost-free: actual valve seat inside heated space (typically 6+ inches from exterior). Water drains from long stem when closed. CRITICAL: hose must be DISCONNECTED in winter, otherwise water can't drain and freezes/bursts.","v":3},{"id":628,"domain":1,"task":10,"topic":"Water Heater Thermostat","q":"Standard water heater thermostat range is typically:","choices":["60-90\u00b0F","120-140\u00b0F (typical, with 120\u00b0F often recommended)","160-180\u00b0F","Above 200\u00b0F"],"correct":1,"exp":"Water heater thermostats typically 120-140\u00b0F. 120\u00b0F often recommended for scalding prevention (especially elderly, children). Higher temps reduce bacterial growth (legionella) but increase scald risk. Modern code: 120\u00b0F for most fixtures (mixing valves for higher).","v":3},{"id":629,"domain":1,"task":10,"topic":"Galvanized Lead Risk","q":"Water from galvanized steel pipe in older homes may contain trace amounts of:","choices":["Mercury","Lead (if lead service pipe was used previously)","Arsenic","Mineral oil"],"correct":1,"exp":"Per Vol 1: galvanized steel pipe water may contain trace lead if a lead water service pipe was used at some point in the past. Lead service lines are being replaced in many municipalities (including Milwaukee). EPA Lead Service Line Replacement focus area.","v":3},{"id":630,"domain":1,"task":10,"topic":"Functional Flow Issues","q":"Common causes of poor functional flow at fixtures include:","choices":["Galvanized pipe corrosion/scaling","Pressure-reducing valve set too low","Aerator buildup","All of the above"],"correct":3,"exp":"Multiple flow problems possible: galvanized scale, low-PRV setting, aerator/screen mineral buildup, partially closed shutoffs, undersized service line, water source issues. Investigate systematically.","v":3},{"id":631,"domain":1,"task":4,"topic":"Live Load","q":"Live load is defined as:","choices":["Permanent fixtures","Constant downward force from occupants and their belongings (transient/variable)","Building materials","Wind pressure"],"correct":1,"exp":"Live load = transient/variable: occupants, furniture, movable items. Dead load = permanent: building materials, fixed equipment. Sensible load = temperature-driven moisture. Latent load = humidity-driven.","v":3},{"id":632,"domain":1,"task":4,"topic":"Dead Load","q":"Dead load is:","choices":["Furniture and occupants","Constant load from building materials and permanently affixed equipment","Snow accumulation","Wind pressure"],"correct":1,"exp":"Dead load: permanent constant load - framing, sheathing, drywall, roofing, HVAC equipment fixed in place. Sized differently from live load (people, furniture, snow). Foundation must support both.","v":3},{"id":633,"domain":1,"task":4,"topic":"Snow Load WI","q":"In southeastern Wisconsin, design snow load (ground) is approximately:","choices":["10 psf","30 psf","60 psf","100 psf"],"correct":1,"exp":"Milwaukee area ground snow load ~30 psf. Roof snow load adjusted for slope, exposure, thermal. Important when adding to existing roof, removing roof structure, or assessing structural concerns after heavy winter.","v":3},{"id":634,"domain":1,"task":4,"topic":"Frost Depth WI","q":"Wisconsin frost depth is typically:","choices":["12 inches","24 inches","42-48 inches","6 feet"],"correct":2,"exp":"Wisconsin frost depth: typically 42-48 inches. Footings must extend below frost line to prevent frost heave. Critical when evaluating shallow foundations, additions on inadequate footings, or detached structures (decks, garages).","v":3},{"id":635,"domain":1,"task":4,"topic":"Frost Heave","q":"Frost heave occurs because:","choices":["Wood expands in cold","Water in soil expands ~9% when freezing, lifting structures above","Concrete contracts","Heating systems compress soil"],"correct":1,"exp":"Water expands ~9% when frozen. In frost-susceptible soils (silts, fine sands), this lifts foundations and slabs above frost line. Footings below frost line + granular backfill mitigate. Wisconsin freeze-thaw is severe.","v":3},{"id":636,"domain":1,"task":4,"topic":"Anchor Bolt Spacing","q":"Anchor bolts (sill plate to foundation) maximum spacing:","choices":["3 feet on center","6 feet on center","12 feet on center","No requirement"],"correct":1,"exp":"Anchor bolts: max 6 ft on center, within 12 inches of corners and ends, minimum 1/2 inch diameter, embedded 7 inches in concrete, with washer and nut. High seismic areas: closer spacing.","v":3},{"id":637,"domain":1,"task":4,"topic":"Anchor Bolt Diameter","q":"Minimum anchor bolt diameter is:","choices":["3/8 inch","1/2 inch","3/4 inch","1 inch"],"correct":1,"exp":"Minimum anchor bolt: 1/2 inch diameter. Some applications (high wind, high seismic) require larger. Must include washer and nut (not just nut).","v":3},{"id":638,"domain":1,"task":4,"topic":"Anchor Bolt Embedment","q":"Anchor bolts must be embedded into concrete a minimum of:","choices":["3 inches","5 inches","7 inches","12 inches"],"correct":2,"exp":"Anchor bolts: minimum 7 inches embedment in concrete. Provides pull-out resistance against uplift forces (wind, seismic). Common defect: insufficient embedment, especially in older homes or DIY work.","v":3},{"id":639,"domain":1,"task":4,"topic":"Anchor Bolt Edge","q":"Anchor bolts must be installed within how far of corners and ends?","choices":["6 inches","12 inches","24 inches","No restriction"],"correct":1,"exp":"Anchor bolts within 12 inches of corners, ends, and breaks in the sill plate. Critical at corners where uplift and shear forces concentrate. Common defect: missing corner anchors.","v":3},{"id":640,"domain":1,"task":4,"topic":"Pipe Trench Footing","q":"A pipe trench below a footing must be offset from bottom of footing a minimum of:","choices":["60 degrees","45 degrees","No offset","6 feet"],"correct":1,"exp":"45-degree rule: no excavation/trench can encroach within 45 degrees from bottom of footing. The bearing zone (cone of soil under the footing) provides support. Disturbing this zone causes settlement.","v":3},{"id":641,"domain":1,"task":4,"topic":"Vertical Crack Cause","q":"A vertical crack in a poured concrete basement wall is most commonly caused by:","choices":["Lateral pressure","Concrete shrinkage during curing","Settlement","Frost"],"correct":1,"exp":"Vertical cracks usually shrinkage during cure. Diagonal: settlement. Horizontal: lateral pressure (most serious). Stair-step in masonry: settlement. Pattern indicates cause - measure and document.","v":3},{"id":642,"domain":1,"task":4,"topic":"Horizontal Crack Cause","q":"A horizontal crack in a basement wall is most likely caused by:","choices":["Concrete shrinkage","Settlement","Lateral earth pressure (hydrostatic or frost)","Improper mix"],"correct":2,"exp":"Horizontal = lateral pressure: hydrostatic from saturated soil OR frost from frost-susceptible soil at improper depth. Most serious crack pattern. Inspect for bowing/displacement. Engineer evaluation if active or significant.","v":3},{"id":643,"domain":1,"task":4,"topic":"Stair-Step Crack Cause","q":"A diagonal stair-step crack in a masonry wall typically indicates:","choices":["Cure shrinkage","Differential settlement","Hydrostatic pressure","Excess moisture"],"correct":1,"exp":"Stair-step in masonry follows mortar joints (path of least resistance). Indicates differential settlement - one part settling more than another. Investigate foundation supporting cracking section. Document length, width, displacement.","v":3},{"id":644,"domain":1,"task":4,"topic":"Bowed Wall","q":"Significant bowing/displacement of a foundation wall (>1 inch typically) indicates:","choices":["Normal aging","Pressure overcoming wall capacity - structural concern","Cosmetic only","Cure shrinkage"],"correct":1,"exp":"Bowed/displaced wall = wall failing under lateral pressure. Engineering evaluation required. Possible interventions: carbon fiber straps, helical tiebacks, beam/post bracing, exterior excavation/regrading. Active vs old/stable monitoring.","v":3},{"id":645,"domain":1,"task":4,"topic":"Foundation Settlement","q":"Settlement in foundations can be caused by:","choices":["Compressible soils below footing","Water erosion","Freeze-thaw cycling","All of the above"],"correct":3,"exp":"Settlement causes: compressible soils, water erosion (downspouts, plumbing leaks), freeze-thaw, undermining (broken sewer line), expansive soils, vibration, change in water table. Engineer determines cause + intervention.","v":3},{"id":646,"domain":1,"task":4,"topi
