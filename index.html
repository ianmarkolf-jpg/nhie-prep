typically via a main bonding jumper screw. This is the ONE point where neutral and ground are bonded; downstream subpanels keep them separate.","v":2},{"id":141,"domain":1,"task":5,"topic":"GFCI Test","q":"The recommended frequency for testing GFCI receptacles is:","choices":["Once per decade","Annually","Monthly","Never"],"correct":2,"exp":"Manufacturers and codes recommend monthly GFCI testing using the test button. The test verifies the trip mechanism. Receptacles can fail (especially in damp environments) without warning. Test also applies to AFCIs.","v":2},{"id":142,"domain":1,"task":5,"topic":"Tamper-Resistant","q":"Tamper-resistant receptacles:","choices":["Are required in all new dwelling unit receptacles","Are required only in bedrooms","Have built-in shock prevention shutters that block single-prong insertion","Both A and C"],"correct":3,"exp":"Tamper-resistant receptacles (TR): required in all new dwelling unit receptacles. Internal shutters block insertion of single objects (like a child's hairpin). Both prongs must be inserted simultaneously to open the shutter.","v":2},{"id":143,"domain":1,"task":5,"topic":"Backstab","q":"A backstabbed receptacle:","choices":["Is connected via push-in holes on the back rather than screw terminals","Always works correctly","Is preferred for high-current circuits","Cannot fail"],"correct":0,"exp":"Backstab connections (push-in holes) are notorious for failing - the small contact area loosens with thermal cycling, leading to overheating, scorching, and intermittent operation. Side terminal screw connections are more reliable.","v":2},{"id":144,"domain":1,"task":5,"topic":"Aluminum SE","q":"Aluminum service entrance conductors:","choices":["Are not permitted","Are permitted with proper terminations and oxidation inhibitor","Must be replaced when the service is upgraded","Cannot be used in residential"],"correct":1,"exp":"Aluminum SE conductors are widely used (cost). Concerns are at terminations - require listed connectors, anti-oxidant compound, and proper torque. Aluminum branch circuit wiring is the bigger concern; aluminum SE is generally acceptable when properly installed.","v":2},{"id":145,"domain":1,"task":5,"topic":"Service Disconnect Location","q":"The service disconnect should be located:","choices":["At the most convenient interior location","At a readily accessible location near the point where service enters the building","In the basement only","At the meter only"],"correct":1,"exp":"Service disconnect must be readily accessible and near the point of entry of service conductors. Allows quick disconnect in emergency. Some jurisdictions require an exterior disconnect for first responder safety.","v":2},{"id":146,"domain":1,"task":6,"topic":"Refrigerant Cycle","q":"In a residential split-system AC, refrigerant changes from a high-pressure liquid to a low-pressure liquid by the:","choices":["Compressor","Evaporator","Expansion device (TXV or capillary tube)","Condenser"],"correct":2,"exp":"The expansion device drops refrigerant pressure right before the evaporator. Compressor: low-pressure gas to high-pressure gas. Condenser: high-pressure gas to high-pressure liquid. Evaporator: low-pressure liquid to low-pressure gas.","v":2},{"id":147,"domain":1,"task":6,"topic":"Heat Pump Outdoor Temp","q":"A heat pump or AC should NOT be tested in cooling mode if outdoor temperatures have been below approximately:","choices":["32\u00b0F for 24 hours","60\u00b0F for 24 hours","45\u00b0F for 12 hours","70\u00b0F for 12 hours"],"correct":1,"exp":"Most manufacturers recommend not running cooling if outdoor temps have been below ~60\u00b0F for 24 hours. Running cold compressor risks oil migration and slugging damage. Disclaim cooling tests in cold weather.","v":2},{"id":148,"domain":1,"task":6,"topic":"AC Temperature Drop","q":"A normally functioning residential AC system should produce a temperature differential (return to supply) of approximately:","choices":["5-10\u00b0F","14-22\u00b0F","25-35\u00b0F","More than 40\u00b0F"],"correct":1,"exp":"Normal supply-to-return temperature drop: 14-22\u00b0F (sometimes stated 15-20\u00b0F). Lower may indicate low refrigerant or airflow problems; higher may indicate poor airflow.","v":2},{"id":149,"domain":1,"task":6,"topic":"SEER","q":"SEER stands for:","choices":["System Energy Efficiency Rating","Seasonal Energy Efficiency Ratio","Standard Efficiency Estimation Range","Sensible Energy Efficiency Reading"],"correct":1,"exp":"SEER (Seasonal Energy Efficiency Ratio) measures cooling efficiency over a season. Modern minimum SEER varies by region and year - generally 13-15 minimum, with high-efficiency units 18-25+. Higher SEER = lower operating cost.","v":2},{"id":150,"domain":1,"task":6,"topic":"R-22 vs R-410A","q":"Older AC systems often used R-22 refrigerant, which is:","choices":["Still readily available and inexpensive","Phased out due to ozone depletion concerns","An indicator of premium quality","Only used in commercial systems"],"correct":1,"exp":"R-22 (Freon, HCFC) phased out under Montreal Protocol due to ozone depletion. R-410A (Puron) is the most common modern replacement. Mixing or substituting refrigerants is improper. Old R-22 systems become expensive to service.","v":2},{"id":151,"domain":1,"task":6,"topic":"Condensate Drain","q":"An AC condensate drain that is clogged or overflows can:","choices":["Damage equipment and ceilings/floors below the air handler","Improve cooling performance","Prevent corrosion","Not cause any issues"],"correct":0,"exp":"Clogged condensate drains cause overflow that damages equipment, ceilings, walls, and floors below the air handler. Look for staining, rust, or active overflow. Float switch (if installed) is supposed to shut off the system before overflow.","v":2},{"id":152,"domain":1,"task":6,"topic":"Suction Line","q":"The larger insulated copper line on a split-system AC is the:","choices":["Liquid line (high pressure)","Suction line (low pressure, returning to compressor)","Drain line","Condensate line"],"correct":1,"exp":"Suction line: larger, insulated, returns cold low-pressure refrigerant gas from evaporator to compressor. Liquid line: smaller, uninsulated, carries warm high-pressure liquid from condenser to evaporator. Missing insulation on suction line is a defect.","v":2},{"id":153,"domain":1,"task":6,"topic":"Compressor Location","q":"In a split-system AC, the compressor is located in the:","choices":["Indoor air handler","Outdoor unit (condensing unit)","Ductwork","Thermostat"],"correct":1,"exp":"Compressor is in the outdoor condensing unit. Indoor unit (air handler) contains the evaporator coil. Mini-splits and packaged units differ.","v":2},{"id":154,"domain":1,"task":6,"topic":"Evaporator","q":"The evaporator coil is located in the:","choices":["Outdoor unit","Indoor air handler (or above the furnace)","Refrigerant lineset","Disconnect box"],"correct":1,"exp":"Evaporator coil is indoors - either inside an air handler or in an A-coil cabinet sitting on top of a furnace (called an evaporator coil cabinet). Air passes over it and is cooled.","v":2},{"id":155,"domain":1,"task":6,"topic":"Outdoor Disconnect","q":"An outdoor AC condensing unit must have a service disconnect:","choices":["At the breaker only","Within sight of and within 50 feet of the equipment","On the unit itself","Anywhere convenient"],"correct":1,"exp":"Disconnect must be within sight of the equipment AND within 50 feet (NEC). Allows safe lockout for service. Common defect: missing disconnect or disconnect not within sight.","v":2},{"id":156,"domain":1,"task":6,"topic":"Compressor Damaged Wiring","q":"Common defects with AC condensing unit installations include:","choices":["Damaged or missing electrical wiring/disconnect","Restriction of airflow at condensing coil (vegetation, debris)","Missing or rusted suction line insulation","All of the above"],"correct":3,"exp":"Common defects: damaged wiring/disconnect, vegetation or debris restricting condenser airflow (must have clearances), missing insulation on suction line, refrigerant leaks at fittings, condensate drainage issues, electrical clearance issues.","v":2},{"id":157,"domain":1,"task":6,"topic":"Air Handler","q":"An air handler in HVAC contains:","choices":["The compressor","The blower fan, evaporator coil, and (often) heating elements or burners","The condenser","The outdoor disconnect"],"correct":1,"exp":"Air handler = blower fan + evaporator coil + (often) electric heat strips or gas burners (in a furnace/AH combo). Distributes conditioned air. Condenser/compressor is in the outdoor unit.","v":2},{"id":158,"domain":1,"task":6,"topic":"Heat Pump Reversing Valve","q":"A heat pump differs from an AC by adding:","choices":["More refrigerant","A reversing valve that allows the cycle to reverse for heating","A larger compressor","Two outdoor units"],"correct":1,"exp":"The reversing valve (4-way valve) reverses refrigerant flow so the indoor coil becomes the condenser (heating) instead of evaporator (cooling). Allows one system to heat and cool. Defrost cycle handles outdoor coil ice in heating mode.","v":2},{"id":159,"domain":1,"task":6,"topic":"HSPF","q":"HSPF measures:","choices":["Cooling efficiency","Heating efficiency for heat pumps","Furnace efficiency","Insulation R-value"],"correct":1,"exp":"HSPF (Heating Seasonal Performance Factor) measures heat pump heating efficiency. Higher HSPF = more efficient. Modern minimum is around 7.7-8.8, high-efficiency 9-13. Furnace efficiency is AFUE.","v":2},{"id":160,"domain":1,"task":6,"topic":"Mini-Split","q":"A ductless mini-split system:","choices":["Cannot provide both heating and cooling","Has an outdoor unit and one or more indoor head units, no ductwork","Always has a single outdoor unit and single indoor unit","Cannot be used in northern climates"],"correct":1,"exp":"Ductless mini-splits: outdoor compressor/condenser plus one or more indoor air handlers (heads), connected by refrigerant lines. No ductwork. Multi-zone systems serve several rooms. Modern cold-climate models work to -15\u00b0F or below.","v":2},{"id":161,"domain":1,"task":6,"topic":"AC Inspection Restriction","q":"An AC unit may NOT be tested in cooling mode if:","choices":["Outdoor temperatures have been below approximately 60\u00b0F for 24 hours","The unit is older than 10 years","The thermostat is digital","The home is multi-story"],"correct":0,"exp":"Standard restriction: don't run cooling when outdoor temps have been below ~60\u00b0F for 24 hours. Running cold-soaked compressor risks damage. Disclaim and re-evaluate when conditions allow.","v":2},{"id":162,"domain":1,"task":6,"topic":"Condensing Unit Pad","q":"The pad supporting an outdoor AC unit should:","choices":["Be level and well-drained","Slope toward the foundation","Be made of plywood","Be embedded directly in soil"],"correct":0,"exp":"AC pad: level (compressor needs level operation for oil distribution), well-drained, supportive (typically concrete or composite). Pad settling that tilts the unit can damage the compressor over time.","v":2},{"id":163,"domain":1,"task":6,"topic":"AC Operation Test","q":"When testing an AC, the inspector typically verifies:","choices":["Temperature differential at supply and return","System operates from thermostat","Outdoor unit fan and compressor run","All of the above"],"correct":3,"exp":"AC inspection: verify operation from thermostat, observe outdoor fan and compressor running, measure supply-return temperature drop, observe condensate drainage, check accessible filters and visible refrigerant lines.","v":2},{"id":164,"domain":1,"task":6,"topic":"Unit Lifespan","q":"Typical service life of a residential AC condensing unit is:","choices":["5-7 years","12-15 years","30+ years","Depends entirely on use, but typically 12-20 years"],"correct":3,"exp":"Typical AC service life is 12-20 years depending on use, climate, maintenance, and quality. Coastal saltwater environments, heavy use, lack of maintenance shortens life. Heat pumps slightly shorter due to year-round use.","v":2},{"id":165,"domain":1,"task":6,"topic":"Bent Condenser Fins","q":"Bent or damaged condenser fins:","choices":["Have no effect on performance","Restrict airflow and reduce efficiency","Indicate the unit is failing","Increase cooling capacity"],"correct":1,"exp":"Condenser fins are how heat is transferred to outside air. Bent or matted fins restrict airflow and reduce capacity/efficiency. A fin comb can straighten minor damage. Severe damage requires coil replacement.","v":2},{"id":166,"domain":1,"task":7,"topic":"Wall Vent Type","q":"Wall vent furnaces use what type of vent?","choices":["PVC or ABS","Type BW","Type L","Single wall"],"correct":1,"exp":"Type BW vents are specifically designed for wall furnaces (B for B-vent, W for wall). Type B is for general gas. Type L for oil/gas higher temp. PVC/ABS for high-efficiency condensing furnaces.","v":2},{"id":167,"domain":1,"task":7,"topic":"Single Wall Vent Clearance","q":"The minimum clearance to combustible material for a single-wall vent connector serving a gas appliance is:","choices":["18 inches","6 inches","1 inch","2 inches"],"correct":1,"exp":"Single-wall vent connector: 6 inches to combustibles. Type B vent: 1 inch. Single-wall stove pipe: 18 inches. Type L: 9 inches. Each vent type has its own clearance.","v":2},{"id":168,"domain":1,"task":7,"topic":"Type B Clearance","q":"The minimum clearance to combustible material for a Type B vent is:","choices":["1 inch","6 inches","18 inches","2 inches"],"correct":0,"exp":"Type B vent: 1 inch clearance to combustibles - the air gap in the double-wall design provides insulation. Common type for gas furnaces and water heaters at standard efficiency.","v":2},{"id":169,"domain":1,"task":7,"topic":"Mid-Efficiency Components","q":"Which list of components are you most likely to find on a mid-efficiency furnace?","choices":["Barometric damper, natural draft, indoor air handler","Condensate management, PVC/ABS venting, closed combustion","Type B vent pipe, mechanical draft, indoor air handler","Condensate management, indoor air handler, exterior condenser"],"correct":2,"exp":"Mid-efficiency furnaces (~80% AFUE): Type B vent, mechanical draft (induced-draft fan), indoor air handler. High-efficiency (88%+): condensate, PVC/ABS, closed combustion.","v":2},{"id":170,"domain":1,"task":7,"topic":"High-Efficiency Components","q":"A high-efficiency condensing furnace will have all of the following EXCEPT:","choices":["Closed combustion chamber","PVC or ABS vent piping","Condensate drain","Type B vent"],"correct":3,"exp":"High-efficiency furnaces use plastic venting (PVC/ABS) because flue gases are cool. Type B metal vent is for mid-efficiency. They feature condensate, sealed combustion, and direct vent (intake from outside).","v":2},{"id":171,"domain":1,"task":7,"topic":"AFUE","q":"AFUE stands for:","choices":["Annual Fuel Utilization Efficiency","Average Furnace Utility Estimate","Annual Forced-Air Usage Equation","Adjusted Fuel Use Energy"],"correct":0,"exp":"AFUE = Annual Fuel Utilization Efficiency, expressed as a percentage. 80% AFUE = mid-efficiency. 90%+ AFUE = high-efficiency (condensing). Modern minimum varies by region; typically 80% minimum.","v":2},{"id":172,"domain":1,"task":7,"topic":"Furnace Efficiency Abbreviation","q":"Which abbreviation is used to describe furnace efficiency?","choices":["SEER","AFUE","HSPF","EER"],"correct":1,"exp":"AFUE = furnace heating efficiency. SEER = AC seasonal cooling efficiency. EER = AC peak cooling efficiency. HSPF = heat pump heating efficiency. Each measures a different thing - don't confuse them.","v":2},{"id":173,"domain":1,"task":7,"topic":"Glow Stick","q":"What device is often referred to as a glow stick and serves as the ignition source in a gas-fired furnace?","choices":["Intermittent-pilot igniter","Thermopile","Thermocouple","Hot-surface igniter"],"correct":3,"exp":"Hot-surface igniter (HSI): silicon carbide or silicon nitride element that glows red-hot to ignite gas. Modern replacement for standing pilots. Thermocouples and thermopiles are SAFETY devices, not ignition sources.","v":2},{"id":174,"domain":1,"task":7,"topic":"Thermocouple","q":"A thermocouple in a gas appliance:","choices":["Generates heat for ignition","Is a safety device that detects pilot flame and keeps the gas valve open","Measures airflow","Controls speed of the blower fan"],"correct":1,"exp":"Thermocouple: small electrical junction that generates millivolts when heated by the pilot flame. The voltage holds the gas valve open. If pilot fails, no voltage, valve closes. Safety, not ignition.","v":2},{"id":175,"domain":1,"task":7,"topic":"Thermopile","q":"A thermopile is:","choices":["A safety device made of multiple thermocouples generating more electricity","An ignition source","A measuring instrument","A type of relay"],"correct":0,"exp":"Thermopile = stack of thermocouples in series, generating hundreds of millivolts. Used in millivolt-controlled appliances (some standing-pilot fireplaces) to power the entire control system without external voltage.","v":2},{"id":176,"domain":1,"task":7,"topic":"Boiler PRV","q":"The pressure relief valve on a closed hot water boiler heating system prevents pressure from exceeding approximately:","choices":["12 psi","150 psi","60 psi","30 psi"],"correct":3,"exp":"Boiler PRV: 30 psi. Don't confuse with hot water tank T&P valve (150 psi). Normal boiler operating pressure: 12-25 psi.","v":2},{"id":177,"domain":1,"task":7,"topic":"Boiler Operating Pressure","q":"Normal operating pressure for a residential hot water boiler is approximately:","choices":["5-10 psi","12-25 psi","60-80 psi","100+ psi"],"correct":1,"exp":"Residential hot water boiler operates at approximately 12-25 psi. Pressure increases as water heats (expansion). PRV trips at 30 psi if expansion tank fails or system over-fills.","v":2},{"id":178,"domain":1,"task":7,"topic":"Combustion Byproducts","q":"Byproducts of complete combustion of natural gas include all EXCEPT:","choices":["H2O (water vapor)","CO2 (carbon dioxide)","CO (carbon monoxide)","Heat"],"correct":2,"exp":"CO is a byproduct of INCOMPLETE combustion - indicates a problem (insufficient air, dirty burner, improper venting). Complete combustion: CO2 + H2O + heat. NO2 also forms in trace amounts.","v":2},{"id":179,"domain":1,"task":7,"topic":"Heat Transfer Unit","q":"What unit best describes the transfer of heat through a material?","choices":["BTU","U-value","R-value","Watts"],"correct":1,"exp":"U-value (or U-factor): heat TRANSFER through a material. R-value: RESISTANCE to heat flow. They're inverses (U = 1/R). Lower U = better insulator. BTU is a unit of heat energy.","v":2},{"id":180,"domain":1,"task":7,"topic":"R-Value","q":"R-value measures:","choices":["Heat transfer rate","Resistance to heat flow","Vapor permeability","Air leakage"],"correct":1,"exp":"R-value: thermal resistance. Higher R = better insulator. Common assemblies: standard fiberglass batt R-13 to R-19, blown-in attic R-30 to R-60, exterior foam R-5 to R-15.","v":2},{"id":181,"domain":1,"task":7,"topic":"Heat Pump in Cold Weather","q":"In cold weather, an air-source heat pump:","choices":["Loses efficiency as outdoor temp drops","Cannot operate below freezing","Runs entirely on backup heat","Requires no defrost cycle"],"correct":0,"exp":"Heat pumps lose capacity and efficiency as outdoor temp drops. Below balance point (often 25-35\u00b0F for older units), supplemental heat needed. Modern cold-climate heat pumps maintain capacity to -15\u00b0F or below.","v":2},{"id":182,"domain":1,"task":7,"topic":"Defrost Cycle","q":"A heat pump defrost cycle:","choices":["Reverses to AC mode briefly to melt ice from the outdoor coil","Shuts off the system entirely","Sprays water on the outdoor coil","Increases blower speed"],"correct":0,"exp":"Defrost: reversing valve flips, system runs in AC mode briefly so the outdoor coil heats and melts the ice. Indoor air feels cool because cold air blows from registers; supplemental heat may run during defrost to compensate.","v":2},{"id":183,"domain":1,"task":7,"topic":"Boiler vs Furnace","q":"The fundamental difference between a boiler and a furnace is:","choices":["Boilers heat water; furnaces heat air","Boilers use gas; furnaces use electricity","Boilers are more efficient","No real difference"],"correct":0,"exp":"Boiler = heats water (or steam) for hydronic distribution (radiators, baseboard, in-floor). Furnace = heats air for ducted distribution. Both can be gas, oil, or electric. Different fuel does NOT define them.","v":2},{"id":184,"domain":1,"task":7,"topic":"Furnace Heat Exchanger","q":"A cracked heat exchanger in a gas furnace:","choices":["Has minimal impact","Allows combustion gases (including CO) to mix with conditioned air","Causes the system to short-cycle","Improves efficiency"],"correct":1,"exp":"A cracked heat exchanger is a serious safety defect - allows combustion byproducts (CO, CO2, water vapor) into the conditioned airstream. Often results in furnace shut-down/replacement. Inspectors should disclaim definitive evaluation as it requires camera/dye testing.","v":2},{"id":185,"domain":1,"task":7,"topic":"Steam vs Hot Water","q":"A steam boiler is distinguished from a hot water boiler by:","choices":["Higher operating pressure typically","Boiling water to produce steam, distributing via piping","Use of pumps for circulation","Use of in-floor tubing"],"correct":1,"exp":"Steam boiler boils water; steam rises through piping to radiators, condenses, returns by gravity. Hot water boiler keeps water below boiling, uses circulator pumps. Older systems are more often steam; modern hydronic is hot water.","v":2},{"id":186,"domain":1,"task":7,"topic":"Gravity Furnace","q":"A gravity warm-air furnace:","choices":["Has a powerful blower","Relies on natural convection (no blower) to circulate heated air","Requires no fuel","Is the modern standard"],"correct":1,"exp":"Gravity furnaces (early-mid 20th century, often \"octopus furnaces\" in old basements) had no blower. Heated air rose through large registers; cool air returned through floor grilles. Inefficient by modern standards. Often retrofitted with blowers and ducts.","v":2},{"id":187,"domain":1,"task":7,"topic":"Combustion Air","q":"Combustion air for a fuel-burning appliance must be:","choices":["Sealed away from the appliance","Adequate for the equipment, taken from the room or piped from outside","Heated before reaching the burner","Filtered through HEPA"],"correct":1,"exp":"Adequate combustion air required - either from the room (with sufficient volume per BTU input) or piped directly from outside (sealed/direct vent). Insufficient combustion air causes incomplete combustion, CO, backdrafting.","v":2},{"id":188,"domain":1,"task":7,"topic":"Backdrafting","q":"Backdrafting is:","choices":["Reverse flow of flue gases into the building","An efficiency-improving design","Normal initial start-up condition","Unique to oil furnaces"],"correct":0,"exp":"Backdrafting: combustion gases flow backward through the vent and into the building. Causes: depressurization (large exhaust fans), insufficient combustion air, blocked flue, downdrafts. Major CO hazard.","v":2},{"id":189,"domain":1,"task":7,"topic":"Flame Rollout","q":"Flame rollout from a furnace combustion chamber indicates:","choices":["Normal operation","A serious defect requiring immediate attention","Improved efficiency","High humidity"],"correct":1,"exp":"Flame rollout (flames coming out of the cabinet) is a serious safety defect indicating: blocked heat exchanger, blocked flue, insufficient combustion air, or improperly adjusted burners. Shut down and service immediately.","v":2},{"id":190,"domain":1,"task":7,"topic":"Furnace Filter","q":"A clogged furnace filter can cause:","choices":["Reduced airflow leading to overheating, short cycling, or evaporator coil freezing","Improved efficiency","Increased capacity","Better humidity control"],"correct":0,"exp":"Clogged filters restrict airflow: furnace overheats and limit-trips, AC evaporator freezes from low airflow, both systems short-cycle. Replace filters per manufacturer schedule (typically 1-3 months).","v":2},{"id":191,"domain":1,"task":8,"topic":"Attic Moisture Best Method","q":"The most effective means of limiting moisture and mold growth in an attic is:","choices":["Air sealing the attic from the conditioned space","Increasing airflow through the attic","Heating the attic","Using a sealant at the sheathing and rafters"],"correct":0,"exp":"Air sealing PREVENTS moisture-laden air from entering. Ventilation only mitigates moisture that already arrived. Choose prevention over mitigation. Common air leaks: top plates, can lights, plumbing penetrations, attic hatch.","v":2},{"id":192,"domain":1,"task":8,"topic":"R-30 Attic","q":"Modern code-recommended attic insulation in cold climates is approximately:","choices":["R-13","R-19","R-30 to R-60","R-100"],"correct":2,"exp":"Cold climate attics: typically R-49 to R-60 in current codes (varies by zone). R-30 is often the older standard or the floor of crawl space requirements. Wisconsin (climate zones 6-7) generally targets R-49+.","v":2},{"id":193,"domain":1,"task":8,"topic":"R-13 Walls","q":"Standard 2x4 wood-frame wall cavities can typically achieve approximately:","choices":["R-13 to R-15","R-30","R-49","R-60"],"correct":0,"exp":"2x4 wall cavities (3.5 inches): R-13 standard fiberglass batt, R-15 high-density. 2x6 walls allow R-19 to R-21. Higher R requires deeper cavity or exterior continuous insulation.","v":2},{"id":194,"domain":1,"task":8,"topic":"Vapor Retarder Climate","q":"In a cold climate (Wisconsin), the vapor retarder should be located:","choices":["On the outside of the wall","On the warm (interior) side of the insulation","In the middle of the assembly","Vapor retarder is not needed"],"correct":1,"exp":"Cold climate: vapor retarder on the warm (interior) side of insulation. Stops indoor moisture from migrating outward and condensing in the cold cavity. Common: kraft paper backing on batts (facing in), or polyethylene sheet.","v":2},{"id":195,"domain":1,"task":8,"topic":"Class III Vapor","q":"A standard latex paint on drywall typically functions as:","choices":["Vapor barrier","Class III vapor retarder","No vapor control","Vapor open membrane"],"correct":1,"exp":"Painted drywall is generally a Class III vapor retarder (1-10 perms). Acceptable in many climate zones. Class II = 0.1-1 perm (kraft paper, smart membranes). Class I = under 0.1 perm (poly sheet).","v":2},{"id":196,"domain":1,"task":8,"topic":"Air Sealing","q":"The most effective place to air seal a typical home is:","choices":["Around windows only","At the building envelope, including ceiling penetrations and rim joist","Between rooms","On the exterior siding"],"correct":1,"exp":"Air sealing focuses on the building envelope - the ceiling/attic floor (largest pressure differential), rim joist, basement-to-living transition, all penetrations. Bigger savings than just window weatherstripping.","v":2},{"id":197,"domain":1,"task":8,"topic":"Stack Effect","q":"Stack effect refers to:","choices":["Stacking insulation layers","Buoyancy-driven air movement: warm air rising, cold air entering low","Mechanical air handler operation","Insulation settling over time"],"correct":1,"exp":"Stack effect: warm interior air rises (less dense), creating positive pressure at the top of the building (driving air out) and negative pressure at the bottom (drawing air in). Strong driver of air leakage in cold climates.","v":2},{"id":198,"domain":1,"task":8,"topic":"Soffit Vent Function","q":"Soffit vents in attic ventilation provide:","choices":["Exhaust","Intake (low) airflow","Equal intake and exhaust","Insulation"],"correct":1,"exp":"Soffit vents: low-side intake. Combined with ridge or gable vents (high-side exhaust), creates passive ventilation. Code typically requires 50-50 split between intake and exhaust net free area.","v":2},{"id":199,"domain":1,"task":8,"topic":"Insulation Air Bypass","q":"An air bypass in an attic is:","choices":["An intentional ventilation path","An unsealed penetration that allows conditioned air to leak into the attic","A type of vent fan","A duct repair"],"correct":1,"exp":"Air bypasses are unsealed gaps in the attic floor - around can lights, top plates, plumbing/electrical/HVAC penetrations, attic hatch. Each leaks conditioned air, brings moisture into the attic, defeats insulation.","v":2},{"id":200,"domain":1,"task":8,"topic":"Exterior Foam","q":"Exterior continuous insulation:","choices":["Reduces thermal bridging through studs","Cannot be used in cold climates","Reduces R-value","Requires no vapor management"],"correct":0,"exp":"Continuous exterior insulation (rigid foam, mineral wool) covers studs and reduces thermal bridging - studs conduct heat at much lower R than the cavity. Increasingly common in modern construction.","v":2},{"id":201,"domain":1,"task":8,"topic":"Wisconsin Climate Zone","q":"Most of Wisconsin falls in IECC climate zone:","choices":["3 (warm)","4-5 (mixed)","6-7 (cold)","8 (subarctic)"],"correct":2,"exp":"Wisconsin spans climate zones 6 and 7 (cold). Most of the state is zone 6, with the northern third in zone 7. Implications: high R-value attics/walls, vapor retarder requirements, frost depth, ice barrier requirements.","v":2},{"id":202,"domain":1,"task":8,"topic":"Ice Dam","q":"Ice damming on roofs is caused by:","choices":["Insufficient gutter capacity","Heat loss melting snow that re-freezes at the cold eaves","Excessive ventilation","Poor shingle quality"],"correct":1,"exp":"Ice dams form when heat loss through the roof melts snow above the warm space, water flows to the cold eave, refreezes. Backed-up water can leak into the home. Solution: air seal and insulate the ceiling, ensure ventilation. Heat cables are a band-aid.","v":2},{"id":203,"domain":1,"task":8,"topic":"Knee Wall Insulation","q":"Insulation at finished attic knee walls should be:","choices":["Loose-fill on the cold side only","Continuous from wall to ceiling, with air sealing on both surfaces","Not required","Open-cell foam only"],"correct":1,"exp":"Knee wall insulation: needs continuous coverage from wall through to ceiling, properly air-sealed on both sides. Common defect: insulation falls or is missing at top of knee wall, leaving direct air path between living space and unconditioned attic.","v":2},{"id":204,"domain":1,"task":8,"topic":"Crawl Space Ventilation","q":"Modern thinking on crawl space ventilation in cold climates:","choices":["More venting is always better","Sealed/encapsulated crawl spaces with vapor barrier are increasingly preferred","Ventilation should be powered","Ventilation should match attic ventilation"],"correct":1,"exp":"Sealed (encapsulated) crawl spaces are increasingly preferred: continuous vapor barrier on floor, insulation on walls (not floor above), conditioned to match house. Vented crawls in humid climates draw in moist air that condenses.","v":2},{"id":205,"domain":1,"task":8,"topic":"Conditioned Crawl","q":"A conditioned (sealed/encapsulated) crawl space requires:","choices":["Continuous vapor barrier on the soil","Sealed walls and rim joists","Insulation on perimeter walls","All of the above"],"correct":3,"exp":"Encapsulated crawl: vapor barrier on soil (typically 6+ mil poly, taped seams, sealed to walls), sealed/insulated rim and walls, conditioning (small register or dehumidifier), no soil-to-wood contact, sealed access.","v":2},{"id":206,"domain":1,"task":8,"topic":"Attic Access Insulation","q":"Attic access hatches should be:","choices":["Uninsulated for accessibility","Insulated and weatherstripped","Painted only","Made of plywood without sealing"],"correct":1,"exp":"Attic hatches are major heat loss points - need insulation (matching the attic), weatherstripping at perimeter, latching to compress weatherstrip. Code typically requires R-value matching surrounding insulation.","v":2},{"id":207,"domain":1,"task":8,"topic":"Recessed Light Insulation","q":"Recessed lights in an insulated ceiling must be:","choices":["Insulation contact (IC) rated and air-tight (AT) rated","Open and vented","Removed","Wrapped in fiberglass batts"],"correct":0,"exp":"Recessed lights penetrating insulated ceilings must be IC-rated (insulation contact OK) AND AT-rated (air tight). Old standard cans are not - must be replaced or covered with sealed boxes. Heat hazard and air leak otherwise.","v":2},{"id":208,"domain":1,"task":8,"topic":"Insulation in Ductwork","q":"Ductwork in unconditioned spaces (attic, crawl) should be:","choices":["Uninsulated","Insulated to reduce energy loss","Removed","Sealed but not insulated"],"correct":1,"exp":"Ducts in unconditioned spaces lose heat (winter) and gain heat (summer). Insulating reduces conditioning losses. Code typically requires R-8 in attics, R-6 in crawl spaces. Sealing duct seams is also critical.","v":2},{"id":209,"domain":1,"task":8,"topic":"Cellulose Insulation","q":"Cellulose insulation:","choices":["Is made from recycled paper treated with borate","Is highly flammable","Has lower R-value than fiberglass","Cannot be installed in attics"],"correct":0,"exp":"Cellulose: recycled paper with borate fire retardants. Comparable R-value to fiberglass (R-3.5 to R-3.8 per inch). Often blown-in for attic retrofit. Settles over time (allow ~10-20% settling). Better at filling small gaps than fiberglass.","v":2},{"id":210,"domain":1,"task":8,"topic":"Spray Foam Open vs Closed Cell","q":"Closed-cell spray foam compared to open-cell:","choices":["Higher R-value per inch and acts as a vapor retarder","Lower R-value","Cannot be used as insulation","Allows water to pass through"],"correct":0,"exp":"Closed-cell SPF: ~R-6 to R-7 per inch, vapor retarder, structural. Open-cell SPF: ~R-3.5 per inch, vapor open, flexible. Closed-cell preferred at rim joists and below-grade; open-cell common in stud cavities and attics (interior application).","v":2},{"id":211,"domain":1,"task":8,"topic":"Bath Fan Termination","q":"A bath fan that terminates inside the attic:","choices":["Is acceptable as long as the fan works","Is a defect that introduces moisture into the attic","Is required for ventilation","Has no implications"],"correct":1,"exp":"Bath fans must terminate to OUTSIDE - through soffit, gable, or roof. Termination in attic dumps humid bathroom air into a cold space, causing condensation, mold, and frost on roof sheathing.","v":2},{"id":212,"domain":1,"task":8,"topic":"Thermal Bridging","q":"Thermal bridging in a wall refers to:","choices":["Heat conducted through framing members that bypass insulation","Bridges of insulation between cavities","An air leak","A vapor barrier"],"correct":0,"exp":"Thermal bridging: heat flowing through studs/framing (R-1 per inch wood) rather than insulation (R-3+ per inch). Reduces effective R-value. Mitigated by exterior continuous insulation, advanced framing, double-stud walls.","v":2},{"id":213,"domain":1,"task":8,"topic":"Attic Bypass Effects","q":"Air bypasses (unsealed penetrations) in a ceiling:","choices":["Leak conditioned air to the attic, reducing efficiency","Carry moisture to the attic, causing condensation","Are typically the largest source of envelope leakage","All of the above"],"correct":3,"exp":"Air bypasses are major culprits: lose heat, transport moisture, defeat insulation, drive ice dams. Sealing them is often the highest-ROI energy improvement in older homes.","v":2},{"id":214,"domain":1,"task":8,"topic":"Insulation Settling","q":"Loose-fill insulation settles over time. The result is:","choices":["Increased R-value","Decreased R-value due to reduced thickness","No change","Increased thermal mass"],"correct":1,"exp":"Settling reduces thickness, which reduces R-value. Cellulose settles ~10-20%, fiberglass loose-fill less. When evaluating, measure actual thickness rather than relying on stated R-value at original install.","v":2},{"id":215,"domain":1,"task":8,"topic":"Knee Wall Air Sealing","q":"Behind a finished attic knee wall, the most important detail is:","choices":["More insulation","Air sealing the floor cavity (ladder framing) below the knee wall","Adding ventilation","Removing insulation"],"correct":1,"exp":"Behind knee walls, the floor joist cavity beneath the knee wall (between conditioned and unconditioned space) often has open ends that bypass air directly into the unconditioned attic. Air sealing this is critical.","v":2},{"id":216,"domain":1,"task":9,"topic":"ERV vs HRV","q":"Which mechanical device provides ventilation by using heat from stale exhaust air to preheat fresh incoming air, while ALSO capturing humidity to maintain internal humidity levels?","choices":["Local/Spot Exhaust Fan","Energy Recovery Ventilator (ERV)","Heat Recovery Ventilator (HRV)","Whole-House Ventilation"],"correct":1,"exp":"ERV transfers BOTH heat AND humidity. HRV transfers heat only. The 'humidity' keyword in the question is the ERV signal. HRVs better in cold/dry; ERVs in humid or mixed climates.","v":2},{"id":217,"domain":1,"task":9,"topic":"HRV","q":"A Heat Recovery Ventilator (HRV):","choices":["Transfers heat between exhaust and intake but not humidity","Transfers both heat and humidity","Heats outdoor air using a furnace","Provides cooling only"],"correct":0,"exp":"HRV transfers heat (sensible energy) only between exhaust and incoming airstreams. Both streams remain separated. Used to provide ventilation while reducing the energy penalty.","v":2},{"id":218,"domain":1,"task":9,"topic":"Bath Exhaust CFM","q":"A bathroom exhaust fan must move at least:","choices":["20 CFM continuous or 50 CFM intermittent","100 CFM intermittent","200 CFM intermittent","500 CFM intermittent"],"correct":0,"exp":"Bath exhaust: 20 CFM continuous OR 50 CFM intermittent (per IRC). Many newer codes increased to 80-100 CFM. Sized for the room volume - larger bathrooms need more.","v":2},{"id":219,"domain":1,"task":9,"topic":"Kitchen Range Hood","q":"A range hood that is not vented to the outside:","choices":["Is a recirculating type that filters and returns air","Cannot be installed","Vents to the attic","Vents to the basement"],"correct":0,"exp":"Recirculating range hoods filter (charcoal/grease) and return air to the kitchen. Far less effective than vented hoods. Vented hoods (the better practice) require an outside termination.","v":2},{"id":220,"domain":1,"task":9,"topic":"Dryer Vent Material","q":"Dryer vent ducts should be:","choices":["Plastic flexible (vinyl) tubing","Rigid or semi-rigid metal","Standard fabric duct","Cardboard tubing"],"correct":1,"exp":"Dryer vents: rigid or semi-rigid metal only. Plastic flexible (vinyl) is a fire hazard - lint accumulates, restricts airflow, ignites. Foil-faced flexible is also problematic; metal smooth-wall is best.","v":2},{"id":221,"domain":1,"task":9,"topic":"Dryer Vent Length","q":"Maximum dryer vent length is typically:","choices":["10 feet","25 feet (reduced for elbows)","50 feet","Unlimited"],"correct":1,"exp":"Standard maximum: 25 feet of straight rigid metal duct. Each 90-degree elbow reduces by approximately 5 feet, each 45 by 2.5 feet. Booster fans available for longer runs but require maintenance.","v":2},{"id":222,"domain":1,"task":9,"topic":"Dryer Vent Termination","q":"A dryer vent must terminate:","choices":["In the attic","In the crawl space","Outside the building, with a backdraft damper","In the bathroom"],"correct":2,"exp":"Dryer vents terminate to the OUTSIDE (wall, roof) with a backdraft damper to keep cold air, pests, and weather out when not running. NEVER inside (attic, crawl, basement) - moisture and lint cause damage and fire risk.","v":2},{"id":223,"domain":1,"task":9,"topic":"Local Exhaust Definition","q":"Local (or spot) exhaust fans are installed in:","choices":["Bedrooms only","Moisture-rich rooms (bathrooms, laundry, kitchens) to disperse excessive moisture","Hallways","The mechanical room only"],"correct":1,"exp":"Local/spot exhaust: removes moisture and contaminants at the source - bathrooms, laundry, kitchen. Different from whole-house ventilation (which dilutes air across the building).","v":2},{"id":224,"domain":1,"task":9,"topic":"Whole-House Ventilation","q":"Whole-house ventilation systems:","choices":["Use fans and ducts to exhaust stale air and supply fresh air, distributing throughout","Are localized to one room","Cannot be balanced","Eliminate the need for spot exhaust"],"correct":0,"exp":"Whole-house ventilation distributes ventilation throughout the home - exhaust-only, supply-only, or balanced (HRV/ERV). Required in tight new construction. Local exhaust still recommended for moisture-rich rooms.","v":2},{"id":225,"domain":1,"task":9,"topic":"Range Hood Code","q":"Range hoods that exhaust to the outside:","choices":["Require a backdraft damper","Must follow makeup air requirements for high-CFM systems","Cannot terminate in soffits unless rated","All of the above"],"correct":3,"exp":"Range hoods (especially commercial-style high-CFM): backdraft damper, makeup air provision (typically required for 400+ CFM), proper termination (not into soffit unless rated, not directly under windows).","v":2},{"id":226,"domain":1,"task":9,"topic":"Bath Fan Discharge","q":"Bath fans should NOT discharge:","choices":["Outside through the wall","Outside through the soffit","Into the attic or crawl space","Outside through the roof"],"correct":2,"exp":"Bath fans discharging into attic or crawl dump warm humid air, causing condensation, mold, frost on roof sheathing. ALWAYS terminate outside via wall, gable, soffit (with proper venting), or roof.","v":2},{"id":227,"domain":1,"task":9,"topic":"Indoor Air Quality","q":"An indoor air management system can include:","choices":["HRV, ERV, dedicated dehumidifier","Whole-house ventilation","Filtration upgrades","All of the above"],"correct":3,"exp":"Modern IAQ systems: ventilation (HRV/ERV/whole-house), filtration (MERV 11+ or HEPA), dehumidification, source control, air monitoring. Increasingly common in tight new homes.","v":2},{"id":228,"domain":1,"task":9,"topic":"Spot vs Whole-House","q":"Spot exhaust differs from whole-house ventilation by:","choices":["Targeting a specific source vs distributing across the building","Using fans","Going outside","Operating continuously"],"correct":0,"exp":"Spot exhaust targets pollution at the source (bath moisture, kitchen smoke). Whole-house ventilation dilutes across the building. Both can be needed in tight homes.","v":2},{"id":229,"domain":1,"task":9,"topic":"Make-Up Air","q":"Makeup air for a kitchen with high-CFM range hood is required because:","choices":["Without it, hood depressurizes the home and causes backdrafting","Code aesthetic preference","To improve cooking performance","Optional in all cases"],"correct":0,"exp":"High-CFM hoods (400+ CFM typically the threshold) can depressurize tight homes, causing backdrafting of fuel-burning appliances and chimneys. Makeup air systems supply outside air to compensate.","v":2},{"id":230,"domain":1,"task":9,"topic":"HRV Imbalance","q":"An HRV operating with significantly imbalanced flow can:","choices":["Pressurize or depressurize the building","Have no effect","Always improve indoor air quality","Save energy"],"correct":0,"exp":"Imbalanced HRV/ERV (more exhaust than supply, or vice versa) pressurizes or depressurizes the building, defeating the purpose. Should be commissioned/balanced at install.","v":2},{"id":231,"domain":1,"task":9,"topic":"Recirculating Range Hood","q":"Recirculating range hoods filter and return air using:","choices":["Charcoal/carbon filters and grease filters","Catalytic converters","UV light","Electrostatic precipitators"],"correct":0,"exp":"Recirculating hoods: charcoal/carbon filter (odors), grease filter (cooking grease). Filters need regular replacement. Less effective than vented hoods at removing combustion byproducts and moisture.","v":2},{"id":232,"domain":1,"task":9,"topic":"Bath Fan Switching","q":"Best practice for bath fan operation in a tight home:","choices":["Always off when not in shower","Operate during shower and 20-30 minutes after","Continuous operation","Disconnect from power"],"correct":1,"exp":"Run during shower and 20-30 minutes after to clear humidity. Timer switches automate this. In very tight homes, may run longer or be replaced by whole-house ventilation strategy.","v":2},{"id":233,"domain":1,"task":9,"topic":"Ventilation in Tight Homes","q":"Tight, well-air-sealed homes require:","choices":["More mechanical ventilation than older leaky homes","Less ventilation","No ventilation","Permanent open windows"],"correct":0,"exp":"Modern tight construction = less infiltration = less natural ventilation. Mechanical ventilation (HRV, ERV, exhaust-only with passive intakes) becomes essential. Old guideline: 'build tight, ventilate right.'","v":2},{"id":234,"domain":1,"task":9,"topic":"Dryer Vent Length Penalty","q":"Each 90-degree elbow in a dryer vent reduces allowable vent length by approximately:","choices":["1 foot","5 feet","10 feet","No reduction"],"correct":1,"exp":"Standard rule: 90-degree elbow = 5 feet equivalent length. 45-degree = 2.5 feet. Total system must stay within manufacturer maximum (typically 25 feet equivalent). More elbows = shorter allowable straight run.","v":2},{"id":235,"domain":1,"task":9,"topic":"HRV Defrost","q":"HRVs in cold climates have a defrost mode because:","choices":["Exhaust airstream can freeze the heat exchanger core","To extend equipment life","Required for warranty","Improves humidity"],"correct":0,"exp":"Cold incoming air against warm humid exhaust air can frost the heat exchanger core. Defrost cycles temporarily stop intake or use other strategies to prevent core damage.","v":2},{"id":236,"domain":1,"task":9,"topic":"Outside Air Intakes","q":"Mechanical ventilation system outside air intakes should be located:","choices":["Near plumbing vents and gas appliance vents","Away from contamination sources, vents, and exhaust","Inside garages","At the attic ridge"],"correct":1,"exp":"Outside air intakes: minimum distances from vents, exhaust outlets, garages, plumbing vents. Code specifies typical 10 feet from contamination sources. Goal: clean intake air.","v":2},{"id":237,"domain":1,"task":9,"topic":"Bath Fan Sized","q":"A bath fan should be sized at minimum:","choices":["1 CFM per square foot of bath area (50 CFM minimum)","8 air changes per hour","Both A and B as alternative methods","Sized only by visual inspection"],"correct":2,"exp":"Sizing methods: 1 CFM per sq ft (50 CFM minimum), or 8 air changes per hour for the room. Either method acceptable. Larger or moisture-prone baths may need higher capacity.","v":2},{"id":238,"domain":1,"task":9,"topic":"Kitchen Hood Sized","q":"Range hood sizing should generally be:","choices":["100 CFM minimum","Sized to cover the cooking surface and adequate for cooking style (gas vs electric, professional vs standard)","Always 1,500 CFM","Range hoods don't need sizing"],"correct":1,"exp":"Range hood sizing depends on cooking surface (cover all burners), cooking style (gas/induction/electric), use intensity, and code thresholds (makeup air over 400 CFM). Better hoods improve indoor air quality dramatically.","v":2},{"id":239,"domain":1,"task":9,"topic":"Bathroom Window Exception","q":"If a bathroom has an openable window:","choices":["Mechanical ventilation may not be required by older codes","Mechanical ventilation is still required by modern codes","Both - depends on jurisdiction","Window must be closed"],"correct":2,"exp":"Older codes allowed openable window in lieu of mechanical exhaust. Modern codes (IRC) require mechanical exhaust regardless of window. Even where allowed, window-only ventilation rarely operates effectively.","v":2},{"id":240,"domain":1,"task":9,"topic":"Dryer Booster Fan","q":"A dryer booster fan:","choices":["Increases dryer airflow","Helps long vent runs exceed standard length","Requires regular maintenance","All of the above"],"correct":3,"exp":"Dryer booster fans: allow longer vent runs (beyond 25 feet equivalent), but require regular maintenance (lint cleaning) and proper interlocking with dryer operation. Not always reliable - many techs prefer optimizing run length.","v":2},{"id":241,"domain":1,"task":10,"topic":"Polybutylene","q":"Which best describes polybutylene piping?","choices":["Bluish-gray; no longer permissible; microfractures from oxidants/disinfectants in water","Milky-white; cannot be installed within 18 inches of water heater","Yellowish; cannot be installed within 18 inches of water heater","White; not permissible for hot water"],"correct":0,"exp":"Polybutylene (PB): bluish-gray, used 1970s-90s, no longer permissible. Common oxidants like chlorine cause microfractures and catastrophic failure. PVC = white, cold only. CPVC = yellowish, hot/cold. PEX = various, often milky white.","v":2},{"id":242,"domain":1,"task":10,"topic":"DWV","q":"DWV stands for:","choices":["Drain, Waste, Vent","Drinking Water Valve","Distribution and Vapor","Drain, Water, Volt"],"correct":0,"exp":"DWV = Drain, Waste, Vent. The portion of plumbing that removes wastewater (drain), conveys it (waste), and equalizes pressure (vent). Vents prevent siphoning of trap seals.","v":2},{"id":243,"domain":1,"task":10,"topic":"PVC vs CPVC","q":"The difference between PVC and CPVC piping is:","choices":["PVC is for cold water; CPVC is rated for hot water","CPVC is for cold; PVC is for hot","Same material, different brands","CPVC is for waste only"],"correct":0,"exp":"PVC: white, cold water and DWV only. CPVC: yellowish or cream, rated for hot water (potable supply). Don't confuse them - PVC will fail at hot water temperatures.","v":2},{"id":244,"domain":1,"task":10,"topic":"PEX Color","q":"PEX (cross-linked polyethylene) tubing comes in colors that often indicate:","choices":["Hot vs cold (red and blue)","Manufacturer only","Pressure rating","Use with potable water"],"correct":0,"exp":"PEX color often indicates hot/cold (red = hot, blue = cold), though all colors are functionally identical material. White PEX is also common. PEX is durable, flexible, freeze-resistant, and dominant in modern construction.","v":2},{"id":245,"domain":1,"task":10,"topic":"Water Heater TPR","q":"A temperature and pressure relief (TPR) valve on a residential water heater is rated to discharge at approximately:","choices":["30 psi or 150\u00b0F","150 psi or 210\u00b0F","100 psi or 180\u00b0F","75 psi or 200\u00b0F"],"correct":1,"exp":"TPR: 150 psi or 210\u00b0F (whichever is reached first). Discharge tube: terminates within 6 inches of floor (or to outside), points downward, same diameter as valve, never capped, threaded, or plugged.","v":2},{"id":246,"domain":1,"task":10,"topic":"Water Heater TPR Discharge","q":"A water heater TPR discharge tube must:","choices":["Terminate within 6 inches of the floor pointing downward","Terminate at the ceiling","Be plugged when not in use","Discharge into the closest drain"],"correct":0,"exp":"TPR discharge: solid (no valves), full diameter of TPR outlet, terminate within 6 inches of floor (or to outside), point downward, no threads on terminal end (so a hose can't be attached and trapped). Drainage to grade or floor drain.","v":2},{"id":247,"domain":1,"task":10,"topic":"Air Gap","q":"An air gap between a faucet outlet and the flood-level rim of a fixture must be at least:","choices":["1 inch or 2x the diameter of the opening, whichever is greater","1/2 inch","2 inches always","3 inches always"],"correct":0,"exp":"Air gap: 1 inch OR 2x the opening diameter, whichever greater. Most reliable backflow prevention - a physical separation of the supply outlet from the contamination source.","v":2},{"id":248,"domain":1,"task":10,"topic":"Cross-Connection","q":"A cross-connection in plumbing is:","choices":["Two pipes crossing","A connection between potable water and a non-potable source/contamination","An intersection of supply and drain","A thread sealant defect"],"correct":1,"exp":"Cross-connection: any actual or potential connection between potable water supply and a contamination source. Backflow prevention: air gaps, vacuum breakers, RPZ valves, depending on hazard level.","v":2},{"id":249,"domain":1,"task":10,"topic":"Trap Function","q":"The function of a plumbing trap is:","choices":["To trap debris","To maintain a water seal that prevents sewer gases from entering","To regulate water pressure","To separate hot and cold lines"],"correct":1,"exp":"Trap = the U-shaped (P-trap most common) section under a fixture. Holds water that seals against sewer gas. Trap can be siphoned dry without proper venting, or evaporate if fixture is unused for extended periods.","v":2},{"id":250,"domain":1,"task":10,"topic":"S-Trap","q":"An S-trap is:","choices":["The modern preferred trap configuration","An obsolete and prohibited configuration that self-siphons","Stronger than a P-trap","Required for kitchen sinks"],"correct":1,"exp":"S-traps are prohibited by modern code. Configuration self-siphons the trap seal under flow, allowing sewer gas in. Replaced with P-traps (vented). When found, often a remodel error or pre-code installation.","v":2},{"id":251,"domain":1,"task":10,"topic":"Vent Function","q":"Plumbing vents:","choices":["Allow odors to escape","Equalize pressure to prevent trap siphoning and aid drainage","Are decorative","Heat the plumbing system"],"correct":1,"exp":"Vents equalize pressure in the DWV system. Without vents, water flowing through drains creates negative pressure that siphons trap seals. Vents typically extend through the roof, terminating away from windows/openings.","v":2},{"id":252,"domain":1,"task":10,"topic":"AAV","q":"An air admittance valve (AAV):","choices":["Is a one-way valve allowing air in but not gases out","Replaces a vent through the roof in some cases","May be acceptable in some jurisdictions, prohibited in others","All of the above"],"correct":3,"exp":"AAV: spring-loaded one-way valve admitting air to vent the system but blocking sewer gas. Used as alternative to traditional vents in some installations. Acceptance varies by jurisdiction; not allowed in some states for primary venting.","v":2},{"id":253,"domain":1,"task":10,"topic":"Drain Slope","q":"Standard drain pipe slope is approximately:","choices":["Flat (no slope)","1/4 inch per foot","1 inch per foot","6 inches per foot"],"correct":1,"exp":"Standard drain slope: 1/4 inch per foot for pipes 2.5 inches and smaller. Larger pipes can be 1/8 inch per foot. Too flat = poor flow. Too steep = water flows too fast, leaving solids behind.","v":2},{"id":254,"domain":1,"task":10,"topic":"Sewer Lateral","q":"The sewer lateral is:","choices":["A horizontal vent","The pipe from the house to the public sewer or septic","The connection between fixtures","The trap arm"],"correct":1,"exp":"Sewer lateral: pipe from the house to the municipal sewer main or septic tank. Homeowner typically responsible for the entire lateral to the main. Common failure point in older homes (clay tile, root intrusion, sags).","v":2},{"id":255,"domain":1,"task":10,"topic":"Cast Iron Lifespan","q":"Cast iron drain piping typically has a service life of:","choices":["10-20 years","50-75 years (varies)","Over 200 years","Indefinite"],"correct":1,"exp":"Cast iron drains: 50-75 years typical, sometimes longer. Failure modes: corrosion from inside (especially horizontal runs), scale buildup reducing diameter, cracking. Common in older Wisconsin homes.","v":2},{"id":256,"domain":1,"task":10,"topic":"Galvanized Supply Lifespan","q":"Galvanized steel water supply piping typically has a service life of:","choices":["10 years","40-60 years (degrading over time)","100+ years","Indefinite"],"correct":1,"exp":"Galvanized supply: 40-60 years, but interior corrosion and mineral buildup progressively reduces flow long before failure. Common in homes built before ~1960. Replacement with copper or PEX is standard upgrade.","v":2},{"id":257,"domain":1,"task":10,"topic":"Toilet Distance","q":"The minimum horizontal distance from the centerline of a toilet to a side wall is:","choices":["12 inches","15 inches","21 inches","24 inches"],"correct":1,"exp":"Toilet centerline to side wall: 15 inches minimum. Front clearance: 21 inches minimum (to fixture or wall). These dimensions are tested on the NHIE.","v":2},{"id":258,"domain":1,"task":10,"topic":"Toilet Front Clearance","q":"The minimum front clearance for a toilet is:","choices":["15 inches","21 inches","24 inches","36 inches"],"correct":1,"exp":"Toilet front clearance: 21 inches minimum to obstacle. ADA-accessible: more clearance required. 15 inches is the side-to-wall dimension - don't confuse them.","v":2},{"id":259,"domain":1,"task":10,"topic":"Water Heater Anode Rod","q":"A water heater anode rod:","choices":["Heats the water","Sacrifices itself to prevent tank corrosion","Is a backup heating element","Releases scale into the water"],"correct":1,"exp":"Anode rod (typically aluminum or magnesium): sacrificial - corrodes preferentially to protect the steel tank. Should be inspected/replaced every 3-5 years to extend tank life. Often neglected.","v":2},{"id":260,"domain":1,"task":10,"topic":"Water Heater Lifespan","q":"Typical residential tank water heater service life is:","choices":["5 years","10-15 years (varies)","30 years","50 years"],"correct":1,"exp":"Tank water heaters: 10-15 years typical. Hard water shortens life. Look for date code. Tankless units typically last longer (15-20+ years) but cost more upfront.","v":2},{"id":261,"domain":1,"task":10,"topic":"Tankless WH Advantage","q":"Tankless water heaters compared to tank models:","choices":["Provide endless hot water and use less energy when not actively heating","Are smaller","Last longer typically","All of the above"],"correct":3,"exp":"Tankless (on-demand): heat water only when used (no standby losses), endless hot water within capacity, longer lifespan, smaller footprint. Higher upfront cost; gas units need adequate gas line and venting.","v":2},{"id":262,"domain":1,"task":10,"topic":"Sump Pump Discharge","q":"A sump pump discharge should:","choices":["Terminate at least 10 feet from the foundation, away from neighbors","Discharge to the sanitary sewer","Discharge into the basement floor drain","Terminate at the foundation"],"correct":0,"exp":"Sump discharge: away from foundation (otherwise water re-enters), away from neighbors, not into sanitary sewer (overloads system), with check valve to prevent backflow. Many municipalities specifically prohibit sump-to-sewer.","v":2},{"id":263,"domain":1,"task":10,"topic":"Sewage Ejector vs Sump","q":"An ejector pump is different from a sump pump in that it:","choices":["Pumps clear water","Pumps sewage from below-grade fixtures up to the gravity sewer","Is for storm water only","Works without electricity"],"correct":1,"exp":"Sewage ejector pump: pumps sewage from below-sewer-line fixtures (basement bathroom) up to the gravity drain. Solids-handling capacity. Sump pump: clear water only (groundwater). Different motors, different impellers.","v":2},{"id":264,"domain":1,"task":10,"topic":"Backwater Valve","q":"A backwater valve in a sewer lateral:","choices":["Increases flow","Prevents municipal sewer backups from entering the home","Reduces water bills","Is purely decorative"],"correct":1,"exp":"Backwater valve: one-way valve in the sewer lateral that prevents backflow during municipal sewer surcharges (rain events, blockages). Important in areas with combined sewers. Requires periodic inspection and maintenance.","v":2},{"id":265,"domain":1,"task":10,"topic":"Functional Flow Problem","q":"Common causes of poor functional flow at fixtures include:","choices":["Galvanized pipe interior corrosion/scaling","Pressure-reducing valve set too low","Aerator buildup","All of the above"],"correct":3,"exp":"Flow problems: galvanized scale, low pressure-reducing valve setting, aerator/screen mineral buildup, partially closed shutoffs, undersized service line. Multiple causes possible; investigate systematically.","v":2},{"id":266,"domain":1,"task":10,"topic":"Hot Water Recirculation","q":"A hot water recirculation system:","choices":["Continuously circulates hot water in a loop, reducing wait time","Recirculates cold water","Replaces the water heater","Uses no energy"],"correct":0,"exp":"Hot water recirculation: pump moves water through a return loop or via the cold line, keeping hot water near fixtures so wait is shorter. Trade-off: convenience vs energy use (continuous loss). On-demand recirculation is more efficient.","v":2},{"id":267,"domain":1,"task":10,"topic":"WH Pan and Drain","q":"Water heaters located where leaks could cause damage should have:","choices":["A drain pan with drain line to a safe location","A bigger water heater","No special provisions","A bypass valve"],"correct":0,"exp":"Water heaters in attics, finished spaces, or above living areas should have a drain pan piped to a safe drain or outside. Tank failures eventually happen; the pan limits damage.","v":2},{"id":268,"domain":1,"task":10,"topic":"Gas Water Heater Vent","q":"A standard gas water heater vent is:","choices":["PVC","Type B (double-wall metal)","Single-wall always","Not required"],"correct":1,"exp":"Standard gas water heater (atmospheric venting): Type B vent. High-efficiency (condensing): PVC. Direct vent: usually concentric stainless. Single wall: limited use, higher clearances.","v":2},{"id":269,"domain":1,"task":10,"topic":"Frozen Pipe Prevention","q":"Pipes in unconditioned spaces (crawl, attic, exterior walls) in cold climates:","choices":["Should be insulated and located on the warm side of insulation","Cannot be installed","Are fine without insulation","Should run on the cold side"],"correct":0,"exp":"Pipes in cold climates: avoid exterior walls or run on the warm (interior) side of insulation, insulate the pipe, provide heat tape if needed, make freeze-proof outdoor sillcocks standard. Wisconsin freeze-bursts are common winter losses.","v":2},{"id":270,"domain":1,"task":10,"topic":"Frostproof Hose Bib","q":"A frost-free (frostproof) sillcock:","choices":["Has the shutoff valve inside the heated space, with a long stem","Is wrapped in insulation","Has a heated handle","Is identical to a regular hose bib"],"correct":0,"exp":"Frost-free sillcocks have the actual valve seat inside the heated space (typically 6+ inches from the exterior). Water drains from the long stem when closed. Critical: hose must be DISCONNECTED in winter, or water can't drain and freezes.","v":2},{"id":271,"domain":1,"task":11,"topic":"Spa Access Panel","q":"When inspecting a spa tub, the minimum size requirement for the access panel opening is:","choices":["24 inches by 16 inches","15 inches by 21 inches","36 inches by 30 inches","12 inches by 12 inches"],"correct":3,"exp":"Spa access: 12x12 minimum, 18x18 if pump is more than 2 feet from opening. 24x16 = crawlspace access. 36x30 = guardrail trigger. 15x21 = toilet clearances.","v":2},{"id":272,"domain":1,"task":11,"topic":"Stair Riser Variation","q":"The maximum variation between the largest and smallest riser height on a single flight of stairs is:","choices":["3/8 inch","1/4 inch","1/2 inch","3/4 inch"],"correct":0,"exp":"IRC: greatest riser within a flight cannot exceed smallest by more than 3/8 inch. Same tolerance for tread depth. Inconsistent risers are trip hazards.","v":2},{"id":273,"domain":1,"task":11,"topic":"Stair Riser Maximum","q":"The maximum riser height for residential stairs is generally:","choices":["6 inches","7 inches","7-3/4 inches","8-1/4 inches"],"correct":2,"exp":"IRC residential: maximum riser height 7-3/4 inches. Minimum tread depth 10 inches. Different from commercial (smaller riser, deeper tread). Existing stairs may not meet modern dimensions.","v":2},{"id":274,"domain":1,"task":11,"topic":"Stair Tread Minimum","q":"The minimum tread depth for residential stairs is generally:","choices":["8 inches","9 inches","10 inches","12 inches"],"correct":2,"exp":"IRC residential: minimum tread depth 10 inches. Combined with 7-3/4 inch max riser, defines comfortable/safe stair geometry. Old homes may have 8-9 inch treads (defect for new construction).","v":2},{"id":275,"domain":1,"task":11,"topic":"Headroom","q":"Minimum headroom for stairs is generally:","choices":["6 feet","6 feet 8 inches","7 feet","7 feet 6 inches"],"correct":1,"exp":"Stair headroom: 6 feet 8 inches minimum. Measured vertically from a sloped line connecting tread nosings to ceiling. Common defect under finished basement stairs and remodels.","v":2},{"id":276,"domain":1,"task":11,"topic":"Anti-Tip Bracket","q":"An anti-tip bracket is required for:","choices":["Refrigerators","Free-standing kitchen ranges","Microwaves","Dishwashers"],"correct":1,"exp":"Anti-tip bracket: required on free-standing ranges to prevent tipping if a child climbs on or weight is applied to the open oven door. Often missing or installed incorrectly. Test by tilting the range.","v":2},{"id":277,"domain":1,"task":11,"topic":"Dishwasher Air Gap","q":"A dishwasher discharge in some jurisdictions requires:","choices":["A high loop or air gap on the drain line","Direct connection to the disposal","No special provision","An additional pump"],"correct":0,"exp":"Dishwasher drain: high loop (above the under-counter level) OR air gap fitting on countertop. Prevents backflow from sink/disposal into dishwasher. Required by some jurisdictions; high loop generally minimum standard.","v":2},{"id":278,"domain":1,"task":11,"topic":"Disposal Wiring","q":"A common defect with garbage disposal installations is:","choices":["Use of cord on a hardwired model without proper connection","Sharing the dishwasher circuit improperly","Improper wire size","All of the above"],"correct":3,"exp":"Disposal defects: improper cord connection, sharing dishwasher circuit (some jurisdictions allow, others don't), wrong wire gauge, missing knockout plug at dishwasher inlet, leaks at slip joints.","v":2},{"id":279,"domain":1,"task":11,"topic":"Cabinet Securing","q":"Wall cabinets should be secured:","choices":["With finish nails to drywall","With cabinet screws into wall studs","With construction adhesive only","With drywall anchors only"],"correct":1,"exp":"Wall cabinets must be secured into wall studs with appropriate cabinet/wood screws. Drywall anchors alone cannot support loaded cabinets. Common defect in DIY remodels - cabinets eventually pull off the wall.","v":2},{"id":280,"domain":1,"task":11,"topic":"Smart Home Tech Inspection","q":"When inspecting a home with smart home technology:","choices":["Inspect everything","Limit inspection to what can be visually evaluated; disclaim ability to test smart features","Avoid all electronic systems","Test all features"],"correct":1,"exp":"Smart home tech: inspect what's visible (the device, wiring, basic operation if obvious), disclaim deeper evaluation of smart functionality (app integration, network, AI features). Smart features change rapidly; full evaluation beyond inspection scope.","v":2},{"id":281,"domain":1,"task":11,"topic":"Door Hardware Egress","q":"Bedroom egress door hardware should:","choices":["Require a key from inside","Be operable without keys, special knowledge, or tools","Be locked with deadbolts only","Have keyed deadbolts on both sides"],"correct":1,"exp":"Egress doors: operable without keys, tools, or special knowledge from inside. Single-cylinder deadbolt with thumbturn OK; double-cylinder (key both sides) violates egress.","v":2},{"id":282,"domain":1,"task":11,"topic":"Window Sill Height","q":"The maximum sill height of an egress window above the bedroom floor is:","choices":["24 inches","36 inches","44 inches","60 inches"],"correct":2,"exp":"Egress window: maximum sill height 44 inches above floor. Minimum net clear opening dimensions still apply (24 inch height, 20 inch width, 5.7 sq ft area for above-grade openings).","v":2},{"id":283,"domain":1,"task":11,"topic":"Window Operation","q":"Common defects with windows include:","choices":["Stuck or inoperable","Broken glass","Damaged screens","All of the above"],"correct":3,"exp":"Window defects: inoperable, painted shut, broken seals (failed insulating glass), broken glass, damaged or missing screens, missing or damaged hardware, water intrusion at sills.","v":2},{"id":284,"domain":1,"task":11,"topic":"Failed IGU","q":"An insulating glass unit (IGU) seal failure is identified by:","choices":["Condensation or fogging between the panes","Visible cracks","Soft glass","Discolored grids"],"correct":0,"exp":"Failed IGU seal allows moisture between panes - cannot be cleaned, only replaced. Visible as fogging, mineral deposits, or persistent cloudiness between panes. Common in 15-25+ year old units.","v":2},{"id":285,"domain":1,"task":11,"topic":"Drywall Crack Causes","q":"Cracks in interior drywall can be caused by:","choices":["Normal seasonal movement","Foundation settlement","Truss uplift","All of the above"],"correct":3,"exp":"Drywall cracks: normal movement (small, hairline at joints), settlement (diagonal at corners of openings), truss uplift (horizontal at top of interior walls in winter), water damage. Pattern indicates cause.","v":2},{"id":286,"domain":1,"task":11,"topic":"Floor Squeaks","q":"Floor squeaks are typically caused by:","choices":["Loose subfloor fasteners or movement between subfloor and joists","Foundation failure","Termite damage","Major structural problems"],"correct":0,"exp":"Squeaks usually from loose subfloor (nails/screws working out), wood-on-wood movement, or undersized framing flexing. Cosmetic concern in most cases. Exception: if accompanied by sagging or other signs of structural issue.","v":2},{"id":287,"domain":1,"task":11,"topic":"Mold","q":"Visible mold in interior spaces:","choices":["Should be reported with recommendation for moisture source identification","Is always toxic","Is irrelevant to home inspection","Should not be mentioned"],"correct":0,"exp":"Inspectors report visible mold/mildew/staining as a defect, recommend moisture source identification (the underlying cause), and recommend evaluation/remediation by qualified contractor. Don't try to identify species or claim toxicity.","v":2},{"id":288,"domain":1,"task":11,"topic":"Counter Anchoring","q":"Kitchen islands or peninsulas must be secured to:","choices":["Floor framing or floor","Wall framing","Ceiling","No anchoring required"],"correct":0,"exp":"Free-standing islands: secured to floor framing (or ledger that's floor-anchored). Common defect: islands set on floor without anchoring, can shift or topple.","v":2},{"id":289,"domain":1,"task":11,"topic":"Staircase Handrail Required","q":"A handrail is required on stairs with:","choices":["Less than 3 risers","4 or more risers","All stairs regardless","Only basement stairs"],"correct":1,"exp":"Handrail: required on stairs with 4 or more risers (one continuous handrail on at least one side). Modern code: graspable, mounted at 34-38 inches above tread nosings, returned to wall at ends.","v":2},{"id":290,"domain":1,"task":11,"topic":"Smart Home Inspect Limits","q":"Smart home technology inspection has limitations including:","choices":["Cannot test functionality requiring user accounts/apps","Some devices update remotely and may not show current state","Network and security configuration is out of scope","All of the above"],"correct":3,"exp":"Smart home limits: can't access user accounts, can't fully verify integrations, can't evaluate network/security, devices may have remote updates altering behavior. Disclaim and recommend qualified review for advanced systems.","v":2},{"id":291,"domain":1,"task":12,"topic":"Hearth Extension","q":"The minimum hearth extension in front of a masonry fireplace with an opening 6 sq ft or larger is:","choices":["12 inches","16 inches","20 inches","24 inches"],"correct":2,"exp":"Hearth extension: 20 inches in front, 12 inches beyond each side for openings 6+ sq ft. Smaller (under 6 sq ft): 16 inches front, 8 inches sides. Protects against radiant heat and ember fall-out.","v":2},{"id":292,"domain":1,"task":12,"topic":"Smaller Hearth","q":"For a fireplace opening less than 6 sq ft, the hearth must extend:","choices":["12 inches in front","16 inches in front, 8 inches each side","20 inches in front","24 inches in front"],"correct":1,"exp":"Smaller fireplace (under 6 sq ft opening): 16 inches front, 8 inches each side. Larger: 20 inches front, 12 inches each side. Hearth must be non-combustible (typically masonry, tile, stone).","v":2},{"id":293,"domain":1,"task":12,"topic":"Chimney Height Rule","q":"A chimney must extend at least how high above any portion of a building within 10 feet?","choices":["1 foot","2 feet","3 feet","4 feet"],"correct":1,"exp":"3-2-10 rule: chimney must be (1) at least 3 feet above the roof penetration point AND (2) at least 2 feet higher than any portion of building within 10 feet horizontally.","v":2},{"id":294,"domain":1,"task":12,"topic":"Chimney Above Roof","q":"The chimney must extend at least how high above the roof at the point of penetration?","choices":["1 foot","2 feet","3 feet","4 feet"],"correct":2,"exp":"3-2-10 rule: 3 feet above roof penetration, 2 feet above anything within 10 feet horizontally. Insufficient height causes downdrafts and poor draft.","v":2},{"id":295,"domain":1,"task":12,"topic":"Spark Arrestor","q":"A spark arrestor on a chimney:","choices":["Reduces creosote buildup","Prevents sparks/embers from exiting and igniting roofs/vegetation","Improves draft","Is decorative"],"correct":1,"exp":"Spark arrestor: mesh cap that prevents embers from leaving the chimney. Required in most jurisdictions. Different from a rain cap (basic top cover); often combined.","v":2},{"id":296,"domain":1,"task":12,"topic":"Chimney Cap","q":"A chimney cap (rain cap or crown):","choices":["Prevents water entry into the flue and chimney","Improves draft","Limits creosote","All of the above"],"correct":3,"exp":"Chimney cap: keeps rain/snow out of flue (water in flue causes mortar damage), keeps animals out, often includes spark arrestor screen. Without cap, water entry causes accelerated chimney deterioration.","v":2},{"id":297,"domain":1,"task":12,"topic":"Creosote","q":"Creosote in a chimney is:","choices":["A protective coating","Tar-like combustion residue that is highly flammable","Required for proper operation","A normal condensation"],"correct":1,"exp":"Creosote: combustion residue from incomplete burning, primarily wood burning. Three stages (1=loose flakes, 2=hard flakes, 3=hard glaze). Stage 3 is hardest to remove and most fire-prone. Annual chimney inspection/cleaning recommended.","v":2},{"id":298,"domain":1,"task":12,"topic":"Smoke Chamber","q":"The smoke chamber is:","choices":["The firebox itself","The transition area between the firebox and the flue, sloping inward","The hearth area","The flue cap"],"correct":1,"exp":"Smoke chamber: above the damper, transitions from wider firebox to narrower flue. Sloped sides should be smooth or parged - corbeled (stepped) construction creates turbulence and creosote buildup. Modern code requires parging.","v":2},{"id":299,"domain":1,"task":12,"topic":"Damper Location","q":"The damper in a fireplace is located:","choices":["At the bottom of the flue, above the firebox","At the chimney top","In the smoke shelf","At the hearth"],"correct":0,"exp":"Damper: above firebox, controls flue opening. Closed when not in use to reduce heat loss. Top-sealing dampers (at chimney top) are an alternative that seals more effectively.","v":2},{"id":300,"domain":1,"task":12,"topic":"Damper Stop","q":"On a gas fireplace appliance, the damper:","choices":["Must be permanently fixed open or have a damper stop installed","Should be operated like wood","Must be removed entirely","Has no requirements"],"correct":0,"exp":"Gas log set in masonry fireplace: damper must be locked open or have a damper stop ensuring at least partial opening. Otherwise, combustion gases (including CO) could be trapped in the home.","v":2},{"id":301,"domain":1,"task":12,"topic":"Direct Vent","q":"A direct-vent gas fireplace:","choices":["Pulls combustion air from outside and exhausts to outside, sealed from the room","Cannot be used in cold climates","Always uses a chimney","Has no efficiency benefits"],"correct":0,"exp":"Direct vent: sealed combustion. Concentric pipes - inner exhaust, outer intake. No room air used for combustion, no flue gases enter the room. Typically through-the-wall, no chimney needed.","v":2},{"id":302,"domain":1,"task":12,"topic":"B-Vent Gas Fireplace","q":"A B-vent (natural vent) gas fireplace:","choices":["Draws combustion air from the room and exhausts up a Type B vent","Is sealed from the room","Has no vent","Uses outdoor combustion air"],"correct":0,"exp":"B-vent gas fireplace: room air for combustion, exhaust up a Type B vent (typically through the roof). Less efficient than direct vent. Risk of backdrafting if home is depressurized.","v":2},{"id":303,"domain":1,"task":12,"topic":"Vent-Free Fireplace","q":"A vent-free gas appliance:","choices":["Has no flue, exhausts combustion products into the room","Is the most efficient option","Always uses a chimney","Has no special clearance requirements"],"correct":0,"exp":"Vent-free: no flue. All combustion products (water vapor, CO2, trace CO, NOx) released into the room. Banned in some jurisdictions (Canada). Concerning for indoor air quality. Strict BTU limits and oxygen depletion sensors required.","v":2},{"id":304,"domain":1,"task":12,"topic":"Chimney Foundation","q":"A masonry chimney requires:","choices":["A separate foundation independent of the house foundation when free-standing","No special foundation","A wood platform","No support"],"correct":0,"exp":"Masonry chimney: needs adequate foundation for the weight (often heavy). Can settle independently of house if poorly founded - resulting in cracks at the chimney/wall interface. Properly tied with masonry anchors.","v":2},{"id":305,"domain":1,"task":12,"topic":"Solid Fuel Wood Stove Clearance","q":"A solid-fuel wood stove typically requires clearance to combustibles of:","choices":["6 inches all sides","12 inches all sides","36 inches if not specifically tested/listed for less","No clearance"],"correct":2,"exp":"Wood stoves: typically 36 inches clearance to combustibles unless tested/listed (UL listing) for reduced clearances. Many stoves with heat shields can install at 12-18 inches. Always follow manufacturer's listed clearances.","v":2},{"id":306,"domain":1,"task":12,"topic":"Pellet Stove","q":"A pellet stove is:","choices":["A wood-burning appliance fueled by compressed wood/biomass pellets","A type of gas appliance","Fired by oil","Electric only"],"correct":0,"exp":"Pellet stove: burns compressed wood/biomass pellets via auger feed and combustion fan. More controlled than logs, higher efficiency, tighter venting requirements. Typically need backup power or batteries (auger and fan need electricity).","v":2},{"id":307,"domain":1,"task":12,"topic":"Manufactured Fireplace","q":"A factory-built (manufactured) fireplace differs from masonry by:","choices":["Pre-assembled metal components, listed as a system","Lower fire rating","Cannot be in homes","Same as masonry"],"correct":0,"exp":"Manufactured (zero-clearance) fireplace: factory-built metal firebox and chimney system, listed and tested. Used in homes without a true masonry chimney. Much lighter than masonry. Components must match - mixing brands is unsafe.","v":2},{"id":308,"domain":1,"task":12,"topic":"Inspector Fireplace Limitation","q":"When inspecting a fireplace, the home inspector should:","choices":["Disclaim Level 2 chimney inspection if defects suspected, recommend qualified evaluation","Light a fire to test","Always recommend rebuilding","Test the chimney by flashing a flashlight"],"correct":0,"exp":"Home inspection of fireplaces: visible porti
