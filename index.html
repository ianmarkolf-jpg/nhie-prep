: 2, "topic": "Negative Find", "q": "If a serious safety defect is found, the inspector should:", "choices": ["Estimate event", "Report, notify", "Hide for sale", "Wait for client"], "correct": 1, "exp": "Report immediately to client. May verbally notify of imminent hazard (e.g., gas leak). Document. Vol 1.", "v": 5}, {"id": 6089, "domain": 3, "task": 2, "topic": "Misrepresent", "q": "An inspector who misrepresents qualifications creates:", "choices": ["Premium offering", "Required tactic", "Liability ethics", "Better service"], "correct": 2, "exp": "Liability + ethical violation. Disclose accurate qualifications, certifications, experience. SOP.", "v": 5}, {"id": 6090, "domain": 3, "task": 2, "topic": "Insurance Maint", "q": "Inspector E&O insurance should be maintained:", "choices": ["Once per career", "Every 5 years", "Not required", "Continuously"], "correct": 3, "exp": "Continuously while practicing. Lapsed coverage = no protection for tail claims. Often required by client/agent. Industry.", "v": 5}, {"id": 6091, "domain": 3, "task": 2, "topic": "Backdating", "q": "Backdating an inspection report (changing date after delivery) is:", "choices": ["Required item", "Helpful for client", "Premium tier", "Fraud, prohibited"], "correct": 3, "exp": "Fraud. Can result in license loss, lawsuit, criminal charges. Always accurate dates. SOP.", "v": 5}, {"id": 6092, "domain": 3, "task": 2, "topic": "Pressure Modify", "q": "An inspector pressured by an agent to soften a finding should:", "choices": ["Quit the field", "Maintain integrity", "Refuse the job", "Comply for biz"], "correct": 1, "exp": "Maintain integrity. Reports must reflect findings accurately. Compromised reports = liability + ethics. SOP.", "v": 5}, {"id": 6093, "domain": 3, "task": 2, "topic": "Standard Response", "q": "If a client disputes a report finding, the inspector should:", "choices": ["Document, respond", "Hide finding", "Refuse all work", "Modify finding"], "correct": 0, "exp": "Document concern, respond professionally with rationale, modify only if new information justifies. SOP.", "v": 5}];

  const TASK_NAMES = {
    "1.1": "Site Conditions", "1.2": "Exterior", "1.3": "Roof", "1.4": "Structure",
    "1.5": "Electrical", "1.6": "Cooling", "1.7": "Heating", "1.8": "Insulation/Vent",
    "1.9": "Mech Exhaust", "1.10": "Plumbing", "1.11": "Interior", "1.12": "Fireplaces",
    "1.13": "Life Safety",
    "2.1": "Inspection Description", "2.2": "Limitations", "2.3": "Defect Description", "2.4": "Further Evaluation",
    "3.1": "Pre-Inspection Agreement", "3.2": "Quality/Integrity"
  };

  const STORAGE_KEY = "nhie_drill_v5_stats";
  let state = { mode: null, filter: 'all', questions: [], currentIdx: 0, answers: [], startTime: null };

  function loadStats() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { byTask: {}, totalAnswered: 0, totalCorrect: 0, sessions: [] };
  }

  function saveStats(stats) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(stats)); } catch(e) {}
  }

  function recordAnswer(question, isCorrect) {
    const stats = loadStats();
    const key = question.domain + "." + question.task;
    if (!stats.byTask[key]) stats.byTask[key] = { correct: 0, total: 0 };
    stats.byTask[key].total++;
    if (isCorrect) stats.byTask[key].correct++;
    stats.totalAnswered++;
    if (isCorrect) stats.totalCorrect++;
    saveStats(stats);
  }

  function getFilteredPool() {
    if (state.filter === 'v2') return QUESTIONS.filter(q => q.v === 2);
    if (state.filter === 'v3') return QUESTIONS.filter(q => q.v === 3);
    return QUESTIONS;
  }

  function pickQuestions(mode) {
    const pool = getFilteredPool();
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    if (mode === "quick10") return shuffled.slice(0, 10);
    if (mode === "mixed50") return shuffled.slice(0, 50);
    if (mode === "full100") return shuffled.slice(0, 100);
    if (mode === "weak") {
      const stats = loadStats();
      const taskAccuracy = {};
      Object.entries(stats.byTask).forEach(([k, v]) => {
        taskAccuracy[k] = v.total > 0 ? v.correct / v.total : 0.5;
      });
      const scored = shuffled.map(q => {
        const key = q.domain + "." + q.task;
        const acc = taskAccuracy[key] !== undefined ? taskAccuracy[key] : 0.5;
        return { q, acc };
      }).sort((a, b) => a.acc - b.acc);
      return scored.slice(0, 25).map(s => s.q);
    }
    return shuffled.slice(0, 10);
  }

  function renderHome() {
    const stats = loadStats();
    const pool = getFilteredPool();
    const overallPct = stats.totalAnswered > 0 ? Math.round((stats.totalCorrect / stats.totalAnswered) * 100) : 0;
    document.getElementById('stats-bar').innerHTML =
      '<div class="stat"><div class="lbl">Answered</div><div class="val">' + stats.totalAnswered + '</div></div>' +
      '<div class="stat"><div class="lbl">Accuracy</div><div class="val">' + (stats.totalAnswered > 0 ? overallPct + '%' : '-') + '</div></div>' +
      '<div class="stat"><div class="lbl">Filter pool</div><div class="val">' + pool.length + '</div></div>';

    const gapList = document.getElementById('gap-list');
    const gaps = Object.entries(stats.byTask)
      .filter(([k, v]) => v.total >= 2)
      .map(([k, v]) => ({ key: k, pct: Math.round((v.correct / v.total) * 100), n: v.total }))
      .sort((a, b) => a.pct - b.pct);
    if (gaps.length === 0) {
      gapList.innerHTML = '<div style="font-size:14px; color: var(--text-secondary);">Take a quick drill to start tracking gaps by task area.</div>';
    } else {
      let html = '<div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em;">Accuracy by task - weakest first</div>';
      gaps.forEach(g => {
        const cls = g.pct < 70 ? 'weak' : g.pct < 85 ? 'ok' : 'strong';
        const name = TASK_NAMES[g.key] || g.key;
        html += '<div class="gap-row"><span>' + name + ' <span style="color: var(--text-tertiary); font-size: 12px;">(' + g.n + ')</span></span><span class="gap-pct ' + cls + '">' + g.pct + '%</span></div>';
      });
      gapList.innerHTML = html;
    }
  }

  function showScreen(name) {
    document.getElementById('screen-home').style.display = name === 'home' ? 'block' : 'none';
    document.getElementById('screen-quiz').style.display = name === 'quiz' ? 'block' : 'none';
    document.getElementById('screen-results').style.display = name === 'results' ? 'block' : 'none';
    if (name === 'home') renderHome();
    window.scrollTo(0, 0);
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderQuestion() {
    const q = state.questions[state.currentIdx];
    const taskName = TASK_NAMES[q.domain + "." + q.task] || q.topic;
    document.getElementById('progress-text').textContent = 'Question ' + (state.currentIdx + 1) + ' of ' + state.questions.length;
    document.getElementById('progress-bar-fill').style.width = ((state.currentIdx) / state.questions.length * 100) + '%';

    const versionTag = 'v' + q.v;
    let html = '<div class="qmeta"><span>' + escapeHtml(taskName) + ' . ' + escapeHtml(q.topic) + '</span><span>D' + q.domain + ' ' + versionTag + '</span></div>';
    html += '<div class="qtext">' + escapeHtml(q.q) + '</div>';
    q.choices.forEach((c, i) => {
      html += '<button class="choice" data-idx="' + i + '">' + String.fromCharCode(65 + i) + '. ' + escapeHtml(c) + '</button>';
    });
    html += '<div id="explanation-area"></div>';
    html += '<div class="controls" id="controls-area"></div>';
    document.getElementById('question-card').innerHTML = html;

    document.querySelectorAll('.choice').forEach(btn => {
      btn.addEventListener('click', () => answerQuestion(parseInt(btn.dataset.idx)));
    });
  }

  function answerQuestion(choiceIdx) {
    const q = state.questions[state.currentIdx];
    const isCorrect = choiceIdx === q.correct;
    state.answers.push({ question: q, chosen: choiceIdx, correct: isCorrect });
    recordAnswer(q, isCorrect);

    document.querySelectorAll('.choice').forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.correct) btn.classList.add('correct');
      else if (i === choiceIdx) btn.classList.add('wrong');
    });

    document.getElementById('explanation-area').innerHTML =
      '<div class="explanation"><div class="label">' + (isCorrect ? 'Correct' : 'Explanation') + '</div>' + escapeHtml(q.exp) + '</div>';

    const isLast = state.currentIdx === state.questions.length - 1;
    document.getElementById('controls-area').innerHTML =
      '<button class="primary" id="next-btn">' + (isLast ? 'See results' : 'Next question -->') + '</button>';
    document.getElementById('next-btn').addEventListener('click', () => {
      if (isLast) showResults();
      else { state.currentIdx++; renderQuestion(); }
    });
    document.getElementById('progress-bar-fill').style.width = ((state.currentIdx + 1) / state.questions.length * 100) + '%';
  }

  function showResults() {
    const total = state.answers.length;
    const correct = state.answers.filter(a => a.correct).length;
    const pct = Math.round((correct / total) * 100);
    const passing = pct >= 72;
    const elapsed = Math.round((Date.now() - state.startTime) / 1000);
    const min = Math.floor(elapsed / 60);
    const sec = elapsed % 60;

    document.getElementById('score-display').className = 'score ' + (passing ? 'pass' : 'fail');
    document.getElementById('score-display').textContent = pct + '%';
    document.getElementById('score-breakdown').textContent = correct + ' of ' + total + ' correct . ' + min + 'm ' + sec + 's . ' + (passing ? 'Above NHIE pass threshold' : 'Below NHIE pass threshold');

    const wrongAnswers = state.answers.filter(a => !a.correct);
    const reviewSection = document.getElementById('review-section');
    if (wrongAnswers.length === 0) {
      reviewSection.innerHTML = '<div style="font-size:14px; color: var(--success); margin-bottom:1rem;">Perfect score on this set.</div>';
    } else {
      let html = '<div class="review-section-header">Review . ' + wrongAnswers.length + ' missed</div>';
      wrongAnswers.forEach(a => {
        html += '<div class="review-item"><div class="q">' + escapeHtml(a.question.q) + '</div>' +
          '<div class="a"><strong>Your answer:</strong> ' + escapeHtml(a.question.choices[a.chosen]) + '</div>' +
          '<div class="a"><strong>Correct:</strong> ' + escapeHtml(a.question.choices[a.question.correct]) + '</div></div>';
      });
      reviewSection.innerHTML = html;
    }
    showScreen('results');
  }

  function startQuiz(mode) {
    if (mode === 'reset') {
      if (confirm('Clear all stats? This cannot be undone.')) {
        localStorage.removeItem(STORAGE_KEY);
        renderHome();
      }
      return;
    }
    state.mode = mode;
    state.questions = pickQuestions(mode);
    state.currentIdx = 0;
    state.answers = [];
    state.startTime = Date.now();
    showScreen('quiz');
    renderQuestion();
  }

  document.querySelectorAll('.mode-card').forEach(card => {
    card.addEventListener('click', () => startQuiz(card.dataset.mode));
  });
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.filter = btn.dataset.filter;
      renderHome();
    });
  });
  document.getElementById('back-home').addEventListener('click', () => showScreen('home'));

  renderHome();
})();
</script>
