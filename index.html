<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a2540">
<title>NHIE Drill - Cream City Pro</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f7f7f5;
    --bg-tertiary: #efefe9;
    --text-primary: #1a1a1a;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.25);
    --success: #3b6d11;
    --success-bg: #eaf3de;
    --danger: #a32d2d;
    --danger-bg: #fcebeb;
    --warning: #854f0b;
    --info: #185fa5;
    --info-bg: #e6f1fb;
    --accent: #0a2540;
    --gold: #c9a449;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #232323;
      --bg-tertiary: #2c2c2a;
      --text-primary: #f5f5f0;
      --text-secondary: #b4b2a9;
      --text-tertiary: #888780;
      --border: rgba(255,255,255,0.15);
      --border-strong: rgba(255,255,255,0.3);
      --success: #97c459;
      --success-bg: rgba(151,196,89,0.15);
      --danger: #f09595;
      --danger-bg: rgba(240,149,149,0.15);
      --warning: #fac775;
      --info: #85b7eb;
      --info-bg: rgba(133,183,235,0.15);
      --accent: #4a8eda;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    margin: 0;
    padding: 0;
    -webkit-font-smoothing: antialiased;
  }
  .app-shell {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px 80px;
    min-height: 100vh;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .brand {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.01em;
  }
  .brand .accent { color: var(--gold); }
  .version { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; }
  h2 { font-size: 18px; font-weight: 500; margin: 0 0 0.5rem; }
  .sub { font-size: 13px; color: var(--text-secondary); margin: 0 0 1.5rem; }
  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 1rem;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 4px;
  }
  .filter-btn {
    flex: 1;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 12px;
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }
  .filter-btn.active {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-weight: 500;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .mode-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .mode-card {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 1rem;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color 0.15s, transform 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .mode-card:hover { border-color: var(--border-strong); }
  .mode-card:active { transform: scale(0.98); }
  .mode-card .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .mode-card .num { font-size: 28px; font-weight: 500; line-height: 1; }
  .mode-card.reset { background: transparent; border: 1px solid var(--border); }
  .mode-card.reset .num { font-size: 14px; margin-top: 8px; font-weight: 400; }
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 1rem;
  }
  .stat {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 0.75rem;
  }
  .stat .lbl { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
  .stat .val { font-size: 20px; font-weight: 500; }
  .gap-list {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
  }
  .gap-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
  }
  .gap-row:last-child { border-bottom: none; }
  .gap-pct { font-weight: 500; font-variant-numeric: tabular-nums; }
  .gap-pct.weak { color: var(--danger); }
  .gap-pct.ok { color: var(--warning); }
  .gap-pct.strong { color: var(--success); }
  .question-card {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .qmeta {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 0.75rem;
    display: flex;
    justify-content: space-between;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .qtext {
    font-size: 16px;
    line-height: 1.5;
    margin-bottom: 1.25rem;
    font-weight: 500;
  }
  .choice {
    display: block;
    width: 100%;
    text-align: left;
    padding: 0.875rem 1rem;
    margin-bottom: 8px;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-size: 14px;
    line-height: 1.4;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
    font-family: inherit;
    color: var(--text-primary);
    -webkit-tap-highlight-color: transparent;
  }
  .choice:hover:not(:disabled) {
    background: var(--bg-secondary);
    border-color: var(--border-strong);
  }
  .choice:active:not(:disabled) { transform: scale(0.99); }
  .choice.correct {
    background: var(--success-bg);
    border-color: var(--success);
    color: var(--success);
    font-weight: 500;
  }
  .choice.wrong {
    background: var(--danger-bg);
    border-color: var(--danger);
    color: var(--danger);
  }
  .choice:disabled { cursor: default; }
  .explanation {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 1rem;
    margin-top: 0.75rem;
    font-size: 14px;
    line-height: 1.5;
  }
  .explanation .label {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  .controls {
    display: flex;
    gap: 8px;
    margin-top: 1rem;
  }
  button.primary, button.ghost {
    font-family: inherit;
    font-size: 14px;
    padding: 10px 20px;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  button.primary {
    background: var(--accent);
    color: white;
    border: 1px solid var(--accent);
  }
  button.primary:hover { opacity: 0.9; }
  button.primary:active { transform: scale(0.98); }
  button.ghost {
    background: transparent;
    color: var(--text-primary);
    border: 1px solid var(--border-strong);
  }
  button.ghost:hover { background: var(--bg-secondary); }
  .progress {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .progress-bar {
    height: 3px;
    background: var(--bg-secondary);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
  }
  .results { text-align: center; padding: 2rem 0; }
  .results .score { font-size: 56px; font-weight: 500; margin-bottom: 0.5rem; line-height: 1; }
  .results .score.pass { color: var(--success); }
  .results .score.fail { color: var(--danger); }
  .results .breakdown { font-size: 14px; color: var(--text-secondary); margin-bottom: 1.5rem; }
  .review-item {
    text-align: left;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 0.875rem 1rem;
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.5;
  }
  .review-item .q { font-weight: 500; margin-bottom: 6px; color: var(--text-primary); }
  .review-item .a { color: var(--text-secondary); margin-bottom: 2px; }
  .review-item .a strong { color: var(--text-primary); font-weight: 500; }
  .review-section-header {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 8px;
    text-align: left;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  @media (max-width: 480px) {
    .app-shell { padding: 16px 12px 60px; }
    .stats-bar { grid-template-columns: 1fr 1fr; }
    .stats-bar .stat:last-child { grid-column: span 2; }
  }
</style>
</head>
<body>
<div class="app-shell">
  <div class="header">
    <div class="brand">Cream City Pro <span class="accent">.</span> NHIE Drill</div>
    <div class="version">v3 . 1000q</div>
  </div>

  <div id="screen-home">
    <h2>Drill mode</h2>
    <p class="sub">1,000-question bank tagged by EBPHI task. v3 questions are gap-weighted &amp; textbook-direct.</p>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All 1,000</button>
      <button class="filter-btn" data-filter="v2">v2 only (500)</button>
      <button class="filter-btn" data-filter="v3">v3 only (500)</button>
    </div>

    <div class="stats-bar" id="stats-bar"></div>
    <div class="gap-list" id="gap-list"></div>
    <div class="mode-grid">
      <div class="mode-card" data-mode="quick10">
        <div class="label">Quick drill</div>
        <div class="num">10</div>
        <div class="label" style="margin-top:4px;">Random mix</div>
      </div>
      <div class="mode-card" data-mode="weak">
        <div class="label">Weak areas</div>
        <div class="num">25</div>
        <div class="label" style="margin-top:4px;">Lowest accuracy first</div>
      </div>
      <div class="mode-card" data-mode="mixed50">
        <div class="label">Half exam</div>
        <div class="num">50</div>
        <div class="label" style="margin-top:4px;">50 min target</div>
      </div>
      <div class="mode-card" data-mode="full100">
        <div class="label">Full sim</div>
        <div class="num">100</div>
        <div class="label" style="margin-top:4px;">2 hr target</div>
      </div>
      <div class="mode-card reset" data-mode="reset">
        <div class="label">Reset</div>
        <div class="num">Clear all stats</div>
      </div>
    </div>
  </div>

  <div id="screen-quiz" style="display:none;">
    <div class="progress" id="progress-text"></div>
    <div class="progress-bar"><div class="progress-bar-fill" id="progress-bar-fill" style="width:0%"></div></div>
    <div class="question-card" id="question-card" style="margin-top: 1rem;"></div>
  </div>

  <div id="screen-results" style="display:none;">
    <div class="results">
      <div class="score" id="score-display"></div>
      <div class="breakdown" id="score-breakdown"></div>
      <div id="review-section"></div>
      <div class="controls" style="justify-content:center;">
        <button class="ghost" id="back-home">Back to menu</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  const QUESTIONS = [{"id":1,"domain":1,"task":1,"topic":"Grade Slope","q":"Grade should slope away from a foundation a minimum of:","choices":["1 inch over 6 feet","6 inches over the first 10 feet","12 inches over 6 feet","2 inches over 4 feet"],"correct":1,"exp":"Standard requirement: 6 inches of fall over the first 10 feet (5% slope). Negative grade is one of the most common defects in older Wisconsin housing stock and a primary contributor to basement water entry.","v":2},{"id":2,"domain":1,"task":1,"topic":"Hardscape Slope","q":"Hardscape surfaces such as patios and walkways should slope away from the building a minimum of:","choices":["1/4 inch per foot","1/2 inch per foot","1 inch per foot","No slope is required"],"correct":0,"exp":"Hardscape requires 2% minimum slope (1/4 inch per foot) away from the structure. Less slope can result in standing water and migration toward the foundation.","v":2},{"id":3,"domain":1,"task":1,"topic":"Retaining Wall Definition","q":"A wall that holds soil or fill and is less than 2 feet tall is often referred to as a:","choices":["Retaining wall","Landscape wall","Knee wall","Cripple wall"],"correct":1,"exp":"Landscape walls (or garden walls) are short walls used for aesthetic or light retention purposes. True retaining walls handle significant lateral loads. Knee walls are interior partial-height walls. Cripple walls support the floor above a foundation.","v":2},{"id":4,"domain":1,"task":1,"topic":"Deadman","q":"A deadman in retaining wall construction is:","choices":["A vertical post that supports the wall from the front","A buried anchor connected to the wall via a tieback","A horizontal cap on top of the wall","A drainage component behind the wall"],"correct":1,"exp":"A deadman is a buried component (often a railroad tie or landscape timber) that anchors a retaining wall to prevent it from rotating outward. It connects to the wall via a tieback. Common in larger gravity walls.","v":2},{"id":5,"domain":1,"task":1,"topic":"Negative Grade","q":"Negative grade refers to:","choices":["Soil that contains negative ions","Grade that slopes toward the foundation","Grade that has been compacted below the original level","Grade with insufficient drainage capacity"],"correct":1,"exp":"Negative grade slopes toward the foundation rather than away. It directs water at the foundation rather than away from it and is a common cause of basement moisture, efflorescence, and structural damage.","v":2},{"id":6,"domain":1,"task":1,"topic":"Driveway Defects","q":"Which of the following is a typical defect found with driveways?","choices":["Settlement creating trip hazards or ponding","Slope away from the garage","Use of concrete","Use of asphalt"],"correct":0,"exp":"Settlement, large cracks, improper slope (toward garage or house), and upheaval are typical driveway defects. Slope AWAY from the structure is correct, not a defect.","v":2},{"id":7,"domain":1,"task":1,"topic":"Pool Barrier Height","q":"The minimum height for a pool access barrier (fence) is generally:","choices":["36 inches","42 inches","48 inches","60 inches"],"correct":2,"exp":"Pool access barriers must be at least 48 inches high, measured from the side facing away from the pool. Openings in the barrier should not allow passage of a 4-inch sphere.","v":2},{"id":8,"domain":1,"task":1,"topic":"Pool Barrier Gates","q":"Gates serving pool access barriers should:","choices":["Open inward toward the pool","Open outward away from the pool and self-close, self-latch","Be propped open during pool season","Have no latching mechanism for emergency access"],"correct":1,"exp":"Gates must open AWAY from the pool, self-close, and self-latch. Latch release should be at least 54 inches above the ground (or on the pool side) to prevent young children from operating it.","v":2},{"id":9,"domain":1,"task":1,"topic":"Vegetation Clearance","q":"Tree branches and vegetation should be cleared from the roof and exterior walls because:","choices":["They are unsightly","They retain moisture, damage finishes, and can provide pathways for pests","They block solar gain","They block the view from windows"],"correct":1,"exp":"Vegetation contact with the building causes moisture retention against finishes, mechanical damage to roofing and siding, pathways for ants and rodents, and nesting sites. Trim back at least 6 to 12 inches from the building.","v":2},{"id":10,"domain":1,"task":1,"topic":"Earth-to-Wood Contact","q":"Earth-to-wood contact at the base of siding or trim is a defect because:","choices":["It looks unsightly","It allows moisture wicking and wood-destroying organism damage","It provides additional structural support","It improves drainage"],"correct":1,"exp":"Earth-to-wood contact wicks moisture into wood components and creates ideal conditions for fungal decay and termite/carpenter ant infestation. Most building codes require minimum clearances between soil and untreated wood.","v":2},{"id":11,"domain":1,"task":1,"topic":"Sidewalk Trip Hazard","q":"A change in elevation between adjacent walkway sections that constitutes a trip hazard is generally:","choices":["Greater than 1/8 inch","Greater than 1/4 inch","Greater than 1/2 inch","Greater than 1 inch"],"correct":1,"exp":"Differential elevations greater than 1/4 inch are typically considered trip hazards under accessibility and life safety standards. Common causes include freeze-thaw heaving, tree root upheaval, and settlement.","v":2},{"id":12,"domain":1,"task":1,"topic":"Swale","q":"A swale is:","choices":["A type of retaining wall","A shallow drainage channel","A foundation footing","A type of vegetation"],"correct":1,"exp":"A swale is a shallow, vegetated drainage channel designed to direct surface water flow. Often used to route water around or away from a structure where pipes are not practical.","v":2},{"id":13,"domain":1,"task":1,"topic":"Culvert","q":"A culvert is:","choices":["A drainage channel along the side of a road","A pipe that carries water under a driveway or roadway","A type of foundation drain","A vegetated buffer strip"],"correct":1,"exp":"A culvert is a pipe (typically large diameter metal or concrete) that allows water to flow under a driveway or road. Often found at the end of driveways crossing a roadside swale or ditch.","v":2},{"id":14,"domain":1,"task":1,"topic":"Drainage System Components","q":"A residential storm water drainage system may include all of the following EXCEPT:","choices":["Gutters and downspouts","Swales","Underground drains","Sanitary sewer connections"],"correct":3,"exp":"Storm water (clean rain runoff) must NEVER be combined with sanitary sewer per modern code. Old combined systems exist in some cities (including parts of Milwaukee) but new connections require separate storm and sanitary lines.","v":2},{"id":15,"domain":1,"task":1,"topic":"Downspout Discharge","q":"Downspouts should discharge water:","choices":["Directly against the foundation","At least 4 to 6 feet away from the foundation","Into the sanitary sewer","Onto the roof of an adjacent structure"],"correct":1,"exp":"Downspouts should discharge at least 4 to 6 feet from the foundation, with extensions or splash blocks. Discharging at the foundation defeats the purpose of gutters and is a primary cause of basement moisture.","v":2},{"id":16,"domain":1,"task":1,"topic":"Window Well Cover","q":"Window well covers should:","choices":["Be permanent and non-removable","Be removable from the inside without tools or special knowledge","Be welded shut for security","Have no openings whatsoever"],"correct":1,"exp":"Window well covers serving egress windows must be operable from inside without tools, keys, or special knowledge. Permanent or locked covers prevent egress and violate life safety code.","v":2},{"id":17,"domain":1,"task":1,"topic":"Egress Window Well Size","q":"An egress window well must allow the egress window to open fully and provide a horizontal projection of at least:","choices":["9 square feet, with minimum 36 inch projection","6 square feet, with minimum 24 inch projection","12 square feet, with minimum 48 inch projection","No minimum is required"],"correct":0,"exp":"Egress window wells must be at least 9 sq ft in area with minimum 36 inches projection from the wall, allowing the window to open fully. Wells deeper than 44 inches require a permanently affixed ladder or steps.","v":2},{"id":18,"domain":1,"task":1,"topic":"Detached Garage SOP","q":"The condition of a detached garage in a home inspection is generally:","choices":["Out of scope entirely","In scope as part of the inspection","Inspected only if attached to the house","Inspected only if requested with additional fee"],"correct":1,"exp":"Detached garages and carports are typically IN scope of a home inspection. Other auxiliary structures (sheds, barns, gazebos) are out of scope unless specifically agreed to.","v":2},{"id":19,"domain":1,"task":1,"topic":"Driveway Slope Toward Garage","q":"A driveway sloping toward an attached garage is:","choices":["A defect that can direct water into the garage","Required for proper drainage","A neutral observation","Required for vehicle braking"],"correct":0,"exp":"A driveway sloping TOWARD the garage directs water against the garage door and into the structure. Proper installation slopes water away from the garage and house, often using trench drains where slope cannot be reversed.","v":2},{"id":20,"domain":1,"task":1,"topic":"Retaining Wall Drainage","q":"Drainage behind a retaining wall is important because:","choices":["It improves the wall's appearance","It prevents hydrostatic pressure buildup that can topple the wall","It is required by all building codes","It eliminates the need for footings"],"correct":1,"exp":"Hydrostatic pressure from saturated soil behind a retaining wall can exceed the wall's design capacity and cause failure. Proper drainage uses gravel backfill, weep holes, and/or perforated drain pipe at the base.","v":2},{"id":21,"domain":1,"task":1,"topic":"Pool Barrier Opening","q":"Openings in a pool access barrier must not allow the passage of a sphere larger than:","choices":["1 inch","2 inches","4 inches","6 inches"],"correct":2,"exp":"The 4-inch rule: openings cannot allow a 4-inch sphere to pass through. This prevents small children from squeezing through. Same standard applies to deck and stair guardrails for the same reason.","v":2},{"id":22,"domain":1,"task":1,"topic":"Settlement vs Heaving","q":"Differential movement in a concrete walkway can be caused by:","choices":["Frost heaving from beneath","Settlement from voids beneath","Tree root displacement","All of the above"],"correct":3,"exp":"All three are common causes of differential movement in walkways and slabs. Frost heave (especially in Wisconsin freeze-thaw climate), settlement into voids, and root pressure all create differential movement and trip hazards.","v":2},{"id":23,"domain":1,"task":1,"topic":"Patio Surface Defects","q":"Common defects in patios include all of the following EXCEPT:","choices":["Trip hazards from differential movement","Slippery surfaces when wet","Poor drainage / ponding","Uniform color and texture"],"correct":3,"exp":"Uniform appearance is not a defect. Trip hazards, slippery surfaces, ponding, and slope toward the structure are typical patio defects to report.","v":2},{"id":24,"domain":1,"task":1,"topic":"Site Component Reporting","q":"When inspecting site conditions, the home inspector should:","choices":["Inspect and report on all conditions visible on the property","Limit reporting to only conditions affecting the house","Report only on items the client asks about","Avoid reporting on site conditions"],"correct":1,"exp":"Site condition reporting focuses on items that affect or could affect the house: grading, drainage, vegetation contact, hardscape near the foundation. Conditions on the property that don't affect the house are typically out of scope.","v":2},{"id":25,"domain":1,"task":1,"topic":"Vegetation In Scope","q":"The condition of vegetation is in scope of a home inspection when:","choices":["It has aesthetic value","It is likely to have an adverse impact on the house","It is the client's specific concern","Never - vegetation is always out of scope"],"correct":1,"exp":"Vegetation is in scope when it could affect the house: tree limbs over the roof, shrubs against siding, root systems near foundations, vines on exterior walls. General landscaping is out of scope.","v":2},{"id":26,"domain":1,"task":2,"topic":"Stucco Layers","q":"The three layers of the traditional stucco coating process are:","choices":["Moisture barrier, weep screed, and drainage plane","Weep screed, building paper, and metal lath","Scratch, brown, and finish","Drainage plane, capillary break, and building paper"],"correct":2,"exp":"The COATING layers are scratch (first, scored for tooth), brown (leveling), and finish (texture and color). The other terms describe the SUBSTRATE assembly: building paper, weep screed, and metal lath.","v":2},{"id":27,"domain":1,"task":2,"topic":"Weep Screed","q":"A weep screed in stucco construction is:","choices":["The top layer of the stucco finish","Flashing detail at the base of the wall that allows moisture to drain","A type of metal lath","A primer applied before the scratch coat"],"correct":1,"exp":"The weep screed is a flashing detail at the bottom of stucco walls that allows incidental moisture trapped behind the stucco to escape. Required at the base of all stucco walls in modern construction.","v":2},{"id":28,"domain":1,"task":2,"topic":"Wood Siding Clearance","q":"Untreated wood siding should maintain a minimum clearance to grade of:","choices":["2 inches","4 inches","6 inches","12 inches"],"correct":2,"exp":"Untreated wood siding requires 6 inches minimum clearance to soil grade. Concrete and other non-wood materials require lesser clearances. Failure to maintain clearance results in rot and pest infestation.","v":2},{"id":29,"domain":1,"task":2,"topic":"Untreated Wood-to-Soil","q":"The minimum clearance to soil for untreated dimensional wood beams is:","choices":["12 inches","18 inches","8 inches","6 inches"],"correct":0,"exp":"Untreated dimensional wood beams require 12 inches of clearance to soil. Pressure-treated or naturally durable wood (cedar, redwood) has lesser requirements but should still maintain reasonable clearance.","v":2},{"id":30,"domain":1,"task":2,"topic":"Vinyl Siding Defect","q":"A common defect with vinyl siding installation is:","choices":["Nailing too tightly so the panels cannot expand and contract","Use of stainless steel nails","Painting the surface","Vertical orientation"],"correct":0,"exp":"Vinyl siding must be hung loosely so it can expand and contract with temperature changes. Nailing tight causes warping and oil-canning. The nail should be in the center of the slot, with about 1/16 inch gap to the head.","v":2},{"id":31,"domain":1,"task":2,"topic":"EIFS","q":"EIFS stands for:","choices":["Exterior Industrial Foam System","Exterior Insulation and Finish System","Engineered Interior Finish System","Exterior Integrated Flashing System"],"correct":1,"exp":"Exterior Insulation and Finish System - a multi-layer wall system using foam insulation, base coat with mesh, and synthetic finish. First-generation EIFS (face-sealed, no drainage) caused widespread moisture damage in the 1990s and required major industry change to drainable systems.","v":2},{"id":32,"domain":1,"task":2,"topic":"Exterior Door Egress","q":"An exterior door with an interior-keyed deadbolt is:","choices":["Best practice for security","A defect because it can prevent egress in an emergency","Required by code","Acceptable in all locations"],"correct":1,"exp":"Interior-keyed deadbolts (requiring a key to operate from inside) are an egress hazard - in a fire, occupants may not be able to find the key. Most codes require thumbturn or single-cylinder deadbolts on egress doors.","v":2},{"id":33,"domain":1,"task":2,"topic":"Window Safety Glazing","q":"Safety glazing (tempered glass) is required in all of the following locations EXCEPT:","choices":["Within 24 inches of a door","Within 18 inches of a walking surface","Bathroom shower enclosures","Standard living room windows above 18 inches off the floor"],"correct":3,"exp":"Safety glazing required: within 24 inches of doors, within 18 inches of floor (large panes), in shower/tub enclosures, on stair landings. Standard living room windows that don't meet these proximity tests do not require safety glazing.","v":2},{"id":34,"domain":1,"task":2,"topic":"Deck Ledger Defect","q":"A common defect with deck ledger board attachment is:","choices":["Bolts spaced too far apart","Use of nails instead of lag bolts or carriage bolts","Lack of flashing","All of the above"],"correct":3,"exp":"All three are common deck ledger defects. Nails alone don't provide adequate pull-out resistance. Bolts must follow span/load tables. Lack of flashing leads to rim joist rot. Deck collapses often trace back to ledger attachment failures.","v":2},{"id":35,"domain":1,"task":2,"topic":"Deck Ledger Flashing","q":"Flashing at a deck ledger should:","choices":["Direct water away from the building","Be adhered with caulk only","Be omitted if the deck has good drainage","Match the color of the siding"],"correct":0,"exp":"Ledger flashing is a moisture management detail directing water away from the building's rim joist and wall sheathing. Without proper flashing, water gets behind the ledger and rots the rim joist - a common cause of catastrophic deck collapse.","v":2},{"id":36,"domain":1,"task":2,"topic":"Guard Rail Trigger","q":"A guardrail is required when the walking surface is more than ____ above grade:","choices":["12 inches","18 inches","30 inches","36 inches"],"correct":2,"exp":"Guardrails are required when the walking surface is more than 30 inches above the grade or floor below within 36 inches horizontally. This applies to decks, balconies, raised landings, and stairs.","v":2},{"id":37,"domain":1,"task":2,"topic":"Guard Rail Height","q":"Guardrails on decks must be at least:","choices":["30 inches high","36 inches high (residential)","42 inches high","60 inches high"],"correct":1,"exp":"Residential guardrails: 36 inches minimum on decks. Commercial requires 42 inches. The 4-inch sphere rule applies to baluster spacing.","v":2},{"id":38,"domain":1,"task":2,"topic":"Baluster Spacing","q":"Guardrail balusters should be spaced so that:","choices":["A 4-inch sphere cannot pass through","A 6-inch sphere cannot pass through","A 2-inch sphere cannot pass through","Spacing is unrestricted"],"correct":0,"exp":"The 4-inch sphere rule: baluster spacing must not allow a 4-inch sphere to pass through. This prevents small children from squeezing between or getting their head stuck.","v":2},{"id":39,"domain":1,"task":2,"topic":"Handrail Graspability","q":"A handrail on a stair is graspable if:","choices":["It can be encircled by the hand with thumb and fingers meeting","It is at least 2 inches in diameter","It is rectangular","It is wider than 4 inches"],"correct":0,"exp":"A graspable handrail can be fully encircled by the hand. Codes specify maximum diameters (1.25 to 2 inches typical for round) and equivalent perimeters for non-round profiles. Many decorative rails are not graspable.","v":2},{"id":40,"domain":1,"task":2,"topic":"Stair Riser Variation","q":"The maximum variation in riser height within a single flight of stairs is:","choices":["1/4 inch","3/8 inch","1/2 inch","3/4 inch"],"correct":1,"exp":"IRC limits riser height variation to 3/8 inch within a single flight. Same tolerance applies to tread depth. Inconsistent risers cause trips because the climber's stride pattern is broken.","v":2},{"id":41,"domain":1,"task":2,"topic":"Garage Door Auto-Reverse","q":"A residential garage door opener must have an auto-reverse system that activates when:","choices":["The door encounters resistance during closing","Voice-activated","The remote control is pressed twice","The door has been open for more than 1 hour"],"correct":0,"exp":"Auto-reverse must activate when the door encounters resistance during closing. Test by placing a 2x4 flat on the floor in the door path - the door should reverse when contacting it. Required since 1993 federal mandate.","v":2},{"id":42,"domain":1,"task":2,"topic":"Garage Door Photoeyes","q":"Garage door opener photoelectric sensors (photoeyes) should be installed at:","choices":["The top of the door","The center of the door","No more than 6 inches above the floor","Flush with the ceiling"],"correct":2,"exp":"Photoeyes must be no more than 6 inches above the floor so they detect children, pets, and objects in the door path. Higher mounting allows objects to pass under the beam.","v":2},{"id":43,"domain":1,"task":2,"topic":"Soffit","q":"The soffit is:","choices":["The vertical trim board at the rake of a roof","The horizontal underside of the roof overhang","The top course of siding","The flashing at the base of a wall"],"correct":1,"exp":"Soffit is the horizontal underside of the roof overhang (eave). Often perforated or vented to allow attic intake ventilation. The vertical board at the edge is the fascia.","v":2},{"id":44,"domain":1,"task":2,"topic":"Fascia","q":"The fascia is:","choices":["The horizontal underside of the eave","The vertical trim board at the edge of the roof","The drainage plane behind the siding","The framing member behind the soffit"],"correct":1,"exp":"Fascia is the vertical trim board at the edge of the roof, typically where gutters are mounted. Soffit is the horizontal underside.","v":2},{"id":45,"domain":1,"task":2,"topic":"Brick Veneer","q":"A typical residential brick wall is most often:","choices":["Structural masonry supporting roof loads","A non-structural veneer attached to a wood-framed wall behind it","Solid masonry 12 inches thick","An EIFS-style finish system"],"correct":1,"exp":"Most modern residential brick is veneer - non-structural cladding tied to the wood-framed structural wall behind it with metal ties. There's typically a 1-inch air gap and weep holes at the base.","v":2},{"id":46,"domain":1,"task":2,"topic":"Weep Holes","q":"Weep holes in a brick veneer wall should:","choices":["Be sealed to prevent moisture entry","Be open to allow moisture drainage","Be filled with insulation","Be painted to match the brick"],"correct":1,"exp":"Weep holes must remain OPEN to allow moisture that enters the brick veneer cavity to drain out. Blocked or sealed weep holes are a common defect that causes moisture buildup behind the brick.","v":2},{"id":47,"domain":1,"task":2,"topic":"Lap Siding Headlap","q":"Wood lap siding should have an exposure (the visible portion) such that the headlap (overlap with the course above) is at least:","choices":["1/2 inch","1 inch","2 inches","No headlap is required"],"correct":1,"exp":"Lap siding requires minimum 1 inch of headlap (overlap with the course above) to maintain weather resistance. Insufficient overlap allows wind-driven rain behind the siding.","v":2},{"id":48,"domain":1,"task":2,"topic":"Window Header Flashing","q":"Above each window, head flashing should:","choices":["Be installed under the siding to direct water out and over the trim","Be omitted if caulk is used","Be adhered with construction adhesive","Be sealed at all four sides"],"correct":0,"exp":"Head flashing diverts water over the window trim rather than letting it drain behind. Side and bottom of windows do NOT typically need flashing in the same way - the head is the most critical location.","v":2},{"id":49,"domain":1,"task":2,"topic":"Cantilever","q":"A cantilevered exterior wall projection must:","choices":["Have additional structural support from below","Be insulated and have no plumbing in cold climates without protection","Be limited in length","Both A and B"],"correct":3,"exp":"Cantilevers are typically limited in projection by code (e.g., 24 inches without engineering). They must be insulated to prevent cold spots, and plumbing in cantilevered walls in cold climates needs special protection or is prohibited.","v":2},{"id":50,"domain":1,"task":2,"topic":"Eave Drip Edge","q":"Drip edge at eaves serves to:","choices":["Direct water into the gutter and away from the fascia","Provide structural support for the gutter","Hold the shingles in place","Prevent ice damming"],"correct":0,"exp":"Drip edge directs water into the gutter and away from the fascia and underlying wood. Required by IRC at eaves and rakes since 2012. Different profiles for eaves (T-style) and rakes (L-style).","v":2},{"id":51,"domain":1,"task":3,"topic":"Asphalt Shingle Slope","q":"Asphalt shingles are generally permitted on roofs with a minimum slope of:","choices":["1:12","2:12","4:12","6:12"],"correct":1,"exp":"Asphalt shingles permitted at 2:12 minimum WITH double underlayment. Standard installation requires 4:12 minimum. Below 2:12 requires a low-slope roofing system (modified bitumen, EPDM).","v":2},{"id":52,"domain":1,"task":3,"topic":"Standard Asphalt Slope","q":"Standard installation of asphalt shingles (without special underlayment) requires a minimum slope of:","choices":["2:12","3:12","4:12","6:12"],"correct":2,"exp":"4:12 (a 4-inch rise per 12-inch run, about 18 degrees) is the standard minimum. 2:12 to 4:12 is permitted with double underlayment. Below 2:12 requires a different roofing system entirely.","v":2},{"id":53,"domain":1,"task":3,"topic":"Ice Barrier WI","q":"In Wisconsin, ice barrier underlayment must extend from the eave edge to a point at least how far inside the exterior wall line?","choices":["12 inches","24 inches","36 inches","Not required in Wisconsin"],"correct":1,"exp":"Ice barrier (self-adhered polymer-modified bitumen) required from eave to 24 inches inside the warm wall line in regions with mean January temperature below 25\u00b0F. Wisconsin's freeze-thaw cycles make this essential against ice dam leaks.","v":2},{"id":54,"domain":1,"task":3,"topic":"Underlayment Single Layer","q":"For asphalt shingles on a 4:12 or greater slope, the minimum underlayment is:","choices":["Two layers of 30# felt","One layer of 15# felt or equivalent","No underlayment required","Three layers of synthetic underlayment"],"correct":1,"exp":"Standard slopes (4:12+) require one layer of 15# felt or equivalent synthetic underlayment. Slopes 2:12 to 4:12 require two layers (or full ice barrier). Synthetic underlayments are now common and code-accepted.","v":2},{"id":55,"domain":1,"task":3,"topic":"Step Flashing","q":"Step flashing is used:","choices":["At chimneys only","Where a sloped roof meets a vertical wall","On flat roofs","Around skylights only"],"correct":1,"exp":"Step flashing is L-shaped flashing installed at each shingle course where a sloped roof meets a vertical wall. Each piece overlaps the next, creating a watertight transition. Common at dormer walls.","v":2},{"id":56,"domain":1,"task":3,"topic":"Counter Flashing","q":"Counter flashing is:","choices":["Flashing that goes under the shingle and over the wall","Flashing embedded in or attached to a wall that overlaps the step or base flashing","A type of drip edge","Flashing for valleys"],"correct":1,"exp":"Counter flashing is embedded into a wall (or attached to it) to overlap the step/base flashing below. The two-piece system (counter + base) accommodates differential movement between roof and wall.","v":2},{"id":57,"domain":1,"task":3,"topic":"Valley Flashing Types","q":"An open valley uses metal flashing visible in the valley. A closed-cut valley uses:","choices":["Shingles from one side cut back over shingles from the other","Metal flashing covered by shingles","No flashing at all","A waterproof membrane only"],"correct":0,"exp":"Closed-cut valleys: shingles from one slope are run across the valley, then shingles from the other slope are cut back along a chalk line. Properly executed, both methods work; valley details are common leak sources.","v":2},{"id":58,"domain":1,"task":3,"topic":"Skylight Leakage","q":"The most common cause of skylight leakage is:","choices":["Failure of the glass","Improper or deteriorated flashing","Inadequate insulation around the unit","Excessive ventilation"],"correct":1,"exp":"Skylight flashing failure is the dominant cause of leaks - either improper installation (missing pieces, wrong sequence) or deterioration over time. Curb-mounted skylights require step flashing similar to chimneys.","v":2},{"id":59,"domain":1,"task":3,"topic":"Roof Drainage Sizing","q":"Gutter capacity is determined primarily by:","choices":["Color of the gutter","Material of the gutter","Cross-sectional area, slope, and number/size of downspouts","Length of the run only"],"correct":2,"exp":"Gutter capacity depends on cross-sectional area, slope (typically 1/4 inch per 10 feet), and downspout count and size. Inadequate capacity causes overflow during heavy rain.","v":2},{"id":60,"domain":1,"task":3,"topic":"Downspout Spacing","q":"A typical residential downspout serves approximately how much roof area?","choices":["100 sq ft","600-800 sq ft","2,000 sq ft","Unlimited"],"correct":1,"exp":"A 2x3 inch downspout serves approximately 600 sq ft of roof area; 3x4 inch downspouts serve approximately 1,200 sq ft. Larger roofs and steeper roofs (faster runoff) require more capacity.","v":2},{"id":61,"domain":1,"task":3,"topic":"Gutter Slope","q":"Gutters should slope toward the downspouts at approximately:","choices":["1 inch per foot","1/4 inch per 10 feet","6 inches per foot","No slope is required"],"correct":1,"exp":"Gutters slope approximately 1/4 inch per 10 feet toward downspouts. More slope is fine but creates a more visible diagonal. Insufficient slope causes ponding, sagging, and overflow.","v":2},{"id":62,"domain":1,"task":3,"topic":"Plumbing Vent Pipe Flashing","q":"Plumbing vent pipe penetrations through asphalt shingle roofs are flashed with:","choices":["Tar only","A neoprene or rubber-collared flashing (boot)","A masonry chimney crown","A built-up bituminous patch"],"correct":1,"exp":"Plumbing vent flashing uses a metal base flange with a flexible neoprene or EPDM rubber collar (boot) that seals around the pipe. The collar deteriorates from UV before the metal base, often the first failure.","v":2},{"id":63,"domain":1,"task":3,"topic":"Three-Tab vs Architectural","q":"Architectural (laminated) asphalt shingles:","choices":["Have shorter typical warranties than three-tab","Are typically thicker and longer-lasting than three-tab","Are required by all building codes","Cannot be used on slopes greater than 4:12"],"correct":1,"exp":"Architectural shingles are thicker, heavier, and have longer warranties (typically 30-50 years vs 20-25 for three-tab). They've largely replaced three-tab in new construction.","v":2},{"id":64,"domain":1,"task":3,"topic":"Shingle Lifecycle","q":"An asphalt shingle approaching the end of its life will typically show:","choices":["Granule loss exposing the asphalt mat","Curling and cupping at edges","Loss of shingle adhesion to the course below","All of the above"],"correct":3,"exp":"All are end-of-life indicators: granule loss, curling/cupping, brittleness, loss of seal-tab adhesion, exposed nails, and bare spots. Multiple indicators on a roof generally suggest replacement.","v":2},{"id":65,"domain":1,"task":3,"topic":"Wood Shake vs Shingle","q":"The difference between wood shakes and wood shingles is:","choices":["Shakes are thicker and split; shingles are thinner and sawn","Shingles are made from cedar; shakes are not","Shakes are painted; shingles are stained","There is no difference"],"correct":0,"exp":"Shakes are split (more rustic, irregular, thicker). Shingles are sawn (more uniform, thinner). Both typically western red cedar. Both require ventilation and proper exposure.","v":2},{"id":66,"domain":1,"task":3,"topic":"Metal Roof Lifespan","q":"Compared to asphalt shingles, metal roofs typically have:","choices":["Shorter lifespans","Similar lifespans","Significantly longer lifespans","Identical performance characteristics"],"correct":2,"exp":"Quality metal roofs (standing seam, stamped metal shingles) can last 40-70+ years vs 20-30 for asphalt. Higher upfront cost is offset by longevity and recyclability.","v":2},{"id":67,"domain":1,"task":3,"topic":"Tile Roof Substrate","q":"A clay tile roof requires:","choices":["Standard 1/2 inch sheathing","Roof structure designed for the heavier load (typically 2-3x asphalt)","No sheathing at all","Concrete deck only"],"correct":1,"exp":"Clay or concrete tile weighs 700-1,200 lb per square (100 sq ft) vs 200-300 for asphalt. Roof structure must be designed (or evaluated) for the heavier load. A common defect when re-roofing from asphalt to tile.","v":2},{"id":68,"domain":1,"task":3,"topic":"Modified Bitumen","q":"Modified bitumen is a roofing material commonly used on:","choices":["Steep slope residential roofs","Low slope (flat) roofs","Tile roof substrates","Underlayment for asphalt shingles"],"correct":1,"exp":"Modified bitumen (mod-bit) is a low-slope roofing material - rolled sheets with polymer modifiers (APP or SBS) for flexibility and durability. Common on residential flat roofs and porch roofs.","v":2},{"id":69,"domain":1,"task":3,"topic":"EPDM","q":"EPDM is:","choices":["A type of clay tile","A synthetic rubber single-ply membrane for low-slope roofs","A masonry sealant","A chimney flashing material"],"correct":1,"exp":"EPDM (ethylene propylene diene monomer) is a single-ply rubber membrane for low-slope roofs. Comes in large sheets, seamed with adhesive or tape. Lifespan 20-30+ years with proper installation.","v":2},{"id":70,"domain":1,"task":3,"topic":"Chimney Flashing","q":"Proper chimney flashing consists of:","choices":["Step flashing along the sides only","Step flashing along sides, plus base flashing front and saddle (cricket) at the back if wide","A single piece of flashing wrapped around","Tar applied generously"],"correct":1,"exp":"Proper chimney flashing: step flashing on the sides (with counter flashing), base flashing across the front (downhill side), and a saddle (cricket) on the back if the chimney is more than 30 inches wide.","v":2},{"id":71,"domain":1,"task":3,"topic":"Cricket","q":"A roof cricket is:","choices":["A type of insect that damages shingles","A small ridge built behind a chimney to divert water","A drainage channel along the eave","A type of flashing material"],"correct":1,"exp":"A cricket (or saddle) is a small peaked structure built behind a chimney (uphill side) to divert water around it. Required by code for chimneys wider than 30 inches measured perpendicular to slope.","v":2},{"id":72,"domain":1,"task":3,"topic":"Roof Ventilation Balance","q":"A balanced attic ventilation system has:","choices":["All ridge vents and no soffit vents","All soffit vents and no ridge vents","Equal intake (low) and exhaust (high) ventilation","Mechanical fans only"],"correct":2,"exp":"Balanced ventilation requires roughly equal intake (low, typically soffit) and exhaust (high, typically ridge or gable). Net free area should be approximately equal at both. Imbalanced systems can short-circuit or pressurize spaces.","v":2},{"id":73,"domain":1,"task":3,"topic":"NFA","q":"NFA in attic ventilation refers to:","choices":["Normal Filter Area","Net Free Area - the actual unobstructed opening for airflow","National Flashing Association","Negative Flow Area"],"correct":1,"exp":"Net Free Area: the actual airflow opening accounting for screens and louvers. Different vent products have different NFA per linear foot or square foot. Code typically requires 1 sq ft NFA per 150 sq ft attic floor (or 1:300 with vapor retarder).","v":2},{"id":74,"domain":1,"task":3,"topic":"Ridge Vent Effectiveness","q":"Ridge vents are most effective when:","choices":["Used alone with no intake vents","Paired with adequate soffit (intake) vents","Combined with gable end vents","Sealed at both ends"],"correct":1,"exp":"Ridge vents work via convection and wind effect - they need adequate intake (soffit) ventilation to function. A ridge vent without soffit vents can pull conditioned air from the house, defeating the purpose.","v":2},{"id":75,"domain":1,"task":3,"topic":"Power Roof Vent Concerns","q":"A common concern with attic power ventilators is:","choices":["They can pull conditioned air from the house if attic insulation is poor or the system is unbalanced","They reduce roof temperatures excessively","They are required by code","They cannot be used in any climate"],"correct":0,"exp":"Power vents can depressurize the attic and pull conditioned air through ceiling penetrations if intake is inadequate or air sealing is poor. Many building scientists prefer passive ventilation or unvented (sealed) attic assemblies.","v":2},{"id":76,"domain":1,"task":3,"topic":"Roof Drainage Defect","q":"Common defects with roof drainage systems include:","choices":["Improper slope","Damaged or sagging gutters","Disconnected or damaged downspouts","All of the above"],"correct":3,"exp":"All are common gutter defects: improper slope (back-pitch), sagging from weight or fastener failure, separation at seams, damaged elbows, blockages, and discharge too close to foundation.","v":2},{"id":77,"domain":1,"task":3,"topic":"Roof Inspection Method","q":"When inspecting a roof, the inspector should:","choices":["Always walk on the roof regardless of conditions","Walk the roof when safe; otherwise inspect from ladder, eaves, ground, or attic","Refuse to inspect roofs that cannot be walked","Use only binoculars"],"correct":1,"exp":"Inspectors should access the roof when safely possible (slope, surface condition, weather) but otherwise inspect from accessible vantage points (ladder, ground, attic from inside). The SOP requires inspection but not unsafe access.","v":2},{"id":78,"domain":1,"task":3,"topic":"Reroof Layers","q":"Most building codes limit asphalt shingle roof systems to:","choices":["1 layer total","2 layers total","3 layers total","Unlimited layers"],"correct":1,"exp":"Most codes allow a maximum of 2 layers of asphalt shingles. Beyond that, the structural load and the ability to detect underlying problems both become unacceptable. Tear-off is required before adding a new layer above 2.","v":2},{"id":79,"domain":1,"task":3,"topic":"Visible Defects on Roof","q":"All of the following are typical roofing defects EXCEPT:","choices":["Granule loss exposing asphalt","Lifted or missing shingles","Damaged flashings","Uniform color across the roof"],"correct":3,"exp":"Uniform color is not a defect. Granule loss, lifted/missing/cracked shingles, exposed nails, damaged or absent flashings, and bare spots are all typical defects.","v":2},{"id":80,"domain":1,"task":3,"topic":"Flashing Material Compatibility","q":"Aluminum flashing in direct contact with copper or pressure-treated lumber will:","choices":["Bond permanently","Corrode through galvanic or chemical reaction","Last longer than usual","Have no interaction"],"correct":1,"exp":"Aluminum reacts galvanically with copper (and chemically with the copper-based preservatives in modern pressure-treated lumber - ACQ). Use stainless steel or compatible flashing where these contacts occur.","v":2},{"id":81,"domain":1,"task":4,"topic":"Live Load","q":"What is live load?","choices":["Water vapor removed from air due to temperature","Constant downward force from occupants and their belongings","Constant downward force from building materials and permanent equipment","Water vapor from breathing, cooking, and bathing"],"correct":1,"exp":"Live load = occupants, furniture, movable items (transient and variable). Dead load = building materials and permanent equipment (constant). Sensible load relates to air temperature; latent load relates to humidity.","v":2},{"id":82,"domain":1,"task":4,"topic":"Dead Load","q":"Dead load is:","choices":["Furniture and occupants","The constant load from building materials and permanently affixed equipment","Snow accumulation","Wind pressure"],"correct":1,"exp":"Dead load is the permanent, constant load: framing, sheathing, drywall, roofing, plumbing, HVAC equipment fixed in place. Sized differently from live load (people, furniture, snow).","v":2},{"id":83,"domain":1,"task":4,"topic":"Snow Load Wisconsin","q":"In southeastern Wisconsin, the design snow load (ground) is approximately:","choices":["10 psf","20 psf","30 psf","60 psf"],"correct":2,"exp":"Milwaukee area ground snow load is approximately 30 psf. Roof snow load is calculated from ground load with adjustments for slope, exposure, and thermal. Important consideration when adding to or modifying roofs.","v":2},{"id":84,"domain":1,"task":4,"topic":"Anchor Bolt Spacing","q":"Anchor bolts (sill plate to foundation) are typically spaced:","choices":["Maximum 6 feet on center","Maximum 12 feet on center","Maximum 3 feet on center","Maximum 4 feet on center"],"correct":0,"exp":"Anchor bolts: maximum 6 feet on center, within 12 inches of corners and ends, minimum 1/2 inch diameter, embedded at least 7 inches in concrete, with washer and nut. High seismic areas require closer spacing.","v":2},{"id":85,"domain":1,"task":4,"topic":"Anchor Bolt Defect","q":"Which of the following is NOT a typical requirement for anchor bolts?","choices":["Maximum 6 feet on center","Within 12 inches of corners and ends","Minimum 1/2 inch diameter","Minimum 3 feet on center"],"correct":3,"exp":"No 3-foot minimum spacing exists. Requirements are: max 6' on center, within 12 inches of corners/ends/breaks, minimum 1/2 inch diameter, 7 inch embedment, washer and nut.","v":2},{"id":86,"domain":1,"task":4,"topic":"Pipe Trench","q":"A pipe trench below a footing must be offset from the bottom of the footing a minimum of:","choices":["60 degrees","No offset is required","45 degrees","6 feet"],"correct":2,"exp":"45-degree rule: no excavation can encroach on the bearing zone, defined as a 45-degree angle from the bottom of the footing. The soil within this cone provides bearing support.","v":2},{"id":87,"domain":1,"task":4,"topic":"Footing Depth","q":"Footings must extend below the local frost line, which in southeastern Wisconsin is approximately:","choices":["12 inches","24 inches","42-48 inches","6 feet"],"correct":2,"exp":"Wisconsin frost depth is typically 42 to 48 inches. Footings must extend below frost line to prevent frost heave. Shallow footings on frost-susceptible soils heave seasonally and damage foundations.","v":2},{"id":88,"domain":1,"task":4,"topic":"Foundation Settlement","q":"A vertical crack in a basement wall is most commonly caused by:","choices":["Lateral earth pressure","Concrete shrinkage during curing","Foundation settlement","Frost heave"],"correct":1,"exp":"Vertical cracks are usually shrinkage during concrete cure. Diagonal/stair-step cracks indicate settlement. Horizontal cracks indicate lateral pressure (most serious). All cracks should be measured, monitored, and assessed.","v":2},{"id":89,"domain":1,"task":4,"topic":"Horizontal Crack Cause","q":"A horizontal crack in a basement wall is most likely caused by:","choices":["Concrete shrinkage","Settlement","Lateral earth pressure (hydrostatic or frost)","Improper concrete mix"],"correct":2,"exp":"Horizontal cracks indicate lateral pressure - either hydrostatic from saturated soil or frost from frost-susceptible soil at improper depth. The most serious crack pattern. Inspect for bowing/displacement.","v":2},{"id":90,"domain":1,"task":4,"topic":"Stair-Step Crack","q":"A diagonal stair-step crack in a masonry wall typically indicates:","choices":["Normal cure shrinkage","Differential settlement","Hydrostatic pressure","Excessive moisture"],"correct":1,"exp":"Stair-step cracks in masonry follow mortar joints and indicate differential settlement - one part of the wall settling more than another. Investigate the foundation supporting the cracking section.","v":2},{"id":91,"domain":1,"task":4,"topic":"Ufer Ground","q":"A Ufer ground consists of:","choices":["Steel rod driven into the ground","#4 rebar or #4 AWG bare copper at least 20 feet long encased in concrete","Metal water service pipe","Galvanized pipe in soil"],"correct":1,"exp":"A Ufer (concrete-encased electrode) consists of at least 20 feet of #4 rebar or #4 AWG bare copper encased in 2 inches of concrete in the footing. Generally the most effective grounding electrode.","v":2},{"id":92,"domain":1,"task":4,"topic":"Floor Joist Notching","q":"A floor joist may be notched in the outer third of the span by no more than:","choices":["1/4 of the joist depth","1/6 of the joist depth","1/2 of the joist depth","Notching is never permitted"],"correct":1,"exp":"Floor joist notching limits: outer thirds only, max 1/6 of depth. Holes: max 1/3 of depth, at least 2 inches from edges. Middle third (high stress) - no notching, holes only. Critical when plumbers and electricians cut joists.","v":2},{"id":93,"domain":1,"task":4,"topic":"Joist Hole","q":"A hole drilled in a wood floor joist must be:","choices":["Located in the middle third of the depth","Located at least 2 inches from the top or bottom edge","No larger than 1/3 the joist depth","All of the above"],"correct":3,"exp":"Joist holes: at least 2 inches from edges, max 1/3 of depth. Notching has different rules. Holes are less damaging than notches because they don't reduce the cross-section in tension/compression as much.","v":2},{"id":94,"domain":1,"task":4,"topic":"Header Above Opening","q":"A header above a window or door opening must be sized based on:","choices":["Aesthetic preference","The span and the load it carries","The cost of lumber","The width of the wall"],"correct":1,"exp":"Header sizing: based on span (opening width) and load (roof, floor, wall above). Span tables in IRC provide minimum sizes for typical loads. Improper headers cause sagging and cracking above openings.","v":2},{"id":95,"domain":1,"task":4,"topic":"Cripple Wall","q":"A cripple wall is:","choices":["A wall with structural defects","A short framed wall between the foundation and the first floor","A wall containing knee braces","A non-bearing partition wall"],"correct":1,"exp":"A cripple wall is a short stud wall between the foundation top and the first floor, common in homes with crawl space and partial basements. Vulnerable to lateral failure in seismic events; bracing/sheathing recommended.","v":2},{"id":96,"domain":1,"task":4,"topic":"Knee Wall","q":"A knee wall is:","choices":["An interior partial-height wall, often in finished attic spaces","A wall less than 2 feet tall","A retaining wall","A wall in the basement"],"correct":0,"exp":"Knee walls are interior partial-height walls, common in finished attics where roof slopes meet the floor. They define the usable space and often house storage. Insulation/air sealing at knee walls is a frequent defect.","v":2},{"id":97,"domain":1,"task":4,"topic":"Beam Bearing","q":"A wood beam bearing on masonry or concrete should:","choices":["Bear directly with full contact","Have at least 1/2 inch air space at sides and end where embedded","Be sealed in concrete","Be elevated on plastic sheeting only"],"correct":1,"exp":"A wood beam embedded in masonry needs 1/2 inch air space on sides and end (if not pressure-treated or naturally durable). This prevents moisture trapping and decay. Better practice: bear on a steel column or pier with airspace.","v":2},{"id":98,"domain":1,"task":4,"topic":"Bowed Wall Sign","q":"Significant bowing or displacement of a foundation wall indicates:","choices":["Normal aging","Pressure overcoming the wall's capacity, requiring engineering evaluation","A cosmetic concern","Concrete cure shrinkage"],"correct":1,"exp":"Significant displacement (typically over 1 inch in horizontal movement) means the wall is failing under lateral pressure. Requires engineering evaluation, possibly stabilization (carbon fiber, helical anchors, exterior excavation/regrading).","v":2},{"id":99,"domain":1,"task":4,"topic":"Sagging Floor","q":"A noticeably sagging floor in a residence may indicate:","choices":["Decayed or damaged floor framing","Undersized framing for current loads","Settling of supporting columns or piers","Any of the above"],"correct":3,"exp":"All can cause floor sag: decay/damage from moisture or insects, undersized members for the load, settlement of supporting columns/piers, or removal of bearing walls. Investigate from below in basement or crawl.","v":2},{"id":100,"domain":1,"task":4,"topic":"Wood Decay Threshold","q":"Wood decay (rot) requires moisture content above approximately:","choices":["5%","10%","20%","50%"],"correct":2,"exp":"Decay fungi require wood moisture above approximately 20% (some species above 28%). Below this threshold, wood is too dry to support fungal growth. Moisture meters help confirm whether wood has been actively wet.","v":2},{"id":101,"domain":1,"task":4,"topic":"Termite Indicators","q":"Indicators of subterranean termite activity include:","choices":["Mud tubes on foundation walls","Hollowed wood with frass","Damaged wood that sounds hollow when tapped","All of the above"],"correct":3,"exp":"Subterranean termites build mud tubes for moisture and protection between soil and wood. Damaged wood is hollowed along the grain. Frass (droppings) is more typical of drywood termites and carpenter ants. WI has subterranean termites.","v":2},{"id":102,"domain":1,"task":4,"topic":"Carpenter Ant vs Termite","q":"Compared to subterranean termites, carpenter ants:","choices":["Eat the wood for nutrition","Excavate wood for nesting but do not eat it","Build mud tubes","Are not found in Wisconsin"],"correct":1,"exp":"Carpenter ants excavate wood for nests (typically in moist or decayed wood) but do not eat it - they push out frass that resembles fine sawdust with insect parts. Termites consume the wood. Both indicate likely moisture problem.","v":2},{"id":103,"domain":1,"task":4,"topic":"Glulam","q":"A glulam beam is:","choices":["Glue-laminated dimensional lumber assembled into a larger beam","A glued surface treatment","A type of LVL","Solid sawn lumber"],"correct":0,"exp":"Glulam (glued-laminated timber) is dimensional lumber laminated with structural adhesive into larger beams or arches. Allows long spans and curved shapes. Different from LVL (veneers) and PSL (parallel strands).","v":2},{"id":104,"domain":1,"task":4,"topic":"LVL","q":"LVL stands for:","choices":["Layered Vinyl Lumber","Laminated Veneer Lumber","Light Vibration Limit","Long Vertical Load"],"correct":1,"exp":"Laminated Veneer Lumber - thin wood veneers (about 1/8 to 1/16 inch) glued together with grain oriented in the same direction. Used as headers, beams, and rim boards. Stronger and more uniform than dimensional lumber.","v":2},{"id":105,"domain":1,"task":4,"topic":"Truss Modification","q":"Modifying a roof truss (cutting a member, removing a chord) is:","choices":["Acceptable as long as the truss appears stable","Never acceptable without engineered replacement design","Required for installing skylights","Standard for storage installation"],"correct":1,"exp":"Trusses are engineered systems - every member is sized and connected for the load. Cutting or removing any member without engineered repair compromises the entire truss. Common defect during attic remodels and HVAC retrofits.","v":2},{"id":106,"domain":1,"task":4,"topic":"I-Joist Defects","q":"Engineered I-joists have specific limitations including:","choices":["Holes only in pre-drilled or web-only knockouts (not flanges)","Cuts to flanges are catastrophic","Manufacturer-specific span tables","All of the above"],"correct":3,"exp":"I-joists: never cut/notch flanges (top or bottom). Holes only in webs, following manufacturer specs. Use manufacturer span tables. Common defect: plumber/HVAC cuts in flanges - structural failure risk.","v":2},{"id":107,"domain":1,"task":4,"topic":"Foundation Type Slab","q":"A slab-on-grade foundation:","choices":["Has a separate basement and crawl space","Is a single concrete slab acting as both floor and foundation","Always has steel reinforcement","Cannot be used in cold climates"],"correct":1,"exp":"Slab-on-grade is a single concrete slab serving as floor and foundation. Footings (turned-down edges) extend below frost line in cold climates. Can be used anywhere with proper design (insulation, frost protection).","v":2},{"id":108,"domain":1,"task":4,"topic":"Crawl Space Vapor","q":"A typical defect with crawl spaces is:","choices":["Lack of vapor retarder on the soil","Standing water","Insufficient access","All of the above"],"correct":3,"exp":"Crawl space defects: missing/inadequate vapor retarder on soil, standing water, inadequate ventilation OR (newer thinking) too much vent, inadequate access (18x24 minimum), open earth-to-wood contact, decayed framing.","v":2},{"id":109,"domain":1,"task":4,"topic":"Frost Heave","q":"Frost heave in foundations occurs because:","choices":["Wood frame expands in cold weather","Water in soil expands as it freezes, lifting structures above","Concrete contracts when frozen","Heating systems pressurize the soil"],"correct":1,"exp":"Water in soil expands approximately 9% when frozen. In frost-susceptible soils (silts, fine sands), this lifts foundations and slabs above the frost line. Footings below frost line and granular backfill mitigate heave.","v":2},{"id":110,"domain":1,"task":4,"topic":"Water in Crawl Space","q":"Standing water observed in a crawl space indicates:","choices":["Normal moisture migration","A drainage or grading problem requiring correction","No concern as long as it isn't deep","Required by code in some areas"],"correct":1,"exp":"Standing water in a crawl space is always a defect. Sources: poor exterior drainage/grade, plumbing leaks, condensation, high water table. Requires source identification and correction. Can lead to structural decay, pest issues, indoor air quality problems.","v":2},{"id":111,"domain":1,"task":5,"topic":"Service Drop Definition","q":"The service drop is:","choices":["The conductors between the utility transformer and the house, above ground","The conductors between the utility transformer and the house, below ground","The wire from the meter to the panel","The grounded conductor"],"correct":0,"exp":"Service drop = above-ground conductors between utility transformer and house (overhead). Service lateral = below-ground conductors. Both terminate at the service point.","v":2},{"id":112,"domain":1,"task":5,"topic":"Service Lateral","q":"The service lateral is:","choices":["Above-ground utility conductors","Below-ground utility conductors to the house","A horizontal panel orientation","An auxiliary panel"],"correct":1,"exp":"Service lateral is the underground utility feed. Service drop is overhead. Both connect at the service point with house service entrance conductors.","v":2},{"id":113,"domain":1,"task":5,"topic":"Service Entrance Conductors","q":"Service entrance conductors are:","choices":["The conductors between the service drop/lateral and the service equipment","The branch circuits","The conductors from the meter to the subpanel","The grounding conductor"],"correct":0,"exp":"Service entrance conductors run from the service point (where utility ends) to the service equipment (main disconnect/panel). These carry the full service amperage.","v":2},{"id":114,"domain":1,"task":5,"topic":"Six-Disconnect Rule","q":"A residential service disconnect should consist of:","choices":["Six or fewer breakers/switches/fuses","Six or more breakers","Always a single main breaker","Any number of breakers as long as there is a meter"],"correct":0,"exp":"All electricity must be capable of being shut off using six or fewer disconnects. Most modern panels have a single main breaker. Older systems may have multiple disconnects (range, water heater, main, etc.) up to six total.","v":2},{"id":115,"domain":1,"task":5,"topic":"Federal Pacific","q":"Federal Pacific Stab-Lok panels are known for:","choices":["Reliable performance","High failure-to-trip rates posing fire hazards","Premium quality","Being required by certain codes"],"correct":1,"exp":"FPE Stab-Lok breakers have documented high failure-to-trip rates (independent testing showed 1 in 4 to 1 in 3 fail). Should be flagged for replacement. Same family of concerns: Zinsco/Sylvania, Pushmatic.","v":2},{"id":116,"domain":1,"task":5,"topic":"Zinsco","q":"Zinsco/Sylvania panels are known for:","choices":["Premium quality","Aluminum bus oxidation and breaker failures, posing fire hazards","Being more energy efficient","No special concerns"],"correct":1,"exp":"Zinsco panels (also branded as Sylvania-Zinsco and GTE-Sylvania) suffer from aluminum bus oxidation, breaker failure to trip, and breakers that can fall out of position. Should be flagged for replacement.","v":2},{"id":117,"domain":1,"task":5,"topic":"Smallest AWG","q":"The smallest wire gauge typically used in residential branch circuit wiring is:","choices":["#10 AWG","#12 AWG","#14 AWG","#16 AWG"],"correct":2,"exp":"#14 AWG is the smallest residential branch circuit wire (15 amp circuits). #12 AWG = 20 amp. #10 = 30 amp. AWG: smaller number means larger wire diameter. 4/0 is among the largest used in residential service.","v":2},{"id":118,"domain":1,"task":5,"topic":"Aluminum Wiring Risk","q":"Solid-conductor aluminum branch circuit wiring is primarily a concern because:","choices":["Insufficient capacity for modern loads","Connections can loosen and overheat at terminations","Cannot be used with modern breakers","No longer manufactured"],"correct":1,"exp":"Aluminum expands/contracts more than copper, oxidizes, and creeps under pressure - leading to loose connections, arcing, fire. Used roughly 1965-1973. Remediation: COPALUM crimps or AlumiConn connectors at all terminations.","v":2},{"id":119,"domain":1,"task":5,"topic":"Knob and Tube","q":"Knob and tube wiring is:","choices":["Modern wiring approved by code","An obsolete pre-1950s wiring method that should be evaluated","Required in historic districts","Always unsafe"],"correct":1,"exp":"Knob and tube (K&T) used 1880s to 1940s. Single conductors with porcelain insulators. Concerns: brittle insulation with age, no equipment ground, prohibition on contact with insulation. Many insurers won't insure homes with active K&T.","v":2},{"id":120,"domain":1,"task":5,"topic":"Grounding Electrode","q":"Common grounding electrodes include all of the following EXCEPT:","choices":["20 feet of #4 rebar in concrete (Ufer)","Driven rod 8 feet into ground","Metal water service pipe in contact with earth for 10 feet","PVC sewer pipe"],"correct":3,"exp":"PVC is non-conductive and cannot serve as a grounding electrode. Acceptable: Ufer ground, driven rod (8 ft min), metal water pipe (with 10 ft earth contact), and metal building structure. New construction often uses multiple electrodes.","v":2},{"id":121,"domain":1,"task":5,"topic":"GEC Size","q":"The grounding electrode conductor (GEC) for a 200-amp service to a Ufer ground should be:","choices":["#10 AWG copper","#8 AWG copper","#6 AWG copper","#4 AWG copper"],"correct":3,"exp":"Service 200A or greater to Ufer: #4 AWG copper. To rod/pipe: #6 (limited by impractical resistance). To water pipe: full size. Code tables specify based on service size and electrode type.","v":2},{"id":122,"domain":1,"task":5,"topic":"Bonding vs Grounding","q":"Bonding is:","choices":["Connecting the system to earth","Connecting metal components together to provide a low-resistance return path","Insulating wires from each other","Disconnecting equipment for service"],"correct":1,"exp":"Bonding = connecting metal components to provide a path back to the source if energized. Grounding = connecting to earth (acts as voltage surge dissipation). Different functions, often confused.","v":2},{"id":123,"domain":1,"task":5,"topic":"Subpanel Bonding","q":"In a subpanel, the neutral and equipment grounding conductors should be:","choices":["Bonded together as in the main panel","Kept separate (isolated neutrals)","Combined and bonded to a separate ground","Connected to the metal box only"],"correct":1,"exp":"In a subpanel, neutrals and EGCs MUST be on separate, isolated bars. Bonding only happens at the main service. Bonded neutrals at a subpanel cause current to flow on grounding paths - a serious safety defect.","v":2},{"id":124,"domain":1,"task":5,"topic":"Double-Tap","q":"A double-tap (two conductors under one breaker terminal) is:","choices":["Acceptable in all panels","A defect unless the breaker is specifically listed for two conductors","Required for redundancy","Only a defect for aluminum"],"correct":1,"exp":"Most breakers are listed for ONE conductor. Some specific breakers (Square D QO with split lug, certain Cutler-Hammer/Eaton models) are listed for two. Otherwise, two conductors under one screw is a defect.","v":2},{"id":125,"domain":1,"task":5,"topic":"Open Knockout","q":"An open knockout in an electrical panel is:","choices":["Required for ventilation","A safety defect that allows access to live parts and pests","Used for cable management","An indicator of premium quality"],"correct":1,"exp":"Open knockouts allow contact with energized parts and provide entry for pests/debris. Must be filled with a knockout filler (KO seal) or with a connector if a cable passes through.","v":2},{"id":126,"domain":1,"task":5,"topic":"AFCI","q":"AFCI protection is required in:","choices":["All bedroom circuits","Bathrooms only","Detached garages","Service panels only"],"correct":0,"exp":"AFCI (Arc Fault Circuit Interrupter): required in bedrooms (since 2002), expanded to most living areas (kitchen, family room, dining, hallways, laundry) in newer codes. Detects arcing faults; supplements over-current and ground-fault protection.","v":2},{"id":127,"domain":1,"task":5,"topic":"GFCI Locations","q":"GFCI protection is required for all of the following EXCEPT:","choices":["Bathrooms","Kitchen counter receptacles","Bedroom receptacles","Garages"],"correct":2,"exp":"GFCI required in: bathrooms, kitchen counters, garages, outdoor, crawl spaces, unfinished basements, near sinks. Bedrooms typically require AFCI, not GFCI. Newer codes are pushing GFCI everywhere.","v":2},{"id":128,"domain":1,"task":5,"topic":"GFCI Function","q":"A GFCI detects:","choices":["Excessive current draw","Voltage drops","Imbalance between hot and neutral current","Short circuits only"],"correct":2,"exp":"GFCI monitors current in hot vs neutral. Any imbalance over about 5 milliamps means current is flowing somewhere it shouldn't (potentially through a person to ground). Trips in milliseconds.","v":2},{"id":129,"domain":1,"task":5,"topic":"AFCI Function","q":"An AFCI detects:","choices":["Ground faults","Arc faults (the signature waveform of arcing)","Overloads only","Voltage surges"],"correct":1,"exp":"AFCI detects the characteristic high-frequency waveform of arcing - whether series (loose connection) or parallel (insulation breakdown). Reduces fires from electrical arcs in branch circuit wiring.","v":2},{"id":130,"domain":1,"task":5,"topic":"Reverse Polarity","q":"Reverse polarity at a receptacle means:","choices":["The hot and neutral are swapped","The receptacle is inoperable","The ground is missing","DC instead of AC"],"correct":0,"exp":"Reverse polarity = hot and neutral conductors swapped at the receptacle. Common defect, especially with backstabbed connections. Equipment may operate but creates shock hazard - the switched terminal becomes live.","v":2},{"id":131,"domain":1,"task":5,"topic":"Open Ground","q":"An open ground at a 3-prong receptacle:","choices":["Is acceptable as long as polarity is correct","Eliminates the safety benefit of grounded equipment","Improves operation","Causes flickering"],"correct":1,"exp":"Open ground means the equipment grounding conductor isn't connected. Equipment will work, but if a hot wire shorts to a metal case, there's no path to clear the fault. Two-prong receptacles can be replaced with GFCI-protected 3-prong without retrofitting ground (with required labeling).","v":2},{"id":132,"domain":1,"task":5,"topic":"Service Amperage","q":"The minimum service amperage typically considered for a single-family residence today is:","choices":["60 amps","100 amps","200 amps","400 amps"],"correct":1,"exp":"Modern minimum: 100 amps. 200 amps is more common for homes with electric heat, AC, electric ranges, EV chargers. 60-amp services exist in older homes but are typically inadequate for modern loads.","v":2},{"id":133,"domain":1,"task":5,"topic":"Romex","q":"Non-metallic sheathed cable (NM-B), commonly called Romex:","choices":["Can be used in damp/wet locations","Must be protected from physical damage","Is the same as armored cable","Can be exposed in attics directly"],"correct":1,"exp":"NM-B cable: indoor dry locations only. Must be protected from physical damage (within 6 ft of attic entry, in walls, etc.). Wet locations require UF (underground feeder) or conduit.","v":2},{"id":134,"domain":1,"task":5,"topic":"Conduit","q":"Electrical conduit is required when:","choices":["Wiring is exposed to physical damage or in wet locations","Always for residential","Only in commercial buildings","Only at the service entrance"],"correct":0,"exp":"Conduit (EMT, PVC, etc.) protects conductors from physical damage and is used in wet locations. Required for service entrance, exterior runs, garages where damage possible, embedded in concrete, etc.","v":2},{"id":135,"domain":1,"task":5,"topic":"Junction Box","q":"All electrical splices must be:","choices":["In accessible junction boxes","Buried in walls for safety","Wrapped with electrical tape","Soldered directly"],"correct":0,"exp":"All splices/connections must be in approved junction boxes that remain accessible (not buried in walls). Wire nuts inside boxes; box covered with a blank cover or fixture. Concealed splices are a serious defect.","v":2},{"id":136,"domain":1,"task":5,"topic":"Cable Clamping","q":"Cable entering a metal box must be:","choices":["Free to move within the box","Secured with a cable clamp at the box","Sealed with caulk","Painted to prevent corrosion"],"correct":1,"exp":"Cables entering metal boxes need cable clamps to prevent the cable from being pulled out and to protect against the sharp edge of the knockout. Plastic boxes typically have integral clamps.","v":2},{"id":137,"domain":1,"task":5,"topic":"Service Drop Clearance","q":"An overhead service drop must maintain a minimum clearance over a residential driveway of:","choices":["8 feet","10 feet","12 feet","18 feet"],"correct":2,"exp":"Service drop clearances: 12 feet over residential driveways, 18 feet over public roads, 10 feet at lowest point above grade for residential entrance to dwelling. Lower clearances are a significant defect.","v":2},{"id":138,"domain":1,"task":5,"topic":"Meter Base","q":"The meter base is:","choices":["A type of subpanel","The enclosure where the utility meter mounts, typically at the service entrance","An auxiliary disconnect","The grounding electrode"],"correct":1,"exp":"Meter base is the enclosure where the utility's revenue meter mounts. It's between the service entrance conductors and the service equipment. Tampering or unauthorized access is illegal.","v":2},{"id":139,"domain":1,"task":5,"topic":"Conductor Color Code","q":"In residential 120/240V wiring, the typical color code is:","choices":["Black or red = hot, white = neutral, green or bare = ground","Black = neutral, white = hot","All same color","Yellow = hot, blue = neutral"],"correct":0,"exp":"Standard residential colors: black/red = ungrounded (hot), white = grounded (neutral), green/bare = grounding. White used as hot must be re-identified (taped) at terminations.","v":2},{"id":140,"domain":1,"task":5,"topic":"Service Equipment Bonding","q":"At the service equipment:","choices":["Neutrals and grounds are bonded together","Neutrals and grounds are isolated","Only neutrals are present","Only grounds are present"],"correct":0,"exp":"At service equipment (main panel), neutral and grounding bus are bonded -
