ms are more often steam; modern hydronic is hot water.", "v": 5}, {"id": 5137, "domain": 1, "task": 7, "topic": "Backdrafting", "q": "Backdrafting is:", "choices": ["Normal initial start-up condition", "An efficiency-improving design", "Reverse flow of flue gases into the building", "Unique to oil furnaces"], "correct": 2, "exp": "Backdrafting: combustion gases flow backward through the vent and into the building. Causes: depressurization (large exhaust fans), insufficient combustion air, blocked flue, downdrafts. Major CO hazard.", "v": 5}, {"id": 5138, "domain": 1, "task": 8, "topic": "Attic Moisture Best Method", "q": "The most effective means of limiting moisture and mold growth in an attic is:", "choices": ["Heating the attic", "Air sealing the attic from the conditioned space", "Using a sealant at the sheathing and rafters", "Increasing airflow through the attic"], "correct": 1, "exp": "Air sealing PREVENTS moisture-laden air from entering. Ventilation only mitigates moisture that already arrived. Choose prevention over mitigation. Common air leaks: top plates, can lights, plumbing penetrations, attic hatch.", "v": 5}, {"id": 5139, "domain": 1, "task": 8, "topic": "R-30 Attic", "q": "Modern code-recommended attic insulation in cold climates is approximately:", "choices": ["R-13", "R-30 to R-60", "R-19", "R-100"], "correct": 1, "exp": "Cold climate attics: typically R-49 to R-60 in current codes (varies by zone). R-30 is often the older standard or the floor of crawl space requirements. Wisconsin (climate zones 6-7) generally targets R-49+.", "v": 5}, {"id": 5140, "domain": 1, "task": 8, "topic": "R-13 Walls", "q": "Standard 2x4 wood-frame wall cavities can typically achieve approximately:", "choices": ["R-30", "R-49", "R-60", "R-13 to R-15"], "correct": 3, "exp": "2x4 wall cavities (3.5 inches): R-13 standard fiberglass batt, R-15 high-density. 2x6 walls allow R-19 to R-21. Higher R requires deeper cavity or exterior continuous insulation.", "v": 5}, {"id": 5141, "domain": 1, "task": 8, "topic": "Vapor Retarder Climate", "q": "In a cold climate (Wisconsin), the vapor retarder should be located:", "choices": ["Vapor retarder is not needed", "In the middle of the assembly", "On the warm (interior) side of the insulation", "On the outside of the wall"], "correct": 2, "exp": "Cold climate: vapor retarder on the warm (interior) side of insulation. Stops indoor moisture from migrating outward and condensing in the cold cavity. Common: kraft paper backing on batts (facing in), or polyethylene sheet.", "v": 5}, {"id": 5142, "domain": 1, "task": 8, "topic": "Class III Vapor", "q": "A standard latex paint on drywall typically functions as:", "choices": ["No vapor control", "Vapor barrier", "Vapor open membrane", "Class III vapor retarder"], "correct": 3, "exp": "Painted drywall is generally a Class III vapor retarder (1-10 perms). Acceptable in many climate zones. Class II = 0.1-1 perm (kraft paper, smart membranes). Class I = under 0.1 perm (poly sheet).", "v": 5}, {"id": 5143, "domain": 1, "task": 8, "topic": "Soffit Vent Function", "q": "Soffit vents in attic ventilation provide:", "choices": ["Intake (low) airflow", "Exhaust", "Equal intake and exhaust", "Insulation"], "correct": 0, "exp": "Soffit vents: low-side intake. Combined with ridge or gable vents (high-side exhaust), creates passive ventilation. Code typically requires 50-50 split between intake and exhaust net free area.", "v": 5}, {"id": 5144, "domain": 1, "task": 8, "topic": "Exterior Foam", "q": "Exterior continuous insulation:", "choices": ["Reduces thermal bridging through studs", "Reduces R-value", "Requires no vapor management", "Cannot be used in cold climates"], "correct": 0, "exp": "Continuous exterior insulation (rigid foam, mineral wool) covers studs and reduces thermal bridging - studs conduct heat at much lower R than the cavity. Increasingly common in modern construction.", "v": 5}, {"id": 5145, "domain": 1, "task": 8, "topic": "Wisconsin Climate Zone", "q": "Most of Wisconsin falls in IECC climate zone:", "choices": ["6-7 (cold)", "3 (warm)", "4-5 (mixed)", "8 (subarctic)"], "correct": 0, "exp": "Wisconsin spans climate zones 6 and 7 (cold). Most of the state is zone 6, with the northern third in zone 7. Implications: high R-value attics/walls, vapor retarder requirements, frost depth, ice barrier requirements.", "v": 5}, {"id": 5146, "domain": 1, "task": 8, "topic": "Conditioned Crawl", "q": "A conditioned (sealed/encapsulated) crawl space requires:", "choices": ["Insulation on perimeter walls", "Continuous vapor barrier on the soil", "All of the above", "Sealed walls and rim joists"], "correct": 2, "exp": "Encapsulated crawl: vapor barrier on soil (typically 6+ mil poly, taped seams, sealed to walls), sealed/insulated rim and walls, conditioning (small register or dehumidifier), no soil-to-wood contact, sealed access.", "v": 5}, {"id": 5147, "domain": 1, "task": 8, "topic": "Attic Access Insulation", "q": "Attic access hatches should be:", "choices": ["Made of plywood without sealing", "Painted only", "Insulated and weatherstripped", "Uninsulated for accessibility"], "correct": 2, "exp": "Attic hatches are major heat loss points - need insulation (matching the attic), weatherstripping at perimeter, latching to compress weatherstrip. Code typically requires R-value matching surrounding insulation.", "v": 5}, {"id": 5148, "domain": 1, "task": 8, "topic": "Insulation in Ductwork", "q": "Ductwork in unconditioned spaces (attic, crawl) should be:", "choices": ["Sealed but not insulated", "Insulated to reduce energy loss", "Uninsulated", "Removed"], "correct": 1, "exp": "Ducts in unconditioned spaces lose heat (winter) and gain heat (summer). Insulating reduces conditioning losses. Code typically requires R-8 in attics, R-6 in crawl spaces. Sealing duct seams is also critical.", "v": 5}, {"id": 5149, "domain": 1, "task": 8, "topic": "Cellulose Insulation", "q": "Cellulose insulation:", "choices": ["Is made from recycled paper treated with borate", "Is highly flammable", "Has lower R-value than fiberglass", "Cannot be installed in attics"], "correct": 0, "exp": "Cellulose: recycled paper with borate fire retardants. Comparable R-value to fiberglass (R-3.5 to R-3.8 per inch). Often blown-in for attic retrofit. Settles over time (allow ~10-20% settling). Better at filling small gaps than fiberglass.", "v": 5}, {"id": 5150, "domain": 1, "task": 8, "topic": "Spray Foam Open vs Closed Cell", "q": "Closed-cell spray foam compared to open-cell:", "choices": ["Lower R-value", "Higher R-value per inch and acts as a vapor retarder", "Cannot be used as insulation", "Allows water to pass through"], "correct": 1, "exp": "Closed-cell SPF: ~R-6 to R-7 per inch, vapor retarder, structural. Open-cell SPF: ~R-3.5 per inch, vapor open, flexible. Closed-cell preferred at rim joists and below-grade; open-cell common in stud cavities and attics (interior application).", "v": 5}, {"id": 5151, "domain": 1, "task": 8, "topic": "Bath Fan Termination", "q": "A bath fan that terminates inside the attic:", "choices": ["Is acceptable as long as the fan works", "Has no implications", "Is required for ventilation", "Is a defect that introduces moisture into the attic"], "correct": 3, "exp": "Bath fans must terminate to OUTSIDE - through soffit, gable, or roof. Termination in attic dumps humid bathroom air into a cold space, causing condensation, mold, and frost on roof sheathing.", "v": 5}, {"id": 5152, "domain": 1, "task": 8, "topic": "Thermal Bridging", "q": "Thermal bridging in a wall refers to:", "choices": ["An air leak", "A vapor barrier", "Heat conducted through framing members that bypass insulation", "Bridges of insulation between cavities"], "correct": 2, "exp": "Thermal bridging: heat flowing through studs/framing (R-1 per inch wood) rather than insulation (R-3+ per inch). Reduces effective R-value. Mitigated by exterior continuous insulation, advanced framing, double-stud walls.", "v": 5}, {"id": 5153, "domain": 1, "task": 8, "topic": "Attic Bypass Effects", "q": "Air bypasses (unsealed penetrations) in a ceiling:", "choices": ["Leak conditioned air to the attic, reducing efficiency", "Are typically the largest source of envelope leakage", "All of the above", "Carry moisture to the attic, causing condensation"], "correct": 2, "exp": "Air bypasses are major culprits: lose heat, transport moisture, defeat insulation, drive ice dams. Sealing them is often the highest-ROI energy improvement in older homes.", "v": 5}, {"id": 5154, "domain": 1, "task": 8, "topic": "Insulation Settling", "q": "Loose-fill insulation settles over time. The result is:", "choices": ["No change", "Decreased R-value due to reduced thickness", "Increased R-value", "Increased thermal mass"], "correct": 1, "exp": "Settling reduces thickness, which reduces R-value. Cellulose settles ~10-20%, fiberglass loose-fill less. When evaluating, measure actual thickness rather than relying on stated R-value at original install.", "v": 5}, {"id": 5155, "domain": 1, "task": 9, "topic": "ERV vs HRV", "q": "Which mechanical device provides ventilation by using heat from stale exhaust air to preheat fresh incoming air, while ALSO capturing humidity to maintain internal humidity levels?", "choices": ["Local/Spot Exhaust Fan", "Heat Recovery Ventilator (HRV)", "Energy Recovery Ventilator (ERV)", "Whole-House Ventilation"], "correct": 2, "exp": "ERV transfers BOTH heat AND humidity. HRV transfers heat only. The 'humidity' keyword in the question is the ERV signal. HRVs better in cold/dry; ERVs in humid or mixed climates.", "v": 5}, {"id": 5156, "domain": 1, "task": 9, "topic": "Bath Exhaust CFM", "q": "A bathroom exhaust fan must move at least:", "choices": ["500 CFM intermittent", "200 CFM intermittent", "20 CFM continuous or 50 CFM intermittent", "100 CFM intermittent"], "correct": 2, "exp": "Bath exhaust: 20 CFM continuous OR 50 CFM intermittent (per IRC). Many newer codes increased to 80-100 CFM. Sized for the room volume - larger bathrooms need more.", "v": 5}, {"id": 5157, "domain": 1, "task": 9, "topic": "Dryer Vent Material", "q": "Dryer vent ducts should be:", "choices": ["Rigid or semi-rigid metal", "Plastic flexible (vinyl) tubing", "Cardboard tubing", "Standard fabric duct"], "correct": 0, "exp": "Dryer vents: rigid or semi-rigid metal only. Plastic flexible (vinyl) is a fire hazard - lint accumulates, restricts airflow, ignites. Foil-faced flexible is also problematic; metal smooth-wall is best.", "v": 5}, {"id": 5158, "domain": 1, "task": 9, "topic": "Dryer Vent Length", "q": "Maximum dryer vent length is typically:", "choices": ["25 feet (reduced for elbows)", "10 feet", "Unlimited", "50 feet"], "correct": 0, "exp": "Standard maximum: 25 feet of straight rigid metal duct. Each 90-degree elbow reduces by approximately 5 feet, each 45 by 2.5 feet. Booster fans available for longer runs but require maintenance.", "v": 5}, {"id": 5159, "domain": 1, "task": 9, "topic": "Range Hood Code", "q": "Range hoods that exhaust to the outside:", "choices": ["All of the above", "Require a backdraft damper", "Must follow makeup air requirements for high-CFM systems", "Cannot terminate in soffits unless rated"], "correct": 0, "exp": "Range hoods (especially commercial-style high-CFM): backdraft damper, makeup air provision (typically required for 400+ CFM), proper termination (not into soffit unless rated, not directly under windows).", "v": 5}, {"id": 5160, "domain": 1, "task": 9, "topic": "Bath Fan Discharge", "q": "Bath fans should NOT discharge:", "choices": ["Outside through the wall", "Into the attic or crawl space", "Outside through the soffit", "Outside through the roof"], "correct": 1, "exp": "Bath fans discharging into attic or crawl dump warm humid air, causing condensation, mold, frost on roof sheathing. ALWAYS terminate outside via wall, gable, soffit (with proper venting), or roof.", "v": 5}, {"id": 5161, "domain": 1, "task": 9, "topic": "Indoor Air Quality", "q": "An indoor air management system can include:", "choices": ["HRV, ERV, dedicated dehumidifier", "Whole-house ventilation", "All of the above", "Filtration upgrades"], "correct": 2, "exp": "Modern IAQ systems: ventilation (HRV/ERV/whole-house), filtration (MERV 11+ or HEPA), dehumidification, source control, air monitoring. Increasingly common in tight new homes.", "v": 5}, {"id": 5162, "domain": 1, "task": 9, "topic": "HRV Imbalance", "q": "An HRV operating with significantly imbalanced flow can:", "choices": ["Pressurize or depressurize the building", "Always improve indoor air quality", "Have no effect", "Save energy"], "correct": 0, "exp": "Imbalanced HRV/ERV (more exhaust than supply, or vice versa) pressurizes or depressurizes the building, defeating the purpose. Should be commissioned/balanced at install.", "v": 5}, {"id": 5163, "domain": 1, "task": 9, "topic": "Recirculating Range Hood", "q": "Recirculating range hoods filter and return air using:", "choices": ["Catalytic converters", "Electrostatic precipitators", "Charcoal/carbon filters and grease filters", "UV light"], "correct": 2, "exp": "Recirculating hoods: charcoal/carbon filter (odors), grease filter (cooking grease). Filters need regular replacement. Less effective than vented hoods at removing combustion byproducts and moisture.", "v": 5}, {"id": 5164, "domain": 1, "task": 9, "topic": "Bath Fan Switching", "q": "Best practice for bath fan operation in a tight home:", "choices": ["Always off when not in shower", "Disconnect from power", "Continuous operation", "Operate during shower and 20-30 minutes after"], "correct": 3, "exp": "Run during shower and 20-30 minutes after to clear humidity. Timer switches automate this. In very tight homes, may run longer or be replaced by whole-house ventilation strategy.", "v": 5}, {"id": 5165, "domain": 1, "task": 9, "topic": "Dryer Vent Length Penalty", "q": "Each 90-degree elbow in a dryer vent reduces allowable vent length by approximately:", "choices": ["5 feet", "No reduction", "10 feet", "1 foot"], "correct": 0, "exp": "Standard rule: 90-degree elbow = 5 feet equivalent length. 45-degree = 2.5 feet. Total system must stay within manufacturer maximum (typically 25 feet equivalent). More elbows = shorter allowable straight run.", "v": 5}, {"id": 5166, "domain": 1, "task": 9, "topic": "Outside Air Intakes", "q": "Mechanical ventilation system outside air intakes should be located:", "choices": ["Inside garages", "Near plumbing vents and gas appliance vents", "At the attic ridge", "Away from contamination sources, vents, and exhaust"], "correct": 3, "exp": "Outside air intakes: minimum distances from vents, exhaust outlets, garages, plumbing vents. Code specifies typical 10 feet from contamination sources. Goal: clean intake air.", "v": 5}, {"id": 5167, "domain": 1, "task": 9, "topic": "Bath Fan Sized", "q": "A bath fan should be sized at minimum:", "choices": ["1 CFM per square foot of bath area (50 CFM minimum)", "Sized only by visual inspection", "8 air changes per hour", "Both A and B as alternative methods"], "correct": 3, "exp": "Sizing methods: 1 CFM per sq ft (50 CFM minimum), or 8 air changes per hour for the room. Either method acceptable. Larger or moisture-prone baths may need higher capacity.", "v": 5}, {"id": 5168, "domain": 1, "task": 9, "topic": "Bathroom Window Exception", "q": "If a bathroom has an openable window:", "choices": ["Mechanical ventilation is still required by modern codes", "Window must be closed", "Both - depends on jurisdiction", "Mechanical ventilation may not be required by older codes"], "correct": 2, "exp": "Older codes allowed openable window in lieu of mechanical exhaust. Modern codes (IRC) require mechanical exhaust regardless of window. Even where allowed, window-only ventilation rarely operates effectively.", "v": 5}, {"id": 5169, "domain": 1, "task": 9, "topic": "Dryer Booster Fan", "q": "A dryer booster fan:", "choices": ["All of the above", "Helps long vent runs exceed standard length", "Increases dryer airflow", "Requires regular maintenance"], "correct": 0, "exp": "Dryer booster fans: allow longer vent runs (beyond 25 feet equivalent), but require regular maintenance (lint cleaning) and proper interlocking with dryer operation. Not always reliable - many techs prefer optimizing run length.", "v": 5}, {"id": 5170, "domain": 1, "task": 10, "topic": "Polybutylene", "q": "Which best describes polybutylene piping?", "choices": ["Milky-white; cannot be installed within 18 inches of water heater", "White; not permissible for hot water", "Yellowish; cannot be installed within 18 inches of water heater", "Bluish-gray; no longer permissible; microfractures from oxidants/disinfectants in water"], "correct": 3, "exp": "Polybutylene (PB): bluish-gray, used 1970s-90s, no longer permissible. Common oxidants like chlorine cause microfractures and catastrophic failure. PVC = white, cold only. CPVC = yellowish, hot/cold. PEX = various, often milky white.", "v": 5}, {"id": 5171, "domain": 1, "task": 10, "topic": "DWV", "q": "DWV stands for:", "choices": ["Drain, Waste, Vent", "Drinking Water Valve", "Drain, Water, Volt", "Distribution and Vapor"], "correct": 0, "exp": "DWV = Drain, Waste, Vent. The portion of plumbing that removes wastewater (drain), conveys it (waste), and equalizes pressure (vent). Vents prevent siphoning of trap seals.", "v": 5}, {"id": 5172, "domain": 1, "task": 10, "topic": "PVC vs CPVC", "q": "The difference between PVC and CPVC piping is:", "choices": ["CPVC is for cold; PVC is for hot", "PVC is for cold water; CPVC is rated for hot water", "Same material, different brands", "CPVC is for waste only"], "correct": 1, "exp": "PVC: white, cold water and DWV only. CPVC: yellowish or cream, rated for hot water (potable supply). Don't confuse them - PVC will fail at hot water temperatures.", "v": 5}, {"id": 5173, "domain": 1, "task": 10, "topic": "PEX Color", "q": "PEX (cross-linked polyethylene) tubing comes in colors that often indicate:", "choices": ["Manufacturer only", "Hot vs cold (red and blue)", "Pressure rating", "Use with potable water"], "correct": 1, "exp": "PEX color often indicates hot/cold (red = hot, blue = cold), though all colors are functionally identical material. White PEX is also common. PEX is durable, flexible, freeze-resistant, and dominant in modern construction.", "v": 5}, {"id": 5174, "domain": 1, "task": 10, "topic": "Water Heater TPR", "q": "A temperature and pressure relief (TPR) valve on a residential water heater is rated to discharge at approximately:", "choices": ["75 psi or 200°F", "150 psi or 210°F", "100 psi or 180°F", "30 psi or 150°F"], "correct": 1, "exp": "TPR: 150 psi or 210°F (whichever is reached first). Discharge tube: terminates within 6 inches of floor (or to outside), points downward, same diameter as valve, never capped, threaded, or plugged.", "v": 5}, {"id": 5175, "domain": 1, "task": 10, "topic": "Water Heater TPR Discharge", "q": "A water heater TPR discharge tube must:", "choices": ["Be plugged when not in use", "Terminate within 6 inches of the floor pointing downward", "Terminate at the ceiling", "Discharge into the closest drain"], "correct": 1, "exp": "TPR discharge: solid (no valves), full diameter of TPR outlet, terminate within 6 inches of floor (or to outside), point downward, no threads on terminal end (so a hose can't be attached and trapped). Drainage to grade or floor drain.", "v": 5}, {"id": 5176, "domain": 1, "task": 10, "topic": "S-Trap", "q": "An S-trap is:", "choices": ["Stronger than a P-trap", "Required for kitchen sinks", "An obsolete and prohibited configuration that self-siphons", "The modern preferred trap configuration"], "correct": 2, "exp": "S-traps are prohibited by modern code. Configuration self-siphons the trap seal under flow, allowing sewer gas in. Replaced with P-traps (vented). When found, often a remodel error or pre-code installation.", "v": 5}, {"id": 5177, "domain": 1, "task": 10, "topic": "AAV", "q": "An air admittance valve (AAV):", "choices": ["Replaces a vent through the roof in some cases", "All of the above", "May be acceptable in some jurisdictions, prohibited in others", "Is a one-way valve allowing air in but not gases out"], "correct": 1, "exp": "AAV: spring-loaded one-way valve admitting air to vent the system but blocking sewer gas. Used as alternative to traditional vents in some installations. Acceptance varies by jurisdiction; not allowed in some states for primary venting.", "v": 5}, {"id": 5178, "domain": 1, "task": 10, "topic": "Drain Slope", "q": "Standard drain pipe slope is approximately:", "choices": ["6 inches per foot", "1/4 inch per foot", "1 inch per foot", "Flat (no slope)"], "correct": 1, "exp": "Standard drain slope: 1/4 inch per foot for pipes 2.5 inches and smaller. Larger pipes can be 1/8 inch per foot. Too flat = poor flow. Too steep = water flows too fast, leaving solids behind.", "v": 5}, {"id": 5179, "domain": 1, "task": 10, "topic": "Sewer Lateral", "q": "The sewer lateral is:", "choices": ["A horizontal vent", "The connection between fixtures", "The pipe from the house to the public sewer or septic", "The trap arm"], "correct": 2, "exp": "Sewer lateral: pipe from the house to the municipal sewer main or septic tank. Homeowner typically responsible for the entire lateral to the main. Common failure point in older homes (clay tile, root intrusion, sags).", "v": 5}, {"id": 5180, "domain": 1, "task": 10, "topic": "Cast Iron Lifespan", "q": "Cast iron drain piping typically has a service life of:", "choices": ["10-20 years", "Indefinite", "Over 200 years", "50-75 years (varies)"], "correct": 3, "exp": "Cast iron drains: 50-75 years typical, sometimes longer. Failure modes: corrosion from inside (especially horizontal runs), scale buildup reducing diameter, cracking. Common in older Wisconsin homes.", "v": 5}, {"id": 5181, "domain": 1, "task": 10, "topic": "Galvanized Supply Lifespan", "q": "Galvanized steel water supply piping typically has a service life of:", "choices": ["40-60 years (degrading over time)", "Indefinite", "10 years", "100+ years"], "correct": 0, "exp": "Galvanized supply: 40-60 years, but interior corrosion and mineral buildup progressively reduces flow long before failure. Common in homes built before ~1960. Replacement with copper or PEX is standard upgrade.", "v": 5}, {"id": 5182, "domain": 1, "task": 10, "topic": "Toilet Distance", "q": "The minimum horizontal distance from the centerline of a toilet to a side wall is:", "choices": ["24 inches", "15 inches", "12 inches", "21 inches"], "correct": 1, "exp": "Toilet centerline to side wall: 15 inches minimum. Front clearance: 21 inches minimum (to fixture or wall). These dimensions are tested on the NHIE.", "v": 5}, {"id": 5183, "domain": 1, "task": 10, "topic": "Toilet Front Clearance", "q": "The minimum front clearance for a toilet is:", "choices": ["24 inches", "36 inches", "15 inches", "21 inches"], "correct": 3, "exp": "Toilet front clearance: 21 inches minimum to obstacle. ADA-accessible: more clearance required. 15 inches is the side-to-wall dimension - don't confuse them.", "v": 5}, {"id": 5184, "domain": 1, "task": 10, "topic": "Water Heater Anode Rod", "q": "A water heater anode rod:", "choices": ["Releases scale into the water", "Sacrifices itself to prevent tank corrosion", "Is a backup heating element", "Heats the water"], "correct": 1, "exp": "Anode rod (typically aluminum or magnesium): sacrificial - corrodes preferentially to protect the steel tank. Should be inspected/replaced every 3-5 years to extend tank life. Often neglected.", "v": 5}, {"id": 5185, "domain": 1, "task": 10, "topic": "Water Heater Lifespan", "q": "Typical residential tank water heater service life is:", "choices": ["50 years", "5 years", "30 years", "10-15 years (varies)"], "correct": 3, "exp": "Tank water heaters: 10-15 years typical. Hard water shortens life. Look for date code. Tankless units typically last longer (15-20+ years) but cost more upfront.", "v": 5}, {"id": 5186, "domain": 1, "task": 10, "topic": "Tankless WH Advantage", "q": "Tankless water heaters compared to tank models:", "choices": ["All of the above", "Last longer typically", "Are smaller", "Provide endless hot water and use less energy when not actively heating"], "correct": 0, "exp": "Tankless (on-demand): heat water only when used (no standby losses), endless hot water within capacity, longer lifespan, smaller footprint. Higher upfront cost; gas units need adequate gas line and venting.", "v": 5}, {"id": 5187, "domain": 1, "task": 10, "topic": "Functional Flow Problem", "q": "Common causes of poor functional flow at fixtures include:", "choices": ["All of the above", "Pressure-reducing valve set too low", "Galvanized pipe interior corrosion/scaling", "Aerator buildup"], "correct": 0, "exp": "Flow problems: galvanized scale, low pressure-reducing valve setting, aerator/screen mineral buildup, partially closed shutoffs, undersized service line. Multiple causes possible; investigate systematically.", "v": 5}, {"id": 5188, "domain": 1, "task": 10, "topic": "Gas Water Heater Vent", "q": "A standard gas water heater vent is:", "choices": ["Single-wall always", "PVC", "Type B (double-wall metal)", "Not required"], "correct": 2, "exp": "Standard gas water heater (atmospheric venting): Type B vent. High-efficiency (condensing): PVC. Direct vent: usually concentric stainless. Single wall: limited use, higher clearances.", "v": 5}, {"id": 5189, "domain": 1, "task": 11, "topic": "Spa Access Panel", "q": "When inspecting a spa tub, the minimum size requirement for the access panel opening is:", "choices": ["24 inches by 16 inches", "36 inches by 30 inches", "15 inches by 21 inches", "12 inches by 12 inches"], "correct": 3, "exp": "Spa access: 12x12 minimum, 18x18 if pump is more than 2 feet from opening. 24x16 = crawlspace access. 36x30 = guardrail trigger. 15x21 = toilet clearances.", "v": 5}, {"id": 5190, "domain": 1, "task": 11, "topic": "Stair Riser Variation", "q": "The maximum variation between the largest and smallest riser height on a single flight of stairs is:", "choices": ["3/8 inch", "1/2 inch", "3/4 inch", "1/4 inch"], "correct": 0, "exp": "IRC: greatest riser within a flight cannot exceed smallest by more than 3/8 inch. Same tolerance for tread depth. Inconsistent risers are trip hazards.", "v": 5}, {"id": 5191, "domain": 1, "task": 11, "topic": "Stair Riser Maximum", "q": "The maximum riser height for residential stairs is generally:", "choices": ["7-3/4 inches", "6 inches", "8-1/4 inches", "7 inches"], "correct": 0, "exp": "IRC residential: maximum riser height 7-3/4 inches. Minimum tread depth 10 inches. Different from commercial (smaller riser, deeper tread). Existing stairs may not meet modern dimensions.", "v": 5}, {"id": 5192, "domain": 1, "task": 11, "topic": "Stair Tread Minimum", "q": "The minimum tread depth for residential stairs is generally:", "choices": ["10 inches", "8 inches", "12 inches", "9 inches"], "correct": 0, "exp": "IRC residential: minimum tread depth 10 inches. Combined with 7-3/4 inch max riser, defines comfortable/safe stair geometry. Old homes may have 8-9 inch treads (defect for new construction).", "v": 5}, {"id": 5193, "domain": 1, "task": 11, "topic": "Headroom", "q": "Minimum headroom for stairs is generally:", "choices": ["7 feet 6 inches", "6 feet 8 inches", "7 feet", "6 feet"], "correct": 1, "exp": "Stair headroom: 6 feet 8 inches minimum. Measured vertically from a sloped line connecting tread nosings to ceiling. Common defect under finished basement stairs and remodels.", "v": 5}, {"id": 5194, "domain": 1, "task": 11, "topic": "Anti-Tip Bracket", "q": "An anti-tip bracket is required for:", "choices": ["Free-standing kitchen ranges", "Refrigerators", "Microwaves", "Dishwashers"], "correct": 0, "exp": "Anti-tip bracket: required on free-standing ranges to prevent tipping if a child climbs on or weight is applied to the open oven door. Often missing or installed incorrectly. Test by tilting the range.", "v": 5}, {"id": 5195, "domain": 1, "task": 11, "topic": "Dishwasher Air Gap", "q": "A dishwasher discharge in some jurisdictions requires:", "choices": ["Direct connection to the disposal", "A high loop or air gap on the drain line", "No special provision", "An additional pump"], "correct": 1, "exp": "Dishwasher drain: high loop (above the under-counter level) OR air gap fitting on countertop. Prevents backflow from sink/disposal into dishwasher. Required by some jurisdictions; high loop generally minimum standard.", "v": 5}, {"id": 5196, "domain": 1, "task": 11, "topic": "Disposal Wiring", "q": "A common defect with garbage disposal installations is:", "choices": ["Sharing the dishwasher circuit improperly", "Use of cord on a hardwired model without proper connection", "Improper wire size", "All of the above"], "correct": 3, "exp": "Disposal defects: improper cord connection, sharing dishwasher circuit (some jurisdictions allow, others don't), wrong wire gauge, missing knockout plug at dishwasher inlet, leaks at slip joints.", "v": 5}, {"id": 5197, "domain": 1, "task": 11, "topic": "Cabinet Securing", "q": "Wall cabinets should be secured:", "choices": ["With cabinet screws into wall studs", "With construction adhesive only", "With drywall anchors only", "With finish nails to drywall"], "correct": 0, "exp": "Wall cabinets must be secured into wall studs with appropriate cabinet/wood screws. Drywall anchors alone cannot support loaded cabinets. Common defect in DIY remodels - cabinets eventually pull off the wall.", "v": 5}, {"id": 5198, "domain": 1, "task": 11, "topic": "Door Hardware Egress", "q": "Bedroom egress door hardware should:", "choices": ["Have keyed deadbolts on both sides", "Be locked with deadbolts only", "Require a key from inside", "Be operable without keys, special knowledge, or tools"], "correct": 3, "exp": "Egress doors: operable without keys, tools, or special knowledge from inside. Single-cylinder deadbolt with thumbturn OK; double-cylinder (key both sides) violates egress.", "v": 5}, {"id": 5199, "domain": 1, "task": 11, "topic": "Window Sill Height", "q": "The maximum sill height of an egress window above the bedroom floor is:", "choices": ["60 inches", "24 inches", "36 inches", "44 inches"], "correct": 3, "exp": "Egress window: maximum sill height 44 inches above floor. Minimum net clear opening dimensions still apply (24 inch height, 20 inch width, 5.7 sq ft area for above-grade openings).", "v": 5}, {"id": 5200, "domain": 1, "task": 11, "topic": "Window Operation", "q": "Common defects with windows include:", "choices": ["All of the above", "Broken glass", "Stuck or inoperable", "Damaged screens"], "correct": 0, "exp": "Window defects: inoperable, painted shut, broken seals (failed insulating glass), broken glass, damaged or missing screens, missing or damaged hardware, water intrusion at sills.", "v": 5}, {"id": 5201, "domain": 1, "task": 11, "topic": "Drywall Crack Causes", "q": "Cracks in interior drywall can be caused by:", "choices": ["Truss uplift", "Foundation settlement", "Normal seasonal movement", "All of the above"], "correct": 3, "exp": "Drywall cracks: normal movement (small, hairline at joints), settlement (diagonal at corners of openings), truss uplift (horizontal at top of interior walls in winter), water damage. Pattern indicates cause.", "v": 5}, {"id": 5202, "domain": 1, "task": 11, "topic": "Counter Anchoring", "q": "Kitchen islands or peninsulas must be secured to:", "choices": ["Ceiling", "Wall framing", "Floor framing or floor", "No anchoring required"], "correct": 2, "exp": "Free-standing islands: secured to floor framing (or ledger that's floor-anchored). Common defect: islands set on floor without anchoring, can shift or topple.", "v": 5}, {"id": 5203, "domain": 1, "task": 11, "topic": "Staircase Handrail Required", "q": "A handrail is required on stairs with:", "choices": ["Only basement stairs", "All stairs regardless", "Less than 3 risers", "4 or more risers"], "correct": 3, "exp": "Handrail: required on stairs with 4 or more risers (one continuous handrail on at least one side). Modern code: graspable, mounted at 34-38 inches above tread nosings, returned to wall at ends.", "v": 5}, {"id": 5204, "domain": 1, "task": 11, "topic": "Smart Home Inspect Limits", "q": "Smart home technology inspection has limitations including:", "choices": ["Some devices update remotely and may not show current state", "Cannot test functionality requiring user accounts/apps", "All of the above", "Network and security configuration is out of scope"], "correct": 2, "exp": "Smart home limits: can't access user accounts, can't fully verify integrations, can't evaluate network/security, devices may have remote updates altering behavior. Disclaim and recommend qualified review for advanced systems.", "v": 5}, {"id": 5205, "domain": 1, "task": 12, "topic": "Hearth Extension", "q": "The minimum hearth extension in front of a masonry fireplace with an opening 6 sq ft or larger is:", "choices": ["16 inches", "24 inches", "20 inches", "12 inches"], "correct": 2, "exp": "Hearth extension: 20 inches in front, 12 inches beyond each side for openings 6+ sq ft. Smaller (under 6 sq ft): 16 inches front, 8 inches sides. Protects against radiant heat and ember fall-out.", "v": 5}, {"id": 5206, "domain": 1, "task": 12, "topic": "Smaller Hearth", "q": "For a fireplace opening less than 6 sq ft, the hearth must extend:", "choices": ["20 inches in front", "24 inches in front", "12 inches in front", "16 inches in front, 8 inches each side"], "correct": 3, "exp": "Smaller fireplace (under 6 sq ft opening): 16 inches front, 8 inches each side. Larger: 20 inches front, 12 inches each side. Hearth must be non-combustible (typically masonry, tile, stone).", "v": 5}, {"id": 5207, "domain": 1, "task": 12, "topic": "Chimney Height Rule", "q": "A chimney must extend at least how high above any portion of a building within 10 feet?", "choices": ["3 feet", "4 feet", "2 feet", "1 foot"], "correct": 2, "exp": "3-2-10 rule: chimney must be (1) at least 3 feet above the roof penetration point AND (2) at least 2 feet higher than any portion of building within 10 feet horizontally.", "v": 5}, {"id": 5208, "domain": 1, "task": 12, "topic": "Chimney Above Roof", "q": "The chimney must extend at least how high above the roof at the point of penetration?", "choices": ["2 feet", "4 feet", "1 foot", "3 feet"], "correct": 3, "exp": "3-2-10 rule: 3 feet above roof penetration, 2 feet above anything within 10 feet horizontally. Insufficient height causes downdrafts and poor draft.", "v": 5}, {"id": 5209, "domain": 1, "task": 12, "topic": "Chimney Cap", "q": "A chimney cap (rain cap or crown):", "choices": ["Prevents water entry into the flue and chimney", "All of the above", "Limits creosote", "Improves draft"], "correct": 1, "exp": "Chimney cap: keeps rain/snow out of flue (water in flue causes mortar damage), keeps animals out, often includes spark arrestor screen. Without cap, water entry causes accelerated chimney deterioration.", "v": 5}, {"id": 5210, "domain": 1, "task": 12, "topic": "Creosote", "q": "Creosote in a chimney is:", "choices": ["A normal condensation", "Required for proper operation", "A protective coating", "Tar-like combustion residue that is highly flammable"], "correct": 3, "exp": "Creosote: combustion residue from incomplete burning, primarily wood burning. Three stages (1=loose flakes, 2=hard flakes, 3=hard glaze). Stage 3 is hardest to remove and most fire-prone. Annual chimney inspection/cleaning recommended.", "v": 5}, {"id": 5211, "domain": 1, "task": 12, "topic": "Vent-Free Fireplace", "q": "A vent-free gas appliance:", "choices": ["Is the most efficient option", "Always uses a chimney", "Has no special clearance requirements", "Has no flue, exhausts combustion products into the room"], "correct": 3, "exp": "Vent-free: no flue. All combustion products (water vapor, CO2, trace CO, NOx) released into the room. Banned in some jurisdictions (Canada). Concerning for indoor air quality. Strict BTU limits and oxygen depletion sensors required.", "v": 5}, {"id": 5212, "domain": 1, "task": 12, "topic": "Damper Must Be Functional", "q": "A fireplace damper that is rusted shut or non-functional is:", "choices": ["Decorative only", "A defect requiring repair", "Required for energy efficiency", "Acceptable as long as the chimney is open"], "correct": 1, "exp": "Non-functional damper is a defect: cannot close to retain heat in winter, can't fully open for proper draft. Repair or replace. Top-sealing dampers can replace a failed throat damper.", "v": 5}, {"id": 5213, "domain": 1, "task": 12, "topic": "Fireplace Hearth Material", "q": "The hearth and hearth extension must be:", "choices": ["Non-combustible (masonry, tile, stone, metal)", "Carpet only", "No specific requirement", "Wood only"], "correct": 0, "exp": "Hearth must be non-combustible and properly sized. Common defect: wood floor under raised hearth without proper extension to the front of the firebox.", "v": 5}, {"id": 5214, "domain": 1, "task": 12, "topic": "Fireplace Glass Doors", "q": "Glass fireplace doors:", "choices": ["Cannot be added to existing fireplaces", "Reduce drafts when fire is out", "Should be open during operation in masonry fireplaces (typically)", "Are required"], "correct": 1, "exp": "Glass doors: useful when fireplace is not in use (closed) - reduces room air loss up the chimney. During use of standard masonry fireplace, doors usually open or closed per manufacturer. Sealed manufactured units differ.", "v": 5}, {"id": 5215, "domain": 1, "task": 12, "topic": "Combustion Air for Fireplace", "q": "Modern fireplaces and tight homes typically require:", "choices": ["No combustion air", "Air from the bedroom", "Indoor air only", "Outside combustion air ducted to the firebox"], "correct": 3, "exp": "Tight modern homes: outside combustion air recommended (and sometimes required) for masonry fireplaces. Direct-vent and sealed-combustion units bring outside air through dedicated ductwork.", "v": 5}, {"id": 5216, "domain": 1, "task": 12, "topic": "Soot Stains", "q": "Soot stains on the exterior of a chimney indicate:", "choices": ["Possible flue gas leakage from cracks", "Good seal", "Normal operation", "Improved draft"], "correct": 0, "exp": "Soot on the exterior of a chimney can indicate flue gas leakage through cracks in the masonry or liner. Signs of poor draft. Recommend evaluation by qualified chimney sweep.", "v": 5}, {"id": 5217, "domain": 1, "task": 13, "topic": "Egress Window Area", "q": "A bedroom egress window must have a minimum net clear opening of:", "choices": ["7.0 sq ft", "3.0 sq ft", "5.0 sq ft", "5.7 sq ft"], "correct": 3, "exp": "5.7 sq ft = standard minimum for above-grade openings. 5.0 sq ft allowed for grade-floor openings only. Net clear (actual unobstructed) area, not the rough opening.", "v": 5}, {"id": 5218, "domain": 1, "task": 13, "topic": "Egress Width", "q": "Minimum net clear width for an egress window is:", "choices": ["16 inches", "24 inches", "30 inches", "20 inches"], "correct": 3, "exp": "Egress: minimum 20 inches width. Combined with 24 inch height minimum. Note these alone don't satisfy area (5.7 sq ft); a 20x24 = 3.3 sq ft, so larger dimensions on at least one axis required.", "v": 5}, {"id": 5219, "domain": 1, "task": 13, "topic": "Egress Height", "q": "Minimum net clear height for an egress window is:", "choices": ["20 inches", "30 inches", "22 inches", "24 inches"], "correct": 3, "exp": "Egress: minimum 24 inches height. Combined with 20 inch width minimum AND 5.7 sq ft total area. Sill height max 44 inches above floor.", "v": 5}, {"id": 5220, "domain": 1, "task": 13, "topic": "Egress Sill Height", "q": "Maximum sill height of an egress window above the floor is:", "choices": ["44 inches", "60 inches", "24 inches", "36 inches"], "correct": 0, "exp": "Egress sill: maximum 44 inches above the bedroom floor. Higher sills require permanent steps. This dimension is critical for child egress in fire emergencies.", "v": 5}, {"id": 5221, "domain": 1, "task": 13, "topic": "Smoke Alarm Locations", "q": "Smoke alarms in new construction are required in all of the following EXCEPT:", "choices": ["Outside each sleeping area", "On every level including basement", "Each sleeping room", "In the kitchen near the appliance"], "correct": 3, "exp": "Smoke alarms NOT in kitchens (nuisance trip risk). Required: each bedroom, hallway outside bedrooms, every level including basement and habitable attics. Modern code requires interconnection (one trips, all sound).", "v": 5}, {"id": 5222, "domain": 1, "task": 13, "topic": "Smoke Alarm Interconnect", "q": "Modern code typically requires smoke alarms to be:", "choices": ["Connected only to security systems", "Independent units", "Battery only", "Interconnected so one alarm triggers all alarms"], "correct": 3, "exp": "Modern code: hardwired AND interconnected (one trips, all sound throughout the home). Battery backup required. Existing homes typically grandfathered, but renovations may trigger requirement.", "v": 5}, {"id": 5223, "domain": 1, "task": 13, "topic": "GFCI Where", "q": "GFCI protection is required for receptacles in all of the following EXCEPT:", "choices": ["Bedroom receptacles", "Bathrooms", "Garages", "Kitchen counters"], "correct": 0, "exp": "GFCI: bathrooms, kitchen counters, garages, outdoor, crawls, unfinished basements, near sinks. Bedrooms require AFCI (different protection). Newer codes are expanding GFCI to nearly everywhere.", "v": 5}, {"id": 5224, "domain": 1, "task": 13, "topic": "Stair Lighting", "q": "Interior stairs require:", "choices": ["No lighting", "Lighting only at the bottom", "Lighting controllable from top and bottom", "Battery lighting only"], "correct": 2, "exp": "Interior stairs: lighting with switches at both top and bottom (3-way). Allows safe operation in either direction without traversing dark stairs. Defect when only one switch.", "v": 5}, {"id": 5225, "domain": 1, "task": 13, "topic": "Painted Sprinkler", "q": "A painted fire sprinkler head is:", "choices": ["A defect that prevents proper operation", "Decorative and acceptable", "Improved by paint", "Required by some codes"], "correct": 0, "exp": "Painted sprinklers: defect. Paint can prevent the fusible element from melting at the rated temperature, or block the deflector pattern. Replace, not paint.", "v": 5}, {"id": 5226, "domain": 1, "task": 13, "topic": "Smoke Alarm Power", "q": "Smoke alarms in new construction are typically required to be:", "choices": ["Solar powered", "Plug-in", "Hardwired with battery backup", "Battery only"], "correct": 2, "exp": "New construction: hardwired (so wiring tampering doesn't disable), battery backup (so power failure doesn't disable), interconnected (whole-house alarm). Older battery-only units were code at the time but should be upgraded.", "v": 5}, {"id": 5227, "domain": 1, "task": 13, "topic": "Smoke Alarm Lifespan", "q": "Smoke alarms should be replaced every:", "choices": ["2-5 years", "10 years", "1 year", "Never"], "correct": 1, "exp": "Smoke alarms: 10-year lifespan typical. Sensor degrades. Replace entire unit (not just battery). Newer alarms have 10-year sealed batteries and clear end-of-life indicators.", "v": 5}, {"id": 5228, "domain": 1, "task": 13, "topic": "CO Alarm Lifespan", "q": "Carbon monoxide alarms should be replaced every:", "choices": ["5-7 years", "10 years", "1 year", "Never"], "correct": 0, "exp": "CO alarms: typically 5-7 year lifespan. Electrochemical sensor degrades over time. Replace per manufacturer; many have end-of-life chirp/indicator.", "v": 5}, {"id": 5229, "domain": 1, "task": 13, "topic": "Hardwired Alarm Battery", "q": "A hardwired smoke alarm battery backup:", "choices": ["Should be tested and replaced regularly", "All of the above", "Is required by most codes", "Provides operation during power loss"], "correct": 1, "exp": "Hardwired alarms have battery backup for power outages. Test monthly, replace per manufacturer (often annual for traditional, 10-year sealed batteries in newer models).", "v": 5}, {"id": 5230, "domain": 1, "task": 13, "topic": "Furnace Room Safety", "q": "A furnace closet or mechanical room with fuel-burning equipment must:", "choices": ["Have adequate combustion air provisions", "Be carpeted", "Be heated", "Be sealed completely"], "correct": 0, "exp": "Mechanical rooms with fuel-burning equipment: adequate combustion air (per BTU input), proper venting, clearances to combustibles, working CO alarm nearby. Sealed mechanical rooms cause backdrafting.", "v": 5}, {"id": 5231, "domain": 1, "task": 13, "topic": "Bath Heater Lamp", "q": "A bathroom heat lamp combined with light/fan:", "choices": ["Can use generic outlets", "Cannot be installed in bathrooms", "Must be properly listed and installed", "Has no special requirements"], "correct": 2, "exp": "Bathroom heat lamps: properly listed unit, GFCI protected circuit, adequate clearances to combustibles and showers, vapor-proof if in shower zone. Defects often involve aftermarket high-watt bulbs.", "v": 5}, {"id": 5232, "domain": 1, "task": 13, "topic": "Fire Extinguisher", "q": "Inspections do not typically include:", "choices": ["Recommendations for placement", "Visible defect identification of any extinguishers present", "Testing fire extinguishers for charge", "Description in the report"], "correct": 2, "exp": "Home inspectors don't certify extinguishers (requires fire safety equipment specialist). Inspectors can identify visible expiration, recommend qualified evaluation, and recommend proper placement (kitchen, garage, near exits).", "v": 5}, {"id": 5233, "domain": 1, "task": 13, "topic": "Stair Open Riser", "q": "Stair open risers (no riser board) on stairs higher than 30 inches typically:", "choices": ["Are decorative only", "Cannot allow a 4-inch sphere through", "Have no requirements", "Are always acceptable"], "correct": 1, "exp": "Open-riser stairs: cannot allow a 4-inch sphere through the open space (same rule as guards). Codes often prohibit open risers in some occupancies, or require closed risers in residential.", "v": 5}, {"id": 5234, "domain": 1, "task": 13, "topic": "Carbon Monoxide Symptoms", "q": "Carbon monoxide poisoning symptoms include:", "choices": ["Joint pain", "Respiratory infection", "Localized burns", "Headache, nausea, dizziness, confusion"], "correct": 3, "exp": "CO symptoms: headache, nausea, dizziness, confusion, fatigue. Severe: loss of consciousness, death. Easily mistaken for flu. CO alarms are essential because the gas is undetectable to humans.", "v": 5}, {"id": 5235, "domain": 2, "task": 1, "topic": "Required Tools", "q": "Which of the following is NOT typically required by SOP for an inspection?", "choices": ["Outlet tester", "Moisture meter", "Ladder for accessible areas", "Flashlight"], "correct": 1, "exp": "Specialized tools (moisture meters, thermal cameras, IR thermometers) are not required by SOP. Required basics: flashlight, ladder for accessible areas, outlet tester for receptacles. Specialized tools enhance findings but aren't mandatory.", "v": 5}, {"id": 5236, "domain": 2, "task": 1, "topic": "In-Scope Components", "q": "Which of the following is in scope of a typical home inspection?", "choices": ["Solar photovoltaic systems", "Underground oil tanks", "Detached garages and carports", "Backup generators"], "correct": 2, "exp": "Detached garages and carports are typically in scope. Solar PV, backup generators, underground oil tanks, swimming pool equipment, and water quality testing are typically out of scope.", "v": 5}, {"id": 5237, "domain": 2, "task": 1, "topic": "Pre-Inspection Walkthrough", "q": "A pre-inspection walkthrough with the client:", "choices": ["Is illegal", "Is required by all SOPs", "Replaces the inspection", "Is good practice but not always required"], "correct": 3, "exp": "Pre-inspection walkthrough/conversation is good practice (sets expectations, identifies client priorities) but not required by all SOPs. Required: a written report following the inspection.", "v": 5}, {"id": 5238, "domain": 2, "task": 1, "topic": "Inspector Disclaimer Wallpaper", "q": "If wallpaper or a wall covering obstructs view of the wall surface:", "choices": ["Inspector should remove the wallpaper", "Inspector should not report", "Inspector should disclaim ability to fully evaluate that wall", "Inspector should rate the wall as defective"], "correct": 2, "exp": "Inspectors don't move/remove items. Wallpaper covering wall - disclaim full evaluation. Same for furniture, stored items, snow on roof, etc. Report what is and isn't visible.", "v": 5}, {"id": 5239, "domain": 2, "task": 1, "topic": "Snow on Roof", "q": "If snow covers the roof at inspection:", "choices": ["Inspector should rate the roof as defective", "Inspector should clear it", "Inspector should skip roof inspection entirely without comment", "Inspector should disclaim full roof evaluation, recommend re-inspection"], "correct": 3, "exp": "Roof covered by snow: disclaim full evaluation, recommend re-inspection or qualified evaluation. Note any visible portions and any defects observed (e.g., visible flashings, rust streaks).", "v": 5}, {"id": 5240, "domain": 2, "task": 1, "topic": "Visible Components", "q": "SOPs typically require inspection of:", "choices": ["Both readily accessible and concealed", "All components", "Concealed components", "Readily accessible and visible components"], "correct": 3, "exp": "SOPs limit inspection to readily accessible and visible components. Inspector doesn't open walls, dismantle equipment, move heavy items, or perform invasive testing.", "v": 5}, {"id": 5241, "domain": 2, "task": 1, "topic": "Sewer Scope", "q": "A sewer scope (camera inspection of sewer lateral):", "choices": ["Is included in standard home inspection", "Is required by all states", "Cannot be performed", "Is a separate specialty inspection"], "correct": 3, "exp": "Sewer scope: separate specialty inspection. Inspectors may offer it as a separate service or recommend a qualified contractor. Highly recommended in older homes (clay/cast iron laterals).", "v": 5}, {"id": 5242, "domain": 2, "task": 1, "topic": "Reporting Defects", "q": "When reporting a defect, the inspector should include:", "choices": ["Location", "Description of the defect", "Recommendation for action", "All of the above"], "correct": 3, "exp": "Quality defect description: what (specific issue), where (location), why it matters (implication), and recommendation (action + qualified party). Vague descriptions create liability and poor service.", "v": 5}, {"id": 5243, "domain": 2, "task": 1, "topic": "Cosmetic vs Defect", "q": "A small cosmetic crack in drywall:", "choices": ["Is always a serious structural concern", "May be observed and noted but not necessarily a defect", "Is out of scope", "Should always be reported as a defect"], "correct": 1, "exp": "Small cosmetic items: noted but not necessarily reported as defects. Large or pattern of cracks, signs of structural movement, water damage - those rise to defect level. Judgment call.", "v": 5}, {"id": 5244, "domain": 2, "task": 1, "topic": "Limitations", "q": "An inspection has inherent limitations including:", "choices": ["Point-in-time observation", "Not a code compliance inspection", "Visible/accessible only", "All of the above"], "correct": 3, "exp": "Inherent limitations: visible/accessible only, point-in-time (conditions change), not code compliance, not predictive of future failures, doesn't include hidden defects. Disclose in pre-inspection agreement.", "v": 5}, {"id": 5245, "domain": 2, "task": 1, "topic": "Buyer's Inspection vs Pre-Listing", "q": "A buyer's inspection differs from a pre-listing (seller's) inspection by:", "choices": ["Same scope, different client paying", "Different SOP applies", "Buyer inspection is more thorough", "Pre-listing is illegal"], "correct": 0, "exp": "Same scope, same SOP - different client. Pre-listing inspections allow sellers to address issues before market or disclose proactively. Buyer inspections are after offer/contract. Same standards apply.", "v": 5}, {"id": 5246, "domain": 2, "task": 1, "topic": "Tools Standard", "q": "SOP-required basic tools typically include all EXCEPT:", "choices": ["Borescope camera", "Flashlight", "Ladder for accessible areas", "Outlet tester"], "correct": 0, "exp": "Borescope (camera): specialized tool, not standard SOP requirement. Required basics: flashlight, ladder, outlet tester, simple measuring tools. Specialized tools (cameras, moisture, thermal) enhance but aren't required.", "v": 5}, {"id": 5247, "domain": 2, "task": 1, "topic": "Sample Receptacles", "q": "An inspector typically tests:", "choices": ["Only outdoor", "A representative sample of receptacles", "All receptacles", "Only kitchen and bathroom"], "correct": 1, "exp": "Representative sample: test enough to evaluate the system, especially in critical areas (GFCI/AFCI test, kitchens, bathrooms, outdoor, near sinks). Furniture and stored items prevent testing all.", "v": 5}, {"id": 5248, "domain": 2, "task": 1, "topic": "Disclaimer Common", "q": "Common areas requiring disclaimer in many inspections include:", "choices": ["Stored items blocking access", "Inaccessible attic or crawl", "Wallpaper-covered surfaces", "All of the above"], "correct": 3, "exp": "Common disclaimers: inaccessible attic (no access, low clearance), inaccessible crawl, blocked walls (wallpaper, paneling, furniture, stored items), snow-covered roof, ice-covered exterior. Disclaim what isn't visible.", "v": 5}, {"id": 5249, "domain": 2, "task": 1, "topic": "Signature", "q": "A home inspection report typically includes:", "choices": ["Limitations and exclusions", "Inspector's signature/name and license number", "Effective date", "All of the above"], "correct": 3, "exp": "Reports include: inspector identification, date, address, scope/limitations, findings (often with photos), recommendations, license info per state requirements. Many states have specific report content requirements.", "v": 5}, {"id": 5250, "domain": 2, "task": 2, "topic": "Wallpaper Limitation", "q": "If wallpaper covers a wall:", "choices": ["Remove wallpaper", "Inspector should disclaim limitations", "Inspector must evaluate full wall condition", "Skip the wall entirely"], "correct": 1, "exp": "Inspectors don't disturb finishes. Disclaim limitations and note that defects under wallpaper can't be evaluated. Same for paneling, paint, mirrors, fixed cabinetry.", "v": 5}, {"id": 5251, "domain": 2, "task": 2, "topic": "Snow on Roof Limit", "q": "Snow-covered roof:", "choices": ["Cannot be properly inspected", "Should be evaluated post-snow if possible", "Inspector must clear snow", "Roof rated as defective when snowy"], "correct": 1, "exp": "Snow limits roof inspection. Disclaim, document conditions, recommend re-inspection or qualified evaluation when conditions improve. Note any visible defects (e.g., chimney issues, ice dam evidence).", "v": 5}, {"id": 5252, "domain": 2, "task": 2, "topic": "Furniture and Storage", "q": "Furniture and stored items in homes:", "choices": ["Must be moved", "Are out of scope", "Limit inspection of walls, floors, and built-ins", "Have no effect on inspection"], "correct": 2, "exp": "Furniture/storage limits inspection of surfaces and built-ins behind/below them. Inspector doesn't move items. Disclaim limitations. Standard pre-inspection prep should request items moved if possible.", "v": 5}, {"id": 5253, "domain": 2, "task": 2, "topic": "Operate Versus Test", "q": "Inspectors generally operate (rather than test) equipment by:", "choices": ["Disassembling components", "Pressure-testing", "Running it through normal controls", "Performing manufacturer diagnostics"], "correct": 2, "exp": "Operate via normal controls: turn AC on at thermostat, run water at fixtures, operate burners on a stove, raise/lower garage door. Don't disassemble, pressure-test, or perform diagnostic procedures.", "v": 5}, {"id": 5254, "domain": 2, "task": 2, "topic": "Crawl Access", "q": "Inspection of a crawl space requires:", "choices": ["Inspector to enter regardless of conditions", "Reasonable access (clearance, dry conditions, sufficient size)", "Powered ventilation", "Always disclaim"], "correct": 1, "exp": "Crawl access: enter when conditions allow (typical 18+ inches clearance, no standing water, no hazards). Disclaim if not safe to enter. Inspect from access opening if can't enter. Document why if not entered.", "v": 5}, {"id": 5255, "domain": 2, "task": 2, "topic": "Underground Tank", "q": "An underground oil tank:", "choices": ["Must be excavated", "Is typically out of scope and disclaimed", "Is in scope", "Is unrelated to home inspection"], "correct": 1, "exp": "Underground oil tanks: typically out of scope. Inspector may report visible signs (above-grade fill/vent pipes, evidence of an old tank), recommend specialty evaluation. Significant environmental liability if leaking.", "v": 5}, {"id": 5256, "domain": 2, "task": 2, "topic": "Septic System", "q": "Septic systems:", "choices": ["Cannot be evaluated", "In standard home inspection scope", "Inspected via a flush test only", "Typically out of scope, requiring specialty inspection"], "correct": 3, "exp": "Septic: typically out of scope. Inspector may note visible components (lid, riser, signs of failure). Recommend specialty septic inspection (typically required at sale in many jurisdictions).", "v": 5}, {"id": 5257, "domain": 2, "task": 2, "topic": "Specialized Equipment", "q": "Specialized equipment beyond SOP includes:", "choices": ["All of the above", "Moisture meters", "Thermal imaging cameras", "Borescope cameras"], "correct": 0, "exp": "Specialized: thermal cameras, moisture meters, borescopes, gas leak detectors, formaldehyde testers, asbestos kits. Useful add-ons but not required by SOP. Some inspectors include in standard service.", "v": 5}, {"id": 5258, "domain": 2, "task": 2, "topic": "Asbestos", "q": "Asbestos identification:", "choices": ["Standard SOP", "Done by visual inspection alone", "Requires qualified professional and lab analysis", "Not relevant to home inspection"], "correct": 2, "exp": "Asbestos: visible identification (suspected materials in old buildings - 9x9 floor tiles, pipe wrap, popcorn ceilings, certain shingles). Confirmation requires lab analysis by qualified professional. Inspector notes suspected materials only.", "v": 5}, {"id": 5259, "domain": 2, "task": 2, "topic": "Lead Paint", "q": "Lead paint identification:", "choices": ["Visual identification only", "Cannot be evaluated", "Requires specialty testing (XRF, paint chip)", "Always present in homes pre-1978"], "correct": 2, "exp": "Lead paint: federal regulations require disclosure for homes pre-1978. Visual indicators possible (chipping/peeling old paint). Confirmation: XRF test or paint chip lab analysis. Specialty service.", "v": 5}, {"id": 5260, "domain": 2, "task": 2, "topic": "Radon", "q": "Radon testing during home inspection:", "choices": ["Standard SOP", "Done with a single quick reading", "Always required by federal law", "Optional specialty service requiring multi-day testing"], "correct": 3, "exp": "Radon: 48-hour minimum continuous test (or charcoal canister + lab). Specialty service. EPA recommends for all home purchases. Wisconsin has elevated radon; common buyer add-on.", "v": 5}, {"id": 5261, "domain": 2, "task": 2, "topic": "Pest Inspection", "q": "Termite/pest inspection (WDO/WDI):", "choices": ["Standard SOP", "Same as home inspection", "Specialty service often required by lender", "Cannot be performed"], "correct": 2, "exp": "WDO/WDI (Wood-Destroying Organism/Insect) inspection: separate specialty often required by lenders, especially in heavy termite areas. Inspector may identify visible signs but not perform formal WDO inspection without certification.", "v": 5}, {"id": 5262, "domain": 2, "task": 2, "topic": "Pool/Spa Inspection", "q": "Pool/spa equipment inspection:", "choices": ["Can be done with the home inspection in cold weather", "Required by all SOPs", "Often out of scope; specialty inspector recommended", "Always in scope"], "correct": 2, "exp": "Pool/spa: typically out of scope or limited (visible components only). Specialty pool inspector recommended. Significant cost to repair major issues; client should know condition before purchase.", "v": 5}, {"id": 5263, "domain": 2, "task": 3, "topic": "Defect SOP Required", "q": "SOP-required elements when describing a defect include:", "choices": ["Both", "Description of the defect", "Implication or recommendation", "Neither"], "correct": 0, "exp": "SOP defect description: typically requires description AND implication/recommendation. Cost estimates not required (often discouraged). Some SOPs require photos for major defects.", "v": 5}, {"id": 5264, "domain": 2, "task": 3, "topic": "Subjective Language", "q": "Which language should be avoided in inspection reports?", "choices": ["'Bad,' 'old,' 'crappy,' 'amateur'", "Specific measurements", "Recommendation", "Defect"], "correct": 0, "exp": "Avoid subjective/judgmental language: bad, terrible, amateur, sloppy, hack job. Use objective language: 'damaged,' 'leaking,' 'inadequate (specific reason),' 'requires correction.' Keep professional.", "v": 5}, {"id": 5265, "domain": 2, "task": 3, "topic": "Photo Documentation", "q": "Photo documentation in reports:", "choices": ["Required by all SOPs", "Required only for life safety", "Best practice and increasingly expected by clients", "Optional and rarely useful"], "correct": 2, "exp": "Photos: best practice (clarifies findings, documents conditions, reduces liability). Most modern reports include photos for defects. Some SOPs require for major defects.", "v": 5}, {"id": 5266, "domain": 2, "task": 3, "topic": "Cost Estimates", "q": "Repair cost estimates in inspection reports:", "choices": ["Provided by request", "Required by SOP", "Always required", "Generally discouraged or prohibited"], "correct": 3, "exp": "Cost estimates: most SOPs prohibit or strongly discourage. Inspector is not a contractor and lacks specific information for accurate estimates. Refer to qualified contractors for estimates.", "v": 5}, {"id": 5267, "domain": 2, "task": 3, "topic": "Naming Contractors", "q": "Naming specific contractors in a report:", "choices": ["Builds business relationships", "Creates a conflict of interest", "Required by SOP", "Reduces liability"], "correct": 1, "exp": "Naming contractors: conflict of interest concern. Refer to 'qualified electrician,' 'licensed plumber,' etc., not specific names. Some inspectors maintain referral lists separately, with disclosure.", "v": 5}, {"id": 5268, "domain": 2, "task": 3, "topic": "Verbiage Standardization", "q": "Many inspectors use templated narratives because:", "choices": ["Provides comprehensive coverage of common findings", "All of the above", "Allows verbiage review for clarity and liability", "Saves time and ensures consistency"], "correct": 1, "exp": "Templated narratives (libraries like Kenton Shepard's InterNACHI library): save time, consistency, legal review, comprehensive coverage. Customize specifics for each finding.", "v": 5}, {"id": 5269, "domain": 2, "task": 3, "topic": "Implication of Defect", "q": "Including the implication of a defect:", "choices": ["Reduces likelihood of misunderstanding", "All of the above", "Required by some SOPs", "Helps client understand significance"], "correct": 1, "exp": "Implication: 'this could cause water damage,' 'reduces system efficiency,' 'creates fire hazard.' Helps client understand and prioritize. Some SOPs require, others encourage.", "v": 5}, {"id": 5270, "domain": 2, "task": 3, "topic": "Photographic Best Practice", "q": "Defect photos should include:", "choices": ["A reference (overview) shot showing location", "All of the above", "Adequate lighting", "A close-up of the defect itself"], "correct": 1, "exp": "Photo best practice: contextual (where in the house) + close-up (the defect itself) + adequate lighting + descriptive caption. Multiple photos for complex defects. Phones with HDR work well.", "v": 5}, {"id": 5271, "domain": 2, "task": 3, "topic": "Boilerplate Limit", "q": "Boilerplate (templated) language should:", "choices": ["Be avoided", "Replace inspection observations", "Stand alone without context", "Be customized to specific finding"], "correct": 3, "exp": "Boilerplate as starting point - customize with specific location, severity, observed conditions. Pure boilerplate without specifics suggests no actual inspection. Use as scaffolding for narrative.", "v": 5}, {"id": 5272, "domain": 2, "task": 3, "topic": "Quantity in Report", "q": "A report listing dozens of minor maintenance items but missing a major defect:", "choices": ["Demonstrates poor inspection priority", "Is acceptable as long as the defects are minor", "Increases credibility", "Provides good value"], "correct": 0, "exp": "Report quality: thoroughness and balance. A wall of trivial items can drown major findings. Major defects should be highlighted; minor items grouped or summarized. Demonstrate priority.", "v": 5}, {"id": 5273, "domain": 2, "task": 3, "topic": "Findings Sectioned", "q": "Inspection reports are often sectioned by:", "choices": ["Random", "Severity", "System (electrical, plumbing, etc.)", "Both system and severity"], "correct": 3, "exp": "Modern reports: typically by system AND severity. Major findings called out at top (executive summary), then organized by system for complete review. Easier for clients and agents to navigate.", "v": 5}, {"id": 5274, "domain": 2, "task": 3, "topic": "Repair vs Replace", "q": "When recommending repair vs replace:", "choices": ["Match recommendation to severity", "Always recommend replace", "Always recommend repair", "Recommendation by inspector inappropriate"], "correct": 0, "exp": "Match recommendation to severity: minor leaks - repair, end-of-life equipment - replace, structural defects - engineering evaluation. Don't over- or under-recommend. Let qualified contractors estimate cost differences.", "v": 5}, {"id": 5275, "domain": 2, "task": 3, "topic": "Visible Defects Only", "q": "Inspector reports defects that are:", "choices": ["Concealed or hidden", "Predicted from system age", "Visible/accessible at time of inspection", "Inferred from theoretical concerns"], "correct": 2, "exp": "Inspectors report observed conditions - visible/accessible defects at time of inspection. Don't infer or predict beyond reasonable observation. Don't tear into walls.", "v": 5}, {"id": 5276, "domain": 2, "task": 3, "topic": "Severity Indicator", "q": "Indicating severity in reports often uses:", "choices": ["All of the above", "Color codes", "Defined categories (major, minor, informational)", "Icons"], "correct": 0, "exp": "Severity indicators: color-coded sections, icons, or text categories. Standardize within report format. Allows skim-readability for major issues.", "v": 5}, {"id": 5277, "domain": 2, "task": 4, "topic": "Fireplace Inspection", "q": "When inspecting a fireplace, the inspector should:", "choices": ["Always recommend rebuilding", "Inspect visible portions and recommend Level 2 chimney inspection if defects suspected", "Light a fire to test draft", "Open and close the damper, verify smoke chamber, recommend cleaning"], "correct": 1, "exp": "Home inspection: visible portions only. Recommend Level 2 by CSIA-certified chimney sweep at every property transfer (per NFPA 211) and when defects suspected. Don't light fires.", "v": 5}, {"id": 5278, "domain": 2, "task": 4, "topic": "Active Leak Recommendation", "q": "An active plumbing leak should be recommended for:", "choices": ["DIY repair", "Annual inspection", "Disregard", "Prompt repair by qualified plumber"], "correct": 3, "exp": "Active leaks: prompt repair by qualified plumber. Document scope of damage. Note potential hidden damage (water can travel; visible may be tip of iceberg).", "v": 5}, {"id": 5279, "domain": 2, "task": 4, "topic": "Cracked Heat Exchanger", "q": "A suspected cracked furnace heat exchanger:", "choices": ["Replace", "Should be confirmed by inspector with mirror", "Cosmetic concern", "Recommend evaluation by qualified HVAC technician"], "correct": 3, "exp": "Cracked heat exchanger: serious safety concern (CO into living space). Recommend evaluation by qualified HVAC tech (camera/dye/specialty testing required to confirm). Inspector observation alone insufficient for definitive call.", "v": 5}, {"id": 5280, "domain": 2, "task": 4, "topic": "Bowed Foundation", "q": "A foundation wall with significant bowing:", "choices": ["Standard repair", "Ignore", "Requires structural engineer evaluation", "Cosmetic concern"], "correct": 2, "exp": "Bowed foundation: structural concern. Recommend evaluation by structural engineer. Possible interventions: carbon fiber straps, helical tiebacks, beam/post bracing, exterior excavation/regrading. Engineer specifies appropriate intervention.", "v": 5}, {"id": 5281, "domain": 2, "task": 4, "topic": "Active Pest Activity", "q": "Active pest activity (termites, carpenter ants):", "choices": ["Recommend evaluation by qualified pest professional", "Ignore minor", "Treat with home spray", "Replace damaged components without addressing pest"], "correct": 0, "exp": "Pest activity: recommend evaluation/treatment by qualified pest control professional. They identify species, treatment, monitoring. Damaged structural members require structural evaluation in addition.", "v": 5}, {"id": 5282, "domain": 2, "task": 4, "topic": "Suspected Settlement", "q": "Suspected foundation settlement:", "choices": ["Inspector confirms via measurement", "Ignore", "Cosmetic", "Recommend evaluation by structural engineer"], "correct": 3, "exp": "Significant settlement: structural engineer evaluation. Engineer determines cause (soils, water, original construction), severity (active vs old/stable), and intervention (piers, underpinning, drainage).", "v": 5}, {"id": 5283, "domain": 2, "task": 4, "topic": "Structural Crack", "q": "A horizontal crack in basement wall with displacement:", "choices": ["Cosmetic concern", "Inspector measures and reports", "Apply caulk", "Recommend prompt evaluation by structural engineer"], "correct": 3, "exp": "Horizontal crack with displacement (or significant horizontal cracks even without obvious displacement): structural engineer evaluation. Lateral earth pressure exceeded wall capacity - safety concern, intervention often required.", "v": 5}, {"id": 5284, "domain": 2, "task": 4, "topic": "Serious Safety Concerns", "q": "Serious safety concerns warrant:", "choices": ["All of the above", "Verbal communication to client during/after inspection", "Bold/highlighted in report", "Recommendation for prompt correction"], "correct": 0, "exp": "Serious safety: emphasize in report (bold, executive summary), verbally communicate to client, recommend prompt correction. Don't bury life-safety in long lists. Examples: gas leaks, structural failure, life safety.", "v": 5}, {"id": 5285, "domain": 3, "task": 1, "topic": "Agreement Required", "q": "A pre-inspection agreement is:", "choices": ["Required only for first-time clients", "Optional", "Required by most state regulations and SOPs", "Required only for new construction"], "correct": 2, "exp": "Pre-inspection agreement: required by most state regulations, all SOPs, and is essential business practice. Defines scope, limitations, fees, dispute resolution, limit of liability.", "v": 5}, {"id": 5286, "domain": 3, "task": 1, "topic": "Agreement Includes", "q": "A pre-inspection agreement should include all EXCEPT:", "choices": ["Limit of liability", "Limitations and exclusions", "Guarantee of property condition", "Scope of inspection"], "correct": 2, "exp": "Inspection is NOT a guarantee or warranty. Pre-inspection agreement: scope, limitations, exclusions, limits, dispute resolution, fees. Guaranteeing condition transforms inspection into warranty - massive liability.", "v": 5}, {"id": 5287, "domain": 3, "task": 1, "topic": "Scope Defined", "q": "The scope section of a pre-inspection agreement defines:", "choices": ["Limitations on scope", "All of the above", "What systems will be inspected", "Standards of practice followed"], "correct": 1, "exp": "Scope section: components inspected, components excluded, SOP referenced, special inclusions/exclusions for this inspection. Avoids 'I expected you to inspect that' disputes.", "v": 5}, {"id": 5288, "domain": 3, "task": 1, "topic": "Photo Permissions", "q": "Pre-inspection agreement may include:", "choices": ["All of the above", "Permission to photograph", "Consent for use in reports", "Disclosure that report contains photos"], "correct": 0, "exp": "Photo permissions: explicit consent for inspection photography, indicates report will include photos, may address future use. Important in occupied homes with personal items.", "v": 5}, {"id": 5289, "domain": 3, "task": 1, "topic": "Dispute Resolution", "q": "Pre-inspection agreement dispute resolution typically specifies:", "choices": ["All of the above", "Specific jurisdiction", "Notice and opportunity-to-cure provisions", "Arbitration vs litigation"], "correct": 0, "exp": "Dispute resolution: pre-specified arbitration (often binding, faster, cheaper), specific jurisdiction (where disputes resolved), notice/opportunity-to-cure (inspector chance to verify before claim). Reduces costly litigation.", "v": 5}, {"id": 5290, "domain": 3, "task": 1, "topic": "Conflicts Generally", "q": "An inspector should avoid conflicts including:", "choices": ["All of the above", "Performing repairs on inspected properties for 12-24+ months", "Accepting referral fees from contractors recommended", "Inspecting properties they have financial interest in"], "correct": 0, "exp": "Conflicts to avoid: post-inspection repair work (Wisconsin: 24 months prohibited), referral fees from recommended contractors, financial interest, inspecting family members' properties, etc.", "v": 5}, {"id": 5291, "domain": 3, "task": 1, "topic": "Repair Restriction", "q": "Wisconsin restricts inspectors from performing repairs on inspected properties for:", "choices": ["36 months", "No restriction", "12 months", "24 months (2 years)"], "correct": 3, "exp": "Wisconsin (and several other states) prohibits home inspector from performing repairs on inspected property for 24 months (2 years). Prevents conflict of interest where inspector finds defects to drive repair business.", "v": 5}, {"id": 5292, "domain": 3, "task": 1, "topic": "Privacy Concerns", "q": "Inspector privacy obligations include:", "choices": ["All of the above", "Respecting occupant property", "Avoiding capture of personal information in photos", "Not disclosing inspection findings to unauthorized parties"], "correct": 0, "exp": "Privacy obligations: minimize photographing personal items, don't disclose findings without client permission, respect occupant property and routine. Some inspectors disclose photo policy at start of inspection.", "v": 5}, {"id": 5293, "domain": 3, "task": 1, "topic": "Inspector Bias", "q": "An inspector with a personal/business relationship to the seller should:", "choices": ["Proceed if pricing is fair", "Charge a discount", "Disclose to client and potentially decline", "Not disclose to maintain neutrality"], "correct": 2, "exp": "Conflicts of interest: disclose to client. Significant relationship (family, business partner) - decline. Lesser ones - disclose and let client decide. Transparency over compensation.", "v": 5}, {"id": 5294, "domain": 3, "task": 1, "topic": "Pre-Inspection Walkthrough Discussion", "q": "Pre-inspection conversation with client should:", "choices": ["Review pre-inspection agreement", "Set expectations about scope, limitations, time", "All of the above", "Identify client's concerns or special interests"], "correct": 2, "exp": "Pre-inspection: scope expectations, limitations, time estimate, client concerns, agreement review/signature. Sets professional foundation. Many inspectors spend 10-15 minutes here.", "v": 5}, {"id": 5295, "domain": 3, "task": 1, "topic": "Multiple Buyers", "q": "If multiple parties are purchasing together (e.g., investment partners):", "choices": ["Inspector chooses", "Only one needs to sign", "All should sign agreement and receive report", "Doesn't matter"], "correct": 2, "exp": "Multiple buyers: ideally all sign agreement (or one signs as representative with authority for all). Standardize for clarity. Different from inspecting for one buyer who later wants to share report with others.", "v": 5}, {"id": 5296, "domain": 3, "task": 1, "topic": "Real Estate Agent Present", "q": "If a buyer's agent is present at inspection:", "choices": ["All of the above", "Agent is welcome but not the client", "Agent observes; client is the principal", "Inspector should verbally communicate primarily with client"], "correct": 0, "exp": "Buyer's agent present: useful (knows property history, can field questions about contract). Client is principal - inspector communicates primarily with client. Agent observes/supports.", "v": 5}, {"id": 5297, "domain": 3, "task": 1, "topic": "Listing Agent Present", "q": "If a listing (seller's) agent is present at inspection:", "choices": ["Inspector continues professionally; should not share findings until report to client", "May provide useful access info", "Should be politely managed if disruptive", "All of the above"], "correct": 3, "exp": "Listing agent present: their job (provide access, lock up after). Inspector remains neutral. Don't share findings on-site - report goes to client first. Be professional.", "v": 5}, {"id": 5298, "domain": 3, "task": 1, "topic": "Seller Present", "q": "If the seller is present at inspection:", "choices": ["Tactful professional behavior; client information remains confidential", "All of the above appropriate as situation warrants", "Use of property in their presence per their permission", "Inspector should request seller absent for objectivity"], "correct": 1, "exp": "Seller present: not ideal but happens. Inspector remains tactful, neutral, professional. Don't badmouth property. Don't share findings. Request privacy if findings concerning. Some agents prefer seller absent.", "v": 5}, {"id": 5299, "domain": 3, "task": 1, "topic": "Code of Ethics", "q": "Most state laws and certifying bodies require inspectors follow:", "choices": ["Code of ethics", "Pricing schedule", "Specific reporting software", "Specific brand of equipment"], "correct": 0, "exp": "Codes of ethics: state laws and certifying bodies (InterNACHI, ASHI, etc.). Cover: conflicts of interest, professional competence, confidentiality, marketing/advertising claims, professional behavior.", "v": 5}, {"id": 5300, "domain": 3, "task": 1, "topic": "Honest Marketing", "q": "Inspector marketing should:", "choices": ["All of the above", "Maintain professional dignity", "Make truthful claims about credentials and experience", "Avoid disparaging others"], "correct": 0, "exp": "Marketing ethics: no misrepresenting credentials/experience, no disparaging competitors, no false guarantees, no high-pressure tactics. Most state regulations and ethics codes address marketing.", "v": 5}, {"id": 5301, "domain": 3, "task": 2, "topic": "Avoid EXCEPT", "q": "Inspectors should avoid all of the following EXCEPT:", "choices": ["Recommending qualified specialists for further evaluation", "Performing repairs within 24 months", "Accepting referral fees", "Inspecting property they have financial interest in"], "correct": 0, "exp": "Recommending qualified specialists is REQUIRED, not avoided. Other options are conflicts of interest. Wisconsin specifically prohibits inspector repair work for 2 years.", "v": 5}, {"id": 5302, "domain": 3, "task": 2, "topic": "Inspector and Seller", "q": "If an inspector has prior business relationship with the sel
