<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a2540">
<title>NHIE Drill v5 - Cream City Pro</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f7f7f5;
    --bg-tertiary: #efefe9;
    --text-primary: #1a1a1a;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.25);
    --success: #3b6d11;
    --success-bg: #eaf3de;
    --danger: #a32d2d;
    --danger-bg: #fcebeb;
    --warning: #854f0b;
    --info: #185fa5;
    --info-bg: #e6f1fb;
    --accent: #0a2540;
    --gold: #c9a449;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #232323;
      --bg-tertiary: #2c2c2a;
      --text-primary: #f5f5f0;
      --text-secondary: #b4b2a9;
      --text-tertiary: #888780;
      --border: rgba(255,255,255,0.15);
      --border-strong: rgba(255,255,255,0.3);
      --success: #97c459;
      --success-bg: rgba(151,196,89,0.15);
      --danger: #f09595;
      --danger-bg: rgba(240,149,149,0.15);
      --warning: #fac775;
      --info: #85b7eb;
      --info-bg: rgba(133,183,235,0.15);
      --accent: #4a8eda;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    margin: 0;
    padding: 0;
    -webkit-font-smoothing: antialiased;
  }
  .app-shell {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px 80px;
    min-height: 100vh;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .brand {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.01em;
  }
  .brand .accent { color: var(--gold); }
  .version { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; }
  h2 { font-size: 18px; font-weight: 500; margin: 0 0 0.5rem; }
  .sub { font-size: 13px; color: var(--text-secondary); margin: 0 0 1.5rem; }
  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 1rem;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 4px;
  }
  .filter-btn {
    flex: 1;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 12px;
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }
  .filter-btn.active {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-weight: 500;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .mode-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .mode-card {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 1rem;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color 0.15s, transform 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .mode-card:hover { border-color: var(--border-strong); }
  .mode-card:active { transform: scale(0.98); }
  .mode-card .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .mode-card .num { font-size: 28px; font-weight: 500; line-height: 1; }
  .mode-card.reset { background: transparent; border: 1px solid var(--border); }
  .mode-card.reset .num { font-size: 14px; margin-top: 8px; font-weight: 400; }
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 1rem;
  }
  .stat {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 0.75rem;
  }
  .stat .lbl { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
  .stat .val { font-size: 20px; font-weight: 500; }
  .gap-list {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
  }
  .gap-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
  }
  .gap-row:last-child { border-bottom: none; }
  .gap-pct { font-weight: 500; font-variant-numeric: tabular-nums; }
  .gap-pct.weak { color: var(--danger); }
  .gap-pct.ok { color: var(--warning); }
  .gap-pct.strong { color: var(--success); }
  .question-card {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .qmeta {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 0.75rem;
    display: flex;
    justify-content: space-between;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .qtext {
    font-size: 16px;
    line-height: 1.5;
    margin-bottom: 1.25rem;
    font-weight: 500;
  }
  .choice {
    display: block;
    width: 100%;
    text-align: left;
    padding: 0.875rem 1rem;
    margin-bottom: 8px;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-size: 14px;
    line-height: 1.4;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
    font-family: inherit;
    color: var(--text-primary);
    -webkit-tap-highlight-color: transparent;
  }
  .choice:hover:not(:disabled) {
    background: var(--bg-secondary);
    border-color: var(--border-strong);
  }
  .choice:active:not(:disabled) { transform: scale(0.99); }
  .choice.correct {
    background: var(--success-bg);
    border-color: var(--success);
    color: var(--success);
    font-weight: 500;
  }
  .choice.wrong {
    background: var(--danger-bg);
    border-color: var(--danger);
    color: var(--danger);
  }
  .choice:disabled { cursor: default; }
  .explanation {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 1rem;
    margin-top: 0.75rem;
    font-size: 14px;
    line-height: 1.5;
  }
  .explanation .label {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  .controls {
    display: flex;
    gap: 8px;
    margin-top: 1rem;
  }
  button.primary, button.ghost {
    font-family: inherit;
    font-size: 14px;
    padding: 10px 20px;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  button.primary {
    background: var(--accent);
    color: white;
    border: 1px solid var(--accent);
  }
  button.primary:hover { opacity: 0.9; }
  button.primary:active { transform: scale(0.98); }
  button.ghost {
    background: transparent;
    color: var(--text-primary);
    border: 1px solid var(--border-strong);
  }
  button.ghost:hover { background: var(--bg-secondary); }
  .progress {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .progress-bar {
    height: 3px;
    background: var(--bg-secondary);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
  }
  .results { text-align: center; padding: 2rem 0; }
  .results .score { font-size: 56px; font-weight: 500; margin-bottom: 0.5rem; line-height: 1; }
  .results .score.pass { color: var(--success); }
  .results .score.fail { color: var(--danger); }
  .results .breakdown { font-size: 14px; color: var(--text-secondary); margin-bottom: 1.5rem; }
  .review-item {
    text-align: left;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 0.875rem 1rem;
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.5;
  }
  .review-item .q { font-weight: 500; margin-bottom: 6px; color: var(--text-primary); }
  .review-item .a { color: var(--text-secondary); margin-bottom: 2px; }
  .review-item .a strong { color: var(--text-primary); font-weight: 500; }
  .review-section-header {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 8px;
    text-align: left;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  @media (max-width: 480px) {
    .app-shell { padding: 16px 12px 60px; }
    .stats-bar { grid-template-columns: 1fr 1fr; }
    .stats-bar .stat:last-child { grid-column: span 2; }
  }
</style>
</head>
<body>
<div class="app-shell">
  <div class="header">
    <div class="brand">Cream City Pro <span class="accent">.</span> NHIE Drill</div>
    <div class="version">v3 . 1000q</div>
  </div>

  <div id="screen-home">
    <h2>Drill mode</h2>
    <p class="sub">1,000-question bank tagged by EBPHI task. v3 questions are gap-weighted &amp; textbook-direct.</p>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All 1,000</button>
      <button class="filter-btn" data-filter="v2">v2 only (500)</button>
      <button class="filter-btn" data-filter="v3">v3 only (500)</button>
    </div>

    <div class="stats-bar" id="stats-bar"></div>
    <div class="gap-list" id="gap-list"></div>
    <div class="mode-grid">
      <div class="mode-card" data-mode="quick10">
        <div class="label">Quick drill</div>
        <div class="num">10</div>
        <div class="label" style="margin-top:4px;">Random mix</div>
      </div>
      <div class="mode-card" data-mode="weak">
        <div class="label">Weak areas</div>
        <div class="num">25</div>
        <div class="label" style="margin-top:4px;">Lowest accuracy first</div>
      </div>
      <div class="mode-card" data-mode="mixed50">
        <div class="label">Half exam</div>
        <div class="num">50</div>
        <div class="label" style="margin-top:4px;">50 min target</div>
      </div>
      <div class="mode-card" data-mode="full100">
        <div class="label">Full sim</div>
        <div class="num">100</div>
        <div class="label" style="margin-top:4px;">2 hr target</div>
      </div>
      <div class="mode-card reset" data-mode="reset">
        <div class="label">Reset</div>
        <div class="num">Clear all stats</div>
      </div>
    </div>
  </div>

  <div id="screen-quiz" style="display:none;">
    <div class="progress" id="progress-text"></div>
    <div class="progress-bar"><div class="progress-bar-fill" id="progress-bar-fill" style="width:0%"></div></div>
    <div class="question-card" id="question-card" style="margin-top: 1rem;"></div>
  </div>

  <div id="screen-results" style="display:none;">
    <div class="results">
      <div class="score" id="score-display"></div>
      <div class="breakdown" id="score-breakdown"></div>
      <div id="review-section"></div>
      <div class="controls" style="justify-content:center;">
        <button class="ghost" id="back-home">Back to menu</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  const QUESTIONS = [{"id": 5001, "domain": 1, "task": 1, "topic": "Grade Slope", "q": "Grade should slope away from a foundation a minimum of:", "choices": ["2 inches over 4 feet", "6 inches over the first 10 feet", "12 inches over 6 feet", "1 inch over 6 feet"], "correct": 1, "exp": "Standard requirement: 6 inches of fall over the first 10 feet (5% slope). Negative grade is one of the most common defects in older Wisconsin housing stock and a primary contributor to basement water entry.", "v": 5}, {"id": 5002, "domain": 1, "task": 1, "topic": "Hardscape Slope", "q": "Hardscape surfaces such as patios and walkways should slope away from the building a minimum of:", "choices": ["1/2 inch per foot", "1 inch per foot", "1/4 inch per foot", "No slope is required"], "correct": 2, "exp": "Hardscape requires 2% minimum slope (1/4 inch per foot) away from the structure. Less slope can result in standing water and migration toward the foundation.", "v": 5}, {"id": 5003, "domain": 1, "task": 1, "topic": "Retaining Wall Definition", "q": "A wall that holds soil or fill and is less than 2 feet tall is often referred to as a:", "choices": ["Knee wall", "Landscape wall", "Cripple wall", "Retaining wall"], "correct": 1, "exp": "Landscape walls (or garden walls) are short walls used for aesthetic or light retention purposes. True retaining walls handle significant lateral loads. Knee walls are interior partial-height walls. Cripple walls support the floor above a foundation.", "v": 5}, {"id": 5004, "domain": 1, "task": 1, "topic": "Deadman", "q": "A deadman in retaining wall construction is:", "choices": ["A drainage component behind the wall", "A horizontal cap on top of the wall", "A vertical post that supports the wall from the front", "A buried anchor connected to the wall via a tieback"], "correct": 3, "exp": "A deadman is a buried component (often a railroad tie or landscape timber) that anchors a retaining wall to prevent it from rotating outward. It connects to the wall via a tieback. Common in larger gravity walls.", "v": 5}, {"id": 5005, "domain": 1, "task": 1, "topic": "Negative Grade", "q": "Negative grade refers to:", "choices": ["Grade with insufficient drainage capacity", "Grade that slopes toward the foundation", "Soil that contains negative ions", "Grade that has been compacted below the original level"], "correct": 1, "exp": "Negative grade slopes toward the foundation rather than away. It directs water at the foundation rather than away from it and is a common cause of basement moisture, efflorescence, and structural damage.", "v": 5}, {"id": 5006, "domain": 1, "task": 1, "topic": "Driveway Defects", "q": "Which of the following is a typical defect found with driveways?", "choices": ["Settlement creating trip hazards or ponding", "Use of asphalt", "Slope away from the garage", "Use of concrete"], "correct": 0, "exp": "Settlement, large cracks, improper slope (toward garage or house), and upheaval are typical driveway defects. Slope AWAY from the structure is correct, not a defect.", "v": 5}, {"id": 5007, "domain": 1, "task": 1, "topic": "Pool Barrier Height", "q": "The minimum height for a pool access barrier (fence) is generally:", "choices": ["36 inches", "48 inches", "60 inches", "42 inches"], "correct": 1, "exp": "Pool access barriers must be at least 48 inches high, measured from the side facing away from the pool. Openings in the barrier should not allow passage of a 4-inch sphere.", "v": 5}, {"id": 5008, "domain": 1, "task": 1, "topic": "Pool Barrier Gates", "q": "Gates serving pool access barriers should:", "choices": ["Open inward toward the pool", "Be propped open during pool season", "Open outward away from the pool and self-close, self-latch", "Have no latching mechanism for emergency access"], "correct": 2, "exp": "Gates must open AWAY from the pool, self-close, and self-latch. Latch release should be at least 54 inches above the ground (or on the pool side) to prevent young children from operating it.", "v": 5}, {"id": 5009, "domain": 1, "task": 1, "topic": "Earth-to-Wood Contact", "q": "Earth-to-wood contact at the base of siding or trim is a defect because:", "choices": ["It allows moisture wicking and wood-destroying organism damage", "It provides additional structural support", "It looks unsightly", "It improves drainage"], "correct": 0, "exp": "Earth-to-wood contact wicks moisture into wood components and creates ideal conditions for fungal decay and termite/carpenter ant infestation. Most building codes require minimum clearances between soil and untreated wood.", "v": 5}, {"id": 5010, "domain": 1, "task": 1, "topic": "Sidewalk Trip Hazard", "q": "A change in elevation between adjacent walkway sections that constitutes a trip hazard is generally:", "choices": ["Greater than 1 inch", "Greater than 1/4 inch", "Greater than 1/8 inch", "Greater than 1/2 inch"], "correct": 1, "exp": "Differential elevations greater than 1/4 inch are typically considered trip hazards under accessibility and life safety standards. Common causes include freeze-thaw heaving, tree root upheaval, and settlement.", "v": 5}, {"id": 5011, "domain": 1, "task": 1, "topic": "Swale", "q": "A swale is:", "choices": ["A type of vegetation", "A foundation footing", "A type of retaining wall", "A shallow drainage channel"], "correct": 3, "exp": "A swale is a shallow, vegetated drainage channel designed to direct surface water flow. Often used to route water around or away from a structure where pipes are not practical.", "v": 5}, {"id": 5012, "domain": 1, "task": 1, "topic": "Culvert", "q": "A culvert is:", "choices": ["A pipe that carries water under a driveway or roadway", "A drainage channel along the side of a road", "A type of foundation drain", "A vegetated buffer strip"], "correct": 0, "exp": "A culvert is a pipe (typically large diameter metal or concrete) that allows water to flow under a driveway or road. Often found at the end of driveways crossing a roadside swale or ditch.", "v": 5}, {"id": 5013, "domain": 1, "task": 1, "topic": "Drainage System Components", "q": "A residential storm water drainage system may include all of the following EXCEPT:", "choices": ["Swales", "Sanitary sewer connections", "Underground drains", "Gutters and downspouts"], "correct": 1, "exp": "Storm water (clean rain runoff) must NEVER be combined with sanitary sewer per modern code. Old combined systems exist in some cities (including parts of Milwaukee) but new connections require separate storm and sanitary lines.", "v": 5}, {"id": 5014, "domain": 1, "task": 1, "topic": "Downspout Discharge", "q": "Downspouts should discharge water:", "choices": ["Onto the roof of an adjacent structure", "At least 4 to 6 feet away from the foundation", "Into the sanitary sewer", "Directly against the foundation"], "correct": 1, "exp": "Downspouts should discharge at least 4 to 6 feet from the foundation, with extensions or splash blocks. Discharging at the foundation defeats the purpose of gutters and is a primary cause of basement moisture.", "v": 5}, {"id": 5015, "domain": 1, "task": 1, "topic": "Egress Window Well Size", "q": "An egress window well must allow the egress window to open fully and provide a horizontal projection of at least:", "choices": ["No minimum is required", "6 square feet, with minimum 24 inch projection", "12 square feet, with minimum 48 inch projection", "9 square feet, with minimum 36 inch projection"], "correct": 3, "exp": "Egress window wells must be at least 9 sq ft in area with minimum 36 inches projection from the wall, allowing the window to open fully. Wells deeper than 44 inches require a permanently affixed ladder or steps.", "v": 5}, {"id": 5016, "domain": 1, "task": 1, "topic": "Detached Garage SOP", "q": "The condition of a detached garage in a home inspection is generally:", "choices": ["In scope as part of the inspection", "Inspected only if requested with additional fee", "Inspected only if attached to the house", "Out of scope entirely"], "correct": 0, "exp": "Detached garages and carports are typically IN scope of a home inspection. Other auxiliary structures (sheds, barns, gazebos) are out of scope unless specifically agreed to.", "v": 5}, {"id": 5017, "domain": 1, "task": 1, "topic": "Driveway Slope Toward Garage", "q": "A driveway sloping toward an attached garage is:", "choices": ["A defect that can direct water into the garage", "A neutral observation", "Required for proper drainage", "Required for vehicle braking"], "correct": 0, "exp": "A driveway sloping TOWARD the garage directs water against the garage door and into the structure. Proper installation slopes water away from the garage and house, often using trench drains where slope cannot be reversed.", "v": 5}, {"id": 5018, "domain": 1, "task": 1, "topic": "Pool Barrier Opening", "q": "Openings in a pool access barrier must not allow the passage of a sphere larger than:", "choices": ["2 inches", "6 inches", "4 inches", "1 inch"], "correct": 2, "exp": "The 4-inch rule: openings cannot allow a 4-inch sphere to pass through. This prevents small children from squeezing through. Same standard applies to deck and stair guardrails for the same reason.", "v": 5}, {"id": 5019, "domain": 1, "task": 1, "topic": "Settlement vs Heaving", "q": "Differential movement in a concrete walkway can be caused by:", "choices": ["Tree root displacement", "Frost heaving from beneath", "Settlement from voids beneath", "All of the above"], "correct": 3, "exp": "All three are common causes of differential movement in walkways and slabs. Frost heave (especially in Wisconsin freeze-thaw climate), settlement into voids, and root pressure all create differential movement and trip hazards.", "v": 5}, {"id": 5020, "domain": 1, "task": 1, "topic": "Patio Surface Defects", "q": "Common defects in patios include all of the following EXCEPT:", "choices": ["Slippery surfaces when wet", "Uniform color and texture", "Poor drainage / ponding", "Trip hazards from differential movement"], "correct": 1, "exp": "Uniform appearance is not a defect. Trip hazards, slippery surfaces, ponding, and slope toward the structure are typical patio defects to report.", "v": 5}, {"id": 5021, "domain": 1, "task": 1, "topic": "Site Component Reporting", "q": "When inspecting site conditions, the home inspector should:", "choices": ["Report only on items the client asks about", "Inspect and report on all conditions visible on the property", "Limit reporting to only conditions affecting the house", "Avoid reporting on site conditions"], "correct": 2, "exp": "Site condition reporting focuses on items that affect or could affect the house: grading, drainage, vegetation contact, hardscape near the foundation. Conditions on the property that don't affect the house are typically out of scope.", "v": 5}, {"id": 5022, "domain": 1, "task": 1, "topic": "Vegetation In Scope", "q": "The condition of vegetation is in scope of a home inspection when:", "choices": ["It is the client's specific concern", "It has aesthetic value", "Never - vegetation is always out of scope", "It is likely to have an adverse impact on the house"], "correct": 3, "exp": "Vegetation is in scope when it could affect the house: tree limbs over the roof, shrubs against siding, root systems near foundations, vines on exterior walls. General landscaping is out of scope.", "v": 5}, {"id": 5023, "domain": 1, "task": 2, "topic": "Stucco Layers", "q": "The three layers of the traditional stucco coating process are:", "choices": ["Moisture barrier, weep screed, and drainage plane", "Weep screed, building paper, and metal lath", "Scratch, brown, and finish", "Drainage plane, capillary break, and building paper"], "correct": 2, "exp": "The COATING layers are scratch (first, scored for tooth), brown (leveling), and finish (texture and color). The other terms describe the SUBSTRATE assembly: building paper, weep screed, and metal lath.", "v": 5}, {"id": 5024, "domain": 1, "task": 2, "topic": "Wood Siding Clearance", "q": "Untreated wood siding should maintain a minimum clearance to grade of:", "choices": ["2 inches", "12 inches", "4 inches", "6 inches"], "correct": 3, "exp": "Untreated wood siding requires 6 inches minimum clearance to soil grade. Concrete and other non-wood materials require lesser clearances. Failure to maintain clearance results in rot and pest infestation.", "v": 5}, {"id": 5025, "domain": 1, "task": 2, "topic": "Untreated Wood-to-Soil", "q": "The minimum clearance to soil for untreated dimensional wood beams is:", "choices": ["18 inches", "8 inches", "12 inches", "6 inches"], "correct": 2, "exp": "Untreated dimensional wood beams require 12 inches of clearance to soil. Pressure-treated or naturally durable wood (cedar, redwood) has lesser requirements but should still maintain reasonable clearance.", "v": 5}, {"id": 5026, "domain": 1, "task": 2, "topic": "EIFS", "q": "EIFS stands for:", "choices": ["Exterior Integrated Flashing System", "Exterior Insulation and Finish System", "Exterior Industrial Foam System", "Engineered Interior Finish System"], "correct": 1, "exp": "Exterior Insulation and Finish System - a multi-layer wall system using foam insulation, base coat with mesh, and synthetic finish. First-generation EIFS (face-sealed, no drainage) caused widespread moisture damage in the 1990s and required major industry change to drainable systems.", "v": 5}, {"id": 5027, "domain": 1, "task": 2, "topic": "Window Safety Glazing", "q": "Safety glazing (tempered glass) is required in all of the following locations EXCEPT:", "choices": ["Within 24 inches of a door", "Bathroom shower enclosures", "Within 18 inches of a walking surface", "Standard living room windows above 18 inches off the floor"], "correct": 3, "exp": "Safety glazing required: within 24 inches of doors, within 18 inches of floor (large panes), in shower/tub enclosures, on stair landings. Standard living room windows that don't meet these proximity tests do not require safety glazing.", "v": 5}, {"id": 5028, "domain": 1, "task": 2, "topic": "Deck Ledger Defect", "q": "A common defect with deck ledger board attachment is:", "choices": ["Bolts spaced too far apart", "Lack of flashing", "Use of nails instead of lag bolts or carriage bolts", "All of the above"], "correct": 3, "exp": "All three are common deck ledger defects. Nails alone don't provide adequate pull-out resistance. Bolts must follow span/load tables. Lack of flashing leads to rim joist rot. Deck collapses often trace back to ledger attachment failures.", "v": 5}, {"id": 5029, "domain": 1, "task": 2, "topic": "Deck Ledger Flashing", "q": "Flashing at a deck ledger should:", "choices": ["Be adhered with caulk only", "Match the color of the siding", "Direct water away from the building", "Be omitted if the deck has good drainage"], "correct": 2, "exp": "Ledger flashing is a moisture management detail directing water away from the building's rim joist and wall sheathing. Without proper flashing, water gets behind the ledger and rots the rim joist - a common cause of catastrophic deck collapse.", "v": 5}, {"id": 5030, "domain": 1, "task": 2, "topic": "Guard Rail Trigger", "q": "A guardrail is required when the walking surface is more than ____ above grade:", "choices": ["30 inches", "36 inches", "12 inches", "18 inches"], "correct": 0, "exp": "Guardrails are required when the walking surface is more than 30 inches above the grade or floor below within 36 inches horizontally. This applies to decks, balconies, raised landings, and stairs.", "v": 5}, {"id": 5031, "domain": 1, "task": 2, "topic": "Guard Rail Height", "q": "Guardrails on decks must be at least:", "choices": ["30 inches high", "36 inches high (residential)", "60 inches high", "42 inches high"], "correct": 1, "exp": "Residential guardrails: 36 inches minimum on decks. Commercial requires 42 inches. The 4-inch sphere rule applies to baluster spacing.", "v": 5}, {"id": 5032, "domain": 1, "task": 2, "topic": "Baluster Spacing", "q": "Guardrail balusters should be spaced so that:", "choices": ["A 6-inch sphere cannot pass through", "Spacing is unrestricted", "A 2-inch sphere cannot pass through", "A 4-inch sphere cannot pass through"], "correct": 3, "exp": "The 4-inch sphere rule: baluster spacing must not allow a 4-inch sphere to pass through. This prevents small children from squeezing between or getting their head stuck.", "v": 5}, {"id": 5033, "domain": 1, "task": 2, "topic": "Stair Riser Variation", "q": "The maximum variation in riser height within a single flight of stairs is:", "choices": ["1/4 inch", "1/2 inch", "3/8 inch", "3/4 inch"], "correct": 2, "exp": "IRC limits riser height variation to 3/8 inch within a single flight. Same tolerance applies to tread depth. Inconsistent risers cause trips because the climber's stride pattern is broken.", "v": 5}, {"id": 5034, "domain": 1, "task": 2, "topic": "Garage Door Auto-Reverse", "q": "A residential garage door opener must have an auto-reverse system that activates when:", "choices": ["The door has been open for more than 1 hour", "The door encounters resistance during closing", "The remote control is pressed twice", "Voice-activated"], "correct": 1, "exp": "Auto-reverse must activate when the door encounters resistance during closing. Test by placing a 2x4 flat on the floor in the door path - the door should reverse when contacting it. Required since 1993 federal mandate.", "v": 5}, {"id": 5035, "domain": 1, "task": 2, "topic": "Garage Door Photoeyes", "q": "Garage door opener photoelectric sensors (photoeyes) should be installed at:", "choices": ["The center of the door", "The top of the door", "Flush with the ceiling", "No more than 6 inches above the floor"], "correct": 3, "exp": "Photoeyes must be no more than 6 inches above the floor so they detect children, pets, and objects in the door path. Higher mounting allows objects to pass under the beam.", "v": 5}, {"id": 5036, "domain": 1, "task": 2, "topic": "Soffit", "q": "The soffit is:", "choices": ["The top course of siding", "The horizontal underside of the roof overhang", "The vertical trim board at the rake of a roof", "The flashing at the base of a wall"], "correct": 1, "exp": "Soffit is the horizontal underside of the roof overhang (eave). Often perforated or vented to allow attic intake ventilation. The vertical board at the edge is the fascia.", "v": 5}, {"id": 5037, "domain": 1, "task": 2, "topic": "Fascia", "q": "The fascia is:", "choices": ["The drainage plane behind the siding", "The vertical trim board at the edge of the roof", "The horizontal underside of the eave", "The framing member behind the soffit"], "correct": 1, "exp": "Fascia is the vertical trim board at the edge of the roof, typically where gutters are mounted. Soffit is the horizontal underside.", "v": 5}, {"id": 5038, "domain": 1, "task": 2, "topic": "Brick Veneer", "q": "A typical residential brick wall is most often:", "choices": ["A non-structural veneer attached to a wood-framed wall behind it", "Structural masonry supporting roof loads", "Solid masonry 12 inches thick", "An EIFS-style finish system"], "correct": 0, "exp": "Most modern residential brick is veneer - non-structural cladding tied to the wood-framed structural wall behind it with metal ties. There's typically a 1-inch air gap and weep holes at the base.", "v": 5}, {"id": 5039, "domain": 1, "task": 2, "topic": "Weep Holes", "q": "Weep holes in a brick veneer wall should:", "choices": ["Be painted to match the brick", "Be open to allow moisture drainage", "Be filled with insulation", "Be sealed to prevent moisture entry"], "correct": 1, "exp": "Weep holes must remain OPEN to allow moisture that enters the brick veneer cavity to drain out. Blocked or sealed weep holes are a common defect that causes moisture buildup behind the brick.", "v": 5}, {"id": 5040, "domain": 1, "task": 2, "topic": "Lap Siding Headlap", "q": "Wood lap siding should have an exposure (the visible portion) such that the headlap (overlap with the course above) is at least:", "choices": ["1/2 inch", "2 inches", "1 inch", "No headlap is required"], "correct": 2, "exp": "Lap siding requires minimum 1 inch of headlap (overlap with the course above) to maintain weather resistance. Insufficient overlap allows wind-driven rain behind the siding.", "v": 5}, {"id": 5041, "domain": 1, "task": 2, "topic": "Cantilever", "q": "A cantilevered exterior wall projection must:", "choices": ["Be limited in length", "Have additional structural support from below", "Both A and B", "Be insulated and have no plumbing in cold climates without protection"], "correct": 2, "exp": "Cantilevers are typically limited in projection by code (e.g., 24 inches without engineering). They must be insulated to prevent cold spots, and plumbing in cantilevered walls in cold climates needs special protection or is prohibited.", "v": 5}, {"id": 5042, "domain": 1, "task": 2, "topic": "Eave Drip Edge", "q": "Drip edge at eaves serves to:", "choices": ["Prevent ice damming", "Hold the shingles in place", "Direct water into the gutter and away from the fascia", "Provide structural support for the gutter"], "correct": 2, "exp": "Drip edge directs water into the gutter and away from the fascia and underlying wood. Required by IRC at eaves and rakes since 2012. Different profiles for eaves (T-style) and rakes (L-style).", "v": 5}, {"id": 5043, "domain": 1, "task": 3, "topic": "Asphalt Shingle Slope", "q": "Asphalt shingles are generally permitted on roofs with a minimum slope of:", "choices": ["1:12", "2:12", "6:12", "4:12"], "correct": 1, "exp": "Asphalt shingles permitted at 2:12 minimum WITH double underlayment. Standard installation requires 4:12 minimum. Below 2:12 requires a low-slope roofing system (modified bitumen, EPDM).", "v": 5}, {"id": 5044, "domain": 1, "task": 3, "topic": "Standard Asphalt Slope", "q": "Standard installation of asphalt shingles (without special underlayment) requires a minimum slope of:", "choices": ["2:12", "3:12", "6:12", "4:12"], "correct": 3, "exp": "4:12 (a 4-inch rise per 12-inch run, about 18 degrees) is the standard minimum. 2:12 to 4:12 is permitted with double underlayment. Below 2:12 requires a different roofing system entirely.", "v": 5}, {"id": 5045, "domain": 1, "task": 3, "topic": "Ice Barrier WI", "q": "In Wisconsin, ice barrier underlayment must extend from the eave edge to a point at least how far inside the exterior wall line?", "choices": ["36 inches", "Not required in Wisconsin", "24 inches", "12 inches"], "correct": 2, "exp": "Ice barrier (self-adhered polymer-modified bitumen) required from eave to 24 inches inside the warm wall line in regions with mean January temperature below 25°F. Wisconsin's freeze-thaw cycles make this essential against ice dam leaks.", "v": 5}, {"id": 5046, "domain": 1, "task": 3, "topic": "Underlayment Single Layer", "q": "For asphalt shingles on a 4:12 or greater slope, the minimum underlayment is:", "choices": ["No underlayment required", "Two layers of 30# felt", "Three layers of synthetic underlayment", "One layer of 15# felt or equivalent"], "correct": 3, "exp": "Standard slopes (4:12+) require one layer of 15# felt or equivalent synthetic underlayment. Slopes 2:12 to 4:12 require two layers (or full ice barrier). Synthetic underlayments are now common and code-accepted.", "v": 5}, {"id": 5047, "domain": 1, "task": 3, "topic": "Step Flashing", "q": "Step flashing is used:", "choices": ["Where a sloped roof meets a vertical wall", "At chimneys only", "Around skylights only", "On flat roofs"], "correct": 0, "exp": "Step flashing is L-shaped flashing installed at each shingle course where a sloped roof meets a vertical wall. Each piece overlaps the next, creating a watertight transition. Common at dormer walls.", "v": 5}, {"id": 5048, "domain": 1, "task": 3, "topic": "Skylight Leakage", "q": "The most common cause of skylight leakage is:", "choices": ["Failure of the glass", "Inadequate insulation around the unit", "Excessive ventilation", "Improper or deteriorated flashing"], "correct": 3, "exp": "Skylight flashing failure is the dominant cause of leaks - either improper installation (missing pieces, wrong sequence) or deterioration over time. Curb-mounted skylights require step flashing similar to chimneys.", "v": 5}, {"id": 5049, "domain": 1, "task": 3, "topic": "Downspout Spacing", "q": "A typical residential downspout serves approximately how much roof area?", "choices": ["Unlimited", "600-800 sq ft", "100 sq ft", "2,000 sq ft"], "correct": 1, "exp": "A 2x3 inch downspout serves approximately 600 sq ft of roof area; 3x4 inch downspouts serve approximately 1,200 sq ft. Larger roofs and steeper roofs (faster runoff) require more capacity.", "v": 5}, {"id": 5050, "domain": 1, "task": 3, "topic": "Gutter Slope", "q": "Gutters should slope toward the downspouts at approximately:", "choices": ["1/4 inch per 10 feet", "6 inches per foot", "No slope is required", "1 inch per foot"], "correct": 0, "exp": "Gutters slope approximately 1/4 inch per 10 feet toward downspouts. More slope is fine but creates a more visible diagonal. Insufficient slope causes ponding, sagging, and overflow.", "v": 5}, {"id": 5051, "domain": 1, "task": 3, "topic": "Plumbing Vent Pipe Flashing", "q": "Plumbing vent pipe penetrations through asphalt shingle roofs are flashed with:", "choices": ["A masonry chimney crown", "A built-up bituminous patch", "A neoprene or rubber-collared flashing (boot)", "Tar only"], "correct": 2, "exp": "Plumbing vent flashing uses a metal base flange with a flexible neoprene or EPDM rubber collar (boot) that seals around the pipe. The collar deteriorates from UV before the metal base, often the first failure.", "v": 5}, {"id": 5052, "domain": 1, "task": 3, "topic": "Three-Tab vs Architectural", "q": "Architectural (laminated) asphalt shingles:", "choices": ["Are required by all building codes", "Have shorter typical warranties than three-tab", "Are typically thicker and longer-lasting than three-tab", "Cannot be used on slopes greater than 4:12"], "correct": 2, "exp": "Architectural shingles are thicker, heavier, and have longer warranties (typically 30-50 years vs 20-25 for three-tab). They've largely replaced three-tab in new construction.", "v": 5}, {"id": 5053, "domain": 1, "task": 3, "topic": "Shingle Lifecycle", "q": "An asphalt shingle approaching the end of its life will typically show:", "choices": ["Loss of shingle adhesion to the course below", "Granule loss exposing the asphalt mat", "Curling and cupping at edges", "All of the above"], "correct": 3, "exp": "All are end-of-life indicators: granule loss, curling/cupping, brittleness, loss of seal-tab adhesion, exposed nails, and bare spots. Multiple indicators on a roof generally suggest replacement.", "v": 5}, {"id": 5054, "domain": 1, "task": 3, "topic": "Wood Shake vs Shingle", "q": "The difference between wood shakes and wood shingles is:", "choices": ["Shakes are painted; shingles are stained", "There is no difference", "Shakes are thicker and split; shingles are thinner and sawn", "Shingles are made from cedar; shakes are not"], "correct": 2, "exp": "Shakes are split (more rustic, irregular, thicker). Shingles are sawn (more uniform, thinner). Both typically western red cedar. Both require ventilation and proper exposure.", "v": 5}, {"id": 5055, "domain": 1, "task": 3, "topic": "Metal Roof Lifespan", "q": "Compared to asphalt shingles, metal roofs typically have:", "choices": ["Significantly longer lifespans", "Similar lifespans", "Identical performance characteristics", "Shorter lifespans"], "correct": 0, "exp": "Quality metal roofs (standing seam, stamped metal shingles) can last 40-70+ years vs 20-30 for asphalt. Higher upfront cost is offset by longevity and recyclability.", "v": 5}, {"id": 5056, "domain": 1, "task": 3, "topic": "Modified Bitumen", "q": "Modified bitumen is a roofing material commonly used on:", "choices": ["Steep slope residential roofs", "Underlayment for asphalt shingles", "Low slope (flat) roofs", "Tile roof substrates"], "correct": 2, "exp": "Modified bitumen (mod-bit) is a low-slope roofing material - rolled sheets with polymer modifiers (APP or SBS) for flexibility and durability. Common on residential flat roofs and porch roofs.", "v": 5}, {"id": 5057, "domain": 1, "task": 3, "topic": "Cricket", "q": "A roof cricket is:", "choices": ["A type of flashing material", "A type of insect that damages shingles", "A drainage channel along the eave", "A small ridge built behind a chimney to divert water"], "correct": 3, "exp": "A cricket (or saddle) is a small peaked structure built behind a chimney (uphill side) to divert water around it. Required by code for chimneys wider than 30 inches measured perpendicular to slope.", "v": 5}, {"id": 5058, "domain": 1, "task": 3, "topic": "Roof Ventilation Balance", "q": "A balanced attic ventilation system has:", "choices": ["All ridge vents and no soffit vents", "All soffit vents and no ridge vents", "Equal intake (low) and exhaust (high) ventilation", "Mechanical fans only"], "correct": 2, "exp": "Balanced ventilation requires roughly equal intake (low, typically soffit) and exhaust (high, typically ridge or gable). Net free area should be approximately equal at both. Imbalanced systems can short-circuit or pressurize spaces.", "v": 5}, {"id": 5059, "domain": 1, "task": 3, "topic": "Ridge Vent Effectiveness", "q": "Ridge vents are most effective when:", "choices": ["Sealed at both ends", "Used alone with no intake vents", "Combined with gable end vents", "Paired with adequate soffit (intake) vents"], "correct": 3, "exp": "Ridge vents work via convection and wind effect - they need adequate intake (soffit) ventilation to function. A ridge vent without soffit vents can pull conditioned air from the house, defeating the purpose.", "v": 5}, {"id": 5060, "domain": 1, "task": 3, "topic": "Roof Drainage Defect", "q": "Common defects with roof drainage systems include:", "choices": ["All of the above", "Damaged or sagging gutters", "Improper slope", "Disconnected or damaged downspouts"], "correct": 0, "exp": "All are common gutter defects: improper slope (back-pitch), sagging from weight or fastener failure, separation at seams, damaged elbows, blockages, and discharge too close to foundation.", "v": 5}, {"id": 5061, "domain": 1, "task": 3, "topic": "Reroof Layers", "q": "Most building codes limit asphalt shingle roof systems to:", "choices": ["3 layers total", "Unlimited layers", "1 layer total", "2 layers total"], "correct": 3, "exp": "Most codes allow a maximum of 2 layers of asphalt shingles. Beyond that, the structural load and the ability to detect underlying problems both become unacceptable. Tear-off is required before adding a new layer above 2.", "v": 5}, {"id": 5062, "domain": 1, "task": 3, "topic": "Visible Defects on Roof", "q": "All of the following are typical roofing defects EXCEPT:", "choices": ["Lifted or missing shingles", "Uniform color across the roof", "Granule loss exposing asphalt", "Damaged flashings"], "correct": 1, "exp": "Uniform color is not a defect. Granule loss, lifted/missing/cracked shingles, exposed nails, damaged or absent flashings, and bare spots are all typical defects.", "v": 5}, {"id": 5063, "domain": 1, "task": 3, "topic": "Flashing Material Compatibility", "q": "Aluminum flashing in direct contact with copper or pressure-treated lumber will:", "choices": ["Corrode through galvanic or chemical reaction", "Have no interaction", "Last longer than usual", "Bond permanently"], "correct": 0, "exp": "Aluminum reacts galvanically with copper (and chemically with the copper-based preservatives in modern pressure-treated lumber - ACQ). Use stainless steel or compatible flashing where these contacts occur.", "v": 5}, {"id": 5064, "domain": 1, "task": 4, "topic": "Live Load", "q": "What is live load?", "choices": ["Water vapor from breathing, cooking, and bathing", "Constant downward force from occupants and their belongings", "Constant downward force from building materials and permanent equipment", "Water vapor removed from air due to temperature"], "correct": 1, "exp": "Live load = occupants, furniture, movable items (transient and variable). Dead load = building materials and permanent equipment (constant). Sensible load relates to air temperature; latent load relates to humidity.", "v": 5}, {"id": 5065, "domain": 1, "task": 4, "topic": "Snow Load Wisconsin", "q": "In southeastern Wisconsin, the design snow load (ground) is approximately:", "choices": ["60 psf", "30 psf", "20 psf", "10 psf"], "correct": 1, "exp": "Milwaukee area ground snow load is approximately 30 psf. Roof snow load is calculated from ground load with adjustments for slope, exposure, and thermal. Important consideration when adding to or modifying roofs.", "v": 5}, {"id": 5066, "domain": 1, "task": 4, "topic": "Anchor Bolt Spacing", "q": "Anchor bolts (sill plate to foundation) are typically spaced:", "choices": ["Maximum 4 feet on center", "Maximum 3 feet on center", "Maximum 12 feet on center", "Maximum 6 feet on center"], "correct": 3, "exp": "Anchor bolts: maximum 6 feet on center, within 12 inches of corners and ends, minimum 1/2 inch diameter, embedded at least 7 inches in concrete, with washer and nut. High seismic areas require closer spacing.", "v": 5}, {"id": 5067, "domain": 1, "task": 4, "topic": "Anchor Bolt Defect", "q": "Which of the following is NOT a typical requirement for anchor bolts?", "choices": ["Minimum 3 feet on center", "Within 12 inches of corners and ends", "Maximum 6 feet on center", "Minimum 1/2 inch diameter"], "correct": 0, "exp": "No 3-foot minimum spacing exists. Requirements are: max 6' on center, within 12 inches of corners/ends/breaks, minimum 1/2 inch diameter, 7 inch embedment, washer and nut.", "v": 5}, {"id": 5068, "domain": 1, "task": 4, "topic": "Pipe Trench", "q": "A pipe trench below a footing must be offset from the bottom of the footing a minimum of:", "choices": ["45 degrees", "60 degrees", "No offset is required", "6 feet"], "correct": 0, "exp": "45-degree rule: no excavation can encroach on the bearing zone, defined as a 45-degree angle from the bottom of the footing. The soil within this cone provides bearing support.", "v": 5}, {"id": 5069, "domain": 1, "task": 4, "topic": "Footing Depth", "q": "Footings must extend below the local frost line, which in southeastern Wisconsin is approximately:", "choices": ["42-48 inches", "24 inches", "6 feet", "12 inches"], "correct": 0, "exp": "Wisconsin frost depth is typically 42 to 48 inches. Footings must extend below frost line to prevent frost heave. Shallow footings on frost-susceptible soils heave seasonally and damage foundations.", "v": 5}, {"id": 5070, "domain": 1, "task": 4, "topic": "Foundation Settlement", "q": "A vertical crack in a basement wall is most commonly caused by:", "choices": ["Foundation settlement", "Lateral earth pressure", "Frost heave", "Concrete shrinkage during curing"], "correct": 3, "exp": "Vertical cracks are usually shrinkage during concrete cure. Diagonal/stair-step cracks indicate settlement. Horizontal cracks indicate lateral pressure (most serious). All cracks should be measured, monitored, and assessed.", "v": 5}, {"id": 5071, "domain": 1, "task": 4, "topic": "Horizontal Crack Cause", "q": "A horizontal crack in a basement wall is most likely caused by:", "choices": ["Improper concrete mix", "Settlement", "Concrete shrinkage", "Lateral earth pressure (hydrostatic or frost)"], "correct": 3, "exp": "Horizontal cracks indicate lateral pressure - either hydrostatic from saturated soil or frost from frost-susceptible soil at improper depth. The most serious crack pattern. Inspect for bowing/displacement.", "v": 5}, {"id": 5072, "domain": 1, "task": 4, "topic": "Stair-Step Crack", "q": "A diagonal stair-step crack in a masonry wall typically indicates:", "choices": ["Excessive moisture", "Hydrostatic pressure", "Differential settlement", "Normal cure shrinkage"], "correct": 2, "exp": "Stair-step cracks in masonry follow mortar joints and indicate differential settlement - one part of the wall settling more than another. Investigate the foundation supporting the cracking section.", "v": 5}, {"id": 5073, "domain": 1, "task": 4, "topic": "Floor Joist Notching", "q": "A floor joist may be notched in the outer third of the span by no more than:", "choices": ["1/2 of the joist depth", "1/6 of the joist depth", "Notching is never permitted", "1/4 of the joist depth"], "correct": 1, "exp": "Floor joist notching limits: outer thirds only, max 1/6 of depth. Holes: max 1/3 of depth, at least 2 inches from edges. Middle third (high stress) - no notching, holes only. Critical when plumbers and electricians cut joists.", "v": 5}, {"id": 5074, "domain": 1, "task": 4, "topic": "Joist Hole", "q": "A hole drilled in a wood floor joist must be:", "choices": ["All of the above", "Located in the middle third of the depth", "Located at least 2 inches from the top or bottom edge", "No larger than 1/3 the joist depth"], "correct": 0, "exp": "Joist holes: at least 2 inches from edges, max 1/3 of depth. Notching has different rules. Holes are less damaging than notches because they don't reduce the cross-section in tension/compression as much.", "v": 5}, {"id": 5075, "domain": 1, "task": 4, "topic": "Header Above Opening", "q": "A header above a window or door opening must be sized based on:", "choices": ["The width of the wall", "Aesthetic preference", "The cost of lumber", "The span and the load it carries"], "correct": 3, "exp": "Header sizing: based on span (opening width) and load (roof, floor, wall above). Span tables in IRC provide minimum sizes for typical loads. Improper headers cause sagging and cracking above openings.", "v": 5}, {"id": 5076, "domain": 1, "task": 4, "topic": "Sagging Floor", "q": "A noticeably sagging floor in a residence may indicate:", "choices": ["Decayed or damaged floor framing", "Settling of supporting columns or piers", "Undersized framing for current loads", "Any of the above"], "correct": 3, "exp": "All can cause floor sag: decay/damage from moisture or insects, undersized members for the load, settlement of supporting columns/piers, or removal of bearing walls. Investigate from below in basement or crawl.", "v": 5}, {"id": 5077, "domain": 1, "task": 4, "topic": "Wood Decay Threshold", "q": "Wood decay (rot) requires moisture content above approximately:", "choices": ["20%", "5%", "50%", "10%"], "correct": 0, "exp": "Decay fungi require wood moisture above approximately 20% (some species above 28%). Below this threshold, wood is too dry to support fungal growth. Moisture meters help confirm whether wood has been actively wet.", "v": 5}, {"id": 5078, "domain": 1, "task": 4, "topic": "Termite Indicators", "q": "Indicators of subterranean termite activity include:", "choices": ["Damaged wood that sounds hollow when tapped", "Mud tubes on foundation walls", "Hollowed wood with frass", "All of the above"], "correct": 3, "exp": "Subterranean termites build mud tubes for moisture and protection between soil and wood. Damaged wood is hollowed along the grain. Frass (droppings) is more typical of drywood termites and carpenter ants. WI has subterranean termites.", "v": 5}, {"id": 5079, "domain": 1, "task": 4, "topic": "Carpenter Ant vs Termite", "q": "Compared to subterranean termites, carpenter ants:", "choices": ["Excavate wood for nesting but do not eat it", "Build mud tubes", "Eat the wood for nutrition", "Are not found in Wisconsin"], "correct": 0, "exp": "Carpenter ants excavate wood for nests (typically in moist or decayed wood) but do not eat it - they push out frass that resembles fine sawdust with insect parts. Termites consume the wood. Both indicate likely moisture problem.", "v": 5}, {"id": 5080, "domain": 1, "task": 4, "topic": "LVL", "q": "LVL stands for:", "choices": ["Laminated Veneer Lumber", "Light Vibration Limit", "Layered Vinyl Lumber", "Long Vertical Load"], "correct": 0, "exp": "Laminated Veneer Lumber - thin wood veneers (about 1/8 to 1/16 inch) glued together with grain oriented in the same direction. Used as headers, beams, and rim boards. Stronger and more uniform than dimensional lumber.", "v": 5}, {"id": 5081, "domain": 1, "task": 4, "topic": "Truss Modification", "q": "Modifying a roof truss (cutting a member, removing a chord) is:", "choices": ["Acceptable as long as the truss appears stable", "Required for installing skylights", "Never acceptable without engineered replacement design", "Standard for storage installation"], "correct": 2, "exp": "Trusses are engineered systems - every member is sized and connected for the load. Cutting or removing any member without engineered repair compromises the entire truss. Common defect during attic remodels and HVAC retrofits.", "v": 5}, {"id": 5082, "domain": 1, "task": 4, "topic": "I-Joist Defects", "q": "Engineered I-joists have specific limitations including:", "choices": ["Holes only in pre-drilled or web-only knockouts (not flanges)", "Cuts to flanges are catastrophic", "All of the above", "Manufacturer-specific span tables"], "correct": 2, "exp": "I-joists: never cut/notch flanges (top or bottom). Holes only in webs, following manufacturer specs. Use manufacturer span tables. Common defect: plumber/HVAC cuts in flanges - structural failure risk.", "v": 5}, {"id": 5083, "domain": 1, "task": 4, "topic": "Foundation Type Slab", "q": "A slab-on-grade foundation:", "choices": ["Always has steel reinforcement", "Has a separate basement and crawl space", "Is a single concrete slab acting as both floor and foundation", "Cannot be used in cold climates"], "correct": 2, "exp": "Slab-on-grade is a single concrete slab serving as floor and foundation. Footings (turned-down edges) extend below frost line in cold climates. Can be used anywhere with proper design (insulation, frost protection).", "v": 5}, {"id": 5084, "domain": 1, "task": 4, "topic": "Crawl Space Vapor", "q": "A typical defect with crawl spaces is:", "choices": ["Insufficient access", "Standing water", "All of the above", "Lack of vapor retarder on the soil"], "correct": 2, "exp": "Crawl space defects: missing/inadequate vapor retarder on soil, standing water, inadequate ventilation OR (newer thinking) too much vent, inadequate access (18x24 minimum), open earth-to-wood contact, decayed framing.", "v": 5}, {"id": 5085, "domain": 1, "task": 4, "topic": "Water in Crawl Space", "q": "Standing water observed in a crawl space indicates:", "choices": ["Required by code in some areas", "No concern as long as it isn't deep", "A drainage or grading problem requiring correction", "Normal moisture migration"], "correct": 2, "exp": "Standing water in a crawl space is always a defect. Sources: poor exterior drainage/grade, plumbing leaks, condensation, high water table. Requires source identification and correction. Can lead to structural decay, pest issues, indoor air quality problems.", "v": 5}, {"id": 5086, "domain": 1, "task": 5, "topic": "Service Drop Definition", "q": "The service drop is:", "choices": ["The wire from the meter to the panel", "The conductors between the utility transformer and the house, below ground", "The conductors between the utility transformer and the house, above ground", "The grounded conductor"], "correct": 2, "exp": "Service drop = above-ground conductors between utility transformer and house (overhead). Service lateral = below-ground conductors. Both terminate at the service point.", "v": 5}, {"id": 5087, "domain": 1, "task": 5, "topic": "Service Lateral", "q": "The service lateral is:", "choices": ["Above-ground utility conductors", "A horizontal panel orientation", "An auxiliary panel", "Below-ground utility conductors to the house"], "correct": 3, "exp": "Service lateral is the underground utility feed. Service drop is overhead. Both connect at the service point with house service entrance conductors.", "v": 5}, {"id": 5088, "domain": 1, "task": 5, "topic": "Six-Disconnect Rule", "q": "A residential service disconnect should consist of:", "choices": ["Always a single main breaker", "Six or more breakers", "Any number of breakers as long as there is a meter", "Six or fewer breakers/switches/fuses"], "correct": 3, "exp": "All electricity must be capable of being shut off using six or fewer disconnects. Most modern panels have a single main breaker. Older systems may have multiple disconnects (range, water heater, main, etc.) up to six total.", "v": 5}, {"id": 5089, "domain": 1, "task": 5, "topic": "Federal Pacific", "q": "Federal Pacific Stab-Lok panels are known for:", "choices": ["Reliable performance", "Premium quality", "Being required by certain codes", "High failure-to-trip rates posing fire hazards"], "correct": 3, "exp": "FPE Stab-Lok breakers have documented high failure-to-trip rates (independent testing showed 1 in 4 to 1 in 3 fail). Should be flagged for replacement. Same family of concerns: Zinsco/Sylvania, Pushmatic.", "v": 5}, {"id": 5090, "domain": 1, "task": 5, "topic": "Smallest AWG", "q": "The smallest wire gauge typically used in residential branch circuit wiring is:", "choices": ["#14 AWG", "#16 AWG", "#10 AWG", "#12 AWG"], "correct": 0, "exp": "#14 AWG is the smallest residential branch circuit wire (15 amp circuits). #12 AWG = 20 amp. #10 = 30 amp. AWG: smaller number means larger wire diameter. 4/0 is among the largest used in residential service.", "v": 5}, {"id": 5091, "domain": 1, "task": 5, "topic": "Aluminum Wiring Risk", "q": "Solid-conductor aluminum branch circuit wiring is primarily a concern because:", "choices": ["Connections can loosen and overheat at terminations", "No longer manufactured", "Insufficient capacity for modern loads", "Cannot be used with modern breakers"], "correct": 0, "exp": "Aluminum expands/contracts more than copper, oxidizes, and creeps under pressure - leading to loose connections, arcing, fire. Used roughly 1965-1973. Remediation: COPALUM crimps or AlumiConn connectors at all terminations.", "v": 5}, {"id": 5092, "domain": 1, "task": 5, "topic": "Grounding Electrode", "q": "Common grounding electrodes include all of the following EXCEPT:", "choices": ["Metal water service pipe in contact with earth for 10 feet", "20 feet of #4 rebar in concrete (Ufer)", "Driven rod 8 feet into ground", "PVC sewer pipe"], "correct": 3, "exp": "PVC is non-conductive and cannot serve as a grounding electrode. Acceptable: Ufer ground, driven rod (8 ft min), metal water pipe (with 10 ft earth contact), and metal building structure. New construction often uses multiple electrodes.", "v": 5}, {"id": 5093, "domain": 1, "task": 5, "topic": "GEC Size", "q": "The grounding electrode conductor (GEC) for a 200-amp service to a Ufer ground should be:", "choices": ["#8 AWG copper", "#10 AWG copper", "#4 AWG copper", "#6 AWG copper"], "correct": 2, "exp": "Service 200A or greater to Ufer: #4 AWG copper. To rod/pipe: #6 (limited by impractical resistance). To water pipe: full size. Code tables specify based on service size and electrode type.", "v": 5}, {"id": 5094, "domain": 1, "task": 5, "topic": "Subpanel Bonding", "q": "In a subpanel, the neutral and equipment grounding conductors should be:", "choices": ["Bonded together as in the main panel", "Kept separate (isolated neutrals)", "Combined and bonded to a separate ground", "Connected to the metal box only"], "correct": 1, "exp": "In a subpanel, neutrals and EGCs MUST be on separate, isolated bars. Bonding only happens at the main service. Bonded neutrals at a subpanel cause current to flow on grounding paths - a serious safety defect.", "v": 5}, {"id": 5095, "domain": 1, "task": 5, "topic": "AFCI", "q": "AFCI protection is required in:", "choices": ["Service panels only", "All bedroom circuits", "Detached garages", "Bathrooms only"], "correct": 1, "exp": "AFCI (Arc Fault Circuit Interrupter): required in bedrooms (since 2002), expanded to most living areas (kitchen, family room, dining, hallways, laundry) in newer codes. Detects arcing faults; supplements over-current and ground-fault protection.", "v": 5}, {"id": 5096, "domain": 1, "task": 5, "topic": "GFCI Locations", "q": "GFCI protection is required for all of the following EXCEPT:", "choices": ["Bedroom receptacles", "Kitchen counter receptacles", "Garages", "Bathrooms"], "correct": 0, "exp": "GFCI required in: bathrooms, kitchen counters, garages, outdoor, crawl spaces, unfinished basements, near sinks. Bedrooms typically require AFCI, not GFCI. Newer codes are pushing GFCI everywhere.", "v": 5}, {"id": 5097, "domain": 1, "task": 5, "topic": "GFCI Function", "q": "A GFCI detects:", "choices": ["Short circuits only", "Excessive current draw", "Voltage drops", "Imbalance between hot and neutral current"], "correct": 3, "exp": "GFCI monitors current in hot vs neutral. Any imbalance over about 5 milliamps means current is flowing somewhere it shouldn't (potentially through a person to ground). Trips in milliseconds.", "v": 5}, {"id": 5098, "domain": 1, "task": 5, "topic": "Reverse Polarity", "q": "Reverse polarity at a receptacle means:", "choices": ["The ground is missing", "DC instead of AC", "The hot and neutral are swapped", "The receptacle is inoperable"], "correct": 2, "exp": "Reverse polarity = hot and neutral conductors swapped at the receptacle. Common defect, especially with backstabbed connections. Equipment may operate but creates shock hazard - the switched terminal becomes live.", "v": 5}, {"id": 5099, "domain": 1, "task": 5, "topic": "Open Ground", "q": "An open ground at a 3-prong receptacle:", "choices": ["Is acceptable as long as polarity is correct", "Eliminates the safety benefit of grounded equipment", "Causes flickering", "Improves operation"], "correct": 1, "exp": "Open ground means the equipment grounding conductor isn't connected. Equipment will work, but if a hot wire shorts to a metal case, there's no path to clear the fault. Two-prong receptacles can be replaced with GFCI-protected 3-prong without retrofitting ground (with required labeling).", "v": 5}, {"id": 5100, "domain": 1, "task": 5, "topic": "Service Amperage", "q": "The minimum service amperage typically considered for a single-family residence today is:", "choices": ["100 amps", "60 amps", "200 amps", "400 amps"], "correct": 0, "exp": "Modern minimum: 100 amps. 200 amps is more common for homes with electric heat, AC, electric ranges, EV chargers. 60-amp services exist in older homes but are typically inadequate for modern loads.", "v": 5}, {"id": 5101, "domain": 1, "task": 5, "topic": "Romex", "q": "Non-metallic sheathed cable (NM-B), commonly called Romex:", "choices": ["Must be protected from physical damage", "Can be exposed in attics directly", "Is the same as armored cable", "Can be used in damp/wet locations"], "correct": 0, "exp": "NM-B cable: indoor dry locations only. Must be protected from physical damage (within 6 ft of attic entry, in walls, etc.). Wet locations require UF (underground feeder) or conduit.", "v": 5}, {"id": 5102, "domain": 1, "task": 5, "topic": "Junction Box", "q": "All electrical splices must be:", "choices": ["In accessible junction boxes", "Wrapped with electrical tape", "Soldered directly", "Buried in walls for safety"], "correct": 0, "exp": "All splices/connections must be in approved junction boxes that remain accessible (not buried in walls). Wire nuts inside boxes; box covered with a blank cover or fixture. Concealed splices are a serious defect.", "v": 5}, {"id": 5103, "domain": 1, "task": 5, "topic": "Cable Clamping", "q": "Cable entering a metal box must be:", "choices": ["Secured with a cable clamp at the box", "Free to move within the box", "Sealed with caulk", "Painted to prevent corrosion"], "correct": 0, "exp": "Cables entering metal boxes need cable clamps to prevent the cable from being pulled out and to protect against the sharp edge of the knockout. Plastic boxes typically have integral clamps.", "v": 5}, {"id": 5104, "domain": 1, "task": 5, "topic": "Service Drop Clearance", "q": "An overhead service drop must maintain a minimum clearance over a residential driveway of:", "choices": ["10 feet", "8 feet", "18 feet", "12 feet"], "correct": 3, "exp": "Service drop clearances: 12 feet over residential driveways, 18 feet over public roads, 10 feet at lowest point above grade for residential entrance to dwelling. Lower clearances are a significant defect.", "v": 5}, {"id": 5105, "domain": 1, "task": 5, "topic": "Service Equipment Bonding", "q": "At the service equipment:", "choices": ["Neutrals and grounds are isolated", "Only grounds are present", "Neutrals and grounds are bonded together", "Only neutrals are present"], "correct": 2, "exp": "At service equipment (main panel), neutral and grounding bus are bonded - typically via a main bonding jumper screw. This is the ONE point where neutral and ground are bonded; downstream subpanels keep them separate.", "v": 5}, {"id": 5106, "domain": 1, "task": 5, "topic": "GFCI Test", "q": "The recommended frequency for testing GFCI receptacles is:", "choices": ["Never", "Once per decade", "Annually", "Monthly"], "correct": 3, "exp": "Manufacturers and codes recommend monthly GFCI testing using the test button. The test verifies the trip mechanism. Receptacles can fail (especially in damp environments) without warning. Test also applies to AFCIs.", "v": 5}, {"id": 5107, "domain": 1, "task": 5, "topic": "Tamper-Resistant", "q": "Tamper-resistant receptacles:", "choices": ["Are required in all new dwelling unit receptacles", "Have built-in shock prevention shutters that block single-prong insertion", "Are required only in bedrooms", "Both A and C"], "correct": 3, "exp": "Tamper-resistant receptacles (TR): required in all new dwelling unit receptacles. Internal shutters block insertion of single objects (like a child's hairpin). Both prongs must be inserted simultaneously to open the shutter.", "v": 5}, {"id": 5108, "domain": 1, "task": 5, "topic": "Aluminum SE", "q": "Aluminum service entrance conductors:", "choices": ["Must be replaced when the service is upgraded", "Are permitted with proper terminations and oxidation inhibitor", "Are not permitted", "Cannot be used in residential"], "correct": 1, "exp": "Aluminum SE conductors are widely used (cost). Concerns are at terminations - require listed connectors, anti-oxidant compound, and proper torque. Aluminum branch circuit wiring is the bigger concern; aluminum SE is generally acceptable when properly installed.", "v": 5}, {"id": 5109, "domain": 1, "task": 6, "topic": "Heat Pump Outdoor Temp", "q": "A heat pump or AC should NOT be tested in cooling mode if outdoor temperatures have been below approximately:", "choices": ["32°F for 24 hours", "60°F for 24 hours", "45°F for 12 hours", "70°F for 12 hours"], "correct": 1, "exp": "Most manufacturers recommend not running cooling if outdoor temps have been below ~60°F for 24 hours. Running cold compressor risks oil migration and slugging damage. Disclaim cooling tests in cold weather.", "v": 5}, {"id": 5110, "domain": 1, "task": 6, "topic": "AC Temperature Drop", "q": "A normally functioning residential AC system should produce a temperature differential (return to supply) of approximately:", "choices": ["14-22°F", "5-10°F", "25-35°F", "More than 40°F"], "correct": 0, "exp": "Normal supply-to-return temperature drop: 14-22°F (sometimes stated 15-20°F). Lower may indicate low refrigerant or airflow problems; higher may indicate poor airflow.", "v": 5}, {"id": 5111, "domain": 1, "task": 6, "topic": "SEER", "q": "SEER stands for:", "choices": ["Standard Efficiency Estimation Range", "Seasonal Energy Efficiency Ratio", "System Energy Efficiency Rating", "Sensible Energy Efficiency Reading"], "correct": 1, "exp": "SEER (Seasonal Energy Efficiency Ratio) measures cooling efficiency over a season. Modern minimum SEER varies by region and year - generally 13-15 minimum, with high-efficiency units 18-25+. Higher SEER = lower operating cost.", "v": 5}, {"id": 5112, "domain": 1, "task": 6, "topic": "R-22 vs R-410A", "q": "Older AC systems often used R-22 refrigerant, which is:", "choices": ["An indicator of premium quality", "Phased out due to ozone depletion concerns", "Still readily available and inexpensive", "Only used in commercial systems"], "correct": 1, "exp": "R-22 (Freon, HCFC) phased out under Montreal Protocol due to ozone depletion. R-410A (Puron) is the most common modern replacement. Mixing or substituting refrigerants is improper. Old R-22 systems become expensive to service.", "v": 5}, {"id": 5113, "domain": 1, "task": 6, "topic": "Compressor Location", "q": "In a split-system AC, the compressor is located in the:", "choices": ["Outdoor unit (condensing unit)", "Indoor air handler", "Ductwork", "Thermostat"], "correct": 0, "exp": "Compressor is in the outdoor condensing unit. Indoor unit (air handler) contains the evaporator coil. Mini-splits and packaged units differ.", "v": 5}, {"id": 5114, "domain": 1, "task": 6, "topic": "Evaporator", "q": "The evaporator coil is located in the:", "choices": ["Disconnect box", "Refrigerant lineset", "Indoor air handler (or above the furnace)", "Outdoor unit"], "correct": 2, "exp": "Evaporator coil is indoors - either inside an air handler or in an A-coil cabinet sitting on top of a furnace (called an evaporator coil cabinet). Air passes over it and is cooled.", "v": 5}, {"id": 5115, "domain": 1, "task": 6, "topic": "Compressor Damaged Wiring", "q": "Common defects with AC condensing unit installations include:", "choices": ["Restriction of airflow at condensing coil (vegetation, debris)", "All of the above", "Missing or rusted suction line insulation", "Damaged or missing electrical wiring/disconnect"], "correct": 1, "exp": "Common defects: damaged wiring/disconnect, vegetation or debris restricting condenser airflow (must have clearances), missing insulation on suction line, refrigerant leaks at fittings, condensate drainage issues, electrical clearance issues.", "v": 5}, {"id": 5116, "domain": 1, "task": 6, "topic": "HSPF", "q": "HSPF measures:", "choices": ["Cooling efficiency", "Heating efficiency for heat pumps", "Furnace efficiency", "Insulation R-value"], "correct": 1, "exp": "HSPF (Heating Seasonal Performance Factor) measures heat pump heating efficiency. Higher HSPF = more efficient. Modern minimum is around 7.7-8.8, high-efficiency 9-13. Furnace efficiency is AFUE.", "v": 5}, {"id": 5117, "domain": 1, "task": 6, "topic": "Mini-Split", "q": "A ductless mini-split system:", "choices": ["Has an outdoor unit and one or more indoor head units, no ductwork", "Cannot be used in northern climates", "Cannot provide both heating and cooling", "Always has a single outdoor unit and single indoor unit"], "correct": 0, "exp": "Ductless mini-splits: outdoor compressor/condenser plus one or more indoor air handlers (heads), connected by refrigerant lines. No ductwork. Multi-zone systems serve several rooms. Modern cold-climate models work to -15°F or below.", "v": 5}, {"id": 5118, "domain": 1, "task": 6, "topic": "Condensing Unit Pad", "q": "The pad supporting an outdoor AC unit should:", "choices": ["Be level and well-drained", "Be made of plywood", "Slope toward the foundation", "Be embedded directly in soil"], "correct": 0, "exp": "AC pad: level (compressor needs level operation for oil distribution), well-drained, supportive (typically concrete or composite). Pad settling that tilts the unit can damage the compressor over time.", "v": 5}, {"id": 5119, "domain": 1, "task": 6, "topic": "AC Operation Test", "q": "When testing an AC, the inspector typically verifies:", "choices": ["Temperature differential at supply and return", "All of the above", "Outdoor unit fan and compressor run", "System operates from thermostat"], "correct": 1, "exp": "AC inspection: verify operation from thermostat, observe outdoor fan and compressor running, measure supply-return temperature drop, observe condensate drainage, check accessible filters and visible refrigerant lines.", "v": 5}, {"id": 5120, "domain": 1, "task": 6, "topic": "Bent Condenser Fins", "q": "Bent or damaged condenser fins:", "choices": ["Have no effect on performance", "Indicate the unit is failing", "Increase cooling capacity", "Restrict airflow and reduce efficiency"], "correct": 3, "exp": "Condenser fins are how heat is transferred to outside air. Bent or matted fins restrict airflow and reduce capacity/efficiency. A fin comb can straighten minor damage. Severe damage requires coil replacement.", "v": 5}, {"id": 5121, "domain": 1, "task": 7, "topic": "Wall Vent Type", "q": "Wall vent furnaces use what type of vent?", "choices": ["PVC or ABS", "Type L", "Single wall", "Type BW"], "correct": 3, "exp": "Type BW vents are specifically designed for wall furnaces (B for B-vent, W for wall). Type B is for general gas. Type L for oil/gas higher temp. PVC/ABS for high-efficiency condensing furnaces.", "v": 5}, {"id": 5122, "domain": 1, "task": 7, "topic": "Single Wall Vent Clearance", "q": "The minimum clearance to combustible material for a single-wall vent connector serving a gas appliance is:", "choices": ["18 inches", "6 inches", "1 inch", "2 inches"], "correct": 1, "exp": "Single-wall vent connector: 6 inches to combustibles. Type B vent: 1 inch. Single-wall stove pipe: 18 inches. Type L: 9 inches. Each vent type has its own clearance.", "v": 5}, {"id": 5123, "domain": 1, "task": 7, "topic": "Type B Clearance", "q": "The minimum clearance to combustible material for a Type B vent is:", "choices": ["2 inches", "6 inches", "18 inches", "1 inch"], "correct": 3, "exp": "Type B vent: 1 inch clearance to combustibles - the air gap in the double-wall design provides insulation. Common type for gas furnaces and water heaters at standard efficiency.", "v": 5}, {"id": 5124, "domain": 1, "task": 7, "topic": "Mid-Efficiency Components", "q": "Which list of components are you most likely to find on a mid-efficiency furnace?", "choices": ["Barometric damper, natural draft, indoor air handler", "Condensate management, indoor air handler, exterior condenser", "Type B vent pipe, mechanical draft, indoor air handler", "Condensate management, PVC/ABS venting, closed combustion"], "correct": 2, "exp": "Mid-efficiency furnaces (~80% AFUE): Type B vent, mechanical draft (induced-draft fan), indoor air handler. High-efficiency (88%+): condensate, PVC/ABS, closed combustion.", "v": 5}, {"id": 5125, "domain": 1, "task": 7, "topic": "High-Efficiency Components", "q": "A high-efficiency condensing furnace will have all of the following EXCEPT:", "choices": ["PVC or ABS vent piping", "Condensate drain", "Closed combustion chamber", "Type B vent"], "correct": 3, "exp": "High-efficiency furnaces use plastic venting (PVC/ABS) because flue gases are cool. Type B metal vent is for mid-efficiency. They feature condensate, sealed combustion, and direct vent (intake from outside).", "v": 5}, {"id": 5126, "domain": 1, "task": 7, "topic": "AFUE", "q": "AFUE stands for:", "choices": ["Adjusted Fuel Use Energy", "Annual Forced-Air Usage Equation", "Annual Fuel Utilization Efficiency", "Average Furnace Utility Estimate"], "correct": 2, "exp": "AFUE = Annual Fuel Utilization Efficiency, expressed as a percentage. 80% AFUE = mid-efficiency. 90%+ AFUE = high-efficiency (condensing). Modern minimum varies by region; typically 80% minimum.", "v": 5}, {"id": 5127, "domain": 1, "task": 7, "topic": "Furnace Efficiency Abbreviation", "q": "Which abbreviation is used to describe furnace efficiency?", "choices": ["AFUE", "SEER", "EER", "HSPF"], "correct": 0, "exp": "AFUE = furnace heating efficiency. SEER = AC seasonal cooling efficiency. EER = AC peak cooling efficiency. HSPF = heat pump heating efficiency. Each measures a different thing - don't confuse them.", "v": 5}, {"id": 5128, "domain": 1, "task": 7, "topic": "Glow Stick", "q": "What device is often referred to as a glow stick and serves as the ignition source in a gas-fired furnace?", "choices": ["Intermittent-pilot igniter", "Thermopile", "Hot-surface igniter", "Thermocouple"], "correct": 2, "exp": "Hot-surface igniter (HSI): silicon carbide or silicon nitride element that glows red-hot to ignite gas. Modern replacement for standing pilots. Thermocouples and thermopiles are SAFETY devices, not ignition sources.", "v": 5}, {"id": 5129, "domain": 1, "task": 7, "topic": "Boiler PRV", "q": "The pressure relief valve on a closed hot water boiler heating system prevents pressure from exceeding approximately:", "choices": ["60 psi", "150 psi", "12 psi", "30 psi"], "correct": 3, "exp": "Boiler PRV: 30 psi. Don't confuse with hot water tank T&P valve (150 psi). Normal boiler operating pressure: 12-25 psi.", "v": 5}, {"id": 5130, "domain": 1, "task": 7, "topic": "Boiler Operating Pressure", "q": "Normal operating pressure for a residential hot water boiler is approximately:", "choices": ["100+ psi", "60-80 psi", "5-10 psi", "12-25 psi"], "correct": 3, "exp": "Residential hot water boiler operates at approximately 12-25 psi. Pressure increases as water heats (expansion). PRV trips at 30 psi if expansion tank fails or system over-fills.", "v": 5}, {"id": 5131, "domain": 1, "task": 7, "topic": "Combustion Byproducts", "q": "Byproducts of complete combustion of natural gas include all EXCEPT:", "choices": ["Heat", "CO2 (carbon dioxide)", "H2O (water vapor)", "CO (carbon monoxide)"], "correct": 3, "exp": "CO is a byproduct of INCOMPLETE combustion - indicates a problem (insufficient air, dirty burner, improper venting). Complete combustion: CO2 + H2O + heat. NO2 also forms in trace amounts.", "v": 5}, {"id": 5132, "domain": 1, "task": 7, "topic": "Heat Transfer Unit", "q": "What unit best describes the transfer of heat through a material?", "choices": ["U-value", "R-value", "BTU", "Watts"], "correct": 0, "exp": "U-value (or U-factor): heat TRANSFER through a material. R-value: RESISTANCE to heat flow. They're inverses (U = 1/R). Lower U = better insulator. BTU is a unit of heat energy.", "v": 5}, {"id": 5133, "domain": 1, "task": 7, "topic": "R-Value", "q": "R-value measures:", "choices": ["Vapor permeability", "Air leakage", "Heat transfer rate", "Resistance to heat flow"], "correct": 3, "exp": "R-value: thermal resistance. Higher R = better insulator. Common assemblies: standard fiberglass batt R-13 to R-19, blown-in attic R-30 to R-60, exterior foam R-5 to R-15.", "v": 5}, {"id": 5134, "domain": 1, "task": 7, "topic": "Heat Pump in Cold Weather", "q": "In cold weather, an air-source heat pump:", "choices": ["Runs entirely on backup heat", "Requires no defrost cycle", "Loses efficiency as outdoor temp drops", "Cannot operate below freezing"], "correct": 2, "exp": "Heat pumps lose capacity and efficiency as outdoor temp drops. Below balance point (often 25-35°F for older units), supplemental heat needed. Modern cold-climate heat pumps maintain capacity to -15°F or below.", "v": 5}, {"id": 5135, "domain": 1, "task": 7, "topic": "Boiler vs Furnace", "q": "The fundamental difference between a boiler and a furnace is:", "choices": ["No real difference", "Boilers use gas; furnaces use electricity", "Boilers heat water; furnaces heat air", "Boilers are more efficient"], "correct": 2, "exp": "Boiler = heats water (or steam) for hydronic distribution (radiators, baseboard, in-floor). Furnace = heats air for ducted distribution. Both can be gas, oil, or electric. Different fuel does NOT define them.", "v": 5}, {"id": 5136, "domain": 1, "task": 7, "topic": "Steam vs Hot Water", "q": "A steam boiler is distinguished from a hot water boiler by:", "choices": ["Use of pumps for circulation", "Use of in-floor tubing", "Higher operating pressure typically", "Boiling water to produce steam, distributing via piping"], "correct": 3, "exp": "Steam boiler boils water; steam rises through piping to radiators, condenses, returns by gravity. Hot water boiler keeps water below boiling, uses circulator pumps. Older syste
