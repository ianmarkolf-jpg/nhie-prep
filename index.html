ed Crawl","q":"Modern thinking on crawl space ventilation in cold/humid climates:","choices":["More venting always better","Sealed/encapsulated crawl spaces with vapor barrier increasingly preferred","Powered ventilation","Match attic ventilation"],"correct":1,"exp":"Sealed (encapsulated) crawl spaces increasingly preferred: continuous vapor barrier on floor, insulation on walls (not floor above), conditioned to match house. Vented crawls in humid climates draw in moist air that condenses.","v":3},{"id":820,"domain":1,"task":8,"topic":"Encapsulated Crawl","q":"A conditioned (sealed/encapsulated) crawl space requires:","choices":["Continuous vapor barrier on soil","Sealed walls and rim joists","Insulation on perimeter walls","All of the above"],"correct":3,"exp":"Encapsulated crawl: vapor barrier on soil (typically 6+ mil poly, taped seams, sealed to walls), sealed/insulated rim and walls, conditioning (small register or dehumidifier), no soil-to-wood contact, sealed access.","v":3},{"id":821,"domain":1,"task":8,"topic":"Attic Hatch","q":"Attic access hatches should be:","choices":["Uninsulated for accessibility","Insulated and weatherstripped","Painted only","Plywood without sealing"],"correct":1,"exp":"Attic hatches: major heat loss points. Need insulation matching attic, weatherstripping at perimeter, latching to compress weatherstrip. Code typically requires R-value matching surrounding insulation.","v":3},{"id":822,"domain":1,"task":8,"topic":"Recessed Light IC AT","q":"Recessed lights in an insulated ceiling must be:","choices":["Insulation contact (IC) rated and air-tight (AT) rated","Open and vented","Removed","Wrapped in fiberglass"],"correct":0,"exp":"Recessed lights penetrating insulated ceilings: IC-rated (insulation contact OK) AND AT-rated (air tight). Old standard cans are not - must be replaced or covered with sealed boxes. Heat hazard and air leak otherwise.","v":3},{"id":823,"domain":1,"task":8,"topic":"Ductwork Insulation","q":"Ductwork in unconditioned spaces (attic, crawl) should be:","choices":["Uninsulated","Insulated to reduce energy loss","Removed","Sealed but not insulated"],"correct":1,"exp":"Ducts in unconditioned spaces lose heat (winter), gain heat (summer). Insulating reduces conditioning losses. Code typically requires R-8 in attics, R-6 in crawl spaces. Sealing duct seams also critical.","v":3},{"id":824,"domain":1,"task":8,"topic":"Cellulose","q":"Cellulose insulation:","choices":["Made from recycled paper treated with borate","Highly flammable","Lower R-value than fiberglass","Cannot be in attics"],"correct":0,"exp":"Cellulose: recycled paper with borate fire retardants. Comparable R-value to fiberglass (R-3.5 to R-3.8 per inch). Often blown-in for attic retrofit. Settles over time (~10-20%). Better at filling small gaps than fiberglass.","v":3},{"id":825,"domain":1,"task":8,"topic":"Closed Cell vs Open Cell","q":"Closed-cell spray foam compared to open-cell:","choices":["Higher R-value per inch and acts as vapor retarder","Lower R-value","Cannot be insulation","Allows water through"],"correct":0,"exp":"Closed-cell SPF: ~R-6 to R-7 per inch, vapor retarder, structural. Open-cell SPF: ~R-3.5 per inch, vapor open, flexible. Closed-cell preferred at rim joists and below-grade; open-cell common in stud cavities.","v":3},{"id":826,"domain":1,"task":8,"topic":"Bath Fan in Attic","q":"A bath fan that terminates inside the attic:","choices":["Acceptable as long as fan works","A defect that introduces moisture into attic","Required for ventilation","No implications"],"correct":1,"exp":"Bath fans must terminate to OUTSIDE - through soffit, gable, or roof. Termination in attic dumps humid bathroom air into a cold space, causing condensation, mold, frost on roof sheathing. Common defect.","v":3},{"id":827,"domain":1,"task":8,"topic":"Thermal Bridging","q":"Thermal bridging in a wall refers to:","choices":["Heat conducted through framing members that bypass insulation","Bridges of insulation","Air leak","Vapor barrier"],"correct":0,"exp":"Thermal bridging: heat flowing through studs/framing (R-1 per inch wood) rather than insulation (R-3+ per inch). Reduces effective R-value. Mitigated by exterior continuous insulation, advanced framing, double-stud walls.","v":3},{"id":828,"domain":1,"task":8,"topic":"Air Bypass Effects","q":"Air bypasses (unsealed penetrations) in a ceiling:","choices":["Leak conditioned air to attic","Carry moisture to attic, causing condensation","Typically the largest source of envelope leakage","All of the above"],"correct":3,"exp":"Air bypasses are major culprits: lose heat, transport moisture, defeat insulation, drive ice dams. Sealing them is often the highest-ROI energy improvement in older homes.","v":3},{"id":829,"domain":1,"task":8,"topic":"Insulation Settling","q":"Loose-fill insulation settles over time. The result is:","choices":["Increased R-value","Decreased R-value due to reduced thickness","No change","Increased thermal mass"],"correct":1,"exp":"Settling reduces thickness, which reduces R-value. Cellulose settles ~10-20%, fiberglass loose-fill less. When evaluating, measure actual thickness rather than relying on stated R-value at original install.","v":3},{"id":830,"domain":1,"task":8,"topic":"Knee Wall Floor","q":"Behind a finished attic knee wall, the most important detail is:","choices":["More insulation","Air sealing the floor cavity (ladder framing) below the knee wall","Adding ventilation","Removing insulation"],"correct":1,"exp":"Behind knee walls, floor joist cavity beneath the knee wall (between conditioned and unconditioned space) often has open ends bypassing air directly into unconditioned attic. Air sealing this is critical.","v":3},{"id":831,"domain":1,"task":1,"topic":"Grade Slope","q":"Grade should slope away from a foundation a minimum of:","choices":["1 inch over 6 feet","6 inches over the first 10 feet (5% slope)","12 inches over 6 feet","2 inches over 4 feet"],"correct":1,"exp":"Standard requirement: 6 inches over first 10 feet (5% slope). Negative grade is one of the most common defects in older Wisconsin housing stock and a primary contributor to basement water entry.","v":3},{"id":832,"domain":1,"task":1,"topic":"Hardscape Slope","q":"Hardscape (patios/walkways) should slope away from building at minimum:","choices":["1/4 inch per foot (2% slope)","1/2 inch per foot","1 inch per foot","No slope required"],"correct":0,"exp":"Hardscape: 2% minimum slope (1/4 inch per foot) away from structure. Less slope can result in standing water and migration toward foundation.","v":3},{"id":833,"domain":1,"task":1,"topic":"Negative Grade","q":"Negative grade refers to:","choices":["Soil with negative ions","Grade that slopes toward the foundation","Compacted soil","Insufficient drainage capacity"],"correct":1,"exp":"Negative grade slopes toward foundation rather than away. Directs water at foundation - common cause of basement moisture, efflorescence, structural damage. Typical defect requiring soil regrading.","v":3},{"id":834,"domain":1,"task":1,"topic":"Vegetation Clearance","q":"Tree branches and vegetation should be cleared from roof and exterior walls because:","choices":["Unsightly","They retain moisture, damage finishes, provide pest pathways","Block solar gain","Block view"],"correct":1,"exp":"Vegetation contact: causes moisture retention against finishes, mechanical damage to roofing and siding, pathways for ants and rodents, nesting sites. Trim back at least 6-12 inches from building.","v":3},{"id":835,"domain":1,"task":1,"topic":"Earth-to-Wood","q":"Earth-to-wood contact at base of siding/trim is a defect because:","choices":["Looks unsightly","Allows moisture wicking and wood-destroying organism damage","Provides structural support","Improves drainage"],"correct":1,"exp":"Earth-to-wood contact: wicks moisture into wood, creates ideal conditions for fungal decay and termite/carpenter ant infestation. Most building codes require minimum clearances between soil and untreated wood.","v":3},{"id":836,"domain":1,"task":1,"topic":"Trip Hazard","q":"A change in elevation between adjacent walkway sections that constitutes a trip hazard is generally:","choices":["Greater than 1/8 inch","Greater than 1/4 inch","Greater than 1/2 inch","Greater than 1 inch"],"correct":1,"exp":"Trip hazards: differential elevations greater than 1/4 inch typically considered hazards under accessibility/life safety standards. Common causes: freeze-thaw heaving, root upheaval, settlement.","v":3},{"id":837,"domain":1,"task":1,"topic":"Swale","q":"A swale is:","choices":["Type of retaining wall","Shallow drainage channel","Foundation footing","Type of vegetation"],"correct":1,"exp":"A swale: shallow, vegetated drainage channel designed to direct surface water flow. Often used to route water around or away from a structure where pipes are not practical.","v":3},{"id":838,"domain":1,"task":1,"topic":"Culvert","q":"A culvert is:","choices":["Drainage channel along a road","Pipe carrying water under a driveway or roadway","Type of foundation drain","Vegetated buffer"],"correct":1,"exp":"A culvert: pipe (typically large diameter metal or concrete) allowing water to flow under driveway or road. Often found at end of driveways crossing a roadside swale or ditch.","v":3},{"id":839,"domain":1,"task":1,"topic":"Storm vs Sanitary","q":"A residential storm water drainage system may include all of the following EXCEPT:","choices":["Gutters and downspouts","Swales","Underground drains","Sanitary sewer connections"],"correct":3,"exp":"Storm water (clean rain runoff) must NEVER be combined with sanitary sewer per modern code. Old combined systems exist in some cities (parts of Milwaukee included) but new connections require separate storm and sanitary lines.","v":3},{"id":840,"domain":1,"task":1,"topic":"Downspout Discharge","q":"Downspouts should discharge water:","choices":["Directly against foundation","At least 4-6 feet away from foundation","Into sanitary sewer","Onto adjacent roof"],"correct":1,"exp":"Downspouts: at least 4-6 feet from foundation, with extensions or splash blocks. Discharging at foundation defeats purpose of gutters - primary cause of basement moisture.","v":3},{"id":841,"domain":1,"task":1,"topic":"Window Well Cover","q":"Window well covers should:","choices":["Be permanent and non-removable","Be removable from inside without tools or special knowledge","Be welded shut","Have no openings"],"correct":1,"exp":"Window well covers (egress windows): operable from inside without tools, keys, or special knowledge. Permanent or locked covers prevent egress and violate life safety code.","v":3},{"id":842,"domain":1,"task":1,"topic":"Egress Window Well","q":"An egress window well must allow window to open fully and provide horizontal projection of at least:","choices":["9 sq ft area, 36 inch projection","6 sq ft, 24 inch","12 sq ft, 48 inch","No minimum"],"correct":0,"exp":"Egress wells: 9 sq ft area minimum, 36 inches projection from wall, allowing window full opening. Wells deeper than 44 inches require permanently affixed ladder or steps.","v":3},{"id":843,"domain":1,"task":1,"topic":"Detached Garage SOP","q":"The condition of a detached garage in a home inspection is generally:","choices":["Out of scope entirely","In scope as part of inspection","Inspected only if attached","Inspected only with extra fee"],"correct":1,"exp":"Detached garages and carports: typically IN scope. Other auxiliary structures (sheds, barns, gazebos) typically out of scope unless specifically agreed. Note in pre-inspection agreement.","v":3},{"id":844,"domain":1,"task":1,"topic":"Driveway to Garage","q":"A driveway sloping toward an attached garage is:","choices":["Defect that can direct water into garage","Required for drainage","Neutral observation","Required for braking"],"correct":0,"exp":"Driveway sloping TOWARD garage: directs water against garage door and into structure. Proper installation slopes water away from garage and house, often using trench drains where slope cannot be reversed.","v":3},{"id":845,"domain":1,"task":1,"topic":"Pool Barrier Height","q":"Minimum height for a pool access barrier (fence) is generally:","choices":["36 inches","42 inches","48 inches","60 inches"],"correct":2,"exp":"Pool access barriers: at least 48 inches high, measured from side facing away from pool. Openings should not allow passage of 4-inch sphere. Multiple barriers (door + fence) often required.","v":3},{"id":846,"domain":1,"task":1,"topic":"Pool Gates","q":"Gates serving pool access barriers should:","choices":["Open inward toward pool","Open outward away from pool, self-close, self-latch","Be propped open during pool season","Have no latching mechanism"],"correct":1,"exp":"Gates: open AWAY from pool, self-close, self-latch. Latch release at least 54 inches above ground (or on pool side) to prevent young children operating it.","v":3},{"id":847,"domain":1,"task":1,"topic":"Settlement vs Heaving","q":"Differential movement in a concrete walkway can be caused by:","choices":["Frost heaving","Settlement from voids","Tree root displacement","All of the above"],"correct":3,"exp":"All three common causes: frost heave (especially Wisconsin), settlement into voids, root pressure. All create differential movement and trip hazards. Frost-heave damage often appears at first/last warmer months.","v":3},{"id":848,"domain":1,"task":1,"topic":"Patio Defects","q":"Common defects in patios include all of the following EXCEPT:","choices":["Trip hazards","Slippery surfaces when wet","Poor drainage / ponding","Uniform color and texture"],"correct":3,"exp":"Uniform appearance: not a defect. Trip hazards, slippery surfaces, ponding, slope toward structure are typical defects. Cosmetic items reported only if significant.","v":3},{"id":849,"domain":1,"task":1,"topic":"Vegetation In Scope","q":"Vegetation is in scope of a home inspection when:","choices":["Has aesthetic value","Likely to have adverse impact on the house","Client's specific concern","Never - always out of scope"],"correct":1,"exp":"Vegetation in scope: when affects house. Tree limbs over roof, shrubs against siding, root systems near foundation, vines on exterior walls. General landscaping (yard layout, plant variety) out of scope.","v":3},{"id":850,"domain":1,"task":1,"topic":"Site Component Reporting","q":"When inspecting site conditions, the home inspector should:","choices":["Inspect all conditions on property","Limit reporting to conditions affecting the house","Report only items client asks","Avoid reporting site conditions"],"correct":1,"exp":"Site condition reporting: focused on items that affect or could affect the house. Grading, drainage, vegetation contact, hardscape near foundation. Conditions on property not affecting the house typically out of scope.","v":3},{"id":851,"domain":1,"task":2,"topic":"Stucco Three Layers","q":"The three layers of traditional stucco coating are:","choices":["Moisture barrier, weep screed, drainage plane","Weep screed, building paper, metal lath","Scratch, brown, and finish","Drainage plane, capillary break, paper"],"correct":2,"exp":"COATING layers: scratch (first, scored for tooth), brown (leveling), finish (texture/color). The OTHER terms describe the SUBSTRATE assembly: building paper, weep screed, metal lath. Don't confuse coating vs substrate.","v":3},{"id":852,"domain":1,"task":2,"topic":"Weep Screed","q":"A weep screed in stucco construction is:","choices":["Top layer of finish","Flashing detail at base of wall that allows moisture to drain","Type of metal lath","Primer applied first"],"correct":1,"exp":"Weep screed: flashing at bottom of stucco walls allowing incidental moisture trapped behind stucco to escape. Required at the base of all stucco walls in modern construction. Common defect: missing or below grade.","v":3},{"id":853,"domain":1,"task":2,"topic":"Wood Siding Clearance","q":"Untreated wood siding should maintain minimum clearance to grade of:","choices":["2 inches","4 inches","6 inches","12 inches"],"correct":2,"exp":"Untreated wood siding: 6 inches minimum clearance to soil grade. Concrete and other non-wood materials require lesser clearances. Failure causes rot and pest infestation.","v":3},{"id":854,"domain":1,"task":2,"topic":"Untreated Wood Beam","q":"Minimum clearance to soil for untreated dimensional wood beams:","choices":["12 inches","18 inches","8 inches","6 inches"],"correct":0,"exp":"Untreated dimensional wood beams: 12 inches clearance to soil. Pressure-treated or naturally durable wood (cedar, redwood) has lesser requirements but should still maintain reasonable clearance.","v":3},{"id":855,"domain":1,"task":2,"topic":"Vinyl Siding Defect","q":"A common defect with vinyl siding installation:","choices":["Nailing too tightly so panels can't expand/contract","Use of stainless steel nails","Painting the surface","Vertical orientation"],"correct":0,"exp":"Vinyl siding: must be hung loosely so it can expand/contract with temperature changes. Nailing tight causes warping and oil-canning. Nail in center of slot, with ~1/16 inch gap to head.","v":3},{"id":856,"domain":1,"task":2,"topic":"EIFS","q":"EIFS stands for:","choices":["Exterior Industrial Foam System","Exterior Insulation and Finish System","Engineered Interior Finish System","Exterior Integrated Flashing"],"correct":1,"exp":"EIFS: Exterior Insulation and Finish System. Multi-layer wall system using foam insulation, base coat with mesh, synthetic finish. First-generation EIFS (face-sealed, no drainage) caused widespread moisture damage in 1990s.","v":3},{"id":857,"domain":1,"task":2,"topic":"Exterior Door Egress","q":"An exterior door with interior-keyed deadbolt:","choices":["Best practice for security","A defect because it can prevent egress in emergency","Required by code","Acceptable in all locations"],"correct":1,"exp":"Interior-keyed deadbolts: egress hazard. In a fire, occupants may not find the key. Most codes require thumbturn or single-cylinder deadbolts on egress doors.","v":3},{"id":858,"domain":1,"task":2,"topic":"Window Safety Glazing","q":"Safety glazing (tempered glass) is required in all of the following EXCEPT:","choices":["Within 24 inches of a door","Within 18 inches of walking surface","Bathroom shower enclosures","Standard living room windows above 18 inches"],"correct":3,"exp":"Safety glazing required: within 24 inches of doors, within 18 inches of floor (large panes), in shower/tub enclosures, on stair landings. Standard living room windows that don't meet proximity tests do not require safety glazing.","v":3},{"id":859,"domain":1,"task":2,"topic":"Deck Ledger Defects","q":"A common defect with deck ledger board attachment:","choices":["Bolts spaced too far apart","Use of nails instead of lag bolts or carriage bolts","Lack of flashing","All of the above"],"correct":3,"exp":"All three are common deck ledger defects. Nails alone don't provide adequate pull-out resistance. Bolts must follow span/load tables. Lack of flashing leads to rim joist rot. Deck collapses often trace back to ledger attachment failures.","v":3},{"id":860,"domain":1,"task":2,"topic":"Deck Ledger Flashing","q":"Flashing at a deck ledger should:","choices":["Direct water away from building","Be adhered with caulk only","Be omitted if good drainage","Match siding color"],"correct":0,"exp":"Ledger flashing: moisture management detail directing water away from building's rim joist and wall sheathing. Without proper flashing, water gets behind ledger and rots rim joist - common cause of catastrophic deck collapse.","v":3},{"id":861,"domain":1,"task":2,"topic":"Guard Trigger","q":"A guardrail is required when walking surface is more than ____ above grade:","choices":["12 inches","18 inches","30 inches","36 inches"],"correct":2,"exp":"Guardrails: required when walking surface is more than 30 inches above grade or floor below within 36 inches horizontally. Decks, balconies, raised landings, and stairs.","v":3},{"id":862,"domain":1,"task":2,"topic":"Guard Height","q":"Guardrails on residential decks must be at least:","choices":["30 inches","36 inches (residential)","42 inches","60 inches"],"correct":1,"exp":"Residential guardrails: 36 inches minimum on decks. Commercial requires 42 inches. The 4-inch sphere rule applies to baluster spacing.","v":3},{"id":863,"domain":1,"task":2,"topic":"Baluster Spacing","q":"Guardrail balusters should be spaced so that:","choices":["A 4-inch sphere cannot pass through","A 6-inch sphere cannot pass","A 2-inch sphere cannot pass","Spacing is unrestricted"],"correct":0,"exp":"4-inch sphere rule: baluster spacing must not allow 4-inch sphere to pass through. Prevents small children from squeezing between or getting head stuck.","v":3},{"id":864,"domain":1,"task":2,"topic":"Handrail Graspability","q":"A handrail on a stair is graspable if:","choices":["Can be encircled by hand with thumb and fingers meeting","At least 2 inches diameter","Rectangular","Wider than 4 inches"],"correct":0,"exp":"Graspable handrail: can be fully encircled by hand. Codes specify maximum diameters (1.25 to 2 inches typical for round) and equivalent perimeters for non-round profiles. Many decorative rails are not graspable.","v":3},{"id":865,"domain":1,"task":2,"topic":"Stair Riser Variation","q":"Maximum variation in riser height within a single flight:","choices":["1/4 inch","3/8 inch","1/2 inch","3/4 inch"],"correct":1,"exp":"IRC limits riser height variation to 3/8 inch within a single flight. Same tolerance applies to tread depth. Inconsistent risers cause trips because climber's stride pattern is broken.","v":3},{"id":866,"domain":1,"task":2,"topic":"Garage Door Auto-Reverse","q":"A residential garage door opener must have an auto-reverse system that activates when:","choices":["The door encounters resistance during closing","Voice-activated","The remote pressed twice","The door open more than 1 hour"],"correct":0,"exp":"Auto-reverse must activate when door encounters resistance during closing. Test by placing a 2x4 flat on floor in door path - the door should reverse when contacting it. Required since 1993 federal mandate.","v":3},{"id":867,"domain":1,"task":2,"topic":"Garage Door Photoeyes","q":"Garage door opener photoelectric sensors (photoeyes) should be installed at:","choices":["Top of door","Center of door","No more than 6 inches above floor","Flush with ceiling"],"correct":2,"exp":"Photoeyes: no more than 6 inches above floor so they detect children, pets, and objects in door path. Higher mounting allows objects to pass under the beam.","v":3},{"id":868,"domain":1,"task":2,"topic":"Soffit","q":"The soffit is:","choices":["Vertical trim board at rake of roof","Horizontal underside of roof overhang","Top course of siding","Flashing at base of wall"],"correct":1,"exp":"Soffit: horizontal underside of roof overhang (eave). Often perforated or vented to allow attic intake ventilation. Vertical board at edge is the fascia.","v":3},{"id":869,"domain":1,"task":2,"topic":"Fascia","q":"The fascia is:","choices":["Horizontal underside of eave","Vertical trim board at edge of roof","Drainage plane behind siding","Framing member behind soffit"],"correct":1,"exp":"Fascia: vertical trim board at edge of roof, typically where gutters are mounted. Soffit is the horizontal underside.","v":3},{"id":870,"domain":1,"task":2,"topic":"Brick Veneer","q":"A typical residential brick wall is most often:","choices":["Structural masonry supporting roof loads","Non-structural veneer attached to wood-framed wall behind","Solid masonry 12 inches thick","EIFS-style finish"],"correct":1,"exp":"Most modern residential brick: veneer - non-structural cladding tied to wood-framed structural wall behind it with metal ties. Typically 1-inch air gap and weep holes at the base. Don't assume structural.","v":3},{"id":871,"domain":1,"task":6,"topic":"Refrigerant Cycle","q":"In a residential split AC, refrigerant changes from high-pressure liquid to low-pressure liquid by:","choices":["Compressor","Evaporator","Expansion device (TXV or capillary tube)","Condenser"],"correct":2,"exp":"Expansion device drops refrigerant pressure right before the evaporator. Compressor: low-pressure gas to high-pressure gas. Condenser: high-pressure gas to high-pressure liquid. Evaporator: low-pressure liquid to low-pressure gas.","v":3},{"id":872,"domain":1,"task":6,"topic":"AC Cold Test","q":"An AC compressor should NOT be tested in cooling mode if outdoor temps have been below approximately:","choices":["32\u00b0F for 24 hours","60\u00b0F for 24 hours","45\u00b0F for 12 hours","70\u00b0F"],"correct":1,"exp":"Standard rule: don't run cooling if outdoor temps were below ~60\u00b0F for 24 hours. Risk: oil migration in compressor, slugging on startup. Disclaim cooling test in cold weather.","v":3},{"id":873,"domain":1,"task":6,"topic":"AC Temp Drop","q":"Normally functioning residential AC should produce temperature differential (return to supply) of approximately:","choices":["5-10\u00b0F","14-22\u00b0F","25-35\u00b0F","Over 40\u00b0F"],"correct":1,"exp":"Normal supply-to-return temperature drop: 14-22\u00b0F (sometimes stated 15-20\u00b0F). Lower may indicate low refrigerant or airflow problems; higher may indicate poor airflow.","v":3},{"id":874,"domain":1,"task":6,"topic":"SEER","q":"SEER stands for:","choices":["System Energy Efficiency Rating","Seasonal Energy Efficiency Ratio","Standard Efficiency Estimation Range","Sensible Energy Reading"],"correct":1,"exp":"SEER (Seasonal Energy Efficiency Ratio) measures cooling efficiency over a season. Modern minimum SEER 13-15 (varies by region/year), high-efficiency 18-25+. Higher SEER = lower operating cost.","v":3},{"id":875,"domain":1,"task":6,"topic":"R-22 Phaseout","q":"Older AC systems often used R-22 refrigerant, which is:","choices":["Still readily available and inexpensive","Phased out due to ozone depletion","Indicator of premium quality","Only used in commercial"],"correct":1,"exp":"R-22 (Freon, HCFC): phased out under Montreal Protocol due to ozone depletion. R-410A (Puron) is most common modern replacement. Mixing or substituting refrigerants improper. Old R-22 systems become expensive to service.","v":3},{"id":876,"domain":1,"task":6,"topic":"Condensate Drain Clog","q":"An AC condensate drain that is clogged or overflows can:","choices":["Damage equipment and ceilings/floors below air handler","Improve cooling","Prevent corrosion","Not cause issues"],"correct":0,"exp":"Clogged condensate drains: overflow damages equipment, ceilings, walls, floors below air handler. Look for staining, rust, or active overflow. Float switch (if installed) supposed to shut off system before overflow.","v":3},{"id":877,"domain":1,"task":6,"topic":"Suction Line","q":"The larger insulated copper line on a split AC is:","choices":["Liquid line (high pressure)","Suction line (low pressure, returning to compressor)","Drain line","Condensate line"],"correct":1,"exp":"Suction line: larger, insulated, returns cold low-pressure refrigerant gas from evaporator to compressor. Liquid line: smaller, uninsulated, carries warm high-pressure liquid from condenser to evaporator. Missing insulation on suction line is a defect.","v":3},{"id":878,"domain":1,"task":6,"topic":"Compressor Location","q":"In a split AC, the compressor is located in:","choices":["Indoor air handler","Outdoor unit (condensing unit)","Ductwork","Thermostat"],"correct":1,"exp":"Compressor: outdoor condensing unit. Indoor unit (air handler) contains evaporator coil. Mini-splits and packaged units differ in some configurations.","v":3},{"id":879,"domain":1,"task":6,"topic":"Outdoor Disconnect","q":"An outdoor AC condensing unit must have a service disconnect:","choices":["At breaker only","Within sight of and within 50 feet of equipment","On unit itself","Anywhere"],"correct":1,"exp":"Disconnect: within sight of equipment AND within 50 feet (NEC). Allows safe lockout for service. Common defect: missing disconnect or disconnect not within sight (visible from working position).","v":3},{"id":880,"domain":1,"task":6,"topic":"Condenser Defects","q":"Common defects with AC condensing unit installations include:","choices":["Damaged or missing electrical wiring/disconnect","Restriction of airflow at condensing coil (vegetation, debris)","Missing or rusted suction line insulation","All of the above"],"correct":3,"exp":"Common defects: damaged wiring/disconnect, vegetation or debris restricting condenser airflow (must have clearances), missing insulation on suction line, refrigerant leaks at fittings, condensate drainage issues, electrical clearance issues.","v":3},{"id":881,"domain":1,"task":6,"topic":"Air Handler","q":"An air handler in HVAC contains:","choices":["Compressor","Blower fan, evaporator coil, often heating elements or burners","Condenser","Outdoor disconnect"],"correct":1,"exp":"Air handler = blower fan + evaporator coil + (often) electric heat strips or gas burners (in furnace/AH combo). Distributes conditioned air. Condenser/compressor in outdoor unit.","v":3},{"id":882,"domain":1,"task":6,"topic":"Heat Pump Reversing Valve","q":"A heat pump differs from an AC by adding:","choices":["More refrigerant","Reversing valve allowing cycle to reverse for heating","Larger compressor","Two outdoor units"],"correct":1,"exp":"Reversing valve (4-way valve): reverses refrigerant flow so indoor coil becomes condenser (heating) instead of evaporator (cooling). Allows one system to heat and cool. Defrost cycle handles outdoor coil ice in heating mode.","v":3},{"id":883,"domain":1,"task":6,"topic":"HSPF","q":"HSPF measures:","choices":["Cooling efficiency","Heating efficiency for heat pumps","Furnace efficiency","Insulation R-value"],"correct":1,"exp":"HSPF (Heating Seasonal Performance Factor): measures heat pump heating efficiency. Higher HSPF = more efficient. Modern minimum 7.7-8.8, high-efficiency 9-13. Furnace efficiency = AFUE.","v":3},{"id":884,"domain":1,"task":6,"topic":"Mini-Split","q":"A ductless mini-split system:","choices":["Cannot heat AND cool","Outdoor unit + indoor head units, no ductwork","Always single outdoor + single indoor","Cannot be in northern climates"],"correct":1,"exp":"Ductless mini-splits: outdoor compressor/condenser + one or more indoor air handlers (heads), connected by refrigerant lines. No ductwork. Multi-zone systems serve several rooms. Modern cold-climate models work to -15\u00b0F or below.","v":3},{"id":885,"domain":1,"task":6,"topic":"Condensing Pad","q":"The pad supporting an outdoor AC unit should:","choices":["Be level and well-drained","Slope toward foundation","Be plywood","Be embedded in soil"],"correct":0,"exp":"AC pad: level (compressor needs level operation for oil distribution), well-drained, supportive (typically concrete or composite). Pad settling that tilts unit can damage compressor over time.","v":3},{"id":886,"domain":1,"task":6,"topic":"AC Inspection","q":"When testing an AC, the inspector typically verifies:","choices":["Temperature differential at supply and return","System operates from thermostat","Outdoor unit fan and compressor run","All of the above"],"correct":3,"exp":"AC inspection: verify operation from thermostat, observe outdoor fan and compressor running, measure supply-return temp drop, observe condensate drainage, check accessible filters and visible refrigerant lines.","v":3},{"id":887,"domain":1,"task":6,"topic":"AC Lifespan","q":"Typical service life of a residential AC condensing unit is:","choices":["5-7 years","Depends on use, but typically 12-20 years","30+ years","100 years"],"correct":1,"exp":"Typical AC service life: 12-20 years depending on use, climate, maintenance, quality. Coastal saltwater environments, heavy use, lack of maintenance shortens life. Heat pumps slightly shorter due to year-round use.","v":3},{"id":888,"domain":1,"task":6,"topic":"Bent Fins","q":"Bent or damaged condenser fins:","choices":["No effect","Restrict airflow and reduce efficiency","Indicate failing unit","Increase capacity"],"correct":1,"exp":"Condenser fins: how heat is transferred to outside air. Bent or matted fins restrict airflow and reduce capacity/efficiency. A fin comb can straighten minor damage. Severe damage requires coil replacement.","v":3},{"id":889,"domain":1,"task":6,"topic":"Evaporator Location","q":"The evaporator coil is located in:","choices":["Outdoor unit","Indoor air handler (or above the furnace)","Refrigerant lineset","Disconnect box"],"correct":1,"exp":"Evaporator coil: indoors - either inside an air handler or in an A-coil cabinet sitting on top of a furnace (called an evaporator coil cabinet). Air passes over it and is cooled.","v":3},{"id":890,"domain":1,"task":6,"topic":"Heat Pump Defrost","q":"A heat pump defrost cycle:","choices":["Reverses to AC mode briefly to melt ice from outdoor coil","Shuts off entirely","Sprays water on coil","Increases blower"],"correct":0,"exp":"Defrost: reversing valve flips, system runs in AC mode briefly so outdoor coil heats and melts ice. Indoor air feels cool because cold air blows from registers; supplemental heat may run during defrost.","v":3},{"id":891,"domain":1,"task":11,"topic":"Spa Access Panel","q":"Minimum spa tub access panel opening size:","choices":["24x16 inches","15x21 inches","36x30 inches","12x12 inches"],"correct":3,"exp":"Spa access: 12x12 minimum, 18x18 if pump is more than 2 feet from opening. 24x16 = crawlspace access. 36x30 = guardrail trigger. 15x21 = toilet clearances. Don't confuse the dimensions for different applications.","v":3},{"id":892,"domain":1,"task":11,"topic":"Stair Riser Max","q":"Maximum riser height for residential stairs is generally:","choices":["6 inches","7 inches","7-3/4 inches","8-1/4 inches"],"correct":2,"exp":"IRC residential: maximum riser height 7-3/4 inches. Minimum tread depth 10 inches. Different from commercial (smaller riser, deeper tread). Existing stairs may not meet modern dimensions.","v":3},{"id":893,"domain":1,"task":11,"topic":"Stair Tread Min","q":"Minimum tread depth for residential stairs is generally:","choices":["8 inches","9 inches","10 inches","12 inches"],"correct":2,"exp":"IRC residential: minimum tread depth 10 inches. Combined with 7-3/4 inch max riser, defines comfortable/safe stair geometry. Old homes may have 8-9 inch treads (defect for new construction).","v":3},{"id":894,"domain":1,"task":11,"topic":"Headroom","q":"Minimum headroom for stairs is generally:","choices":["6 feet","6 feet 8 inches","7 feet","7 feet 6 inches"],"correct":1,"exp":"Stair headroom: 6'8\" minimum. Measured vertically from sloped line connecting tread nosings to ceiling. Common defect under finished basement stairs and remodels.","v":3},{"id":895,"domain":1,"task":11,"topic":"Anti-Tip","q":"An anti-tip bracket is required for:","choices":["Refrigerators","Free-standing kitchen ranges","Microwaves","Dishwashers"],"correct":1,"exp":"Anti-tip bracket: required on free-standing ranges to prevent tipping if a child climbs on or weight is applied to the open oven door. Often missing or installed incorrectly. Test by tilting the range.","v":3},{"id":896,"domain":1,"task":11,"topic":"Dishwasher Air Gap","q":"A dishwasher discharge in some jurisdictions requires:","choices":["High loop or air gap on drain line","Direct connection to disposal","No special provision","An additional pump"],"correct":0,"exp":"Dishwasher drain: high loop (above under-counter level) OR air gap fitting on countertop. Prevents backflow from sink/disposal into dishwasher. Required by some jurisdictions; high loop generally minimum standard.","v":3},{"id":897,"domain":1,"task":11,"topic":"Cabinet Securing","q":"Wall cabinets should be secured:","choices":["Finish nails to drywall","Cabinet screws into wall studs","Construction adhesive only","Drywall anchors only"],"correct":1,"exp":"Wall cabinets: secured into wall studs with appropriate cabinet/wood screws. Drywall anchors alone cannot support loaded cabinets. Common defect in DIY remodels - cabinets eventually pull off the wall.","v":3},{"id":898,"domain":1,"task":11,"topic":"Smart Home Limits","q":"When inspecting a home with smart home technology:","choices":["Inspect everything","Limit to visual evaluation; disclaim ability to test smart features","Avoid all electronic","Test all features"],"correct":1,"exp":"Smart home tech: inspect what's visible (the device, wiring, basic operation if obvious), disclaim deeper evaluation of smart functionality (app integration, network, AI features). Smart features change rapidly.","v":3},{"id":899,"domain":1,"task":11,"topic":"Bedroom Egress","q":"Bedroom egress door hardware should:","choices":["Require key from inside","Be operable without keys, special knowledge, or tools","Be locked with deadbolts","Have keyed deadbolts both sides"],"correct":1,"exp":"Egress doors: operable without keys, tools, or special knowledge from inside. Single-cylinder deadbolt with thumbturn OK; double-cylinder (key both sides) violates egress.","v":3},{"id":900,"domain":1,"task":11,"topic":"Window Sill","q":"Maximum sill height of an egress window above bedroom floor:","choices":["24 inches","36 inches","44 inches","60 inches"],"correct":2,"exp":"Egress window: max sill 44 inches above floor. Min net clear opening dimensions still apply (24 in height, 20 in width, 5.7 sq ft area for above-grade openings).","v":3},{"id":901,"domain":1,"task":11,"topic":"Failed IGU","q":"An insulating glass unit (IGU) seal failure is identified by:","choices":["Condensation or fogging between panes","Visible cracks","Soft glass","Discolored grids"],"correct":0,"exp":"Failed IGU seal: moisture between panes - cannot be cleaned, only replaced. Visible as fogging, mineral deposits, or persistent cloudiness between panes. Common in 15-25+ year old units.","v":3},{"id":902,"domain":1,"task":11,"topic":"Drywall Crack Causes","q":"Cracks in interior drywall can be caused by:","choices":["Normal seasonal movement","Foundation settlement","Truss uplift","All of the above"],"correct":3,"exp":"Drywall cracks: normal movement (small, hairline at joints), settlement (diagonal at corners of openings), truss uplift (horizontal at top of interior walls in winter), water damage. Pattern indicates cause.","v":3},{"id":903,"domain":1,"task":11,"topic":"Floor Squeaks","q":"Floor squeaks are typically caused by:","choices":["Loose subfloor fasteners or movement between subfloor and joists","Foundation failure","Termite damage","Major structural problems"],"correct":0,"exp":"Squeaks: loose subfloor (nails/screws working out), wood-on-wood movement, or undersized framing flexing. Cosmetic concern in most cases. Exception: if accompanied by sagging or other signs of structural issue.","v":3},{"id":904,"domain":1,"task":11,"topic":"Mold Visible","q":"Visible mold in interior spaces:","choices":["Should be reported with recommendation for moisture source identification","Always toxic","Irrelevant","Should not be mentioned"],"correct":0,"exp":"Inspectors report visible mold/mildew/staining as defect, recommend moisture source identification (the underlying cause), and recommend evaluation/remediation by qualified contractor. Don't try to identify species or claim toxicity.","v":3},{"id":905,"domain":1,"task":11,"topic":"Staircase Handrail","q":"A handrail is required on stairs with:","choices":["Less than 3 risers","4 or more risers","All stairs regardless","Only basement"],"correct":1,"exp":"Handrail: required on stairs with 4 or more risers (one continuous on at least one side). Modern code: graspable, mounted at 34-38 inches above tread nosings, returned to wall at ends.","v":3},{"id":906,"domain":2,"task":1,"topic":"SOP Definition","q":"The Standards of Practice (SOP) for home inspection define:","choices":["Pricing standards","What an inspector must inspect, what is excluded, and reporting requirements","Required tools","Required certifications"],"correct":1,"exp":"SOPs (InterNACHI, ASHI, state-specific): define minimum scope - what's included, what's excluded, what must be described/reported. Establish floor of what an inspector does. Liability shield when followed.","v":3},{"id":907,"domain":2,"task":1,"topic":"Required Tools","q":"Which is NOT typically required by SOP for inspection?","choices":["Flashlight","Moisture meter","Ladder for accessible areas","Outlet tester"],"correct":1,"exp":"Specialized tools (moisture meters, thermal cameras, IR thermometers): NOT required by SOP. Required basics: flashlight, ladder for accessible areas, outlet tester. Specialized tools enhance findings but aren't mandatory.","v":3},{"id":908,"domain":2,"task":1,"topic":"In-Scope Components","q":"Which is in scope of a typical home inspection?","choices":["Solar PV systems","Backup generators","Detached garages and carports","Underground oil tanks"],"correct":2,"exp":"Detached garages/carports: typically in scope. Solar PV, backup generators, underground tanks, swimming pool equipment, water quality testing: typically out of scope. Specialty inspections.","v":3},{"id":909,"domain":2,"task":1,"topic":"Wallpaper Limitation","q":"If wallpaper or wall covering obstructs view of wall surface:","choices":["Inspector removes wallpaper","Inspector should disclaim ability to fully evaluate that wall","Inspector should not report","Rate the wall as defective"],"correct":1,"exp":"Inspectors don't move/remove items. Wallpaper covering wall - disclaim full evaluation. Same for furniture, stored items, snow on roof, etc. Report what is and isn't visible.","v":3},{"id":910,"domain":2,"task":1,"topic":"Stored Items","q":"If stored items prevent inspection of a basement portion:","choices":["Inspector must move them","Disclaim and recommend re-inspection if access becomes available","Inspection cannot be completed","Stored items don't matter"],"correct":1,"exp":"Inspector doesn't move items. Disclaim what couldn't be evaluated due to limited access. Note in report. Client can request re-inspection if items removed before close.","v":3},{"id":911,"domain":2,"task":1,"topic":"Visible Components","q":"SOPs typically require inspection of:","choices":["All components","Readily accessible and visible components","Concealed components","Both readily accessible and concealed"],"correct":1,"exp":"SOPs limit inspection to readily accessible and visible. Inspector doesn't open walls, dismantle equipment, move heavy items, or perform invasive testing.","v":3},{"id":912,"domain":2,"task":1,"topic":"Sample Receptacles","q":"An inspector typically tests:","choices":["Every receptacle","A representative sample","Only kitchen and bath","Only outdoor"],"correct":1,"exp":"Representative sample: enough to evaluate the system, especially in critical areas (GFCI/AFCI test, kitchens, bathrooms, outdoor, near sinks). Furniture and stored items prevent testing all.","v":3},{"id":913,"domain":2,"task":1,"topic":"Pre-Inspection Walk","q":"A pre-inspection walkthrough with the client:","choices":["Required by all SOPs","Good practice but not always required","Replaces the inspection","Illegal"],"correct":1,"exp":"Pre-inspection walkthrough/conversation: good practice (sets expectations, identifies client priorities) but not required by all SOPs. Required: a written report following the inspection.","v":3},{"id":914,"domain":2,"task":1,"topic":"Code Compliance","q":"A home inspection is:","choices":["Formal code compliance review","An evaluation of visible conditions, generally not a code compliance inspection","Municipal inspection","Engineering review"],"correct":1,"exp":"Home inspection is NOT code compliance. Inspectors note items contrary to current standards but don't perform formal code review. Code compliance: building department, or code-specific inspector hired separately.","v":3},{"id":915,"domain":2,"task":1,"topic":"Buyer vs Pre-Listing","q":"A buyer's inspection differs from a pre-listing (seller's) inspection by:","choices":["Same scope, different client paying","Different SOP applies","Buyer inspection more thorough","Pre-listing illegal"],"correct":0,"exp":"Same scope, same SOP - different client. Pre-listing inspections allow sellers to address issues before market or disclose proactively. Buyer inspections are after offer/contract.","v":3},{"id":916,"domain":2,"task":1,"topic":"Inspection Time","q":"A typical single-family home inspection takes approximately:","choices":["30 minutes","2-4 hours (varies with size/age/complexity)","8 hours minimum","1 hour exactly"],"correct":1,"exp":"Typical single-family inspection: 2-4 hours on-site, plus report-writing time. Larger, older, more complex homes take longer. Quick inspections can be a quality concern.","v":3},{"id":917,"domain":2,"task":1,"topic":"Client Education","q":"During an inspection, the inspector should:","choices":["Educate client about systems and findings","Refuse to talk to clients","Give legal advice","Suggest renovations"],"correct":0,"exp":"Client education during inspection: significant value-add. Show systems, explain findings, point out maintenance items. Stay within scope - don't give legal/financial/design advice.","v":3},{"id":918,"domain":2,"task":1,"topic":"Limitations","q":"An inspection has inherent limitations including:","choices":["Visible/accessible only","Point-in-time observation","Not a code compliance inspection","All of the above"],"correct":3,"exp":"Inherent limitations: visible/accessible only, point-in-time (conditions change), not code compliance, not predictive of future failures, doesn't include hidden defects. Disclose in pre-inspection agreement.","v":3},{"id":919,"domain":2,"task":1,"topic":"Pre-Inspection Walk Discussion","q":"Pre-inspection conversation with client should:","choices":["Set expectations about scope/limitations/time","Identify client's concerns","Review pre-inspection agreement","All of the above"],"correct":3,"exp":"Pre-inspection: scope expectations, limitations, time estimate, client concerns, agreement review/signature. Sets professional foundation. Many inspectors spend 10-15 minutes here.","v":3},{"id":920,"domain":2,"task":1,"topic":"Report Format","q":"Home inspection reports are typically:","choices":["Verbal only","Written, formatted in narrative or checklist with photographs","Test results only","Required PDF only"],"correct":1,"exp":"Modern reports: written, narrative or checklist style, with photos and explanations. Most use software (Spectora, HouseMaster, ISN, etc.). Required to be delivered to the client.","v":3},{"id":921,"domain":2,"task":1,"topic":"Sewer Scope","q":"A sewer scope (camera inspection of sewer lateral):","choices":["Included in standard inspection","A separate specialty inspection","Cannot be performed","Required by all states"],"correct":1,"exp":"Sewer scope: separate specialty inspection. Inspectors may offer it as a separate service or recommend a qualified contractor. Highly recommended in older homes (clay/cast iron laterals).","v":3},{"id":922,"domain":2,"task":2,"topic":"Snow Roof Limit","q":"Snow-covered roof:","choices":["Cannot be properly inspected","Should be evaluated post-snow if possible","Inspector clears snow","Roof rated as defective when snowy"],"correct":1,"exp":"Snow limits roof inspection. Disclaim, document conditions, recommend re-inspection or qualified evaluation when conditions improve. Note any visible defects (e.g., chimney issues, ice dam evidence).","v":3},{"id":923,"domain":2,"task":2,"topic":"Operate vs Test","q":"Inspectors generally operate (rather than test) equipment by:","choices":["Running it through normal controls","Disassembling components","Pressure-testing","Manufacturer diagnostics"],"correct":0,"exp":"Operate via normal controls: turn AC on at thermostat, run water at fixtures, operate burners on a stove, raise/lower garage door. Don't disassemble, pressure-test, or perform diagnostic procedures.","v":3},{"id":924,"domain":2,"task":2,"topic":"Concealed Defects","q":"An inspection identifies:","choices":["All possible defects","Visible/accessible defects at time of inspection","Future defects","Hidden defects"],"correct":1,"exp":"Inspections identify visible/accessible defects at time of inspection. Hidden defects, future failures, and conditions inside walls or behind finishes are inherent limitations.","v":3},{"id":925,"domain":2,"task":2,"topic":"Latent Defect","q":"A latent defect is:","choices":["A defect not discoverable by reasonable inspection","A small defect","A code violation","Cosmetic issue"],"correct":0,"exp":"Latent defect: hidden/concealed, not discoverable by reasonable inspection. Distinguished from patent defects (visible). Inspectors not liable for latent defects unless they should have identified them.","v":3},{"id":926,"domain":2,"task":2,"topic":"Crawl Access","q":"Inspection of a crawl space requires:","choices":["Inspector to enter regardless","Reasonable access (clearance, dry conditions, sufficient size)","Always disclaim","Powered ventilation"],"correct":1,"exp":"Crawl access: enter when conditions allow (typical 18+ inches clearance, no standing water, no hazards). Disclaim if not safe to enter. Inspect from access opening if can't enter. Document why if not entered.","v":3},{"id":927,"domain":2,"task":2,"topic":"Roof Walking","q":"Walking the roof:","choices":["Required by SOP","Done when safe (slope, surface, weather)","Always required","Never done"],"correct":1,"exp":"Walk roof when safe. Don't walk: too steep (often 8:12+), too brittle (slate, tile), too wet/icy, too high without fall protection. Inspect from ladder, ground, or attic alternate vantage when not walked.","v":3},{"id":928,"domain":2,"task":2,"topic":"Underground Tank","q":"An underground oil tank:","choices":["In scope","Typically out of scope and disclaimed","Must be excavated","Unrelated to home inspection"],"correct":1,"exp":"Underground oil tanks: typically out of scope. Inspector may report visible signs (above-grade fill/vent pipes, evidence of an old tank), recommend specialty evaluation. Significant environmental liability if leaking.","v":3},{"id":929,"domain":2,"task":2,"topic":"Septic System","q":"Septic systems:","choices":["In standard home inspection scope","Typically out of scope, requiring specialty inspection","Inspected via flush test only","Cannot be evaluated"],"correct":1,"exp":"Septic: typically out of scope. Inspector may note visible components (lid, riser, signs of failure). Recommend specialty septic inspection (typically required at sale in many jurisdictions).","v":3},{"id":930,"domain":2,"task":2,"topic":"Well Water","q":"Private well system inspection:","choices":["In scope","A separate specialty inspection (water quality, pressure, recovery)","Cannot be performed","Unnecessary"],"correct":1,"exp":"Wells: separate specialty inspection. Includes water quality testing, flow rate, pressure tank operation, electrical, sanitary cap. Buyer should commission for any well-supplied home.","v":3},{"id":931,"domain":2,"task":2,"topic":"Active Leak Observed","q":"If active leakage is observed during inspection:","choices":["Inspector turns off water supply","Reports active leak and recommends correction","Ignores","Pays for repair"],"correct":1,"exp":"Active leak: report it (location, observed condition), recommend correction by qualified party. Don't try to turn off water mains. Don't perform repairs. Document immediately with photos.","v":3},{"id":932,"domain":2,"task":2,"topic":"Specialized Equipment","q":"Specialized equipment beyond SOP includes:","choices":["Thermal imaging cameras","Moisture meters","Borescope cameras","All of the above"],"correct":3,"exp":"Specialized: thermal cameras, moisture meters, borescopes, gas leak detectors, formaldehyde testers, asbestos kits. Useful add-ons but not required by SOP. Some inspectors include in standard service.","v":3},{"id":933,"domain":2,"task":2,"topic":"Mold Testing","q":"Mold testing during home inspection:","choices":["Standard SOP","Specialty service requiring sampling and lab analysis","Done with eyesight only","Always required"],"correct":1,"exp":"Mold testing: specialty service involving air/surface sampling, lab analysis, IH report. Different from observation of visible mold/mildew (which inspector can note). Often requires separate certification.","v":3},{"id":934,"domain":2,"task":2,"topic":"Asbestos","q":"Asbestos identification:","choices":["Standard SOP","Requires qualified professional and lab analysis","Visual inspection alone","Not relevant"],"correct":1,"exp":"Asbestos: visible identification (suspected materials in old buildings - 9x9 floor tiles, pipe wrap, popcorn ceilings, certain shingles). Confirmation requires lab analysis. Inspector notes suspected materials only.","v":3},{"id":935,"domain":2,"task":2,"topic":"Lead Paint","q":"Lead paint identification:","choices":["Visual identification only","Requires specialty testing (XRF, paint chip)","Always present in pre-1978","Cannot be evaluated"],"correct":1,"exp":"Lead paint: federal regulations require disclosure for homes pre-1978. Visual indicators possible (chipping/peeling old paint). Confirmation: XRF test or paint chip lab analysis. Specialty service.","v":3},{"id":936,"domain":2,"task":2,"topic":"Radon","q":"Radon testing during home inspection:","choices":["Standard SOP","Optional specialty service requiring multi-day testing","Single quick reading","Always required by federal law"],"correct":1,"exp":"Radon: 48-hour minimum continuous test (or charcoal canister + lab). Specialty service. EPA recommends for all home purchases. Wisconsin has elevated radon; common buyer add-on.","v":3},{"id":937,"domain":2,"task":2,"topic":"Pest Inspection","q":"Termite/pest inspection (WDO/WDI):","choices":["Standard SOP","Specialty service often required by lender","Same as home inspection","Cannot be performed"],"correct":1,"exp":"WDO/WDI inspection: separate specialty often required by lenders, especially in heavy termite areas. Inspector may identify visible signs but not perform formal WDO inspection without certification.","v":3},{"id":938,"domain":2,"task":2,"topic":"Vacant House","q":"A vacant house:","choices":["Cannot be inspected","Has different inspection considerations (utilities, no occupant feedback, dryness)","Always reveals more defects","Cannot have utilities on"],"correct":1,"exp":"Vacant homes: confirm utilities on, no occupant feedback (good and bad), plumbing fixtures may be dry (slow leaks unnoticed), AC may not have run for months. Document conditions.","v":3},{"id":939,"domain":2,"task":3,"topic":"Best Description","q":"Which is the BEST defect description?","choices":["Water heater is bad","Old water heater visible","Water heater (2003) - TPR discharge tube terminates above floor and is threaded; recommend correction by qualified plumber","Needs replacement"],"correct":2,"exp":"Quality description: specific (what exactly), located (where), explained (why it matters), actionable (what + qualified party). Vague terms like 'bad' or 'old' don't satisfy SOP.","v":3},{"id":940,"domain":2,"task":3,"topic":"Subjective Language","q":"Which language should be avoided in inspection reports?","choices":["Defect","Recommendation","'Bad,' 'old,' 'crappy,' 'amateur'","Specific measurements"],"correct":2,"exp":"Avoid subjective/judgmental language: bad, terrible, amateur, sloppy, hack job. Use objective language: 'damaged,' 'leaking,' 'inadequate (specific reason),' 'requires correction.' Keep professional.","v":3},{"id":941,"domain":2,"task":3,"topic":"Photo Documentation","q":"Photo documentation in reports:","choices":["Required by all SOPs","Best practice and increasingly expected by clients","Optional and rarely useful","Required only for life safety"],"correct":1,"exp":"Photos: best practice (clarifies findings, documents conditions, reduces liability). Most modern reports include photos for defects. Some SOPs require for major defects.","v":3},{"id":942,"domain":2,"task":3,"topic":"Photographing Privately","q":"Photographing in occupied homes:","choices":["Photograph everything for protection","Defects/conditions yes; avoid people, personal documents, valuables","Only photograph defects","Avoid all"],"correct":1,"exp":"Photo etiquette: defects and necessary conditions yes; people (especially children), personal documents, valuables, identifiable family items - avoid. Some pre-inspection agreements address photo permissions.","v":3},{"id":943,"domain":2,"task":3,"topic":"Cost Estimates","q":"Repair cost estimates in inspection reports:","choices":["Required by SOP","Generally discouraged or prohibited","Always required","Provided by request"],"correct":1,"exp":"Cost estimates: most SOPs prohibit or strongly discourage. Inspector is not a contractor and lacks specific information for accurate estimates. Refer to qualified contractors for estimates.","v":3},{"id":944,"domain":2,"task":3,"topic":"Naming Contractors","q":"Naming specific contractors in a report:","choices":["Builds business relationships","Creates conflict of interest","Required by SOP","Reduces liability"],"correct":1,"exp":"Naming contractors: conflict of interest concern. Refer to 'qualified electrician,' 'licensed plumber,' etc., not specific names. Some inspectors maintain referral lists separately, with disclosure.","v":3},{"id":945,"domain":2,"task":3,"topic":"Major vs Minor","q":"An inspection report should:","choices":["Treat all findings equally","Distinguish major (significant cost/safety) from minor (cosmetic/maintenance)","Only major","Only minor"],"correct":1,"exp":"Categorize findings: major (life safety, significant cost, structural), minor (cosmetic, maintenance), informational (discloses but not a defect). Helps client prioritize negotiation and follow-up.","v":3},{"id":946,"domain":2,"task":3,"topic":"Defect vs Maintenance","q":"A clogged dryer vent is best characterized as:","choices":["Major structural defect","Maintenance recommendation, with note of fire hazard if unaddressed","Cosmetic","Out of scope"],"correct":1,"exp":"Clogged dryer vent: maintenance item with safety implication. Report it with recommendation to clean. Document fire hazard concern for accumulated lint.","v":3},{"id":947,"domain":2,"task":3,"topic":"Active Issue","q":"An actively leaking water connection:","choices":["Should be noted with recommendation for prompt correction","Can be ignored","Repaired by inspector","Cosmetic"],"correct":0,"exp":"Active leak: report immediately with location, observed condition, recommendation for prompt correction. Photo important. Active issues warrant emphasis in report.","v":3},{"id":948,"domain":2,"task":3,"topic":"Templated Narratives","q":"Many inspectors use templated narratives because:","choices":["Saves time and ensures consistency","Allows verbiage review for clarity and liability","Provides comprehensive coverage","All of the above"],"correct":3,"exp":"Templated narratives (libraries like Kenton Shepard's InterNACHI library): save time, consistency, legal review, comprehensive coverage. Customize specifics for each finding.","v":3},{"id":949,"domain":2,"task":3,"topic":"Action Recommended","q":"A defect should typically have a recommendation for:","choices":["Specific repair method","Action by qualified party (further evaluation, repair, replace)","Cost estimate","Specific contractor"],"correct":1,"exp":"Recommendation: action + qualified party. 'Recommend further evaluation by qualified electrician' or 'Recommend replacement by licensed plumber.' Specific repair methods are contractor's call.","v":3},{"id":950,"domain":2,"task":3,"topic":"Implication of Defect","q":"Including the implication of a defect:","choices":["Helps client understand significance","Required by some SOPs","Reduces misunderstanding","All of the above"],"correct":3,"exp":"Implication: 'this could cause water damage,' 'reduces system efficiency,' 'creates fire hazard.' Helps client understand and prioritize. Some SOPs require, others encourage.","v":3},{"id":951,"domain":2,"task":3,"topic":"Boilerplate Limit","q":"Boilerplate (templated) language should:","choices":["Be customized to specific finding","Replace inspection observations","Stand alone without context","Be avoided"],"correct":0,"exp":"Boilerplate as starting point - customize with specific location, severity, observed conditions. Pure boilerplate without specifics suggests no actual inspection. Use as scaffolding for narrative.","v":3},{"id":952,"domain":2,"task":3,"topic":"Findings Sectioned","q":"Inspection reports are often sectioned by:","choices":["System (electrical, plumbing, etc.)","Severity","Both system and severity","Random"],"correct":2,"exp":"Modern reports: typically by system AND severity. Major findings called out at top (executive summary), then organized by system for complete review. Easier for clients and agents to navigate.","v":3},{"id":953,"domain":2,"task":3,"topic":"Aged Appliance","q":"An aged but functional water heater:","choices":["Replace regardless","Report aged with informational note about typical lifespan","Ignore","Always defect"],"correct":1,"exp":"Aged appliance: report age (date code) and note typical service life. Inform client of likely near-term replacement, even if currently functional. 'Approaching end of typical service life - budget for replacement.'","v":3},{"id":954,"domain":2,"task":3,"topic":"Multiple Similar Defects","q":"If many similar defects found (e.g., 30 missing receptacle covers):","choices":["Report each individually","Group similar defects, note quantity, recommend correction throughout","Report only one","Skip"],"correct":1,"exp":"Group similar defects with location summary and quantity. 'Multiple receptacles throughout home missing covers - recommend installation of covers throughout.' Avoids report bloat while documenting issue.","v":3},{"id":955,"domain":2,"task":4,"topic":"Fireplace Inspection","q":"When inspecting a fireplace, the inspector should:","choices":["Light a fire to test draft","Inspect visible portions and recommend Level 2 chimney inspection if defects suspected, recommend cleaning","Open and close damper, verify smoke chamber, recommend cleaning","Always recommend rebuilding"],"correct":1,"exp":"Home inspection: visible portions only. Recommend Level 2 by CSIA-certified chimney sweep at every property transfer (per NFPA 211) and when defects suspected. Don't light fires.","v":3},{"id":956,"domain":2,"task":4,"topic":"Active Leak Recommendation","q":"An active plumbing leak should be recommended for:","choices":["Disregard","Prompt repair by qualified plumber","Annual inspection","DIY repair"],"correct":1,"exp":"Active leaks: prompt repair by qualified plumber. Document scope of damage. Note potential hidden damage (water can travel; visible may be tip of iceberg).","v":3},{"id":957,"domain":2,"task":4,"topic":"Asbestos Suspected","q":"If asbestos-containing materials are suspected:","choices":["Test on-site","Recommend testing/evaluation by qualified abatement professional","Remove","Ignore"],"correct":1,"exp":"Suspected asbestos: 'recommend evaluation/testing by qualified asbestos abatement professional.' Don't disturb. Federal/state regulations apply for abatement (esp. in commercial). Inspector may recommend specialty IH or abatement contractor.","v":3},{"id":958,"domain":2,"task":4,"topic":"Cracked Heat Exchanger","q":"A suspected cracked furnace heat exchanger:","choices":["Confirmed by inspector with mirror","Recommend evaluation by qualified HVAC technician","Cosmetic","Replace"],"correct":1,"exp":"Cracked heat exchanger: serious safety concern (CO into living space). Recommend evaluation by qualified HVAC tech (camera/dye/specialty testing required to confirm). Inspector observation alone insufficient.","v":3},{"id":959,"domain":2,"task":4,"topic":"Bowed Foundation","q":"A foundation wall with significant bowing:","choices":["Cosmetic","Requires structural engineer evaluation","Standard repair","Ignore"],"correct":1,"exp":"Bowed foundation: structural concern. Recommend evaluation by structural engineer. Possible interventions: carbon fiber straps, helical tiebacks, beam/post bracing, exterior excavation/regrading.","v":3},{"id":960,"domain":2,"task":4,"topic":"Microbial Growth","q":"Visible mold or microbial growth:","choices":["Inspector cleans","Recommend evaluation/remediation by qualified contractor, source identification","Ignore","Test for species"],"correct":1,"exp":"Visible mold: recommend evaluation/remediation by qualified contractor. Identify and address moisture source (the underlying cause). Don't try to identify species or quantify exposure.","v":3},{"id":961,"domain":2,"task":4,"topic":"Pool Equipment","q":"Pool/spa equipment, when out of scope:","choices":["Inspect regardless","Recommend evaluation by qualified pool contractor/specialist","Functional check sufficient","No comment"],"correct":1,"exp":"Out-of-scope items: still document presence. Recommend specialty inspection by qualified contractor. Pool/spa, septic, well, underground tanks, solar are common items.","v":3},{"id":962,"domain":2,"task":4,"topic":"Pest Activity","q":"Active pest activity (termites, carpenter ants):","choices":["Recommend evaluation by qualified pest professional","Treat with home spray","Ignore minor","Replace damaged"],"correct":0,"exp":"Pest activity: recommend evaluation/treatment by qualified pest control professional. They identify species, treatment, monitoring. Damaged structural members require structural evaluation in addition.","v":3},{"id":963,"domain":2,"task":4,"topic":"Aluminum Wiring","q":"Solid-conductor aluminum branch circuit wiring:","choices":["Recommend evaluation by qualified electrician for proper terminations","Replace immediately","Ignore","Require seller upgrade"],"correct":0,"exp":"Aluminum wiring: report presence, note remediation options (COPALUM, AlumiConn), recommend evaluation by qualified electrician familiar with aluminum. Insurance impact also worth noting.","v":3},{"id":964,"domain":2,"task":4,"topic":"FPE Panel","q":"A Federal Pacific Stab-Lok panel:","choices":["Recommend evaluation by qualified electrician for replacement","Change breakers only","Test continuity","Ignore"],"correct":0,"exp":"FPE Stab-Lok panel: report concern about high failure-to-trip rates, recommend evaluation by qualified electrician for replacement of the panel (not just breakers).","v":3},{"id":965,"domain":2,"task":4,"topic":"Polybutylene","q":"Polybutylene supply piping:","choices":["Acceptable as long as no leaks","Report presence and recommend evaluation/replacement by qualified plumber","Test for leaks only","Replace fittings only"],"correct":1,"exp":"Polybutylene: report presence, note no longer permissible, recommend evaluation/replacement. PB has high failure rate; many insurers require replacement.","v":3},{"id":966,"domain":2,"task":4,"topic":"Knob and Tube","q":"Active knob-and-tube wiring:","choices":["Recommend evaluation by qualified electrician for safety, insulation contact, capacity","Replace immediately","Ignore","Disconnect at panel"],"correct":0,"exp":"K&T: recommend evaluation by qualified electrician. Concerns: insulation contact prohibited, no equipment ground, age/brittleness. Insurance implications. Selective replacement vs whole-house decision.","v":3},{"id":967,"domain":2,"task":4,"topic":"Sewer Lateral","q":"If signs suggest sewer lateral problems:","choices":["Recommend sewer scope by qualified plumber/specialist","Run more water","Replace fittings","Ignore"],"correct":0,"exp":"Sewer lateral concerns: recommend sewer scope (camera inspection) by qualified plumber/specialty. Identifies sags, breaks, root intrusion. Repair scope (spot repair vs lining vs full replace) varies by finding.","v":3},{"id":968,"domain":2,"task":4,"topic":"Roof End of Life","q":"A roof appearing near end of service life:","choices":["Recommend evaluation by qualified roofer for remaining life and budget for replacement","Replace immediately","Ignore","Repaint"],"correct":0,"exp":"End-of-life roof: report observed conditions (granule loss, curling, exposed nails, etc.), recommend qualified roofer evaluation for remaining life estimate and replacement quote. Budget item for client.","v":3},{"id":969,"domain":2,"task":4,"topic":"Structural Crack","q":"A horizontal crack in basement wall with displacement:","choices":["Recommend prompt evaluation by structural engineer","Cosmetic","Inspector measures","Apply caulk"],"correct":0,"exp":"Horizontal crack with displacement (or significant horizontal cracks): structural engineer evaluation. Lateral earth pressure exceeded wall capacity - safety concern, intervention often required.","v":3},{"id":970,"domain":2,"task":4,"topic":"Multiple Recommendations","q":"Some defects warrant multiple recommendations:","choices":["Inspector recommends only one","Inspector lists multiple as appropriate (e.g., immediate repair + further evaluation)","Recommendations not allowed","Inspector chooses cheapest"],"correct":1,"exp":"Multiple recommendations: appropriate for complex issues. Example: active leak - immediate plumbing repair + evaluation of ceiling/wall damage by qualified contractor + mold evaluation if extended exposure.","v":3},{"id":971,"domain":3,"task":1,"topic":"Agreement Required","q":"A pre-inspection agreement is:","choices":["Required by most state regulations and SOPs","Optional","Required only for first-time clients","Required only for new construction"],"correct":0,"exp":"Pre-inspection agreement: required by most state regulations, all SOPs, and is essential business practice. Defines scope, limitations, fees, dispute resolution, limit of liability.","v":3},{"id":972,"domain":3,"task":1,"topic":"Agreement EXCEPT","q":"A pre-inspection agreement should include all EXCEPT:","choices":["Scope of inspection","Limitations and exclusions","Limit of liability","Guarantee of property condition"],"correct":3,"exp":"Inspection is NOT a guarantee or warranty. Pre-inspection agreement: scope, limitations, exclusions, limits, dispute resolution, fees. Guaranteeing condition transforms inspection into warranty - massive liability.","v":3},{"id":973,"domain":3,"task":1,"topic":"Limit of Liability","q":"A limit of liability clause typically:","choices":["Limits damages to inspection fee or specified amount","Eliminates all liability","Cannot be enforced","Increases liability"],"correct":0,"exp":"Limit of liability: caps damages typically at fee paid (or sometimes a multiplied fee, or fixed amount). Validity varies by state - some states reduce or void such clauses. Include arbitration and dispute resolution.","v":3},{"id":974,"domain":3,"task":1,"topic":"E&O Insurance","q":"Errors and Omissions (E&O) insurance covers:","choices":["Bodily injury at site","Damage to client property during inspection","Professional negligence claims based on inspection findings or omissions","All of the above"],"correct":2,"exp":"E&O = professional negligence (work product). General Liability (GL) = bodily injury and property damage at site. Both are typically required and they are NOT the same coverage.","v":3},{"id":975,"domain":3,"task":1,"topic":"GL Insurance","q":"General Liability (GL) insurance covers:","choices":["Professional negligence","Bodily injury at site, damage to client property during inspection","Vehicle accidents","Health insurance"],"correct":1,"exp":"GL: bodily injury (e.g., inspector injures client during inspection) or property damage during inspection (e.g., inspector accidentally breaks something). E&O covers work product. Both coverages typically required.","v":3},{"id":976,"domain":3,"task":1,"topic":"Conflicts","q":"An inspector should avoid conflicts including:","choices":["Performing repairs on inspected properties for 12-24+ months","Accepting referral fees from contractors","Inspecting properties they have financial interest in","All of the above"],"correct":3,"exp":"Conflicts to avoid: post-inspection repair work (Wisconsin: 24 months prohibited), referral fees from recommended contractors, financial interest, inspecting family members' properties, etc.","v":3},{"id":977,"domain":3,"task":1,"topic":"WI Repair Restriction","q":"Wisconsin restricts inspectors from performing repairs on inspected properties for:","choices":["12 months","24 months (2 years)","36 months","No restriction"],"correct":1,"exp":"Wisconsin (and several other states): home inspector prohibited from performing repairs on inspected property for 24 months (2 years). Prevents conflict of interest where inspector finds defects to drive repair business.","v":3},{"id":978,"domain":3,"task":1,"topic":"Privacy Obligations","q":"Inspector privacy obligations include:","choices":["Avoiding capture of personal information in photos","Not disclosing inspection findings to unauthorized parties","Respecting occupant property","All of the above"],"correct":3,"exp":"Privacy obligations: minimize photographing personal items, don't disclose findings without client permission, respect occupant property and routine. Some inspectors disclose photo policy at start.","v":3},{"id":979,"domain":3,"task":1,"topic":"Report Distribution","q":"An inspection report:","choices":["Public record","Property of inspector, distributed only with client permission","Must be shared with sellers","Must be shared with listing agents"],"correct":1,"exp":"Report: inspector's work product, distribution per client. Don't share with sellers, listing agent, anyone without client's written permission. Many pre-inspection agreements address this explicitly.","v":3},{"id":980,"domain":3,"task":1,"topic":"Inspector Bias","q":"An inspector with personal/business relationship to seller should:","choices":["Disclose to client and potentially decline","Proceed if pricing fair","Not disclose","Charge discount"],"correct":0,"exp":"Conflicts of interest: disclose to client. Significant relationship (family, business partner) - decline. Lesser ones - disclose and let client decide. Transparency over compensation.","v":3},{"id":981,"domain":3,"task":1,"topic":"Referral Fees","q":"Accepting referral fees from a contractor an inspector recommends:","choices":["Standard practice","Conflict of interest, generally prohibited by ethics codes","Required for licensure","Tax-deductible"],"correct":1,"exp":"Referral fees: classic conflict of interest. Most ethics codes prohibit. Inspector financial incentive to find defects that match recommended contractor's services. Build referral relationships separately/ethically.","v":3},{"id":982,"domain":3,"task":1,"topic":"Continuing Education","q":"Inspectors maintain competence through:","choices":["CE required by state and certifying bodies","Annual practice","Reading","Voluntary only"],"correct":0,"exp":"CE: typically state-mandated and required by certifying bodies (InterNACHI, ASHI). Specific hour requirements per renewal cycle. Topics include code updates, new technologies, business practices.","v":3},{"id":983,"domain":3,"task":1,"topic":"Client Confidentiality","q":"Client information should be:","choices":["Shared with anyone who asks","Kept confidential, shared only as authorized by client","Posted online","Sold"],"correct":1,"exp":"Client confidentiality: contact info, report content, inspection findings - confidential. Shared only as client authorizes. Marketing use of client info typically requires explicit consent.","v":3},{"id":984,"domain":3,"task":1,"topic":"License Display","q":"Most states with inspector licensure require:","choices":["Display of license number on advertising and reports","No display","Display only on request","Display only in office"],"correct":0,"exp":"License number on advertising, reports, websites, business cards, contracts. Required by most state regulations. Allows public verification of license status.","v":3},{"id":985,"domain":3,"task":1,"topic":"Honest Marketing","q":"Inspector marketing should:","choices":["Make truthful claims about credentials","Avoid disparaging others","Maintain professional dignity","All of the above"],"correct":3,"exp":"Marketing ethics: no misrepresenting credentials/experience, no disparaging competitors, no false guarantees, no high-pressure tactics. Most state regulations and ethics codes address marketing.","v":3},{"id":986,"domain":3,"task":2,"topic":"Avoid EXCEPT","q":"Inspectors should avoid all of the following EXCEPT:","choices":["Performing repairs within 24 months","Accepting referral fees","Recommending qualified specialists","Inspecting property they have financial interest in"],"correct":2,"exp":"Recommending qualified specialists is REQUIRED, not avoided. Other options are conflicts of interest. Wisconsin specifically prohibits inspector repair work for 2 years.","v":3},{"id":987,"domain":3,"task":2,"topic":"Inspector Repair","q":"An inspector performing repairs on a property they recently inspected:","choices":["Builds business synergies","Creates conflict of interest, prohibited in many jurisdictions","Required by states","No implications"],"correct":1,"exp":"Inspector-as-repair-contractor on inspected property: classic conflict (inspector incentive to find defects to fix). Wisconsin prohibits 24 months. Many states prohibit. Always disclose, ideally avoid.","v":3},{"id":988,"domain":3,"task":2,"topic":"Misrepresentation","q":"Misrepresenting findings or credentials:","choices":["Acceptable for marketing","Violation of ethics code, possible licensure consequences, fraud potential","Common practice","Required"],"correct":1,"exp":"Misrepresentation: violates ethics codes and state regulations. Consequences: license suspension/revocation, civil liability, criminal fraud charges in extreme cases. Always factual and substantiated.","v":3},{"id":989,"domain":3,"task":2,"topic":"Customer Complaints","q":"Handling customer complaints includes:","choices":["Investigation of alleged issue","Documentation of communication","Possible re-inspection","All of the above"],"correct":3,"exp":"Complaint handling: take seriously, investigate, document, respond timely, possibly re-inspect, possibly settle. Insurance carrier notification for significant claims. Pattern of complaints can affect license.","v":3},{"id":990,"domain":3,"task":2,"topic":"Standard of Care","q":"Standard of care for an inspector is:","choices":["What a reasonable, similarly situated inspector would do","Perfection","Whatever inspector wants","Whatever client demands"],"correct":0,"exp":"Standard of care: what a reasonable, similarly situated inspector with similar training would do. Negligence = falling below this standard. Not perfection, but reasonable diligence.","v":3},{"id":991,"domain":3,"task":2,"topic":"Negligence","q":"Negligence in home inspection means:","choices":["Falling below the standard of care for similarly situated inspectors","Making any error","Not finding all defects","Disclosing limitations"],"correct":0,"exp":"Negligence: failing to meet reasonable standard. Errors can occur (e.g., couldn't see, sensible judgment call) without negligence. Persistent errors or significant misses can constitute negligence.","v":3},{"id":992,"domain":3,"task":2,"topic":"Honest Findings","q":"Reporting honest findings:","choices":["Required regardless of outcome implications","Should be softened","Adjusted to seller's preference","Aligned with agent's wishes"],"correct":0,"exp":"Honest findings: client paid for objective evaluation. Don't soften, omit, or fabricate. Report what was observed. Some buyers may walk; that's their right and inspector served them well.","v":3},{"id":993,"domain":3,"task":2,"topic":"Pressure to Soften","q":"If a buyer's agent pressures inspector to soften findings:","choices":["Inspector accommodates","Inspector maintains objectivity, reports honestly to client","Cancel inspection","Refer to another inspector"],"correct":1,"exp":"Pressure to soften: inspector serves the client (the buyer), not the agent. Maintain objectivity. Document any inappropriate pressure. Pattern
