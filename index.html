ket) on uphill side if >30 in wide. IRC.", "v": 5}, {"id": 5865, "domain": 1, "task": 12, "topic": "Inspector Limit", "q": "When inspecting a fireplace, the home inspector should:", "choices": ["Always rebuild", "Clean creosote out", "Disclaim Level 2", "Light a test fire"], "correct": 2, "exp": "Disclaim Level 2 (full internal/camera). Recommend CSIA-certified sweep at every transfer (NFPA 211).", "v": 5}, {"id": 5866, "domain": 1, "task": 12, "topic": "Wood Stove Hearth Pad", "q": "A wood stove hearth pad must be sized:", "choices": ["No requirement at all", "6 inches all around", "Per manufacturer", "2 ft on all sides"], "correct": 2, "exp": "Per mfr listing. Tested R-value and dimensions. Generic 'safe distance' doesn't apply with listed unit. UL.", "v": 5}, {"id": 5867, "domain": 1, "task": 12, "topic": "Foundation", "q": "A masonry chimney requires a foundation that is:", "choices": ["Wood platform OK", "Adequate independent", "No foundation req", "Shared with deck"], "correct": 1, "exp": "Adequate independent foundation. Heavy mass. Can settle independently. Tied with masonry anchors. IRC.", "v": 5}, {"id": 5868, "domain": 1, "task": 12, "topic": "CO Source", "q": "A common source of CO in homes with fuel-burning equipment is:", "choices": ["Improperly vented", "Refrigerator coils", "Closed window seals", "HVAC condenser fan"], "correct": 0, "exp": "Improperly vented or backdrafting fuel burners. Attached garage with running vehicles. NFPA.", "v": 5}, {"id": 5869, "domain": 1, "task": 3, "topic": "Asphalt Std Min", "q": "Standard asphalt shingle installation requires minimum slope of:", "choices": ["2:12 minimum slope", "6:12 minimum slope", "1:12 minimum slope", "4:12 minimum slope"], "correct": 3, "exp": "Standard: 4:12 min. 2:12-4:12 with double underlayment. <2:12: low-slope roofing required. IRC.", "v": 5}, {"id": 5870, "domain": 1, "task": 3, "topic": "Asphalt Low Min", "q": "Asphalt shingles with double underlayment are permitted on minimum slope of:", "choices": ["2:12 minimum slope", "1:12 minimum slope", "6:12 minimum slope", "4:12 minimum slope"], "correct": 0, "exp": "2:12-4:12 with double underlayment. <2:12 needs different roof system entirely. Standard: 4:12+. IRC.", "v": 5}, {"id": 5871, "domain": 1, "task": 3, "topic": "Ice Barrier WI", "q": "Ice barrier underlayment in WI must extend from eave to inside warm wall:", "choices": ["12 inches inside", "24 inches inside", "36 inches inside", "Not required state"], "correct": 1, "exp": "From eave to 24 in inside warm wall. Required where mean Jan temp <25°F. Ice dam protection. IRC.", "v": 5}, {"id": 5872, "domain": 1, "task": 3, "topic": "Underlayment Std", "q": "Standard slope (4:12+) asphalt shingle underlayment requires:", "choices": ["Three layers needed", "No underlayment use", "Single layer 15#", "Double layer 30#"], "correct": 2, "exp": "4:12+: single 15# felt or equivalent synthetic. 2:12-4:12: double layer (or full ice barrier). IRC.", "v": 5}, {"id": 5873, "domain": 1, "task": 3, "topic": "Reroof Layers", "q": "Most building codes limit asphalt shingle layers to maximum of:", "choices": ["4 layers total", "3 layers total", "1 layer total", "2 layers total"], "correct": 3, "exp": "Most codes: max 2 layers. Beyond that, structural load and underlying problem detection unacceptable. IRC.", "v": 5}, {"id": 5874, "domain": 1, "task": 3, "topic": "Step Flash", "q": "Step flashing is used at:", "choices": ["Chimneys only here", "Skylights only here", "Sloped roof to wall", "Flat roof boundary"], "correct": 2, "exp": "Step flashing: where sloped roof meets vertical wall. L-shape, one per shingle course. Counter flash above. IRC.", "v": 5}, {"id": 5875, "domain": 1, "task": 3, "topic": "Drip Edge", "q": "Drip edge at eaves serves to:", "choices": ["Direct water gutter", "Decorate the eave", "Hold shingles tight", "Prevent ice damming"], "correct": 0, "exp": "Directs water into gutter, away from fascia. Required by IRC at eaves and rakes (since 2012). IRC.", "v": 5}, {"id": 5876, "domain": 1, "task": 3, "topic": "Gutter Slope", "q": "Gutters should slope toward downspouts at approximately:", "choices": ["6 inches per 1 foot", "1 inch per 1 foot", "No slope required", "1/4 inch per 10 ft"], "correct": 3, "exp": "~1/4 in per 10 ft toward downspouts. More OK but visible diagonal. Insufficient = ponding/sag. Standard.", "v": 5}, {"id": 5877, "domain": 1, "task": 3, "topic": "2x3 Downspout", "q": "A 2x3 inch downspout typically serves what roof area?", "choices": ["100 sq ft of roof", "2000 sq ft roof", "Unlimited area roof", "600 sq ft of roof"], "correct": 3, "exp": "2x3 in: ~600 sq ft. 3x4 in: ~1200 sq ft. Larger steeper roofs need more capacity. Standard.", "v": 5}, {"id": 5878, "domain": 1, "task": 3, "topic": "3x4 Downspout", "q": "A 3x4 inch downspout typically serves what roof area?", "choices": ["600 sq ft of roof", "Unlimited area roof", "1200 sq ft roof", "100 sq ft of roof"], "correct": 2, "exp": "3x4 in: ~1200 sq ft. 2x3 in: ~600 sq ft. Larger required for greater roof areas. Standard.", "v": 5}, {"id": 5879, "domain": 1, "task": 3, "topic": "NFA Definition", "q": "NFA in attic ventilation context refers to:", "choices": ["Negative Flow", "National Flash", "Net Filter Area", "Net Free Area"], "correct": 3, "exp": "NFA = Net Free Area. Actual airflow opening (accounts for screens/louvers). 1:150 ratio typical attic. IRC.", "v": 5}, {"id": 5880, "domain": 1, "task": 3, "topic": "Ridge Vent", "q": "Ridge vents work most effectively when paired with:", "choices": ["Gable vents only", "Sealed both ends", "Attic fan only", "Soffit intake"], "correct": 3, "exp": "Ridge vent (high exhaust) + soffit (low intake) = balanced passive ventilation. Without intake, pulls indoor. IRC.", "v": 5}, {"id": 5881, "domain": 1, "task": 3, "topic": "Architectural", "q": "Architectural (laminated) shingles compared to 3-tab shingles are:", "choices": ["Thicker, longer life", "Not allowed slopes", "Required by codes", "Shorter warranty"], "correct": 0, "exp": "Architectural: thicker, heavier, longer warranty (30-50 yr vs 20-25). Largely replaced 3-tab. Industry.", "v": 5}, {"id": 5882, "domain": 1, "task": 3, "topic": "Wood Shake vs Shingle", "q": "Wood shakes differ from wood shingles by being:", "choices": ["Composite product", "Plywood backed only", "Sawn smooth thin", "Split rustic thick"], "correct": 3, "exp": "Shakes: split (rustic, thicker). Shingles: sawn (uniform, thinner). Both typically western red cedar. Industry.", "v": 5}, {"id": 5883, "domain": 1, "task": 3, "topic": "Metal Lifespan", "q": "Quality metal roofs typically last (vs asphalt 20-30 yr):", "choices": ["20-30 years range", "100 plus years even", "10-20 years range", "40-70 plus years"], "correct": 3, "exp": "Quality metal: 40-70+ years vs 20-30 asphalt. Higher upfront, longer life, recyclable. Industry.", "v": 5}, {"id": 5884, "domain": 1, "task": 3, "topic": "Tile Load", "q": "Clay tile roofing imposes structural load (vs asphalt 200-300 lb/sq) of approximately:", "choices": ["2000 lb per square", "700 lb per square", "100 lb per square", "300 lb per square"], "correct": 1, "exp": "Clay/concrete tile: 700-1200 lb/sq vs asphalt 200-300. Roof structure must accommodate. IRC.", "v": 5}, {"id": 5885, "domain": 1, "task": 3, "topic": "Mod Bit", "q": "Modified bitumen is a roofing material commonly used on:", "choices": ["Tile substrates", "Low-slope roofs", "Underlayment use", "Steep slope homes"], "correct": 1, "exp": "Mod-bit: low-slope rolled roofing with polymer modifiers (APP/SBS). Common on flat residential. Industry.", "v": 5}, {"id": 5886, "domain": 1, "task": 3, "topic": "EPDM", "q": "EPDM is a roofing material commonly used on:", "choices": ["Tile substrates", "Low-slope roofs", "Asphalt substrates", "Steep slope homes"], "correct": 1, "exp": "EPDM: synthetic rubber single-ply for low-slope roofs. Large sheets, seamed. 20-30+ year life. Industry.", "v": 5}, {"id": 5887, "domain": 1, "task": 3, "topic": "Vent Plumbing", "q": "Plumbing vent pipes through asphalt shingle roofs are flashed with:", "choices": ["Masonry crown", "Metal base + boot", "Tar and caulk", "Single layer felt"], "correct": 1, "exp": "Metal base flange + neoprene/EPDM rubber collar (boot). Boot deteriorates from UV first. IRC.", "v": 5}, {"id": 5888, "domain": 1, "task": 3, "topic": "Skylight Leak", "q": "The most common cause of skylight leakage is:", "choices": ["Excessive ventilation", "Improper flashing", "Glass panel failure", "Inadequate insulation"], "correct": 1, "exp": "Skylight flashing: dominant leak cause. Improper install or weathered. Curb-mount needs step flashing. IRC.", "v": 5}, {"id": 5889, "domain": 1, "task": 3, "topic": "End-of-Life", "q": "Asphalt shingle end-of-life indicators include:", "choices": ["Dark fresh shingles", "Color uniformity", "Granule loss curling", "Tight seal-tab adhesion"], "correct": 2, "exp": "End-of-life: granule loss, curling/cupping, brittleness, loss of seal-tab, exposed nails. Industry.", "v": 5}, {"id": 5890, "domain": 1, "task": 3, "topic": "Walk Decision", "q": "When inspecting a roof, the inspector should walk it when:", "choices": ["Safe to walk roof", "Always regardless cond", "Always use binoculars", "Refuse always to"], "correct": 0, "exp": "Walk when safe. Don't walk: too steep (8:12+), brittle (slate/tile), wet/icy, too high. Vol 1.", "v": 5}, {"id": 5891, "domain": 1, "task": 3, "topic": "Power Vent Concern", "q": "A common concern with attic power ventilators is they may:", "choices": ["Always required code", "Pull conditioned air", "Increase ridge moss", "Reduce roof temps"], "correct": 1, "exp": "Power vents can depressurize attic, pull conditioned air through ceiling penetrations. Many prefer passive. Industry.", "v": 5}, {"id": 5892, "domain": 1, "task": 3, "topic": "Closed Cut", "q": "A closed-cut valley uses:", "choices": ["Open metal flash", "Membrane only", "Shingles cut over", "Plywood substrate"], "correct": 2, "exp": "Closed-cut: shingles from one slope cross valley, other side cut at chalk line. Open valley uses metal. Industry.", "v": 5}, {"id": 5893, "domain": 1, "task": 3, "topic": "Cricket Saddle", "q": "A roof cricket (saddle) is built to:", "choices": ["Drain along eave", "Insect prevention", "Divert chimney water", "Hold flashings tight"], "correct": 2, "exp": "Cricket: small peaked structure behind chimney (uphill side) diverts water around. Required >30 in wide. IRC.", "v": 5}, {"id": 5894, "domain": 1, "task": 3, "topic": "Aluminum Galvanic", "q": "Aluminum flashing in direct contact with copper or pressure-treated wood will:", "choices": ["Have no interaction", "Galvanic corrosion", "Bond permanently", "Last much longer"], "correct": 1, "exp": "Aluminum reacts galvanically with Cu and chemically with ACQ-treated lumber. Use stainless or compatible. Industry.", "v": 5}, {"id": 5895, "domain": 1, "task": 3, "topic": "Snow Inspect", "q": "If snow covers a roof at time of inspection, the inspector should:", "choices": ["Disclaim, recommend", "Clear it manually", "Rate as defective", "Skip the roof"], "correct": 0, "exp": "Snow limits roof inspection. Disclaim, document conditions, recommend re-inspection. Note visible defects. Vol 1.", "v": 5}, {"id": 5896, "domain": 1, "task": 3, "topic": "Counter Flash", "q": "Counter flashing is:", "choices": ["Embedded in wall", "Valley flashing piece", "Skylight curb part", "Roof-edge drip metal"], "correct": 0, "exp": "Counter flashing: embedded/attached to wall, overlaps step or base flashing below. Two-piece system. IRC.", "v": 5}, {"id": 5897, "domain": 1, "task": 3, "topic": "Visible Defects EXCEPT", "q": "All of the following are typical roof defects EXCEPT:", "choices": ["Uniform shingle color", "Damaged flashings", "Lifted shingles", "Granule loss heavy"], "correct": 0, "exp": "Uniform color = not a defect. Granule loss, lifted/missing shingles, damaged flashings = defects. Vol 1.", "v": 5}, {"id": 5898, "domain": 1, "task": 3, "topic": "Shingle Min Slope", "q": "Asphalt shingles are NOT permitted on slopes less than:", "choices": ["6:12 slope min", "4:12 slope min", "1:12 slope min", "2:12 slope min"], "correct": 3, "exp": "2:12 absolute minimum (with double underlayment). <2:12 needs low-slope roofing. Standard: 4:12+. IRC.", "v": 5}, {"id": 5899, "domain": 1, "task": 8, "topic": "WI Climate Zone", "q": "Most of Wisconsin falls in IECC climate zone:", "choices": ["Zone 4-5 - mixed", "Zone 3 - warm", "Zone 6-7 - cold", "Zone 8 - sub-arctic"], "correct": 2, "exp": "WI: zones 6 and 7 (cold). Most state in zone 6, northern third in zone 7. High R-values, vapor retarder. IRC.", "v": 5}, {"id": 5900, "domain": 1, "task": 8, "topic": "Attic R Cold", "q": "Modern code-recommended attic insulation in cold climates is:", "choices": ["R-49 to R-60", "R-100 minimum", "R-19 to R-30", "R-13 to R-19"], "correct": 0, "exp": "Cold climate: R-49 to R-60. WI (zones 6-7): R-49+. Older standard R-30 inadequate. IRC.", "v": 5}, {"id": 5901, "domain": 1, "task": 8, "topic": "2x4 Cavity R", "q": "Standard 2x4 wood-frame wall cavities can typically achieve:", "choices": ["R-19 to R-21", "R-7 to R-11", "R-13 to R-15", "R-30 to R-38"], "correct": 2, "exp": "2x4: R-13 standard, R-15 high-density. 2x6: R-19 to R-21. Higher needs deeper cavity or exterior CI. IRC.", "v": 5}, {"id": 5902, "domain": 1, "task": 8, "topic": "2x6 Cavity R", "q": "Standard 2x6 wood-frame wall cavities can typically achieve:", "choices": ["R-7 to R-11", "R-30 to R-38", "R-19 to R-21", "R-13 to R-15"], "correct": 2, "exp": "2x6: R-19 to R-21. 2x4: R-13 to R-15. Add exterior continuous insulation for higher effective R. IRC.", "v": 5}, {"id": 5903, "domain": 1, "task": 8, "topic": "Vapor Retarder Cold", "q": "In a cold climate wall, the vapor retarder should be located on:", "choices": ["Exterior cold side", "Both sides of wall", "Interior warm side", "Middle of cavity"], "correct": 2, "exp": "Cold climate: warm (interior) side. Stops indoor moisture from migrating into cold cavity. Vol 1/2.", "v": 5}, {"id": 5904, "domain": 1, "task": 8, "topic": "Class III VR", "q": "Latex paint on drywall typically functions as which class of vapor retarder?", "choices": ["Class I (<0.1)", "Class III (1-10)", "Class IV (>10)", "Class II (0.1-1)"], "correct": 1, "exp": "Latex paint: Class III (1-10 perms). Acceptable in many zones. Class II: kraft paper, smart membrane. Class I: poly. IRC.", "v": 5}, {"id": 5905, "domain": 1, "task": 8, "topic": "Air Sealing Best", "q": "The most effective place to air seal a typical home is at the:", "choices": ["Interior partitions", "Window perimeters", "Exterior siding", "Building envelope"], "correct": 3, "exp": "Air sealing: building envelope (ceiling/attic floor, rim joist, basement-living transition, penetrations). Vol 1.", "v": 5}, {"id": 5906, "domain": 1, "task": 8, "topic": "Stack Effect", "q": "Stack effect in a building refers to:", "choices": ["Stacking insulation", "Mechanical air handle", "Insulation settling", "Buoyancy air movement"], "correct": 3, "exp": "Stack effect: warm air rises, creating + pressure at top (drives out) and - pressure at bottom (draws in). Vol 1.", "v": 5}, {"id": 5907, "domain": 1, "task": 8, "topic": "Soffit Vent", "q": "Soffit vents in attic ventilation provide:", "choices": ["Exhaust air flow", "Intake air flow", "Equal both flows", "Insulation only"], "correct": 1, "exp": "Soffit: low-side intake. Combined with ridge/gable (high exhaust). Code typically 50-50 NFA split. IRC.", "v": 5}, {"id": 5908, "domain": 1, "task": 8, "topic": "Ridge Vent", "q": "Ridge vents in attic ventilation provide:", "choices": ["Exhaust air flow", "Insulation only", "Intake air flow", "Equal both flows"], "correct": 0, "exp": "Ridge: high-side exhaust via convection. Pair with soffit (intake). Without intake, pulls indoor air. IRC.", "v": 5}, {"id": 5909, "domain": 1, "task": 8, "topic": "Air Bypass", "q": "An air bypass in an attic refers to:", "choices": ["Intentional venting", "Duct repair work", "Unsealed penetration", "Type of vent fan"], "correct": 2, "exp": "Air bypass: unsealed gap in attic floor (can lights, top plates, plumbing/elec/HVAC penetrations, hatch). Vol 1.", "v": 5}, {"id": 5910, "domain": 1, "task": 8, "topic": "Exterior CI", "q": "Exterior continuous insulation (CI) primarily reduces:", "choices": ["Thermal bridging", "Moisture management", "Code requirements", "R-value totals"], "correct": 0, "exp": "Continuous exterior insulation covers studs, reducing thermal bridging (studs ~R-1/in vs cavity R-3+). IRC.", "v": 5}, {"id": 5911, "domain": 1, "task": 8, "topic": "Ice Dam", "q": "Ice damming on roofs is caused by:", "choices": ["Inadequate gutter", "Excessive ventilation", "Poor shingle quality", "Heat loss melts"], "correct": 3, "exp": "Heat loss melts snow above warm space, water flows to cold eave, refreezes. Solution: air seal/insulate ceiling. Vol 1.", "v": 5}, {"id": 5912, "domain": 1, "task": 8, "topic": "Knee Wall", "q": "Insulation at finished attic knee walls should be:", "choices": ["Not required there", "Continuous and sealed", "Open-cell foam only", "Loose-fill cold side"], "correct": 1, "exp": "Continuous wall-to-ceiling, air-sealed both surfaces, including ladder framing below knee wall. Vol 1.", "v": 5}, {"id": 5913, "domain": 1, "task": 8, "topic": "Sealed Crawl", "q": "Modern thinking on humid-climate crawl space ventilation prefers:", "choices": ["Powered ventilation", "Match attic vents", "Sealed/encapsulated", "More venting better"], "correct": 2, "exp": "Encapsulated: vapor barrier on floor, walls insulated, conditioned. Vented in humid climates draws in moisture. Vol 1.", "v": 5}, {"id": 5914, "domain": 1, "task": 8, "topic": "Encap Crawl Mil", "q": "Vapor barrier on encapsulated crawl space soil typically uses:", "choices": ["Concrete only typical", "6 mil poly typical", "1 mil poly thin", "20 mil rubber typical"], "correct": 1, "exp": "6+ mil poly on soil, taped seams, sealed to walls. Heavier (10-20 mil) for trafficked crawls. Industry.", "v": 5}, {"id": 5915, "domain": 1, "task": 8, "topic": "Attic Hatch", "q": "Attic access hatches should be:", "choices": ["Uninsulated panel", "Plywood no seal", "Insulated/weather", "Painted only finish"], "correct": 2, "exp": "Insulated to match attic + weatherstripped + latched. Major heat-loss point if neglected. IRC.", "v": 5}, {"id": 5916, "domain": 1, "task": 8, "topic": "Recessed Light", "q": "Recessed lights in an insulated ceiling must be rated:", "choices": ["Wrapped fiberglass", "Standard can OK", "Open vented type", "IC and AT rated"], "correct": 3, "exp": "IC (insulation contact) AND AT (air tight) rated. Old standard cans = heat hazard + air leak. IRC/UL.", "v": 5}, {"id": 5917, "domain": 1, "task": 8, "topic": "Duct Insulation", "q": "Ducts in unconditioned spaces (attic) typically require insulation of:", "choices": ["R-2 minimum", "R-8 minimum", "R-19 minimum", "R-6 minimum"], "correct": 1, "exp": "R-8 in attics typical. R-6 in crawl spaces. Sealing duct seams also critical. IRC.", "v": 5}, {"id": 5918, "domain": 1, "task": 8, "topic": "Duct Insulation Crawl", "q": "Ducts in unconditioned crawl spaces typically require insulation of:", "choices": ["R-19 minimum", "R-6 minimum", "R-8 minimum", "R-2 minimum"], "correct": 1, "exp": "R-6 in crawl. R-8 in attic. Seal seams with mastic or UL-181 tape. IRC.", "v": 5}, {"id": 5919, "domain": 1, "task": 8, "topic": "Cellulose", "q": "Cellulose insulation is made of:", "choices": ["Recycled paper borate", "Mineral wool fiber", "Synthetic foam beads", "Recycled fiberglass"], "correct": 0, "exp": "Cellulose: recycled paper + borate fire retardants. R-3.5-3.8/in. Settles 10-20% over time. Industry.", "v": 5}, {"id": 5920, "domain": 1, "task": 8, "topic": "Closed Cell SPF", "q": "Closed-cell spray foam typical R-value per inch:", "choices": ["R-1 per inch", "R-6.5 per inch", "R-12 per inch", "R-3.5 per inch"], "correct": 1, "exp": "Closed-cell SPF: R-6 to R-7/in, vapor retarder, structural. Open-cell: R-3.5/in, vapor open. Industry.", "v": 5}, {"id": 5921, "domain": 1, "task": 8, "topic": "Open Cell SPF", "q": "Open-cell spray foam typical R-value per inch:", "choices": ["R-12 per inch", "R-3.5 per inch", "R-6.5 per inch", "R-1 per inch"], "correct": 1, "exp": "Open-cell SPF: R-3.5/in, vapor open, flexible. Closed-cell: R-6-7/in, vapor retarder, structural. Industry.", "v": 5}, {"id": 5922, "domain": 1, "task": 8, "topic": "Bath Fan Attic", "q": "A bath fan terminating inside the attic is:", "choices": ["Defect, moisture in", "Required for vent", "No implications", "Acceptable if fan"], "correct": 0, "exp": "Defect: dumps humid air into cold attic, causes condensation, mold, frost on roof sheathing. IRC.", "v": 5}, {"id": 5923, "domain": 1, "task": 8, "topic": "Thermal Bridging", "q": "Thermal bridging in a wall refers to:", "choices": ["Bridges of insul", "Air leak path", "Vapor barrier flaw", "Heat through stud"], "correct": 3, "exp": "Thermal bridging: heat conducted through framing (R-1/in wood) bypassing cavity insulation (R-3+/in). Industry.", "v": 5}, {"id": 5924, "domain": 1, "task": 1, "topic": "Grade Slope", "q": "Grade should slope away from foundation a minimum of:", "choices": ["12 inches over 6 ft", "6 inches over 10 ft", "2 inches over 4 ft", "1 inch over 6 ft"], "correct": 1, "exp": "6 in over first 10 ft (5% slope). Negative grade is common defect causing basement water intrusion. IRC.", "v": 5}, {"id": 5925, "domain": 1, "task": 1, "topic": "Hardscape Slope", "q": "Hardscape (patios, walkways) should slope away from building at minimum:", "choices": ["No slope required", "1/4 in per foot", "1/2 in per foot", "1 inch per foot"], "correct": 1, "exp": "2% slope (1/4 in per ft) min away from structure. Less = standing water and migration toward foundation. IRC.", "v": 5}, {"id": 5926, "domain": 1, "task": 1, "topic": "Negative Grade", "q": "Negative grade refers to soil that:", "choices": ["Slopes toward home", "Compacted below", "Drains too fast", "Negative ions soil"], "correct": 0, "exp": "Negative grade: slopes TOWARD foundation. Causes basement moisture, efflorescence, structural damage. Defect.", "v": 5}, {"id": 5927, "domain": 1, "task": 1, "topic": "Earth-to-Wood", "q": "Earth-to-wood contact at base of siding is a defect because:", "choices": ["Looks unsightly bad", "Allows moisture wick", "Provides structure", "Improves drainage"], "correct": 1, "exp": "Wicks moisture into wood, ideal for fungal decay and termite/carpenter ant entry. Code clearance required. IRC.", "v": 5}, {"id": 5928, "domain": 1, "task": 1, "topic": "Trip Hazard", "q": "A trip hazard between adjacent walkway sections is generally:", "choices": ["More than 1 inch", "More than 1/2 in", "More than 1/4 in", "More than 1/8 in"], "correct": 2, "exp": "Differential >1/4 in is hazard under accessibility/safety standards. Caused by frost, roots, settlement. ADA.", "v": 5}, {"id": 5929, "domain": 1, "task": 1, "topic": "Downspout Discharge", "q": "Downspouts should discharge water:", "choices": ["Sanitary sewer line", "At foundation base", "4-6 ft from base", "Onto adjacent roof"], "correct": 2, "exp": "4-6 ft min from foundation with extensions/splash blocks. At foundation = primary moisture cause. IRC.", "v": 5}, {"id": 5930, "domain": 1, "task": 1, "topic": "Storm vs Sanitary", "q": "A residential storm water drainage system may include all EXCEPT:", "choices": ["Swales and grading", "Sanitary sewer line", "Gutters and ds", "Underground drains"], "correct": 1, "exp": "Storm and sanitary must be separate per modern code. Old combined systems exist. New: separate. IRC.", "v": 5}, {"id": 5931, "domain": 1, "task": 1, "topic": "Pool Barrier", "q": "Minimum height for a pool access barrier (fence) is:", "choices": ["48 inches tall", "60 inches tall", "42 inches tall", "36 inches tall"], "correct": 0, "exp": "Pool barrier: 48 in min from outside face. Openings can't pass 4 in sphere. Multiple barriers typical. IRC.", "v": 5}, {"id": 5932, "domain": 1, "task": 1, "topic": "Pool Gates", "q": "Gates serving pool access barriers should:", "choices": ["Open out, self-cl", "Propped open warm", "Open inward pool", "No latches required"], "correct": 0, "exp": "Open AWAY from pool, self-close, self-latch. Latch release ≥54 in or pool side. IRC/ISPSC.", "v": 5}, {"id": 5933, "domain": 1, "task": 1, "topic": "Window Well", "q": "An egress window well must provide horizontal projection of at least:", "choices": ["24 inches deep min", "36 inches deep min", "30 inches deep min", "48 inches deep min"], "correct": 1, "exp": "36 in projection from wall. 9 sq ft area min. Allows window to fully open. IRC.", "v": 5}, {"id": 5934, "domain": 1, "task": 1, "topic": "Window Well Area", "q": "An egress window well must provide a minimum area of:", "choices": ["6 sq ft area min", "12 sq ft area min", "9 sq ft area min", "16 sq ft area min"], "correct": 2, "exp": "9 sq ft area min. 36 in projection. Wells >44 in deep need permanent ladder. IRC.", "v": 5}, {"id": 5935, "domain": 1, "task": 1, "topic": "Detached Garage", "q": "The condition of a detached garage in a home inspection is:", "choices": ["Only with extra fee", "Only if attached", "Out of scope", "In scope item"], "correct": 3, "exp": "Detached garage/carport: typically IN scope. Sheds, barns, gazebos: typically out of scope. SOP.", "v": 5}, {"id": 5936, "domain": 1, "task": 1, "topic": "Driveway Slope", "q": "A driveway sloping toward an attached garage:", "choices": ["Defect, water in", "Improves vehicle braking", "Aids drainage flow", "Required by code"], "correct": 0, "exp": "Slope toward garage = water at door, into structure. Should slope away. Trench drain if can't reverse. IRC.", "v": 5}, {"id": 5937, "domain": 1, "task": 1, "topic": "Sump Discharge Site", "q": "A sump pump discharge should terminate from foundation at least:", "choices": ["50 to 75 ft away", "20 to 30 ft away", "4 to 6 ft away", "1 to 2 ft away"], "correct": 2, "exp": "4-6 ft min from foundation, away from neighbors, NOT into sanitary sewer. Check valve required. IRC.", "v": 5}, {"id": 5938, "domain": 1, "task": 1, "topic": "Frost Heave Walk", "q": "Differential movement in concrete walkway can be caused by:", "choices": ["Settlement only", "Frost heave only", "Tree roots only", "Any of the above"], "correct": 3, "exp": "All three: frost heave (esp. WI), settlement into voids, root pressure. Cause trip hazards. Industry.", "v": 5}, {"id": 5939, "domain": 1, "task": 1, "topic": "Vegetation Trim", "q": "Tree branches and vegetation should be cleared from house because they:", "choices": ["Block solar gain", "Cause moisture/pest", "Block views outside", "Look unsightly bad"], "correct": 1, "exp": "Cause moisture retention, mechanical damage, pest pathways, nesting sites. Trim ≥6-12 in clearance. Industry.", "v": 5}, {"id": 5940, "domain": 1, "task": 1, "topic": "Site In-Scope", "q": "Vegetation is in scope of a home inspection when:", "choices": ["Client has concern", "Affects the house", "Always out of scope", "Has aesthetic value"], "correct": 1, "exp": "Vegetation in scope: when it affects the house (limbs over roof, against siding, near foundation). SOP.", "v": 5}, {"id": 5941, "domain": 1, "task": 1, "topic": "Site Reporting", "q": "When inspecting site conditions, the inspector should:", "choices": ["Avoid site issues", "Report items only", "Limit to house", "Inspect all on lot"], "correct": 2, "exp": "Site reporting focused on conditions affecting the house. Yard layout, plant variety: out of scope. SOP.", "v": 5}, {"id": 5942, "domain": 1, "task": 1, "topic": "Window Well Ladder", "q": "Window wells deeper than what require permanent ladder/steps?", "choices": ["36 inches deep", "44 inches deep", "24 inches deep", "60 inches deep"], "correct": 1, "exp": "Wells >44 in deep require permanently affixed ladder or steps. Allows egress. IRC.", "v": 5}, {"id": 5943, "domain": 1, "task": 1, "topic": "Patio Defects EXCEPT", "q": "Common defects in patios include all of the following EXCEPT:", "choices": ["Uniform color tone", "Slippery wet feel", "Trip hazards", "Slope toward home"], "correct": 0, "exp": "Uniform color = not a defect. Trip hazards, slippery, ponding, slope toward home = defects. SOP.", "v": 5}, {"id": 5944, "domain": 1, "task": 2, "topic": "Stucco Three", "q": "The three coating layers of traditional (3-coat) stucco are:", "choices": ["Scratch, brown, finish", "Vapor, paper, drain", "Weep, paper, lath", "Drain, capillary, paper"], "correct": 0, "exp": "COATING: scratch, brown, finish. SUBSTRATE (different): paper, weep screed, lath. Don't confuse. Industry.", "v": 5}, {"id": 5945, "domain": 1, "task": 2, "topic": "Weep Screed", "q": "A weep screed in stucco construction is located at:", "choices": ["Window head trim", "Top of wall coat", "Middle of stucco wall", "Base of stucco wall"], "correct": 3, "exp": "Weep screed: flashing at base allowing trapped moisture to drain. Required at base of all stucco. IRC.", "v": 5}, {"id": 5946, "domain": 1, "task": 2, "topic": "Wood Siding Clear", "q": "Untreated wood siding should maintain minimum clearance to soil grade of:", "choices": ["2 inches above grade", "6 inches above grade", "12 inches above grade", "4 inches above grade"], "correct": 1, "exp": "6 in minimum to soil grade. Less causes rot and pest issues. PT or naturally durable: less required. IRC.", "v": 5}, {"id": 5947, "domain": 1, "task": 2, "topic": "Untreated Wood Beam", "q": "Minimum clearance to soil for untreated dimensional wood beams is:", "choices": ["12 inches above grade", "6 inches above grade", "18 inches above grade", "8 inches above grade"], "correct": 0, "exp": "12 in minimum to soil. PT or naturally durable wood: lesser requirements but still maintain clearance. IRC.", "v": 5}, {"id": 5948, "domain": 1, "task": 2, "topic": "Vinyl Siding Defect", "q": "A common installation defect with vinyl siding is:", "choices": ["Vertical orientation", "Painting the surface", "Nailing too tight", "Stainless steel nails"], "correct": 2, "exp": "Vinyl: hung loose to allow expansion/contraction. Tight nailing = warping/oil-canning. Center slot, 1/16 in gap. Mfr.", "v": 5}, {"id": 5949, "domain": 1, "task": 2, "topic": "EIFS", "q": "EIFS is best described as:", "choices": ["Integrated Flash Sys", "Interior Finish Sys", "Industrial Foam Sys", "Insulation Finish Sys"], "correct": 3, "exp": "Exterior Insulation and Finish System. Foam + base coat + synthetic finish. 1st-gen face-sealed = water damage. Industry.", "v": 5}, {"id": 5950, "domain": 1, "task": 2, "topic": "Door Keyed Both", "q": "An exterior egress door with interior-keyed deadbolt:", "choices": ["Acceptable any place", "Required by codes", "Best for security", "Defect, egress fail"], "correct": 3, "exp": "Interior-keyed deadbolt: egress hazard. Most codes require thumbturn or single-cyl. IRC.", "v": 5}, {"id": 5951, "domain": 1, "task": 2, "topic": "Safety Glaze EXCEPT", "q": "Safety glazing (tempered glass) is required in all of the following EXCEPT:", "choices": ["Within 24 in door", "Tub/shower enclos", "Within 18 in floor", "Living room midwall"], "correct": 3, "exp": "Required: near doors, near floor, tub/shower, stair landings. Standard living room window mid: not req. IRC.", "v": 5}, {"id": 5952, "domain": 1, "task": 2, "topic": "Deck Ledger", "q": "Common deck ledger board attachment defects include:", "choices": ["Nails not bolts", "All of the above", "Lack of flashing", "Bolt spacing wide"], "correct": 1, "exp": "All common defects: nails alone (insufficient pull-out), wide bolt spacing, no flashing (rim rot). IRC.", "v": 5}, {"id": 5953, "domain": 1, "task": 2, "topic": "Guard Trigger", "q": "Guardrails are required when walking surface is above grade more than:", "choices": ["36 inches above", "30 inches above", "18 inches above", "12 inches above"], "correct": 1, "exp": "Guards required at >30 in above grade or floor below within 36 in horizontally. Decks, balconies, landings. IRC.", "v": 5}, {"id": 5954, "domain": 1, "task": 2, "topic": "Guard Height", "q": "Residential deck guardrails must be at minimum:", "choices": ["42 inches tall", "36 inches tall", "30 inches tall", "60 inches tall"], "correct": 1, "exp": "Residential guards: 36 in min. Commercial: 42 in. Baluster spacing: 4 in sphere rule. IRC.", "v": 5}, {"id": 5955, "domain": 1, "task": 2, "topic": "Baluster Sphere", "q": "Guardrail balusters must not allow passage of a sphere of:", "choices": ["6 inches diameter", "12 inches diameter", "4 inches diameter", "2 inches diameter"], "correct": 2, "exp": "4 in sphere rule. Prevents children from squeezing through or getting head stuck. IRC.", "v": 5}, {"id": 5956, "domain": 1, "task": 2, "topic": "Handrail Grasp", "q": "A handrail is graspable if it can be:", "choices": ["Held with one hand", "Held with thumb", "Encircled by hand", "Held by gloves"], "correct": 2, "exp": "Fully encircled by hand. Codes specify max diameter (1.25-2 in round) and equivalent perimeters. IRC.", "v": 5}, {"id": 5957, "domain": 1, "task": 2, "topic": "Riser Variation", "q": "Maximum variation in riser height within a single flight is:", "choices": ["1/8 inch maximum", "3/4 inch maximum", "1/2 inch maximum", "3/8 inch maximum"], "correct": 3, "exp": "Riser variation: 3/8 in max within a flight. Same applies to tread depth. Inconsistency causes trips. IRC.", "v": 5}, {"id": 5958, "domain": 1, "task": 2, "topic": "Garage Auto-Reverse", "q": "Garage door opener auto-reverse must activate when:", "choices": ["Door open over hour", "Voice activates it", "Door encounters", "Remote pressed 2x"], "correct": 2, "exp": "Auto-reverse on door encountering resistance during closing. Test: 2x4 flat in path. Required since 1993. UL.", "v": 5}, {"id": 5959, "domain": 1, "task": 2, "topic": "Garage Photoeyes", "q": "Garage door opener photoelectric sensors should be no higher than:", "choices": ["Floor to 24 in", "Floor to 6 in", "Floor to 12 in", "Floor to ceiling"], "correct": 1, "exp": "Photoeyes: ≤6 in above floor. Detect children, pets, objects. Higher mounting allows objects under beam. UL.", "v": 5}, {"id": 5960, "domain": 1, "task": 2, "topic": "Soffit", "q": "The soffit is:", "choices": ["Top siding course", "Underside of eave", "Base of wall", "Vertical roof trim"], "correct": 1, "exp": "Soffit: horizontal underside of roof overhang. Often vented for attic intake. Fascia: vertical edge board. Industry.", "v": 5}, {"id": 5961, "domain": 1, "task": 2, "topic": "Fascia", "q": "The fascia is:", "choices": ["Drainage plane", "Behind soffit board", "Vertical edge board", "Underside of eave"], "correct": 2, "exp": "Fascia: vertical trim board at edge of roof, typically gutter mount. Soffit: horizontal underside. Industry.", "v": 5}, {"id": 5962, "domain": 1, "task": 2, "topic": "Brick Veneer", "q": "A typical residential brick wall is most often:", "choices": ["Solid 12 in mason", "Non-structural ven", "EIFS-style finish", "Structural masonry"], "correct": 1, "exp": "Most modern brick: veneer on wood-framed wall. 1 in air gap, weep holes at base. Don't assume structural. Industry.", "v": 5}, {"id": 5963, "domain": 1, "task": 2, "topic": "Wood-to-Soil", "q": "Wood siding contacting soil grade results in which primary defect risk?", "choices": ["Color fading fast", "Paint adhesion fail", "Looks unsightly old", "Decay/pest entry"], "correct": 3, "exp": "Wood-to-soil: moisture wicking, fungal decay, termite/carpenter ant entry. 6 in clearance min. IRC.", "v": 5}, {"id": 5964, "domain": 1, "task": 6, "topic": "AC Temp Drop", "q": "Normally functioning residential AC produces supply-to-return temperature drop of:", "choices": ["5 to 10°F drop", "Above 40°F drop", "14 to 22°F drop", "25 to 35°F drop"], "correct": 2, "exp": "Normal: 14-22°F supply-return drop. Lower: low refrigerant or airflow issue. Higher: poor airflow. Industry.", "v": 5}, {"id": 5965, "domain": 1, "task": 6, "topic": "AC Cold Test", "q": "AC compressor should not be tested in cooling mode if outdoor was below:", "choices": ["60°F for 24 hr", "32°F for 12 hr", "70°F for 12 hr", "45°F for 12 hr"], "correct": 0, "exp": "<60°F for 24 hr: skip cooling test. Risk: oil migration, compressor slugging on startup. Industry.", "v": 5}, {"id": 5966, "domain": 1, "task": 6, "topic": "Refrig Cycle Drop", "q": "Refrigerant pressure drops from high to low at the:", "choices": ["Compressor inlet", "Evaporator coil", "Expansion device", "Condenser fan"], "correct": 2, "exp": "Expansion device (TXV/cap tube): drops pressure before evaporator. Compressor: low to high gas. Industry.", "v": 5}, {"id": 5967, "domain": 1, "task": 6, "topic": "R-22 Status", "q": "R-22 refrigerant in older AC systems is:", "choices": ["Commercial only", "Readily available", "Phased out (ozone)", "Premium quality"], "correct": 2, "exp": "R-22: phased out (Montreal Protocol, ozone). R-410A/R-454B = modern replacements. R-22 service expensive. EPA.", "v": 5}, {"id": 5968, "domain": 1, "task": 6, "topic": "SEER", "q": "SEER measures HVAC system:", "choices": ["Insulation R-value", "Heating efficiency", "Service amperage", "Cooling efficiency"], "correct": 3, "exp": "SEER (Seasonal Energy Efficiency Ratio): cooling efficiency. Modern min 13-15+, high-eff 18-25+. Industry.", "v": 5}, {"id": 5969, "domain": 1, "task": 6, "topic": "HSPF", "q": "HSPF measures HVAC system:", "choices": ["Service amperage", "Heating efficiency", "Cooling efficiency", "Insulation R-value"], "correct": 1, "exp": "HSPF (Heating Seasonal Performance Factor): heat pump heating efficiency. Modern min 7.7-8.8+. Industry.", "v": 5}, {"id": 5970, "domain": 1, "task": 6, "topic": "AFUE", "q": "AFUE measures HVAC system:", "choices": ["Insulation R-value", "Cooling efficiency", "Furnace efficiency", "Heat pump heating"], "correct": 2, "exp": "AFUE: gas furnace efficiency. Standard 80%, condensing (Cat IV) 90%+. SEER cooling, HSPF heat pump heat. Industry.", "v": 5}, {"id": 5971, "domain": 1, "task": 6, "topic": "Suction Line", "q": "The larger insulated copper line on a split AC is the:", "choices": ["Liquid line warm", "Drain line below", "Discharge line hot", "Suction line cool"], "correct": 3, "exp": "Suction line: larger, insulated, returns cold low-pressure gas to compressor. Liquid line: smaller, warm. Industry.", "v": 5}, {"id": 5972, "domain": 1, "task": 6, "topic": "Compressor Loc", "q": "In a split AC, the compressor is located in the:", "choices": ["Indoor air handler", "Outdoor unit", "Thermostat housing", "Ductwork main"], "correct": 1, "exp": "Compressor: outdoor condensing unit. Indoor (air handler): evaporator coil. Mini-splits and packaged differ. Industry.", "v": 5}, {"id": 5973, "domain": 1, "task": 6, "topic": "AC Disconnect", "q": "An outdoor AC condensing unit must have a service disconnect:", "choices": ["Anywhere accessible", "At breaker only", "Sight, 50 ft", "On unit only"], "correct": 2, "exp": "Within sight AND ≤50 ft of equipment per NEC. Common defect: missing or out-of-sight disconnect. NEC.", "v": 5}, {"id": 5974, "domain": 1, "task": 6, "topic": "Air Handler", "q": "An indoor air handler typically contains:", "choices": ["Blower + coil", "Compressor only", "Outdoor disconnect", "Refrigerant lines"], "correct": 0, "exp": "Air handler: blower + evaporator coil + (often) heat strips/burners. Distributes conditioned air. Industry.", "v": 5}, {"id": 5975, "domain": 1, "task": 6, "topic": "Heat Pump Adds", "q": "A heat pump differs from an AC by adding a:", "choices": ["Reversing valve", "More refrigerant", "Second outdoor unit", "Larger compressor"], "correct": 0, "exp": "Reversing valve: reverses refrigerant flow so indoor coil becomes condenser (heating) instead of evaporator. Industry.", "v": 5}, {"id": 5976, "domain": 1, "task": 6, "topic": "Heat Pump Defrost", "q": "A heat pump defrost cycle:", "choices": ["Shuts off entirely", "Reverses to AC", "Increases blower", "Sprays water on"], "correct": 1, "exp": "Defrost: reversing valve flips, system runs in AC mode briefly, outdoor coil heats and clears ice. Industry.", "v": 5}, {"id": 5977, "domain": 1, "task": 6, "topic": "Mini-Split", "q": "A ductless mini-split system consists of:", "choices": ["Single component", "Ductwork only", "Thermostat only", "Outdoor + indoor"], "correct": 3, "exp": "Mini-split: outdoor + 1+ indoor heads connected by refrigerant lines. No ductwork. Cold-climate models -15°F. Industry.", "v": 5}, {"id": 5978, "domain": 1, "task": 6, "topic": "Condenser Pad", "q": "The pad supporting an outdoor AC unit should be:", "choices": ["Embedded soil", "Sloped to home", "Level, well-drained", "Plywood deck"], "correct": 2, "exp": "Pad: level (compressor needs level for oil distribution), well-drained, supportive. Tilting damages compressor. Industry.", "v": 5}, {"id": 5979, "domain": 1, "task": 6, "topic": "AC Lifespan", "q": "Typical residential AC condensing unit service life is:", "choices": ["5-7 years range", "75-100 years", "30+ years range", "12-20 years range"], "correct": 3, "exp": "12-20 years typical. Coastal saltwater, heavy use, no maintenance shortens. Heat pumps slightly less (year-round). Industry.", "v": 5}, {"id": 5980, "domain": 1, "task": 6, "topic": "Bent Fins", "q": "Bent or matted condenser fins primarily cause:", "choices": ["Restricted airflow", "Indicate failing", "Improved capacity", "No effect found"], "correct": 0, "exp": "Bent fins restrict airflow, reduce capacity/efficiency. Fin comb fixes minor. Severe = coil replace. Industry.", "v": 5}, {"id": 5981, "domain": 1, "task": 6, "topic": "Evap Location", "q": "The evaporator coil in a split system is located:", "choices": ["Refrigerant line", "Disconnect box", "Indoor air handler", "Outdoor unit"], "correct": 2, "exp": "Evaporator: indoor air handler OR A-coil cabinet on top of furnace. Air passes over and is cooled. Industry.", "v": 5}, {"id": 5982, "domain": 1, "task": 6, "topic": "AC Test", "q": "When testing an AC, the inspector typically verifies:", "choices": ["Temp differential", "Outdoor fan/comp", "All of the above", "Operation thermostat"], "correct": 2, "exp": "Verify: thermostat operation, outdoor fan/comp running, supply-return drop, condensate drain, accessible filter. Vol 1.", "v": 5}, {"id": 5983, "domain": 1, "task": 6, "topic": "Condensate Clog", "q": "An AC condensate drain that is clogged or overflows can:", "choices": ["Have no effect", "Damage equipment", "Prevent corrosion", "Improve cooling"], "correct": 1, "exp": "Clogged: overflows damage equipment, ceiling, walls below air handler. Float switch shuts off if installed. Vol 1.", "v": 5}, {"id": 5984, "domain": 1, "task": 11, "topic": "Stair Riser Max", "q": "Maximum riser height for residential stairs is:", "choices": ["6 inches max", "8-1/4 inches max", "7-3/4 inches max", "7 inches max"], "correct": 2, "exp": "Max riser 7-3/4 in. Min tread 10 in. Defines comfortable/safe geometry. Old homes may not comply. IRC.", "v": 5}, {"id": 5985, "domain": 1, "task": 11, "topic": "Stair Tread Min", "q": "Minimum tread depth for residential stairs is:", "choices": ["10 inches min", "9 inches min", "12 inches min", "8 inches min"], "correct": 0, "exp": "Min tread 10 in. Max riser 7-3/4 in. IRC residential. Old homes may have 8-9 in (defect for new). IRC.", "v": 5}, {"id": 5986, "domain": 1, "task": 11, "topic": "Stair Headroom", "q": "Minimum headroom for stairs is:", "choices": ["6 ft 8 inches", "6 ft 0 inches", "7 ft 6 inches", "7 ft 0 inches"], "correct": 0, "exp": "Stair headroom: 6'8\" min, measured from sloped line connecting tread nosings. Common finished-basement defect. IRC.", "v": 5}, {"id": 5987, "domain": 1, "task": 11, "topic": "Anti-Tip", "q": "An anti-tip bracket is required for which appliance?", "choices": ["Dishwasher unit", "Refrigerator unit", "Microwave hood", "Free-standing range"], "correct": 3, "exp": "Anti-tip required on free-standing ranges. Prevents tipping if child climbs or weight on open door. Mfr.", "v": 5}, {"id": 5988, "domain": 1, "task": 11, "topic": "Bedroom Egress", "q": "Bedroom egress door hardware should be operable from inside:", "choices": ["With tools provided", "Special knowledge", "Without keys/tools", "With key always"], "correct": 2, "exp": "Operable without keys, tools, or special knowledge from inside. Single-cyl deadbolt OK. IRC.", "v": 5}, {"id": 5989, "domain": 1, "task": 11, "topic": "Egress Sill", "q": "Maximum sill height of an egress window above bedroom floor is:", "choices": ["36 inches max", "24 inches max", "60 inches max", "44 inches max"], "correct": 3, "exp": "Max sill: 44 in above floor. Net clear: 5.7 sq ft, 24 in tall, 20 in wide. All required. IRC.", "v": 5}, {"id": 5990, "domain": 1, "task": 11, "topic": "Failed IGU", "q": "An insulating glass unit (IGU) seal failure presents as:", "choices": ["Discolored grids", "Visible cracks", "Fogging between", "Soft glass feel"], "correct": 2, "exp": "Failed IGU: moisture between panes, can't be cleaned, replace only. Visible as fog or mineral deposits. Industry.", "v": 5}, {"id": 5991, "domain": 1, "task": 11, "topic": "Drywall Crack", "q": "Cracks in interior drywall can be caused by:", "choices": ["Settlement events", "All of the above", "Seasonal movement", "Truss uplift"], "correct": 1, "exp": "Drywall cracks: normal movement, settlement (diagonal at openings), truss uplift (top of interior wall winter). Vol 2.", "v": 5}, {"id": 5992, "domain": 1, "task": 11, "topic": "Floor Squeak", "q": "Floor squeaks are typically caused by:", "choices": ["Major structural", "Foundation failure", "Loose subfloor", "Termite damage"], "correct": 2, "exp": "Squeaks: loose subfloor (nails working out), wood-on-wood movement. Cosmetic in most cases. Vol 2.", "v": 5}, {"id": 5993, "domain": 1, "task": 11, "topic": "Mold Visible", "q": "Visible mold in interior spaces should be:", "choices": ["Not mentioned", "Irrelevant data", "Reported, source", "Always toxic"], "correct": 2, "exp": "Visible mold: report as defect, recommend moisture source identification, recommend qualified eval/remediation. Vol 1.", "v": 5}, {"id": 5994, "domain": 1, "task": 11, "topic": "Handrail Required", "q": "A handrail is required on stairs with:", "choices": ["Less than 3 ris", "Only basement", "4 or more ris", "All stairs reg"], "correct": 2, "exp": "Handrail required: 4 or more risers (one continuous on at least one side). Modern code: graspable, 34-38 in. IRC.", "v": 5}, {"id": 5995, "domain": 1, "task": 11, "topic": "Cabinet Securing", "q": "Wall cabinets should be secured into the wall using:", "choices": ["Screws into stud", "Finish nails dry", "Drywall anchors", "Adhesive only used"], "correct": 0, "exp": "Cabinet/wood screws into wall studs. Drywall anchors alone can't support loaded cabinets. DIY common defect. Mfr.", "v": 5}, {"id": 5996, "domain": 1, "task": 11, "topic": "Smart Home Limit", "q": "When inspecting a smart home, the inspector should:", "choices": ["Test all features", "Avoid all electronics", "Limit, disclaim deeper", "Inspect all features"], "correct": 2, "exp": "Smart home: visible inspection only. Disclaim app/network/AI evaluation. Smart features change rapidly. SOP.", "v": 5}, {"id": 5997, "domain": 1, "task": 11, "topic": "Dishwasher Air Gap", "q": "A dishwasher discharge typically requires:", "choices": ["Additional pump", "Direct disposal", "No special prov", "High loop or AG"], "correct": 3, "exp": "High loop above counter OR air gap fitting on counter. Prevents backflow into dishwasher. IRC/IPC.", "v": 5}, {"id": 5998, "domain": 1, "task": 11, "topic": "Spa Tub Access", "q": "Minimum spa tub access panel opening size is:", "choices": ["24 by 16 inches", "12 by 12 inches", "18 by 18 inches", "15 by 21 inches"], "correct": 1, "exp": "12 x 12 min. 18 x 18 if pump >2 ft from opening. Different from crawl access (18 x 24) or bath fixture clearances. IRC.", "v": 5}, {"id": 5999, "domain": 2, "task": 1, "topic": "Report Purpose", "q": "The primary purpose of a home inspection report is to:", "choices": ["Insure the property", "Document conditions", "Predict future events", "Quote repair costs"], "correct": 1, "exp": "Document conditions observed at time of inspection. Not estimating, not predicting, not guaranteeing. SOP.", "v": 5}, {"id": 6000, "domain": 2, "task": 1, "topic": "Report Scope", "q": "A home inspection report's scope is best described as:", "choices": ["Visual non-invasive", "Forensic level look", "Code compliance", "Exhaustive analysis"], "correct": 0, "exp": "Visual, non-invasive inspection of accessible components. Not code, not forensic, not destructive. SOP.", "v": 5}, {"id": 6001, "domain": 2, "task": 1, "topic": "What Inspected", "q": "A home inspection report should clearly identify:", "choices": ["Inspected systems", "Code violations only", "Hidden defects", "Future repair costs"], "correct": 0, "exp": "Identify what WAS inspected (and what wasn't). Reader needs to know scope of evaluation. SOP.", "v": 5}, {"id": 6002, "domain": 2, "task": 1, "topic": "What Excluded", "q": "A home inspection report should clearly identify items that were:", "choices": ["Excluded from scope", "Future repair costs", "Hidden defects only", "Code violations only"], "correct": 0, "exp": "State exclusions explicitly: snow-covered roof, full attic not entered, locked rooms, etc. SOP.", "v": 5}, {"id": 6003, "domain": 2, "task": 1, "topic": "System Description", "q": "A typical 'system description' in a report identifies:", "choices": ["Date of last service", "Hidden defects only", "Future repair cost", "Materials and types"], "correct": 3, "exp": "Describe materials, types, configuration. Example: 'Forced-air gas furnace, induced draft, Cat I venting.' SOP.", "v": 5}, {"id": 6004, "domain": 2, "task": 1, "topic": "Date and Time", "q": "Inspection reports should clearly document:", "choices": ["Date and weather", "Future repair cost", "Owner's emotion", "Future market value"], "correct": 0, "exp": "Date, time, weather. Conditions affect what was visible (snow, rain, freezing temps). SOP.", "v": 5}, {"id": 6005, "domain": 2, "task": 1, "topic": "Client Identified", "q": "A home inspection report should identify the:", "choices": ["Future repair cost", "Client (whose report)", "Past sale price", "Hidden defects only"], "correct": 1, "exp": "Client name (the contracted party). Determines who receives report and disclosure obligations. SOP.", "v": 5}, {"id": 6006, "domain": 2, "task": 1, "topic": "Property Identified", "q": "Property identification in a report typically includes:", "choices": ["Address and type", "Future repair cost", "Date of last sale", "Owner's emotion"], "correct": 0, "exp": "Address and property type (SFR, multi-family, etc). Avoids confusion with similar inspections. SOP.", "v": 5}, {"id": 6007, "domain": 2, "task": 1, "topic": "Inspector Identified", "q": "Inspector identification in a report typically includes:", "choices": ["Past sale price", "Future repair cost", "Owner's emotion", "Name and license"], "correct": 3, "exp": "Inspector name, license number (where required), and contact info. Required for accountability. SOP.", "v": 5}, {"id": 6008, "domain": 2, "task": 1, "topic": "Photo Use", "q": "Photos in inspection reports primarily serve to:", "choices": ["Document defects", "Quote repair cost", "Add page count", "Predict events"], "correct": 0, "exp": "Document conditions for client (and inspector record). Show defect location/character. Industry.", "v": 5}, {"id": 6009, "domain": 2, "task": 1, "topic": "Tone Reporting", "q": "The tone of a home inspection report should be:", "choices": ["Casual humorous", "Factual, neutral", "Promotional brand", "Alarmist for sales"], "correct": 1, "exp": "Factual, neutral, professional. Alarmist or dismissive both create liability. SOP.", "v": 5}, {"id": 6010, "domain": 2, "task": 1, "topic": "Definition Defect", "q": "An inspection report 'defect' is best defined as:", "choices": ["Owner's preference", "Future cost issue", "Cosmetic flaw only", "Material adverse"], "correct": 3, "exp": "Materially adverse to function/safety/durability. Differentiates from cosmetic and preference items. SOP.", "v": 5}, {"id": 6011, "domain": 2, "task": 1, "topic": "Maintenance Item", "q": "A 'maintenance' item in a report differs from a 'defect' by being:", "choices": ["Routine task", "Hidden from view", "Bigger problem", "More expensive"], "correct": 0, "exp": "Maintenance: routine task (caulk, paint, clean filter). Defect: material adverse condition. Both reportable. SOP.", "v": 5}, {"id": 6012, "domain": 2, "task": 1, "topic": "Cosmetic", "q": "A cosmetic issue in a report:", "choices": ["Doesn't affect", "Always defective", "Material in scope", "Hidden by paint"], "correct": 0, "exp": "Cosmetic doesn't affect function/safety/durability. Outside scope but may be noted at inspector's discretion. SOP.", "v": 5}, {"id": 6013, "domain": 2, "task": 1, "topic": "Standard Out", "q": "An inspection 'standard' (SOP) primarily defines:", "choices": ["Minimum scope", "Past sale price", "Owner emotion", "Future repair cost"], "correct": 0, "exp": "Standards of Practice define minimum scope of work and reporting. Set client expectations. ASHI/InterNACHI.", "v": 5}, {"id": 6014, "domain": 2, "task": 1, "topic": "Inspection Agreement", "q": "The inspection agreement should be executed:", "choices": ["After report", "Mid-inspection", "After repair", "Before inspection"], "correct": 3, "exp": "Pre-inspection agreement signed BEFORE work begins. Defines scope, fee, limits, dispute resolution. Vol 1.", "v": 5}, {"id": 6015, "domain": 2, "task": 2, "topic": "Snow Roof", "q": "If snow covers the roof at inspection time, the inspector should:", "choices": ["Estimate condition", "Walk on snow", "Disclaim, document", "Refuse client work"], "correct": 2, "exp": "Disclaim: limitations clearly stated, document weather, recommend re-inspection when conditions allow. Vol 1.", "v": 5}, {"id": 6016, "domain": 2, "task": 2, "topic": "Locked Room", "q": "An inaccessible (locked) room during inspection should be:", "choices": ["Estimated condition", "Disclaimed clearly", "Entered with force", "Reported as fail"], "correct": 1, "exp": "Disclaim: room not inspected. Don't force entry. Recommend client confirm access for re-inspection. SOP.", "v": 5}, {"id": 6017, "domain": 2, "task": 2, "topic": "Vacant Utility", "q": "If utilities (water, gas, power) are off at inspection, the inspector should:", "choices": ["Disclaim affected", "Turn them on", "Estimate function", "Refuse the job"], "correct": 0, "exp": "Disclaim affected systems clearly. Don't turn on utilities (liability). Recommend re-inspection or seller activation. SOP.", "v": 5}, {"id": 6018, "domain": 2, "task": 2, "topic": "Hidden Component", "q": "Components hidden by furniture, storage, or finishes should be:", "choices": ["Estimated condition", "Reported as fail", "Disclaimed clearly", "Moved by inspector"], "correct": 2, "exp": "Inspector doesn't move belongings. Disclaim what couldn't be seen. Recommend client follow-up if concerned. SOP.", "v": 5}, {"id": 6019, "domain": 2, "task": 2, "topic": "Buried Utilities", "q": "Buried (underground) components like septic and sewer service should be:", "choices": ["Excavated for view", "Estimated function", "Out of scope", "Reported as fail"], "correct": 2, "exp": "Buried components: typically out of scope. Specialty inspections (sewer scope, septic) recommended. SOP.", "v": 5}, {"id": 6020, "domain": 2, "task": 2, "topic": "Code Comp Limit", "q": "Standard home inspections do NOT include:", "choices": ["Defect documenting", "System functioning", "Code compliance", "Inspector liab"], "correct": 2, "exp": "Code compliance is NOT in standard scope. Inspector references current standards but doesn't 'pass/fail' code. SOP.", "v": 5}, {"id": 6021, "domain": 2, "task": 2, "topic": "Specialty Limit", "q": "Standard home inspections do NOT include specialty inspections such as:", "choices": ["Septic, well, pool", "Inspector liab", "Visible defects", "System functioning"], "correct": 0, "exp": "Septic, well, pool, mold, radon, lead, asbestos: out of standard scope. Available as add-ons or specialty. SOP.", "v": 5}, {"id": 6022, "domain": 2, "task": 2, "topic": "Cosmetic Limit", "q": "Standard home inspections do NOT typically rate:", "choices": ["Safety issues", "Cosmetic finishes", "Functional items", "Major defects"], "correct": 1, "exp": "Cosmetic finishes outside scope. Note major issues but don't rate paint, finish wear, decor. SOP.", "v": 5}, {"id": 6023, "domain": 2, "task": 2, "topic": "Future Predict", "q": "Inspectors do NOT predict:", "choices": ["Material adverse", "Future failures", "Visible defects", "Current condition"], "correct": 1, "exp": "No prediction of future failures. State current condition. 'End-of-life' observations note approaching age limits. SOP.", "v": 5}, {"id": 6024, "domain": 2, "task": 2, "topic": "Estimate Cost", "q": "Inspectors typically do NOT provide:", "choices": ["Repair cost estimates", "Defect descriptions", "Visible findings", "Photo documentation"], "correct": 0, "exp": "Repair cost estimates outside standard scope. Recommend qualified contractor estimates. SOP.", "v": 5}, {"id": 6025, "domain": 2, "task": 2, "topic": "Listed Limits", "q": "Standard report should include a list of:", "choices": ["Visible defects", "Photo locations", "Inspection limits", "Defect priorities"], "correct": 2, "exp": "Limits/exclusions clearly listed. Sets expectations and protects against 'why didn't you find...' claims. SOP.", "v": 5}, {"id": 6026, "domain": 2, "task": 2, "topic": "Insulation Hides", "q": "Attic insulation that hides ceiling joists and components requires the inspector to:", "choices": ["Refuse the job", "Disclaim affected", "Estimate condition", "Remove insulation"], "correct": 1, "exp": "Disclaim what's hidden. Don't disturb insulation (may damage vapor retarder, can't restore). SOP.", "v": 5}, {"id": 6027, "domain": 2, "task": 2, "topic": "Crawl Inaccessible", "q": "If a crawl space cannot be safely entered, the inspector should:", "choices": ["Force the entry", "Skip the job", "Estimate condition", "Disclaim, document"], "correct": 3, "exp": "Disclaim: state reason not entered (height, water, hazard, no access). Visual from opening only. SOP.", "v": 5}, {"id": 6028, "domain": 2, "task": 2, "topic": "Steep Roof Limit", "q": "An inspector who can't safely walk a steep roof should:", "choices": ["Refuse the job", "Estimate condition", "Climb anyway", "Disclaim, eaves"], "correct": 3, "exp": "Disclaim: walk or eaves only. Use binoculars, drone (if certified), or note from windows below. Document. SOP.", "v": 5}, {"id": 6029, "domain": 2, "task": 2, "topic": "Equipment Off", "q": "Equipment that wasn't operating at inspection (e.g., off-season AC) should be:", "choices": ["Reported as fail", "Disclaimed clearly", "Forced into op", "Estimated function"], "correct": 1, "exp": "Disclaim: AC <60°F outdoor for 24 hr (don't operate). Heat in hot weather may not test. Document conditions. SOP.", "v": 5}, {"id": 6030, "domain": 2, "task": 2, "topic": "Asbestos Limit", "q": "Asbestos identification typically requires:", "choices": ["Owner statement", "Lab analysis", "No identification", "Visual ID only"], "correct": 1, "exp": "Lab analysis required for definitive ID. Inspector can note 'suspect' materials and recommend testing. EPA.", "v": 5}, {"id": 6031, "domain": 2, "task": 2, "topic": "Mold Limit", "q": "Visible mold-like growth identification typically requires:", "choices": ["Visual ID only", "Lab analysis", "No identification", "Owner statement"], "correct": 1, "exp": "Inspector notes 'mold-like' growth. Definitive identification (genus/species) requires lab. Recommend specialist. EPA.", "v": 5}, {"id": 6032, "domain": 2, "task": 3, "topic": "Defect Format", "q": "A defect description in an inspection report should include:", "choices": ["Owner's emotion", "Past sale price", "Location, finding", "Future cost data"], "correct": 2, "exp": "Effective: location, finding, implication, recommendation. Brief, specific, factual. SOP.", "v": 5}, {"id": 6033, "domain": 2, "task": 3, "topic": "Specific Photos", "q": "Defect photos should:", "choices": ["Show defect close", "Show whole house", "Use filters added", "Be all decorative"], "correct": 0, "exp": "Photos show defect close enough to identify. Wider photo for context can supplement. Industry.", "v": 5}, {"id": 6034, "domain": 2, "task": 3, "topic": "Defect Priority", "q": "Most reports prioritize defects by:", "choices": ["Random listing", "Photo quality", "Alphabet order", "Severity/safety"], "correct": 3, "exp": "Severity: safety > major > minor > maintenance. Helps client focus. Some reports use color codes. Industry.", "v": 5}, {"id": 6035, "domain": 2, "task": 3, "topic": "Safety Item", "q": "A 'safety' defect in a report is best described as:", "choices": ["Owner emotion", "Imminent harm", "Cosmetic flaw", "Future event"], "correct": 1, "exp": "Safety: imminent or potential harm to occupants. Highest priority (life safety). Always reported. SOP.", "v": 5}, {"id": 6036, "domain": 2, "task": 3, "topic": "Major Defect", "q": "A 'major' defect in a report is best described as:", "choices": ["Owner emotion", "Routine task", "Cosmetic flaw", "Significant cost"], "correct": 3, "exp": "Major: significant cost or function. Differentiated from minor (small cost) and maintenance (routine). SOP.", "v": 5}, {"id": 6037, "domain": 2, "task": 3, "topic": "Defect Implication", "q": "A defect description benefits from including:", "choices": ["Owner's emotion", "Implication risk", "Future cost data", "Past sale price"], "correct": 1, "exp": "Implication: 'May allow water intrusion' or 'Creates shock hazard' helps client understand why it matters. Industry.", "v": 5}, {"id": 6038, "domain": 2, "task": 3, "topic": "Recommendation", "q": "A defect description benefits from including a recommendation such as:", "choices": ["Qualified specialist", "Owner emotion", "Cosmetic touch-up", "Future cost data"], "correct": 0, "exp": "Recommendation: qualified specialist (electrician, plumber, structural). Don't recommend yourself. SOP.", "v": 5}, {"id": 6039, "domain": 2, "task": 3, "topic": "Vague Defect", "q": "A defect description like 'electrical issue' is generally:", "choices": ["Most professional", "Industry standard", "Specific enough", "Too vague clear"], "correct": 3, "exp": "Too vague. Specify: open ground at receptacle, double-tap at panel, missing GFCI at sink, etc. Industry.", "v": 5}, {"id": 6040, "domain": 2, "task": 3, "topic": "Specific Location", "q": "A defect description should specify location using:", "choices": ["Specific room/wall", "Owner's term", "Random direction", "Real estate term"], "correct": 0, "exp": "Specific room and location: 'NE bedroom, exterior wall outlet.' Allows verification and correction. Industry.", "v": 5}, {"id": 6041, "domain": 2, "task": 3, "topic": "Multiple Defects", "q": "If a defect appears in multiple locations, the report should:", "choices": ["Random selection", "Note all locations", "Average severity", "Note one only"], "correct": 1, "exp": "Note all locations. 'Loose railing balusters at 3 stair stretches' or list each. Allows complete repair. Industry.", "v": 5}, {"id": 6042, "domain": 2, "task": 3, "topic": "Subjective Term", "q": "Subjective terms like 'old' or 'ugly' should be:", "choices": ["Avoided clearly", "Used freely", "Industry stand", "Required tone"], "correct": 0, "exp": "Avoid subjective. State observable: 'Visible deterioration' or 'Approaching end-of-service-life.' Industry.", "v": 5}, {"id": 6043, "domain": 2, "task": 3, "topic": "Cause vs Symptom", "q": "If you observe water staining on a ceiling, you should report:", "choices": ["Owner emotion", "Future failure", "Symptom observed", "Cause assumed"], "correct": 2, "exp": "Report symptom: 'Water staining at NE bedroom ceiling.' Note cause IF determinable. Recommend eval if not. Vol 1.", "v": 5}, {"id": 6044, "domain": 2, "task": 3, "topic": "Multiple Causes", "q": "Water staining on a ceiling can have which cause(s)?", "choices": ["Plumbing leak only", "Any of the above", "Roof leak only", "Condensation only"], "correct": 1, "exp": "Causes: roof leak, plumbing, condensation, ice dam, AC condensate. Inspector identifies if visible; recommends eval if not. Vol 1.", "v": 5}, {"id": 6045, "domain": 2, "task": 3, "topic": "Inspector Repair", "q": "If you're asked by client to repair a defect found, you should:", "choices": ["Refuse all work", "Decline conflict", "Repair free", "Repair for fee"], "correct": 1, "exp": "Decline: conflict of interest. Cannot inspect and repair same property. Recommend qualified contractor. SOP.", "v": 5}, {"id": 6046, "domain": 2, "task": 3, "topic": "Common Defect", "q": "Common defects in older Milwaukee homes include all EXCEPT:", "choices": ["Aluminum wire", "Modern PEX water", "Knob-and-tube", "Cast iron drains"], "correct": 1, "exp": "Modern PEX = not a defect. K&T, Al wire 1965-73, cast iron drains, lead service: common older home defects. Vol 1.", "v": 5}, {"id": 6047, "domain": 2, "task": 3, "topic": "Defect Severity", "q": "When unsure about severity of a defect, the inspector should:", "choices": ["Recommend eval", "Ignore unknown", "Estimate cost", "Predict future"], "correct": 0, "exp": "Recommend qualified eval for items beyond inspector scope or where severity is unclear. Protects client and inspector. SOP.", "v": 5}, {"id": 6048, "domain": 2, "task": 4, "topic": "Further Eval", "q": "'Further evaluation' in a report means:", "choices": ["Future inspect", "Specialist eval", "Inspector returns", "Buyer review"], "correct": 1, "exp": "Recommend qualified specialist evaluation (engineer, electrician, plumber, etc) where issue exceeds inspector scope. SOP.", "v": 5}, {"id": 6049, "domain": 2, "task": 4, "topic": "Engineer Refer", "q": "Recommendation for structural engineer evaluation is appropriate when:", "choices": ["Cosmetic crack", "Movement structure", "Owner asks", "Color faded"], "correct": 1, "exp": "Structural movement (sag, bow, settlement, large cracks) exceeds inspector scope. Engineer designs solution. SOP.", "v": 5}, {"id": 6050, "domain": 2, "task": 4, "topic": "Roofer Refer", "q": "Recommendation for roofing contractor evaluation is appropriate when:", "choices": ["Owner asks", "Roof spotless", "Cosmetic only", "End-of-life"], "correct": 3, "exp": "End-of-service-life roof, hail damage, leaks: roofer best determines repair vs. replace and provides estimate. SOP.", "v": 5}, {"id": 6051, "domain": 2, "task": 4, "topic": "Electrician Refer", "q": "Recommendation for electrician evaluation is appropriate when:", "choices": ["FPE/Zinsco", "Owner asks", "Modern panel", "Cover only fits"], "correct": 0, "exp": "FPE/Zinsco panels, K&T wiring, aluminum branch wiring, scorching at panel: warrant electrician evaluation. SOP.", "v": 5}, {"id": 6052, "domain": 2, "task": 4, "topic": "Plumber Refer", "q": "Recommendation for plumber evaluation is appropriate when:", "choices": ["Owner asks", "Cover only fits", "PB or galv", "Modern pipe"], "correct": 2, "exp": "Polybutylene, galvanized at end-of-life, lead service: warrant plumber evaluation/replacement. SOP.", "v": 5}, {"id": 6053, "domain": 2, "task": 4, "topic": "HVAC Refer", "q": "Recommendation for HVAC contractor evaluation is appropriate when:", "choices": ["Cracked HX", "Owner asks", "Filter clean", "Newly serviced"], "correct": 0, "exp": "Cracked HX, end-of-life equipment, suspected refrigerant issue: warrant HVAC contractor evaluation. SOP.", "v": 5}, {"id": 6054, "domain": 2, "task": 4, "topic": "Sewer Scope Refer", "q": "Recommendation for sewer scope is appropriate when:", "choices": ["Owner asks", "Older home buy", "New construct", "Vacation home"], "correct": 1, "exp": "Older homes (cast iron, clay, Orangeburg): scope reveals scaling, cracks, root intrusion, bellies. Common Mil add-on. Industry.", "v": 5}, {"id": 6055, "domain": 2, "task": 4, "topic": "Radon Test Recommend", "q": "Radon testing recommendation is appropriate:", "choices": ["Never required", "Hot climates only", "Always recommend", "Owner asks"], "correct": 2, "exp": "All homes recommended (EPA). WI is high-radon zone. 48-hr canister or continuous monitor. Industry.", "v": 5}, {"id": 6056, "domain": 2, "task": 4, "topic": "Mold Test Refer", "q": "Specialist mold testing is appropriate when:", "choices": ["Cosmetic stain", "Genus/species", "Visual is enough", "Owner asks"], "correct": 1, "exp": "Visual identification suffices for 'mold-like' reporting. Lab/specialist provides genus/species/concentration. Industry.", "v": 5}, {"id": 6057, "domain": 2, "task": 4, "topic": "Asbestos Refer", "q": "Recommendation for asbestos testing is appropriate:", "choices": ["Owner asks", "Pre-1980 home", "Modern homes", "Hot climates"], "correct": 1, "exp": "Pre-1980 homes likely contain ACM (vermiculite, pipe wrap, floor tile, mastic). Test before disturbing. EPA.", "v": 5}, {"id": 6058, "domain": 2, "task": 4, "topic": "Lead Test Refer", "q": "Recommendation for lead testing is appropriate:", "choices": ["Hot climates", "Owner asks", "Pre-1978 home", "Modern homes"], "correct": 2, "exp": "Pre-1978 homes likely contain lead paint (banned 1978). Recommend testing if children present or renovation. EPA.", "v": 5}, {"id": 6059, "domain": 2, "task": 4, "topic": "Wood Pest Refer", "q": "Recommendation for wood-destroying pest inspection is appropriate when:", "choices": ["New construct", "Required local", "Visual evidence", "Owner asks"], "correct": 2, "exp": "Visual evidence (mud tubes, frass, damage), location with high termite activity, lender requirement. Specialist. Industry.", "v": 5}, {"id": 6060, "domain": 2, "task": 4, "topic": "Septic Refer", "q": "Recommendation for septic specialist evaluation is appropriate when:", "choices": ["Owner asks", "City sewer", "Septic system", "No bathrooms"], "correct": 2, "exp": "Septic systems: pumping, locating tank, dye test, soil eval are specialist work. Standard inspection: visible only. Industry.", "v": 5}, {"id": 6061, "domain": 2, "task": 4, "topic": "Well Refer", "q": "Recommendation for well water specialist evaluation is appropriate when:", "choices": ["Owner asks", "No bathrooms", "City water", "Private well"], "correct": 3, "exp": "Private well: water quality testing, flow rate, pressure tank, pump operation. Standard scope: visible only. Industry.", "v": 5}, {"id": 6062, "domain": 2, "task": 4, "topic": "Pool Refer", "q": "Recommendation for pool/spa specialist evaluation is appropriate when:", "choices": ["Pool covered", "Owner asks", "No pool exists", "Pool present"], "correct": 3, "exp": "Pool/spa: equipment, leaks, safety barriers, electrical bonding. Specialist if not in inspector's scope. Industry.", "v": 5}, {"id": 6063, "domain": 2, "task": 4, "topic": "Chimney Sweep Refer", "q": "Recommendation for CSIA-certified chimney sweep evaluation is appropriate:", "choices": ["Each transfer", "Owner asks", "Modern furnace", "Sweep last week"], "correct": 0, "exp": "Each property transfer (NFPA 211 Level 2). Sweeps perform internal/camera inspection beyond visual. Industry.", "v": 5}, {"id": 6064, "domain": 3, "task": 1, "topic": "Agreement Timing", "q": "A pre-inspection agreement should be executed:", "choices": ["After report sent", "Before inspection", "After repairs", "After payment"], "correct": 1, "exp": "Before work starts. Defines scope, fee, limits, dispute resolution before client receives report. Vol 1.", "v": 5}, {"id": 6065, "domain": 3, "task": 1, "topic": "Agreement Purpose", "q": "The primary purpose of a pre-inspection agreement is to:", "choices": ["Define scope/limits", "Predict events", "Quote repair cost", "Avoid all liability"], "correct": 0, "exp": "Define scope, limits, fees, dispute resolution. Sets expectations. Some legal protection. Vol 1.", "v": 5}, {"id": 6066, "domain": 3, "task": 1, "topic": "Agreement Defines", "q": "A pre-inspection agreement typically includes definition of:", "choices": ["Scope of work", "Past sale price", "Future cost data", "Owner's emotion"], "correct": 0, "exp": "Defines scope (what's inspected/excluded), fee, dispute resolution, liability limits. Industry.", "v": 5}, {"id": 6067, "domain": 3, "task": 1, "topic": "Agreement Excl", "q": "A pre-inspection agreement should clearly identify:", "choices": ["Past sale price", "Excluded items", "Future repair cost", "Owner's emotion"], "correct": 1, "exp": "Exclusions clearly stated: specialty (mold, radon, septic), code, hidden, decorative. Sets expectations. Industry.", "v": 5}, {"id": 6068, "domain": 3, "task": 1, "topic": "Agreement Fee", "q": "A pre-inspection agreement should clearly identify the:", "choices": ["Fee for service", "Owner's emotion", "Past sale price", "Future repair cost"], "correct": 0, "exp": "Fee for inspection services. Add-ons (radon, mold) typically separate line items. Industry.", "v": 5}, {"id": 6069, "domain": 3, "task": 1, "topic": "Agreement Disp", "q": "A pre-inspection agreement typically includes a dispute resolution process such as:", "choices": ["Owner's choice", "Future events", "Lawsuit only", "Arbitration/medi"], "correct": 3, "exp": "Arbitration or mediation. Limits expensive litigation. Some include liability cap (often inspection fee). Industry.", "v": 5}, {"id": 6070, "domain": 3, "task": 1, "topic": "Liability Cap", "q": "A common liability cap in inspection agreements is:", "choices": ["Inspection fee", "Property value", "Unlimited liab", "Million dollars"], "correct": 0, "exp": "Many cap at inspection fee. Enforceability varies by state (WI: enforced; others: void). Have lawyer review. Industry.", "v": 5}, {"id": 6071, "domain": 3, "task": 1, "topic": "Verbal Agreement", "q": "An inspection agreed to verbally without written contract is:", "choices": ["Always enforceable", "Required by codes", "Standard practice", "Risky for inspector"], "correct": 3, "exp": "Risky: no scope definition, no liability limits, no dispute process. Always written agreement. Industry.", "v": 5}, {"id": 6072, "domain": 3, "task": 1, "topic": "Client Signed", "q": "A pre-inspection agreement should be signed by the:", "choices": ["Property owner", "Inspector only", "Client and insp", "Real estate agent"], "correct": 2, "exp": "Client (the contracted party) and inspector. Sometimes owner if different from buyer-client. Industry.", "v": 5}, {"id": 6073, "domain": 3, "task": 1, "topic": "Email vs Paper", "q": "A pre-inspection agreement signed electronically (DocuSign, etc.) is:", "choices": ["Required by codes", "Not enforceable", "Decorative use", "Generally fine"], "correct": 3, "exp": "Generally enforceable per ESIGN/UETA. Some states require paper for specific topics (rare for inspections). Industry.", "v": 5}, {"id": 6074, "domain": 3, "task": 1, "topic": "Add-Ons Sep", "q": "Add-on services (radon, mold) in an agreement should be:", "choices": ["Bundled hidden", "Separately listed", "Required all clients", "Free always"], "correct": 1, "exp": "Separately listed: scope, fee, lab process, results timing. Distinct from inspection. Manages expectations. Industry.", "v": 5}, {"id": 6075, "domain": 3, "task": 1, "topic": "State License", "q": "If a state requires inspector licensing, the inspector's license number should:", "choices": ["Be on report only", "Be on website only", "Be on agreement", "Be hidden away"], "correct": 2, "exp": "Required on agreement and report. Allows verification by client and regulatory body. State-specific.", "v": 5}, {"id": 6076, "domain": 3, "task": 1, "topic": "Client ID", "q": "A pre-inspection agreement should clearly identify the:", "choices": ["Future cost data", "Owner's emotion", "Past sale price", "Client (contracting)"], "correct": 3, "exp": "Client name (contracting party). Determines who receives report and disclosure obligations. Industry.", "v": 5}, {"id": 6077, "domain": 3, "task": 1, "topic": "Property ID", "q": "A pre-inspection agreement should clearly identify the:", "choices": ["Future cost data", "Past sale price", "Property address", "Owner's emotion"], "correct": 2, "exp": "Property address. Avoids confusion with similar inspections, links agreement to inspection. Industry.", "v": 5}, {"id": 6078, "domain": 3, "task": 1, "topic": "Defect Limits", "q": "A pre-inspection agreement should typically clarify that the inspection:", "choices": ["Predicts future", "Replaces survey", "Visual non-invasive", "Finds all defects"], "correct": 2, "exp": "Visual, non-invasive. NOT exhaustive. Sets reasonable expectation that hidden defects may exist. Industry.", "v": 5}, {"id": 6079, "domain": 3, "task": 2, "topic": "Conflict Repair", "q": "An inspector who repairs items they inspected creates:", "choices": ["Conflict interest", "Better service", "Required practice", "Premium offering"], "correct": 0, "exp": "Conflict of interest: incentive to find work for self. Most SOPs prohibit. Recommend qualified contractor. SOP.", "v": 5}, {"id": 6080, "domain": 3, "task": 2, "topic": "Conflict Buy", "q": "An inspector who inspects a property they're buying creates:", "choices": ["Premium offering", "Better deal", "Required practice", "Conflict interest"], "correct": 3, "exp": "Major conflict: incentive to under-report. Disclose conflict and recommend independent inspector. SOP.", "v": 5}, {"id": 6081, "domain": 3, "task": 2, "topic": "Confidentiality", "q": "Inspection findings should be shared with:", "choices": ["Listing agent", "Public web", "Anyone asking", "Client only"], "correct": 3, "exp": "Client only (the contracting party). Without written client permission, don't share with agents/sellers/others. SOP.", "v": 5}, {"id": 6082, "domain": 3, "task": 2, "topic": "Buyer's Agent", "q": "An inspector's responsibility is primarily to:", "choices": ["The buyer agent", "Property owner", "The inspect client", "Listing agent"], "correct": 2, "exp": "Client (contracting party). Buyer's agent is conduit, not the client. Independence required. SOP.", "v": 5}, {"id": 6083, "domain": 3, "task": 2, "topic": "Kickback Decline", "q": "An offer of kickback from a contractor for referrals should be:", "choices": ["Quietly accept", "Accept secretly", "Decline disclose", "Negotiate higher"], "correct": 2, "exp": "Decline: conflict of interest. Some states require disclosure. Damages independence and credibility. SOP.", "v": 5}, {"id": 6084, "domain": 3, "task": 2, "topic": "Referral Disclose", "q": "If an inspector accepts referral fees from contractors, the inspector should:", "choices": ["Always refuse", "Hide arrangement", "Disclose to client", "Always accept"], "correct": 2, "exp": "Disclose if accepted. Some states prohibit. Best practice: don't accept (independence). Disclosure is minimum. SOP.", "v": 5}, {"id": 6085, "domain": 3, "task": 2, "topic": "Continuing Ed", "q": "Most state licensing requires continuing education at frequency of:", "choices": ["Every 5-10 yrs", "Not required", "Once per career", "Every 1-2 years"], "correct": 3, "exp": "Most states: every 1-2 yrs. WI: 40 hrs/2 yrs. Keeps up with code/material changes. State-specific.", "v": 5}, {"id": 6086, "domain": 3, "task": 2, "topic": "Inspect Friend", "q": "An inspector asked to inspect a friend's home should:", "choices": ["Accept secretly", "Refuse all work", "Disclose, decide", "Always decline"], "correct": 2, "exp": "Disclose relationship, decide whether independence is maintainable. Some accept; some decline. Document. SOP.", "v": 5}, {"id": 6087, "domain": 3, "task": 2, "topic": "Disclose Limits", "q": "An inspector who reaches the limits of their expertise should:", "choices": ["Disclose, refer", "Estimate item", "Predict future", "Skip the item"], "correct": 0, "exp": "Disclose limits, recommend specialist. Better than overstating expertise (liability + integrity). SOP.", "v": 5}, {"id": 6088, "domain": 3, "task"
