me inspection means:","choices":["Falling below the standard of care for similarly situated inspectors","Making any error","Not finding all defects","Disclosing limitations"],"correct":0,"exp":"Negligence: failing to meet reasonable standard. Errors can occur (e.g., couldn't see, sensible judgment call) without negligence. Persistent errors or significant misses can constitute negligence."},{"id":486,"domain":3,"task":2,"topic":"Photographing People","q":"When photographing in occupied homes:","choices":["Avoid people, especially children","Avoid personal documents and valuables","Avoid identifiable family items","All of the above"],"correct":3,"exp":"Photo etiquette: people (especially children), personal documents, valuables, family identification - avoid. Necessary photos may include defective fixtures, missed flooring areas. Focus on inspection, respect privacy."},{"id":487,"domain":3,"task":2,"topic":"Confidentiality","q":"Inspector confidentiality includes:","choices":["Client information","Inspection findings","Communications","All of the above"],"correct":3,"exp":"Inspector confidentiality: client info (contact, finance, etc.), findings (until report to client), communications. Don't share with seller, listing agent, anyone without authorization."},{"id":488,"domain":3,"task":2,"topic":"Honest Findings","q":"Reporting honest findings:","choices":["Required regardless of outcome implications (sale falls through, agent dissatisfied, etc.)","Should be softened to keep client happy","Adjusted to seller's preference","Should be aligned with agent's wishes"],"correct":0,"exp":"Honest findings: client paid for objective evaluation. Don't soften, omit, or fabricate. Report what was observed. Some buyers may walk; that's their right and inspector served them well."},{"id":489,"domain":3,"task":2,"topic":"Inspector Pressure","q":"If a buyer's agent pressures inspector to soften findings to save the deal:","choices":["Inspector accommodates","Inspector maintains objectivity, reports honestly to client","Cancel inspection","Refer to another inspector"],"correct":1,"exp":"Pressure to soften findings: inspector serves the client (the buyer), not the agent. Maintain objectivity. Document any inappropriate pressure. Pattern of pressure from same agent: reconsider business relationship."},{"id":490,"domain":3,"task":2,"topic":"Defect During Inspection","q":"If inspector causes a minor defect (e.g., damages something during testing):","choices":["Disclose to client/seller, document, possibly compensate","Hide it","Blame client","Charge extra"],"correct":0,"exp":"Inspector damage during inspection: disclose immediately, document, take responsibility, possibly compensate. GL insurance covers significant property damage. Honesty preserves credibility."},{"id":491,"domain":3,"task":2,"topic":"Report Errors","q":"If inspector discovers significant report error after delivery:","choices":["Issue corrected report promptly","Inform client of error","Document timeline","All of the above"],"correct":3,"exp":"Report error: prompt corrected version, transparent communication with client, document timeline. Honest acknowledgment of error preserves trust. Most buyers appreciate transparency."},{"id":492,"domain":3,"task":2,"topic":"Client Education","q":"Educating clients during inspection:","choices":["Builds value and understanding","Should remain within inspection scope (not legal/financial advice)","Important value-add","All of the above"],"correct":3,"exp":"Client education: real value-add. Stay in lane (inspection topics, not real estate advice, not legal/financial advice, not negotiation strategy). Show systems, explain findings, maintenance tips."},{"id":493,"domain":3,"task":2,"topic":"Stay In Scope","q":"Inspector should NOT provide:","choices":["Real estate advice (whether to buy)","Legal advice","Financial advice","All of the above"],"correct":3,"exp":"Stay in lane: don't provide real estate, legal, or financial advice. Refer to qualified professionals (real estate agent, attorney, financial advisor). Inspector's expertise: building condition, not transaction strategy."},{"id":494,"domain":3,"task":2,"topic":"Liability Reducers","q":"Practices that reduce inspector liability include:","choices":["Detailed pre-inspection agreement","Thorough documentation with photos","Honest reporting","All of the above"],"correct":3,"exp":"Liability reducers: written agreement, documentation (photos, notes), honest reporting (disclose limitations, recommend qualified evaluation), professional behavior, ongoing training, insurance."},{"id":495,"domain":3,"task":2,"topic":"Inspector Insurance","q":"Inspector insurance typically includes:","choices":["E&O (Errors & Omissions)","General Liability (GL)","Sometimes commercial auto","All of the above"],"correct":3,"exp":"Inspector insurance: E&O (work product), GL (bodily injury/property damage), business auto (if vehicle for business), workers comp (if employees), cyber/data breach insurance increasingly common."},{"id":496,"domain":3,"task":2,"topic":"Reporting Standard","q":"All findings should be:","choices":["Reported regardless of impact on sale","Modified to keep deal together","Hidden from non-paying parties","Discussed with seller first"],"correct":0,"exp":"Honest, complete reporting: client paid for objective evaluation. Sale impact not inspector's concern. Modifying for sale impact: ethics violation, professional liability, fraud potential."},{"id":497,"domain":3,"task":2,"topic":"Continuing Pressure","q":"If a buyer's agent persistently pressures softening findings:","choices":["Inspector accommodates","Inspector documents incidents and considers ending business relationship","Refer to another inspector","Inspector confronts agent in front of buyer"],"correct":1,"exp":"Pattern of pressure: document each incident, evaluate business relationship. Some inspectors maintain 'do not work with' lists. Maintain integrity over volume of business."},{"id":498,"domain":3,"task":2,"topic":"Privacy Sensitivity","q":"Inspectors should be sensitive to:","choices":["Cultural differences (e.g., shoes off in some homes)","Religious customs (timing of access)","Privacy of occupants","All of the above"],"correct":3,"exp":"Cultural and privacy sensitivity: shoes off (request from occupant), Sabbath/holiday timing, occupants present and need notice, language barriers. Professional adaptability important."},{"id":499,"domain":3,"task":2,"topic":"Maintain Records","q":"Inspector record retention:","choices":["Per state requirements, often 5-10 years","No requirement","Until next inspection","Indefinitely"],"correct":0,"exp":"Record retention: typically 5-10 years per state regulations. Reports, photos, communications. Insurance claims may require records, statute of limitations varies. Backed up digitally."},{"id":500,"domain":3,"task":2,"topic":"Code of Ethics","q":"An inspector code of ethics typically requires:","choices":["Independence and objectivity","Confidentiality","Professional behavior","All of the above"],"correct":3,"exp":"Code of ethics: independence, objectivity, confidentiality, professional behavior, no conflicts of interest, honest marketing, continuing competence. Codes from InterNACHI, ASHI, state regulations - largely overlapping."}];

  const TASK_NAMES = {
    "1.1": "Site Conditions", "1.2": "Exterior", "1.3": "Roof", "1.4": "Structure",
    "1.5": "Electrical", "1.6": "Cooling", "1.7": "Heating", "1.8": "Insulation/Vent",
    "1.9": "Mech Exhaust", "1.10": "Plumbing", "1.11": "Interior", "1.12": "Fireplaces",
    "1.13": "Life Safety",
    "2.1": "Inspection Description", "2.2": "Limitations", "2.3": "Defect Description", "2.4": "Further Evaluation",
    "3.1": "Pre-Inspection Agreement", "3.2": "Quality/Integrity"
  };

  const STORAGE_KEY = "nhie_drill_v2_stats";
  let state = { mode: null, questions: [], currentIdx: 0, answers: [], startTime: null };

  function loadStats() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { byTask: {}, totalAnswered: 0, totalCorrect: 0, sessions: [] };
  }

  function saveStats(stats) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(stats)); } catch(e) {}
  }

  function recordAnswer(question, isCorrect) {
    const stats = loadStats();
    const key = question.domain + "." + question.task;
    if (!stats.byTask[key]) stats.byTask[key] = { correct: 0, total: 0 };
    stats.byTask[key].total++;
    if (isCorrect) stats.byTask[key].correct++;
    stats.totalAnswered++;
    if (isCorrect) stats.totalCorrect++;
    saveStats(stats);
  }

  function pickQuestions(mode) {
    const shuffled = [...QUESTIONS].sort(() => Math.random() - 0.5);
    if (mode === "quick10") return shuffled.slice(0, 10);
    if (mode === "mixed50") return shuffled.slice(0, 50);
    if (mode === "full100") return shuffled.slice(0, 100);
    if (mode === "weak") {
      const stats = loadStats();
      const taskAccuracy = {};
      Object.entries(stats.byTask).forEach(([k, v]) => {
        taskAccuracy[k] = v.total > 0 ? v.correct / v.total : 0.5;
      });
      const scored = shuffled.map(q => {
        const key = q.domain + "." + q.task;
        const acc = taskAccuracy[key] !== undefined ? taskAccuracy[key] : 0.5;
        return { q, acc };
      }).sort((a, b) => a.acc - b.acc);
      return scored.slice(0, 25).map(s => s.q);
    }
    return shuffled.slice(0, 10);
  }

  function renderHome() {
    const stats = loadStats();
    const overallPct = stats.totalAnswered > 0 ? Math.round((stats.totalCorrect / stats.totalAnswered) * 100) : 0;
    document.getElementById('stats-bar').innerHTML =
      '<div class="stat"><div class="lbl">Answered</div><div class="val">' + stats.totalAnswered + '</div></div>' +
      '<div class="stat"><div class="lbl">Accuracy</div><div class="val">' + (stats.totalAnswered > 0 ? overallPct + '%' : '-') + '</div></div>' +
      '<div class="stat"><div class="lbl">Bank size</div><div class="val">' + QUESTIONS.length + '</div></div>';

    const gapList = document.getElementById('gap-list');
    const gaps = Object.entries(stats.byTask)
      .filter(([k, v]) => v.total >= 2)
      .map(([k, v]) => ({ key: k, pct: Math.round((v.correct / v.total) * 100), n: v.total }))
      .sort((a, b) => a.pct - b.pct);
    if (gaps.length === 0) {
      gapList.innerHTML = '<div style="font-size:14px; color: var(--text-secondary);">Take a quick drill to start tracking gaps by task area.</div>';
    } else {
      let html = '<div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em;">Accuracy by task - weakest first</div>';
      gaps.forEach(g => {
        const cls = g.pct < 70 ? 'weak' : g.pct < 85 ? 'ok' : 'strong';
        const name = TASK_NAMES[g.key] || g.key;
        html += '<div class="gap-row"><span>' + name + ' <span style="color: var(--text-tertiary); font-size: 12px;">(' + g.n + ')</span></span><span class="gap-pct ' + cls + '">' + g.pct + '%</span></div>';
      });
      gapList.innerHTML = html;
    }
  }

  function showScreen(name) {
    document.getElementById('screen-home').style.display = name === 'home' ? 'block' : 'none';
    document.getElementById('screen-quiz').style.display = name === 'quiz' ? 'block' : 'none';
    document.getElementById('screen-results').style.display = name === 'results' ? 'block' : 'none';
    if (name === 'home') renderHome();
    window.scrollTo(0, 0);
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderQuestion() {
    const q = state.questions[state.currentIdx];
    const taskName = TASK_NAMES[q.domain + "." + q.task] || q.topic;
    document.getElementById('progress-text').textContent = 'Question ' + (state.currentIdx + 1) + ' of ' + state.questions.length;
    document.getElementById('progress-bar-fill').style.width = ((state.currentIdx) / state.questions.length * 100) + '%';

    let html = '<div class="qmeta"><span>' + escapeHtml(taskName) + ' . ' + escapeHtml(q.topic) + '</span><span>D' + q.domain + '</span></div>';
    html += '<div class="qtext">' + escapeHtml(q.q) + '</div>';
    q.choices.forEach((c, i) => {
      html += '<button class="choice" data-idx="' + i + '">' + String.fromCharCode(65 + i) + '. ' + escapeHtml(c) + '</button>';
    });
    html += '<div id="explanation-area"></div>';
    html += '<div class="controls" id="controls-area"></div>';
    document.getElementById('question-card').innerHTML = html;

    document.querySelectorAll('.choice').forEach(btn => {
      btn.addEventListener('click', () => answerQuestion(parseInt(btn.dataset.idx)));
    });
  }

  function answerQuestion(choiceIdx) {
    const q = state.questions[state.currentIdx];
    const isCorrect = choiceIdx === q.correct;
    state.answers.push({ question: q, chosen: choiceIdx, correct: isCorrect });
    recordAnswer(q, isCorrect);

    document.querySelectorAll('.choice').forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.correct) btn.classList.add('correct');
      else if (i === choiceIdx) btn.classList.add('wrong');
    });

    document.getElementById('explanation-area').innerHTML =
      '<div class="explanation"><div class="label">' + (isCorrect ? 'Correct' : 'Explanation') + '</div>' + escapeHtml(q.exp) + '</div>';

    const isLast = state.currentIdx === state.questions.length - 1;
    document.getElementById('controls-area').innerHTML =
      '<button class="primary" id="next-btn">' + (isLast ? 'See results' : 'Next question -->') + '</button>';
    document.getElementById('next-btn').addEventListener('click', () => {
      if (isLast) showResults();
      else { state.currentIdx++; renderQuestion(); }
    });
    document.getElementById('progress-bar-fill').style.width = ((state.currentIdx + 1) / state.questions.length * 100) + '%';
  }

  function showResults() {
    const total = state.answers.length;
    const correct = state.answers.filter(a => a.correct).length;
    const pct = Math.round((correct / total) * 100);
    const passing = pct >= 72;
    const elapsed = Math.round((Date.now() - state.startTime) / 1000);
    const min = Math.floor(elapsed / 60);
    const sec = elapsed % 60;

    document.getElementById('score-display').className = 'score ' + (passing ? 'pass' : 'fail');
    document.getElementById('score-display').textContent = pct + '%';
    document.getElementById('score-breakdown').textContent = correct + ' of ' + total + ' correct . ' + min + 'm ' + sec + 's . ' + (passing ? 'Above NHIE pass threshold' : 'Below NHIE pass threshold');

    const wrongAnswers = state.answers.filter(a => !a.correct);
    const reviewSection = document.getElementById('review-section');
    if (wrongAnswers.length === 0) {
      reviewSection.innerHTML = '<div style="font-size:14px; color: var(--success); margin-bottom:1rem;">Perfect score on this set.</div>';
    } else {
      let html = '<div class="review-section-header">Review . ' + wrongAnswers.length + ' missed</div>';
      wrongAnswers.forEach(a => {
        html += '<div class="review-item"><div class="q">' + escapeHtml(a.question.q) + '</div>' +
          '<div class="a"><strong>Your answer:</strong> ' + escapeHtml(a.question.choices[a.chosen]) + '</div>' +
          '<div class="a"><strong>Correct:</strong> ' + escapeHtml(a.question.choices[a.question.correct]) + '</div></div>';
      });
      reviewSection.innerHTML = html;
    }
    showScreen('results');
  }

  function startQuiz(mode) {
    if (mode === 'reset') {
      if (confirm('Clear all stats? This cannot be undone.')) {
        localStorage.removeItem(STORAGE_KEY);
        renderHome();
      }
      return;
    }
    state.mode = mode;
    state.questions = pickQuestions(mode);
    state.currentIdx = 0;
    state.answers = [];
    state.startTime = Date.now();
    showScreen('quiz');
    renderQuestion();
  }

  document.querySelectorAll('.mode-card').forEach(card => {
    card.addEventListener('click', () => startQuiz(card.dataset.mode));
  });
  document.getElementById('back-home').addEventListener('click', () => showScreen('home'));

  renderHome();
})();
</script>
</body>
</html>
